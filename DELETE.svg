<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purpleBlueReverse" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="nodeGlowLarge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#8b5cf6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glassBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="url(#purpleBlue)" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Outer halos for nodes -->
  <circle cx="600" cy="400" r="100" fill="url(#nodeGlowLarge)" opacity="0.4"/>
  <circle cx="300" cy="200" r="60" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="600" cy="120" r="60" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="900" cy="250" r="60" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="880" cy="550" r="60" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="600" cy="650" r="60" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="320" cy="580" r="60" fill="url(#nodeGlow)" opacity="0.3"/>
  
  <!-- Curved connection paths with particles -->
  <!-- Path 1: Center to left-top -->
  <path d="M 600 400 Q 450 300, 300 200" stroke="url(#purpleBlue)" stroke-width="5" fill="none" opacity="0.7" filter="url(#softGlow)" marker-end="url(#arrowhead)"/>
  <circle cx="520" cy="340" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="440" cy="280" r="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="360" cy="230" r="3" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Path 2: Center to top -->
  <path d="M 600 400 Q 600 260, 600 120" stroke="url(#purpleBlueReverse)" stroke-width="5" fill="none" opacity="0.7" filter="url(#softGlow)" marker-end="url(#arrowhead)"/>
  <circle cx="600" cy="310" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="600" cy="220" r="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="600" cy="160" r="3" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Path 3: Center to right -->
  <path d="M 600 400 Q 750 325, 900 250" stroke="url(#purpleBlue)" stroke-width="5" fill="none" opacity="0.7" filter="url(#softGlow)" marker-end="url(#arrowhead)"/>
  <circle cx="680" cy="370" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="760" cy="340" r="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="830" cy="290" r="3" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Path 4: Center to right-bottom -->
  <path d="M 600 400 Q 740 475, 880 550" stroke="url(#purpleBlueReverse)" stroke-width="5" fill="none" opacity="0.7" filter="url(#softGlow)" marker-end="url(#arrowhead)"/>
  <circle cx="680" cy="430" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="760" cy="470" r="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="820" cy="510" r="3" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Path 5: Center to bottom -->
  <path d="M 600 400 Q 600 525, 600 650" stroke="url(#purpleBlue)" stroke-width="5" fill="none" opacity="0.7" filter="url(#softGlow)" marker-end="url(#arrowhead)"/>
  <circle cx="600" cy="480" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="600" cy="550" r="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="600" cy="600" r="3" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Path 6: Center to left-bottom -->
  <path d="M 600 400 Q 460 490, 320 580" stroke="url(#purpleBlueReverse)" stroke-width="5" fill="none" opacity="0.7" filter="url(#softGlow)" marker-end="url(#arrowhead)"/>
  <circle cx="530" cy="440" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="450" cy="490" r="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="380" cy="535" r="3" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Orbital connections between outer nodes -->
  <path d="M 300 200 Q 450 160, 600 120" stroke="url(#purpleBlue)" stroke-width="4" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M 600 120 Q 750 185, 900 250" stroke="url(#purpleBlueReverse)" stroke-width="4" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M 900 250 Q 890 400, 880 550" stroke="url(#purpleBlue)" stroke-width="4" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M 880 550 Q 740 600, 600 650" stroke="url(#purpleBlueReverse)" stroke-width="4" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M 600 650 Q 460 615, 320 580" stroke="url(#purpleBlue)" stroke-width="4" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M 320 580 Q 310 390, 300 200" stroke="url(#purpleBlueReverse)" stroke-width="4" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  
  <!-- Metric badges (glassmorphism) -->
  <!-- +28% (left edge) -->
  <rect x="180" y="385" width="80" height="32" rx="16" fill="#FFFFFF" opacity="0.15" filter="url(#glassBlur)"/>
  <rect x="180" y="385" width="80" height="32" rx="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <text x="220" y="406" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">+28%</text>
  
  <!-- MRR 5.2k (mid-left) -->
  <rect x="340" y="310" width="100" height="32" rx="16" fill="#FFFFFF" opacity="0.15" filter="url(#glassBlur)"/>
  <rect x="340" y="310" width="100" height="32" rx="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <text x="390" y="331" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">MRR 5.2k</text>
  
  <!-- MRR 5.2% (lower-left) -->
  <rect x="360" y="500" width="105" height="32" rx="16" fill="#FFFFFF" opacity="0.15" filter="url(#glassBlur)"/>
  <rect x="360" y="500" width="105" height="32" rx="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <text x="412" y="521" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">MRR 5.2%</text>
  
  <!-- DAU 12k (upper-right) -->
  <rect x="720" y="260" width="95" height="32" rx="16" fill="#FFFFFF" opacity="0.15" filter="url(#glassBlur)"/>
  <rect x="720" y="260" width="95" height="32" rx="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <text x="767" y="281" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">DAU 12k</text>
  
  <!-- LTV 4.2x (right edge) -->
  <rect x="940" y="385" width="90" height="32" rx="16" fill="#FFFFFF" opacity="0.15" filter="url(#glassBlur)"/>
  <rect x="940" y="385" width="90" height="32" rx="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <text x="985" y="406" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">LTV 4.2x</text>
  
  <!-- CTR 8.9% (lower-right) -->
  <rect x="720" y="580" width="95" height="32" rx="16" fill="#FFFFFF" opacity="0.15" filter="url(#glassBlur)"/>
  <rect x="720" y="580" width="95" height="32" rx="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <text x="767" y="601" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">CTR 8.9%</text>
  
  <!-- Node backgrounds (glassmorphism) -->
  <!-- Center node (large) -->
  <circle cx="600" cy="400" r="70" fill="url(#nodeGlowLarge)" opacity="0.3"/>
  <circle cx="600" cy="400" r="70" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="600" cy="400" r="70" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Left-top node -->
  <circle cx="300" cy="200" r="45" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="300" cy="200" r="45" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="300" cy="200" r="45" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Top node -->
  <circle cx="600" cy="120" r="45" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="600" cy="120" r="45" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="600" cy="120" r="45" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Right node -->
  <circle cx="900" cy="250" r="45" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="900" cy="250" r="45" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="900" cy="250" r="45" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Right-bottom node -->
  <circle cx="880" cy="550" r="45" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="880" cy="550" r="45" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="880" cy="550" r="45" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Bottom node -->
  <circle cx="600" cy="650" r="45" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="600" cy="650" r="45" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="600" cy="650" r="45" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Left-bottom node -->
  <circle cx="320" cy="580" r="45" fill="url(#nodeGlow)" opacity="0.3"/>
  <circle cx="320" cy="580" r="45" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="320" cy="580" r="45" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Icons -->
  <!-- Center: Bar chart icon -->
  <g transform="translate(600, 400)">
    <rect x="-25" y="-10" width="12" height="30" fill="#FFFFFF" rx="2"/>
    <rect x="-8" y="-20" width="12" height="40" fill="#FFFFFF" rx="2"/>
    <rect x="9" y="-5" width="12" height="25" fill="#FFFFFF" rx="2"/>
  </g>
  
  <!-- Left-top: Chat bubble -->
  <g transform="translate(300, 200)">
    <path d="M -18 -12 Q -18 -18, -12 -18 L 12 -18 Q 18 -18, 18 -12 L 18 6 Q 18 12, 12 12 L -6 12 L -12 18 L -12 12 Q -18 12, -18 6 Z" fill="#FFFFFF"/>
    <circle cx="-8" cy="-3" r="2.5" fill="#3b82f6"/>
    <circle cx="0" cy="-3" r="2.5" fill="#3b82f6"/>
    <circle cx="8" cy="-3" r="2.5" fill="#3b82f6"/>
  </g>
  
  <!-- Top: Shopping bag -->
  <g transform="translate(600, 120)">
    <rect x="-14" y="-8" width="28" height="22" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <path d="M -8 -8 Q -8 -16, 0 -16 Q 8 -16, 8 -8" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Right: Camera -->
  <g transform="translate(900, 250)">
    <rect x="-16" y="-10" width="32" height="22" rx="3" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <circle cx="0" cy="1" r="7" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <rect x="-20" y="-14" width="10" height="6" rx="2" fill="#FFFFFF"/>
  </g>
  
  <!-- Right-bottom: Shield -->
  <g transform="translate(880, 550)">
    <path d="M 0 -18 L 14 -12 L 14 2 Q 14 12, 0 18 Q -14 12, -14 2 L -14 -12 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M -6 0 L -2 6 L 8 -6" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Bottom: Gear -->
  <g transform="translate(600, 650)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
    <rect x="-2" y="-16" width="4" height="6" fill="#FFFFFF" rx="1"/>
    <rect x="-2" y="10" width="4" height="6" fill="#FFFFFF" rx="1"/>
    <rect x="-16" y="-2" width="6" height="4" fill="#FFFFFF" rx="1"/>
    <rect x="10" y="-2" width="6" height="4" fill="#FFFFFF" rx="1"/>
  </g>
  
  <!-- Left-bottom: Power/plug -->
  <g transform="translate(320, 580)">
    <rect x="-10" y="2" width="20" height="14" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="-5" y1="-8" x2="-5" y2="2" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="-8" x2="5" y2="2" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="16" x2="0" y2="20" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
