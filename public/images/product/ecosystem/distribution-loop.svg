import React from 'react';
import { Grid3x3, Monitor, Users, TrendingUp, Zap } from 'lucide-react';

const FlywheelDiagram = () => {
  const segments = [
    { 
      id: 1, 
      title: 'More Apps', 
      icon: Grid3x3, 
      angle: -90,
      gradient: 'from-purple-500 to-blue-500'
    },
    { 
      id: 2, 
      title: 'More Surfaces', 
      icon: Monitor, 
      angle: -18,
      gradient: 'from-blue-500 to-indigo-500'
    },
    { 
      id: 3, 
      title: 'More Traffic', 
      icon: Users, 
      angle: 54,
      gradient: 'from-indigo-500 to-purple-500'
    },
    { 
      id: 4, 
      title: 'More Conversions', 
      icon: TrendingUp, 
      angle: 126,
      gradient: 'from-purple-500 to-violet-500'
    },
    { 
      id: 5, 
      title: 'More Growth', 
      icon: Zap, 
      angle: 198,
      gradient: 'from-violet-500 to-purple-500'
    }
  ];

  const getPosition = (angle, radius) => {
    const rad = (angle * Math.PI) / 180;
    return {
      x: Math.cos(rad) * radius,
      y: Math.sin(rad) * radius
    };
  };

  return (
    <div className="w-full h-screen flex items-center justify-center bg-transparent p-8">
      <div className="relative w-full max-w-3xl aspect-square">
        {/* Center circle with pulse animation */}
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 opacity-20 animate-pulse" />
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 rounded-full bg-gradient-to-br from-purple-600 to-blue-600 opacity-30" />
        
        {/* Circular path visualization */}
        <svg className="absolute inset-0 w-full h-full" style={{ transform: 'rotate(-90deg)' }}>
          <defs>
            <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#a855f7" stopOpacity="0.3" />
              <stop offset="50%" stopColor="#3b82f6" stopOpacity="0.3" />
              <stop offset="100%" stopColor="#a855f7" stopOpacity="0.3" />
            </linearGradient>
          </defs>
          <circle
            cx="50%"
            cy="50%"
            r="35%"
            fill="none"
            stroke="url(#circleGradient)"
            strokeWidth="2"
            strokeDasharray="5,5"
            className="animate-spin"
            style={{ animationDuration: '20s' }}
          />
        </svg>

        {/* Segments */}
        {segments.map((segment, index) => {
          const pos = getPosition(segment.angle, 35); // 35% radius
          const nextSegment = segments[(index + 1) % segments.length];
          const nextPos = getPosition(nextSegment.angle, 35);
          
          return (
            <React.Fragment key={segment.id}>
              {/* Arrow between segments */}
              <svg className="absolute inset-0 w-full h-full pointer-events-none">
                <defs>
                  <marker
                    id={`arrowhead-${segment.id}`}
                    markerWidth="10"
                    markerHeight="10"
                    refX="9"
                    refY="3"
                    orient="auto"
                  >
                    <polygon
                      points="0 0, 10 3, 0 6"
                      fill="#8b5cf6"
                      className="animate-pulse"
                    />
                  </marker>
                  <linearGradient id={`arrowGradient-${segment.id}`} x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stopColor="#a855f7" />
                    <stop offset="100%" stopColor="#3b82f6" />
                  </linearGradient>
                </defs>
                <path
                  d={`M ${50 + pos.x}% ${50 + pos.y}% Q ${50 + (pos.x + nextPos.x) / 2}% ${50 + (pos.y + nextPos.y) / 2}% ${50 + nextPos.x}% ${50 + nextPos.y}%`}
                  fill="none"
                  stroke={`url(#arrowGradient-${segment.id})`}
                  strokeWidth="3"
                  markerEnd={`url(#arrowhead-${segment.id})`}
                  opacity="0.6"
                />
              </svg>

              {/* Segment card */}
              <div
                className="absolute transition-all duration-300 hover:scale-110 hover:z-10 group"
                style={{
                  left: `${50 + pos.x}%`,
                  top: `${50 + pos.y}%`,
                  transform: 'translate(-50%, -50%)',
                  animation: `float ${3 + index * 0.5}s ease-in-out infinite`
                }}
              >
                <div className={`relative bg-gradient-to-br ${segment.gradient} p-6 rounded-2xl shadow-2xl min-w-[140px] transition-all duration-300 group-hover:shadow-purple-500/50`}>
                  <div className="flex flex-col items-center gap-3">
                    <div className="bg-white/20 backdrop-blur-sm p-3 rounded-xl">
                      <segment.icon className="w-8 h-8 text-white" strokeWidth={2} />
                    </div>
                    <h3 className="text-white font-bold text-center text-sm leading-tight">
                      {segment.title}
                    </h3>
                  </div>
                  
                  {/* Glow effect */}
                  <div className="absolute inset-0 bg-gradient-to-br from-white/0 to-white/10 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300" />
                </div>
              </div>
            </React.Fragment>
          );
        })}

        {/* Center label */}
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center z-20">
          <div className="bg-white/10 backdrop-blur-md px-6 py-3 rounded-full border border-purple-300/30">
            <p className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-600 font-bold text-lg">
              Growth Loop
            </p>
          </div>
        </div>

        {/* Floating animation keyframes */}
        <style>{`
          @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
          }
        `}</style>
      </div>
    </div>
  );
};

export default FlywheelDiagram;
