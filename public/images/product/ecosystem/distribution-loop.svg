import React from 'react';
import { Smartphone, Monitor, Users, TrendingUp, Rocket } from 'lucide-react';

export default function FlywheelDiagram() {
  const segments = [
    { label: 'More Apps', icon: Smartphone, color: 'from-purple-500 to-blue-500' },
    { label: 'More Surfaces', icon: Monitor, color: 'from-blue-500 to-purple-500' },
    { label: 'More Traffic', icon: Users, color: 'from-purple-500 to-blue-500' },
    { label: 'More Conversions', icon: TrendingUp, color: 'from-blue-500 to-purple-500' },
    { label: 'More Growth', icon: Rocket, color: 'from-purple-500 to-blue-500' }
  ];

  const angleStep = 360 / segments.length;

  return (
    <div className="flex items-center justify-center min-h-screen bg-transparent p-8">
      <div className="relative w-full max-w-2xl aspect-square">
        {/* Center circle */}
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full bg-gradient-to-br from-purple-600 to-blue-600 flex items-center justify-center shadow-2xl animate-pulse">
          <div className="text-white text-center font-bold text-sm">
            Growth<br/>Loop
          </div>
        </div>

        {/* Circular path for animation */}
        <svg className="absolute inset-0 w-full h-full -rotate-90 animate-[spin_20s_linear_infinite]" style={{ opacity: 0.3 }}>
          <circle
            cx="50%"
            cy="50%"
            r="42%"
            fill="none"
            stroke="url(#gradient)"
            strokeWidth="2"
            strokeDasharray="8 8"
          />
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#8b5cf6" />
              <stop offset="100%" stopColor="#3b82f6" />
            </linearGradient>
          </defs>
        </svg>

        {/* Segments */}
        {segments.map((segment, index) => {
          const angle = angleStep * index - 90;
          const radius = 42;
          const x = 50 + radius * Math.cos((angle * Math.PI) / 180);
          const y = 50 + radius * Math.sin((angle * Math.PI) / 180);
          
          const Icon = segment.icon;

          return (
            <div
              key={index}
              className="absolute transition-all duration-300 hover:scale-110"
              style={{
                left: `${x}%`,
                top: `${y}%`,
                transform: 'translate(-50%, -50%)',
                animation: `float 3s ease-in-out ${index * 0.6}s infinite`
              }}
            >
              {/* Segment card */}
              <div className="relative group">
                <div className={`w-28 h-28 rounded-2xl bg-gradient-to-br ${segment.color} shadow-lg flex flex-col items-center justify-center gap-2 p-4 border border-white/20 backdrop-blur-sm`}>
                  <Icon className="w-8 h-8 text-white" strokeWidth={2.5} />
                  <div className="text-white text-xs font-semibold text-center leading-tight">
                    {segment.label}
                  </div>
                </div>

                {/* Arrow to next segment */}
                <div 
                  className="absolute w-12 h-12 -right-8 top-1/2 -translate-y-1/2"
                  style={{
                    transform: `translate(0, -50%) rotate(${angleStep}deg)`,
                    transformOrigin: 'left center'
                  }}
                >
                  <svg width="48" height="48" viewBox="0 0 48 48" className="text-purple-500 opacity-70">
                    <path
                      d="M8 24 L32 24 M32 24 L26 18 M32 24 L26 30"
                      stroke="currentColor"
                      strokeWidth="3"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      fill="none"
                    />
                  </svg>
                </div>
              </div>
            </div>
          );
        })}

        <style jsx>{`
          @keyframes float {
            0%, 100% {
              transform: translate(-50%, -50%) translateY(0px);
            }
            50% {
              transform: translate(-50%, -50%) translateY(-8px);
            }
          }
        `}</style>
      </div>
    </div>
  );
}
