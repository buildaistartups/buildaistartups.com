<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="vibrantPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="vibrantBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowEffect">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="url(#purpleBlue)" opacity="0.9" />
    </marker>
    
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      
      @keyframes dash {
        to { stroke-dashoffset: -40; }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      @keyframes scaleUp {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      @keyframes glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.6)) drop-shadow(0 0 25px rgba(59, 130, 246, 0.4)); }
        50% { filter: drop-shadow(0 0 30px rgba(139, 92, 246, 1)) drop-shadow(0 0 45px rgba(59, 130, 246, 0.8)); }
      }
      
      @keyframes slideIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      
      .segment {
        animation: pulse 3s ease-in-out infinite, slideIn 1s ease-out forwards;
      }
      
      .arrow-path {
        stroke: url(#purpleBlue);
        stroke-width: 4;
        fill: none;
        stroke-dasharray: 10, 10;
        animation: dash 20s linear infinite;
      }
      
      .icon {
        animation: fadeInOut 4s ease-in-out infinite;
      }
      
      .center-circle {
        animation: rotate 30s linear infinite, glow-pulse 3s ease-in-out infinite;
      }
      
      .label-text {
        animation: scaleUp 3s ease-in-out infinite;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>
  
  <!-- Background glow -->
  <circle cx="400" cy="400" r="280" fill="url(#glowEffect)" opacity="0.4" class="segment" style="animation-delay: 0s"/>
  
  <!-- Center circle with rotation animation -->
  <g class="center-circle">
    <circle cx="400" cy="400" r="100" fill="url(#purpleBlue)" opacity="0.15" filter="url(#glow)"/>
    <circle cx="400" cy="400" r="80" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6"/>
    <text x="400" y="395" font-size="20" fill="url(#purpleBlue)" text-anchor="middle">Growth</text>
    <text x="400" y="420" font-size="18" fill="url(#purpleBlue)" text-anchor="middle">Flywheel</text>
  </g>
  
  <!-- Segment 1: More Apps (Top) -->
  <g class="segment" style="animation-delay: 0s">
    <circle cx="400" cy="120" r="70" fill="url(#vibrantPurple)" opacity="0.95" filter="url(#strongGlow)"/>
    <circle cx="400" cy="120" r="60" fill="none" stroke="#a855f7" stroke-width="3" opacity="0.7"/>
    
    <!-- Apps icon (grid) -->
    <rect class="icon" x="380" y="100" width="15" height="15" rx="3" fill="white" style="animation-delay: 0s"/>
    <rect class="icon" x="405" y="100" width="15" height="15" rx="3" fill="white" style="animation-delay: 0.2s"/>
    <rect class="icon" x="380" y="125" width="15" height="15" rx="3" fill="white" style="animation-delay: 0.4s"/>
    <rect class="icon" x="405" y="125" width="15" height="15" rx="3" fill="white" style="animation-delay: 0.6s"/>
    
    <text x="400" y="175" font-size="20" fill="#8b5cf6" text-anchor="middle" class="label-text">More Apps</text>
  </g>
  
  <!-- Segment 2: More Surfaces (Right) -->
  <g class="segment" style="animation-delay: 0.4s">
    <circle cx="610" cy="280" r="70" fill="url(#vibrantBlue)" opacity="0.95" filter="url(#strongGlow)"/>
    <circle cx="610" cy="280" r="60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.7"/>
    
    <!-- Screens icon (devices) -->
    <rect class="icon" x="595" y="265" width="30" height="20" rx="2" fill="none" stroke="white" stroke-width="3" style="animation-delay: 0.4s"/>
    <rect class="icon" x="605" y="288" width="15" height="22" rx="2" fill="none" stroke="white" stroke-width="2.5" style="animation-delay: 0.6s"/>
    
    <text x="680" y="288" font-size="20" fill="#3b82f6" text-anchor="middle" class="label-text" style="animation-delay: 0.4s">More</text>
    <text x="680" y="308" font-size="20" fill="#3b82f6" text-anchor="middle" class="label-text" style="animation-delay: 0.4s">Surfaces</text>
  </g>
  
  <!-- Segment 3: More Traffic (Bottom Right) -->
  <g class="segment" style="animation-delay: 0.8s">
    <circle cx="550" cy="550" r="70" fill="url(#vibrantPurple)" opacity="0.95" filter="url(#strongGlow)"/>
    <circle cx="550" cy="550" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.7"/>
    
    <!-- Users icon (people) -->
    <circle class="icon" cx="540" cy="540" r="8" fill="white" style="animation-delay: 0.8s"/>
    <path class="icon" d="M 540 548 Q 525 548 525 565 L 555 565 Q 555 548 540 548" fill="white" style="animation-delay: 1s"/>
    <circle class="icon" cx="560" cy="543" r="6" fill="white" opacity="0.8" style="animation-delay: 1.2s"/>
    <path class="icon" d="M 560 548 Q 548 548 548 562 L 572 562 Q 572 548 560 548" fill="white" opacity="0.8" style="animation-delay: 1.4s"/>
    
    <text x="630" y="558" font-size="20" fill="#8b5cf6" text-anchor="middle" class="label-text" style="animation-delay: 0.8s">More Traffic</text>
  </g>
  
  <!-- Segment 4: More Conversions (Bottom Left) -->
  <g class="segment" style="animation-delay: 1.2s">
    <circle cx="250" cy="550" r="70" fill="url(#vibrantBlue)" opacity="0.95" filter="url(#strongGlow)"/>
    <circle cx="250" cy="550" r="60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.7"/>
    
    <!-- Chart icon (trending up) -->
    <polyline class="icon" points="230,560 240,545 250,550 260,535 270,540" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="animation-delay: 1.2s"/>
    <circle class="icon" cx="270" cy="540" r="3" fill="white" style="animation-delay: 1.4s"/>
    
    <text x="170" y="558" font-size="20" fill="#3b82f6" text-anchor="middle" class="label-text" style="animation-delay: 1.2s">More</text>
    <text x="170" y="578" font-size="20" fill="#3b82f6" text-anchor="middle" class="label-text" style="animation-delay: 1.2s">Conversions</text>
  </g>
  
  <!-- Segment 5: More Growth (Left) -->
  <g class="segment" style="animation-delay: 1.6s">
    <circle cx="190" cy="280" r="70" fill="url(#vibrantPurple)" opacity="0.95" filter="url(#strongGlow)"/>
    <circle cx="190" cy="280" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.7"/>
    
    <!-- Growth icon (rocket/arrow up) -->
    <path class="icon" d="M 190 255 L 190 285 M 180 265 L 190 255 L 200 265" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" style="animation-delay: 1.6s"/>
    <path class="icon" d="M 185 275 L 180 285 L 185 283 M 195 275 L 200 285 L 195 283" fill="white" style="animation-delay: 1.8s"/>
    
    <text x="120" y="288" font-size="20" fill="#8b5cf6" text-anchor="middle" class="label-text" style="animation-delay: 1.6s">More</text>
    <text x="120" y="308" font-size="20" fill="#8b5cf6" text-anchor="middle" class="label-text" style="animation-delay: 1.6s">Growth</text>
  </g>
  
  <!-- Connecting arrows (clockwise flow) -->
  <!-- Arrow 1: Apps to Surfaces -->
  <path class="arrow-path" d="M 460 150 Q 520 200 570 250" marker-end="url(#arrowhead)" style="animation-delay: 0s"/>
  
  <!-- Arrow 2: Surfaces to Traffic -->
  <path class="arrow-path" d="M 600 350 Q 590 430 570 490" marker-end="url(#arrowhead)" style="animation-delay: 1s"/>
  
  <!-- Arrow 3: Traffic to Conversions -->
  <path class="arrow-path" d="M 480 560 Q 400 580 320 560" marker-end="url(#arrowhead)" style="animation-delay: 2s"/>
  
  <!-- Arrow 4: Conversions to Growth -->
  <path class="arrow-path" d="M 230 480 Q 210 400 210 320" marker-end="url(#arrowhead)" style="animation-delay: 3s"/>
  
  <!-- Arrow 5: Growth to Apps -->
  <path class="arrow-path" d="M 230 210 Q 280 160 340 140" marker-end="url(#arrowhead)" style="animation-delay: 4s"/>
  
  <!-- Additional circular flow indicators -->
  <circle cx="460" cy="150" r="8" fill="url(#purpleBlue)" opacity="0.7" class="segment" style="animation-delay: 0s"/>
  <circle cx="600" cy="350" r="8" fill="url(#purpleBlue)" opacity="0.7" class="segment" style="animation-delay: 1s"/>
  <circle cx="480" cy="560" r="8" fill="url(#purpleBlue)" opacity="0.7" class="segment" style="animation-delay: 2s"/>
  <circle cx="230" cy="480" r="8" fill="url(#purpleBlue)" opacity="0.7" class="segment" style="animation-delay: 3s"/>
  <circle cx="230" cy="210" r="8" fill="url(#purpleBlue)" opacity="0.7" class="segment" style="animation-delay: 4s"/>
</svg>
