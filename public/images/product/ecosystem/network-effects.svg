<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="vibrantPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="vibrantBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowEffect">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      
      @keyframes lineGrow {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      @keyframes glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6)); }
        50% { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 1)); }
      }
      
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .node {
        animation: pulse 2.5s ease-in-out infinite, fadeIn 0.8s ease-out forwards;
      }
      
      .connection-line {
        stroke: url(#purpleBlue);
        stroke-width: 2;
        opacity: 0.5;
        stroke-dasharray: 100;
        animation: lineGrow 1.5s ease-out forwards;
      }
      
      .metric {
        animation: slideUp 1s ease-out forwards;
      }
      
      .value-indicator {
        animation: glow-pulse 2s ease-in-out infinite, fadeIn 1s ease-out forwards;
      }
      
      .arrow {
        animation: pulse 3s ease-in-out infinite;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" font-size="28" font-weight="800" fill="url(#purpleBlue)" text-anchor="middle">Network Effects Growth</text>
  
  <!-- Stage 1: 2 Nodes -->
  <g transform="translate(150, 200)">
    <!-- Background glow -->
    <circle cx="0" cy="0" r="100" fill="url(#glowEffect)" opacity="0.3"/>
    
    <!-- Connection line -->
    <line class="connection-line" x1="-40" y1="-20" x2="40" y2="20" style="animation-delay: 0.5s"/>
    
    <!-- Nodes -->
    <circle class="node" cx="-40" cy="-20" r="20" fill="url(#vibrantPurple)" filter="url(#glow)" style="animation-delay: 0s"/>
    <circle class="node" cx="40" cy="20" r="20" fill="url(#vibrantBlue)" filter="url(#glow)" style="animation-delay: 0.2s"/>
    
    <!-- Labels -->
    <text x="0" y="80" font-size="22" font-weight="800" fill="#8b5cf6" text-anchor="middle" class="metric">2 Nodes</text>
    <text x="0" y="105" font-size="18" fill="#6b7280" text-anchor="middle" class="metric" style="animation-delay: 0.3s">1 Connection</text>
    
    <!-- Value indicator -->
    <g class="value-indicator" style="animation-delay: 0.8s">
      <rect x="-50" y="130" width="100" height="40" rx="20" fill="url(#vibrantPurple)" opacity="0.9" filter="url(#glow)"/>
      <text x="0" y="156" font-size="20" fill="white" text-anchor="middle">Value: 1x</text>
    </g>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow" transform="translate(280, 280)">
    <path d="M 0 0 L 60 0" stroke="url(#purpleBlue)" stroke-width="4" fill="none" opacity="0.7"/>
    <path d="M 60 0 L 50 -8 L 50 8 Z" fill="url(#purpleBlue)" opacity="0.7"/>
  </g>
  
  <!-- Stage 2: 4 Nodes -->
  <g transform="translate(480, 200)">
    <!-- Background glow -->
    <circle cx="0" cy="0" r="130" fill="url(#glowEffect)" opacity="0.4"/>
    
    <!-- Connection lines (6 connections) -->
    <line class="connection-line" x1="-50" y1="-50" x2="50" y2="-50" style="animation-delay: 0.6s"/>
    <line class="connection-line" x1="-50" y1="-50" x2="-50" y2="50" style="animation-delay: 0.7s"/>
    <line class="connection-line" x1="-50" y1="-50" x2="50" y2="50" style="animation-delay: 0.8s"/>
    <line class="connection-line" x1="50" y1="-50" x2="-50" y2="50" style="animation-delay: 0.9s"/>
    <line class="connection-line" x1="50" y1="-50" x2="50" y2="50" style="animation-delay: 1s"/>
    <line class="connection-line" x1="-50" y1="50" x2="50" y2="50" style="animation-delay: 1.1s"/>
    
    <!-- Nodes -->
    <circle class="node" cx="-50" cy="-50" r="22" fill="url(#vibrantPurple)" filter="url(#glow)" style="animation-delay: 0.3s"/>
    <circle class="node" cx="50" cy="-50" r="22" fill="url(#vibrantBlue)" filter="url(#glow)" style="animation-delay: 0.4s"/>
    <circle class="node" cx="-50" cy="50" r="22" fill="url(#vibrantBlue)" filter="url(#glow)" style="animation-delay: 0.5s"/>
    <circle class="node" cx="50" cy="50" r="22" fill="url(#vibrantPurple)" filter="url(#glow)" style="animation-delay: 0.6s"/>
    
    <!-- Labels -->
    <text x="0" y="100" font-size="22" font-weight="800" fill="#3b82f6" text-anchor="middle" class="metric" style="animation-delay: 0.5s">4 Nodes</text>
    <text x="0" y="125" font-size="18" fill="#6b7280" text-anchor="middle" class="metric" style="animation-delay: 0.7s">6 Connections</text>
    
    <!-- Value indicator -->
    <g class="value-indicator" style="animation-delay: 1.2s">
      <rect x="-50" y="150" width="100" height="40" rx="20" fill="url(#vibrantBlue)" opacity="0.9" filter="url(#glow)"/>
      <text x="0" y="176" font-size="20" fill="white" text-anchor="middle">Value: 6x</text>
    </g>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow" transform="translate(630, 280)" style="animation-delay: 0.5s">
    <path d="M 0 0 L 60 0" stroke="url(#purpleBlue)" stroke-width="4" fill="none" opacity="0.7"/>
    <path d="M 60 0 L 50 -8 L 50 8 Z" fill="url(#purpleBlue)" opacity="0.7"/>
  </g>
  
  <!-- Stage 3: 8 Nodes -->
  <g transform="translate(880, 200)">
    <!-- Background glow -->
    <circle cx="0" cy="0" r="160" fill="url(#glowEffect)" opacity="0.5"/>
    
    <!-- Connection lines (28 connections) - showing key connections -->
    <!-- Center connections -->
    <line class="connection-line" x1="-60" y1="-60" x2="60" y2="-60" style="animation-delay: 0.8s" opacity="0.4"/>
    <line class="connection-line" x1="-60" y1="0" x2="60" y2="0" style="animation-delay: 0.85s" opacity="0.4"/>
    <line class="connection-line" x1="-60" y1="60" x2="60" y2="60" style="animation-delay: 0.9s" opacity="0.4"/>
    <line class="connection-line" x1="-60" y1="-60" x2="-60" y2="60" style="animation-delay: 0.95s" opacity="0.4"/>
    <line class="connection-line" x1="0" y1="-60" x2="0" y2="60" style="animation-delay: 1s" opacity="0.4"/>
    <line class="connection-line" x1="60" y1="-60" x2="60" y2="60" style="animation-delay: 1.05s" opacity="0.4"/>
    
    <!-- Diagonal connections -->
    <line class="connection-line" x1="-60" y1="-60" x2="0" y2="0" style="animation-delay: 1.1s" opacity="0.3"/>
    <line class="connection-line" x1="-60" y1="-60" x2="60" y2="60" style="animation-delay: 1.15s" opacity="0.3"/>
    <line class="connection-line" x1="60" y1="-60" x2="-60" y2="60" style="animation-delay: 1.2s" opacity="0.3"/>
    <line class="connection-line" x1="0" y1="-60" x2="60" y2="0" style="animation-delay: 1.25s" opacity="0.3"/>
    <line class="connection-line" x1="-60" y1="0" x2="0" y2="60" style="animation-delay: 1.3s" opacity="0.3"/>
    <line class="connection-line" x1="0" y1="0" x2="60" y2="60" style="animation-delay: 1.35s" opacity="0.3"/>
    <line class="connection-line" x1="-60" y1="0" x2="60" y2="60" style="animation-delay: 1.4s" opacity="0.3"/>
    <line class="connection-line" x1="0" y1="-60" x2="60" y2="60" style="animation-delay: 1.45s" opacity="0.3"/>
    <line class="connection-line" x1="-60" y1="-60" x2="60" y2="0" style="animation-delay: 1.5s" opacity="0.3"/>
    <line class="connection-line" x1="-60" y1="-60" x2="0" y2="60" style="animation-delay: 1.55s" opacity="0.3"/>
    
    <!-- More connections -->
    <line class="connection-line" x1="-60" y1="0" x2="0" y2="-60" style="animation-delay: 1.6s" opacity="0.25"/>
    <line class="connection-line" x1="60" y1="0" x2="0" y2="60" style="animation-delay: 1.65s" opacity="0.25"/>
    <line class="connection-line" x1="0" y1="0" x2="-60" y2="-60" style="animation-delay: 1.7s" opacity="0.25"/>
    <line class="connection-line" x1="0" y1="0" x2="60" y2="-60" style="animation-delay: 1.75s" opacity="0.25"/>
    <line class="connection-line" x1="0" y1="0" x2="-60" y2="60" style="animation-delay: 1.8s" opacity="0.25"/>
    <line class="connection-line" x1="60" y1="-60" x2="-60" y2="0" style="animation-delay: 1.85s" opacity="0.25"/>
    <line class="connection-line" x1="-60" y1="60" x2="60" y2="0" style="animation-delay: 1.9s" opacity="0.25"/>
    <line class="connection-line" x1="60" y1="-60" x2="0" y2="60" style="animation-delay: 1.95s" opacity="0.25"/>
    
    <!-- Nodes -->
    <circle class="node" cx="-60" cy="-60" r="24" fill="url(#vibrantPurple)" filter="url(#strongGlow)" style="animation-delay: 0.6s"/>
    <circle class="node" cx="0" cy="-60" r="24" fill="url(#vibrantBlue)" filter="url(#strongGlow)" style="animation-delay: 0.65s"/>
    <circle class="node" cx="60" cy="-60" r="24" fill="url(#vibrantPurple)" filter="url(#strongGlow)" style="animation-delay: 0.7s"/>
    <circle class="node" cx="-60" cy="0" r="24" fill="url(#vibrantBlue)" filter="url(#strongGlow)" style="animation-delay: 0.75s"/>
    <circle class="node" cx="0" cy="0" r="24" fill="url(#vibrantPurple)" filter="url(#strongGlow)" style="animation-delay: 0.8s"/>
    <circle class="node" cx="60" cy="0" r="24" fill="url(#vibrantBlue)" filter="url(#strongGlow)" style="animation-delay: 0.85s"/>
    <circle class="node" cx="-60" cy="60" r="24" fill="url(#vibrantPurple)" filter="url(#strongGlow)" style="animation-delay: 0.9s"/>
    <circle class="node" cx="60" cy="60" r="24" fill="url(#vibrantBlue)" filter="url(#strongGlow)" style="animation-delay: 0.95s"/>
    
    <!-- Labels -->
    <text x="0" y="110" font-size="22" font-weight="800" fill="#8b5cf6" text-anchor="middle" class="metric" style="animation-delay: 1s">8 Nodes</text>
    <text x="0" y="135" font-size="18" fill="#6b7280" text-anchor="middle" class="metric" style="animation-delay: 1.2s">28 Connections</text>
    
    <!-- Value indicator -->
    <g class="value-indicator" style="animation-delay: 2s">
      <rect x="-55" y="160" width="110" height="40" rx="20" fill="url(#vibrantPurple)" opacity="0.9" filter="url(#strongGlow)"/>
      <text x="0" y="186" font-size="20" fill="white" text-anchor="middle">Value: 28x</text>
    </g>
  </g>
  
  <!-- Growth Formula -->
  <g transform="translate(600, 480)">
    <rect x="-180" y="0" width="360" height="80" rx="15" fill="url(#purpleBlue)" opacity="0.15" stroke="url(#purpleBlue)" stroke-width="2"/>
    <text x="0" y="30" font-size="20" fill="#8b5cf6" text-anchor="middle" font-weight="700">Network Value Formula</text>
    <text x="0" y="58" font-size="24" fill="url(#purpleBlue)" text-anchor="middle" font-weight="800">n × (n - 1) / 2</text>
  </g>
  
  <!-- Growth indicators -->
  <g transform="translate(150, 450)">
    <circle cx="0" cy="0" r="6" fill="url(#vibrantPurple)" class="node"/>
    <text x="15" y="5" font-size="16" fill="#6b7280">Linear Growth: +1 node</text>
  </g>
  
  <g transform="translate(150, 480)">
    <path d="M -6 0 L 6 0 M 0 -6 L 0 6 M -4 -4 L 4 4 M -4 4 L 4 -4" stroke="url(#vibrantBlue)" stroke-width="2" class="node"/>
    <text x="15" y="5" font-size="16" fill="#6b7280">Exponential Value: +connections²</text>
  </g>
</svg>
