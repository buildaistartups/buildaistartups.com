<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Stage 1: 2 Nodes -->
  <g id="stage1">
    <text x="200" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">2 Nodes</text>
    
    <!-- Connections -->
    <line x1="150" y1="220" x2="250" y2="220" stroke="#3B82F6" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    
    <!-- Nodes -->
    <circle cx="150" cy="220" r="20" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="20" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="20;22;20" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Metrics -->
    <text x="200" y="300" font-family="monospace" font-size="16" fill="#8B5CF6" text-anchor="middle" font-weight="bold">Connections: 1</text>
    <text x="200" y="330" font-family="monospace" font-size="14" fill="#3B82F6" text-anchor="middle">Value: 1×</text>
    <text x="200" y="360" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">n(n-1)/2 = 1</text>
  </g>
  
  <!-- Stage 2: 4 Nodes -->
  <g id="stage2">
    <text x="600" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">4 Nodes</text>
    
    <!-- Connections (6 total) -->
    <line x1="550" y1="170" x2="650" y2="170" stroke="#3B82F6" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="170" x2="550" y2="270" stroke="#3B82F6" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="170" x2="650" y2="270" stroke="#3B82F6" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="170" x2="650" y2="270" stroke="#3B82F6" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="170" x2="550" y2="270" stroke="#3B82F6" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="270" x2="650" y2="270" stroke="#3B82F6" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </line>
    
    <!-- Nodes -->
    <circle cx="550" cy="170" r="20" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="170" r="20" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="20;22;20" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="270" r="20" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="20;22;20" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="270" r="20" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="20;22;20" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Metrics -->
    <text x="600" y="320" font-family="monospace" font-size="16" fill="#8B5CF6" text-anchor="middle" font-weight="bold">Connections: 6</text>
    <text x="600" y="350" font-family="monospace" font-size="14" fill="#3B82F6" text-anchor="middle">Value: 6×</text>
    <text x="600" y="380" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Growth: +500%</text>
  </g>
  
  <!-- Stage 3: 8 Nodes -->
  <g id="stage3">
    <text x="1000" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">8 Nodes</text>
    
    <!-- Calculate positions for 8 nodes in a circle -->
    <!-- Connections (28 total) - drawing all would be too dense, so showing representative ones -->
    <g opacity="0.4">
      <line x1="1000" y1="120" x2="1071" y2="155" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1000" y1="120" x2="1071" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1000" y1="120" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1000" y1="120" x2="929" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1000" y1="120" x2="929" y2="155" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="155" x2="1100" y2="200" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="155" x2="1071" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="155" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1100" y1="200" x2="1071" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1100" y1="200" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="245" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="929" y1="155" x2="900" y2="200" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="929" y1="155" x2="1071" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="900" y1="200" x2="929" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="900" y1="200" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="929" y1="245" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="155" x2="929" y2="155" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1100" y1="200" x2="900" y2="200" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="245" x2="929" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1000" y1="120" x2="1100" y2="200" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1000" y1="120" x2="900" y2="200" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="929" y1="155" x2="1071" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1071" y1="155" x2="929" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="900" y1="200" x2="1071" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1100" y1="200" x2="929" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="929" y1="155" x2="1000" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="1100" y1="200" x2="929" y2="155" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="900" y1="200" x2="1071" y2="155" stroke="#3B82F6" stroke-width="1.5"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </g>
    
    <!-- Nodes in circular arrangement -->
    <circle cx="1000" cy="120" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1071" cy="155" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="200" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1071" cy="245" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="280" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="929" cy="245" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="200" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="929" cy="155" r="18" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="r" values="18;20;18" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Metrics -->
    <text x="1000" y="330" font-family="monospace" font-size="16" fill="#8B5CF6" text-anchor="middle" font-weight="bold">Connections: 28</text>
    <text x="1000" y="360" font-family="monospace" font-size="14" fill="#3B82F6" text-anchor="middle">Value: 28×</text>
    <text x="1000" y="390" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Growth: +2700%</text>
  </g>
  
  <!-- Growth Arrows -->
  <g opacity="0.7">
    <path d="M 280 220 L 520 220" stroke="#8B5CF6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 680 220 L 870 220" stroke="#8B5CF6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="18" fill="#8B5CF6" text-anchor="middle" font-weight="bold">
    Network Effects: Exponential Value Growth
  </text>
  <text x="600" y="485" font-family="monospace" font-size="12" fill="#666" text-anchor="middle">
    Metcalfe's Law: Network Value ∝ n²
  </text>
</svg>
