    <rect x="743" y="705" width="8" height="25" rx="2" fill="#8B5CF6"/>
    <rect x="756" y="700" width="8" height="30" rx="2" fill="#EC4899"/>
    <text x="810" y="690" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600" font-family="Arial, sans-serif">Total Impressions</text>
    <text x="810" y="715" text-anchor="middle" font-size="24" font-weight="700" fill="#3B82F6" font-family="Arial, sans-serif">24,582</text>
    <text x="810" y="732" text-anchor="middle" font-size="9" font-weight="600" fill="#10B981" font-family="Arial, sans-serif">+12.5% this week</text>
    
