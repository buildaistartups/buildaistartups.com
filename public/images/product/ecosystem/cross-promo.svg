<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="highlightGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Header -->
  <g transform="translate(700, 40)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="url(#purpleBlue)">Cross-Promotion Placements</text>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6" opacity="0.7">Respectful, non-intrusive ad placement strategies</text>
  </g>

  <!-- MOCKUP 1: Mobile App - Footer Banner -->
  <g transform="translate(120, 140)">
    <!-- Mobile device frame -->
    <rect x="0" y="0" width="280" height="520" rx="25" fill="#1a1a2e" stroke="#3b82f6" stroke-width="4"/>
    <rect x="10" y="10" width="260" height="500" rx="20" fill="#0f0f1e"/>
    
    <!-- Status bar -->
    <rect x="20" y="20" width="240" height="20" fill="#1a1a2e"/>
    <circle cx="235" cy="30" r="3" fill="#10b981"/>
    <text x="30" y="35" font-family="sans-serif" font-size="11" fill="#ffffff">9:41</text>
    
    <!-- App header -->
    <rect x="20" y="50" width="240" height="40" fill="#1a1a2e"/>
    <text x="30" y="75" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">My App</text>
    
    <!-- App content -->
    <rect x="30" y="100" width="220" height="280" rx="8" fill="#1a1a2e" opacity="0.3"/>
    <line x1="40" y1="115" x2="180" y2="115" stroke="#4a5568" stroke-width="3"/>
    <line x1="40" y1="135" x2="160" y2="135" stroke="#4a5568" stroke-width="2"/>
    <line x1="40" y1="155" x2="200" y2="155" stroke="#4a5568" stroke-width="2"/>
    
    <rect x="40" y="180" width="60" height="60" rx="8" fill="#2d3748"/>
    <rect x="110" y="180" width="60" height="60" rx="8" fill="#2d3748"/>
    <rect x="180" y="180" width="60" height="60" rx="8" fill="#2d3748"/>
    
    <!-- HIGHLIGHTED: Footer promotion banner -->
    <rect x="20" y="400" width="240" height="70" rx="10" fill="url(#highlightGlow)" stroke="url(#purpleBlue)" stroke-width="3"/>
    <rect x="25" y="405" width="230" height="60" rx="8" fill="#1a1a2e"/>
    
    <!-- Promotion content -->
    <circle cx="50" cy="435" r="15" fill="#8b5cf6" opacity="0.3"/>
    <text x="75" y="430" font-family="sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">Try Sister App</text>
    <text x="75" y="445" font-family="sans-serif" font-size="10" fill="#8b5cf6" opacity="0.7">Boost your productivity</text>
    
    <!-- CTA button -->
    <rect x="180" y="420" width="60" height="25" rx="12" fill="url(#purpleBlue)" opacity="0.8"/>
    <text x="210" y="437" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff">Install</text>
    
    <!-- Close button -->
    <circle cx="245" cy="410" r="8" fill="#4a5568"/>
    <line x1="242" y1="407" x2="248" y2="413" stroke="#ffffff" stroke-width="2"/>
    <line x1="248" y1="407" x2="242" y2="413" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Bottom safe area -->
    <rect x="20" y="480" width="240" height="20" fill="#0f0f1e"/>
    
    <!-- Label -->
    <text x="140" y="555" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#3b82f6">Footer Banner</text>
    
    <!-- Annotation arrow -->
    <path d="M 280 435 L 320 435" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="330" y="430" font-family="sans-serif" font-size="12" fill="#8b5cf6">Non-intrusive</text>
    <text x="330" y="445" font-family="sans-serif" font-size="12" fill="#8b5cf6">placement</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- MOCKUP 2: Desktop App - Sidebar -->
  <g transform="translate(520, 140)">
    <!-- Desktop window frame -->
    <rect x="0" y="0" width="420" height="520" rx="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="4"/>
    
    <!-- Title bar -->
    <rect x="5" y="5" width="410" height="30" rx="8" fill="#0f0f1e"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444"/>
    <circle cx="35" cy="20" r="5" fill="#f59e0b"/>
    <circle cx="50" cy="20" r="5" fill="#10b981"/>
    <text x="210" y="25" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">Dashboard App</text>
    
    <!-- Main content area -->
    <rect x="10" y="40" width="400" height="470" rx="8" fill="#0f0f1e"/>
    
    <!-- Sidebar -->
    <rect x="15" y="45" width="100" height="460" fill="#1a1a2e"/>
    <rect x="20" y="55" width="90" height="35" rx="6" fill="#8b5cf6" opacity="0.2"/>
    <text x="25" y="77" font-family="sans-serif" font-size="12" fill="#ffffff">Home</text>
    
    <rect x="20" y="100" width="90" height="35" rx="6" fill="#2d3748"/>
    <text x="25" y="122" font-family="sans-serif" font-size="12" fill="#a0aec0">Projects</text>
    
    <rect x="20" y="145" width="90" height="35" rx="6" fill="#2d3748"/>
    <text x="25" y="167" font-family="sans-serif" font-size="12" fill="#a0aec0">Team</text>
    
    <!-- HIGHLIGHTED: Sidebar promotion -->
    <rect x="15" y="320" width="100" height="180" rx="8" fill="url(#highlightGlow)" stroke="url(#purpleBlue)" stroke-width="3"/>
    <rect x="20" y="325" width="90" height="170" rx="6" fill="#1a1a2e"/>
    
    <!-- Promotion content -->
    <rect x="30" y="335" width="70" height="50" rx="6" fill="#8b5cf6" opacity="0.2"/>
    <circle cx="65" cy="360" r="12" fill="#8b5cf6"/>
    <text x="65" y="366" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">+</text>
    
    <text x="35" y="405" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">New App</text>
    <text x="35" y="420" font-family="sans-serif" font-size="9" fill="#8b5cf6" opacity="0.7">Design tools</text>
    <text x="35" y="433" font-family="sans-serif" font-size="9" fill="#8b5cf6" opacity="0.7">for teams</text>
    
    <rect x="30" y="445" width="70" height="25" rx="12" fill="url(#purpleBlue)" opacity="0.8"/>
    <text x="65" y="461" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ffffff">Try Now</text>
    
    <!-- Main content -->
    <rect x="125" y="55" width="270" height="440" fill="#1a1a2e" opacity="0.3"/>
    <line x1="135" y1="70" x2="270" y2="70" stroke="#4a5568" stroke-width="4"/>
    <line x1="135" y1="95" x2="320" y2="95" stroke="#4a5568" stroke-width="2"/>
    <line x1="135" y1="115" x2="300" y2="115" stroke="#4a5568" stroke-width="2"/>
    
    <rect x="135" y="140" width="250" height="80" rx="8" fill="#2d3748"/>
    <rect x="135" y="230" width="250" height="80" rx="8" fill="#2d3748"/>
    
    <!-- Label -->
    <text x="210" y="555" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#8b5cf6">Sidebar Widget</text>
    
    <!-- Annotation -->
    <path d="M 115 410 L 80 410" stroke="#8b5cf6" stroke-width="2"/>
    <text x="10" y="405" font-family="sans-serif" font-size="12" fill="#8b5cf6">Always</text>
    <text x="10" y="420" font-family="sans-serif" font-size="12" fill="#8b5cf6">visible</text>
  </g>

  <!-- MOCKUP 3: Onboarding Modal -->
  <g transform="translate(1000, 140)">
    <!-- Mobile device frame -->
    <rect x="0" y="0" width="280" height="520" rx="25" fill="#1a1a2e" stroke="#3b82f6" stroke-width="4"/>
    <rect x="10" y="10" width="260" height="500" rx="20" fill="#0f0f1e"/>
    
    <!-- Status bar -->
    <rect x="20" y="20" width="240" height="20" fill="#1a1a2e"/>
    <circle cx="235" cy="30" r="3" fill="#10b981"/>
    <text x="30" y="35" font-family="sans-serif" font-size="11" fill="#ffffff">9:41</text>
    
    <!-- App content (dimmed) -->
    <rect x="20" y="50" width="240" height="450" fill="#0f0f1e" opacity="0.3"/>
    
    <!-- HIGHLIGHTED: Onboarding modal -->
    <rect x="30" y="120" width="220" height="340" rx="15" fill="url(#highlightGlow)" stroke="url(#purpleBlue)" stroke-width="3"/>
    <rect x="35" y="125" width="210" height="330" rx="12" fill="#1a1a2e"/>
    
    <!-- Modal content -->
    <text x="140" y="155" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Welcome!</text>
    
    <circle cx="140" cy="210" r="35" fill="#8b5cf6" opacity="0.2"/>
    <text x="140" y="220" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#8b5cf6">✨</text>
    
    <text x="140" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">Complete your setup</text>
    <text x="140" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a0aec0">3 quick steps</text>
    
    <!-- Promotion section -->
    <rect x="50" y="315" width="180" height="70" rx="8" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="140" y="337" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">💡 Also try our other apps</text>
    <text x="140" y="355" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b5cf6" opacity="0.7">Calendar | Notes | Tasks</text>
    <rect x="70" y="363" width="140" height="18" rx="9" fill="url(#purpleBlue)" opacity="0.3"/>
    <text x="140" y="376" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b5cf6">Learn more</text>
    
    <!-- Primary CTA -->
    <rect x="50" y="405" width="180" height="35" rx="18" fill="url(#purpleBlue)"/>
    <text x="140" y="428" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#ffffff">Get Started</text>
    
    <!-- Close button -->
    <circle cx="235" cy="135" r="10" fill="#4a5568"/>
    <line x1="231" y1="131" x2="239" y2="139" stroke="#ffffff" stroke-width="2"/>
    <line x1="239" y1="131" x2="231" y2="139" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Label -->
    <text x="140" y="555" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#3b82f6">Onboarding</text>
    
    <!-- Annotation -->
    <text x="140" y="590" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8b5cf6">First-time users</text>
  </g>

  <!-- Control Panel Section -->
  <g transform="translate(100, 680)">
    <text x="0" y="0" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#purpleBlue)">Control Panel</text>
    
    <!-- Toggle switch -->
    <g transform="translate(0, 20)">
      <text x="0" y="15" font-family="sans-serif" font-size="13" fill="#8b5cf6">Enable Promotions</text>
      <rect x="150" y="5" width="50" height="24" rx="12" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="182" cy="17" r="10" fill="#3b82f6"/>
    </g>
    
    <!-- Impression counter -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="220" height="40" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
      <text x="15" y="25" font-family="sans-serif" font-size="13" fill="#8b5cf6">Impressions Today</text>
      <text x="180" y="25" text-anchor="end" font-family="sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">2,847</text>
    </g>
  </g>

  <!-- Approval Controls -->
  <g transform="translate(400, 680)">
    <text x="0" y="0" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#purpleBlue)">Approval Status</text>
    
    <!-- Checkmark items -->
    <g transform="translate(0, 25)">
      <circle cx="10" cy="10" r="10" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
      <path d="M 6 10 L 9 13 L 15 7" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      <text x="30" y="15" font-family="sans-serif" font-size="13" fill="#10b981">Banner approved</text>
    </g>
    
    <g transform="translate(0, 50)">
      <circle cx="10" cy="10" r="10" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
      <path d="M 6 10 L 9 13 L 15 7" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      <text x="30" y="15" font-family="sans-serif" font-size="13" fill="#10b981">Placement verified</text>
    </g>
    
    <g transform="translate(0, 75)">
      <circle cx="10" cy="10" r="10" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
      <text x="10" y="15" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">!</text>
      <text x="30" y="15" font-family="sans-serif" font-size="13" fill="#f59e0b">Pending review</text>
    </g>
  </g>

  <!-- Settings -->
  <g transform="translate(700, 680)">
    <text x="0" y="0" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#purpleBlue)">Frequency Settings</text>
    
    <!-- Slider representation -->
    <g transform="translate(0, 25)">
      <text x="0" y="15" font-family="sans-serif" font-size="13" fill="#8b5cf6">Show every</text>
      <rect x="80" y="5" width="150" height="6" rx="3" fill="#2d3748"/>
      <rect x="80" y="5" width="90" height="6" rx="3" fill="url(#purpleBlue)"/>
      <circle cx="170" cy="8" r="8" fill="#3b82f6" stroke="#ffffff" stroke-width="2"/>
      <text x="240" y="15" font-family="sans-serif" font-size="13" font-weight="600" fill="#3b82f6">5 sessions</text>
    </g>
    
    <!-- Duration -->
    <g transform="translate(0, 55)">
      <text x="0" y="15" font-family="sans-serif" font-size="13" fill="#8b5cf6">Display time</text>
      <rect x="100" y="2" width="80" height="28" rx="6" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
      <text x="140" y="21" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">5 sec</text>
    </g>
  </g>

  <!-- Performance Stats -->
  <g transform="translate(1050, 680)">
    <text x="0" y="0" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#purpleBlue)">Performance</text>
    
    <!-- CTR -->
    <g transform="translate(0, 25)">
      <text x="0" y="15" font-family="sans-serif" font-size="12" fill="#8b5cf6">Click-through Rate</text>
      <text x="140" y="15" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">3.2%</text>
      <text x="185" y="15" font-family="sans-serif" font-size="11" fill="#10b981">↑ 0.8%</text>
    </g>
    
    <!-- Conversions -->
    <g transform="translate(0, 50)">
      <text x="0" y="15" font-family="sans-serif" font-size="12" fill="#8b5cf6">Conversions</text>
      <text x="140" y="15" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">91</text>
      <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#10b981">↑ 12</text>
    </g>
    
    <!-- Revenue -->
    <g transform="translate(0, 75)">
      <text x="0" y="15" font-family="sans-serif" font-size="12" fill="#8b5cf6">Revenue Share</text>
      <text x="140" y="15" font-family="sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">$247</text>
    </g>
  </g>
</svg>
