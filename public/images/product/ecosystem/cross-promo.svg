<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes glow {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.4; }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    @keyframes borderGlow {
      0%, 100% { stroke-width: 2px; }
      50% { stroke-width: 4px; }
    }
    
    .glow-box {
      animation: glow 2s ease-in-out infinite;
    }
    
    .pulse-dot {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .border-pulse {
      animation: borderGlow 2s ease-in-out infinite;
    }
  </style>
  
  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="url(#titleGrad)" text-anchor="middle">
    Cross-Promotion Placement Strategy
  </text>
  
  <!-- Mobile App Mock-up (Left) -->
  <g transform="translate(80, 80)">
    <!-- Phone Frame -->
    <rect x="0" y="0" width="280" height="520" rx="30" fill="#FEFEFE" stroke="#D1D5DB" stroke-width="2" filter="url(#shadow)"/>
    <rect x="10" y="40" width="260" height="470" rx="15" fill="white"/>
    
    <!-- Status Bar -->
    <rect x="10" y="40" width="260" height="30" rx="15" fill="#F8FAFC"/>
    <circle cx="30" cy="55" r="3" fill="#10B981" class="pulse-dot"/>
    <rect x="215" y="50" width="35" height="10" rx="3" fill="url(#greenGrad)"/>
    
    <!-- App Header -->
    <rect x="20" y="80" width="240" height="50" rx="8" fill="url(#purpleGrad)" opacity="0.1"/>
    <circle cx="45" cy="105" r="12" fill="url(#purpleGrad)"/>
    <text x="65" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Mobile App</text>
    
    <!-- Content Area -->
    <rect x="20" y="140" width="240" height="60" rx="6" fill="#DBEAFE" opacity="0.5"/>
    <rect x="30" y="150" width="40" height="40" rx="6" fill="url(#blueGrad)"/>
    <rect x="80" y="155" width="150" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="80" y="172" width="120" height="6" rx="3" fill="#E2E8F0"/>
    
    <rect x="20" y="210" width="240" height="60" rx="6" fill="#FEF3C7" opacity="0.5"/>
    <rect x="30" y="220" width="40" height="40" rx="6" fill="url(#orangeGrad)"/>
    <rect x="80" y="225" width="150" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="80" y="242" width="100" height="6" rx="3" fill="#E2E8F0"/>
    
    <rect x="20" y="280" width="240" height="60" rx="6" fill="#FCE7F3" opacity="0.5"/>
    <rect x="30" y="290" width="40" height="40" rx="6" fill="url(#pinkGrad)"/>
    <rect x="80" y="295" width="150" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="80" y="312" width="130" height="6" rx="3" fill="#E2E8F0"/>
    
    <!-- Footer Banner (Highlighted) -->
    <rect x="15" y="430" width="250" height="70" rx="10" fill="url(#purpleGrad)" opacity="0.2" stroke="#8B5CF6" stroke-width="3" stroke-dasharray="5,5" class="glow-box"/>
    <rect x="20" y="438" width="240" height="54" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" class="border-pulse"/>
    <circle cx="50" cy="465" r="15" fill="url(#purpleGrad)"/>
    <text x="52" y="470" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">🎯</text>
    <text x="75" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#4C1D95">Partner App</text>
    <text x="75" y="476" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Try our new feature</text>
    <rect x="215" y="456" width="35" height="18" rx="4" fill="url(#purpleGrad)"/>
    <text x="232.5" y="468" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">Try</text>
    
    <!-- Label -->
    <text x="140" y="525" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8B5CF6" text-anchor="middle">FOOTER PLACEMENT</text>
    
    <!-- Control Panel -->
    <rect x="0" y="550" width="280" height="80" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="575" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Controls</text>
    
    <!-- Toggle -->
    <rect x="20" y="590" width="36" height="20" rx="10" fill="url(#purpleGrad)"/>
    <circle cx="46" cy="600" r="8" fill="white"/>
    <text x="65" y="603" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="600">Active</text>
    
    <!-- Impressions -->
    <rect x="115" y="590" width="50" height="20" rx="6" fill="#F3F4F6"/>
    <text x="140" y="603" font-family="Arial, sans-serif" font-size="10" fill="#6366F1" font-weight="600" text-anchor="middle">2,547</text>
    
    <!-- Approval -->
    <circle cx="240" cy="600" r="10" fill="url(#greenGrad)"/>
    <path d="M236 600 L239 603 L244 596" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Desktop App Mock-up (Center) -->
  <g transform="translate(420, 80)">
    <!-- Desktop Frame -->
    <rect x="0" y="0" width="360" height="520" rx="8" fill="#FEFEFE" stroke="#D1D5DB" stroke-width="2" filter="url(#shadow)"/>
    <rect x="10" y="35" width="340" height="475" rx="4" fill="white"/>
    
    <!-- Browser Bar -->
    <rect x="10" y="35" width="340" height="30" rx="4" fill="#F8FAFC"/>
    <circle cx="25" cy="50" r="4" fill="#EF4444" class="pulse-dot"/>
    <circle cx="38" cy="50" r="4" fill="#F59E0B" class="pulse-dot"/>
    <circle cx="51" cy="50" r="4" fill="#10B981" class="pulse-dot"/>
    <rect x="70" y="45" width="200" height="10" rx="5" fill="#E5E7EB"/>
    
    <!-- Sidebar (Highlighted) -->
    <rect x="10" y="70" width="90" height="440" fill="url(#blueGrad)" opacity="0.2" stroke="#3B82F6" stroke-width="3" stroke-dasharray="5,5" class="glow-box"/>
    <rect x="15" y="75" width="80" height="430" rx="6" fill="#F8FAFC"/>
    
    <rect x="20" y="85" width="70" height="35" rx="6" fill="url(#blueGrad)" opacity="0.2"/>
    <text x="55" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1E40AF" text-anchor="middle">🏠 Home</text>
    
    <rect x="20" y="130" width="70" height="35" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="55" y="150" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">📊 Stats</text>
    
    <rect x="20" y="175" width="70" height="35" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="55" y="195" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">⚙️ Settings</text>
    
    <!-- Promo in Sidebar -->
    <rect x="18" y="370" width="74" height="125" rx="8" fill="white" stroke="#3B82F6" stroke-width="2" class="border-pulse"/>
    <rect x="23" y="380" width="64" height="50" rx="6" fill="url(#blueGrad)" opacity="0.1"/>
    <circle cx="55" cy="400" r="20" fill="url(#blueGrad)"/>
    <text x="55" y="407" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">⭐</text>
    <text x="55" y="430" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1E40AF" text-anchor="middle">Upgrade to</text>
    <text x="55" y="442" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1E40AF" text-anchor="middle">Premium</text>
    <rect x="28" y="460" width="54" height="22" rx="4" fill="url(#blueGrad)"/>
    <text x="55" y="474" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">Learn More</text>
    
    <!-- Main Content -->
    <rect x="110" y="75" width="230" height="435" rx="6" fill="white"/>
    <rect x="120" y="85" width="210" height="40" rx="6" fill="url(#purpleGrad)" opacity="0.1"/>
    <text x="130" y="108" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#374151">Dashboard Overview</text>
    
    <rect x="120" y="135" width="100" height="70" rx="6" fill="#DBEAFE"/>
    <circle cx="145" cy="160" r="12" fill="url(#blueGrad)"/>
    <text x="145" y="165" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">📈</text>
    <text x="170" y="163" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1E40AF">Stats</text>
    
    <rect x="230" y="135" width="100" height="70" rx="6" fill="#FEF3C7"/>
    <circle cx="255" cy="160" r="12" fill="url(#orangeGrad)"/>
    <text x="255" y="165" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🎯</text>
    <text x="280" y="163" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#92400E">Goals</text>
    
    <rect x="120" y="215" width="210" height="70" rx="6" fill="#F0FDF4"/>
    <rect x="130" y="225" width="50" height="50" rx="6" fill="url(#greenGrad)"/>
    <rect x="190" y="230" width="120" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="190" y="248" width="90" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="190" y="263" width="100" height="6" rx="3" fill="#E2E8F0"/>
    
    <rect x="120" y="295" width="210" height="70" rx="6" fill="#FCE7F3"/>
    <rect x="130" y="305" width="50" height="50" rx="6" fill="url(#pinkGrad)"/>
    <rect x="190" y="310" width="120" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="190" y="328" width="100" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="190" y="343" width="110" height="6" rx="3" fill="#E2E8F0"/>
    
    <!-- Label -->
    <text x="180" y="525" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">SIDEBAR PLACEMENT</text>
    
    <!-- Control Panel -->
    <rect x="0" y="550" width="360" height="80" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
    <text x="180" y="575" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Controls</text>
    
    <!-- Toggle -->
    <rect x="40" y="590" width="36" height="20" rx="10" fill="url(#blueGrad)"/>
    <circle cx="66" cy="600" r="8" fill="white"/>
    <text x="85" y="603" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="600">Active</text>
    
    <!-- Impressions -->
    <rect x="155" y="590" width="50" height="20" rx="6" fill="#F3F4F6"/>
    <text x="180" y="603" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" font-weight="600" text-anchor="middle">4,892</text>
    
    <!-- Approval -->
    <circle cx="300" cy="600" r="10" fill="url(#greenGrad)"/>
    <path d="M296 600 L299 603 L304 596" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Onboarding Screen (Right) -->
  <g transform="translate(840, 80)">
    <!-- Phone Frame -->
    <rect x="0" y="0" width="280" height="520" rx="30" fill="#FEFEFE" stroke="#D1D5DB" stroke-width="2" filter="url(#shadow)"/>
    <rect x="10" y="40" width="260" height="470" rx="15" fill="white"/>
    
    <!-- Status Bar -->
    <rect x="10" y="40" width="260" height="30" rx="15" fill="#F8FAFC"/>
    
    <!-- Onboarding Content (Highlighted) -->
    <rect x="15" y="85" width="250" height="410" rx="10" fill="url(#purpleGrad)" opacity="0.2" stroke="#8B5CF6" stroke-width="3" stroke-dasharray="5,5" class="glow-box"/>
    
    <circle cx="140" cy="160" r="40" fill="url(#purpleGrad)" opacity="0.2"/>
    <text x="140" y="170" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">👋</text>
    
    <text x="140" y="230" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#374151" text-anchor="middle">Welcome!</text>
    <text x="140" y="255" font-family="Arial, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Discover our partner apps</text>
    
    <!-- Partner Card 1 -->
    <rect x="30" y="280" width="220" height="60" rx="10" fill="white" stroke="#8B5CF6" stroke-width="2" class="border-pulse"/>
    <rect x="35" y="285" width="210" height="50" rx="8" fill="url(#purpleGrad)" opacity="0.05"/>
    <circle cx="60" cy="310" r="18" fill="url(#purpleGrad)"/>
    <text x="60" y="316" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">📊</text>
    <text x="85" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#4C1D95">Analytics Pro</text>
    <text x="85" y="320" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Track your metrics</text>
    <rect x="200" y="302" width="35" height="16" rx="4" fill="url(#purpleGrad)"/>
    <text x="217.5" y="313" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="white" text-anchor="middle">Try</text>
    
    <!-- Partner Card 2 -->
    <rect x="30" y="355" width="220" height="60" rx="10" fill="white" stroke="#3B82F6" stroke-width="2" class="border-pulse"/>
    <rect x="35" y="360" width="210" height="50" rx="8" fill="url(#blueGrad)" opacity="0.05"/>
    <circle cx="60" cy="385" r="18" fill="url(#blueGrad)"/>
    <text x="60" y="391" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">☁️</text>
    <text x="85" y="380" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1E40AF">Cloud Sync</text>
    <text x="85" y="395" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Sync everywhere</text>
    <rect x="200" y="377" width="35" height="16" rx="4" fill="url(#blueGrad)"/>
    <text x="217.5" y="388" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="white" text-anchor="middle">Try</text>
    
    <!-- Skip/Continue -->
    <text x="70" y="470" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF" font-weight="500">Skip</text>
    <rect x="160" y="450" width="80" height="35" rx="8" fill="url(#purpleGrad)"/>
    <text x="200" y="472" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Continue</text>
    
    <!-- Label -->
    <text x="140" y="525" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8B5CF6" text-anchor="middle">ONBOARDING</text>
    
