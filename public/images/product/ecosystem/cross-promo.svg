<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <!-- Purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Highlight glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937" text-anchor="middle">Cross-Promotion Placement Strategy</text>
  
  <!-- Mobile App Mockup 1 - Onboarding Placement -->
  <g id="mobileApp1">
    <!-- Phone frame -->
    <rect x="50" y="80" width="280" height="560" rx="25" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="3"/>
    <rect x="65" y="95" width="250" height="530" rx="15" fill="#FFFFFF"/>
    
    <!-- Status bar -->
    <rect x="65" y="95" width="250" height="25" rx="15" fill="#F3F4F6"/>
    <circle cx="285" cy="107" r="3" fill="#10B981"/>
    <rect x="255" y="104" width="20" height="6" rx="2" fill="#6B7280"/>
    
    <!-- App header -->
    <text x="190" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1F2937" text-anchor="middle">Welcome!</text>
    
    <!-- Onboarding content -->
    <circle cx="190" cy="220" r="40" fill="#E0E7FF" stroke="#8B5CF6" stroke-width="2"/>
    <path d="M 190 200 L 190 240 M 170 220 L 210 220" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
    
    <text x="190" y="290" font-family="Arial, sans-serif" font-size="14" fill="#4B5563" text-anchor="middle">Get Started with</text>
    <text x="190" y="310" font-family="Arial, sans-serif" font-size="14" fill="#4B5563" text-anchor="middle">Amazing Features</text>
    
    <!-- Dots indicator -->
    <circle cx="170" cy="340" r="4" fill="#D1D5DB"/>
    <circle cx="190" cy="340" r="4" fill="#8B5CF6"/>
    <circle cx="210" cy="340" r="4" fill="#D1D5DB"/>
    
    <!-- Onboarding Promo Banner - HIGHLIGHTED -->
    <rect x="75" y="370" width="230" height="80" rx="10" fill="url(#purpleGrad)" opacity="0.1" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5"/>
    <rect x="80" y="375" width="220" height="70" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
    
    <!-- Promo content -->
    <rect x="90" y="385" width="40" height="40" rx="5" fill="#DDD6FE"/>
    <text x="110" y="410" font-family="Arial, sans-serif" font-size="20" fill="#8B5CF6" text-anchor="middle">📱</text>
    
    <text x="140" y="395" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937">Try Our New App</text>
    <text x="140" y="410" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Boost productivity 2x</text>
    <rect x="140" y="418" width="50" height="18" rx="4" fill="#8B5CF6"/>
    <text x="165" y="430" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">Learn More</text>
    
    <!-- Close button -->
    <circle cx="285" cy="390" r="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <path d="M 282 387 L 288 393 M 288 387 L 282 393" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Continue button -->
    <rect x="90" y="480" width="200" height="45" rx="10" fill="#3B82F6"/>
    <text x="190" y="507" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Continue</text>
    
    <!-- Label -->
    <rect x="95" y="555" width="190" height="25" rx="5" fill="#8B5CF6"/>
    <text x="190" y="572" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ONBOARDING PLACEMENT</text>
  </g>
  
  <!-- Desktop App Mockup - Sidebar Placement -->
  <g id="desktopApp">
    <!-- Window frame -->
    <rect x="380" y="80" width="450" height="400" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="3"/>
    
    <!-- Title bar -->
    <rect x="380" y="80" width="450" height="35" rx="8" fill="#E5E7EB"/>
    <circle cx="398" cy="97.5" r="5" fill="#EF4444"/>
    <circle cx="413" cy="97.5" r="5" fill="#F59E0B"/>
    <circle cx="428" cy="97.5" r="5" fill="#10B981"/>
    <text x="605" y="103" font-family="Arial, sans-serif" font-size="12" fill="#4B5563" text-anchor="middle">Dashboard - Analytics Pro</text>
    
    <!-- Main content area -->
    <rect x="390" y="125" width="430" height="345" rx="5" fill="#FFFFFF"/>
    
    <!-- Sidebar -->
    <rect x="390" y="125" width="90" height="345" fill="#F3F4F6"/>
    
    <!-- Sidebar items -->
    <rect x="398" y="140" width="74" height="30" rx="5" fill="#3B82F6"/>
    <text x="435" y="160" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Home</text>
    
    <rect x="398" y="180" width="74" height="30" rx="5" fill="transparent"/>
    <text x="435" y="200" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Analytics</text>
    
    <rect x="398" y="220" width="74" height="30" rx="5" fill="transparent"/>
    <text x="435" y="240" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Reports</text>
    
    <rect x="398" y="260" width="74" height="30" rx="5" fill="transparent"/>
    <text x="435" y="280" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Settings</text>
    
    <!-- Sidebar Promo Banner - HIGHLIGHTED -->
    <rect x="393" y="380" width="82" height="80" rx="8" fill="url(#blueGrad)" opacity="0.1" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5"/>
    <rect x="398" y="385" width="72" height="70" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
    
    <text x="434" y="398" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1F2937" text-anchor="middle">NEW</text>
    <circle cx="434" cy="415" r="12" fill="#DBEAFE"/>
    <text x="434" y="420" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">⚡</text>
    <text x="434" y="435" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" text-anchor="middle" font-weight="bold">Pro Tools</text>
    <text x="434" y="444" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Upgrade</text>
    
    <!-- Main content -->
    <text x="500" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1F2937">Dashboard Overview</text>
    
    <!-- Stats cards -->
    <rect x="500" y="175" width="140" height="70" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="515" y="195" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Total Users</text>
    <text x="515" y="220" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F2937">12,543</text>
    
    <rect x="660" y="175" width="140" height="70" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="675" y="195" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Revenue</text>
    <text x="675" y="220" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1F2937">$45.2K</text>
    
    <!-- Chart placeholder -->
    <rect x="500" y="265" width="300" height="120" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="650" y="315" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">Analytics Chart</text>
    <path d="M 520 350 L 550 330 L 580 340 L 610 310 L 640 325 L 670 305 L 700 320 L 730 300 L 760 315 L 780 295" stroke="#3B82F6" stroke-width="2" fill="none"/>
    
    <!-- Label -->
    <rect x="398" y="495" width="180" height="25" rx="5" fill="#3B82F6"/>
    <text x="488" y="512" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SIDEBAR PLACEMENT</text>
  </g>
  
  <!-- Mobile App Mockup 2 - Footer Placement -->
  <g id="mobileApp2">
    <!-- Phone frame -->
    <rect x="880" y="80" width="280" height="560" rx="25" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="3"/>
    <rect x="895" y="95" width="250" height="530" rx="15" fill="#FFFFFF"/>
    
    <!-- Status bar -->
    <rect x="895" y="95" width="250" height="25" rx="15" fill="#F3F4F6"/>
    <circle cx="1115" cy="107" r="3" fill="#10B981"/>
    <rect x="1085" y="104" width="20" height="6" rx="2" fill="#6B7280"/>
    
    <!-- App header -->
    <rect x="895" y="130" width="250" height="50" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="1020" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F2937" text-anchor="middle">My Feed</text>
    <circle cx="920" cy="155" r="15" fill="#DBEAFE"/>
    <text x="920" y="161" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">👤</text>
    
    <!-- Content cards -->
    <rect x="905" y="195" width="230" height="80" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="930" cy="220" r="15" fill="#DDD6FE"/>
    <text x="955" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937">John Doe</text>
    <text x="955" y="230" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Just shared a new post...</text>
    <text x="955" y="245" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">2 hours ago</text>
    
    <rect x="905" y="285" width="230" height="80" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="930" cy="310" r="15" fill="#FED7AA"/>
    <text x="955" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937">Jane Smith</text>
    <text x="955" y="320" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Check out this amazing...</text>
    <text x="955" y="335" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">5 hours ago</text>
    
    <rect x="905" y="375" width="230" height="80" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    
    <!-- Footer Promo Banner - HIGHLIGHTED -->
    <rect x="900" y="490" width="240" height="75" rx="10" fill="url(#purpleGrad)" opacity="0.1" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5"/>
    <rect x="905" y="495" width="230" height="65" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
    
    <!-- Promo content -->
    <rect x="915" y="503" width="50" height="50" rx="8" fill="#DDD6FE"/>
    <text x="940" y="533" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">🎯</text>
    
    <text x="975" y="512" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937">Discover Premium</text>
    <text x="975" y="527" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Unlock exclusive features</text>
    <rect x="975" y="535" width="60" height="20" rx="5" fill="#8B5CF6"/>
    <text x="1005" y="549" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">Try Free</text>
    
    <!-- Navigation bar -->
    <rect x="895" y="580" width="250" height="45" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="930" y="608" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">🏠</text>
    <text x="990" y="608" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">🔍</text>
    <text x="1050" y="608" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">➕</text>
    <text x="1110" y="608" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">⚙️</text>
    
    <!-- Label -->
    <rect x="925" y="555" width="190" height="25" rx="5" fill="#8B5CF6"/>
    <text x="1020" y="572" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FOOTER PLACEMENT</text>
  </g>
  
  <!-- Control Panel -->
  <g id="controlPanel">
    <rect x="50" y="670" width="780" height="110" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    
    <text x="70" y="695" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1F2937">Promotion Controls</text>
    
    <!-- Toggle Switch 1 -->
    <text x="70" y="720" font-family="Arial, sans-serif" font-size="11" fill="#4B5563">Enable Cross-Promotion</text>
    <rect x="70" y="730" width="45" height="24" rx="12" fill="#10B981"/>
    <circle cx="103" cy="742" r="9" fill="#FFFFFF"/>
    <text x="125" y="747" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">ON</text>
    
    <!-- Toggle Switch 2 -->
    <text x="220" y="720" font-family="Arial, sans-serif" font-size="11" fill="#4B5563">Respect User Preferences</text>
    <rect x="220" y="730" width="45" height="24" rx="12" fill="#10B981"/>
    <circle cx="253" cy="742" r="9" fill="#FFFFFF"/>
    <text x="275" y="747" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">ON</text>
    
    <!-- Impression Counter -->
    <rect x="400" y="705" width="140" height="55" rx="8" fill="#F0F9FF" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="470" y="722" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Impressions Today</text>
    <text x="470" y="745" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6" text-anchor="middle">8,432</text>
    
    <!-- Click Rate -->
    <rect x="560" y="705" width="120" height="55" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="620" y="722" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Click Rate</text>
    <text x="620" y="745" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#8B5CF6" text-anchor="middle">3.2%</text>
    
    <!-- Approval Checkmarks -->
    <rect x="700" y="705" width="110" height="55" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
    <text x="755" y="722" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Status</text>
    <circle cx="735" cy="740" r="10" fill="#10B981"/>
    <path d="M 731 740 L 734 743 L 739 736" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="775" y="745" font-family="Arial, sans-serif" font-size="11" fill="#10B981" font-weight="bold">Approved</text>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="880" y="670" width="280" height="110" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    
    <text x="900" y="695" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1F2937">Best Practices</text>
    
    <circle cx="905" cy="715" r="4" fill="#8B5CF6"/>
    <text x="920" y="719" font-family="Arial, sans-serif" font-size="10" fill="#4B5563">Non-intrusive placement</text>
    
    <circle cx="905" cy="735" r="4" fill="#3B82F6"/>
    <text x="920" y="739" font-family="Arial, sans-serif" font-size="10" fill="#4B5563">Contextually relevant</text>
    
    <circle cx="905" cy="755" r="4" fill="#10B981"/>
    <text x="920" y="759" font-family="Arial, sans-serif" font-size="10" fill="#4B5563">Easy to dismiss</text>
    
    <rect x="900" y="765" width="12" height="2" fill="#D1D5DB"/>
    <rect x="914" y="765" width="12" height="2" fill="#D1D5DB"/>
    <text x="935" y="769" font-family="Arial, sans-serif" font-size="10" fill="#4B5563">Highlighted areas</text>
  </g>
  
  <!-- Connecting Lines with Labels -->
  <path d="M 190 640 L 190 655" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 605 480 L 605 655" stroke="#3B82F6" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 1020 640 L 1020 655" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
</svg>
