    <rect x="135" y="217" width="100" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="135" y="235" width="150" height="8" rx="4" fill="#E5E7EB"/>
    
    <rect x="80" y="275" width="220" height="60" rx="8" fill="#F9FAFB" stroke="#3B82F6" stroke-width="1"/>
    <rect x="85" y="280" width="40" height="40" rx="6" fill="#3B82F6"/>
