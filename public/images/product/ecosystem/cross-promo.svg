<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="background" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EFF6FF;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="radialGlow">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0" />
    </radialGradient>
    
    <!-- Glow filter for highlights -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animations -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.9; }
      }
      
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      
      @keyframes countUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      .highlight-box {
        animation: pulse 2s ease-in-out infinite;
      }
      
      .counter-number {
        animation: countUp 0.8s ease-out;
      }
      
      .checkmark {
        animation: fadeIn 0.6s ease-out;
      }
      
      text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </defs>
  
  <!-- Animated background circles -->
  <circle cx="100" cy="100" r="80" fill="url(#radialGlow)"/>
  <circle cx="1100" cy="150" r="60" fill="url(#radialGlow)"/>
  <circle cx="200" cy="700" r="70" fill="url(#radialGlow)"/>
  <circle cx="1050" cy="650" r="90" fill="url(#radialGlow)"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="url(#purpleGrad)">
    Cross-Promotion Placement Strategy
  </text>
  
  <!-- Mobile App Mockup -->
  <g id="mobile-mockup">
    <!-- Phone frame -->
    <rect x="50" y="80" width="280" height="580" rx="25" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="3"/>
    <rect x="65" y="105" width="250" height="530" rx="10" fill="#FFFFFF"/>
    
    <!-- Status bar -->
    <rect x="65" y="105" width="250" height="30" rx="10" fill="url(#background)"/>
    <text x="80" y="125" font-size="11" fill="#6B7280" font-weight="600">9:41</text>
    <circle cx="290" cy="120" r="3" fill="url(#greenGrad)"/>
    <circle cx="300" cy="120" r="3" fill="url(#blueGrad)"/>
    
    <!-- App header -->
    <rect x="65" y="140" width="250" height="50" fill="url(#purpleGrad)"/>
    <text x="190" y="170" text-anchor="middle" font-size="16" font-weight="600" fill="white">My App</text>
    
    <!-- Animated icon in header -->
    <circle cx="100" cy="165" r="12" fill="white" opacity="0.3"/>
    <circle cx="280" cy="165" r="12" fill="white" opacity="0.3"/>
    
    <!-- Content area with colorful cards -->
    <rect x="80" y="205" width="220" height="60" rx="8" fill="url(#background)" stroke="#8B5CF6" stroke-width="1"/>
    <rect x="85" y="210" width="40" height="40" rx="6" fill="url(#pinkGrad)"/>
    <rect x="135" y="217" width="100" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="135" y="235" width="150" height="8" rx="4" fill="#E5E7EB"/>
    
    <rect x="80" y="275" width="220" height="60" rx="8" fill="url(#background)" stroke="#3B82F6" stroke-width="1"/>
    <rect x="85" y="280" width="40" height="40" rx="6" fill="url(#blueGrad)"/>
    <rect x="135" y="287" width="100" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="135" y="305" width="150" height="8" rx="4" fill="#E5E7EB"/>
    
    <!-- Onboarding Banner Highlight -->
    <rect x="75" y="350" width="230" height="80" rx="10" fill="url(#purpleGrad)" opacity="0.2" class="highlight-box"/>
    <text x="85" y="370" font-size="10" font-weight="600" fill="#8B5CF6">ONBOARDING PLACEMENT</text>
    <rect x="80" y="375" width="220" height="50" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    
    <!-- Star icon -->
    <polygon points="100,385 103,393 111,393 105,398 107,406 100,401 93,406 95,398 89,393 97,393" fill="url(#orangeGrad)"/>
    
    <text x="115" y="395" font-size="11" font-weight="600" fill="#1F2937">Try Our New Feature!</text>
    <text x="190" y="410" text-anchor="middle" font-size="9" fill="#9CA3AF">Discover premium tools →</text>
    
    <!-- Footer Banner Highlight -->
    <rect x="65" y="555" width="250" height="70" rx="0 0 10 10" fill="url(#blueGrad)" opacity="0.2" class="highlight-box" style="animation-delay: 1s"/>
    <text x="75" y="570" font-size="10" font-weight="600" fill="#3B82F6">FOOTER PLACEMENT</text>
    <rect x="80" y="575" width="220" height="45" rx="8" fill="white" stroke="#3B82F6" stroke-width="2"/>
    
    <!-- Gift icon -->
    <rect x="90" y="585" width="20" height="20" rx="3" fill="url(#pinkGrad)"/>
    
    <text x="120" y="595" font-size="10" font-weight="600" fill="#1F2937">Partner App Available</text>
    <text x="190" y="610" text-anchor="middle" font-size="8" fill="#6B7280">Install now • Free</text>
    
    <!-- Label -->
    <text x="190" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="url(#purpleGrad)">Mobile Interface</text>
  </g>
  
  <!-- Desktop App Mockup -->
  <g id="desktop-mockup">
    <!-- Window frame -->
    <rect x="400" y="80" width="750" height="500" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="3"/>
    
    <!-- Title bar -->
    <rect x="400" y="80" width="750" height="35" rx="8 8 0 0" fill="url(#purpleGrad)"/>
    <circle cx="420" cy="97.5" r="5" fill="#EF4444"/>
    <circle cx="437" cy="97.5" r="5" fill="#F59E0B"/>
    <circle cx="454" cy="97.5" r="5" fill="#10B981"/>
    <text x="775" y="102" text-anchor="middle" font-size="12" fill="white" font-weight="600">My Desktop App</text>
    
    <!-- Main content area -->
    <rect x="410" y="120" width="730" height="450" fill="#FFFFFF"/>
    
    <!-- Sidebar -->
    <rect x="410" y="120" width="180" height="450" fill="url(#background)" stroke="#E5E7EB" stroke-width="1"/>
    
    <!-- Sidebar items with colorful icons -->
    <rect x="420" y="135" width="160" height="35" rx="6" fill="url(#purpleGrad)" opacity="0.2"/>
    <circle cx="435" cy="152.5" r="8" fill="url(#purpleGrad)"/>
    <rect x="450" y="145" width="80" height="6" rx="3" fill="#8B5CF6"/>
    
    <rect x="420" y="180" width="160" height="35" rx="6" fill="white"/>
    <circle cx="435" cy="197.5" r="8" fill="url(#blueGrad)"/>
    <rect x="450" y="190" width="80" height="6" rx="3" fill="#D1D5DB"/>
    
    <rect x="420" y="225" width="160" height="35" rx="6" fill="white"/>
    <circle cx="435" cy="242.5" r="8" fill="url(#pinkGrad)"/>
    <rect x="450" y="235" width="80" height="6" rx="3" fill="#D1D5DB"/>
    
    <!-- Sidebar Promotion Highlight -->
    <rect x="415" y="390" width="170" height="170" rx="8" fill="url(#purpleGrad)" opacity="0.25" class="highlight-box" style="animation-delay: 0.5s"/>
    <text x="425" y="405" font-size="10" font-weight="600" fill="#8B5CF6">SIDEBAR PLACEMENT</text>
    <rect x="420" y="410" width="160" height="145" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="430" y="420" width="140" height="60" rx="6" fill="url(#background)"/>
    
    <!-- Sparkle -->
    <polygon points="500,440 502,446 508,446 503,450 505,456 500,452 495,456 497,450 492,446 498,446" fill="url(#pinkGrad)"/>
    
    <text x="500" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">Partner Tools</text>
    <rect x="435" y="490" width="130" height="28" rx="6" fill="url(#purpleGrad)"/>
    <text x="500" y="508" text-anchor="middle" font-size="10" fill="white" font-weight="600">Learn More</text>
    <text x="500" y="538" text-anchor="middle" font-size="8" fill="#9CA3AF">Sponsored</text>
    
    <!-- Main content with colorful cards -->
    <rect x="610" y="135" width="510" height="80" rx="8" fill="url(#background)" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="635" cy="175" r="25" fill="url(#pinkGrad)"/>
    <rect x="675" y="155" width="200" height="12" rx="6" fill="#E5E7EB"/>
    <rect x="675" y="175" width="150" height="10" rx="5" fill="#D1D5DB"/>
    <!-- Colorful tags -->
    <rect x="900" y="158" width="50" height="18" rx="9" fill="url(#purpleGrad)"/>
    <text x="925" y="170" text-anchor="middle" font-size="9" fill="white" font-weight="600">New</text>
    <rect x="960" y="158" width="60" height="18" rx="9" fill="url(#orangeGrad)"/>
    <text x="990" y="170" text-anchor="middle" font-size="9" fill="white" font-weight="600">Featured</text>
    <circle cx="1095" cy="167" r="12" fill="url(#greenGrad)"/>
    
    <rect x="610" y="230" width="510" height="80" rx="8" fill="url(#background)" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="635" cy="270" r="25" fill="url(#blueGrad)"/>
    <rect x="675" y="250" width="200" height="12" rx="6" fill="#E5E7EB"/>
    <rect x="675" y="270" width="150" height="10" rx="5" fill="#D1D5DB"/>
    <!-- Progress bar -->
    <rect x="900" y="260" width="180" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="900" y="260" width="120" height="8" rx="4" fill="url(#blueGrad)"/>
    <text x="1090" y="268" font-size="9" fill="#3B82F6" font-weight="600">67%</text>
    <circle cx="1095" cy="262" r="12" fill="url(#pinkGrad)"/>
    
    <rect x="610" y="325" width="510" height="80" rx="8" fill="url(#background)" stroke="#10B981" stroke-width="2"/>
    <circle cx="635" cy="365" r="25" fill="url(#greenGrad)"/>
    <rect x="675" y="345" width="200" height="12" rx="6" fill="#E5E7EB"/>
    <rect x="675" y="365" width="150" height="10" rx="5" fill="#D1D5DB"/>
    <!-- Status badges -->
    <rect x="900" y="353" width="70" height="20" rx="10" fill="url(#greenGrad)"/>
    <text x="935" y="367" text-anchor="middle" font-size="9" fill="white" font-weight="600">Active</text>
    <rect x="980" y="353" width="70" height="20" rx="10" fill="url(#blueGrad)"/>
    <text x="1015" y="367" text-anchor="middle" font-size="9" fill="white" font-weight="600">Live</text>
    <circle cx="1095" cy="363" r="12" fill="url(#orangeGrad)"/>
    
    <!-- Mini chart animation with more colors -->
    <rect x="1070" y="445" width="10" height="25" rx="3" fill="url(#greenGrad)"/>
    <rect x="1085" y="435" width="10" height="35" rx="3" fill="url(#blueGrad)"/>
    <rect x="1100" y="430" width="10" height="40" rx="3" fill="url(#pinkGrad)"/>
    
    <!-- Additional colorful header elements -->
    <rect x="620" y="425" width="80" height="30" rx="8" fill="url(#purpleGrad)"/>
    <text x="660" y="445" text-anchor="middle" font-size="11" fill="white" font-weight="600">View All</text>
    
    <rect x="710" y="425" width="80" height="30" rx="8" fill="white" stroke="url(#pinkGrad)" stroke-width="2"/>
    <text x="750" y="445" text-anchor="middle" font-size="11" fill="#EC4899" font-weight="600">Export</text>
    
    <!-- Label -->
    <text x="775" y="600" text-anchor="middle" font-size="14" font-weight="700" fill="url(#blueGrad)">Desktop Interface</text>
  </g>
  
  <!-- Control Panel -->
  <g id="control-panel">
    <rect x="400" y="630" width="750" height="140" rx="12" fill="white" stroke="url(#purpleGrad)" stroke-width="3"/>
    
    <!-- Decorative corner accents -->
    <circle cx="415" cy="645" r="5" fill="url(#pinkGrad)"/>
    <circle cx="1135" cy="645" r="5" fill="url(#blueGrad)"/>
    <circle cx="415" cy="755" r="5" fill="url(#greenGrad)"/>
    <circle cx="1135" cy="755" r="5" fill="url(#orangeGrad)"/>
    
    <!-- Title with gradient -->
    <text x="420" y="660" font-size="16" font-weight="700" fill="url(#purpleGrad)">Promotion Controls</text>
    
    <!-- Toggle Switches -->
    <g id="toggle1">
      <text x="420" y="695" font-size="12" font-weight="600" fill="#1F2937">Enable Footer Ads</text>
      <rect x="560" y="680" width="50" height="26" rx="13" fill="url(#blueGrad)"/>
      <circle cx="597" cy="693" r="10" fill="white">
        <animate attributeName="cx" from="573" to="597" dur="0.3s" fill="freeze"/>
      </circle>
      <circle cx="625" cy="693" r="8" fill="url(#greenGrad)"/>
      <text x="640" y="695" font-size="11" font-weight="600" fill="#10B981" class="checkmark">✓ Active</text>
    </g>
    
    <g id="toggle2">
      <text x="420" y="730" font-size="12" font-weight="600" fill="#1F2937">Enable Sidebar Ads</text>
      <rect x="560" y="715" width="50" height="26" rx="13" fill="url(#purpleGrad)"/>
      <circle cx="597" cy="728" r="10" fill="white">
        <animate attributeName="cx" from="573" to="597" dur="0.3s" fill="freeze" begin="0.2s"/>
      </circle>
      <circle cx="625" cy="728" r="8" fill="url(#greenGrad)"/>
      <text x="640" y="730" font-size="11" font-weight="600" fill="#10B981" class="checkmark">✓ Active</text>
    </g>
    
    <!-- Impression Counter with animated bars -->
    <g id="counter">
      <rect x="720" y="670" width="180" height="70" rx="8" fill="url(#background)" stroke="url(#blueGrad)" stroke-width="2"/>
      
      <!-- Mini chart bars -->
      <rect x="730" y="710" width="8" height="20" rx="2" fill="url(#blueGrad)"/>
      <rect x="743" y="705" width="8" height="25" rx="2" fill="url(#purpleGrad)"/>
      <rect x="756" y="700" width="8" height="30" rx="2" fill="url(#pinkGrad)"/>
      
      <text x="810" y="690" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600">Total Impressions</text>
      <text x="810" y="715" text-anchor="middle" font-size="24" font-weight="700" fill="url(#blueGrad)" class="counter-number">24,582</text>
      <text x="810" y="732" text-anchor="middle" font-size="9" font-weight="600" fill="#10B981">↑ 12.5% this week</text>
    </g>
    
    <!-- Approval Status with animation -->
    <g id="approval">
      <rect x="930" y="670" width="200" height="70" rx="8" fill="#ECFDF5" stroke="url(#greenGrad)" stroke-width="2"/>
      
      <!-- Animated checkmark circle -->
      <circle cx="960" cy="705" r="15" fill="url(#greenGrad)"/>
      
      <!-- Checkmark -->
      <path d="M 955 705 L 958 708 L 965 700" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Sparkles around approval -->
      <circle cx="945" cy="690" r="2" fill="url(#orangeGrad)"/>
      <circle cx="975" cy="690" r="2" fill="url(#orangeGrad)"/>
      <circle cx="945" cy="720" r="2" fill="url(#pinkGrad)"/>
      <circle cx="975" cy="720" r="2" fill="url(#pinkGrad)"/>
      
      <text x="985" y="700" font-size="11" fill="#065F46" font-weight="700">All Placements</text>
      <text x="985" y="715" font-size="11" fill="#059669" font-weight="600">Approved &amp; Live</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="695" width="310" height="75" rx="10" fill="white" stroke="url(#purpleGrad)" stroke-width="2"/>
    
    <text x="65" y="715" font-size="12" font-weight="700" fill="url(#purpleGrad)">Placement Types:</text>
    
    <rect x="65" y="725" width="18" height="18" rx="3" fill="url(#purpleGrad)"/>
    <text x="90" y="738" font-size="11" font-weight="600" fill="#1F2937">Onboarding / Sidebar</text>
    
    <rect x="65" y="750" width="18" height="18" rx="3" fill="url(#blueGrad)"/>
    <text x="90" y="763" font-size="11" font-weight="600" fill="#1F2937">Footer / Persistent</text>
    
    <!-- Decorative elements -->
    <circle cx="250" cy="735" r="15" fill="url(#pinkGrad)" opacity="0.2"/>
    <circle cx="280" cy="735" r="15" fill="url(#orangeGrad)" opacity="0.2"/>
    <circle cx="310" cy="735" r="15" fill="url(#greenGrad)" opacity="0.2"/>
  </g>
  

</svg>
