    <path d="M 955 705 L 958 708 L 965 700" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="985" y="700" font-size="11" fill="#065F46" font-weight="700" font-family="Arial, sans-serif">All Placements</text>
    <text x="985" y="715" font-size="11" fill="#059669" font-weight="600" font-family="Arial, sans-serif">Approved and Live</text>
