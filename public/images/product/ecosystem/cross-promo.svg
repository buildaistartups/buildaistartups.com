  <text x="90" y="738" font-size="11" font-weight="600" fill="#1F2937" font-family="Arial, sans-serif">Onboarding / Sidebar</text>
  <rect x="65" y="750" width="18" height="18" rx="3" fill="#3B82F6"/>
  <text x="90" y="763" font-size="11" font-weight="600" fill="#1F2937" font-family="Arial, sans-serif">Footer / Persistent</text>
