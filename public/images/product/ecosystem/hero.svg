    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <line x1="240" y1="340" x2="420" y2="580" stroke="url(#purple)" stroke-width="4" opacity="0.5" marker-end="url(#arrow)">
