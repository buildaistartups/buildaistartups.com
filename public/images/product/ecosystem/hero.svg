<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and effects -->
  <defs>
    <!-- Purple to Blue gradient for nodes -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Reverse gradient -->
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient for node glow -->
    <radialGradient id="nodeGlow">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Arrow marker for connections -->
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connection lines with data flow -->
  <!-- Central hub connections -->
  <path d="M 600 400 Q 500 300 350 250" stroke="url(#purpleBlue)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <path d="M 600 400 Q 700 300 850 250" stroke="url(#bluePurple)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <path d="M 600 400 Q 500 500 350 550" stroke="url(#purpleBlue)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <path d="M 600 400 Q 700 500 850 550" stroke="url(#bluePurple)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <path d="M 600 400 L 250 400" stroke="url(#purpleBlue)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <path d="M 600 400 L 950 400" stroke="url(#bluePurple)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowBlue)"/>
  
  <!-- Peripheral connections -->
  <path d="M 350 250 Q 300 330 250 400" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowPurple)" stroke-dasharray="5,5"/>
  <path d="M 850 250 Q 900 330 950 400" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="5,5"/>
  <path d="M 350 550 Q 300 470 250 400" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowPurple)" stroke-dasharray="5,5"/>
  <path d="M 850 550 Q 900 470 950 400" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="5,5"/>
  <path d="M 350 250 Q 600 200 850 250" stroke="url(#purpleBlue)" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="5,5"/>
  <path d="M 350 550 Q 600 600 850 550" stroke="url(#bluePurple)" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowPurple)" stroke-dasharray="5,5"/>
  
  <!-- Growth Metrics floating around connections -->
  <!-- Metric 1 -->
  <g transform="translate(470, 320)">
    <rect x="-35" y="-15" width="70" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">+127%</text>
    <path d="M -20 0 L -15 -5 L -10 0" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Metric 2 -->
  <g transform="translate(730, 320)">
    <rect x="-35" y="-15" width="70" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">+89%</text>
    <path d="M 15 0 L 20 -5 L 25 0" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Metric 3 -->
  <g transform="translate(470, 480)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">2.4K</text>
  </g>
  
  <!-- Metric 4 -->
  <g transform="translate(730, 480)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">1.8K</text>
  </g>
  
  <!-- Metric 5 -->
  <g transform="translate(425, 400)">
    <rect x="-35" y="-15" width="70" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">+54%</text>
  </g>
  
  <!-- Metric 6 -->
  <g transform="translate(775, 400)">
    <rect x="-35" y="-15" width="70" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">+72%</text>
  </g>
  
  <!-- Node 1: Central Hub (largest) -->
  <g transform="translate(600, 400)">
    <circle r="65" fill="url(#nodeGlow)"/>
    <circle r="45" fill="url(#purpleBlue)" filter="url(#glow)"/>
    <circle r="35" fill="white" opacity="0.2"/>
    <!-- Network icon -->
    <circle cx="0" cy="0" r="3" fill="white"/>
    <circle cx="-12" cy="-8" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="12" cy="-8" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="-12" cy="8" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="12" cy="8" r="2.5" fill="white" opacity="0.8"/>
    <line x1="0" y1="0" x2="-12" y2="-8" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="0" x2="12" y2="-8" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="0" x2="-12" y2="8" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="0" x2="12" y2="8" stroke="white" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- Node 2: Top Left - Mobile App -->
  <g transform="translate(350, 250)">
    <circle r="45" fill="url(#nodeGlow)"/>
    <circle r="32" fill="#8b5cf6" filter="url(#glow)"/>
    <circle r="25" fill="white" opacity="0.2"/>
    <!-- Mobile icon -->
    <rect x="-8" y="-12" width="16" height="24" rx="2" fill="white" stroke="white" stroke-width="1.5"/>
    <rect x="-6" y="-10" width="12" height="18" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="0" cy="10" r="1.5" fill="white"/>
  </g>
  
  <!-- Node 3: Top Right - Web Platform -->
  <g transform="translate(850, 250)">
    <circle r="45" fill="url(#nodeGlow)"/>
    <circle r="32" fill="#3b82f6" filter="url(#glow)"/>
    <circle r="25" fill="white" opacity="0.2"/>
    <!-- Browser icon -->
    <rect x="-10" y="-10" width="20" height="16" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="white" stroke-width="1.5"/>
    <circle cx="-6" cy="-7.5" r="1" fill="white"/>
    <circle cx="-2" cy="-7.5" r="1" fill="white"/>
    <circle cx="2" cy="-7.5" r="1" fill="white"/>
  </g>
  
  <!-- Node 4: Bottom Left - Analytics -->
  <g transform="translate(350, 550)">
    <circle r="45" fill="url(#nodeGlow)"/>
    <circle r="32" fill="#8b5cf6" filter="url(#glow)"/>
    <circle r="25" fill="white" opacity="0.2"/>
    <!-- Chart icon -->
    <path d="M -10 8 L -10 2 L -5 -2 L 0 4 L 5 -5 L 10 0 L 10 8 Z" fill="white" opacity="0.9"/>
    <polyline points="-10,2 -5,-2 0,4 5,-5 10,0" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Node 5: Bottom Right - Social -->
  <g transform="translate(850, 550)">
    <circle r="45" fill="url(#nodeGlow)"/>
    <circle r="32" fill="#3b82f6" filter="url(#glow)"/>
    <circle r="25" fill="white" opacity="0.2"/>
    <!-- Share icon -->
    <circle cx="-8" cy="-6" r="3" fill="white"/>
    <circle cx="8" cy="-2" r="3" fill="white"/>
    <circle cx="0" cy="8" r="3" fill="white"/>
    <line x1="-6" y1="-4" x2="6" y2="-3" stroke="white" stroke-width="1.5"/>
    <line x1="-6" y1="-4" x2="-1" y2="6" stroke="white" stroke-width="1.5"/>
    <line x1="6" y1="0" x2="2" y2="6" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Node 6: Left - E-commerce -->
  <g transform="translate(250, 400)">
    <circle r="40" fill="url(#nodeGlow)"/>
    <circle r="28" fill="#8b5cf6" filter="url(#glow)"/>
    <circle r="22" fill="white" opacity="0.2"/>
    <!-- Shopping cart icon -->
    <path d="M -8 -6 L -6 2 L 6 2 L 8 -6 Z" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-10" y1="-6" x2="-8" y2="-6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-3" cy="6" r="1.5" fill="white"/>
    <circle cx="3" cy="6" r="1.5" fill="white"/>
  </g>
  
  <!-- Node 7: Right - Cloud Service -->
  <g transform="translate(950, 400)">
    <circle r="40" fill="url(#nodeGlow)"/>
    <circle r="28" fill="#3b82f6" filter="url(#glow)"/>
    <circle r="22" fill="white" opacity="0.2"/>
    <!-- Cloud icon -->
    <path d="M -6 2 Q -8 -2 -4 -4 Q -2 -7 2 -5 Q 6 -6 8 -2 Q 10 0 8 3 L -6 3 Z" fill="white" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Data flow particles -->
  <g opacity="0.6">
    <circle cx="480" cy="340" r="2" fill="#8b5cf6">
      <animate attributeName="cx" from="600" to="350" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="400" to="250" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="340" r="2" fill="#3b82f6">
      <animate attributeName="cx" from="600" to="850" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="400" to="250" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="460" r="2" fill="#8b5cf6">
      <animate attributeName="cx" from="600" to="350" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="400" to="550" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Additional smaller metric badges -->
  <g transform="translate(300, 320)" opacity="0.8">
    <circle r="18" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">5K</text>
  </g>
  
  <g transform="translate(900, 320)" opacity="0.8">
    <circle r="18" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">3K</text>
  </g>
  
  <g transform="translate(600, 250)" opacity="0.8">
    <rect x="-25" y="-12" width="50" height="24" rx="12" fill="url(#purpleBlue)" opacity="0.15"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">LIVE</text>
  </g>
</svg>
