<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="purpleBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
        </linearGradient>
        
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6" opacity="0.6"/>
        </marker>
    </defs>
    
    <rect width="1200" height="700" fill="transparent"/>
    
    <!-- Connection Lines -->
    <path d="M 200,150 Q 350,100 500,150" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="10 5"/>
    <path d="M 200,150 Q 250,250 300,350" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowhead)"/>
    <path d="M 500,150 Q 650,200 800,250" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="10 5"/>
    <path d="M 500,150 Q 550,300 600,450" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowhead)"/>
    <path d="M 300,350 Q 450,400 600,450" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="10 5"/>
    <path d="M 300,350 Q 350,500 400,550" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowhead)"/>
    <path d="M 800,250 Q 900,300 1000,350" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="10 5"/>
    <path d="M 600,450 Q 800,400 1000,350" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowhead)"/>
    <path d="M 400,550 Q 550,550 700,550" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="10 5"/>
    <path d="M 1000,350 Q 950,450 700,550" stroke="url(#purpleBlueGradient)" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowhead)"/>
    
    <!-- Data Particles -->
    <circle cx="350" cy="125" r="4" fill="#60a5fa" filter="url(#glow)" opacity="0.8"/>
    <circle cx="650" cy="225" r="4" fill="#8b5cf6" filter="url(#glow)" opacity="0.8"/>
    <circle cx="450" cy="400" r="4" fill="#60a5fa" filter="url(#glow)" opacity="0.8"/>
    
    <!-- Node 1: E-commerce -->
    <g transform="translate(200, 150)">
        <circle r="50" fill="url(#purpleGradient)" stroke="#8b5cf6" stroke-width="3" filter="url(#glow)"/>
        <path d="M -15,-10 L -10,-10 L -5,5 L 10,5 M -5,5 L 0,15 M 5,5 L 10,15" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="2" cy="18" r="2" fill="white"/>
        <circle cx="10" cy="18" r="2" fill="white"/>
    </g>
    
    <!-- Node 2: SaaS -->
    <g transform="translate(500, 150)">
        <circle r="50" fill="url(#blueGradient)" stroke="#3b82f6" stroke-width="3" filter="url(#glow)"/>
        <path d="M -15,5 Q -15,-5 -5,-5 Q 0,-10 5,-5 Q 15,-5 15,5 Q 15,10 5,10 L -10,10 Q -15,10 -15,5" fill="white"/>
    </g>
    
    <!-- Node 3: FinTech -->
    <g transform="translate(300, 350)">
        <circle r="50" fill="url(#purpleBlueGradient)" stroke="#8b5cf6" stroke-width="3" filter="url(#glow)"/>
        <text x="0" y="10" font-size="40" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">$</text>
    </g>
    
    <!-- Node 4: Social Media -->
    <g transform="translate(800, 250)">
        <circle r="50" fill="url(#purpleGradient)" stroke="#8b5cf6" stroke-width="3" filter="url(#glow)"/>
        <circle cx="-10" cy="-10" r="5" fill="white"/>
        <circle cx="10" cy="-10" r="5" fill="white"/>
        <circle cx="0" cy="10" r="5" fill="white"/>
        <line x1="-10" y1="-10" x2="10" y2="-10" stroke="white" stroke-width="2"/>
        <line x1="-10" y1="-10" x2="0" y2="10" stroke="white" stroke-width="2"/>
        <line x1="10" y1="-10" x2="0" y2="10" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Node 5: EdTech -->
    <g transform="translate(600, 450)">
        <circle r="50" fill="url(#blueGradient)" stroke="#3b82f6" stroke-width="3" filter="url(#glow)"/>
        <rect x="-12" y="-15" width="24" height="30" fill="none" stroke="white" stroke-width="2" rx="2"/>
        <line x1="-12" y1="-5" x2="12" y2="-5" stroke="white" stroke-width="2"/>
        <line x1="-12" y1="5" x2="12" y2="5" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Node 6: HealthTech -->
    <g transform="translate(400, 550)">
        <circle r="50" fill="url(#purpleBlueGradient)" stroke="#8b5cf6" stroke-width="3" filter="url(#glow)"/>
        <rect x="-5" y="-15" width="10" height="30" fill="white"/>
        <rect x="-15" y="-5" width="30" height="10" fill="white"/>
    </g>
    
    <!-- Node 7: AI/ML -->
    <g transform="translate(1000, 350)">
        <circle r="50" fill="url(#purpleGradient)" stroke="#8b5cf6" stroke-width="3" filter="url(#glow)"/>
        <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="-5" cy="-3" r="2" fill="white"/>
        <circle cx="5" cy="-3" r="2" fill="white"/>
        <circle cx="0" cy="5" r="2" fill="white"/>
        <line x1="-5" y1="-3" x2="0" y2="5" stroke="white" stroke-width="1.5"/>
        <line x1="5" y1="-3" x2="0" y2="5" stroke="white" stroke-width="1.5"/>
    </g>
    
    <!-- Node 8: Gaming -->
    <g transform="translate(700, 550)">
        <circle r="50" fill="url(#blueGradient)" stroke="#3b82f6" stroke-width="3" filter="url(#glow)"/>
        <rect x="-15" y="-8" width="30" height="16" rx="8" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="-8" cy="0" r="3" fill="white"/>
        <circle cx="8" cy="-3" r="2" fill="white"/>
        <circle cx="8" cy="3" r="2" fill="white"/>
    </g>
    
    <!-- Growth Metrics -->
    <g transform="translate(350, 120)">
        <rect x="-35" y="-15" width="70" height="30" rx="5" fill="#1e293b" opacity="0.9"/>
        <text x="0" y="2" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa">+47%</text>
        <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#a78bfa">Growth</text>
    </g>
    
    <g transform="translate(650, 200)">
        <rect x="-35" y="-15" width="70" height="30" rx="5" fill="#1e293b" opacity="0.9"/>
        <text x="0" y="2" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa">2.3M</text>
        <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#a78bfa">Users</text>
    </g>
    
    <g transform="translate(450, 400)">
        <rect x="-35" y="-15" width="70" height="30" rx="5" fill="#1e293b" opacity="0.9"/>
        <text x="0" y="2" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa">$5.2M</text>
        <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#a78bfa">Revenue</text>
    </g>
    
    <g transform="translate(850, 300)">
        <rect x="-35" y="-15" width="70" height="30" rx="5" fill="#1e293b" opacity="0.9"/>
        <text x="0" y="2" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa">+89%</text>
        <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#a78bfa">Engagement</text>
    </g>
    
    <g transform="translate(550, 500)">
        <rect x="-35" y="-15" width="70" height="30" rx="5" fill="#1e293b" opacity="0.9"/>
        <text x="0" y="2" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa">1.8M</text>
        <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#a78bfa">Active</text>
    </g>
    
    <g transform="translate(850, 450)">
        <rect x="-35" y="-15" width="70" height="30" rx="5" fill="#1e293b" opacity="0.9"/>
        <text x="0" y="2" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa">+125%</text>
        <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="10" fill="#a78bfa">ROI</text>
    </g>
</svg>
