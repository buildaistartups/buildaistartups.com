<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
    </linearGradient>
    
    <radialGradient id="nodeGradient1">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="nodeGradient2">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </radialGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="url(#purpleBlue)" opacity="0.6" />
    </marker>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes dash {
        to { stroke-dashoffset: -20; }
      }
      
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.9; }
      }
      
      .connection-line {
        stroke: url(#purpleBlue);
        stroke-width: 2;
        fill: none;
        opacity: 0.4;
        stroke-dasharray: 5, 5;
        animation: dash 20s linear infinite;
      }
      
      .node {
        filter: url(#glow);
        animation: pulse 3s ease-in-out infinite;
      }
      
      .metric {
        animation: float 3s ease-in-out infinite;
      }
      
      .icon {
        animation: fadeInOut 4s ease-in-out infinite;
      }
      
      .growth-indicator {
        animation: float 2.5s ease-in-out infinite;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 600;
      }
    </style>
  </defs>
  
  <!-- Connection lines with arrows -->
  <path class="connection-line" d="M 150 120 Q 250 80 350 120" marker-end="url(#arrowhead)" style="animation-delay: 0s"/>
  <path class="connection-line" d="M 350 120 Q 450 100 550 120" marker-end="url(#arrowhead)" style="animation-delay: 0.5s"/>
  <path class="connection-line" d="M 550 120 Q 650 100 750 120" marker-end="url(#arrowhead)" style="animation-delay: 1s"/>
  <path class="connection-line" d="M 750 120 Q 800 180 850 280" marker-end="url(#arrowhead)" style="animation-delay: 1.5s"/>
  <path class="connection-line" d="M 850 280 Q 800 340 700 300" marker-end="url(#arrowhead)" style="animation-delay: 2s"/>
  <path class="connection-line" d="M 700 300 Q 550 320 400 300" marker-end="url(#arrowhead)" style="animation-delay: 2.5s"/>
  <path class="connection-line" d="M 400 300 Q 250 320 150 280" marker-end="url(#arrowhead)" style="animation-delay: 3s"/>
  <path class="connection-line" d="M 150 280 Q 100 200 150 120" marker-end="url(#arrowhead)" style="animation-delay: 3.5s"/>
  <path class="connection-line" d="M 350 120 Q 350 180 400 300" marker-end="url(#arrowhead)" style="animation-delay: 4s"/>
  <path class="connection-line" d="M 550 120 Q 600 200 700 300" marker-end="url(#arrowhead)" style="animation-delay: 4.5s"/>
  <path class="connection-line" d="M 150 280 Q 300 290 400 300" marker-end="url(#arrowhead)" style="animation-delay: 5s"/>
  <path class="connection-line" d="M 500 200 Q 550 160 550 120" marker-end="url(#arrowhead)" style="animation-delay: 5.5s"/>
  
  <!-- Node 1: E-commerce -->
  <g class="node" style="animation-delay: 0s">
    <circle cx="150" cy="120" r="35" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="150" cy="120" r="27" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <!-- Shopping cart icon -->
    <path class="icon" d="M 142 112 L 158 112 L 156 124 L 144 124 Z M 147 127 A 2 2 0 1 0 147 131 A 2 2 0 1 0 147 127 M 153 127 A 2 2 0 1 0 153 131 A 2 2 0 1 0 153 127" 
          fill="white" stroke="white" stroke-width="1.5" style="animation-delay: 0s"/>
  </g>
  
  <!-- Node 2: Social Media -->
  <g class="node" style="animation-delay: 0.5s">
    <circle cx="350" cy="120" r="38" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="350" cy="120" r="30" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <!-- Share icon -->
    <circle class="icon" cx="342" cy="116" r="3.5" fill="white" style="animation-delay: 0.5s"/>
    <circle class="icon" cx="358" cy="116" r="3.5" fill="white" style="animation-delay: 0.5s"/>
    <circle class="icon" cx="350" cy="128" r="3.5" fill="white" style="animation-delay: 0.5s"/>
    <line class="icon" x1="342" y1="116" x2="350" y2="128" stroke="white" stroke-width="2" style="animation-delay: 0.5s"/>
    <line class="icon" x1="358" y1="116" x2="350" y2="128" stroke="white" stroke-width="2" style="animation-delay: 0.5s"/>
  </g>
  
  <!-- Node 3: Finance -->
  <g class="node" style="animation-delay: 1s">
    <circle cx="550" cy="120" r="36" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="550" cy="120" r="28" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <!-- Dollar sign -->
    <text class="icon" x="550" y="130" font-size="26" fill="white" text-anchor="middle" style="animation-delay: 1s">$</text>
  </g>
  
  <!-- Node 4: Health & Fitness -->
  <g class="node" style="animation-delay: 1.5s">
    <circle cx="750" cy="120" r="35" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="750" cy="120" r="27" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <!-- Heart icon -->
    <path class="icon" d="M 750 127 L 743 115 Q 740 111 743 108 Q 747 105 750 108 Q 753 105 757 108 Q 760 111 757 115 Z" 
          fill="white" style="animation-delay: 1.5s"/>
  </g>
  
  <!-- Node 5: Education -->
  <g class="node" style="animation-delay: 2s">
    <circle cx="700" cy="300" r="37" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="700" cy="300" r="29" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <!-- Book icon -->
    <rect class="icon" x="691" y="292" width="18" height="16" fill="none" stroke="white" stroke-width="2" style="animation-delay: 2s"/>
    <line class="icon" x1="700" y1="292" x2="700" y2="308" stroke="white" stroke-width="2" style="animation-delay: 2s"/>
  </g>
  
  <!-- Node 6: Entertainment -->
  <g class="node" style="animation-delay: 2.5s">
    <circle cx="400" cy="300" r="34" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="400" cy="300" r="26" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <!-- Play icon -->
    <polygon class="icon" points="395,293 395,307 408,300" fill="white" style="animation-delay: 2.5s"/>
  </g>
  
  <!-- Node 7: Analytics Hub (Central) -->
  <g class="node" style="animation-delay: 3s">
    <circle cx="500" cy="200" r="32" fill="url(#purpleBlue)" opacity="0.9"/>
    <circle cx="500" cy="200" r="24" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <!-- Chart icon -->
    <line class="icon" x1="492" y1="208" x2="492" y2="195" stroke="white" stroke-width="2" style="animation-delay: 3s"/>
    <line class="icon" x1="500" y1="208" x2="500" y2="190" stroke="white" stroke-width="2" style="animation-delay: 3s"/>
    <line class="icon" x1="508" y1="208" x2="508" y2="198" stroke="white" stroke-width="2" style="animation-delay: 3s"/>
  </g>
  
  <!-- Node 8: Travel -->
  <g class="node" style="animation-delay: 3.5s">
    <circle cx="150" cy="280" r="35" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="150" cy="280" r="27" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <!-- Location pin -->
    <path class="icon" d="M 150 272 Q 142 272 142 280 Q 142 284 150 293 Q 158 284 158 280 Q 158 272 150 272 Z M 150 277 A 2.5 2.5 0 1 0 150 282 A 2.5 2.5 0 1 0 150 277" 
          fill="white" style="animation-delay: 3.5s"/>
  </g>
  
  <!-- Node 9: Mobile -->
  <g class="node" style="animation-delay: 4s">
    <circle cx="850" cy="280" r="35" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="850" cy="280" r="27" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <!-- Mobile icon -->
    <rect class="icon" x="843" y="271" width="14" height="20" rx="2" fill="none" stroke="white" stroke-width="2" style="animation-delay: 4s"/>
    <circle class="icon" cx="850" cy="287" r="1.5" fill="white" style="animation-delay: 4s"/>
  </g>
  
  <!-- Growth Metrics -->
  <g class="metric" style="animation-delay: 0s">
    <rect x="220" y="80" width="70" height="26" rx="13" fill="#8b5cf6" opacity="0.8"/>
    <text x="255" y="97" font-size="11" fill="white" text-anchor="middle">+45%</text>
  </g>
  
  <g class="metric" style="animation-delay: 0.8s">
    <rect x="460" y="90" width="65" height="26" rx="13" fill="#3b82f6" opacity="0.8"/>
    <text x="492" y="107" font-size="11" fill="white" text-anchor="middle">2.3M</text>
  </g>
  
  <g class="metric" style="animation-delay: 1.6s">
    <rect x="675" y="80" width="70" height="26" rx="13" fill="#8b5cf6" opacity="0.8"/>
    <text x="710" y="97" font-size="11" fill="white" text-anchor="middle">+128%</text>
  </g>
  
  <g class="metric" style="animation-delay: 2.4s">
    <rect x="610" y="270" width="65" height="26" rx="13" fill="#3b82f6" opacity="0.8"/>
    <text x="642" y="287" font-size="11" fill="white" text-anchor="middle">1.8M</text>
  </g>
  
  <g class="metric" style="animation-delay: 3.2s">
    <rect x="100" y="210" width="60" height="26" rx="13" fill="#8b5cf6" opacity="0.8"/>
    <text x="130" y="227" font-size="11" fill="white" text-anchor="middle">+67%</text>
  </g>
  
  <g class="metric" style="animation-delay: 4s">
    <rect x="790" y="240" width="65" height="26" rx="13" fill="#3b82f6" opacity="0.8"/>
    <text x="822" y="257" font-size="11" fill="white" text-anchor="middle">890K</text>
  </g>
  
  <g class="metric" style="animation-delay: 4.8s">
    <rect x="320" y="270" width="65" height="26" rx="13" fill="#8b5cf6" opacity="0.8"/>
    <text x="352" y="287" font-size="11" fill="white" text-anchor="middle">543K</text>
  </g>
  
  <!-- Growth indicators (small upward arrows) -->
  <g class="growth-indicator" style="animation-delay: 0.3s">
    <path d="M 290 95 L 290 82 M 286 87 L 290 82 L 294 87" 
          stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 1.1s">
    <path d="M 520 105 L 520 92 M 516 97 L 520 92 L 524 97" 
          stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 1.9s">
    <path d="M 730 95 L 730 82 M 726 87 L 730 82 L 734 87" 
          stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 2.7s">
    <path d="M 665 285 L 665 272 M 661 277 L 665 272 L 669 277" 
          stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 3.5s">
    <path d="M 370 285 L 370 272 M 366 277 L 370 272 L 374 277" 
          stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
</svg>
