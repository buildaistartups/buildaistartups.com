<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="cardGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Feature 1: Lightning Fast -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#8b5cf6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Lightning bolt icon -->
    <path d="M 10 -35 L -15 5 L 5 5 L -10 35 L 15 -5 L -5 -5 Z" fill="url(#purpleBlue)"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#8b5cf6">Lightning Fast</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6" opacity="0.8">Sub-second response</text>
  </g>

  <!-- Feature 2: Secure -->
  <g transform="translate(470, 150)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#3b82f6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Shield with checkmark -->
    <path d="M 0 -35 L -25 -25 L -25 0 Q -25 25 0 35 Q 25 25 25 0 L 25 -25 Z" fill="none" stroke="url(#purpleBlue)" stroke-width="4"/>
    <path d="M -12 -5 L -5 5 L 12 -15" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3b82f6">Bank-Level Security</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b82f6" opacity="0.8">256-bit encryption</text>
  </g>

  <!-- Feature 3: Real-time Sync -->
  <g transform="translate(790, 150)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#8b5cf6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Sync arrows -->
    <path d="M -20 -10 A 25 25 0 1 1 20 -10" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
    <polygon points="20,-10 25,-5 20,0" fill="#8b5cf6"/>
    <path d="M 20 10 A 25 25 0 1 1 -20 10" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-20,10 -25,5 -20,0" fill="#3b82f6"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#8b5cf6">Real-time Sync</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6" opacity="0.8">Instant updates</text>
  </g>

  <!-- Feature 4: Scalable -->
  <g transform="translate(1110, 150)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#3b82f6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Growth chart -->
    <rect x="-25" y="10" width="10" height="20" rx="2" fill="#3b82f6"/>
    <rect x="-10" y="0" width="10" height="30" rx="2" fill="#3b82f6"/>
    <rect x="5" y="-15" width="10" height="45" rx="2" fill="#8b5cf6"/>
    <rect x="20" y="-25" width="10" height="55" rx="2" fill="#8b5cf6"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3b82f6">Infinitely Scalable</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b82f6" opacity="0.8">Grows with you</text>
  </g>

  <!-- Feature 5: AI Powered -->
  <g transform="translate(150, 450)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#3b82f6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Brain/AI icon -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#purpleBlue)" stroke-width="3"/>
    <circle cx="-10" cy="-8" r="4" fill="#8b5cf6"/>
    <circle cx="10" cy="-8" r="4" fill="#3b82f6"/>
    <circle cx="-10" cy="8" r="4" fill="#3b82f6"/>
    <circle cx="10" cy="8" r="4" fill="#8b5cf6"/>
    <line x1="-10" y1="-8" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2"/>
    <line x1="10" y1="-8" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2"/>
    <line x1="-10" y1="8" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2"/>
    <line x1="10" y1="8" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3b82f6">AI-Powered</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b82f6" opacity="0.8">Smart automation</text>
  </g>

  <!-- Feature 6: Collaborative -->
  <g transform="translate(470, 450)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#8b5cf6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- People/team icon -->
    <circle cx="-15" cy="-10" r="10" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <path d="M -15 5 Q -15 15 -5 20 L -5 10" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <circle cx="15" cy="-10" r="10" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <path d="M 15 5 Q 15 15 5 20 L 5 10" fill="none" stroke="#3b82f6" stroke-width="3"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#8b5cf6">Team Collaboration</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6" opacity="0.8">Work together</text>
  </g>

  <!-- Feature 7: Analytics -->
  <g transform="translate(790, 450)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#3b82f6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Analytics/graph icon -->
    <path d="M -30 20 L -15 5 L 0 15 L 15 -5 L 30 0" fill="none" stroke="url(#purpleBlue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-30" cy="20" r="4" fill="#8b5cf6"/>
    <circle cx="-15" cy="5" r="4" fill="#8b5cf6"/>
    <circle cx="0" cy="15" r="4" fill="#3b82f6"/>
    <circle cx="15" cy="-5" r="4" fill="#3b82f6"/>
    <circle cx="30" cy="0" r="4" fill="#8b5cf6"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3b82f6">Advanced Analytics</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b82f6" opacity="0.8">Deep insights</text>
  </g>

  <!-- Feature 8: Mobile First -->
  <g transform="translate(1110, 450)">
    <circle cx="0" cy="0" r="100" fill="url(#cardGlow)"/>
    <circle cx="0" cy="0" r="70" fill="#8b5cf6" opacity="0.1" stroke="url(#purpleBlue)" stroke-width="4"/>
    
    <!-- Mobile device -->
    <rect x="-18" y="-30" width="36" height="60" rx="5" fill="none" stroke="url(#purpleBlue)" stroke-width="4"/>
    <circle cx="0" cy="25" r="3" fill="#8b5cf6"/>
    <line x1="-12" y1="-25" x2="12" y2="-25" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-10" y="-15" width="20" height="25" rx="2" fill="#3b82f6" opacity="0.3"/>
    
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#8b5cf6">Mobile First</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6" opacity="0.8">Access anywhere</text>
  </g>

  <!-- Connecting lines (subtle) -->
  <line x1="220" y1="150" x2="400" y2="150" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="540" y1="150" x2="720" y2="150" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="860" y1="150" x2="1040" y2="150" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>
  
  <line x1="220" y1="450" x2="400" y2="450" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="540" y1="450" x2="720" y2="450" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="860" y1="450" x2="1040" y2="450" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>

  <!-- Header -->
  <g transform="translate(700, 50)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="url(#purpleBlue)">Powerful Features</text>
    <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#8b5cf6" opacity="0.7">Everything you need to succeed</text>
  </g>

  <!-- Footer badge -->
  <g transform="translate(700, 720)">
    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="url(#purpleBlue)" opacity="0.15" stroke="url(#purpleBlue)" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="url(#purpleBlue)">+ 20 More Features</text>
  </g>
</svg>
