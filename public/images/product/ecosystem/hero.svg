<svg viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
    </linearGradient>
    
    <radialGradient id="nodeGradient1">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="nodeGradient2">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </radialGradient>
    
    <!-- Arrow marker - BOLDER -->
    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 14 4, 0 8" fill="url(#purpleBlue)" opacity="0.7" />
    </marker>
    
    <!-- Glow filter - STRONGER -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes dash {
        to { stroke-dashoffset: -20; }
      }
      
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.9; }
      }
      
      .connection-line {
        stroke: url(#purpleBlue);
        stroke-width: 3;
        fill: none;
        opacity: 0.5;
        stroke-dasharray: 5, 5;
        animation: dash 20s linear infinite;
      }
      
      .node {
        filter: url(#glow);
        animation: pulse 3s ease-in-out infinite;
      }
      
      .metric {
        animation: float 3s ease-in-out infinite;
      }
      
      .icon {
        animation: fadeInOut 4s ease-in-out infinite;
      }
      
      .growth-indicator {
        animation: float 2.5s ease-in-out infinite;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>
  
  <!-- Connection lines with arrows - BOLDER -->
  <path class="connection-line" d="M 187.5 187.5 Q 312.5 125 437.5 187.5" marker-end="url(#arrowhead)" style="animation-delay: 0s"/>
  <path class="connection-line" d="M 437.5 187.5 Q 562.5 187.5 687.5 250" marker-end="url(#arrowhead)" style="animation-delay: 0.5s"/>
  <path class="connection-line" d="M 687.5 250 Q 750 375 687.5 500" marker-end="url(#arrowhead)" style="animation-delay: 1s"/>
  <path class="connection-line" d="M 687.5 500 Q 562.5 562.5 437.5 500" marker-end="url(#arrowhead)" style="animation-delay: 1.5s"/>
  <path class="connection-line" d="M 437.5 500 Q 312.5 500 250 437.5" marker-end="url(#arrowhead)" style="animation-delay: 2s"/>
  <path class="connection-line" d="M 250 437.5 Q 187.5 312.5 187.5 187.5" marker-end="url(#arrowhead)" style="animation-delay: 2.5s"/>
  <path class="connection-line" d="M 437.5 187.5 Q 437.5 343.75 437.5 500" marker-end="url(#arrowhead)" style="animation-delay: 3s"/>
  <path class="connection-line" d="M 187.5 187.5 Q 218.75 312.5 250 437.5" marker-end="url(#arrowhead)" style="animation-delay: 3.5s"/>
  <path class="connection-line" d="M 812.5 375 Q 750 312.5 687.5 250" marker-end="url(#arrowhead)" style="animation-delay: 4s"/>
  <path class="connection-line" d="M 437.5 500 Q 625 562.5 812.5 375" marker-end="url(#arrowhead)" style="animation-delay: 4.5s"/>
  
  <!-- Node 1: E-commerce - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 0s">
    <circle cx="187.5" cy="187.5" r="50" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="187.5" cy="187.5" r="38" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.5"/>
    <!-- Shopping cart icon -->
    <path class="icon" d="M 175 175 L 200 175 L 197.5 193.75 L 177.5 193.75 Z M 181.25 197.5 A 2.5 2.5 0 1 0 181.25 202.5 A 2.5 2.5 0 1 0 181.25 197.5 M 193.75 197.5 A 2.5 2.5 0 1 0 193.75 202.5 A 2.5 2.5 0 1 0 193.75 197.5" 
          fill="white" stroke="white" stroke-width="2.5" style="animation-delay: 0s"/>
  </g>
  
  <!-- Node 2: Social Media - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 0.5s">
    <circle cx="437.5" cy="187.5" r="56" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="437.5" cy="187.5" r="44" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
    <!-- Share icon -->
    <circle class="icon" cx="425" cy="181.25" r="5" fill="white" style="animation-delay: 0.5s"/>
    <circle class="icon" cx="450" cy="181.25" r="5" fill="white" style="animation-delay: 0.5s"/>
    <circle class="icon" cx="437.5" cy="200" r="5" fill="white" style="animation-delay: 0.5s"/>
    <line class="icon" x1="425" y1="181.25" x2="437.5" y2="200" stroke="white" stroke-width="3" style="animation-delay: 0.5s"/>
    <line class="icon" x1="450" y1="181.25" x2="437.5" y2="200" stroke="white" stroke-width="3" style="animation-delay: 0.5s"/>
  </g>
  
  <!-- Node 3: Finance - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 1s">
    <circle cx="687.5" cy="250" r="52" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="687.5" cy="250" r="40" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>
    <!-- Dollar sign -->
    <text class="icon" x="687.5" y="262.5" font-size="38" fill="white" text-anchor="middle" style="animation-delay: 1s">$</text>
  </g>
  
  <!-- Node 4: Health & Fitness - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 1.5s">
    <circle cx="687.5" cy="500" r="50" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="687.5" cy="500" r="38" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <!-- Heart icon -->
    <path class="icon" d="M 687.5 510 L 677.5 493.75 Q 672.5 487.5 677.5 482.5 Q 682.5 477.5 687.5 482.5 Q 692.5 477.5 697.5 482.5 Q 702.5 487.5 697.5 493.75 Z" 
          fill="white" style="animation-delay: 1.5s"/>
  </g>
  
  <!-- Node 5: Education - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 2s">
    <circle cx="437.5" cy="500" r="54" fill="url(#nodeGradient1)" opacity="0.9"/>
    <circle cx="437.5" cy="500" r="41" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.5"/>
    <!-- Book icon -->
    <rect class="icon" x="425" y="487.5" width="25" height="22.5" fill="none" stroke="white" stroke-width="3" style="animation-delay: 2s"/>
    <line class="icon" x1="437.5" y1="487.5" x2="437.5" y2="510" stroke="white" stroke-width="3" style="animation-delay: 2s"/>
  </g>
  
  <!-- Node 6: Entertainment - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 2.5s">
    <circle cx="250" cy="437.5" r="48" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="250" cy="437.5" r="35" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
    <!-- Play icon -->
    <polygon class="icon" points="243.75,428.75 243.75,446.25 260,437.5" fill="white" style="animation-delay: 2.5s"/>
  </g>
  
  <!-- Node 7: Analytics Hub (Central) - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 3s">
    <circle cx="500" cy="343.75" r="44" fill="url(#purpleBlue)" opacity="0.9"/>
    <circle cx="500" cy="343.75" r="31" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>
    <!-- Chart icon -->
    <line class="icon" x1="487.5" y1="356.25" x2="487.5" y2="337.5" stroke="white" stroke-width="3" style="animation-delay: 3s"/>
    <line class="icon" x1="500" y1="356.25" x2="500" y2="331.25" stroke="white" stroke-width="3" style="animation-delay: 3s"/>
    <line class="icon" x1="512.5" y1="356.25" x2="512.5" y2="343.75" stroke="white" stroke-width="3" style="animation-delay: 3s"/>
  </g>
  
  <!-- Node 8: Travel - BIGGER & BOLDER -->
  <g class="node" style="animation-delay: 3.5s">
    <circle cx="812.5" cy="375" r="50" fill="url(#nodeGradient2)" opacity="0.9"/>
    <circle cx="812.5" cy="375" r="38" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <!-- Location pin -->
    <path class="icon" d="M 812.5 362.5 Q 800 362.5 800 375 Q 800 381.25 812.5 393.75 Q 825 381.25 825 375 Q 825 362.5 812.5 362.5 Z M 812.5 370 A 3.75 3.75 0 1 0 812.5 377.5 A 3.75 3.75 0 1 0 812.5 370" 
          fill="white" style="animation-delay: 3.5s"/>
  </g>
  
  <!-- Growth Metrics - BIGGER & BOLDER -->
  <g class="metric" style="animation-delay: 0s">
    <rect x="300" y="112.5" width="88" height="35" rx="17.5" fill="#8b5cf6" opacity="0.8"/>
    <text x="344" y="136.25" font-size="16" fill="white" text-anchor="middle">+45%</text>
  </g>
  
  <g class="metric" style="animation-delay: 0.8s">
    <rect x="600" y="200" width="81" height="35" rx="17.5" fill="#3b82f6" opacity="0.8"/>
    <text x="640.5" y="223.75" font-size="16" fill="white" text-anchor="middle">2.3M</text>
  </g>
  
  <g class="metric" style="animation-delay: 1.6s">
    <rect x="625" y="400" width="88" height="35" rx="17.5" fill="#8b5cf6" opacity="0.8"/>
    <text x="669" y="423.75" font-size="16" fill="white" text-anchor="middle">+128%</text>
  </g>
  
  <g class="metric" style="animation-delay: 2.4s">
    <rect x="325" y="450" width="81" height="35" rx="17.5" fill="#3b82f6" opacity="0.8"/>
    <text x="365.5" y="473.75" font-size="16" fill="white" text-anchor="middle">1.8M</text>
  </g>
  
  <g class="metric" style="animation-delay: 3.2s">
    <rect x="150" y="300" width="75" height="35" rx="17.5" fill="#8b5cf6" opacity="0.8"/>
    <text x="187.5" y="323.75" font-size="16" fill="white" text-anchor="middle">+67%</text>
  </g>
  
  <g class="metric" style="animation-delay: 4s">
    <rect x="737.5" y="425" width="81" height="35" rx="17.5" fill="#3b82f6" opacity="0.8"/>
    <text x="778" y="448.75" font-size="16" fill="white" text-anchor="middle">890K</text>
  </g>
  
  <!-- Growth indicators (small upward arrows) - BOLDER -->
  <g class="growth-indicator" style="animation-delay: 0.3s">
    <path d="M 387.5 150 L 387.5 131.25 M 381.25 137.5 L 387.5 131.25 L 393.75 137.5" 
          stroke="#8b5cf6" stroke-width="3.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 1.1s">
    <path d="M 650 300 L 650 281.25 M 643.75 287.5 L 650 281.25 L 656.25 287.5" 
          stroke="#3b82f6" stroke-width="3.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 1.9s">
    <path d="M 650 537.5 L 650 518.75 M 643.75 525 L 650 518.75 L 656.25 525" 
          stroke="#8b5cf6" stroke-width="3.5" fill="none" opacity="0.7"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 2.7s">
    <path d="M 387.5 537.5 L 387.5 518.75 M 381.25 525 L 387.5 518.75 L 393.75 525" 
          stroke="#3b82f6" stroke-width="3.5" fill="none" opacity="0.7"/>
  </g>
</svg>
