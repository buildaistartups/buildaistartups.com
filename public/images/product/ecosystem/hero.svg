<svg width="8in" height="4in" viewBox="0 0 4000 2000" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and effects -->
  <defs>
    <!-- Purple to Blue gradient for nodes -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Reverse gradient -->
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient for node glow -->
    <radialGradient id="nodeGlow">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Arrow marker for connections -->
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connection lines with data flow -->
  <!-- Central hub connections -->
  <path d="M 2000 1000 Q 1750 750 1375 625" stroke="url(#purpleBlue)" stroke-width="5" fill="none" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <path d="M 2000 1000 Q 2250 750 2625 625" stroke="url(#bluePurple)" stroke-width="5" fill="none" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <path d="M 2000 1000 Q 1750 1250 1375 1375" stroke="url(#purpleBlue)" stroke-width="5" fill="none" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <path d="M 2000 1000 Q 2250 1250 2625 1375" stroke="url(#bluePurple)" stroke-width="5" fill="none" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <path d="M 2000 1000 L 1125 1000" stroke="url(#purpleBlue)" stroke-width="5" fill="none" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <path d="M 2000 1000 L 2875 1000" stroke="url(#bluePurple)" stroke-width="5" fill="none" opacity="0.6" marker-end="url(#arrowBlue)"/>
  
  <!-- Peripheral connections -->
  <path d="M 1375 625 Q 1250 825 1125 1000" stroke="#8b5cf6" stroke-width="3.75" fill="none" opacity="0.4" marker-end="url(#arrowPurple)" stroke-dasharray="12.5,12.5"/>
  <path d="M 2625 625 Q 2750 825 2875 1000" stroke="#3b82f6" stroke-width="3.75" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="12.5,12.5"/>
  <path d="M 1375 1375 Q 1250 1175 1125 1000" stroke="#8b5cf6" stroke-width="3.75" fill="none" opacity="0.4" marker-end="url(#arrowPurple)" stroke-dasharray="12.5,12.5"/>
  <path d="M 2625 1375 Q 2750 1175 2875 1000" stroke="#3b82f6" stroke-width="3.75" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="12.5,12.5"/>
  <path d="M 1375 625 Q 2000 500 2625 625" stroke="url(#purpleBlue)" stroke-width="3.75" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="12.5,12.5"/>
  <path d="M 1375 1375 Q 2000 1500 2625 1375" stroke="url(#bluePurple)" stroke-width="3.75" fill="none" opacity="0.4" marker-end="url(#arrowPurple)" stroke-dasharray="12.5,12.5"/>
  
  <!-- Growth Metrics floating around connections -->
  <!-- Metric 1 -->
  <g transform="translate(1675, 800)">
    <rect x="-87.5" y="-37.5" width="175" height="75" rx="37.5" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="600" fill="#8b5cf6">+127%</text>
    <path d="M -50 0 L -37.5 -12.5 L -25 0" stroke="#8b5cf6" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Metric 2 -->
  <g transform="translate(2325, 800)">
    <rect x="-87.5" y="-37.5" width="175" height="75" rx="37.5" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="600" fill="#3b82f6">+89%</text>
    <path d="M 37.5 0 L 50 -12.5 L 62.5 0" stroke="#3b82f6" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Metric 3 -->
  <g transform="translate(1675, 1200)">
    <rect x="-75" y="-37.5" width="150" height="75" rx="37.5" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="600" fill="#8b5cf6">2.4K</text>
  </g>
  
  <!-- Metric 4 -->
  <g transform="translate(2325, 1200)">
    <rect x="-75" y="-37.5" width="150" height="75" rx="37.5" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="600" fill="#3b82f6">1.8K</text>
  </g>
  
  <!-- Metric 5 -->
  <g transform="translate(1562.5, 1000)">
    <rect x="-87.5" y="-37.5" width="175" height="75" rx="37.5" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="600" fill="#8b5cf6">+54%</text>
  </g>
  
  <!-- Metric 6 -->
  <g transform="translate(2437.5, 1000)">
    <rect x="-87.5" y="-37.5" width="175" height="75" rx="37.5" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="600" fill="#3b82f6">+72%</text>
  </g>
  
  <!-- Node 1: Central Hub (largest) -->
  <g transform="translate(2000, 1000)">
    <circle r="162.5" fill="url(#nodeGlow)"/>
    <circle r="112.5" fill="url(#purpleBlue)" filter="url(#glow)"/>
    <circle r="87.5" fill="white" opacity="0.2"/>
    <!-- Network icon -->
    <circle cx="0" cy="0" r="7.5" fill="white"/>
    <circle cx="-30" cy="-20" r="6.25" fill="white" opacity="0.8"/>
    <circle cx="30" cy="-20" r="6.25" fill="white" opacity="0.8"/>
    <circle cx="-30" cy="20" r="6.25" fill="white" opacity="0.8"/>
    <circle cx="30" cy="20" r="6.25" fill="white" opacity="0.8"/>
    <line x1="0" y1="0" x2="-30" y2="-20" stroke="white" stroke-width="3.75" opacity="0.8"/>
    <line x1="0" y1="0" x2="30" y2="-20" stroke="white" stroke-width="3.75" opacity="0.8"/>
    <line x1="0" y1="0" x2="-30" y2="20" stroke="white" stroke-width="3.75" opacity="0.8"/>
    <line x1="0" y1="0" x2="30" y2="20" stroke="white" stroke-width="3.75" opacity="0.8"/>
  </g>
  
  <!-- Node 2: Top Left - Mobile App -->
  <g transform="translate(1375, 625)">
    <circle r="112.5" fill="url(#nodeGlow)"/>
    <circle r="80" fill="#8b5cf6" filter="url(#glow)"/>
    <circle r="62.5" fill="white" opacity="0.2"/>
    <!-- Mobile icon -->
    <rect x="-20" y="-30" width="40" height="60" rx="5" fill="white" stroke="white" stroke-width="3.75"/>
    <rect x="-15" y="-25" width="30" height="45" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="0" cy="25" r="3.75" fill="white"/>
  </g>
  
  <!-- Node 3: Top Right - Web Platform -->
  <g transform="translate(2625, 625)">
    <circle r="112.5" fill="url(#nodeGlow)"/>
    <circle r="80" fill="#3b82f6" filter="url(#glow)"/>
    <circle r="62.5" fill="white" opacity="0.2"/>
    <!-- Browser icon -->
    <rect x="-25" y="-25" width="50" height="40" rx="5" fill="none" stroke="white" stroke-width="3.75"/>
    <line x1="-25" y1="-12.5" x2="25" y2="-12.5" stroke="white" stroke-width="3.75"/>
    <circle cx="-15" cy="-18.75" r="2.5" fill="white"/>
    <circle cx="-5" cy="-18.75" r="2.5" fill="white"/>
    <circle cx="5" cy="-18.75" r="2.5" fill="white"/>
  </g>
  
  <!-- Node 4: Bottom Left - Analytics -->
  <g transform="translate(1375, 1375)">
    <circle r="112.5" fill="url(#nodeGlow)"/>
    <circle r="80" fill="#8b5cf6" filter="url(#glow)"/>
    <circle r="62.5" fill="white" opacity="0.2"/>
    <!-- Chart icon -->
    <path d="M -25 20 L -25 5 L -12.5 -5 L 0 10 L 12.5 -12.5 L 25 0 L 25 20 Z" fill="white" opacity="0.9"/>
    <polyline points="-25,5 -12.5,-5 0,10 12.5,-12.5 25,0" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Node 5: Bottom Right - Social -->
  <g transform="translate(2625, 1375)">
    <circle r="112.5" fill="url(#nodeGlow)"/>
    <circle r="80" fill="#3b82f6" filter="url(#glow)"/>
    <circle r="62.5" fill="white" opacity="0.2"/>
    <!-- Share icon -->
    <circle cx="-20" cy="-15" r="7.5" fill="white"/>
    <circle cx="20" cy="-5" r="7.5" fill="white"/>
    <circle cx="0" cy="20" r="7.5" fill="white"/>
    <line x1="-15" y1="-10" x2="15" y2="-7.5" stroke="white" stroke-width="3.75"/>
    <line x1="-15" y1="-10" x2="-2.5" y2="15" stroke="white" stroke-width="3.75"/>
    <line x1="15" y1="0" x2="5" y2="15" stroke="white" stroke-width="3.75"/>
  </g>
  
  <!-- Node 6: Left - E-commerce -->
  <g transform="translate(1125, 1000)">
    <circle r="100" fill="url(#nodeGlow)"/>
    <circle r="70" fill="#8b5cf6" filter="url(#glow)"/>
    <circle r="55" fill="white" opacity="0.2"/>
    <!-- Shopping cart icon -->
    <path d="M -20 -15 L -15 5 L 15 5 L 20 -15 Z" fill="none" stroke="white" stroke-width="3.75" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-25" y1="-15" x2="-20" y2="-15" stroke="white" stroke-width="3.75" stroke-linecap="round"/>
    <circle cx="-7.5" cy="15" r="3.75" fill="white"/>
    <circle cx="7.5" cy="15" r="3.75" fill="white"/>
  </g>
  
  <!-- Node 7: Right - Cloud Service -->
  <g transform="translate(2875, 1000)">
    <circle r="100" fill="url(#nodeGlow)"/>
    <circle r="70" fill="#3b82f6" filter="url(#glow)"/>
    <circle r="55" fill="white" opacity="0.2"/>
    <!-- Cloud icon -->
    <path d="M -15 5 Q -20 -5 -10 -10 Q -5 -17.5 5 -12.5 Q 15 -15 20 -5 Q 25 0 20 7.5 L -15 7.5 Z" fill="white" stroke="white" stroke-width="2.5"/>
  </g>
  
  <!-- Data flow particles -->
  <g opacity="0.6">
    <circle cx="1700" cy="850" r="5" fill="#8b5cf6">
      <animate attributeName="cx" from="2000" to="1375" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="1000" to="625" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="2300" cy="850" r="5" fill="#3b82f6">
      <animate attributeName="cx" from="2000" to="2625" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="1000" to="625" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1700" cy="1150" r="5" fill="#8b5cf6">
      <animate attributeName="cx" from="2000" to="1375" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="1000" to="1375" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Additional smaller metric badges -->
  <g transform="translate(1250, 800)" opacity="0.8">
    <circle r="45" fill="#8b5cf6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="27.5" font-weight="600" fill="#8b5cf6">5K</text>
  </g>
  
  <g transform="translate(2750, 800)" opacity="0.8">
    <circle r="45" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="12.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="27.5" font-weight="600" fill="#3b82f6">3K</text>
  </g>
  
  <g transform="translate(2000, 625)" opacity="0.8">
    <rect x="-62.5" y="-30" width="125" height="60" rx="30" fill="url(#purpleBlue)" opacity="0.15"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="27.5" font-weight="600" fill="#8b5cf6">LIVE</text>
  </g>
</svg>
