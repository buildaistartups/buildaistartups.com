<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="nodeGradient1">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="nodeGradient2">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="glowEffect">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="url(#purpleBlue)" opacity="0.8" />
    </marker>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      
      @keyframes dash {
        to { stroke-dashoffset: -30; }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes scaleUp {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
      }
      
      @keyframes glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.6)) drop-shadow(0 0 20px rgba(59, 130, 246, 0.4)); }
        50% { filter: drop-shadow(0 0 25px rgba(139, 92, 246, 1)) drop-shadow(0 0 40px rgba(59, 130, 246, 0.8)); }
      }
      
      @keyframes slideIn {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      
      .connection-line {
        stroke: url(#purpleBlue);
        stroke-width: 3;
        fill: none;
        opacity: 0.5;
        stroke-dasharray: 8, 8;
        animation: dash 30s linear infinite;
      }
      
      .node {
        filter: url(#strongGlow);
        animation: pulse 3s ease-in-out infinite;
      }
      
      .metric {
        animation: float 3.5s ease-in-out infinite, slideIn 1s ease-out forwards;
      }
      
      .icon {
        animation: fadeInOut 5s ease-in-out infinite;
      }
      
      .growth-indicator {
        animation: float 3s ease-in-out infinite, scaleUp 2s ease-in-out infinite;
      }
      
      .glow-ring {
        animation: glow-pulse 2.5s ease-in-out infinite;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 600;
      }
    </style>
  </defs>
  
  <!-- Background glow circles -->
  <circle cx="200" cy="180" r="150" fill="url(#glowEffect)" opacity="0.6" class="node" style="animation-delay: 0s"/>
  <circle cx="600" cy="325" r="180" fill="url(#glowEffect)" opacity="0.6" class="node" style="animation-delay: 1s"/>
  <circle cx="1000" cy="180" r="150" fill="url(#glowEffect)" opacity="0.6" class="node" style="animation-delay: 2s"/>
  
  <!-- Connection lines with arrows -->
  <path class="connection-line" d="M 200 180 Q 350 120 500 180" marker-end="url(#arrowhead)" style="animation-delay: 0s"/>
  <path class="connection-line" d="M 500 180 Q 600 150 700 180" marker-end="url(#arrowhead)" style="animation-delay: 0.5s"/>
  <path class="connection-line" d="M 700 180 Q 850 140 1000 180" marker-end="url(#arrowhead)" style="animation-delay: 1s"/>
  <path class="connection-line" d="M 1000 180 Q 1060 310 1000 440" marker-end="url(#arrowhead)" style="animation-delay: 1.5s"/>
  <path class="connection-line" d="M 1000 440 Q 850 500 700 440" marker-end="url(#arrowhead)" style="animation-delay: 2s"/>
  <path class="connection-line" d="M 700 440 Q 600 470 500 440" marker-end="url(#arrowhead)" style="animation-delay: 2.5s"/>
  <path class="connection-line" d="M 500 440 Q 350 480 200 440" marker-end="url(#arrowhead)" style="animation-delay: 3s"/>
  <path class="connection-line" d="M 200 440 Q 140 310 200 180" marker-end="url(#arrowhead)" style="animation-delay: 3.5s"/>
  <path class="connection-line" d="M 500 180 Q 500 290 500 440" marker-end="url(#arrowhead)" style="animation-delay: 4s"/>
  <path class="connection-line" d="M 200 180 Q 350 310 500 440" marker-end="url(#arrowhead)" style="animation-delay: 4.5s"/>
  <path class="connection-line" d="M 700 180 Q 850 310 1000 440" marker-end="url(#arrowhead)" style="animation-delay: 5s"/>
  <path class="connection-line" d="M 200 440 Q 450 380 700 440" marker-end="url(#arrowhead)" style="animation-delay: 5.5s"/>
  
  <!-- Node 1: E-commerce -->
  <g class="node" style="animation-delay: 0s">
    <circle cx="200" cy="180" r="70" fill="url(#nodeGradient1)" opacity="0.95"/>
    <circle cx="200" cy="180" r="58" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6" class="glow-ring"/>
    <!-- Shopping cart icon -->
    <path class="icon" d="M 175 160 L 225 160 L 220 195 L 180 195 Z M 190 202 A 5 5 0 1 0 190 212 A 5 5 0 1 0 190 202 M 218 202 A 5 5 0 1 0 218 212 A 5 5 0 1 0 218 202" 
          fill="white" stroke="white" stroke-width="3.5" style="animation-delay: 0s"/>
  </g>
  
  <!-- Node 2: Social Media -->
  <g class="node" style="animation-delay: 0.5s">
    <circle cx="500" cy="180" r="76" fill="url(#nodeGradient2)" opacity="0.95"/>
    <circle cx="500" cy="180" r="64" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 0.5s"/>
    <!-- Share icon -->
    <circle class="icon" cx="475" cy="170" r="9" fill="white" style="animation-delay: 0.5s"/>
    <circle class="icon" cx="525" cy="170" r="9" fill="white" style="animation-delay: 0.5s"/>
    <circle class="icon" cx="500" cy="200" r="9" fill="white" style="animation-delay: 0.5s"/>
    <line class="icon" x1="475" y1="170" x2="500" y2="200" stroke="white" stroke-width="5" style="animation-delay: 0.5s"/>
    <line class="icon" x1="525" y1="170" x2="500" y2="200" stroke="white" stroke-width="5" style="animation-delay: 0.5s"/>
  </g>
  
  <!-- Node 3: Finance -->
  <g class="node" style="animation-delay: 1s">
    <circle cx="700" cy="180" r="72" fill="url(#nodeGradient1)" opacity="0.95"/>
    <circle cx="700" cy="180" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 1s"/>
    <!-- Dollar sign -->
    <text class="icon" x="700" y="205" font-size="65" fill="white" text-anchor="middle" style="animation-delay: 1s">$</text>
  </g>
  
  <!-- Node 4: Health & Fitness -->
  <g class="node" style="animation-delay: 1.5s">
    <circle cx="1000" cy="180" r="70" fill="url(#nodeGradient2)" opacity="0.95"/>
    <circle cx="1000" cy="180" r="58" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 1.5s"/>
    <!-- Heart icon -->
    <path class="icon" d="M 1000 202 L 978 175 Q 968 164 978 154 Q 990 144 1000 154 Q 1010 144 1022 154 Q 1032 164 1022 175 Z" 
          fill="white" style="animation-delay: 1.5s"/>
  </g>
  
  <!-- Node 5: Education -->
  <g class="node" style="animation-delay: 2s">
    <circle cx="700" cy="440" r="74" fill="url(#nodeGradient1)" opacity="0.95"/>
    <circle cx="700" cy="440" r="62" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 2s"/>
    <!-- Book icon -->
    <rect class="icon" x="673" y="418" width="54" height="44" fill="none" stroke="white" stroke-width="5" style="animation-delay: 2s"/>
    <line class="icon" x1="700" y1="418" x2="700" y2="462" stroke="white" stroke-width="5" style="animation-delay: 2s"/>
  </g>
  
  <!-- Node 6: Entertainment -->
  <g class="node" style="animation-delay: 2.5s">
    <circle cx="500" cy="440" r="71" fill="url(#nodeGradient2)" opacity="0.95"/>
    <circle cx="500" cy="440" r="59" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 2.5s"/>
    <!-- Play icon -->
    <polygon class="icon" points="480,418 480,462 530,440" fill="white" style="animation-delay: 2.5s"/>
  </g>
  
  <!-- Node 7: Travel -->
  <g class="node" style="animation-delay: 3s">
    <circle cx="1000" cy="440" r="70" fill="url(#nodeGradient2)" opacity="0.95"/>
    <circle cx="1000" cy="440" r="58" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 3s"/>
    <!-- Location pin -->
    <path class="icon" d="M 1000 415 Q 978 415 978 438 Q 978 451 1000 476 Q 1022 451 1022 438 Q 1022 415 1000 415 Z M 1000 430 A 8 8 0 1 0 1000 446 A 8 8 0 1 0 1000 430" 
          fill="white" style="animation-delay: 3s"/>
  </g>
  
  <!-- Node 8: Analytics Hub (Central) -->
  <g class="node" style="animation-delay: 3.5s">
    <circle cx="200" cy="440" r="68" fill="url(#purpleBlue)" opacity="0.95"/>
    <circle cx="200" cy="440" r="56" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.6" class="glow-ring" style="animation-delay: 3.5s"/>
    <!-- Chart icon -->
    <line class="icon" x1="175" y1="465" x2="175" y2="425" stroke="white" stroke-width="5" style="animation-delay: 3.5s"/>
    <line class="icon" x1="200" y1="465" x2="200" y2="415" stroke="white" stroke-width="5" style="animation-delay: 3.5s"/>
    <line class="icon" x1="225" y1="465" x2="225" y2="435" stroke="white" stroke-width="5" style="animation-delay: 3.5s"/>
  </g>
  
  <!-- Growth Metrics -->
  <g class="metric" style="animation-delay: 0s">
    <rect x="320" y="110" width="110" height="42" rx="21" fill="#8b5cf6" opacity="0.95" filter="url(#glow)"/>
    <text x="375" y="138" font-size="22" fill="white" text-anchor="middle" font-weight="700">+45%</text>
  </g>
  
  <g class="metric" style="animation-delay: 0.5s">
    <rect x="580" y="85" width="100" height="42" rx="21" fill="#3b82f6" opacity="0.95" filter="url(#glow)"/>
    <text x="630" y="113" font-size="22" fill="white" text-anchor="middle" font-weight="700">2.3M</text>
  </g>
  
  <g class="metric" style="animation-delay: 1s">
    <rect x="810" y="110" width="115" height="42" rx="21" fill="#8b5cf6" opacity="0.95" filter="url(#glow)"/>
    <text x="867" y="138" font-size="22" fill="white" text-anchor="middle" font-weight="700">+128%</text>
  </g>
  
  <g class="metric" style="animation-delay: 1.5s">
    <rect x="1030" y="290" width="100" height="42" rx="21" fill="#3b82f6" opacity="0.95" filter="url(#glow)"/>
    <text x="1080" y="318" font-size="22" fill="white" text-anchor="middle" font-weight="700">890K</text>
  </g>
  
  <g class="metric" style="animation-delay: 2s">
    <rect x="780" y="490" width="100" height="42" rx="21" fill="#8b5cf6" opacity="0.95" filter="url(#glow)"/>
    <text x="830" y="518" font-size="22" fill="white" text-anchor="middle" font-weight="700">1.8M</text>
  </g>
  
  <g class="metric" style="animation-delay: 2.5s">
    <rect x="380" y="490" width="100" height="42" rx="21" fill="#3b82f6" opacity="0.95" filter="url(#glow)"/>
    <text x="430" y="518" font-size="22" fill="white" text-anchor="middle" font-weight="700">543K</text>
  </g>
  
  <g class="metric" style="animation-delay: 3s">
    <rect x="80" y="290" width="105" height="42" rx="21" fill="#8b5cf6" opacity="0.95" filter="url(#glow)"/>
    <text x="132" y="318" font-size="22" fill="white" text-anchor="middle" font-weight="700">+67%</text>
  </g>
  
  <!-- Growth indicators (upward arrows) -->
  <g class="growth-indicator" style="animation-delay: 0.3s">
    <path d="M 440 128 L 440 95 M 430 108 L 440 95 L 450 108" 
          stroke="#8b5cf6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 0.8s">
    <path d="M 690 103 L 690 70 M 680 83 L 690 70 L 700 83" 
          stroke="#3b82f6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 1.3s">
    <path d="M 940 128 L 940 95 M 930 108 L 940 95 L 950 108" 
          stroke="#8b5cf6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 1.8s">
    <path d="M 1100 308 L 1100 275 M 1090 288 L 1100 275 L 1110 288" 
          stroke="#3b82f6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 2.3s">
    <path d="M 865 508 L 865 475 M 855 488 L 865 475 L 875 488" 
          stroke="#8b5cf6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 2.8s">
    <path d="M 495 508 L 495 475 M 485 488 L 495 475 L 505 488" 
          stroke="#3b82f6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <g class="growth-indicator" style="animation-delay: 3.3s">
    <path d="M 155 308 L 155 275 M 145 288 L 155 275 L 165 288" 
          stroke="#8b5cf6" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>
  </g>
</svg>
