<svg width="1250" height="1000" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>

    <!-- Soft panel gradient for the "Common Error Codes" box -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>   <!-- indigo-50 -->
      <stop offset="100%" stop-color="#e0e7ff"/> <!-- indigo-100 -->
    </linearGradient>

    <!-- Shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366f1" />
    </marker>
    <marker id="retryArrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" />
    </marker>
    <!-- Arrow whose LEFT side (base) attaches to the line end -->
    <marker id="retryArrowLeftAttach" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Title (blue) -->
  <text x="500" y="44" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#2563eb" text-anchor="middle">API Error Handling Flow</text>

  <!-- 1. API Request (moved 5pt left) -->
  <rect x="60.667" y="100" width="220" height="108" rx="14" fill="url(#purpleGrad)" stroke="#6d28d9" stroke-width="3" filter="url(#softShadow)"/>
  <text x="170.667" y="138" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">API Request</text>
  <text x="170.667" y="166" font-family="Arial, sans-serif" font-size="14" fill="#ede9fe" text-anchor="middle">POST /api/endpoint</text>

  <!-- Arrow 1 (start shifted to stay attached to box's right edge) -->
  <line x1="280.667" y1="150" x2="370" y2="150" stroke="#6366f1" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- 2. Validation -->
  <polygon points="480,110 590,150 480,190 370,150" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="3" filter="url(#softShadow)"/>
  <text x="480" y="150" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Validation</text>
  <text x="480" y="172" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe" text-anchor="middle">Check params</text>

  <!-- Arrow to Success path -->
  <line x1="590" y1="150" x2="680" y2="150" stroke="#6366f1" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="635" y="136" font-family="Arial, sans-serif" font-size="14" fill="#10b981" font-weight="bold">Valid</text>

  <!-- Success Response -->
  <rect x="680" y="95" width="210" height="110" rx="14" fill="#10b981" stroke="#047857" stroke-width="3" filter="url(#softShadow)"/>
  <text x="785" y="138" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Success</text>
  <text x="785" y="166" font-family="Arial, sans-serif" font-size="14" fill="#d1fae5" text-anchor="middle">200 OK</text>

  <!-- Arrow to Error Detection -->
  <line x1="480" y1="190" x2="480" y2="250" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="498" y="220" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" font-weight="bold">Invalid</text>

  <!-- 3. Error Detection -->
  <rect x="360" y="250" width="240" height="130" rx="14" fill="url(#errorGrad)" stroke="#b91c1c" stroke-width="3" filter="url(#softShadow)"/>
  <!-- smaller, moved-left warning circle -->
  <circle cx="388" cy="295" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="388" y="300" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f59e0b" text-anchor="middle">!</text>

  <text x="480" y="292" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Error Detected</text>
  <text x="480" y="314" font-family="Arial, sans-serif" font-size="14" fill="#fee2e2" text-anchor="middle">400 Bad Request</text>
  <text x="480" y="334" font-family="Arial, sans-serif" font-size="14" fill="#fee2e2" text-anchor="middle">401 Unauthorized</text>
  <text x="480" y="354" font-family="Arial, sans-serif" font-size="14" fill="#fee2e2" text-anchor="middle">500 Server Error</text>

  <!-- Arrow to Error Response -->
  <line x1="480" y1="380" x2="480" y2="445" stroke="#6366f1" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- 4. Error Response -->
  <rect x="360" y="445" width="240" height="130" rx="14" fill="url(#purpleGrad)" stroke="#6d28d9" stroke-width="3" filter="url(#softShadow)"/>
  <text x="480" y="485" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Error Response</text>
  <text x="480" y="508" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">{</text>
  <text x="480" y="528" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">"error": "Invalid token",</text>
  <text x="480" y="548" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">"code": 401</text>

  <!-- Arrow to Retry Logic -->
  <line x1="360" y1="510" x2="190" y2="510" stroke="#6366f1" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- 5. Retry Logic Decision -->
  <polygon points="190,460 270,510 190,560 110,510" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="3" filter="url(#softShadow)"/>
  <text x="190" y="508" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Retry?</text>
  <text x="190" y="528" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">Attempts &lt; 3</text>

  <!-- Retry Arrow (MOVED MORE TO THE LEFT - now x=20 instead of x=40) -->
  <path d="M 110 510
           Q 20 510 20 260
           Q 20 154 10 154
           L 20 154"
        stroke="#f59e0b" stroke-width="4" stroke-linecap="round"
        fill="none" marker-end="url(#retryArrowLeftAttach)"/>
  <circle cx="20" cy="260" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="20" y="268" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b" text-anchor="middle">↻</text>
  <text x="85" y="402" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" font-weight="bold">Yes</text>

  <!-- No Retry - Final Error -->
  <line x1="190" y1="560" x2="190" y2="625" stroke="#6366f1" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="212" y="596" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" font-weight="bold">No</text>

  <!-- 6. Final Error State -->
  <rect x="80" y="625" width="220" height="95" rx="14" fill="#4b5563" stroke="#1f2937" stroke-width="3" filter="url(#softShadow)"/>
  <text x="190" y="660" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Failed</text>
  <text x="190" y="685" font-family="Arial, sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">Max retries exceeded</text>

  <!-- Common Error Codes BOX (now with soft gradient background) -->
  <rect x="610" y="240" width="380" height="430" rx="14"
        fill="url(#panelGrad)" stroke="#a5b4fc" stroke-width="3"
        filter="url(#softShadow)"/>
  <text x="800" y="275" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">Common Error Codes</text>

  <!-- Error code list -->
  <g transform="translate(630, 300)">
    <rect x="0" y="0" width="340" height="56" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="14" y="24" font-family="monospace" font-size="18" font-weight="bold" fill="#92400e">400</text>
    <text x="14" y="44" font-family="Arial, sans-serif" font-size="14" fill="#78350f">Bad Request - Invalid syntax</text>

    <rect x="0" y="62" width="340" height="56" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="14" y="86" font-family="monospace" font-size="18" font-weight="bold" fill="#991b1b">401</text>
    <text x="14" y="106" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">Unauthorized - Authentication required</text>

    <rect x="0" y="124" width="340" height="56" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="14" y="148" font-family="monospace" font-size="18" font-weight="bold" fill="#991b1b">403</text>
    <text x="14" y="168" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">Forbidden - No permission</text>

    <rect x="0" y="186" width="340" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="14" y="210" font-family="monospace" font-size="18" font-weight="bold" fill="#1e3a8a">404</text>
    <text x="14" y="230" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Not Found - Resource doesn't exist</text>

    <rect x="0" y="248" width="340" height="56" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="14" y="272" font-family="monospace" font-size="18" font-weight="bold" fill="#92400e">429</text>
    <text x="14" y="292" font-family="Arial, sans-serif" font-size="14" fill="#78350f">Too Many Requests - Rate limited</text>

    <rect x="0" y="310" width="340" height="56" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="14" y="334" font-family="monospace" font-size="18" font-weight="bold" fill="#991b1b">500</text>
    <text x="14" y="354" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">Internal Server Error - Server issue</text>

    <rect x="0" y="372" width="340" height="56" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="14" y="396" font-family="monospace" font-size="18" font-weight="bold" fill="#991b1b">503</text>
    <text x="14" y="416" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">Service Unavailable - Temporary outage</text>
  </g>

  <!-- Legend below the "503 Service Unavailable" row -->
  <g transform="translate(630, 760)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Legend:</text>
    <circle cx="74" cy="-4" r="10" fill="url(#purpleGrad)"/>
    <text x="92" y="0" font-family="Arial, sans-serif" font-size="13" fill="#334155">Process</text>

    <circle cx="204" cy="-4" r="10" fill="url(#blueGrad)"/>
    <text x="222" y="0" font-family="Arial, sans-serif" font-size="13" fill="#334155">Decision</text>

    <line x1="316" y1="-4" x2="354" y2="-4" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" marker-end="url(#retryArrow)"/>
    <text x="362" y="0" font-family="Arial, sans-serif" font-size="13" fill="#334155">Retry Flow</text>
  </g>
</svg>
