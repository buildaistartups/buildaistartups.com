<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Colors -->
    <style>
      .title { font: 700 22px 'Inter', 'Roboto', 'Helvetica', 'Arial', sans-serif; fill: #111827; }
      .label { font: 600 18px 'Inter', 'Roboto', 'Helvetica', 'Arial', sans-serif; fill: #111827; }
      .small { font: 500 14px 'Inter', 'Roboto', 'Helvetica', 'Arial', sans-serif; fill: #111827; }
      .code  { font: 600 14px 'JetBrains Mono', 'Fira Mono', 'Menlo', monospace; fill: #111827; }
    </style>

    <!-- Arrowheads -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>

    <!-- Warning icon -->
    <g id="warn">
      <polygon points="10,0 20,18 0,18" fill="#7C3AED" opacity="0.9"/>
      <rect x="9.2" y="5" width="1.6" height="7.5" fill="#FFFFFF"/>
      <circle cx="10" cy="15.2" r="1.4" fill="#FFFFFF"/>
    </g>

    <!-- Retry icon (circular arrow) -->
    <g id="retry">
      <path d="M14 2 A10 10 0 1 0 24 12" fill="none" stroke="#2563EB" stroke-width="2.5"/>
      <polyline points="20,8 24,12 16,12" fill="none" stroke="#2563EB" stroke-width="2.5" />
    </g>

    <!-- Soft fills -->
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="700" y="52" text-anchor="middle" class="title">API Error Handling Flow</text>

  <!-- Node: Request -->
  <g id="request">
    <rect x="80" y="120" rx="16" ry="16" width="240" height="90"
          fill="url(#grad-purple)" stroke="#7C3AED" stroke-width="3"/>
    <text x="200" y="165" text-anchor="middle" class="label">Client Request</text>
    <text x="200" y="190" text-anchor="middle" class="small">POST /resource</text>
  </g>

  <!-- Arrow: Request -> Validation -->
  <path d="M 320 165 L 400 165" stroke="#2563EB" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Node: Validation -->
  <g id="validation">
    <rect x="400" y="100" rx="16" ry="16" width="260" height="130"
          fill="url(#grad-blue)" stroke="#2563EB" stroke-width="3"/>
    <text x="530" y="145" text-anchor="middle" class="label">Validation</text>
    <text x="530" y="170" text-anchor="middle" class="small">schema • auth • rate limit</text>
  </g>

  <!-- Arrow: Validation -> Error Response -->
  <path d="M 660 165 L 740 165" stroke="#7C3AED" stroke-width="3" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- Node: Error Response -->
  <g id="error-response">
    <rect x="740" y="60" rx="16" ry="16" width="480" height="230"
          fill="url(#grad-purple)" stroke="#7C3AED" stroke-width="3"/>
    <text x="980" y="105" text-anchor="middle" class="label">Error Response</text>

    <!-- Error codes grid -->
    <g transform="translate(760,120)">
      <use href="#warn" x="0" y="0"/>
      <text x="28" y="14" class="code">400 Bad Request</text>

      <use href="#warn" x="220" y="0"/>
      <text x="248" y="14" class="code">401 Unauthorized</text>

      <use href="#warn" x="440" y="0"/>
      <text x="468" y="14" class="code">403 Forbidden</text>

      <use href="#warn" x="0" y="38"/>
      <text x="28" y="52" class="code">404 Not Found</text>

      <use href="#warn" x="220" y="38"/>
      <text x="248" y="52" class="code">422 Unprocessable</text>

      <use href="#warn" x="440" y="38"/>
      <text x="468" y="52" class="code">429 Too Many Requests</text>

      <use href="#warn" x="0" y="76"/>
      <text x="28" y="90" class="code">500 Internal Error</text>

      <use href="#warn" x="220" y="76"/>
      <text x="248" y="90" class="code">503 Unavailable</text>
    </g>

    <!-- Example payload -->
    <g transform="translate(760,210)">
      <text x="0" y="0" class="small">{"code": "429", "message": "Rate limit exceeded", "retry_after": 2s}</text>
    </g>
  </g>

  <!-- Arrow: Error Response -> Retry Logic -->
  <path d="M 980 290 L 980 330" stroke="#2563EB" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Node: Retry Logic -->
  <g id="retry-logic">
    <rect x="740" y="330" rx="16" ry="16" width="480" height="230"
          fill="url(#grad-blue)" stroke="#2563EB" stroke-width="3"/>
    <text x="980" y="370" text-anchor="middle" class="label">Retry Logic</text>
    <g transform="translate(770,395)">
      <use href="#retry" x="0" y="0"/>
      <text x="40" y="16" class="small">Exponential backoff</text>

      <use href="#retry" x="0" y="40"/>
      <text x="40" y="56" class="small">Jitter to avoid thundering herd</text>

      <use href="#retry" x="0" y="80"/>
      <text x="40" y="96" class="small">Respect <tspan class="code">Retry-After</tspan></text>
    </g>
  </g>

  <!-- Curved retry arrow: Retry Logic back to Request -->
  <path d="M 740 445
           C 520 445, 520 165, 320 165"
        fill="none" stroke="#2563EB" stroke-width="3" stroke-dasharray="6 6"
        marker-end="url(#arrow-blue)"/>
  <text x="520" y="230" class="small" text-anchor="middle">retry on 429/500/503</text>

  <!-- Legend (minimal) -->
  <g id="legend" transform="translate(80,265)">
    <rect x="0" y="0" width="290" height="115" rx="12" ry="12"
          fill="none" stroke="#D1D5DB" stroke-width="2"/>
    <circle cx="18" cy="24" r="6" fill="#2563EB"/>
    <text x="38" y="29" class="small">Request/Retry flow</text>
    <circle cx="18" cy="56" r="6" fill="#7C3AED"/>
    <text x="38" y="61" class="small">Validation/Error path</text>
    <use href="#warn" x="10" y="70"/>
    <text x="38" y="89" class="small">Warning (error code)</text>
  </g>
</svg>
