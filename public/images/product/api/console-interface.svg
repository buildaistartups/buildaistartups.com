<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Main Container -->
  <rect width="1200" height="800" fill="none"/>
  
  <!-- Header Bar -->
  <rect x="20" y="20" width="1160" height="60" rx="12" fill="#1E1B2E" filter="url(#shadow)"/>
  
  <!-- Header Content -->
  <circle cx="50" cy="50" r="8" fill="#EF4444"/>
  <circle cx="75" cy="50" r="8" fill="#F59E0B"/>
  <circle cx="100" cy="50" r="8" fill="#10B981"/>
  
  <text x="130" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#E5E7EB">
    API Console
  </text>
  
  <!-- Top Nav Tabs -->
  <rect x="350" y="35" width="100" height="30" rx="6" fill="url(#purpleGrad)"/>
  <text x="400" y="55" font-family="Arial, sans-serif" font-size="15" font-weight="500" fill="white" text-anchor="middle">
    Request
  </text>
  
  <rect x="460" y="35" width="100" height="30" rx="6" fill="#2D2A3E"/>
  <text x="510" y="55" font-family="Arial, sans-serif" font-size="15" font-weight="400" fill="#9CA3AF" text-anchor="middle">
    Headers
  </text>
  
  <rect x="570" y="35" width="100" height="30" rx="6" fill="#2D2A3E"/>
  <text x="620" y="55" font-family="Arial, sans-serif" font-size="15" font-weight="400" fill="#9CA3AF" text-anchor="middle">
    Auth
  </text>

  <!-- Request Section -->
  <rect x="20" y="100" width="750" height="320" rx="12" fill="#1E1B2E" filter="url(#shadow)"/>
  
  <!-- Method Selector & URL Bar -->
  <rect x="40" y="120" width="100" height="40" rx="6" fill="url(#blueGrad)"/>
  <text x="90" y="145" font-family="monospace" font-size="15" font-weight="600" fill="white" text-anchor="middle">
    POST
  </text>
  
  <rect x="150" y="120" width="500" height="40" rx="6" fill="#2D2A3E"/>
  <text x="165" y="145" font-family="monospace" font-size="14" fill="#60A5FA">
    https://api.example.com/v1/users
  </text>
  
  <rect x="660" y="120" width="90" height="40" rx="6" fill="url(#purpleGrad)"/>
  <text x="705" y="145" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">
    Send
  </text>

  <!-- Request Body Label -->
  <text x="40" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#9CA3AF">
    REQUEST BODY
  </text>
  
  <!-- Code Editor -->
  <rect x="40" y="200" width="710" height="200" rx="8" fill="#0D0C15"/>
  
  <!-- Line Numbers -->
  <text x="55" y="225" font-family="monospace" font-size="14" fill="#4B5563">1</text>
  <text x="55" y="245" font-family="monospace" font-size="14" fill="#4B5563">2</text>
  <text x="55" y="265" font-family="monospace" font-size="14" fill="#4B5563">3</text>
  <text x="55" y="285" font-family="monospace" font-size="14" fill="#4B5563">4</text>
  <text x="55" y="305" font-family="monospace" font-size="14" fill="#4B5563">5</text>
  <text x="55" y="325" font-family="monospace" font-size="14" fill="#4B5563">6</text>
  <text x="55" y="345" font-family="monospace" font-size="14" fill="#4B5563">7</text>
  <text x="55" y="365" font-family="monospace" font-size="14" fill="#4B5563">8</text>
  
  <!-- Syntax Highlighted Code -->
  <text x="85" y="225" font-family="monospace" font-size="14" fill="#A78BFA">{</text>
  
  <text x="100" y="245" font-family="monospace" font-size="14" fill="#8B5CF6">"name"</text>
  <text x="160" y="245" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  <text x="175" y="245" font-family="monospace" font-size="14" fill="#34D399">"John Doe"</text>
  <text x="265" y="245" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  
  <text x="100" y="265" font-family="monospace" font-size="14" fill="#8B5CF6">"email"</text>
  <text x="160" y="265" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  <text x="175" y="265" font-family="monospace" font-size="14" fill="#34D399">"john@example.com"</text>
  <text x="320" y="265" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  
  <text x="100" y="285" font-family="monospace" font-size="14" fill="#8B5CF6">"role"</text>
  <text x="160" y="285" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  <text x="175" y="285" font-family="monospace" font-size="14" fill="#34D399">"developer"</text>
  <text x="280" y="285" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  
  <text x="100" y="305" font-family="monospace" font-size="14" fill="#8B5CF6">"permissions"</text>
  <text x="220" y="305" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  <text x="235" y="305" font-family="monospace" font-size="14" fill="#A78BFA">[</text>
  
  <text x="115" y="325" font-family="monospace" font-size="14" fill="#34D399">"read"</text>
  <text x="175" y="325" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  <text x="190" y="325" font-family="monospace" font-size="14" fill="#34D399">"write"</text>
  
  <text x="100" y="345" font-family="monospace" font-size="14" fill="#A78BFA">]</text>
  
  <text x="85" y="365" font-family="monospace" font-size="14" fill="#A78BFA">}</text>

  <!-- Response Section -->
  <rect x="790" y="100" width="390" height="320" rx="12" fill="#1E1B2E" filter="url(#shadow)"/>
  
  <!-- Response Header -->
  <text x="810" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#9CA3AF">
    RESPONSE
  </text>
  
  <!-- Status Badge -->
  <rect x="1050" y="115" width="110" height="24" rx="12" fill="#065F46"/>
  <circle cx="1065" cy="127" r="4" fill="#10B981"/>
  <text x="1075" y="131" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#10B981">
    200 OK
  </text>
  
  <!-- Response Time -->
  <text x="930" y="130" font-family="monospace" font-size="12" fill="#6366F1">
    ⚡ 245ms
  </text>

  <!-- Response Body -->
  <rect x="810" y="145" width="350" height="255" rx="8" fill="#0D0C15"/>
  
  <!-- Response Line Numbers -->
  <text x="825" y="170" font-family="monospace" font-size="14" fill="#4B5563">1</text>
  <text x="825" y="190" font-family="monospace" font-size="14" fill="#4B5563">2</text>
  <text x="825" y="210" font-family="monospace" font-size="14" fill="#4B5563">3</text>
  <text x="825" y="230" font-family="monospace" font-size="14" fill="#4B5563">4</text>
  <text x="825" y="250" font-family="monospace" font-size="14" fill="#4B5563">5</text>
  <text x="825" y="270" font-family="monospace" font-size="14" fill="#4B5563">6</text>
  <text x="825" y="290" font-family="monospace" font-size="14" fill="#4B5563">7</text>
  <text x="825" y="310" font-family="monospace" font-size="14" fill="#4B5563">8</text>
  <text x="825" y="330" font-family="monospace" font-size="14" fill="#4B5563">9</text>
  
  <!-- Response JSON -->
  <text x="855" y="170" font-family="monospace" font-size="14" fill="#A78BFA">{</text>
  
  <text x="870" y="190" font-family="monospace" font-size="14" fill="#8B5CF6">"success"</text>
  <text x="950" y="190" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  <text x="965" y="190" font-family="monospace" font-size="14" fill="#F59E0B">true</text>
  <text x="1005" y="190" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  
  <text x="870" y="210" font-family="monospace" font-size="14" fill="#8B5CF6">"id"</text>
  <text x="910" y="210" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  <text x="925" y="210" font-family="monospace" font-size="14" fill="#F59E0B">12345</text>
  <text x="980" y="210" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  
  <text x="870" y="230" font-family="monospace" font-size="14" fill="#8B5CF6">"created_at"</text>
  <text x="985" y="230" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  
  <text x="870" y="250" font-family="monospace" font-size="14" fill="#34D399">"2025-10-12T14:30:00Z"</text>
  <text x="1095" y="250" font-family="monospace" font-size="14" fill="#60A5FA">,</text>
  
  <text x="870" y="270" font-family="monospace" font-size="14" fill="#8B5CF6">"message"</text>
  <text x="960" y="270" font-family="monospace" font-size="14" fill="#60A5FA">:</text>
  
  <text x="870" y="290" font-family="monospace" font-size="14" fill="#34D399">"User created"</text>
  
  <text x="870" y="310" font-family="monospace" font-size="14" fill="#34D399">"successfully"</text>
  
  <text x="855" y="330" font-family="monospace" font-size="14" fill="#A78BFA">}</text>

  <!-- Testing Tools Panel -->
  <rect x="20" y="440" width="560" height="340" rx="12" fill="#1E1B2E" filter="url(#shadow)"/>
  
  <text x="40" y="470" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#E5E7EB">
    Testing Tools
  </text>
  
  <!-- Environment Selector -->
  <text x="40" y="500" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">
    ENVIRONMENT
  </text>
  <rect x="40" y="510" width="240" height="36" rx="6" fill="#2D2A3E"/>
  <text x="55" y="533" font-family="Arial, sans-serif" font-size="14" fill="#E5E7EB">
    Production
  </text>
  <polygon points="265,526 260,521 260,531" fill="#8B5CF6"/>
  
  <!-- Variables Section -->
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">
    VARIABLES
  </text>
  <rect x="300" y="510" width="260" height="36" rx="6" fill="#2D2A3E"/>
  <text x="315" y="533" font-family="monospace" font-size="13" fill="#60A5FA">
    {{base_url}}
  </text>
  <text x="430" y="533" font-family="monospace" font-size="13" fill="#6B7280">
    = api.example.com
  </text>

  <!-- Tests List -->
  <text x="40" y="575" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">
    AUTOMATED TESTS
  </text>
  
  <!-- Test Item 1 -->
  <rect x="40" y="585" width="520" height="40" rx="6" fill="#0D0C15"/>
  <circle cx="60" cy="605" r="6" fill="#10B981"/>
  <text x="80" y="610" font-family="monospace" font-size="13" fill="#E5E7EB">
    Status code is 200
  </text>
  <text x="520" y="610" font-family="monospace" font-size="12" fill="#10B981">
    ✓ PASS
  </text>
  
  <!-- Test Item 2 -->
  <rect x="40" y="635" width="520" height="40" rx="6" fill="#0D0C15"/>
  <circle cx="60" cy="655" r="6" fill="#10B981"/>
  <text x="80" y="660" font-family="monospace" font-size="13" fill="#E5E7EB">
    Response time &lt; 300ms
  </text>
  <text x="520" y="660" font-family="monospace" font-size="12" fill="#10B981">
    ✓ PASS
  </text>
  
  <!-- Test Item 3 -->
  <rect x="40" y="685" width="520" height="40" rx="6" fill="#0D0C15"/>
  <circle cx="60" cy="705" r="6" fill="#10B981"/>
  <text x="80" y="710" font-family="monospace" font-size="13" fill="#E5E7EB">
    Response has valid JSON
  </text>
  <text x="520" y="710" font-family="monospace" font-size="12" fill="#10B981">
    ✓ PASS
  </text>
  
  <!-- Run Tests Button (kept moved up 10px) -->
  <rect x="40" y="730" width="520" height="40" rx="6" fill="url(#purpleGrad)"/>
  <text x="300" y="755" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">
    ▶ Run All Tests
  </text>

  <!-- Documentation Panel -->
  <rect x="600" y="440" width="580" height="340" rx="12" fill="#1E1B2E" filter="url(#shadow)"/>
  
  <text x="620" y="470" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#E5E7EB">
    Documentation
  </text>
  
  <!-- Doc Tabs -->
  <rect x="620" y="485" width="100" height="28" rx="6" fill="url(#blueGrad)"/>
  <text x="670" y="504" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="white" text-anchor="middle">
    Overview
  </text>
  
  <rect x="730" y="485" width="100" height="28" rx="6" fill="#2D2A3E"/>
  <text x="780" y="504" font-family="Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="middle">
    Examples
  </text>
  
  <rect x="840" y="485" width="100" height="28" rx="6" fill="#2D2A3E"/>
  <text x="890" y="504" font-family="Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="middle">
    Schema
  </text>

  <!-- Documentation Content -->
  <rect x="620" y="525" width="540" height="235" rx="8" fill="#0D0C15"/>
  
  <!-- Endpoint Info -->
  <text x="640" y="550" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6">
    POST /v1/users
  </text>
  
  <text x="640" y="575" font-family="Arial, sans-serif" font-size="13" fill="#9CA3AF">
    Creates a new user in the system with the specified
  </text>
  <text x="640" y="595" font-family="Arial, sans-serif" font-size="13" fill="#9CA3AF">
    permissions and role assignment.
  </text>
  
  <!-- Parameters -->
  <text x="640" y="625" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#60A5FA">
    PARAMETERS
  </text>
  
  <text x="640" y="650" font-family="monospace" font-size="13" fill="#8B5CF6">
    name
  </text>
  <text x="720" y="650" font-family="monospace" font-size="12" fill="#6B7280">
    string
  </text>
  <text x="800" y="650" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">
    required
  </text>
  
  <text x="640" y="675" font-family="monospace" font-size="13" fill="#8B5CF6">
    email
  </text>
  <text x="720" y="675" font-family="monospace" font-size="12" fill="#6B7280">
    string
  </text>
  <text x="800" y="675" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">
    required
  </text>
  
  <text x="640" y="700" font-family="monospace" font-size="13" fill="#8B5CF6">
    role
  </text>
  <text x="720" y="700" font-family="monospace" font-size="12" fill="#6B7280">
    string
  </text>
  <text x="800" y="700" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">
    optional
  </text>
  
  <text x="640" y="725" font-family="monospace" font-size="13" fill="#8B5CF6">
    permissions
  </text>
  <text x="720" y="725" font-family="monospace" font-size="12" fill="#6B7280">
    array
  </text>
  <text x="800" y="725" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">
    optional
  </text>
</svg>
