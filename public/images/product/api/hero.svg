<svg width="1250" height="750" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleBlueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connecting Pipes (wider layout: left=150, center=500, right=850) -->
  <g id="pipes" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.3">
    <path d="M 150 150 Q 325 100 500 150" stroke="url(#purpleGradient)"/>
    <path d="M 500 150 Q 675 200 850 150" stroke="url(#blueGradient)"/>
    <path d="M 150 300 L 500 300" stroke="url(#purpleGradient)"/>
    <path d="M 500 300 L 850 300" stroke="url(#blueGradient)"/>
    <path d="M 150 450 Q 325 500 500 450" stroke="url(#purpleGradient)"/>
    <path d="M 500 450 Q 675 400 850 450" stroke="url(#blueGradient)"/>
    <path d="M 500 150 L 500 300" stroke="url(#purpleBlueGradient)"/>
    <path d="M 500 300 L 500 450" stroke="url(#purpleBlueGradient)"/>
  </g>

  <!-- Solid Pipes -->
  <g id="solidPipes" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M 150 150 Q 325 100 500 150" stroke="url(#purpleGradient)"/>
    <path d="M 500 150 Q 675 200 850 150" stroke="url(#blueGradient)"/>
    <path d="M 150 300 L 500 300" stroke="url(#purpleGradient)"/>
    <path d="M 500 300 L 850 300" stroke="url(#blueGradient)"/>
    <path d="M 150 450 Q 325 500 500 450" stroke="url(#purpleGradient)"/>
    <path d="M 500 450 Q 675 400 850 450" stroke="url(#blueGradient)"/>
    <path d="M 500 150 L 500 300" stroke="url(#purpleBlueGradient)"/>
    <path d="M 500 300 L 500 450" stroke="url(#purpleBlueGradient)"/>
  </g>

  <!-- Animated Data Packets (bigger dots) -->
  <g id="dataFlow">
    <circle r="7" fill="#8b5cf6" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#path1"/>
      </animateMotion>
    </circle>
    <path id="path1" d="M 150 150 Q 325 100 500 150" fill="none"/>

    <circle r="7" fill="#3b82f6" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#path2"/>
      </animateMotion>
    </circle>
    <path id="path2" d="M 500 150 Q 675 200 850 150" fill="none"/>

    <circle r="7" fill="#8b5cf6" opacity="0.9">
      <animateMotion dur="2.5s" repeatCount="indefinite">
        <mpath href="#path3"/>
      </animateMotion>
    </circle>
    <path id="path3" d="M 150 300 L 500 300" fill="none"/>

    <circle r="7" fill="#3b82f6" opacity="0.9">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s">
        <mpath href="#path4"/>
      </animateMotion>
    </circle>
    <path id="path4" d="M 500 300 L 850 300" fill="none"/>

    <circle r="7" fill="#8b5cf6" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#path5"/>
      </animateMotion>
    </circle>
    <path id="path5" d="M 150 450 Q 325 500 500 450" fill="none"/>

    <circle r="7" fill="#3b82f6" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite" begin="0.3s">
        <mpath href="#path6"/>
      </animateMotion>
    </circle>
    <path id="path6" d="M 500 450 Q 675 400 850 450" fill="none"/>

    <circle r="7" fill="#8b5cf6" opacity="0.9">
      <animateMotion dur="2s" repeatCount="indefinite">
        <mpath href="#path7"/>
      </animateMotion>
    </circle>
    <path id="path7" d="M 500 150 L 500 300" fill="none"/>

    <circle r="7" fill="#3b82f6" opacity="0.9">
      <animateMotion dur="2s" repeatCount="indefinite">
        <mpath href="#path8"/>
      </animateMotion>
    </circle>
    <path id="path8" d="M 500 300 L 500 450" fill="none"/>
  </g>

  <!-- REST Endpoint Nodes (bigger circles + bigger labels, labels moved lower) -->
  <g id="leftNodes" font-family="Arial, sans-serif">
    <!-- Top -->
    <circle cx="150" cy="150" r="54" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <circle cx="150" cy="150" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <text x="150" y="150" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="bold">GET</text>
    <text x="150" y="232" text-anchor="middle" fill="#8b5cf6" font-size="16" font-weight="700">REST API</text>

    <!-- Middle -->
    <circle cx="150" cy="300" r="54" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <circle cx="150" cy="300" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <text x="150" y="300" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="bold">POST</text>
    <text x="150" y="382" text-anchor="middle" fill="#8b5cf6" font-size="16" font-weight="700">REST API</text>

    <!-- Bottom -->
    <circle cx="150" cy="450" r="54" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <circle cx="150" cy="450" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <text x="150" y="450" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="bold">PUT</text>
    <text x="150" y="532" text-anchor="middle" fill="#8b5cf6" font-size="16" font-weight="700">REST API</text>
  </g>

  <!-- Central Hub (bigger labels) -->
  <g id="centralHub" font-family="Arial, sans-serif">
    <circle cx="500" cy="300" r="75" fill="url(#purpleBlueGradient)" filter="url(#glow)"/>
    <circle cx="500" cy="300" r="65" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <circle cx="500" cy="300" r="52" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>

    <!-- API Symbol -->
    <path d="M 485 290 L 495 280 L 505 290 M 495 280 L 495 320 M 485 310 L 515 310"
          stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <text x="500" y="420" text-anchor="middle" fill="#8b5cf6" font-size="18" font-weight="800">API HUB</text>
  </g>

  <!-- Webhook Endpoint Nodes (bigger labels, labels moved lower) -->
  <g id="rightNodes" font-family="Arial, sans-serif">
    <!-- Top -->
    <circle cx="850" cy="150" r="54" fill="url(#blueGradient)" filter="url(#glow)"/>
    <circle cx="850" cy="150" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <path d="M 840 145 L 845 140 L 860 155 M 845 140 L 845 160 M 860 145 L 845 160"
          stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="850" y="232" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="700">WEBHOOK</text>

    <!-- Middle -->
    <circle cx="850" cy="300" r="54" fill="url(#blueGradient)" filter="url(#glow)"/>
    <circle cx="850" cy="300" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <path d="M 840 295 L 845 290 L 860 305 M 845 290 L 845 310 M 860 295 L 845 310"
          stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="850" y="382" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="700">WEBHOOK</text>

    <!-- Bottom -->
    <circle cx="850" cy="450" r="54" fill="url(#blueGradient)" filter="url(#glow)"/>
    <circle cx="850" cy="450" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <path d="M 840 445 L 845 440 L 860 455 M 845 440 L 845 460 M 860 445 L 845 460"
          stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="850" y="532" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="700">WEBHOOK</text>
  </g>

  <!-- Connection Points (bigger) -->
  <g id="connectionPoints" fill="#fff" opacity="0.9">
    <circle cx="500" cy="150" r="8"/>
    <circle cx="500" cy="450" r="8"/>
  </g>

  <!-- Pipe Indicators (repositioned for wider layout) -->
  <g id="pipeIndicators" opacity="0.6">
    <rect x="300" y="145" width="8" height="10" rx="2" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="650" y="145" width="8" height="10" rx="2" fill="#3b82f6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="300" y="295" width="8" height="10" rx="2" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="650" y="295" width="8" height="10" rx="2" fill="#3b82f6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
  </g>
</svg>
