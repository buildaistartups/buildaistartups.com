<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connection lines -->
  <line x1="400" y1="300" x2="250" y2="150" stroke="url(#blueGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="300" x2="550" y2="150" stroke="url(#purpleGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="400" y1="300" x2="400" y2="480" stroke="url(#tealGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="5,5"/>

  <!-- Central API Key -->
  <g filter="url(#shadow)">
    <circle cx="400" cy="300" r="85" fill="url(#purpleGrad)" opacity="0.1"/>
    <circle cx="400" cy="300" r="75" fill="url(#purpleGrad)"/>
    <!-- Key icon moved up -->
    <g transform="translate(400, 292)">
      <circle cx="0" cy="-10" r="15" fill="none" stroke="white" stroke-width="3"/>
      <rect x="-3" y="5" width="6" height="25" rx="1" fill="white"/>
      <rect x="3" y="20" width="8" height="4" fill="white"/>
      <rect x="3" y="26" width="5" height="4" fill="white"/>
    </g>
    <text x="400" y="345" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="white" text-anchor="middle">API KEY</text>
  </g>

  <!-- Permission Bubble 1: build:write -->
  <g filter="url(#shadow)">
    <rect x="140" y="75" width="220" height="150" rx="14" fill="url(#blueGrad)" opacity="0.95"/>
    <!-- Bigger lock -->
    <g transform="translate(250, 120) scale(1.35)">
      <rect x="-8" y="0" width="16" height="12" rx="2" fill="white"/>
      <path d="M -5,-5 Q -5,-10 0,-10 Q 5,-10 5,-5 L 5,0 L -5,0 Z" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="0" cy="5" r="2" fill="#3B82F6"/>
    </g>
    <text x="250" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">build:write</text>
    <rect x="175" y="182" width="150" height="28" rx="14" fill="white" opacity="0.2"/>
    <text x="250" y="201" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">WRITE ACCESS</text>
  </g>

  <!-- Permission Bubble 2: metrics:read -->
  <g filter="url(#shadow)">
    <rect x="440" y="75" width="220" height="150" rx="14" fill="url(#purpleGrad)" opacity="0.95"/>
    <!-- Bigger lock -->
    <g transform="translate(550, 120) scale(1.35)">
      <rect x="-8" y="0" width="16" height="12" rx="2" fill="white"/>
      <path d="M -5,-5 Q -5,-10 0,-10 Q 5,-10 5,-5 L 5,0 L -5,0 Z" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="0" cy="5" r="2" fill="#8B5CF6"/>
    </g>
    <text x="550" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">metrics:read</text>
    <rect x="475" y="182" width="150" height="28" rx="14" fill="white" opacity="0.2"/>
    <text x="550" y="201" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">READ ONLY</text>
  </g>

  <!-- Permission Bubble 3: marketplace:admin -->
  <g filter="url(#shadow)">
    <rect x="290" y="405" width="220" height="150" rx="14" fill="url(#tealGrad)" opacity="0.95"/>
    <!-- Bigger lock -->
    <g transform="translate(400, 455) scale(1.35)">
      <rect x="-8" y="0" width="16" height="12" rx="2" fill="white"/>
      <path d="M -5,-5 Q -5,-10 0,-10 Q 5,-10 5,-5 L 5,0 L -5,0 Z" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="0" cy="5" r="2" fill="#06B6D4"/>
    </g>
    <text x="400" y="492" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">marketplace:</text>
    <text x="400" y="520" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">admin</text>
    <rect x="325" y="525" width="150" height="28" rx="14" fill="white" opacity="0.2"/>
    <text x="400" y="544" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">FULL CONTROL</text>
  </g>

  <!-- Scope indicators -->
  <g opacity="0.6">
    <circle cx="210" cy="110" r="6" fill="#3B82F6"/>
    <text x="220" y="114" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" font-weight="600">SCOPE</text>

    <circle cx="510" cy="110" r="6" fill="#8B5CF6"/>
    <text x="520" y="114" font-family="Arial, sans-serif" font-size="14" fill="#8B5CF6" font-weight="600">SCOPE</text>

    <circle cx="360" cy="440" r="6" fill="#06B6D4"/>
    <text x="370" y="444" font-family="Arial, sans-serif" font-size="14" fill="#06B6D4" font-weight="600">SCOPE</text>
  </g>

  <!-- Title (blue) -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#3B82F6" text-anchor="middle">
    API Authentication &amp; Permissions
  </text>
</svg>
