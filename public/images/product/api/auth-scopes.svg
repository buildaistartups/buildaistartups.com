<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">API Authentication Scopes & Permissions Diagram</title>
  <desc id="desc">Central API key connected to permission bubbles for build:write, metrics:read, and marketplace:admin using purple and blue colors with lock icons, badges, and scope indicators.</desc>

  <!-- Definitions: gradients, shadows, markers, and icons -->
  <defs>
    <!-- Purples & Blues -->
    <linearGradient id="grad-core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#00B0FF"/>
    </linearGradient>
    <linearGradient id="grad-bubble-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#8E8CF7"/>
    </linearGradient>
    <linearGradient id="grad-bubble-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#5BC0FF"/>
    </linearGradient>
    <linearGradient id="grad-bubble-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F51B5"/>
      <stop offset="100%" stop-color="#7986CB"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a237e" flood-opacity="0.22"/>
    </filter>

    <!-- Glow for connectors -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrowhead marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5E81FF" opacity="0.9"/>
    </marker>

    <!-- Lock icon (padlock) as a symbol -->
    <symbol id="icon-lock" viewBox="0 0 24 24">
      <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM9 7a3 3 0 0 1 6 0v2H9V7zm3 6a2 2 0 0 1 2 2 2 2 0 1 1-4 0 2 2 0 0 1 2-2z" fill="currentColor"/>
    </symbol>

    <!-- Check badge icon -->
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="M9.5 16.2L4.8 11.5l1.9-1.9 2.8 2.8 7-7 1.9 1.9-8.9 8.8z" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Central API Key Node -->
  <g transform="translate(800,500)">
    <!-- Outer ring -->
    <circle r="130" fill="none" stroke="url(#grad-core)" stroke-width="6" opacity="0.7"/>
    <!-- Core circle -->
    <circle r="100" fill="url(#grad-core)" filter="url(#shadow)"/>
    <!-- Core label -->
    <text text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" font-weight="700" fill="#ffffff">API Key</text>

    <!-- Lock overlay -->
    <g transform="translate(-15,-65)" opacity="0.9">
      <circle r="22" fill="#ffffff" opacity="0.18"/>
      <use href="#icon-lock" x="-12" y="-12" width="24" height="24" fill="#ffffff"/>
    </g>
  </g>

  <!-- Positions for bubbles -->
  <!-- Build:Write (upper-left) -->
  <g id="bubble-build" transform="translate(480,260)">
    <!-- Connector -->
    <path d="M320,240 C240,200 160,160 0,0" transform="translate(0,0) translate(320,240) scale(1,-1) translate(-320,-240)"
          fill="none" stroke="#6C8CFF" stroke-width="4" opacity="0.8" filter="url(#glow)" marker-end="url(#arrow)"/>
  </g>

  <!-- Metrics:Read (upper-right) -->
  <g id="bubble-metrics" transform="translate(1120,260)">
    <path d="M-320,240 C-240,200 -160,160 0,0" transform="translate(0,0) translate(-320,240) scale(1,-1) translate(320,-240)"
          fill="none" stroke="#5BC0FF" stroke-width="4" opacity="0.85" filter="url(#glow)" marker-end="url(#arrow)"/>
  </g>

  <!-- Marketplace:Admin (bottom-center) -->
  <g id="bubble-market" transform="translate(800,830)">
    <path d="M0,-230 C0,-140 0,-90 0,0" fill="none" stroke="#7C9CFF" stroke-width="4" opacity="0.85" filter="url(#glow)" marker-end="url(#arrow)"/>
  </g>

  <!-- Bubbles themselves -->
  <!-- Build:Write bubble -->
  <g transform="translate(360,220)">
    <circle cx="0" cy="0" r="110" fill="url(#grad-bubble-purple)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <!-- Lock -->
    <g transform="translate(-65,-70)" opacity="0.9">
      <circle r="20" fill="#ffffff" opacity="0.18"/>
      <use href="#icon-lock" x="-12" y="-12" width="24" height="24" fill="#EAE9FF"/>
    </g>
    <!-- Text -->
    <text x="0" y="-4" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="26" font-weight="700" fill="#FFFFFF">build:write</text>
    <text x="0" y="26" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#E3E8FF" opacity="0.9">Scope: Build pipeline</text>

    <!-- Permission badge -->
    <g transform="translate(0,75)">
      <rect x="-60" y="-16" rx="16" ry="16" width="120" height="32" fill="#5E81FF" opacity="0.95"/>
      <use href="#icon-check" x="-44" y="-10" width="20" height="20" fill="#FFFFFF"/>
      <text x="-18" y="6" font-family="Inter, system-ui" font-size="14" fill="#FFFFFF" font-weight="600">Permission</text>
      <text x="53" y="6" font-family="Inter, system-ui" font-size="14" fill="#DCE6FF">write</text>
    </g>
  </g>

  <!-- Metrics:Read bubble -->
  <g transform="translate(1240,220)">
    <circle cx="0" cy="0" r="110" fill="url(#grad-bubble-blue)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <!-- Lock -->
    <g transform="translate(-65,-70)" opacity="0.9">
      <circle r="20" fill="#ffffff" opacity="0.18"/>
      <use href="#icon-lock" x="-12" y="-12" width="24" height="24" fill="#E0F4FF"/>
    </g>
    <!-- Text -->
    <text x="0" y="-4" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="26" font-weight="700" fill="#FFFFFF">metrics:read</text>
    <text x="0" y="26" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#E6F7FF" opacity="0.9">Scope: Observability</text>

    <!-- Permission badge -->
    <g transform="translate(0,75)">
      <rect x="-60" y="-16" rx="16" ry="16" width="120" height="32" fill="#20A4F3" opacity="0.95"/>
      <use href="#icon-check" x="-44" y="-10" width="20" height="20" fill="#FFFFFF"/>
      <text x="-18" y="6" font-family="Inter, system-ui" font-size="14" fill="#FFFFFF" font-weight="600">Permission</text>
      <text x="53" y="6" font-family="Inter, system-ui" font-size="14" fill="#DEF7FF">read</text>
    </g>
  </g>

  <!-- Marketplace:Admin bubble -->
  <g transform="translate(800,860)">
    <circle cx="0" cy="0" r="120" fill="url(#grad-bubble-indigo)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="122" fill="none" stroke="#FFFFFF" stroke-opacity="0.35"/>
    <!-- Lock -->
    <g transform="translate(-70,-78)" opacity="0.9">
      <circle r="22" fill="#ffffff" opacity="0.18"/>
      <use href="#icon-lock" x="-12" y="-12" width="24" height="24" fill="#E9ECFF"/>
    </g>
    <!-- Text -->
    <text x="0" y="-4" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="26" font-weight="700" fill="#FFFFFF">marketplace:admin</text>
    <text x="0" y="26" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#E8EBFF" opacity="0.9">Scope: Listings & billing</text>

    <!-- Permission badge -->
    <g transform="translate(0,85)">
      <rect x="-68" y="-16" rx="16" ry="16" width="136" height="32" fill="#536DFE" opacity="0.95"/>
      <use href="#icon-check" x="-58" y="-10" width="20" height="20" fill="#FFFFFF"/>
      <text x="-32" y="6" font-family="Inter, system-ui" font-size="14" fill="#FFFFFF" font-weight="600">Permission</text>
      <text x="46" y="6" font-family="Inter, system-ui" font-size="14" fill="#E6E9FF">admin</text>
    </g>
  </g>

  <!-- Scope indicator legends (top-right corner) -->
  <g transform="translate(1340,80)">
    <g>
      <circle cx="0" cy="0" r="10" fill="#7C4DFF" opacity="0.85"/>
      <use href="#icon-check" x="-8" y="-8" width="16" height="16" fill="#FFFFFF"/>
      <text x="18" y="6" font-family="Inter, system-ui" font-size="14" fill="#5C6BC0">Scope enabled</text>
    </g>
    <g transform="translate(0,28)">
      <circle cx="0" cy="0" r="10" fill="#00B0FF" opacity="0.85"/>
      <text x="18" y="6" font-family="Inter, system-ui" font-size="14" fill="#039BE5">Read access</text>
    </g>
    <g transform="translate(0,56)">
      <circle cx="0" cy="0" r="10" fill="#3F51B5" opacity="0.85"/>
      <text x="18" y="6" font-family="Inter, system-ui" font-size="14" fill="#3949AB">Write/Admin access</text>
    </g>
  </g>

  <!-- Corner label -->
  <g transform="translate(80,920)">
    <text font-family="Inter, system-ui" font-size="14" fill="#8EA2FF" opacity="0.9">API Authentication Scopes · Vector · Transparent</text>
  </g>

  <!-- Invisible center point to help screen readers -->
  <circle cx="800" cy="500" r="1" fill="transparent" aria-hidden="true"/>
</svg>
