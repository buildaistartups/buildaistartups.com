<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#darkBg)"/>

  <!-- Sidebar -->
  <g id="sidebar">
    <rect x="0" y="0" width="260" height="900" fill="#0f0f1e" opacity="0.95"/>
    
    <!-- Logo area -->
    <g transform="translate(30, 40)">
      <circle cx="15" cy="15" r="15" fill="url(#purpleBlue)"/>
      <text x="45" y="22" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Dashboard</text>
    </g>
    
    <!-- Navigation items -->
    <!-- Active item -->
    <g transform="translate(20, 120)">
      <rect x="0" y="0" width="220" height="45" rx="8" fill="url(#purpleBlue)" opacity="0.15"/>
      <rect x="0" y="0" width="4" height="45" rx="2" fill="url(#purpleBlue)"/>
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#8b5cf6" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" font-weight="500" fill="#ffffff">Overview</text>
    </g>
    
    <!-- Regular items -->
    <g transform="translate(20, 180)">
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#4a5568" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" fill="#a0aec0">Analytics</text>
    </g>
    
    <g transform="translate(20, 240)">
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#4a5568" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" fill="#a0aec0">Projects</text>
    </g>
    
    <g transform="translate(20, 300)">
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#4a5568" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" fill="#a0aec0">Team</text>
    </g>
    
    <g transform="translate(20, 360)">
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#4a5568" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" fill="#a0aec0">Settings</text>
    </g>
    
    <!-- Separator -->
    <line x1="30" y1="440" x2="230" y2="440" stroke="#2d3748" stroke-width="1"/>
    
    <!-- Bottom items -->
    <g transform="translate(20, 780)">
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#4a5568" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" fill="#a0aec0">Help</text>
    </g>
    
    <g transform="translate(20, 840)">
      <rect x="20" y="13" width="20" height="20" rx="4" fill="#4a5568" opacity="0.6"/>
      <text x="55" y="28" font-family="sans-serif" font-size="15" fill="#a0aec0">Logout</text>
    </g>
  </g>

  <!-- Main content area -->
  <g id="mainContent" transform="translate(260, 0)">
    
    <!-- Header -->
    <g id="header">
      <rect x="0" y="0" width="1140" height="80" fill="#0f0f1e" opacity="0.9" filter="url(#subtleShadow)"/>
      
      <!-- Search bar -->
      <g transform="translate(40, 25)">
        <rect x="0" y="0" width="350" height="40" rx="8" fill="#1a1a2e" stroke="#2d3748" stroke-width="1"/>
        <text x="40" y="25" font-family="sans-serif" font-size="14" fill="#718096">Search...</text>
        <circle cx="18" cy="20" r="8" fill="none" stroke="#718096" stroke-width="2"/>
        <line x1="24" y1="26" x2="28" y2="30" stroke="#718096" stroke-width="2" stroke-linecap="round"/>
      </g>
      
      <!-- Header actions -->
      <g transform="translate(920, 25)">
        <!-- Notification icon -->
        <circle cx="20" cy="20" r="18" fill="#1a1a2e" stroke="#2d3748" stroke-width="1"/>
        <circle cx="20" cy="18" r="8" fill="none" stroke="#718096" stroke-width="2"/>
        <path d="M 14 26 Q 20 30 26 26" fill="none" stroke="#718096" stroke-width="2" stroke-linecap="round"/>
        <circle cx="26" cy="14" r="4" fill="#ef4444"/>
        
        <!-- User avatar -->
        <circle cx="80" cy="20" r="20" fill="url(#purpleBlue)"/>
        <text x="80" y="27" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">JD</text>
        
        <!-- Dropdown indicator -->
        <polygon points="110,18 115,23 120,18" fill="#718096"/>
      </g>
    </g>

    <!-- Content -->
    <g id="content" transform="translate(40, 120)">
      
      <!-- Page title -->
      <text x="0" y="0" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Dashboard Overview</text>
      <text x="0" y="28" font-family="sans-serif" font-size="14" fill="#718096">Welcome back, here's what's happening today</text>

      <!-- Stats cards -->
      <g transform="translate(0, 60)">
        <!-- Card 1 -->
        <g>
          <rect x="0" y="0" width="250" height="120" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
          <text x="25" y="30" font-family="sans-serif" font-size="13" fill="#718096">Total Revenue</text>
          <text x="25" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ffffff">$45,231</text>
          <g transform="translate(25, 80)">
            <text x="0" y="0" font-family="sans-serif" font-size="12" fill="#10b981">↑ 20.1%</text>
            <text x="55" y="0" font-family="sans-serif" font-size="12" fill="#718096">from last month</text>
          </g>
          <circle cx="215" cy="30" r="12" fill="#8b5cf6" opacity="0.2"/>
          <text x="215" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6">$</text>
        </g>
        
        <!-- Card 2 -->
        <g transform="translate(270, 0)">
          <rect x="0" y="0" width="250" height="120" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
          <text x="25" y="30" font-family="sans-serif" font-size="13" fill="#718096">Active Users</text>
          <text x="25" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ffffff">2,340</text>
          <g transform="translate(25, 80)">
            <text x="0" y="0" font-family="sans-serif" font-size="12" fill="#10b981">↑ 15.3%</text>
            <text x="55" y="0" font-family="sans-serif" font-size="12" fill="#718096">from last week</text>
          </g>
          <circle cx="215" cy="30" r="12" fill="#3b82f6" opacity="0.2"/>
          <text x="215" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b82f6">👤</text>
        </g>
        
        <!-- Card 3 -->
        <g transform="translate(540, 0)">
          <rect x="0" y="0" width="250" height="120" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
          <text x="25" y="30" font-family="sans-serif" font-size="13" fill="#718096">Total Orders</text>
          <text x="25" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ffffff">12,234</text>
          <g transform="translate(25, 80)">
            <text x="0" y="0" font-family="sans-serif" font-size="12" fill="#ef4444">↓ 4.3%</text>
            <text x="50" y="0" font-family="sans-serif" font-size="12" fill="#718096">from last month</text>
          </g>
          <circle cx="215" cy="30" r="12" fill="#8b5cf6" opacity="0.2"/>
          <text x="215" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b5cf6">📦</text>
        </g>
        
        <!-- Card 4 -->
        <g transform="translate(810, 0)">
          <rect x="0" y="0" width="250" height="120" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
          <text x="25" y="30" font-family="sans-serif" font-size="13" fill="#718096">Conversion Rate</text>
          <text x="25" y="65" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ffffff">3.45%</text>
          <g transform="translate(25, 80)">
            <text x="0" y="0" font-family="sans-serif" font-size="12" fill="#10b981">↑ 2.1%</text>
            <text x="50" y="0" font-family="sans-serif" font-size="12" fill="#718096">from last week</text>
          </g>
          <circle cx="215" cy="30" r="12" fill="#3b82f6" opacity="0.2"/>
          <text x="215" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b82f6">%</text>
        </g>
      </g>

      <!-- Charts section -->
      <g transform="translate(0, 220)">
        <!-- Line chart card -->
        <g>
          <rect x="0" y="0" width="640" height="320" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
          <text x="25" y="35" font-family="sans-serif" font-size="18" font-weight="600" fill="#ffffff">Revenue Overview</text>
          <text x="25" y="58" font-family="sans-serif" font-size="13" fill="#718096">Monthly revenue trend</text>
          
          <!-- Chart area -->
          <g transform="translate(40, 100)">
            <!-- Grid lines -->
            <line x1="0" y1="0" x2="570" y2="0" stroke="#2d3748" stroke-width="1"/>
            <line x1="0" y1="50" x2="570" y2="50" stroke="#2d3748" stroke-width="1"/>
            <line x1="0" y1="100" x2="570" y2="100" stroke="#2d3748" stroke-width="1"/>
            <line x1="0" y1="150" x2="570" y2="150" stroke="#2d3748" stroke-width="1"/>
            <line x1="0" y1="180" x2="570" y2="180" stroke="#2d3748" stroke-width="1"/>
            
            <!-- Line chart -->
            <path d="M 0 150 L 80 120 L 160 140 L 240 90 L 320 100 L 400 60 L 480 50 L 570 30" 
                  fill="none" stroke="url(#purpleBlue)" stroke-width="3"/>
            
            <!-- Area under curve -->
            <path d="M 0 150 L 80 120 L 160 140 L 240 90 L 320 100 L 400 60 L 480 50 L 570 30 L 570 180 L 0 180 Z" 
                  fill="url(#purpleBlue)" opacity="0.1"/>
            
            <!-- Data points -->
            <circle cx="0" cy="150" r="4" fill="#8b5cf6"/>
            <circle cx="80" cy="120" r="4" fill="#8b5cf6"/>
            <circle cx="160" cy="140" r="4" fill="#3b82f6"/>
            <circle cx="240" cy="90" r="4" fill="#3b82f6"/>
            <circle cx="320" cy="100" r="4" fill="#8b5cf6"/>
            <circle cx="400" cy="60" r="4" fill="#8b5cf6"/>
            <circle cx="480" cy="50" r="4" fill="#3b82f6"/>
            <circle cx="570" cy="30" r="5" fill="#3b82f6">
              <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
            </circle>
            
            <!-- X-axis labels -->
            <text x="0" y="200" font-family="sans-serif" font-size="11" fill="#718096">Jan</text>
            <text x="80" y="200" font-family="sans-serif" font-size="11" fill="#718096">Feb</text>
            <text x="160" y="200" font-family="sans-serif" font-size="11" fill="#718096">Mar</text>
            <text x="240" y="200" font-family="sans-serif" font-size="11" fill="#718096">Apr</text>
            <text x="320" y="200" font-family="sans-serif" font-size="11" fill="#718096">May</text>
            <text x="400" y="200" font-family="sans-serif" font-size="11" fill="#718096">Jun</text>
            <text x="480" y="200" font-family="sans-serif" font-size="11" fill="#718096">Jul</text>
            <text x="560" y="200" font-family="sans-serif" font-size="11" fill="#718096">Aug</text>
          </g>
        </g>
        
        <!-- Bar chart card -->
        <g transform="translate(660, 0)">
          <rect x="0" y="0" width="400" height="320" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
          <text x="25" y="35" font-family="sans-serif" font-size="18" font-weight="600" fill="#ffffff">Traffic Sources</text>
          <text x="25" y="58" font-family="sans-serif" font-size="13" fill="#718096">Top performing channels</text>
          
          <!-- Bar chart -->
          <g transform="translate(40, 100)">
            <!-- Bars -->
            <rect x="20" y="80" width="45" height="120" rx="4" fill="url(#purpleBlue)" opacity="0.8"/>
            <rect x="95" y="110" width="45" height="90" rx="4" fill="url(#purpleBlue)" opacity="0.6"/>
            <rect x="170" y="130" width="45" height="70" rx="4" fill="url(#purpleBlue)" opacity="0.5"/>
            <rect x="245" y="150" width="45" height="50" rx="4" fill="url(#purpleBlue)" opacity="0.4"/>
            <rect x="320" y="165" width="45" height="35" rx="4" fill="url(#purpleBlue)" opacity="0.3"/>
            
            <!-- Labels -->
            <text x="42" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#718096">Direct</text>
            <text x="117" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#718096">Social</text>
            <text x="192" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#718096">Search</text>
            <text x="267" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#718096">Email</text>
            <text x="342" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#718096">Other</text>
            
            <!-- Values -->
            <text x="42" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">45%</text>
            <text x="117" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">32%</text>
            <text x="192" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#3b82f6">18%</text>
            <text x="267" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#3b82f6">12%</text>
            <text x="342" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#718096">8%</text>
          </g>
        </g>
      </g>

      <!-- Recent activity table -->
      <g transform="translate(0, 560)">
        <rect x="0" y="0" width="1060" height="180" rx="12" fill="#1a1a2e" filter="url(#cardShadow)"/>
        <text x="25" y="35" font-family="sans-serif" font-size="18" font-weight="600" fill="#ffffff">Recent Activity</text>
        
        <!-- Action button -->
        <g transform="translate(920, 15)">
          <rect x="0" y="0" width="110" height="35" rx="6" fill="url(#purpleBlue)" opacity="0.9"/>
          <text x="55" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#ffffff">View All</text>
        </g>
        
        <!-- Table header -->
        <g transform="translate(25, 70)">
          <text x="0" y="0" font-family="sans-serif" font-size="12" font-weight="600" fill="#718096">USER</text>
          <text x="250" y="0" font-family="sans-serif" font-size="12" font-weight="600" fill="#718096">ACTION</text>
          <text x="500" y="0" font-family="sans-serif" font-size="12" font-weight="600" fill="#718096">DATE</text>
          <text x="750" y="0" font-family="sans-serif" font-size="12" font-weight="600" fill="#718096">STATUS</text>
        </g>
        
        <!-- Table rows -->
        <g transform="translate(25, 95)">
          <!-- Row 1 -->
          <g>
            <circle cx="12" cy="12" r="12" fill="#8b5cf6"/>
            <text x="12" y="17" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ffffff">JD</text>
            <text x="40" y="17" font-family="sans-serif" font-size="13" fill="#ffffff">John Doe</text>
            <text x="250" y="17" font-family="sans-serif" font-size="13" fill="#a0aec0">Created new project</text>
            <text x="500" y="17" font-family="sans-serif" font-size="13" fill="#718096">2 hours ago</text>
            <rect x="750" y="5" width="70" height="20" rx="10" fill="#10b981" opacity="0.2"/>
            <text x="785" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#10b981">Success</text>
          </g>
          
          <!-- Row 2 -->
          <g transform="translate(0, 35)">
            <circle cx="12" cy="12" r="12" fill="#3b82f6"/>
            <text x="12" y="17" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ffffff">SA</text>
            <text x="40" y="17" font-family="sans-serif" font-size="13" fill="#ffffff">Sarah Anderson</text>
            <text x="250" y="17" font-family="sans-serif" font-size="13" fill="#a0aec0">Updated dashboard</text>
            <text x="500" y="17" font-family="sans-serif" font-size="13" fill="#718096">5 hours ago</text>
            <rect x="750" y="5" width="70" height="20" rx="10" fill="#3b82f6" opacity="0.2"/>
            <text x="785" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">Pending</text>
          </g>
          
          <!-- Row 3 -->
          <g transform="translate(0, 70)">
            <circle cx="12" cy="12" r="12" fill="#8b5cf6"/>
            <text x="12" y="17" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ffffff">MK</text>
            <text x="40" y="17" font-family="sans-serif" font-size="13" fill="#ffffff">Michael Kim</text>
            <text x="250" y="17" font-family="sans-serif" font-size="13" fill="#a0aec0">Deployed to production</text>
            <text x="500" y="17" font-family="sans-serif" font-size="13" fill="#718096">1 day ago</text>
            <rect x="750" y="5" width="70" height="20" rx="10" fill="#10b981" opacity="0.2"/>
            <text x="785" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#10b981">Success</text>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
