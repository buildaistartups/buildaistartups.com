<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" class="svg-play-once">
  
  <style>
    .svg-play-once {
      animation: fadeIn 0.6s ease-in;
    }
    
    .svg-play-once * {
      animation-play-state: paused;
    }
    
    .svg-play-once.is-visible * {
      animation-play-state: running;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Stage 1: Idea (Left) -->
  <g id="stage1" transform="translate(100, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#purpleBlue)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2s" repeatCount="1"/>
    </circle>
    
    <!-- Light bulb icon -->
    <circle cx="50" cy="45" r="15" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M 42 60 L 58 60" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M 45 63 L 55 63" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M 47 66 L 53 66" stroke="#8b5cf6" stroke-width="2"/>
    
    <!-- Sparkles -->
    <g opacity="0.6">
      <path d="M 30 30 L 32 35 L 30 40 L 28 35 Z" fill="#8b5cf6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="1"/>
      </path>
      <path d="M 70 35 L 72 40 L 70 45 L 68 40 Z" fill="#3b82f6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="1"/>
      </path>
    </g>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Idea</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" opacity="0.7">Describe your vision</text>
  </g>

  <!-- Arrow 1 -->
  <g id="arrow1">
    <path d="M 220 300 L 380 300" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2s" repeatCount="1"/>
    </path>
    <polygon points="380,300 370,295 370,305" fill="#3b82f6"/>
    
    <circle r="6" fill="#8b5cf6" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="1" path="M 220 300 L 380 300"/>
    </circle>
  </g>

  <!-- Stage 2: Research (Center) -->
  <g id="stage2" transform="translate(500, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#blueGradient)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2.2s" repeatCount="1"/>
    </circle>
    
    <!-- Magnifying glass icon -->
    <circle cx="45" cy="45" r="12" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M 54 54 L 62 62" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Search particles -->
    <g opacity="0.6">
      <circle cx="35" cy="35" r="2" fill="#3b82f6">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="1"/>
      </circle>
      <circle cx="55" cy="40" r="2" fill="#8b5cf6">
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="1"/>
      </circle>
      <circle cx="40" cy="55" r="2" fill="#3b82f6">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="1"/>
      </circle>
    </g>
    
    <!-- Rotating ring -->
    <circle cx="50" cy="50" r="35" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" stroke-dasharray="5 5">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 50 50"
        to="360 50 50"
        dur="4s"
        repeatCount="1"/>
    </circle>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">Research</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" opacity="0.7">AI analyzes requirements</text>
  </g>

  <!-- Arrow 2 -->
  <g id="arrow2">
    <path d="M 620 300 L 780 300" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2s" repeatCount="1" begin="0.5s"/>
    </path>
    <polygon points="780,300 770,295 770,305" fill="#8b5cf6"/>
    
    <circle r="6" fill="#3b82f6" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="1" begin="0.5s" path="M 620 300 L 780 300"/>
    </circle>
  </g>

  <!-- Stage 3: Spec (Right) -->
  <g id="stage3" transform="translate(900, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#purpleBlue)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2.5s" repeatCount="1"/>
    </circle>
    
    <!-- Document icon -->
    <rect x="35" y="35" width="30" height="35" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="40" y1="45" x2="60" y2="45" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="40" y1="52" x2="60" y2="52" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="40" y1="59" x2="55" y2="59" stroke="#8b5cf6" stroke-width="1.5"/>
    
    <!-- Checkmarks appearing -->
    <g opacity="0.8">
      <path d="M 38 47 L 40 49 L 43 46" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" from="0 10" to="10 0" dur="0.5s" repeatCount="1" begin="1s"/>
      </path>
      <path d="M 38 54 L 40 56 L 43 53" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" from="0 10" to="10 0" dur="0.5s" repeatCount="1" begin="1.3s"/>
      </path>
      <path d="M 38 61 L 40 63 L 43 60" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" from="0 10" to="10 0" dur="0.5s" repeatCount="1" begin="1.6s"/>
      </path>
    </g>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Spec</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" opacity="0.7">Complete specification</text>
  </g>

  <!-- Background decorative elements -->
  <g opacity="0.1">
    <circle cx="50" cy="50" r="3" fill="#8b5cf6"/>
    <circle cx="1150" cy="550" r="3" fill="#3b82f6"/>
    <circle cx="600" cy="100" r="2" fill="#8b5cf6"/>
    <circle cx="600" cy="500" r="2" fill="#3b82f6"/>
  </g>
</svg>
