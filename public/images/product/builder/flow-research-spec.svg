<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Light Bulb (Idea) -->
  <g transform="translate(220, 300)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.5s" fill="freeze"/>
    
    <!-- Outer glow effect -->
    <ellipse cx="0" cy="-40" rx="95" ry="105" fill="url(#purpleBlue)" opacity="0.08"/>
    
    <!-- Main bulb glass -->
    <path d="M 0 -110 
             C -50 -110 -70 -80 -70 -45
             C -70 -15 -55 0 -40 15
             C -38 17 -37 20 -37 23
             L -37 38
             L 37 38
             L 37 23
             C 37 20 38 17 40 15
             C 55 0 70 -15 70 -45
             C 70 -80 50 -110 0 -110 Z" 
          fill="url(#purpleBlue)" fill-opacity="0.03"
          stroke="url(#purpleBlue)" stroke-width="7"/>
    
    <ellipse cx="0" cy="-50" rx="50" ry="55" fill="url(#purpleBlue)" opacity="0.05"/>
    <ellipse cx="-32" cy="-75" rx="18" ry="28" fill="#ffffff" opacity="0.25"/>
    <path d="M -40 -85 Q -28 -98 -18 -102" 
          fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <circle cx="-35" cy="-55" r="6" fill="#8b5cf6" opacity="0.2"/>
    <circle cx="28" cy="-70" r="4" fill="#3b82f6" opacity="0.15"/>
    <path d="M 45 -60 Q 50 -70 52 -78" 
          fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
    
    <!-- Metal screw base -->
    <g>
      <rect x="-37" y="38" width="74" height="48" rx="2" fill="#8b5cf6" fill-opacity="0.08" stroke="url(#purpleBlue)" stroke-width="7"/>
      <line x1="-37" y1="47" x2="37" y2="47" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/>
      <line x1="-37" y1="56" x2="37" y2="56" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/>
      <line x1="-37" y1="65" x2="37" y2="65" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/>
      <line x1="-37" y1="74" x2="37" y2="74" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/>
      <line x1="-30" y1="40" x2="-30" y2="84" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2"/>
      <line x1="30" y1="40" x2="30" y2="84" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
    </g>
    
    <ellipse cx="0" cy="86" rx="32" ry="9" fill="#8b5cf6" fill-opacity="0.1" stroke="url(#purpleBlue)" stroke-width="7"/>
    <ellipse cx="0" cy="86" rx="15" ry="5" fill="#8b5cf6" opacity="0.25"/>
    <circle cx="0" cy="86" r="4" fill="url(#purpleBlue)" opacity="0.4"/>
    
    <!-- Filament -->
    <g opacity="0.75">
      <line x1="0" y1="20" x2="0" y2="-15" stroke="#8b5cf6" stroke-width="2.5"/>
      <path d="M -22 -15 L -22 -35 Q -22 -48 -12 -54 L 12 -54 Q 22 -48 22 -35 L 22 -15" 
            fill="none" stroke="#8b5cf6" stroke-width="4.5"/>
      <path d="M -18 -20 L -18 -38 Q -18 -46 -8 -50 L 8 -50 Q 18 -46 18 -38 L 18 -20" 
            fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
      <line x1="-22" y1="-15" x2="-28" y2="8" stroke="#8b5cf6" stroke-width="2.5"/>
      <line x1="22" y1="-15" x2="28" y2="8" stroke="#8b5cf6" stroke-width="2.5"/>
      <ellipse cx="0" cy="-35" rx="28" ry="25" fill="#8b5cf6" opacity="0.08"/>
    </g>
    
    <!-- Light rays - FADE IN ONCE -->
    <line x1="0" y1="-110" x2="0" y2="-145" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="0.3s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="63" y1="-95" x2="88" y2="-122" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="0.4s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="88" y1="-35" x2="123" y2="-35" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="0.5s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="-63" y1="-95" x2="-88" y2="-122" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="0.6s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="-88" y1="-35" x2="-123" y2="-35" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="0.7s" dur="0.6s" fill="freeze"/>
    </line>
    
    <line x1="47" y1="-100" x2="60" y2="-118" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="0.45s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="-47" y1="-100" x2="-60" y2="-118" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="0.65s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="78" y1="-60" x2="98" y2="-72" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="0.55s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="-78" y1="-60" x2="-98" y2="-72" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" begin="0.35s" dur="0.6s" fill="freeze"/>
    </line>
  </g>

  <!-- Flowing Arrow 1 - DRAW ONCE -->
  <g>
    <path d="M 350 300 Q 420 240 490 300" fill="none" stroke="url(#purpleBlue)" stroke-width="6" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" begin="0.5s" dur="0.8s" fill="freeze"/>
    </path>
    <polygon points="490,288 515,300 490,312" fill="url(#purpleBlue)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
    </polygon>
  </g>

  <!-- Magnifying Glass - SCALE IN -->
  <g transform="translate(600, 300)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="600,300" to="600,300" begin="0.8s" dur="0.01s" fill="freeze"/>
    <animateTransform attributeName="transform" type="scale" additive="sum" from="0.8" to="1" begin="0.8s" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.5s" fill="freeze"/>
    
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#purpleBlue)" stroke-width="7"/>
    <line x1="67" y1="67" x2="110" y2="110" stroke="url(#purpleBlue)" stroke-width="11" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
    
    <g transform="translate(-32, -12)" opacity="0.6">
      <rect x="0" y="25" width="10" height="19" fill="#8b5cf6"/>
      <rect x="15" y="15" width="10" height="29" fill="#8b5cf6"/>
      <rect x="30" y="20" width="10" height="24" fill="#3b82f6"/>
      <rect x="45" y="10" width="10" height="34" fill="#3b82f6"/>
      <path d="M 5 25 L 20 15 L 35 20 L 50 10" fill="none" stroke="#8b5cf6" stroke-width="3"/>
      <circle cx="5" cy="25" r="4" fill="#8b5cf6"/>
      <circle cx="20" cy="15" r="4" fill="#8b5cf6"/>
      <circle cx="35" cy="20" r="4" fill="#3b82f6"/>
      <circle cx="50" cy="10" r="4" fill="#3b82f6"/>
    </g>
    
    <g transform="translate(-18, -45)" opacity="0.5">
      <circle cx="0" cy="0" r="5" fill="#3b82f6"/>
      <circle cx="25" cy="-10" r="5" fill="#3b82f6"/>
      <circle cx="25" cy="10" r="5" fill="#8b5cf6"/>
      <line x1="0" y1="0" x2="25" y2="-10" stroke="#3b82f6" stroke-width="3"/>
      <line x1="0" y1="0" x2="25" y2="10" stroke="#8b5cf6" stroke-width="3"/>
    </g>
  </g>

  <!-- Flowing Arrow 2 - DRAW ONCE -->
  <g>
    <path d="M 710 300 Q 780 360 850 300" fill="none" stroke="url(#purpleBlue)" stroke-width="6" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" begin="1.3s" dur="0.8s" fill="freeze"/>
    </path>
    <polygon points="850,288 875,300 850,312" fill="url(#purpleBlue)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.3s" fill="freeze"/>
    </polygon>
  </g>

  <!-- Document - SCALE IN -->
  <g transform="translate(1000, 300)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="1000,300" to="1000,300" begin="1.6s" dur="0.01s" fill="freeze"/>
    <animateTransform attributeName="transform" type="scale" additive="sum" from="0.8" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    
    <rect x="-95" y="-120" width="190" height="240" rx="15" fill="none" stroke="url(#purpleBlue)" stroke-width="7"/>
    <path d="M 57 -120 L 57 -82 L 95 -82" fill="none" stroke="url(#purpleBlue)" stroke-width="7" stroke-linejoin="round"/>
    <path d="M 57 -120 L 57 -82 L 95 -82 Z" fill="#8b5cf6" opacity="0.15"/>
    
    <g transform="translate(-70, -75)">
      <circle cx="0" cy="0" r="13" fill="none" stroke="#3b82f6" stroke-width="4"/>
      <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="20" y1="-3" x2="115" y2="-3" stroke="#3b82f6" stroke-width="4" opacity="0.4"/>
      <line x1="20" y1="5" x2="90" y2="5" stroke="#3b82f6" stroke-width="4" opacity="0.4"/>
    </g>
    
    <g transform="translate(-70, -20)">
      <circle cx="0" cy="0" r="13" fill="none" stroke="#8b5cf6" stroke-width="4"/>
      <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="20" y1="-3" x2="110" y2="-3" stroke="#8b5cf6" stroke-width="4" opacity="0.4"/>
      <line x1="20" y1="5" x2="95" y2="5" stroke="#8b5cf6" stroke-width="4" opacity="0.4"/>
    </g>
    
    <g transform="translate(-70, 35)">
      <circle cx="0" cy="0" r="13" fill="none" stroke="#3b82f6" stroke-width="4"/>
      <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="20" y1="-3" x2="105" y2="-3" stroke="#3b82f6" stroke-width="4" opacity="0.4"/>
      <line x1="20" y1="5" x2="85" y2="5" stroke="#3b82f6" stroke-width="4" opacity="0.4"/>
    </g>
    
    <g transform="translate(-70, 90)">
      <circle cx="0" cy="0" r="13" fill="none" stroke="#8b5cf6" stroke-width="4"/>
      <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="20" y1="-3" x2="95" y2="-3" stroke="#8b5cf6" stroke-width="4" opacity="0.4"/>
    </g>
  </g>

  <!-- Network nodes -->
  <g transform="translate(600, 470)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="1.8s" dur="0.4s" fill="freeze"/>
    <circle cx="-25" cy="0" r="8" fill="#3b82f6"/>
    <circle cx="0" cy="-20" r="8" fill="#8b5cf6"/>
    <circle cx="0" cy="20" r="8" fill="#8b5cf6"/>
    <circle cx="25" cy="0" r="8" fill="#3b82f6"/>
    <line x1="-25" y1="0" x2="0" y2="-20" stroke="#3b82f6" stroke-width="3"/>
    <line x1="-25" y1="0" x2="0" y2="20" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="25" y1="0" x2="0" y2="-20" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="25" y1="0" x2="0" y2="20" stroke="#3b82f6" stroke-width="3"/>
  </g>
</svg>
