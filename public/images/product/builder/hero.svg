<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" class="svg-play-once">
  
  <style>
    .svg-play-once {
      animation: fadeIn 0.6s ease-in;
    }
    
    .svg-play-once * {
      animation-play-state: paused;
    }
    
    .svg-play-once.is-visible * {
      animation-play-state: running;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="600" cy="300" r="250" fill="url(#coreGlow)" opacity="0.3"/>

  <!-- AI Core - Center -->
  <g id="aiCore">
    <!-- Rotating rings -->
    <circle cx="600" cy="300" r="100" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.3"/>
    
    <circle cx="600" cy="300" r="80" fill="none" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.5">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 600 300"
        to="360 600 300"
        dur="20s"
        repeatCount="1"/>
    </circle>
    
    <circle cx="600" cy="300" r="60" fill="none" stroke="url(#blueGradient)" stroke-width="2" opacity="0.5">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 600 300"
        to="-360 600 300"
        dur="15s"
        repeatCount="1"/>
    </circle>
    
    <!-- Core processor -->
    <circle cx="600" cy="300" r="45" fill="url(#blueGradient)" opacity="0.3"/>
    
    <!-- Neural network nodes -->
    <g id="neuralNetwork">
      <!-- Corner nodes -->
      <circle cx="560" cy="260" r="8" fill="#8b5cf6" filter="url(#glow)"/>
      <circle cx="640" cy="260" r="8" fill="#3b82f6" filter="url(#glow)"/>
      <circle cx="560" cy="340" r="8" fill="#3b82f6" filter="url(#glow)"/>
      <circle cx="640" cy="340" r="8" fill="#8b5cf6" filter="url(#glow)"/>
      
      <!-- Cardinal nodes -->
      <circle cx="600" cy="245" r="6" fill="#8b5cf6" filter="url(#glow)"/>
      <circle cx="655" cy="300" r="6" fill="#3b82f6" filter="url(#glow)"/>
      <circle cx="600" cy="355" r="6" fill="#8b5cf6" filter="url(#glow)"/>
      <circle cx="545" cy="300" r="6" fill="#3b82f6" filter="url(#glow)"/>
      
      <!-- Center node -->
      <circle cx="600" cy="300" r="10" fill="url(#purpleBlue)" filter="url(#glow)"/>
      
      <!-- Connections -->
      <line x1="560" y1="260" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="640" y1="260" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="560" y1="340" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="640" y1="340" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="600" y1="245" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="655" y1="300" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="600" y1="355" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
      <line x1="545" y1="300" x2="600" y2="300" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    </g>
    
    <!-- Orbiting particles -->
    <g id="orbitingParticles">
      <circle cx="680" cy="300" r="5" fill="#8b5cf6" filter="url(#glow)">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 600 300"
          to="360 600 300"
          dur="4s"
          repeatCount="1"/>
      </circle>
      
      <circle cx="520" cy="300" r="5" fill="#3b82f6" filter="url(#glow)">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="180 600 300"
          to="540 600 300"
          dur="4s"
          repeatCount="1"/>
      </circle>
    </g>
  </g>

  <!-- Input sources (Left/Bottom) -->
  <g id="inputSources">
    <!-- Database -->
    <g id="database" transform="translate(150, 480)">
      <ellipse cx="20" cy="0" rx="20" ry="7" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <rect x="0" y="0" width="40" height="15" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <ellipse cx="20" cy="15" rx="20" ry="7" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    </g>
    
    <!-- Document -->
    <g id="document" transform="translate(100, 300)">
      <path d="M 0 0 L 30 0 L 30 5 L 35 10 L 35 40 L 0 40 Z" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 30 5 L 35 10 L 30 10 Z" fill="#3b82f6" opacity="0.3"/>
      <line x1="5" y1="15" x2="25" y2="15" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
      <line x1="5" y1="20" x2="30" y2="20" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
      <line x1="5" y1="25" x2="25" y2="25" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    </g>
    
    <!-- API -->
    <g id="api" transform="translate(400, 520)">
      <rect x="0" y="0" width="60" height="40" rx="5" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <text x="30" y="25" font-family="monospace" font-size="14" fill="#8b5cf6" text-anchor="middle">API</text>
    </g>
  </g>

  <!-- Output components (Right/Top) -->
  <g id="outputComponents">
    <!-- Code output -->
    <g id="codeOutput" transform="translate(950, 120)">
      <rect x="0" y="0" width="180" height="120" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <rect x="5" y="5" width="170" height="25" rx="3" fill="#8b5cf6" opacity="0.3"/>
      <line x1="10" y1="45" x2="100" y2="45" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
      <line x1="10" y1="60" x2="140" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
      <line x1="10" y1="75" x2="80" y2="75" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
      <line x1="10" y1="90" x2="120" y2="90" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
      <text x="15" y="50" font-family="monospace" font-size="16" fill="url(#purpleBlue)">{</text>
      <text x="15" y="100" font-family="monospace" font-size="16" fill="url(#purpleBlue)">}</text>
    </g>
    
    <!-- Dashboard output -->
    <g id="dashboardOutput" transform="translate(980, 300)">
      <rect x="0" y="0" width="160" height="120" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <circle cx="15" cy="15" r="4" fill="#3b82f6"/>
      <circle cx="30" cy="15" r="4" fill="#8b5cf6"/>
      <circle cx="45" cy="15" r="4" fill="#3b82f6"/>
      
      <!-- Bar chart -->
      <rect x="20" y="80" width="15" height="40" fill="#8b5cf6" opacity="0.6"/>
      <rect x="45" y="90" width="15" height="30" fill="#3b82f6" opacity="0.6"/>
      <rect x="70" y="75" width="15" height="45" fill="#8b5cf6" opacity="0.6"/>
      <rect x="95" y="85" width="15" height="35" fill="#3b82f6" opacity="0.6"/>
      <rect x="120" y="78" width="15" height="42" fill="#8b5cf6" opacity="0.6"/>
      
      <!-- Graph line -->
      <path d="M 20 60 L 45 50 L 70 55 L 95 45 L 120 50 L 145 40" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
    </g>
    
    <!-- Mobile app output -->
    <g id="mobileOutput" transform="translate(1020, 480)">
      <rect x="0" y="0" width="130" height="90" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <rect x="5" y="5" width="120" height="18" rx="3" fill="url(#blueGradient)" opacity="0.3"/>
      <rect x="10" y="35" width="100" height="8" rx="2" fill="#8b5cf6" opacity="0.5"/>
      <rect x="10" y="50" width="80" height="8" rx="2" fill="#3b82f6" opacity="0.5"/>
      <rect x="10" y="65" width="60" height="8" rx="2" fill="#8b5cf6" opacity="0.5"/>
    </g>
  </g>

  <!-- Data flow animations -->
  <g id="dataFlows">
    <!-- Input flows -->
    <path id="flowFromDatabase" d="M 190 465 Q 350 400 520 340" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="3s" repeatCount="1"/>
    </path>
    
    <path id="flowFromDocument" d="M 135 290 Q 300 290 480 300" fill="none" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2.5s" repeatCount="1"/>
    </path>
    
    <path id="flowFromAPI" d="M 430 505 Q 500 430 540 360" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2.8s" repeatCount="1"/>
    </path>
    
    <!-- Flowing particles on input paths -->
    <circle r="5" fill="#8b5cf6" filter="url(#glow)">
      <animateMotion dur="3s" repeatCount="1">
        <mpath href="#flowFromDatabase"/>
      </animateMotion>
    </circle>
    
    <circle r="5" fill="#3b82f6" filter="url(#glow)">
      <animateMotion dur="2.5s" repeatCount="1">
        <mpath href="#flowFromDocument"/>
      </animateMotion>
    </circle>
    
    <!-- Output flows -->
    <path id="flowToCode" d="M 680 250 Q 800 200 950 150" fill="none" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="3s" repeatCount="1"/>
    </path>
    
    <path id="flowToDashboard" d="M 700 300 Q 800 300 980 300" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2.7s" repeatCount="1"/>
    </path>
    
    <path id="flowToMobile" d="M 670 360 Q 800 420 1020 500" fill="none" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="3.2s" repeatCount="1"/>
    </path>
    
    <!-- Flowing particles on output paths -->
    <circle r="5" fill="#8b5cf6" filter="url(#glow)">
      <animateMotion dur="3s" repeatCount="1">
        <mpath href="#flowToCode"/>
      </animateMotion>
    </circle>
    
    <circle r="5" fill="#3b82f6" filter="url(#glow)">
      <animateMotion dur="2.7s" repeatCount="1">
        <mpath href="#flowToDashboard"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Decorative elements -->
  <g id="decorativeElements">
    <!-- Corner accents -->
    <circle cx="80" cy="80" r="6" fill="#8b5cf6" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="1"/>
    </circle>
    <circle cx="95" cy="95" r="4" fill="#3b82f6" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.3s" repeatCount="1"/>
    </circle>
    
    <circle cx="1120" cy="520" r="5" fill="#8b5cf6" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.1s" repeatCount="1"/>
    </circle>
    <circle cx="1105" cy="535" r="6" fill="#3b82f6" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="1"/>
    </circle>
    
    <!-- Circuit patterns -->
    <g opacity="0.2">
      <path d="M 300 100 L 350 100 L 350 130" stroke="#8b5cf6" stroke-width="2" fill="none"/>
      <circle cx="350" cy="130" r="3" fill="#8b5cf6"/>
      
      <path d="M 200 500 L 250 500 L 250 470" stroke="#3b82f6" stroke-width="2" fill="none"/>
      <circle cx="250" cy="470" r="3" fill="#3b82f6"/>
      
      <path d="M 900 550 L 950 550 L 950 520" stroke="#8b5cf6" stroke-width="2" fill="none"/>
      <circle cx="950" cy="520" r="3" fill="#8b5cf6"/>
      
      <path d="M 850 80 L 900 80 L 900 110" stroke="#3b82f6" stroke-width="2" fill="none"/>
      <circle cx="900" cy="110" r="3" fill="#3b82f6"/>
    </g>
    
    <!-- Floating code snippets -->
    <text x="250" y="200" font-family="monospace" font-size="14" fill="#8b5cf6" opacity="0.3">async</text>
    <text x="780" y="520" font-family="monospace" font-size="14" fill="#3b82f6" opacity="0.3">await</text>
    <text x="150" y="420" font-family="monospace" font-size="14" fill="#8b5cf6" opacity="0.3">const</text>
    <text x="880" y="250" font-family="monospace" font-size="14" fill="#3b82f6" opacity="0.3">return</text>
    
    <!-- Network nodes -->
    <circle cx="320" cy="180" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="420" cy="140" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="280" cy="420" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="820" cy="420" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="760" cy="180" r="3" fill="#8b5cf6" opacity="0.5"/>
    <line x1="320" y1="180" x2="420" y2="140" stroke="url(#purpleBlue)" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
