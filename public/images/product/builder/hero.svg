<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="coreGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow from center - FADE IN -->
  <circle cx="600" cy="300" r="250" fill="url(#coreGlow)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" begin="0s" dur="0.6s" fill="freeze"/>
  </circle>

  <!-- Input Data Sources (Left & Bottom) - FADE IN -->
  
  <!-- Database icon (bottom-left) -->
  <g transform="translate(150, 480)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    <ellipse cx="0" cy="-15" rx="40" ry="15" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <path d="M -40 -15 L -40 15 Q -40 30 0 30 Q 40 30 40 15 L 40 -15" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <ellipse cx="0" cy="15" rx="40" ry="15" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Document icon (left-center) -->
  <g transform="translate(100, 300)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
    <path d="M 0 -30 L 25 -30 L 35 -20 L 35 30 L 0 30 Z" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <path d="M 25 -30 L 25 -20 L 35 -20" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <line x1="8" y1="-10" x2="27" y2="-10" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="8" y1="0" x2="27" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="8" y1="10" x2="27" y2="10" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- API icon (bottom-center) -->
  <g transform="translate(400, 520)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.4s" fill="freeze"/>
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="url(#purpleBlue)">API</text>
  </g>

  <!-- Flow lines from inputs to center - DRAW ONCE -->
  <path d="M 190 465 Q 350 400 520 340" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="400" stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset" from="400" to="0" begin="0.5s" dur="0.7s" fill="freeze"/>
  </path>
  
  <path d="M 135 290 Q 300 290 480 300" fill="none" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="400" stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset" from="400" to="0" begin="0.6s" dur="0.7s" fill="freeze"/>
  </path>
  
  <path d="M 430 505 Q 500 430 540 360" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="300" stroke-dashoffset="300">
    <animate attributeName="stroke-dashoffset" from="300" to="0" begin="0.7s" dur="0.7s" fill="freeze"/>
  </path>

  <!-- Central AI Core - SCALE IN -->
  <g transform="translate(600, 300)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="600,300" to="600,300" begin="0.4s" dur="0.01s" fill="freeze"/>
    <animateTransform attributeName="transform" type="scale" additive="sum" from="0.7" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>
    
    <!-- Outer rings -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#blueGradient)" stroke-width="2" opacity="0.5"/>
    
    <!-- Core brain/processor -->
    <circle cx="0" cy="0" r="45" fill="url(#purpleBlue)" opacity="0.3"/>
    
    <!-- Neural nodes -->
    <circle cx="-25" cy="-25" r="8" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="25" cy="-25" r="8" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="-25" cy="25" r="8" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="25" cy="25" r="8" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="0" cy="-30" r="6" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="30" cy="0" r="6" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="0" cy="30" r="6" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="-30" cy="0" r="6" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="url(#purpleBlue)" filter="url(#glow)"/>
    
    <!-- Neural connections -->
    <line x1="-25" y1="-25" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="-25" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="-25" y1="25" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="25" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-30" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="0" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="30" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="0" x2="0" y2="0" stroke="url(#purpleBlue)" stroke-width="2" opacity="0.6"/>
    
    <!-- Orbiting particles (slight rotation once) -->
    <circle cx="80" cy="0" r="5" fill="#8b5cf6" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="90 0 0" begin="1s" dur="0.8s" fill="freeze"/>
    </circle>
    <circle cx="-80" cy="0" r="5" fill="#3b82f6" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="180 0 0" to="270 0 0" begin="1s" dur="0.8s" fill="freeze"/>
    </circle>
  </g>

  <!-- Output connections (Right & Top) - FADE IN -->
  
  <!-- Code output (top-right) -->
  <g transform="translate(950, 120)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
    <rect x="0" y="0" width="180" height="120" rx="12" fill="none" stroke="url(#purpleBlue)" stroke-width="3"/>
    <rect x="5" y="5" width="170" height="25" rx="6" fill="#8b5cf6" opacity="0.2"/>
    <line x1="15" y1="50" x2="110" y2="50" stroke="#8b5cf6" stroke-width="3" opacity="0.6"/>
    <line x1="15" y1="68" x2="145" y2="68" stroke="#8b5cf6" stroke-width="3" opacity="0.6"/>
    <line x1="15" y1="86" x2="120" y2="86" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
    <line x1="15" y1="104" x2="75" y2="104" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
    <text x="20" y="62" font-family="monospace" font-size="22" fill="url(#purpleBlue)" opacity="0.7">{</text>
    <text x="155" y="97" font-family="monospace" font-size="22" fill="url(#purpleBlue)" opacity="0.7">}</text>
  </g>
  
  <!-- Dashboard output (right-center) -->
  <g transform="translate(980, 300)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.4s" fill="freeze"/>
    <rect x="0" y="0" width="160" height="120" rx="10" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
    <rect x="0" y="0" width="160" height="25" rx="10" fill="url(#coreGlow)" opacity="0.3"/>
    <circle cx="12" cy="12" r="4" fill="#3b82f6"/>
    <circle cx="24" cy="12" r="4" fill="#8b5cf6"/>
    <circle cx="36" cy="12" r="4" fill="#3b82f6"/>
    
    <!-- Chart bars -->
    <rect x="15" y="40" width="20" height="40" rx="3" fill="#8b5cf6" opacity="0.5"/>
    <rect x="40" y="50" width="20" height="30" rx="3" fill="#3b82f6" opacity="0.5"/>
    <rect x="65" y="35" width="20" height="45" rx="3" fill="#8b5cf6" opacity="0.5"/>
    <rect x="90" y="45" width="20" height="35" rx="3" fill="#3b82f6" opacity="0.5"/>
    <rect x="115" y="38" width="20" height="42" rx="3" fill="#8b5cf6" opacity="0.5"/>
    
    <!-- Graph line -->
    <path d="M 15 95 L 40 90 L 65 100 L 90 85 L 115 95 L 140 88" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
  </g>
  
  <!-- Mobile app output (bottom-right) -->
  <g transform="translate(1020, 480)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    <rect x="0" y="0" width="130" height="90" rx="12" fill="none" stroke="url(#purpleBlue)" stroke-width="3"/>
    <rect x="5" y="5" width="120" height="18" rx="4" fill="url(#purpleBlue)" opacity="0.2"/>
    <rect x="15" y="32" width="100" height="12" rx="2" fill="#8b5cf6" opacity="0.4"/>
    <rect x="15" y="50" width="80" height="12" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="15" y="68" width="60" height="12" rx="2" fill="#8b5cf6" opacity="0.4"/>
  </g>

  <!-- Flow lines from center to outputs - DRAW ONCE -->
  <path d="M 680 250 Q 800 200 950 150" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="350" stroke-dashoffset="350">
    <animate attributeName="stroke-dashoffset" from="350" to="0" begin="1s" dur="0.7s" fill="freeze"/>
  </path>
  
  <path d="M 700 300 Q 800 300 980 300" fill="none" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="300" stroke-dashoffset="300">
    <animate attributeName="stroke-dashoffset" from="300" to="0" begin="1.1s" dur="0.7s" fill="freeze"/>
  </path>
  
  <path d="M 670 360 Q 800 420 1020 500" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="400" stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset" from="400" to="0" begin="1.2s" dur="0.7s" fill="freeze"/>
  </path>

  <!-- Additional decorative elements - FADE IN -->
  
  <!-- Top left corner -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" begin="0.8s" dur="0.5s" fill="freeze"/>
    <circle cx="80" cy="80" r="6" fill="#8b5cf6"/>
    <circle cx="180" cy="50" r="4" fill="#3b82f6"/>
  </g>
  
  <!-- Bottom right corner -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" begin="1.5s" dur="0.5s" fill="freeze"/>
    <circle cx="850" cy="550" r="5" fill="#3b82f6"/>
    <circle cx="750" cy="520" r="6" fill="#8b5cf6"/>
  </g>
  
  <!-- Circuit patterns scattered -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.2" begin="1.3s" dur="0.5s" fill="freeze"/>
    <path d="M 300 100 L 350 100 L 350 130" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="350" cy="130" r="3" fill="#8b5cf6"/>
    <path d="M 200 500 L 250 500 L 250 470" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <circle cx="250" cy="470" r="3" fill="#3b82f6"/>
    <path d="M 900 550 L 950 550 L 950 520" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="950" cy="520" r="3" fill="#8b5cf6"/>
    <path d="M 850 80 L 900 80 L 900 110" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <circle cx="900" cy="110" r="3" fill="#3b82f6"/>
  </g>
  
  <!-- Floating code snippets -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" begin="1.4s" dur="0.4s" fill="freeze"/>
    <text x="250" y="200" font-family="monospace" font-size="14" fill="#8b5cf6">async</text>
    <text x="780" y="520" font-family="monospace" font-size="14" fill="#3b82f6">await</text>
    <text x="150" y="420" font-family="monospace" font-size="14" fill="#8b5cf6">const</text>
    <text x="880" y="250" font-family="monospace" font-size="14" fill="#3b82f6">return</text>
  </g>
  
  <!-- Network nodes scattered -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="1.6s" dur="0.4s" fill="freeze"/>
    <circle cx="320" cy="180" r="3" fill="#8b5cf6"/>
    <circle cx="420" cy="140" r="3" fill="#3b82f6"/>
    <circle cx="280" cy="420" r="3" fill="#8b5cf6"/>
    <circle cx="820" cy="420" r="3" fill="#3b82f6"/>
    <circle cx="760" cy="180" r="3" fill="#8b5cf6"/>
    <line x1="320" y1="180" x2="420" y2="140" stroke="url(#purpleBlue)" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
