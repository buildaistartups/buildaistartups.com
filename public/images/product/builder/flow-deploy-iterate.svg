<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" class="svg-play-once">
  
  <style>
    .svg-play-once {
      animation: fadeIn 0.6s ease-in;
    }
    
    .svg-play-once * {
      animation-play-state: paused;
    }
    
    .svg-play-once.is-visible * {
      animation-play-state: running;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Stage 1: Deploy (Left) -->
  <g id="stage1" transform="translate(100, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#purpleBlue)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2s" repeatCount="1"/>
    </circle>
    
    <!-- Rocket icon -->
    <path d="M 50 30 L 45 50 L 50 45 L 55 50 Z" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="50" cy="35" r="3" fill="#8b5cf6"/>
    <path d="M 45 50 L 43 58" stroke="#3b82f6" stroke-width="2"/>
    <path d="M 55 50 L 57 58" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Launch particles -->
    <g opacity="0.6">
      <circle cx="50" cy="60" r="2" fill="#8b5cf6">
        <animate attributeName="cy" values="60;70;80" dur="1s" repeatCount="1"/>
        <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="1"/>
      </circle>
      <circle cx="48" cy="62" r="2" fill="#3b82f6">
        <animate attributeName="cy" values="62;72;82" dur="1.2s" repeatCount="1" begin="0.2s"/>
        <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="1" begin="0.2s"/>
      </circle>
      <circle cx="52" cy="62" r="2" fill="#8b5cf6">
        <animate attributeName="cy" values="62;72;82" dur="1.1s" repeatCount="1" begin="0.1s"/>
        <animate attributeName="opacity" values="1;0" dur="1.1s" repeatCount="1" begin="0.1s"/>
      </circle>
    </g>
    
    <!-- Orbit ring -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3" stroke-dasharray="5 5">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 50 50"
        to="360 50 50"
        dur="6s"
        repeatCount="1"/>
    </circle>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Deploy</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" opacity="0.7">Ship to production</text>
  </g>

  <!-- Arrow 1 -->
  <g id="arrow1">
    <path d="M 220 300 L 380 300" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2s" repeatCount="1"/>
    </path>
    <polygon points="380,300 370,295 370,305" fill="#3b82f6"/>
    
    <circle r="6" fill="#8b5cf6" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="1" path="M 220 300 L 380 300"/>
    </circle>
  </g>

  <!-- Stage 2: Monitor (Center) -->
  <g id="stage2" transform="translate(500, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#blueGradient)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2.2s" repeatCount="1"/>
    </circle>
    
    <!-- Monitor/chart icon -->
    <rect x="32" y="38" width="36" height="24" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Chart bars -->
    <rect x="38" y="52" width="4" height="6" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" values="6;10;6" dur="2s" repeatCount="1"/>
    </rect>
    <rect x="45" y="48" width="4" height="10" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="height" values="10;14;10" dur="2.2s" repeatCount="1"/>
    </rect>
    <rect x="52" y="50" width="4" height="8" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" values="8;12;8" dur="2.4s" repeatCount="1"/>
    </rect>
    <rect x="59" y="46" width="4" height="12" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="height" values="12;16;12" dur="2.6s" repeatCount="1"/>
    </rect>
    
    <!-- Pulse effect -->
    <circle cx="50" cy="50" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="1"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="1"/>
    </circle>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">Monitor</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" opacity="0.7">Track performance</text>
  </g>

  <!-- Arrow 2 -->
  <g id="arrow2">
    <path d="M 620 300 L 780 300" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2s" repeatCount="1" begin="0.5s"/>
    </path>
    <polygon points="780,300 770,295 770,305" fill="#8b5cf6"/>
    
    <circle r="6" fill="#3b82f6" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="1" begin="0.5s" path="M 620 300 L 780 300"/>
    </circle>
  </g>

  <!-- Stage 3: Iterate (Right) -->
  <g id="stage3" transform="translate(900, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#purpleBlue)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2.5s" repeatCount="1"/>
    </circle>
    
    <!-- Circular arrow icon (iterate) -->
    <path d="M 65 50 A 15 15 0 1 0 50 35" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
    <polygon points="50,35 48,30 54,33" fill="#8b5cf6"/>
    
    <path d="M 35 50 A 15 15 0 1 0 50 65" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <polygon points="50,65 52,70 46,67" fill="#3b82f6"/>
    
    <!-- Rotating ring -->
    <circle cx="50" cy="50" r="35" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3" stroke-dasharray="10 5">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 50 50"
        to="360 50 50"
        dur="4s"
        repeatCount="1"/>
    </circle>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Iterate</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" opacity="0.7">Continuous improvement</text>
  </g>

  <!-- Feedback loop arrow (from Iterate back to beginning) -->
  <g id="feedbackLoop" opacity="0.4">
    <path d="M 900 400 Q 600 480 300 400" fill="none" stroke="url(#purpleBlue)" stroke-width="2" stroke-dasharray="5 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="3s" repeatCount="1" begin="2s"/>
    </path>
    <polygon points="300,400 305,395 305,405" fill="#8b5cf6"/>
  </g>

  <!-- Background decorative elements -->
  <g opacity="0.1">
    <circle cx="50" cy="50" r="3" fill="#8b5cf6"/>
    <circle cx="1150" cy="550" r="3" fill="#3b82f6"/>
    <circle cx="600" cy="100" r="2" fill="#8b5cf6"/>
    <circle cx="600" cy="500" r="2" fill="#3b82f6"/>
  </g>
</svg>
