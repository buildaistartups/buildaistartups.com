<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"> <defs> <!-- Gradients --> <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%"> <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" /> <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" /> </linearGradient> <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%"> <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" /> <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" /> </linearGradient> </defs> <!-- Light Bulb (Idea) - Improved professional design --> <g transform="translate(220, 300)"> <!-- Outer glow effect --> <ellipse cx="0" cy="-40" rx="95" ry="105" fill="url(#purpleBlue)" opacity="0.08"/> <!-- Main bulb glass (smooth pear shape) --> <path d="M 0 -110 C -50 -110 -70 -80 -70 -45 C -70 -15 -55 0 -40 15 C -38 17 -37 20 -37 23 L -37 38 L 37 38 L 37 23 C 37 20 38 17 40 15 C 55 0 70 -15 70 -45 C 70 -80 50 -110 0 -110 Z" fill="url(#purpleBlue)" fill-opacity="0.03" stroke="url(#purpleBlue)" stroke-width="7"/> <!-- Inner glass gradient for depth --> <ellipse cx="0" cy="-50" rx="50" ry="55" fill="url(#purpleBlue)" opacity="0.05"/> <!-- Primary glass highlight (realistic shine) --> <ellipse cx="-32" cy="-75" rx="18" ry="28" fill="#ffffff" opacity="0.25"/> <path d="M -40 -85 Q -28 -98 -18 -102" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3" stroke-linecap="round"/> <!-- Secondary smaller highlights --> <circle cx="-35" cy="-55" r="6" fill="#8b5cf6" opacity="0.2"/> <circle cx="28" cy="-70" r="4" fill="#3b82f6" opacity="0.15"/> <!-- Subtle glass curve reflection --> <path d="M 45 -60 Q 50 -70 52 -78" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/> <!-- Metal screw base with depth --> <g> <!-- Base cylinder --> <rect x="-37" y="38" width="74" height="48" fill="#8b5cf6" fill-opacity="0.08" stroke="url(#purpleBlue)" stroke-width="7" rx="2"/> <!-- Thread grooves --> <line x1="-37" y1="47" x2="37" y2="47" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/> <line x1="-37" y1="56" x2="37" y2="56" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/> <line x1="-37" y1="65" x2="37" y2="65" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/> <line x1="-37" y1="74" x2="37" y2="74" stroke="url(#purpleBlue)" stroke-width="2.5" opacity="0.35"/> <!-- Base highlights for metallic look --> <line x1="-30" y1="40" x2="-30" y2="84" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2"/> <line x1="30" y1="40" x2="30" y2="84" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/> </g> <!-- Bottom electrical contact --> <ellipse cx="0" cy="86" rx="32" ry="9" fill="#8b5cf6" fill-opacity="0.1" stroke="url(#purpleBlue)" stroke-width="7"/> <ellipse cx="0" cy="86" rx="15" ry="5" fill="#8b5cf6" opacity="0.25"/> <circle cx="0" cy="86" r="4" fill="url(#purpleBlue)" opacity="0.4"/> <!-- Detailed filament with support structure --> <g opacity="0.75"> <!-- Center support rod --> <line x1="0" y1="20" x2="0" y2="-15" stroke="#8b5cf6" stroke-width="2.5"/> <!-- Tungsten coil (main filament) --> <path d="M -22 -15 L -22 -35 Q -22 -48 -12 -54 L 12 -54 Q 22 -48 22 -35 L 22 -15" fill="none" stroke="#8b5cf6" stroke-width="4.5"/> <!-- Inner coil detail --> <path d="M -18 -20 L -18 -38 Q -18 -46 -8 -50 L 8 -50 Q 18 -46 18 -38 L 18 -20" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/> <!-- Support wires --> <line x1="-22" y1="-15" x2="-28" y2="8" stroke="#8b5cf6" stroke-width="2.5"/> <line x1="22" y1="-15" x2="28" y2="8" stroke="#8b5cf6" stroke-width="2.5"/> <!-- Filament glow --> <ellipse cx="0" cy="-35" rx="28" ry="25" fill="#8b5cf6" opacity="0.08"/> </g> <!-- Animated light rays (improved spacing) --> <line x1="0" y1="-110" x2="0" y2="-145" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" opacity="0.7"> <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2s" repeatCount="indefinite"/> </line> <line x1="63" y1="-95" x2="88" y2="-122" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.7"> <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2s" begin="0.25s" repeatCount="indefinite"/> </line> <line x1="88" y1="-35" x2="123" y2="-35" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" opacity="0.7"> <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2s" begin="0.5s" repeatCount="indefinite"/> </line> <line x1="-63" y1="-95" x2="-88" y2="-122" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.7"> <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2s" begin="0.75s" repeatCount="indefinite"/> </line> <line x1="-88" y1="-35" x2="-123" y2="-35" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" opacity="0.7"> <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2s" begin="1s" repeatCount="indefinite"/> </line> <!-- Smaller accent rays --> <line x1="47" y1="-100" x2="60" y2="-118" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" opacity="0.5"> <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="0.35s" repeatCount="indefinite"/> </line> <line x1="-47" y1="-100" x2="-60" y2="-118" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.5"> <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="0.85s" repeatCount="indefinite"/> </line> <line x1="78" y1="-60" x2="98" y2="-72" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.5"> <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="0.6s" repeatCount="indefinite"/> </line> <line x1="-78" y1="-60" x2="-98" y2="-72" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" opacity="0.5"> <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="0.1s" repeatCount="indefinite"/> </line> </g> <!-- Flowing Curved Arrow 1 --> <g> <path d="M 350 300 Q 420 240 490 300" fill="none" stroke="url(#purpleBlue)" stroke-width="6" stroke-linecap="round"/> <polygon points="490,288 515,300 490,312" fill="url(#purpleBlue)"/> <!-- Flowing dots along curve --> <circle cx="390" cy="270" r="7" fill="#8b5cf6" opacity="0.8"> <animateMotion path="M 0 0 Q 50 -30 100 0" dur="2s" repeatCount="indefinite"/> <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/> </circle> <circle cx="410" cy="260" r="7" fill="#3b82f6" opacity="0.8"> <animateMotion path="M 0 0 Q 50 -30 100 0" dur="2s" begin="0.5s" repeatCount="indefinite"/> <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/> </circle> </g> <!-- Magnifying Glass (Research) - Larger --> <g transform="translate(600, 300)"> <!-- Lens --> <circle cx="0" cy="0" r="95" fill="none" stroke="url(#purpleBlue)" stroke-width="7"/> <!-- Handle --> <line x1="67" y1="67" x2="110" y2="110" stroke="url(#purpleBlue)" stroke-width="11" stroke-linecap="round"/> <!-- Inner lens detail --> <circle cx="0" cy="0" r="70" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/> <!-- Market analysis chart (inside lens) --> <g transform="translate(-32, -12)" opacity="0.6"> <!-- Bar chart --> <rect x="0" y="25" width="10" height="19" fill="#8b5cf6"/> <rect x="15" y="15" width="10" height="29" fill="#8b5cf6"/> <rect x="30" y="20" width="10" height="24" fill="#3b82f6"/> <rect x="45" y="10" width="10" height="34" fill="#3b82f6"/> <!-- Line chart overlay --> <path d="M 5 25 L 20 15 L 35 20 L 50 10" fill="none" stroke="#8b5cf6" stroke-width="3"/> <circle cx="5" cy="25" r="4" fill="#8b5cf6"/> <circle cx="20" cy="15" r="4" fill="#8b5cf6"/> <circle cx="35" cy="20" r="4" fill="#3b82f6"/> <circle cx="50" cy="10" r="4" fill="#3b82f6"/> </g> <!-- Network/connection icon --> <g transform="translate(-18, -45)" opacity="0.5"> <circle cx="0" cy="0" r="5" fill="#3b82f6"/> <circle cx="25" cy="-10" r="5" fill="#3b82f6"/> <circle cx="25" cy="10" r="5" fill="#8b5cf6"/> <line x1="0" y1="0" x2="25" y2="-10" stroke="#3b82f6" stroke-width="3"/> <line x1="0" y1="0" x2="25" y2="10" stroke="#8b5cf6" stroke-width="3"/> </g> </g> <!-- Flowing Curved Arrow 2 --> <g> <path d="M 710 300 Q 780 360 850 300" fill="none" stroke="url(#purpleBlue)" stroke-width="6" stroke-linecap="round"/> <polygon points="850,288 875,300 850,312" fill="url(#purpleBlue)"/> <!-- Flowing dots along curve --> <circle cx="750" cy="330" r="7" fill="#3b82f6" opacity="0.8"> <animateMotion path="M 0 0 Q 50 30 100 0" dur="2s" repeatCount="indefinite"/> <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/> </circle> <circle cx="770" cy="340" r="7" fill="#8b5cf6" opacity="0.8"> <animateMotion path="M 0 0 Q 50 30 100 0" dur="2s" begin="0.5s" repeatCount="indefinite"/> <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/> </circle> </g> <!-- Document with Checkmarks (Spec) - Larger --> <g transform="translate(1000, 300)"> <!-- Document --> <rect x="-95" y="-120" width="190" height="240" rx="15" fill="none" stroke="url(#purpleBlue)" stroke-width="7"/> <!-- Folded corner --> <path d="M 57 -120 L 57 -82 L 95 -82" fill="none" stroke="url(#purpleBlue)" stroke-width="7" stroke-linejoin="round"/> <path d="M 57 -120 L 57 -82 L 95 -82 Z" fill="#8b5cf6" opacity="0.15"/> <!-- Checkmark lines --> <g transform="translate(-70, -75)"> <circle cx="0" cy="0" r="13" fill="none" stroke="#3b82f6" stroke-width="4"/> <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/> <line x1="20" y1="-3" x2="115" y2="-3" stroke="#3b82f6" stroke-width="4" opacity="0.4"/> <line x1="20" y1="5" x2="90" y2="5" stroke="#3b82f6" stroke-width="4" opacity="0.4"/> </g> <g transform="translate(-70, -20)"> <circle cx="0" cy="0" r="13" fill="none" stroke="#8b5cf6" stroke-width="4"/> <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/> <line x1="20" y1="-3" x2="110" y2="-3" stroke="#8b5cf6" stroke-width="4" opacity="0.4"/> <line x1="20" y1="5" x2="95" y2="5" stroke="#8b5cf6" stroke-width="4" opacity="0.4"/> </g> <g transform="translate(-70, 35)"> <circle cx="0" cy="0" r="13" fill="none" stroke="#3b82f6" stroke-width="4"/> <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/> <line x1="20" y1="-3" x2="105" y2="-3" stroke="#3b82f6" stroke-width="4" opacity="0.4"/> <line x1="20" y1="5" x2="85" y2="5" stroke="#3b82f6" stroke-width="4" opacity="0.4"/> </g> <g transform="translate(-70, 90)"> <circle cx="0" cy="0" r="13" fill="none" stroke="#8b5cf6" stroke-width="4"/> <path d="M -5 0 L -1 5 L 6 -5" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/> <line x1="20" y1="-3" x2="95" y2="-3" stroke="#8b5cf6" stroke-width="4" opacity="0.4"/> </g> </g> <!-- Network nodes icon (bottom center) --> <g transform="translate(600, 470)" opacity="0.5"> <circle cx="-25" cy="0" r="8" fill="#3b82f6"/> <circle cx="0" cy="-20" r="8" fill="#8b5cf6"/> <circle cx="0" cy="20" r="8" fill="#8b5cf6"/> <circle cx="25" cy="0" r="8" fill="#3b82f6"/> <line x1="-25" y1="0" x2="0" y2="-20" stroke="#3b82f6" stroke-width="3"/> <line x1="-25" y1="0" x2="0" y2="20" stroke="#8b5cf6" stroke-width="3"/> <line x1="25" y1="0" x2="0" y2="-20" stroke="#8b5cf6" stroke-width="3"/> <line x1="25" y1="0" x2="0" y2="20" stroke="#3b82f6" stroke-width="3"/> </g> </svg>
