<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="gearGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- LEFT SECTION: Code & Folder Structure - FADE IN -->
  <g transform="translate(120, 300)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.5s" fill="freeze"/>
    
    <!-- Code brackets icon -->
    <g transform="translate(0, -180)">
      <text x="0" y="0" font-family="monospace" font-size="80" font-weight="bold" fill="#3b82f6">{</text>
      <text x="30" y="10" font-family="monospace" font-size="60" font-weight="bold" fill="#8b5cf6">/</text>
      <text x="60" y="0" font-family="monospace" font-size="80" font-weight="bold" fill="#3b82f6">}</text>
    </g>
    
    <!-- Folder structure -->
    <g transform="translate(-20, -80)">
      <!-- Root folder icon -->
      <path d="M 0 0 L 30 0 L 38 12 L 120 12 L 120 25 L 0 25 Z" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="3"/>
      <text x="130" y="20" font-family="monospace" font-size="20" font-weight="bold" fill="#3b82f6">src</text>
      
      <!-- components folder -->
      <g transform="translate(20, 40)">
        <path d="M 0 0 L 22 0 L 28 8 L 90 8 L 90 18 L 0 18 Z" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2.5"/>
        <text x="95" y="13" font-family="monospace" font-size="17" fill="#8b5cf6">components</text>
      </g>
      
      <!-- app folder -->
      <g transform="translate(20, 70)">
        <path d="M 0 0 L 22 0 L 28 8 L 90 8 L 90 18 L 0 18 Z" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2.5"/>
        <text x="95" y="13" font-family="monospace" font-size="17" fill="#3b82f6">app</text>
      </g>
      
      <!-- public folder -->
      <g transform="translate(20, 100)">
        <path d="M 0 0 L 22 0 L 28 8 L 90 8 L 90 18 L 0 18 Z" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2.5"/>
        <text x="95" y="13" font-family="monospace" font-size="17" fill="#8b5cf6">public</text>
      </g>
      
      <!-- Files with indent -->
      <g transform="translate(40, 135)">
        <rect x="0" y="0" width="18" height="22" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/>
        <line x1="4" y1="7" x2="14" y2="7" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="4" y1="11" x2="14" y2="11" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="4" y1="15" x2="10" y2="15" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="25" y="16" font-family="monospace" font-size="15" fill="#3b82f6">app/layout.tsx</text>
      </g>
      
      <g transform="translate(40, 165)">
        <rect x="0" y="0" width="18" height="22" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="4" y1="7" x2="14" y2="7" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="4" y1="11" x2="14" y2="11" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="4" y1="15" x2="10" y2="15" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="25" y="16" font-family="monospace" font-size="15" fill="#8b5cf6">app/page.tsx</text>
      </g>
      
      <g transform="translate(40, 195)">
        <rect x="0" y="0" width="18" height="22" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/>
        <line x1="4" y1="7" x2="14" y2="7" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="4" y1="11" x2="14" y2="11" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="4" y1="15" x2="10" y2="15" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="25" y="16" font-family="monospace" font-size="15" fill="#3b82f6">components/card.tsx</text>
      </g>
    </g>
  </g>

  <!-- Arrow from code to gear - DRAW ONCE -->
  <path d="M 420 300 L 490 300" fill="none" stroke="#3b82f6" stroke-width="6" stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" from="80" to="0" begin="0.4s" dur="0.5s" fill="freeze"/>
  </path>
  <polygon points="490,292 510,300 490,308" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.2s" fill="freeze"/>
  </polygon>

  <!-- CENTER: Large Gear with Logos - FADE IN & ROTATE ONCE -->
  <g transform="translate(600, 300)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    
    <!-- Glow -->
    <circle cx="0" cy="0" r="140" fill="url(#gearGlow)"/>
    
    <!-- Outer gear teeth - ROTATE ONCE (90 degrees) -->
    <g>
      <rect x="-15" y="-120" width="30" height="25" rx="4" fill="#3b82f6"/>
      <rect x="-120" y="-15" width="25" height="30" rx="4" fill="#3b82f6"/>
      <rect x="95" y="-15" width="25" height="30" rx="4" fill="#3b82f6"/>
      <rect x="-15" y="95" width="30" height="25" rx="4" fill="#3b82f6"/>
      <rect x="-88" y="-88" width="30" height="25" rx="4" fill="#8b5cf6" transform="rotate(45 -73 -73)"/>
      <rect x="58" y="-88" width="30" height="25" rx="4" fill="#8b5cf6" transform="rotate(-45 73 -73)"/>
      <rect x="-88" y="63" width="30" height="25" rx="4" fill="#8b5cf6" transform="rotate(-45 -73 75)"/>
      <rect x="58" y="63" width="30" height="25" rx="4" fill="#8b5cf6" transform="rotate(45 73 75)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="90 0 0" begin="0.5s" dur="1s" fill="freeze"/>
    </g>
    
    <!-- Main gear circle -->
    <circle cx="0" cy="0" r="80" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="10"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#3b82f6" stroke-width="6"/>
    <circle cx="0" cy="0" r="20" fill="#3b82f6" opacity="0.2"/>
    
    <!-- GitHub logo above gear -->
    <g transform="translate(0, -190)">
      <circle cx="0" cy="0" r="35" fill="#3b82f6"/>
      <path d="M 0 -24 C -13 -24 -24 -13 -24 0 C -24 10 -16.5 18.5 -7 21.5 C -6 21.8 -5.5 21.2 -5.5 20.6 C -5.5 20 -5.5 18.4 -5.5 16.2 C -11 17.4 -12 14 -12 14 C -13 11.5 -15 10.7 -15 10.7 C -17.5 9 -14.8 9 -14.8 9 C -12 9.2 -10.5 11 -10.5 11 C -8.5 14.5 -5 13.5 -5.5 13 C -5.3 11.5 -4.6 10.2 -4 9.6 C -8.5 9 -13 7.2 -13 0 C -13 -2 -12.5 -3.6 -10.5 -5 C -10.8 -5.6 -11.5 -7.2 -10.2 -9.6 C -10.2 -9.6 -8 -10.2 -5.5 -7.8 C -4 -8.4 -2 -8.4 0 -8.4 C 2 -8.4 4 -8.4 5.5 -7.8 C 8 -10.2 10.2 -9.6 10.2 -9.6 C 11.5 -7.2 10.8 -5.6 10.5 -5 C 12.5 -3.6 13 -2 13 0 C 13 7.2 8.5 9 4 9.6 C 4.6 10.2 5.3 11.5 5.5 13 C 5.5 15.5 5.5 17.5 5.5 18 C 5.5 18.6 6 19.2 7 21.5 C 16.5 18.5 24 10 24 0 C 24 -13 13 -24 0 -24 Z" fill="#ffffff" transform="scale(0.85)"/>
    </g>
    
    <!-- React logo (left of gear) -->
    <g transform="translate(-160, 0)">
      <ellipse cx="0" cy="0" rx="45" ry="17" fill="none" stroke="#3b82f6" stroke-width="3"/>
      <ellipse cx="0" cy="0" rx="45" ry="17" fill="none" stroke="#3b82f6" stroke-width="3" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="45" ry="17" fill="none" stroke="#3b82f6" stroke-width="3" transform="rotate(120)"/>
      <circle cx="0" cy="0" r="7" fill="#3b82f6"/>
    </g>
    
    <!-- Next.js logo (right of gear) -->
    <g transform="translate(160, 15)">
      <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#3b82f6">NEXT.js</text>
      <text x="0" y="-25" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#3b82f6">▲</text>
    </g>
    
    <!-- Component tags floating around gear -->
    <g transform="translate(-70, -120)">
      <rect x="0" y="0" width="95" height="32" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
      <text x="48" y="21" text-anchor="middle" font-family="monospace" font-size="14" fill="#3b82f6">&lt;Header&gt;</text>
    </g>
    
    <g transform="translate(25, 105)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
      <text x="40" y="21" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b5cf6">&lt;Card&gt;</text>
    </g>
    
    <g transform="translate(-100, 80)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
      <text x="40" y="21" text-anchor="middle" font-family="monospace" font-size="14" fill="#3b82f6">&lt;Card&gt;</text>
    </g>
    
    <!-- Dotted connections -->
    <line x1="0" y1="-150" x2="0" y2="-100" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
    <line x1="-140" y1="0" x2="-90" y2="0" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
    <line x1="140" y1="15" x2="90" y2="10" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  </g>

  <!-- Arrow from gear to UI - DRAW ONCE -->
  <path d="M 730 300 L 800 300" fill="none" stroke="#3b82f6" stroke-width="6" stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" from="80" to="0" begin="1s" dur="0.5s" fill="freeze"/>
  </path>
  <polygon points="800,292 820,300 800,308" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.2s" fill="freeze"/>
  </polygon>

  <!-- RIGHT: Layered UI Components - FADE IN WITH STAGGER -->
  <g transform="translate(950, 300)">
    <!-- Back layer -->
    <g transform="translate(-35, -50)" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" begin="1.2s" dur="0.4s" fill="freeze"/>
      <rect x="0" y="0" width="200" height="160" rx="15" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="5"/>
      <rect x="0" y="0" width="200" height="35" rx="15" fill="#3b82f6" opacity="0.2"/>
      <rect x="20" y="55" width="160" height="20" rx="5" fill="#3b82f6" opacity="0.3"/>
      <rect x="20" y="85" width="120" height="20" rx="5" fill="#3b82f6" opacity="0.3"/>
      <rect x="20" y="115" width="140" height="20" rx="5" fill="#3b82f6" opacity="0.3"/>
    </g>
    
    <!-- Middle layer -->
    <g transform="translate(-20, -25)" opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="1.4s" dur="0.4s" fill="freeze"/>
      <rect x="0" y="0" width="210" height="170" rx="15" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="5"/>
      <rect x="0" y="0" width="210" height="38" rx="15" fill="#8b5cf6" opacity="0.15"/>
      <text x="25" y="25" font-family="monospace" font-size="15" fill="#8b5cf6">&lt;Header&gt;</text>
      <rect x="20" y="58" width="170" height="22" rx="5" fill="#8b5cf6" opacity="0.35"/>
      <rect x="20" y="90" width="130" height="22" rx="5" fill="#8b5cf6" opacity="0.35"/>
      <rect x="20" y="122" width="150" height="22" rx="5" fill="#8b5cf6" opacity="0.35"/>
    </g>
    
    <!-- Front layer -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
      <rect x="0" y="0" width="220" height="180" rx="15" fill="#3b82f6" opacity="0.05" stroke="#3b82f6" stroke-width="6"/>
      <rect x="0" y="0" width="220" height="42" rx="15" fill="#3b82f6" opacity="0.2"/>
      <text x="25" y="28" font-family="monospace" font-size="16" font-weight="600" fill="#3b82f6">&lt;Header&gt;</text>
      
      <rect x="20" y="62" width="180" height="25" rx="6" fill="#3b82f6" opacity="0.4"/>
      <text x="30" y="80" font-family="monospace" font-size="13" fill="#3b82f6">&lt;Card&gt;</text>
      
      <rect x="20" y="98" width="140" height="25" rx="6" fill="#8b5cf6" opacity="0.4"/>
      <text x="30" y="116" font-family="monospace" font-size="13" fill="#8b5cf6">&lt;Card&gt;</text>
      
      <rect x="20" y="134" width="160" height="25" rx="6" fill="#3b82f6" opacity="0.4"/>
      <text x="30" y="152" font-family="monospace" font-size="13" fill="#3b82f6">&lt;Button&gt;</text>
    </g>
  </g>
  
  <!-- Bottom arrow pointing to stacked screens - FADE IN -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
    <path d="M 1060 480 L 1060 510" fill="none" stroke="#3b82f6" stroke-width="5"/>
    <polygon points="1052,510 1060,525 1068,510" fill="#3b82f6"/>
  </g>
</svg>
