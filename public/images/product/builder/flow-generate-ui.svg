<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- LEFT: Folder Structure -->
  <g transform="translate(180, 280)">
    <!-- Container -->
    <rect x="-100" y="-100" width="200" height="200" rx="12" fill="none" stroke="url(#purpleBlue)" stroke-width="5" opacity="0.6"/>
    
    <!-- Folders -->
    <g font-family="monospace" font-size="13" opacity="0.8">
      <!-- src folder -->
      <path d="M -75 -75 L -75 -60 L -30 -60 L -30 -70 L -50 -70 L -55 -75 Z" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <text x="-70" y="-62" fill="#3b82f6">src</text>
      
      <!-- components folder -->
      <path d="M -70 -45 L -70 -30 L -25 -30 L -25 -40 L -45 -40 L -50 -45 Z" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
      <text x="-65" y="-32" fill="#8b5cf6">components</text>
      
      <!-- app folder -->
      <path d="M -70 -15 L -70 0 L -25 0 L -25 -10 L -45 -10 L -50 -15 Z" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <text x="-65" y="-2" fill="#3b82f6">app</text>
      
      <!-- public folder -->
      <path d="M -70 15 L -70 30 L -25 30 L -25 20 L -45 20 L -50 15 Z" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
      <text x="-65" y="28" fill="#8b5cf6">public</text>
      
      <!-- Files -->
      <g opacity="0.6">
        <rect x="-60" y="45" width="8" height="10" rx="1" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="-48" y="53" font-size="11" fill="#3b82f6">app/layout.tsx</text>
        
        <rect x="-60" y="60" width="8" height="10" rx="1" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="-48" y="68" font-size="11" fill="#8b5cf6">app/page.tsx</text>
        
        <rect x="-60" y="75" width="8" height="10" rx="1" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="-48" y="83" font-size="11" fill="#3b82f6">components/card.tsx</text>
      </g>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g>
    <path d="M 310 280 Q 380 230 450 280" fill="none" stroke="url(#purpleBlue)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="450,270 470,280 450,290" fill="url(#purpleBlue)"/>
    <circle cx="380" cy="255" r="6" fill="#8b5cf6" opacity="0.8">
      <animateMotion path="M 0 0 Q 50 -25 100 0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CENTER: GitHub + React Processing -->
  <g transform="translate(600, 280)">
    <!-- GitHub logo (top) -->
    <g transform="translate(0, -70)">
      <circle cx="0" cy="0" r="28" fill="#3b82f6" opacity="0.15"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#3b82f6" stroke-width="4">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <path d="M 0 -12 C -10 -12 -12 -8 -12 0 C -12 8 -6 12 0 12 C 6 12 12 8 12 0 C 12 -8 10 -12 0 -12 Z M -6 8 L -6 2 M 0 8 L 0 -4 M 6 8 L 6 2" 
            fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Central processing circle -->
    <circle cx="0" cy="0" r="65" fill="url(#blueGradient)" opacity="0.05" stroke="url(#purpleBlue)" stroke-width="5"/>
    
    <!-- Rotating ring -->
    <circle cx="0" cy="0" r="78" fill="none" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.3" stroke-dasharray="25,10">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- React atom symbol -->
    <g opacity="0.7">
      <ellipse cx="0" cy="0" rx="50" ry="18" fill="none" stroke="#3b82f6" stroke-width="3">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="50" ry="18" fill="none" stroke="#8b5cf6" stroke-width="3">
        <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="50" ry="18" fill="none" stroke="#3b82f6" stroke-width="3">
        <animateTransform attributeName="transform" type="rotate" from="240 0 0" to="600 0 0" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="0" cy="0" r="8" fill="url(#purpleBlue)">
        <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Cards floating around -->
    <g opacity="0.5">
      <rect x="-50" y="-10" width="15" height="20" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2">
        <animate attributeName="y" values="-10;-15;-10" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="35" y="-10" width="15" height="20" rx="2" fill="none" stroke="#3b82f6" stroke-width="2">
        <animate attributeName="y" values="-10;-15;-10" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Bottom label -->
    <text x="0" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b5cf6" opacity="0.6">NEXT.JS</text>
  </g>

  <!-- Arrow 2 -->
  <g>
    <path d="M 730 280 Q 800 330 870 280" fill="none" stroke="url(#purpleBlue)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="870,270 890,280 870,290" fill="url(#purpleBlue)"/>
    <circle cx="800" cy="305" r="6" fill="#3b82f6" opacity="0.8">
      <animateMotion path="M 0 0 Q 50 25 100 0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- RIGHT: UI Components -->
  <g transform="translate(1020, 280)">
    <!-- Container -->
    <rect x="-100" y="-100" width="200" height="200" rx="12" fill="none" stroke="url(#purpleBlue)" stroke-width="5" opacity="0.6"/>
    
    <!-- Header -->
    <rect x="-85" y="-85" width="170" height="22" rx="4" fill="url(#purpleBlue)" opacity="0.12" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="-75" y="-70" font-family="sans-serif" font-size="11" fill="#8b5cf6" opacity="0.7">&lt;Header&gt;</text>
    
    <!-- Cards -->
    <rect x="-85" y="-50" width="75" height="55" rx="5" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="-50" width="75" height="55" rx="5" fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    
    <text x="-70" y="-30" font-family="sans-serif" font-size="10" fill="#3b82f6" opacity="0.6">&lt;Card&gt;</text>
    <text x="25" y="-30" font-family="sans-serif" font-size="10" fill="#8b5cf6" opacity="0.6">&lt;Card&gt;</text>
    
    <!-- Lines in cards -->
    <line x1="-75" y1="-20" x2="-20" y2="-20" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
    <line x1="-75" y1="-10" x2="-35" y2="-10" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
    
    <line x1="20" y1="-20" x2="75" y2="-20" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
    <line x1="20" y1="-10" x2="60" y2="-10" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
    
    <!-- Button -->
    <rect x="-45" y="20" width="90" height="26" rx="13" fill="url(#purpleBlue)" opacity="0.15" stroke="url(#purpleBlue)" stroke-width="2.5">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="37" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8b5cf6" opacity="0.7">&lt;Button&gt;</text>
    
    <!-- Arrow pointing down -->
    <g transform="translate(0, 65)" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#purpleBlue)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="0,15 -5,8 5,8" fill="url(#purpleBlue)"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
