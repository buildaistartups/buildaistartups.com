<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" class="svg-play-once">
  
  <style>
    .svg-play-once {
      animation: fadeIn 0.6s ease-in;
    }
    
    .svg-play-once * {
      animation-play-state: paused;
    }
    
    .svg-play-once.is-visible * {
      animation-play-state: running;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Stage 1: Code Generation (Left) -->
  <g id="stage1" transform="translate(100, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#blueGradient)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2s" repeatCount="1"/>
    </circle>
    
    <!-- Code brackets icon -->
    <text x="50" y="60" font-family="monospace" font-size="32" font-weight="bold" fill="#3b82f6" text-anchor="middle">&lt;/&gt;</text>
    
    <!-- Code lines appearing -->
    <g opacity="0.6">
      <line x1="25" y1="70" x2="45" y2="70" stroke="#3b82f6" stroke-width="2">
        <animate attributeName="x2" from="25" to="45" dur="0.5s" repeatCount="1" begin="0.5s"/>
      </line>
      <line x1="55" y1="70" x2="75" y2="70" stroke="#8b5cf6" stroke-width="2">
        <animate attributeName="x2" from="55" to="75" dur="0.5s" repeatCount="1" begin="0.7s"/>
      </line>
    </g>
    
    <!-- Rotating particles -->
    <circle cx="50" cy="50" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-dasharray="3 3">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 50 50"
        to="360 50 50"
        dur="5s"
        repeatCount="1"/>
    </circle>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">Generate</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" opacity="0.7">AI writes code</text>
  </g>

  <!-- Arrow 1 -->
  <g id="arrow1">
    <path d="M 220 300 L 380 300" stroke="url(#blueGradient)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2s" repeatCount="1"/>
    </path>
    <polygon points="380,300 370,295 370,305" fill="#8b5cf6"/>
    
    <circle r="6" fill="#3b82f6" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="1" path="M 220 300 L 380 300"/>
    </circle>
  </g>

  <!-- Stage 2: UI Preview (Center) -->
  <g id="stage2" transform="translate(500, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#purpleBlue)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2.2s" repeatCount="1"/>
    </circle>
    
    <!-- Browser window icon -->
    <rect x="30" y="35" width="40" height="30" rx="3" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="30" y1="42" x2="70" y2="42" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="35" cy="38.5" r="1.5" fill="#8b5cf6"/>
    <circle cx="40" cy="38.5" r="1.5" fill="#3b82f6"/>
    <circle cx="45" cy="38.5" r="1.5" fill="#8b5cf6"/>
    
    <!-- UI elements appearing -->
    <g opacity="0.6">
      <rect x="35" y="48" width="15" height="3" rx="1" fill="#8b5cf6">
        <animate attributeName="width" from="0" to="15" dur="0.5s" repeatCount="1" begin="1s"/>
      </rect>
      <rect x="35" y="54" width="25" height="3" rx="1" fill="#3b82f6">
        <animate attributeName="width" from="0" to="25" dur="0.5s" repeatCount="1" begin="1.2s"/>
      </rect>
      <rect x="35" y="60" width="20" height="3" rx="1" fill="#8b5cf6">
        <animate attributeName="width" from="0" to="20" dur="0.5s" repeatCount="1" begin="1.4s"/>
      </rect>
    </g>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Preview</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" opacity="0.7">Live UI preview</text>
  </g>

  <!-- Arrow 2 -->
  <g id="arrow2">
    <path d="M 620 300 L 780 300" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="2s" repeatCount="1" begin="0.5s"/>
    </path>
    <polygon points="780,300 770,295 770,305" fill="#3b82f6"/>
    
    <circle r="6" fill="#8b5cf6" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="1" begin="0.5s" path="M 620 300 L 780 300"/>
    </circle>
  </g>

  <!-- Stage 3: Refinement (Right) -->
  <g id="stage3" transform="translate(900, 250)">
    <circle cx="50" cy="50" r="60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="50" r="45" fill="url(#blueGradient)" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2.5s" repeatCount="1"/>
    </circle>
    
    <!-- Slider/adjustment icon -->
    <line x1="35" y1="45" x2="65" y2="45" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="45" cy="45" r="4" fill="#3b82f6">
      <animate attributeName="cx" values="45;55;45" dur="2s" repeatCount="1" begin="1s"/>
    </circle>
    
    <line x1="35" y1="55" x2="65" y2="55" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="55" cy="55" r="4" fill="#8b5cf6">
      <animate attributeName="cx" values="55;45;55" dur="2s" repeatCount="1" begin="1.2s"/>
    </circle>
    
    <!-- Sparkle effect -->
    <g opacity="0.6">
      <path d="M 68 38 L 70 42 L 68 46 L 66 42 Z" fill="#3b82f6">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="1" begin="1.5s"/>
      </path>
    </g>
    
    <!-- Label -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">Refine</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" opacity="0.7">Adjust & perfect</text>
  </g>

  <!-- Background decorative elements -->
  <g opacity="0.1">
    <circle cx="50" cy="50" r="3" fill="#3b82f6"/>
    <circle cx="1150" cy="550" r="3" fill="#8b5cf6"/>
    <circle cx="600" cy="100" r="2" fill="#3b82f6"/>
    <circle cx="600" cy="500" r="2" fill="#8b5cf6"/>
  </g>
</svg>
