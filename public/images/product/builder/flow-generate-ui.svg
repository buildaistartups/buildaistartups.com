<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Code Editor Icon (left) -->
  <g transform="translate(200, 300)">
    <!-- Editor window -->
    <rect x="-90" y="-110" width="180" height="220" rx="12" fill="none" stroke="url(#purpleBlue)" stroke-width="6"/>
    
    <!-- Title bar -->
    <rect x="-90" y="-110" width="180" height="32" rx="12" fill="url(#purpleBlue)" opacity="0.15"/>
    <circle cx="-70" cy="-93" r="5" fill="#8b5cf6"/>
    <circle cx="-55" cy="-93" r="5" fill="#3b82f6"/>
    <circle cx="-40" cy="-93" r="5" fill="#8b5cf6"/>
    
    <!-- Code lines with typing animation -->
    <g opacity="0.7">
      <line x1="-70" y1="-60" x2="-20" y2="-60" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
      <line x1="-70" y1="-35" x2="50" y2="-35" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
      <line x1="-70" y1="-10" x2="30" y2="-10" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
      <line x1="-70" y1="15" x2="60" y2="15" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
      <line x1="-70" y1="40" x2="10" y2="40" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
      <line x1="-70" y1="65" x2="45" y2="65" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Cursor blink -->
      <line x1="55" y1="60" x2="55" y2="70" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </line>
    </g>
    
    <!-- Brackets -->
    <text x="-75" y="-25" font-family="monospace" font-size="32" fill="#8b5cf6" opacity="0.4">{</text>
    <text x="60" y="80" font-family="monospace" font-size="32" fill="#3b82f6" opacity="0.4">}</text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <path d="M 310 300 Q 380 240 450 300" fill="none" stroke="url(#purpleBlue)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="450,288 475,300 450,312" fill="url(#purpleBlue)"/>
    <circle cx="380" cy="270" r="7" fill="#8b5cf6" opacity="0.8">
      <animateMotion path="M 0 0 Q 50 -30 100 0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- AI Processing (center) -->
  <g transform="translate(600, 300)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="80" fill="url(#blueGradient)" opacity="0.05" stroke="url(#purpleBlue)" stroke-width="6"/>
    
    <!-- Rotating outer ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#purpleBlue)" stroke-width="4" opacity="0.3" stroke-dasharray="30,10">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- AI brain nodes -->
    <circle cx="-35" cy="-25" r="8" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="-25" r="8" fill="#3b82f6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-35" cy="25" r="8" fill="#3b82f6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="25" r="8" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="12" fill="url(#purpleBlue)" opacity="0.6">
      <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connecting lines -->
    <line x1="-35" y1="-25" x2="0" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <line x1="35" y1="-25" x2="0" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="-35" y1="25" x2="0" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="35" y1="25" x2="0" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    
    <!-- React atom symbol -->
    <g transform="scale(0.4)" opacity="0.5">
      <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#3b82f6" stroke-width="8">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#8b5cf6" stroke-width="8">
        <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#3b82f6" stroke-width="8">
        <animateTransform attributeName="transform" type="rotate" from="240 0 0" to="600 0 0" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="0" cy="0" r="12" fill="#8b5cf6"/>
    </g>
    
    <!-- Generation particles -->
    <circle cx="-60" cy="-60" r="4" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="cy" values="-60;-80;-60" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="-60" r="4" fill="#3b82f6" opacity="0.6">
      <animate attributeName="cy" values="-60;-80;-60" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-60" cy="60" r="4" fill="#3b82f6" opacity="0.6">
      <animate attributeName="cy" values="60;80;60" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="4" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="cy" values="60;80;60" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow 2 -->
  <g>
    <path d="M 710 300 Q 780 360 850 300" fill="none" stroke="url(#purpleBlue)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="850,288 875,300 850,312" fill="url(#purpleBlue)"/>
    <circle cx="780" cy="330" r="7" fill="#3b82f6" opacity="0.8">
      <animateMotion path="M 0 0 Q 50 30 100 0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- UI Components Stack (right) -->
  <g transform="translate(1000, 300)">
    <!-- Browser window -->
    <rect x="-95" y="-120" width="190" height="240" rx="12" fill="none" stroke="url(#purpleBlue)" stroke-width="6"/>
    
    <!-- Browser chrome -->
    <rect x="-95" y="-120" width="190" height="36" rx="12" fill="url(#purpleBlue)" opacity="0.15"/>
    <circle cx="-75" cy="-102" r="5" fill="#8b5cf6"/>
    <circle cx="-58" cy="-102" r="5" fill="#3b82f6"/>
    <circle cx="-41" cy="-102" r="5" fill="#8b5cf6"/>
    <rect x="-10" y="-108" width="80" height="12" rx="6" fill="#8b5cf6" opacity="0.2"/>
    
    <!-- Component layers with slide-in animation -->
    <g>
      <!-- Header -->
      <rect x="-80" y="-70" width="160" height="24" rx="4" fill="url(#purpleBlue)" opacity="0.15" stroke="#8b5cf6" stroke-width="3"/>
      <text x="-65" y="-52" font-size="12" fill="#8b5cf6" opacity="0.6">Header</text>
      
      <!-- Cards -->
      <rect x="-80" y="-35" width="72" height="60" rx="6" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
      <rect x="0" y="-35" width="72" height="60" rx="6" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.6"/>
      
      <circle cx="-44" cy="-15" r="8" fill="#3b82f6" opacity="0.4"/>
      <line x1="-60" y1="0" x2="-28" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
      <line x1="-60" y1="10" x2="-35" y2="10" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
      
      <circle cx="36" cy="-15" r="8" fill="#8b5cf6" opacity="0.4"/>
      <line x1="20" y1="0" x2="52" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
      <line x1="20" y1="10" x2="45" y2="10" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
      
      <!-- Button with pulse -->
      <rect x="-40" y="40" width="80" height="28" rx="14" fill="url(#purpleBlue)" opacity="0.2" stroke="url(#purpleBlue)" stroke-width="3">
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="-20" y="58" font-size="12" fill="#8b5cf6">Button</text>
      
      <!-- Footer -->
      <rect x="-80" y="80" width="160" height="20" rx="4" fill="url(#purpleBlue)" opacity="0.1" stroke="#3b82f6" stroke-width="3"/>
    </g>
    
    <!-- Sparkles appearing around UI -->
    <g opacity="0.6">
      <path d="M -100 -80 l 4 8 l 8 4 l -8 4 l -4 8 l -4 -8 l -8 -4 l 8 -4 Z" fill="#8b5cf6">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 100 0 l 3 6 l 6 3 l -6 3 l -3 6 l -3 -6 l -6 -3 l 6 -3 Z" fill="#3b82f6">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.7s" repeatCount="indefinite"/>
      </path>
      <path d="M -105 60 l 3 6 l 6 3 l -6 3 l -3 6 l -3 -6 l -6 -3 l 6 -3 Z" fill="#8b5cf6">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Bottom label -->
  <g transform="translate(600, 520)" opacity="0.4">
    <text x="0" y="0" text-anchor="middle" font-size="16" fill="url(#purpleBlue)">AI-Powered Code Generation</text>
  </g>
</svg>
