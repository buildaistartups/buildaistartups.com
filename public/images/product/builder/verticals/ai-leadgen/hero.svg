<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <!-- dark-site hero · 16:9 · transparent bg -->
  <!-- palette: slate-400 #94a3b8 · indigo-800 #3730a3 · indigo-900 #312e81 · violet-500 #8b5cf6 · cyan-400 #22d3ee · blue-400 #60a5fa -->

  <defs>
    <!-- soft radial glow -->
    <radialGradient id="g" cx="0" cy="0" r="1" gradientTransform="translate(800 450) rotate(90) scale(380 620)">
      <stop offset="0" stop-color="#4338ca" stop-opacity=".35"/>
      <stop offset=".6" stop-color="#3730a3" stop-opacity=".14"/>
      <stop offset="1" stop-color="#312e81" stop-opacity="0"/>
    </radialGradient>

    <!-- subtle outer glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#4338ca" flood-opacity=".22"/>
    </filter>

    <!-- arrowhead -->
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>

    <!-- rounded card -->
    <symbol id="card" viewBox="0 0 220 88">
      <rect x="1" y="1" width="218" height="86" rx="20" fill="#3730a3" stroke="#94a3b8" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- background glow -->
  <ellipse cx="800" cy="450" rx="720" ry="440" fill="url(#g)"/>

  <!-- console -->
  <g id="console" filter="url(#glow)">
    <rect x="280" y="170" width="1040" height="560" rx="24" fill="#1a2034" opacity=".86"/>
    <rect x="280.75" y="170.75" width="1038.5" height="558.5" rx="24" stroke="#94a3b8" stroke-opacity=".55" stroke-width="1.5"/>

    <!-- lanes (light guides) -->
    <g stroke="#94a3b8" stroke-opacity=".25" stroke-width="1.5">
      <line x1="330" y1="300" x2="1270" y2="300"/>
      <line x1="330" y1="460" x2="1270" y2="460"/>
      <line x1="330" y1="620" x2="1270" y2="620"/>
    </g>

    <!-- Lane 1: form → enrich → score → CRM -->
    <g id="lane1" stroke-linecap="round" stroke-linejoin="round">
      <!-- form -->
      <g transform="translate(340,256)">
        <use href="#card"/>
        <rect x="30" y="22" width="160" height="44" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="44" y="32" width="66" height="8" rx="4" fill="#8b5cf6"/>
        <rect x="114" y="32" width="60" height="8" rx="4" fill="#22d3ee"/>
        <circle cx="176" cy="44" r="4" fill="#60a5fa"/>
      </g>
      <path d="M560 300 C 610 300, 610 300, 660 300" stroke="#94a3b8" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>

      <!-- enrichment -->
      <g transform="translate(680,256)">
        <use href="#card"/>
        <rect x="34" y="24" width="68" height="50" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="48" y="36" width="40" height="6" rx="3" fill="#8b5cf6"/>
        <rect x="44" y="50" width="48" height="6" rx="3" fill="#22d3ee"/>
        <!-- small sparkles -->
        <circle cx="140" cy="40" r="5" fill="#8b5cf6" opacity=".8"/>
        <circle cx="160" cy="62" r="4" fill="#22d3ee"/>
        <circle cx="150" cy="52" r="3" fill="#60a5fa"/>
      </g>
      <path d="M910 300 C 960 300, 960 300, 1010 300" stroke="#94a3b8" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>

      <!-- scoring -->
      <g transform="translate(1030,256)">
        <use href="#card"/>
        <circle cx="110" cy="56" r="30" fill="#312e81" stroke="#94a3b8" stroke-width="1.8"/>
        <path d="M84 56 A26 26 0 0 1 136 56" stroke="#8b5cf6" stroke-width="6" fill="none"/>
        <line x1="110" y1="56" x2="134" y2="48" stroke="#22d3ee" stroke-width="4"/>
        <circle cx="110" cy="56" r="3.5" fill="#60a5fa"/>
      </g>
      <path d="M1260 300 C 1305 300, 1305 300, 1350 300" stroke="#94a3b8" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>

      <!-- CRM (generic, not brand marks) -->
      <g transform="translate(1370,256)">
        <use href="#card"/>
        <g transform="translate(56,18)">
          <rect x="0" y="0" width="108" height="52" rx="14" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
          <circle cx="20" cy="26" r="9" fill="#8b5cf6"/>
          <circle cx="54" cy="26" r="9" fill="#22d3ee"/>
          <circle cx="88" cy="26" r="9" fill="#60a5fa"/>
        </g>
      </g>
    </g>

    <!-- Lane 2: drip → calendar -->
    <g id="lane2">
      <g transform="translate(440,416)">
        <use href="#card"/>
        <!-- envelope -->
        <rect x="30" y="26" width="74" height="44" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M30 34 L67 58 L104 34" stroke="#8b5cf6" stroke-width="2" fill="none"/>
        <!-- sms tiles -->
        <rect x="122" y="30" width="68" height="22" rx="10" fill="#4338ca" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="122" y="58" width="84" height="22" rx="10" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
      </g>
      <path d="M670 460 C 720 460, 720 460, 770 460" stroke="#94a3b8" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>
      <g transform="translate(790,416)">
        <use href="#card"/>
        <!-- calendar -->
        <rect x="56" y="22" width="108" height="56" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="56" y="22" width="108" height="16" rx="8" fill="#4338ca"/>
        <circle cx="82" cy="34" r="4" fill="#8b5cf6"/>
        <circle cx="138" cy="34" r="4" fill="#8b5cf6"/>
        <!-- check -->
        <path d="M86 56 l12 12 l22 -22" stroke="#22d3ee" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Lane 3: checkout (optional) -->
    <g id="lane3">
      <g transform="translate(540,576)">
        <use href="#card"/>
        <!-- credit card -->
        <rect x="38" y="30" width="110" height="60" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="38" y="46" width="110" height="12" rx="6" fill="#4338ca"/>
        <rect x="50" y="68" width="34" height="8" rx="4" fill="#8b5cf6"/>
        <rect x="88" y="68" width="46" height="8" rx="4" fill="#22d3ee"/>
        <!-- $ badge -->
        <circle cx="170" cy="58" r="13" fill="#4338ca" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M170 50 v16 M164 56 h12 M164 60 h12" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- subtle cross-connector: calendar → CRM -->
  <path d="M980 460 C 1120 460, 1180 372, 1400 332" stroke="#94a3b8" stroke-opacity=".45" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>

  <!-- floating chips -->
  <g id="chips">
    <!-- tag -->
    <g transform="translate(300,130)">
      <rect x="0.75" y="0.75" width="86.5" height="30.5" rx="14" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
      <rect x="10" y="9" width="14" height="12" rx="3" fill="#8b5cf6"/>
      <rect x="28" y="9" width="30" height="12" rx="6" fill="#22d3ee"/>
      <circle cx="68" cy="21" r="3" fill="#60a5fa"/>
    </g>
    <!-- avatar -->
    <g transform="translate(1240,130)">
      <rect x="0.75" y="0.75" width="86.5" height="30.5" rx="14" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
      <circle cx="18" cy="16" r="8" fill="#8b5cf6"/>
      <rect x="32" y="10" width="24" height="6" rx="3" fill="#22d3ee"/>
      <rect x="32" y="20" width="18" height="6" rx="3" fill="#60a5fa"/>
    </g>
    <!-- lightning -->
    <g transform="translate(260,710)">
      <rect x="0.75" y="0.75" width="86.5" height="30.5" rx="14" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
      <path d="M22 8 h10 l-6 10 h10 l-20 20 l6 -14 h-10 z" fill="#22d3ee"/>
    </g>
    <!-- tiny accents -->
    <circle cx="360" cy="210" r="3" fill="#22d3ee"/>
    <circle cx="1210" cy="720" r="3" fill="#60a5fa"/>
    <circle cx="1380" cy="220" r="3" fill="#22d3ee"/>
  </g>
</svg>
