<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <!-- Palette refs (for devs):
       slate-300 #cbd5e1, slate-400 #94a3b8, slate-500 #64748b
       indigo-700 #4338ca, indigo-800 #3730a3, indigo-900 #312e81
       violet-500 #8b5cf6, cyan-400 #22d3ee, blue-400 #60a5fa -->

  <!-- Defs: gradients, filters, markers -->
  <defs>
    <!-- Soft radial glow behind console -->
    <radialGradient id="glowGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 450) rotate(90) scale(420 640)">
      <stop offset="0" stop-color="#4338ca" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#3730a3" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#312e81" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft outer glow filter for cards -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4338ca" flood-opacity="0.25"/>
    </filter>

    <!-- Arrowhead marker -->
    <marker id="arrowHead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#94a3b8"/>
    </marker>

    <!-- Reusable rounded card shape -->
    <symbol id="card" viewBox="0 0 220 96" preserveAspectRatio="none">
      <rect x="1.5" y="1.5" width="217" height="93" rx="20" fill="#3730a3" stroke="#94a3b8" stroke-width="2"/>
    </symbol>

    <!-- Tiny chip background -->
    <symbol id="chip" viewBox="0 0 64 32" preserveAspectRatio="none">
      <rect x="1" y="1" width="62" height="30" rx="14" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- Subtle background radial glow (transparent doc bg) -->
  <ellipse cx="800" cy="450" rx="720" ry="460" fill="url(#glowGrad)"/>

  <!-- Central console container -->
  <g id="console" filter="url(#softGlow)">
    <rect x="260" y="170" width="1080" height="560" rx="28" fill="#1b1f36" opacity="0.8"/>
    <rect x="260.5" y="170.5" width="1079" height="559" rx="28" stroke="#94a3b8" stroke-opacity="0.6" stroke-width="1.5"/>

    <!-- Three horizontal lanes (guides) -->
    <g id="lanes" stroke="#64748b" stroke-opacity="0.5" stroke-width="1.5">
      <line x1="320" y1="310" x2="1280" y2="310"/>
      <line x1="320" y1="470" x2="1280" y2="470"/>
      <line x1="320" y1="630" x2="1280" y2="630"/>
    </g>

    <!-- Lane 1: Form capture → Data enrichment → Lead scoring → CRM -->
    <g id="lane-1">
      <!-- Step 1: Form capture icon card -->
      <g id="form-capture" transform="translate(330,260)">
        <use href="#card"/>
        <!-- icon: form with fields -->
        <rect x="34" y="24" width="152" height="48" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="46" y="34" width="64" height="8" rx="4" fill="#8b5cf6"/>
        <rect x="46" y="50" width="96" height="8" rx="4" fill="#22d3ee"/>
        <circle cx="170" cy="48" r="6" fill="#60a5fa"/>
      </g>

      <!-- Arrow 1 → 2 -->
      <path d="M560 308 C 610 308, 610 308, 660 308" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>

      <!-- Step 2: Data enrichment (sparkles/data cards) -->
      <g id="enrichment" transform="translate(680,260)">
        <use href="#card"/>
        <!-- data cards -->
        <rect x="36" y="28" width="70" height="56" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="60" y="40" width="40" height="6" rx="3" fill="#8b5cf6"/>
        <rect x="48" y="54" width="52" height="6" rx="3" fill="#22d3ee"/>
        <!-- sparkles -->
        <g fill="#8b5cf6">
          <path d="M150 40 l6 12 l12 6 l-12 6 l-6 12 l-6 -12 l-12 -6 l12 -6 z" fill-opacity="0.7"/>
          <circle cx="170" cy="76" r="5" fill="#22d3ee"/>
          <circle cx="146" cy="66" r="3" fill="#60a5fa"/>
        </g>
      </g>

      <!-- Arrow 2 → 3 -->
      <path d="M910 308 C 960 308, 960 308, 1010 308" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>

      <!-- Step 3: Lead scoring (gauge) -->
      <g id="lead-scoring" transform="translate(1030,260)">
        <use href="#card"/>
        <!-- gauge -->
        <circle cx="110" cy="60" r="34" stroke="#94a3b8" stroke-width="2" fill="#312e81"/>
        <path d="M76 60 A34 34 0 0 1 144 60" stroke="#8b5cf6" stroke-width="6" fill="none" stroke-linecap="round"/>
        <line x1="110" y1="60" x2="136" y2="50" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
        <circle cx="110" cy="60" r="4" fill="#60a5fa"/>
      </g>

      <!-- Arrow 3 → 4 -->
      <path d="M1260 308 C 1305 308, 1305 308, 1350 308" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>

      <!-- Step 4: CRM (generic logomark-like) -->
      <g id="crm" transform="translate(1370,260)">
        <use href="#card"/>
        <g transform="translate(56,20)">
          <rect x="0" y="0" width="108" height="56" rx="14" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
          <circle cx="18" cy="28" r="10" fill="#8b5cf6"/>
          <circle cx="54" cy="28" r="10" fill="#22d3ee"/>
          <circle cx="90" cy="28" r="10" fill="#60a5fa"/>
        </g>
      </g>
    </g>

    <!-- Lane 2: Email/SMS drip → Calendar booking -->
    <g id="lane-2">
      <!-- Step 1: Email/SMS drip -->
      <g id="drip" transform="translate(420,420)">
        <use href="#card"/>
        <!-- envelope -->
        <rect x="30" y="32" width="70" height="48" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M30 40 L65 64 L100 40" stroke="#8b5cf6" stroke-width="2" fill="none"/>
        <!-- message bubble tiles -->
        <rect x="120" y="34" width="70" height="22" rx="10" fill="#4338ca" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="120" y="62" width="86" height="22" rx="10" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
      </g>
      <!-- Arrow drip → calendar -->
      <path d="M650 468 C 710 468, 710 468, 770 468" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>
      <!-- Step 2: Calendar booking -->
      <g id="calendar" transform="translate(790,420)">
        <use href="#card"/>
        <!-- calendar icon -->
        <rect x="54" y="28" width="112" height="58" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="54" y="28" width="112" height="16" rx="8" fill="#4338ca"/>
        <circle cx="82" cy="40" r="4" fill="#8b5cf6"/>
        <circle cx="138" cy="40" r="4" fill="#8b5cf6"/>
        <!-- check mark -->
        <path d="M88 58 l12 12 l24 -24" stroke="#22d3ee" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Lane 3: Stripe checkout (optional) -->
    <g id="lane-3">
      <g id="checkout" transform="translate(520,580)">
        <use href="#card"/>
        <!-- credit card -->
        <rect x="36" y="34" width="112" height="64" rx="12" fill="#312e81" stroke="#94a3b8" stroke-width="1.5"/>
        <rect x="36" y="50" width="112" height="12" rx="6" fill="#4338ca"/>
        <rect x="48" y="72" width="36" height="8" rx="4" fill="#8b5cf6"/>
        <rect x="90" y="72" width="46" height="8" rx="4" fill="#22d3ee"/>
        <!-- $ badge -->
        <circle cx="172" cy="60" r="14" fill="#4338ca" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M172 50 v20 M166 56 h12 M166 64 h12" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
      </g>
    </g>

  </g>

  <!-- Curved connector arrows between cards (lane 2 to lane 1 CRM, optional) -->
  <path d="M980 470 C 1120 470, 1180 380, 1400 340" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.5" marker-end="url(#arrowHead)"/>

  <!-- Floating UI chips around console -->
  <g id="chips">
    <!-- tag chip -->
    <g transform="translate(260,120)">
      <use href="#chip"/>
      <rect x="12" y="8" width="12" height="12" rx="2" fill="#8b5cf6"/>
      <rect x="26" y="8" width="26" height="12" rx="6" fill="#22d3ee"/>
      <circle cx="54" cy="24" r="3" fill="#60a5fa"/>
    </g>
    <!-- person avatar chip -->
    <g transform="translate(1260,120)">
      <use href="#chip"/>
      <circle cx="20" cy="16" r="8" fill="#8b5cf6"/>
      <rect x="32" y="10" width="24" height="6" rx="3" fill="#22d3ee"/>
      <rect x="32" y="20" width="18" height="6" rx="3" fill="#60a5fa"/>
    </g>
    <!-- lightning bolt chip (automation) -->
    <g transform="translate(220,720)">
      <use href="#chip"/>
      <path d="M22 8 l10 0 l-6 10 h10 l-20 20 l6 -14 h-10 z" fill="#22d3ee"/>
    </g>
    <!-- tiny accent dots -->
    <circle cx="360" cy="210" r="3" fill="#22d3ee"/>
    <circle cx="1210" cy="720" r="3" fill="#60a5fa"/>
    <circle cx="1380" cy="220" r="3" fill="#22d3ee"/>
    <circle cx="260" cy="560" r="3" fill="#8b5cf6"/>
  </g>

</svg>
