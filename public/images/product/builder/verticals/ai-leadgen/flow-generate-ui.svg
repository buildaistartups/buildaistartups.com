<!-- Transparent 16:9 SVG: Lead‑Gen Pipeline for Lead‑Gen Generation -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- Colors -->
    <linearGradient id="grad-ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/><!-- indigo base -->
      <stop offset="100%" stop-color="#8B5CF6"/><!-- violet highlight -->
    </linearGradient>
    <linearGradient id="grad-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B1020" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A0F1A" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="grad-stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Shadows -->
    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L12,7 L2,12 Z" fill="url(#grad-ink)"/>
    </marker>

    <!-- Gear symbol path (12-tooth simplified) -->
    <symbol id="gear" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3.2" fill="none" stroke="url(#grad-ink)" stroke-width="1.8"/>
      <g stroke="url(#grad-ink)" stroke-width="2" stroke-linecap="round">
        <path d="M12 1.5 L12 5.2"/>
        <path d="M12 18.8 L12 22.5"/>
        <path d="M1.5 12 L5.2 12"/>
        <path d="M18.8 12 L22.5 12"/>
        <path d="M4.4 4.4 L6.9 6.9"/>
        <path d="M17.1 17.1 L19.6 19.6"/>
        <path d="M17.1 6.9 L19.6 4.4"/>
        <path d="M4.4 19.6 L6.9 17.1"/>
      </g>
    </symbol>

    <!-- Bolt symbol -->
    <symbol id="bolt" viewBox="0 0 24 24">
      <path d="M13.5 1 L3 13.2 H11 L9 23 L21 9.8 H13 L13.5 1 Z" fill="url(#grad-ink)"/>
    </symbol>

    <!-- Check icon -->
    <symbol id="check" viewBox="0 0 24 24">
      <polyline points="4 12.5 10 18 20 6" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- Subtle vignette glow (keeps overall transparent) -->
  <g opacity="0.6">
    <ellipse cx="800" cy="420" rx="740" ry="340" fill="url(#glow)"/>
  </g>

  <!-- Cards container positions -->
  <!-- Common sizes -->
  <!-- Card width 420, height 260, radius 36 -->

  <!-- Card 1: Repo -->
  <g transform="translate(170,210)" filter="url(#soft-shadow)">
    <rect x="0" y="0" rx="36" ry="36" width="420" height="260" fill="url(#grad-card)" stroke="url(#grad-stroke)" stroke-width="2"/>
    <!-- Inner glow line -->
    <rect x="8" y="8" rx="28" ry="28" width="404" height="244" fill="none" stroke="#8B5CF6" stroke-opacity="0.25"/>
    <!-- Brackets icon -->
    <g transform="translate(70,95)">
      <path d="M80 -40 C55 -30 55 40 80 50" fill="none" stroke="url(#grad-ink)" stroke-width="10" stroke-linecap="round"/>
      <path d="M0 -40 C25 -30 25 40 0 50" fill="none" stroke="url(#grad-ink)" stroke-width="10" stroke-linecap="round"/>
    </g>
    <!-- Branch node -->
    <g transform="translate(280,130)">
      <circle cx="0" cy="0" r="16" fill="#121A2A" stroke="url(#grad-ink)" stroke-width="4"/>
      <circle cx="-90" cy="-50" r="10" fill="#121A2A" stroke="url(#grad-ink)" stroke-width="3"/>
      <circle cx="-90" cy="50" r="10" fill="#121A2A" stroke="url(#grad-ink)" stroke-width="3"/>
      <path d="M-90 -50 C-40 -50 -40 0 0 0" fill="none" stroke="url(#grad-ink)" stroke-width="4" stroke-linecap="round"/>
      <path d="M-90 50 C-40 50 -40 0 0 0" fill="none" stroke="url(#grad-ink)" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Arrow 1: Repo -> UI -->
  <g>
    <path d="M610,340 C740,340 780,280 900,280" fill="none" stroke="url(#grad-ink)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <!-- small accents -->
    <use href="#gear" x="760" y="260" width="22" height="22"/>
    <use href="#bolt" x="820" y="300" width="18" height="18"/>
  </g>

  <!-- Card 2: UI -->
  <g transform="translate(590,210)" filter="url(#soft-shadow)">
    <rect x="0" y="0" rx="36" ry="36" width="420" height="260" fill="url(#grad-card)" stroke="url(#grad-stroke)" stroke-width="2"/>
    <rect x="8" y="8" rx="28" ry="28" width="404" height="244" fill="none" stroke="#8B5CF6" stroke-opacity="0.25"/>
    <!-- Wireframe: hero image block -->
    <rect x="28" y="36" width="240" height="100" rx="14" fill="#121829" stroke="#23304A"/>
    <rect x="38" y="46" width="220" height="80" rx="10" fill="none" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <!-- Wireframe: form on right -->
    <rect x="290" y="36" width="100" height="180" rx="14" fill="#121829" stroke="#23304A"/>
    <rect x="302" y="50" width="76" height="22" rx="6" fill="#0E1626" stroke="#4F46E5" stroke-opacity="0.6"/>
    <rect x="302" y="82" width="76" height="22" rx="6" fill="#0E1626" stroke="#4F46E5" stroke-opacity="0.6"/>
    <rect x="302" y="114" width="76" height="22" rx="6" fill="#0E1626" stroke="#4F46E5" stroke-opacity="0.6"/>
    <rect x="302" y="152" width="76" height="28" rx="8" fill="url(#grad-ink)"/>
    <!-- subtle layout lines -->
    <line x1="28" y1="160" x2="268" y2="160" stroke="#2A3550" stroke-dasharray="6 6"/>
    <line x1="28" y1="182" x2="268" y2="182" stroke="#2A3550" stroke-dasharray="6 6"/>
  </g>

  <!-- Arrow 2: UI -> Copy & Emails -->
  <g>
    <path d="M1030,300 C1160,290 1210,330 1350,340" fill="none" stroke="url(#grad-ink)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <use href="#bolt" x="1120" y="305" width="18" height="18"/>
    <use href="#gear" x="1250" y="320" width="22" height="22"/>
  </g>

  <!-- Card 3: Copy & Emails -->
  <g transform="translate(1010,210)" filter="url(#soft-shadow)">
    <rect x="0" y="0" rx="36" ry="36" width="420" height="260" fill="url(#grad-card)" stroke="url(#grad-stroke)" stroke-width="2"/>
    <rect x="8" y="8" rx="28" ry="28" width="404" height="244" fill="none" stroke="#8B5CF6" stroke-opacity="0.25"/>
    <!-- Document with dog‑ear -->
    <path d="M60 40 h140 a10 10 0 0 1 10 10 v120 a10 10 0 0 1 -10 10 H70 a10 10 0 0 1 -10 -10 V40 z" fill="#121829" stroke="#23304A"/>
    <path d="M190 40 v40 a8 8 0 0 0 8 -8 V48 a8 8 0 0 0 -8 -8 z" fill="#1B2440" stroke="#2C3860"/>
    <!-- document lines -->
    <line x1="76" y1="70" x2="184" y2="70" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="76" y1="92" x2="184" y2="92" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="3"/>
    <line x1="76" y1="114" x2="184" y2="114" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="3"/>
    <line x1="76" y1="136" x2="184" y2="136" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="3"/>

    <!-- Envelope cluster -->
    <g transform="translate(250,80)">
      <g opacity="0.95">
        <rect x="-30" y="-18" width="74" height="50" rx="8" fill="#121829" stroke="url(#grad-ink)"/>
        <path d="M-30 -18 L7 7 L44 -18" fill="none" stroke="url(#grad-ink)" stroke-width="3"/>
      </g>
      <g opacity="0.8">
        <rect x="-58" y="18" width="66" height="44" rx="7" fill="#0F172A" stroke="#4F46E5" stroke-opacity="0.8"/>
        <path d="M-58 18 L-25 42 L8 18" fill="none" stroke="#4F46E5" stroke-opacity="0.8" stroke-width="3"/>
      </g>
      <g opacity="0.7">
        <rect x="22" y="22" width="56" height="40" rx="6" fill="#0F172A" stroke="#8B5CF6" stroke-opacity="0.8"/>
        <path d="M22 22 L50 42 L78 22" fill="none" stroke="#8B5CF6" stroke-opacity="0.9" stroke-width="3"/>
      </g>
    </g>
  </g>

  <!-- Faint CI strip under the row -->
  <g transform="translate(180,520)" opacity="0.9">
    <rect x="0" y="0" width="1240" height="70" rx="18" fill="#0A1020" fill-opacity="0.55" stroke="#1B2440"/>
    <!-- subtle running dots -->
    <g opacity="0.35">
      <circle cx="40" cy="35" r="4" fill="#8B5CF6"/>
      <circle cx="60" cy="35" r="4" fill="#4F46E5"/>
      <circle cx="80" cy="35" r="4" fill="#8B5CF6"/>
      <circle cx="100" cy="35" r="4" fill="#4F46E5"/>
    </g>
    <!-- Checkpoints -->
    <g>
      <g transform="translate(180,14)">
        <circle cx="0" cy="22" r="16" fill="#0E1626" stroke="#113B42"/>
        <use href="#check" x="-12" y="10" width="24" height="24"/>
      </g>
      <g transform="translate(420,14)">
        <circle cx="0" cy="22" r="16" fill="#0E1626" stroke="#113B42"/>
        <use href="#check" x="-12" y="10" width="24" height="24"/>
      </g>
      <g transform="translate(660,14)">
        <circle cx="0" cy="22" r="16" fill="#0E1626" stroke="#113B42"/>
        <use href="#check" x="-12" y="10" width="24" height="24"/>
      </g>
      <g transform="translate(900,14)">
        <circle cx="0" cy="22" r="16" fill="#0E1626" stroke="#113B42"/>
        <use href="#check" x="-12" y="10" width="24" height="24"/>
      </g>
      <g transform="translate(1140,14)">
        <circle cx="0" cy="22" r="16" fill="#0E1626" stroke="#113B42"/>
        <use href="#check" x="-12" y="10" width="24" height="24"/>
      </g>
    </g>
  </g>

  <!-- Extra sparkle accents for depth -->
  <g opacity="0.4">
    <circle cx="200" cy="150" r="2" fill="#8B5CF6"/>
    <circle cx="1480" cy="160" r="2" fill="#4F46E5"/>
    <circle cx="820" cy="600" r="2" fill="#8B5CF6"/>
    <circle cx="380" cy="640" r="2" fill="#4F46E5"/>
  </g>
</svg>
