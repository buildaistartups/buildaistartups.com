<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <!-- Transparent, dark‑theme vector diagram: Brief → Research → PRD (16:9) -->
  <defs>
    <!-- Palette -->
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="grad-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Card stroke -->
    <linearGradient id="stroke-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333EA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner glow for panels -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset/>
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="arithmetic" k2="1" k3="-1"/>
    </filter>

    <!-- Drop shadow subtle -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="url(#grad-cyan)"/>
    </marker>
  </defs>

  <!-- Layout guide (invisible) -->
  <g id="layout" opacity="0">
    <rect x="0" y="0" width="1600" height="900" fill="none"/>
  </g>

  <!-- LEFT: Brief card -->
  <g id="brief" transform="translate(160, 250)">
    <rect x="0" y="0" rx="28" ry="28" width="320" height="280" fill="url(#grad-indigo)" stroke="url(#stroke-glass)" stroke-width="2" filter="url(#shadow)"/>
    <!-- subtle border glow -->
    <rect x="1.5" y="1.5" rx="26.5" ry="26.5" width="317" height="277" fill="none" stroke="#22D3EE" stroke-opacity="0.1"/>
    <!-- quote icon (minimal prompt) -->
    <g transform="translate(100, 90)">
      <path d="M40 0 c-16 0 -28 12 -28 28 c0 14 10 24 24 24 c4 0 8 -1 12 -3 c-3 10 -11 18 -24 23 l6 12 c24 -8 38 -27 38 -51 c0 -18 -12 -33 -28 -33 z" fill="url(#grad-violet)"/>
      <path d="M104 0 c-16 0 -28 12 -28 28 c0 14 10 24 24 24 c4 0 8 -1 12 -3 c-3 10 -11 18 -24 23 l6 12 c24 -8 38 -27 38 -51 c0 -18 -12 -33 -28 -33 z" fill="url(#grad-violet)" opacity="0.85"/>
    </g>
    <!-- faint cyan accents -->
    <circle cx="280" cy="40" r="6" fill="url(#grad-cyan)" opacity="0.9"/>
    <circle cx="44" cy="236" r="4" fill="#22D3EE" opacity="0.6"/>
  </g>

  <!-- CENTER: Research panel -->
  <g id="research" transform="translate(620, 180)">
    <rect x="0" y="0" rx="28" ry="28" width="360" height="420" fill="url(#grad-indigo)" stroke="url(#stroke-glass)" stroke-width="2" filter="url(#shadow)"/>
    <!-- header bar -->
    <rect x="16" y="20" rx="10" ry="10" width="328" height="56" fill="#0f172a" opacity="0.7"/>
    <circle cx="40" cy="48" r="6" fill="#22D3EE" opacity="0.8"/>
    <circle cx="62" cy="48" r="6" fill="#9333EA" opacity="0.7"/>
    <circle cx="84" cy="48" r="6" fill="#7C3AED" opacity="0.7"/>

    <!-- Mini bar chart -->
    <g transform="translate(28, 112)">
      <rect x="0" y="20" width="16" height="44" rx="4" fill="#4F46E5" opacity="0.85"/>
      <rect x="28" y="6" width="16" height="58" rx="4" fill="#7C3AED" opacity="0.9"/>
      <rect x="56" y="34" width="16" height="30" rx="4" fill="#6366F1" opacity="0.85"/>
      <rect x="84" y="14" width="16" height="50" rx="4" fill="#8B5CF6" opacity="0.9"/>
    </g>

    <!-- Trend line chart -->
    <g transform="translate(160, 120)">
      <polyline points="0,70 30,48 60,56 90,34 120,42 150,22 180,30" fill="none" stroke="url(#grad-cyan)" stroke-width="3"/>
      <circle cx="150" cy="22" r="4" fill="#22D3EE"/>
      <circle cx="90" cy="34" r="4" fill="#22D3EE" opacity="0.8"/>
    </g>

    <!-- Audience chips (no text) -->
    <g transform="translate(28, 210)">
      <rect x="0" y="0" rx="14" ry="14" width="96" height="32" fill="#0f172a" stroke="#22D3EE" stroke-opacity="0.4"/>
      <rect x="108" y="0" rx="14" ry="14" width="112" height="32" fill="#0f172a" stroke="#7C3AED" stroke-opacity="0.5"/>
      <!-- ICP silhouette chip -->
      <rect x="232" y="0" rx="14" ry="14" width="84" height="32" fill="#0f172a" stroke="#A78BFA" stroke-opacity="0.5"/>
      <g transform="translate(248,6)">
        <circle cx="10" cy="10" r="8" fill="#A78BFA"/>
        <path d="M0 28 c0 -8 8 -14 18 -14 s18 6 18 14" fill="#A78BFA"/>
      </g>
    </g>

    <!-- Magnifying glass over content -->
    <g transform="translate(230, 250)" filter="url(#softGlow)">
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#grad-cyan)" stroke-width="4"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#22D3EE" stroke-opacity="0.2"/>
      <rect x="-32" y="-18" width="64" height="8" rx="4" fill="#22D3EE" opacity="0.3"/>
      <rect x="-18" y="-2" width="36" height="8" rx="4" fill="#22D3EE" opacity="0.3"/>
      <line x1="42" y1="42" x2="86" y2="86" stroke="url(#grad-cyan)" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- RIGHT: PRD card -->
  <g id="prd" transform="translate(1090, 230)">
    <rect x="0" y="0" rx="28" ry="28" width="350" height="340" fill="url(#grad-indigo)" stroke="url(#stroke-glass)" stroke-width="2" filter="url(#shadow)"/>
    <!-- Stacked sections -->
    <g transform="translate(20, 24)">
      <rect x="0" y="0" rx="10" ry="10" width="310" height="52" fill="#0f172a" opacity="0.7"/>
      <rect x="0" y="66" rx="10" ry="10" width="310" height="52" fill="#0f172a" opacity="0.7"/>
      <rect x="0" y="132" rx="10" ry="10" width="310" height="52" fill="#0f172a" opacity="0.7"/>
      <rect x="0" y="198" rx="10" ry="10" width="310" height="52" fill="#0f172a" opacity="0.7"/>
    </g>
    <!-- Curly braces (JSON hint) -->
    <g transform="translate(140, 270)">
      <path d="M-70 -40 c24 0 28 -12 28 -28 v-20 c0 -16 8 -24 24 -24 h10 v14 h-6 c-8 0 -12 4 -12 12 v18 c0 20 -8 30 -24 34 c16 4 24 14 24 34 v18 c0 8 4 12 12 12 h6 v14 h-10 c-16 0 -24 -8 -24 -24 v-20 c0 -16 -4 -28 -28 -28 z" fill="url(#grad-violet)"/>
      <path d="M70 -40 c-24 0 -28 -12 -28 -28 v-20 c0 -16 -8 -24 -24 -24 h-10 v14 h6 c8 0 12 4 12 12 v18 c0 20 8 30 24 34 c-16 4 -24 14 -24 34 v18 c0 8 -4 12 -12 12 h-6 v14 h10 c16 0 24 -8 24 -24 v-20 c0 -16 4 -28 28 -28 z" fill="url(#grad-violet)"/>
    </g>
  </g>

  <!-- Flow arrows with glow -->
  <g id="arrows" stroke-width="6" fill="none" filter="url(#softGlow)">
    <!-- Left → Center -->
    <path d="M520,390 C580,390 580,390 620,390" stroke="url(#grad-cyan)" marker-end="url(#arrowHead)"/>
    <!-- Center → Right -->
    <path d="M980,390 C1040,390 1040,390 1090,390" stroke="url(#grad-cyan)" marker-end="url(#arrowHead)"/>
  </g>

  <!-- Sparkles (minimal accent) -->
  <g id="sparkles" opacity="0.85">
    <circle cx="540" cy="330" r="2.5" fill="#22D3EE"/>
    <circle cx="1010" cy="330" r="2.5" fill="#A78BFA"/>
    <circle cx="1240" cy="220" r="2" fill="#7C3AED"/>
  </g>
</svg>
