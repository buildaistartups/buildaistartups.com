<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Transparent 16:9 SVG. Dark theme panels, indigo/violet with cyan accents. No text. -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b5bd6"/>
      <stop offset="100%" stop-color="#7a2fd9"/>
    </linearGradient>
    <linearGradient id="grad-violet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b2f54"/>
      <stop offset="100%" stop-color="#171a2e"/>
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70e6ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- Soft shadow / glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="10" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrowhead marker -->
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="url(#grad-cyan)" />
    </marker>

    <!-- Card base style -->
    <symbol id="cardBase" viewBox="0 0 420 280">
      <rect x="0" y="0" width="420" height="280" rx="28" ry="28" fill="url(#grad-violet)" stroke="url(#grad-indigo)" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- Layout guides (invisible) -->
  <g id="layout" opacity="0">
    <rect x="100" y="160" width="420" height="280" />
    <rect x="590" y="120" width="420" height="360" />
    <rect x="1080" y="160" width="420" height="280" />
  </g>

  <!-- LEFT: Deploy card with rocket launching; small generic triangle icon on card header -->
  <g id="deploy" transform="translate(100,160)">
    <use href="#cardBase" />
    <!-- Header strip -->
    <rect x="18" y="18" width="384" height="48" rx="14" fill="#0e1222" opacity="0.7" />
    <!-- Generic triangle icon -->
    <polygon points="46,42 66,30 66,54" fill="url(#grad-cyan)" />
    <!-- Rocket launching from card -->
    <g transform="translate(210,210)">
      <!-- Exhaust glow -->
      <ellipse cx="0" cy="28" rx="18" ry="8" fill="#00d4ff" opacity="0.35" filter="url(#softGlow)"/>
      <!-- Flame -->
      <path d="M -6 18 C -2 28, 2 28, 6 18 L 0 42 Z" fill="url(#grad-cyan)" opacity="0.9"/>
      <!-- Rocket body -->
      <g>
        <path d="M 0 -60 C 22 -38, 22 -8, 0 12 C -22 -8, -22 -38, 0 -60 Z" fill="url(#grad-indigo)" stroke="#8a5cff" stroke-width="1.5"/>
        <circle cx="0" cy="-24" r="8" fill="#0e1222" stroke="#70e6ff" stroke-width="2"/>
        <path d="M -18 -8 L -32 6 L -6 6 Z" fill="#5b5bd6"/>
        <path d="M 18 -8 L 32 6 L 6 6 Z" fill="#5b5bd6"/>
        <rect x="-6" y="8" width="12" height="12" rx="2" fill="#5b5bd6"/>
      </g>
      <!-- Launch trail -->
      <path d="M 0 40 C -30 70, -50 110, -70 150" fill="none" stroke="url(#grad-cyan)" stroke-width="2" opacity="0.5" />
    </g>
  </g>

  <!-- CENTER: Analytics panel with line chart + funnel + A/B toggle chips -->
  <g id="analytics" transform="translate(590,120)">
    <use href="#cardBase" />
    <!-- A/B chips -->
    <g transform="translate(24,24)">
      <rect x="0" y="0" width="56" height="28" rx="14" fill="#0e1222" opacity="0.9" stroke="#70e6ff" stroke-width="1"/>
      <circle cx="18" cy="14" r="6" fill="#70e6ff"/>
      <rect x="68" y="0" width="56" height="28" rx="14" fill="#0e1222" opacity="0.6" stroke="#5b5bd6" stroke-width="1"/>
      <circle cx="86" cy="14" r="6" fill="#5b5bd6"/>
    </g>
    <!-- Line chart -->
    <g transform="translate(24,72)">
      <rect x="0" y="0" width="372" height="160" rx="12" fill="#0e1222" opacity="0.6" />
      <polyline points="8,140 48,120 88,130 128,96 168,108 208,74 248,86 288,40 328,56 364,24" fill="none" stroke="url(#grad-cyan)" stroke-width="3" filter="url(#softGlow)"/>
      <!-- grid dots -->
      <g opacity="0.25">
        <circle cx="48" cy="120" r="2" fill="#70e6ff"/>
        <circle cx="128" cy="96" r="2" fill="#70e6ff"/>
        <circle cx="208" cy="74" r="2" fill="#70e6ff"/>
        <circle cx="288" cy="40" r="2" fill="#70e6ff"/>
      </g>
    </g>
    <!-- Funnel -->
    <g transform="translate(408,72)">
      <g filter="url(#softGlow)">
        <path d="M0,0 L150,0 L120,56 L80,104 L0,104 Z" fill="url(#grad-indigo)" opacity="0.9" stroke="#8a5cff"/>
        <path d="M20,16 L130,16 L108,56 L72,92 L20,92 Z" fill="#0e1222" opacity="0.9"/>
        <circle cx="75" cy="16" r="6" fill="#70e6ff"/>
        <circle cx="95" cy="56" r="6" fill="#70e6ff"/>
        <circle cx="72" cy="92" r="6" fill="#70e6ff"/>
      </g>
    </g>
  </g>

  <!-- RIGHT: CRM sync card (cubes) + Stripe card (credit card icon) -->
  <g id="crm-stripe" transform="translate(1080,160)">
    <use href="#cardBase" />
    <!-- CRM cubes -->
    <g transform="translate(60,92) rotate(-12)">
      <g opacity="0.95" filter="url(#softGlow)">
        <rect x="0" y="0" width="70" height="70" rx="12" fill="#232848" stroke="#5b5bd6"/>
        <rect x="56" y="26" width="70" height="70" rx="12" fill="#232848" stroke="#5b5bd6"/>
        <rect x="26" y="56" width="70" height="70" rx="12" fill="#232848" stroke="#5b5bd6"/>
      </g>
    </g>
    <!-- Sync connector (dashed arrows) -->
    <path d="M220,160 C280,140 300,140 360,160" fill="none" stroke="url(#grad-cyan)" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowHead)"/>
    <!-- Stripe-like card (generic credit card, unbranded) -->
    <g transform="translate(250,90)">
      <rect x="0" y="0" width="220" height="140" rx="16" fill="#0e1222" stroke="#70e6ff" stroke-width="2"/>
      <rect x="16" y="24" width="188" height="14" rx="7" fill="url(#grad-indigo)"/>
      <rect x="16" y="56" width="120" height="10" rx="5" fill="#232848"/>
      <rect x="16" y="76" width="160" height="10" rx="5" fill="#232848"/>
      <rect x="16" y="100" width="80" height="22" rx="6" fill="url(#grad-cyan)" opacity="0.8"/>
      <!-- chip icon -->
      <rect x="162" y="60" width="32" height="24" rx="4" fill="#1b2140" stroke="#5b5bd6"/>
      <line x1="168" y1="60" x2="168" y2="84" stroke="#5b5bd6" stroke-width="1"/>
      <line x1="174" y1="60" x2="174" y2="84" stroke="#5b5bd6" stroke-width="1"/>
      <line x1="180" y1="60" x2="180" y2="84" stroke="#5b5bd6" stroke-width="1"/>
    </g>
  </g>

  <!-- Connecting arrows left -> center -> right -->
  <path d="M 520 300 C 560 300, 580 260, 590 260" fill="none" stroke="url(#grad-cyan)" stroke-width="3" marker-end="url(#arrowHead)"/>
  <path d="M 1010 300 C 1040 300, 1060 280, 1080 300" fill="none" stroke="url(#grad-cyan)" stroke-width="3" marker-end="url(#arrowHead)"/>

  <!-- Bottom timeline with three glowing dots and thin line; arrows indicating flow -->
  <g id="timeline" transform="translate(200,720)">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#2a2f4f" stroke-width="2" opacity="0.8" />
    <!-- Dots: Deploy, Measure, Improve (no text) -->
    <g>
      <circle cx="0" cy="0" r="8" fill="#70e6ff" filter="url(#dotGlow)"/>
      <circle cx="600" cy="0" r="8" fill="#70e6ff" filter="url(#dotGlow)"/>
      <circle cx="1200" cy="0" r="8" fill="#70e6ff" filter="url(#dotGlow)"/>
    </g>
    <!-- Thin arrows along the line -->
    <g stroke="url(#grad-cyan)" stroke-width="2" fill="none" marker-end="url(#arrowHead)" opacity="0.9">
      <line x1="40" y1="0" x2="560" y2="0" />
      <line x1="640" y1="0" x2="1160" y2="0" />
    </g>
  </g>
</svg>
