<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- ========= DEFS ========= -->
  <defs>
    <!-- Dark card fill and strokes -->
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1224"/>
      <stop offset="1" stop-color="#0A0F20"/>
    </linearGradient>
    <linearGradient id="haloIndigoViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <radialGradient id="softGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6D28D9" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft shadows -->
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle stroke gradient for outlines -->
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- ======= BACKGROUND HALOS (transparent doc; halos only) ======= -->
  <g opacity="0.8">
    <circle cx="350" cy="260" r="180" fill="url(#softGlow)" />
    <circle cx="800" cy="220" r="220" fill="url(#softGlow)" />
    <circle cx="1250" cy="260" r="180" fill="url(#softGlow)" />
  </g>

  <!-- ======= LAYOUT GUIDES ======= -->
  <!-- Left / Center / Right card frames -->
  <!-- Left: Deflection card -->
  <g transform="translate(180,180)">
    <rect x="0" y="0" rx="28" ry="28" width="420" height="420"
          fill="url(#cardFill)" stroke="url(#strokeGrad)" stroke-width="1.5"
          filter="url(#cardShadow)"/>
    <!-- FAQ mini card inside -->
    <g transform="translate(48,48)">
      <rect x="0" y="0" rx="18" ry="18" width="250" height="160"
            fill="#0F162C" stroke="url(#strokeGrad)" stroke-width="1.25"/>
      <!-- FAQ lines -->
      <g stroke="#94A3B8" stroke-linecap="round" opacity="0.9">
        <line x1="24" y1="42" x2="210" y2="42" stroke-width="4"/>
        <line x1="24" y1="74" x2="188" y2="74" stroke-width="3"/>
        <line x1="24" y1="106" x2="226" y2="106" stroke-width="3"/>
      </g>
      <!-- Question mark icon (minimal) -->
      <circle cx="220" cy="30" r="12" fill="none" stroke="url(#haloIndigoViolet)" stroke-width="3"/>
      <circle cx="220" cy="54" r="3" fill="url(#haloIndigoViolet)"/>
    </g>

    <!-- Downward arrow to Resolved check -->
    <g transform="translate(200,240)">
      <!-- Arrow stem -->
      <line x1="0" y1="0" x2="0" y2="70" stroke="url(#accentCyan)" stroke-width="4" stroke-linecap="round"/>
      <!-- Arrow head -->
      <path d="M -10 60 L 0 74 L 10 60" fill="none" stroke="url(#accentCyan)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Resolved check icon -->
    <g transform="translate(180,325)">
      <circle cx="40" cy="40" r="34" fill="none" stroke="url(#accentCyan)" stroke-width="4" filter="url(#glow)"/>
      <path d="M22 40 L36 52 L60 28" fill="none" stroke="#22D3EE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
      <circle cx="40" cy="40" r="70" fill="url(#cyanGlow)" opacity="0.35"/>
    </g>
  </g>

  <!-- Center: Metrics panel (AHT gauge + deflection donut) -->
  <g transform="translate(590,150)">
    <rect x="0" y="0" rx="28" ry="28" width="420" height="460"
          fill="url(#cardFill)" stroke="url(#strokeGrad)" stroke-width="1.5"
          filter="url(#cardShadow)"/>

    <!-- AHT Gauge (semi-circle) -->
    <g transform="translate(210,235)">
      <!-- Background arc -->
      <path d="M -160 0 A 160 160 0 0 1 160 0" fill="none" stroke="#1F2937" stroke-width="14" opacity="0.8"/>
      <!-- Gradient arc -->
      <path d="M -160 0 A 160 160 0 0 1 80 -138"
            fill="none" stroke="url(#haloIndigoViolet)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
      <!-- Needle -->
      <g transform="rotate(-25)">
        <line x1="0" y1="0" x2="0" y2="-120" stroke="url(#accentCyan)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="0" cy="0" r="12" fill="#0B1326" stroke="url(#accentCyan)" stroke-width="4"/>
      </g>
    </g>

    <!-- Deflection % donut -->
    <g transform="translate(210,120)">
      <!-- Donut base -->
      <circle cx="0" cy="0" r="56" fill="none" stroke="#1F2937" stroke-width="14"/>
      <!-- Donut progress -->
      <circle cx="0" cy="0" r="56" fill="none" stroke="url(#accentCyan)" stroke-width="14"
              stroke-linecap="round" stroke-dasharray="220 120" transform="rotate(-90)"/>
      <!-- Inner glow -->
      <circle cx="0" cy="0" r="78" fill="url(#cyanGlow)" opacity="0.35"/>
    </g>
  </g>

  <!-- Right: Escalate with context card -->
  <g transform="translate(1000,180)">
    <rect x="0" y="0" rx="28" ry="28" width="420" height="420"
          fill="url(#cardFill)" stroke="url(#strokeGrad)" stroke-width="1.5"
          filter="url(#cardShadow)"/>

    <!-- Folder with up-arrow -->
    <g transform="translate(64,70)">
      <!-- Folder body -->
      <path d="M0 40 Q6 16 30 16 L120 16 Q140 16 152 28 L196 28 Q212 28 220 36 Q228 44 228 58 L228 156 Q228 176 208 176 L20 176 Q0 176 0 156 Z"
            fill="#0F162C" stroke="url(#strokeGrad)" stroke-width="1.25"/>
      <!-- Folder tab -->
      <path d="M30 16 L80 16 Q92 16 100 24 L114 36 L30 36 Q18 36 14 32 Q10 28 12 24 Q14 20 18 18 Z"
            fill="#11182F" stroke="url(#strokeGrad)" stroke-width="1.25"/>
      <!-- Up arrow (escalate) -->
      <g transform="translate(165,110)">
        <line x1="0" y1="28" x2="0" y2="-18" stroke="url(#accentCyan)" stroke-width="6" stroke-linecap="round"/>
        <path d="M -12 -8 L 0 -22 L 12 -8" fill="none" stroke="url(#accentCyan)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="0" cy="4" r="54" fill="none" stroke="url(#haloIndigoViolet)" stroke-width="2" opacity="0.8"/>
        <circle cx="0" cy="4" r="80" fill="url(#cyanGlow)" opacity="0.25"/>
      </g>
    </g>

    <!-- Attached mini summary card -->
    <g transform="translate(290,42)">
      <rect x="0" y="0" rx="14" ry="14" width="110" height="140"
            fill="#0F162C" stroke="url(#strokeGrad)" stroke-width="1.25" filter="url(#cardShadow)"/>
      <g stroke="#94A3B8" stroke-linecap="round" opacity="0.9">
        <line x1="18" y1="36" x2="92" y2="36" stroke-width="4"/>
        <line x1="18" y1="60" x2="84" y2="60" stroke-width="3"/>
        <line x1="18" y1="84" x2="92" y2="84" stroke-width="3"/>
        <line x1="18" y1="108" x2="72" y2="108" stroke-width="3"/>
      </g>
      <!-- Paper clip hint -->
      <path d="M 92 16 q12 0 12 12 l0 60 q0 12 -12 12 q-12 0 -12 -12 l0 -54"
            fill="none" stroke="url(#haloIndigoViolet)" stroke-width="2" opacity="0.9"/>
    </g>
  </g>

  <!-- ======= Bottom timeline: Deflect → Measure → Improve (no text) ======= -->
  <g transform="translate(200,720)">
    <!-- Base line -->
    <path d="M0 0 L1200 0" stroke="#1F2A44" stroke-width="3" opacity="0.7" />
    <!-- Progress gradient overlay -->
    <path d="M0 0 L1200 0" stroke="url(#haloIndigoViolet)" stroke-width="3" opacity="0.35" />
    <!-- Three glowing dots -->
    <g>
      <!-- Dot 1 -->
      <circle cx="0" cy="0" r="12" fill="url(#accentCyan)" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="40" fill="url(#cyanGlow)" opacity="0.6"/>
    </g>
    <g transform="translate(600,0)">
      <!-- Dot 2 -->
      <circle cx="0" cy="0" r="12" fill="url(#accentCyan)" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="40" fill="url(#cyanGlow)" opacity="0.6"/>
    </g>
    <g transform="translate(1200,0)">
      <!-- Dot 3 -->
      <circle cx="0" cy="0" r="12" fill="url(#accentCyan)" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="40" fill="url(#cyanGlow)" opacity="0.6"/>
    </g>
    <!-- Subtle chevrons between dots -->
    <g stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
      <path d="M180 -10 L192 0 L180 10" />
      <path d="M420 -10 L432 0 L420 10" />
      <path d="M780 -10 L792 0 L780 10" />
      <path d="M1020 -10 L1032 0 L1020 10" />
    </g>
  </g>
</svg>
