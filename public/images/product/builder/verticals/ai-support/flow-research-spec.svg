<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glows -->
    <radialGradient id="glowIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#6d28d9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Card fill & strokes -->
    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="arrowStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000015" flood-opacity="0.45"/>
    </filter>

    <!-- Arrowhead -->
    <marker id="arrowHead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="url(#arrowStroke)"/>
    </marker>
  </defs>

  <!-- Ambient glows (transparent background overall) -->
  <g opacity="0.9">
    <ellipse cx="800" cy="450" rx="700" ry="340" fill="url(#glowIndigo)"/>
    <ellipse cx="800" cy="480" rx="520" ry="260" fill="url(#glowViolet)"/>
  </g>

  <!-- === Cards === -->
  <!-- Layout: Left (Docs), Middle (Graph), Right (Guardrails) -->
  <!-- Card styling -->
  <g id="cards" fill="rgba(2,6,23,0.55)" stroke="url(#cardStroke)" stroke-width="2" filter="url(#softShadow)">
    <!-- Left card -->
    <rect x="140" y="180" rx="28" ry="28" width="380" height="440"/>
    <!-- Middle card -->
    <rect x="660" y="160" rx="28" ry="28" width="380" height="480"/>
    <!-- Right card -->
    <rect x="1180" y="180" rx="28" ry="28" width="380" height="440"/>
  </g>

  <!-- Card inner halos -->
  <g opacity="0.35">
    <ellipse cx="330" cy="400" rx="240" ry="180" fill="url(#glowIndigo)"/>
    <ellipse cx="850" cy="400" rx="250" ry="190" fill="url(#glowViolet)"/>
    <ellipse cx="1370" cy="400" rx="240" ry="180" fill="url(#glowIndigo)"/>
  </g>

  <!-- === Icons / Content === -->

  <!-- Left: Docs ingestion (stack of pages + upload arrow) -->
  <g transform="translate(140,180)">
    <!-- Stack of pages -->
    <g transform="translate(80,120)">
      <rect x="0" y="0" width="220" height="160" rx="12" fill="rgba(15,23,42,0.7)" stroke="#475569" stroke-opacity="0.5"/>
      <rect x="16" y="-16" width="220" height="160" rx="12" fill="rgba(15,23,42,0.55)" stroke="#475569" stroke-opacity="0.35"/>
      <rect x="32" y="-32" width="220" height="160" rx="12" fill="rgba(15,23,42,0.4)" stroke="#475569" stroke-opacity="0.25"/>
      <!-- page lines -->
      <g stroke="#94a3b8" stroke-opacity="0.5" stroke-linecap="round">
        <line x1="48" y1="24" x2="220" y2="24"/>
        <line x1="48" y1="48" x2="220" y2="48"/>
        <line x1="48" y1="72" x2="180" y2="72"/>
      </g>
    </g>
    <!-- Upload arrow -->
    <g transform="translate(240,330)">
      <circle cx="0" cy="0" r="34" fill="rgba(2,132,199,0.12)" stroke="url(#accent)"/>
      <path d="M0,-16 L0,12" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
      <path d="M-12,-4 L0,-16 L12,-4" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="-18" y="12" width="36" height="8" rx="4" fill="url(#accent)" opacity="0.9"/>
    </g>
  </g>

  <!-- Middle: Knowledge graph (nodes/edges) -->
  <g transform="translate(660,160)">
    <!-- Edges -->
    <g stroke="url(#accent)" stroke-opacity="0.6">
      <line x1="120" y1="160" x2="260" y2="100"/>
      <line x1="120" y1="160" x2="200" y2="240"/>
      <line x1="260" y1="100" x2="300" y2="220"/>
      <line x1="200" y1="240" x2="320" y2="300"/>
      <line x1="300" y1="220" x2="200" y2="80"/>
      <line x1="200" y1="80"  x2="120" y2="160"/>
      <line x1="260" y1="100" x2="360" y2="60"/>
      <line x1="360" y1="60"  x2="320" y2="300"/>
      <line x1="200" y1="80"  x2="360" y2="60"/>
    </g>
    <!-- Nodes -->
    <g>
      <circle cx="120" cy="160" r="14" fill="#22d3ee" opacity="0.9"/>
      <circle cx="260" cy="100" r="10" fill="#a78bfa" opacity="0.9"/>
      <circle cx="200" cy="240" r="12" fill="#22d3ee" opacity="0.9"/>
      <circle cx="300" cy="220" r="11" fill="#8b5cf6" opacity="0.9"/>
      <circle cx="320" cy="300" r="13" fill="#06b6d4" opacity="0.9"/>
      <circle cx="200" cy="80"  r="9"  fill="#a78bfa" opacity="0.9"/>
      <circle cx="360" cy="60"  r="8"  fill="#22d3ee" opacity="0.9"/>
    </g>
  </g>

  <!-- Right: Guardrails (shield + policy sliders) -->
  <g transform="translate(1180,180)">
    <!-- Shield -->
    <g transform="translate(190,240)">
      <path d="M0,-120 C40,-110 80,-100 120,-80 C120,10 80,80 0,120 C-80,80 -120,10 -120,-80 C-80,-100 -40,-110 0,-120 Z"
            fill="rgba(17,24,39,0.7)" stroke="url(#accent)" stroke-width="3"/>
      <!-- Sliders -->
      <g stroke="#94a3b8" stroke-opacity="0.8" stroke-linecap="round">
        <line x1="-80" y1="-20" x2="80" y2="-20"/>
        <circle cx="-20" cy="-20" r="10" fill="url(#accent)"/>
        <line x1="-80" y1="20" x2="80" y2="20"/>
        <circle cx="30" cy="20" r="10" fill="url(#accent)"/>
      </g>
    </g>
  </g>

  <!-- === Curved arrows between cards === -->
  <g fill="none" stroke="url(#arrowStroke)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowHead)" opacity="0.9">
    <!-- Left -> Middle -->
    <path d="M 520 400 C 600 360, 630 340, 660 350"/>
    <!-- Middle -> Right -->
    <path d="M 1040 380 C 1110 370, 1150 370, 1180 390"/>
  </g>

  <!-- === Side chips (generic Zendesk/Intercom placeholders) === -->
  <!-- Left chip near middle card: headset icon -->
  <g transform="translate(620,240)">
    <rect x="-64" y="-22" width="128" height="44" rx="22" fill="rgba(15,23,42,0.7)" stroke="url(#cardStroke)"/>
    <g transform="translate(-22,0)">
      <!-- Headset -->
      <path d="M0,-6 a18,18 0 1,1 0,12" fill="none" stroke="#22d3ee" stroke-width="3"/>
      <rect x="-22" y="-4" width="10" height="16" rx="4" fill="#22d3ee" opacity="0.9"/>
      <rect x="12" y="-4" width="10" height="16" rx="4" fill="#22d3ee" opacity="0.9"/>
      <path d="M-12,12 H8" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- small accent dot -->
    <circle cx="40" cy="0" r="6" fill="#a78bfa" opacity="0.9"/>
  </g>

  <!-- Right chip near middle card: chat bubble icon -->
  <g transform="translate(1040,540)">
    <rect x="-64" y="-22" width="128" height="44" rx="22" fill="rgba(15,23,42,0.7)" stroke="url(#cardStroke)"/>
    <!-- Chat bubble -->
    <g>
      <path d="M-20,-6 h44 a10,10 0 0 1 10,10 v4 a10,10 0 0 1 -10,10 h-18 l-10,10 v-10 h-16 a10,10 0 0 1 -10,-10 v-4 a10,10 0 0 1 10,-10 z"
            fill="none" stroke="#22d3ee" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="-6" cy="4" r="3" fill="#22d3ee"/>
      <circle cx="2" cy="4" r="3" fill="#22d3ee"/>
      <circle cx="10" cy="4" r="3" fill="#22d3ee"/>
    </g>
    <circle cx="52" cy="0" r="6" fill="#8b5cf6" opacity="0.9"/>
  </g>

  <!-- Subtle top/bottom vignette (still transparent overall) -->
  <g opacity="0.2">
    <ellipse cx="800" cy="-60" rx="900" ry="220" fill="url(#glowIndigo)"/>
    <ellipse cx="800" cy="960" rx="900" ry="260" fill="url(#glowViolet)"/>
  </g>
</svg>
