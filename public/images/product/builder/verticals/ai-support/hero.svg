<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <!-- Palette -->
    <style>
      .stroke-slate { stroke: #94a3b8; }  /* slate-400 */
      .fill-indigo { fill: #6366f1; }     /* indigo-500 */
      .fill-indigo-600 { fill: #4f46e5; } /* indigo-600 */
      .fill-violet { fill: #8b5cf6; }     /* violet-500 */
      .fill-cyan { fill: #22d3ee; }       /* cyan-400 */
      .fill-slate-800 { fill: #1f2937; }  /* slate-800 (for subtle inner areas) */
      .fill-slate-900 { fill: #111827; }  /* slate-900 */
      .no-fill { fill: none; }
    </style>

    <!-- Soft radial glow -->
    <radialGradient id="indigoGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <!-- Generic shadow blur -->
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="normal"/>
    </filter>

    <!-- Icon symbols (stroke-only, rounded) -->
    <g id="icon-book" stroke-linecap="round" stroke-linejoin="round" class="no-fill stroke-slate">
      <path d="M2 5c0-1.657 1.343-3 3-3h8v14H5c-1.657 0-3-1.343-3-3V5z" transform="translate(0.5,0.5)"/>
      <path d="M5 2h8" transform="translate(0.5,0.5)"/>
      <path d="M5 6h6" transform="translate(0.5,0.5)"/>
    </g>

