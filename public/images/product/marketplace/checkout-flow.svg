<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .step-circle {
      transition: all 0.3s ease;
    }
    .step-circle:hover {
      transform: scale(1.1);
    }
    .arrow {
      animation: slideArrow 2s ease-in-out infinite;
    }
    @keyframes slideArrow {
      0%, 100% { opacity: 0.6; transform: translateX(0); }
      50% { opacity: 1; transform: translateX(5px); }
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .fade-in {
      animation: fadeIn 1s ease-in forwards;
      opacity: 0;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    .icon-path {
      animation: drawPath 1.5s ease-in-out forwards;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
    }
    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }
    .label {
      fill: #3B82F6;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600;
      font-size: 16px;
    }
    .sublabel {
      fill: #8B5CF6;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }
  </style>

  <!-- Step 1: Browse -->
  <g class="fade-in" style="animation-delay: 0s">
    <circle cx="100" cy="80" r="45" fill="none" stroke="url(#purpleGrad)" stroke-width="3" class="step-circle pulse"/>
    <!-- Grid icon -->
    <rect x="80" y="60" width="16" height="16" fill="none" stroke="#8B5CF6" stroke-width="2.5" rx="2"/>
    <rect x="104" y="60" width="16" height="16" fill="none" stroke="#8B5CF6" stroke-width="2.5" rx="2"/>
    <rect x="80" y="84" width="16" height="16" fill="none" stroke="#8B5CF6" stroke-width="2.5" rx="2"/>
    <rect x="104" y="84" width="16" height="16" fill="none" stroke="#8B5CF6" stroke-width="2.5" rx="2"/>
    <text x="100" y="145" text-anchor="middle" class="label">Browse</text>
    <text x="100" y="162" text-anchor="middle" class="sublabel">Marketplace</text>
  </g>

  <!-- Arrow 1 -->
  <g class="arrow fade-in" style="animation-delay: 0.2s">
    <line x1="150" y1="80" x2="200" y2="80" stroke="#8B5CF6" stroke-width="2" opacity="0.6"/>
    <polygon points="200,80 190,75 190,85" fill="#8B5CF6" opacity="0.6"/>
  </g>

  <!-- Step 2: View Details -->
  <g class="fade-in" style="animation-delay: 0.4s">
    <circle cx="250" cy="80" r="45" fill="none" stroke="url(#purpleGrad)" stroke-width="3" class="step-circle pulse" style="animation-delay: 0.5s"/>
    <!-- Magnifying glass icon -->
    <circle cx="243" cy="73" r="11" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
    <line x1="251" y1="81" x2="260" y2="90" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
    <text x="250" y="145" text-anchor="middle" class="label">View Details</text>
    <text x="250" y="162" text-anchor="middle" class="sublabel">Product Info</text>
  </g>

  <!-- Arrow 2 -->
  <g class="arrow fade-in" style="animation-delay: 0.6s">
    <line x1="300" y1="80" x2="350" y2="80" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
    <polygon points="350,80 340,75 340,85" fill="#3B82F6" opacity="0.6"/>
  </g>

  <!-- Step 3: Purchase -->
  <g class="fade-in" style="animation-delay: 0.8s">
    <circle cx="400" cy="80" r="45" fill="none" stroke="url(#blueGrad)" stroke-width="3" class="step-circle pulse" style="animation-delay: 1s"/>
    <!-- Credit card icon -->
    <rect x="380" y="68" width="40" height="26" rx="3" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
    <line x1="380" y1="76" x2="420" y2="76" stroke="#3B82F6" stroke-width="2.5"/>
    <line x1="384" y1="84" x2="400" y2="84" stroke="#3B82F6" stroke-width="2"/>
    <text x="400" y="145" text-anchor="middle" class="label">Purchase</text>
    <text x="400" y="162" text-anchor="middle" class="sublabel">Secure Payment</text>
  </g>

  <!-- Arrow 3 with Escrow label -->
  <g class="arrow fade-in" style="animation-delay: 1s">
    <line x1="450" y1="80" x2="500" y2="80" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
    <polygon points="500,80 490,75 490,85" fill="#3B82F6" opacity="0.6"/>
    <rect x="455" y="60" width="60" height="14" rx="7" fill="#8B5CF6" opacity="0.2"/>
    <text x="485" y="69" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="600">ESCROW</text>
  </g>

  <!-- Step 4: Transfer -->
  <g class="fade-in" style="animation-delay: 1.2s">
    <circle cx="550" cy="80" r="45" fill="none" stroke="url(#blueGrad)" stroke-width="3" class="step-circle pulse" style="animation-delay: 1.5s"/>
    <!-- Handshake icon -->
    <path d="M 530 73 L 537 66 L 544 73 M 556 87 L 563 80 L 570 87 M 544 73 L 556 87" 
          fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="538" cy="68" r="3" fill="#8B5CF6"/>
    <circle cx="562" cy="82" r="3" fill="#8B5CF6"/>
    <text x="550" y="145" text-anchor="middle" class="label">Transfer</text>
    <text x="550" y="162" text-anchor="middle" class="sublabel">Item Delivered</text>
  </g>

  <!-- Arrow 4 with Stripe Connect -->
  <g class="arrow fade-in" style="animation-delay: 1.4s">
    <line x1="600" y1="80" x2="650" y2="80" stroke="#8B5CF6" stroke-width="2" opacity="0.6"/>
    <polygon points="650,80 640,75 640,85" fill="#8B5CF6" opacity="0.6"/>
    <!-- Stripe logo reference -->
    <g transform="translate(605, 58)">
      <rect width="50" height="16" rx="3" fill="#635BFF" opacity="0.15"/>
      <text x="25" y="11" text-anchor="middle" font-size="8" fill="#635BFF" font-weight="700">STRIPE</text>
    </g>
  </g>

  <!-- Step 5: Payout -->
  <g class="fade-in" style="animation-delay: 1.6s">
    <circle cx="700" cy="80" r="45" fill="none" stroke="url(#purpleGrad)" stroke-width="3" class="step-circle pulse" style="animation-delay: 2s"/>
    <!-- Money icon -->
    <circle cx="700" cy="80" r="16" fill="none" stroke="#8B5CF6" stroke-width="2.5"/>
    <text x="700" y="87" text-anchor="middle" font-size="22" fill="#8B5CF6" font-weight="bold">$</text>
    <text x="700" y="145" text-anchor="middle" class="label">Payout</text>
    <text x="700" y="162" text-anchor="middle" class="sublabel">Seller Paid</text>
  </g>

  <!-- Bottom decorative element -->
  <g class="fade-in" style="animation-delay: 2s">
    <rect x="50" y="165" width="700" height="2" rx="1" fill="url(#purpleGrad)" opacity="0.2"/>
  </g>
</svg>
