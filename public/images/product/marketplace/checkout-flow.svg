<svg viewBox="0 0 1800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Step 1: Browse -->
  <g transform="translate(75, 150)">
    <circle cx="75" cy="75" r="67.5" fill="url(#purpleGrad)" opacity="0.15"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="url(#purpleGrad)" stroke-width="3.75"/>
    <!-- Grid Icon -->
    <rect x="52.5" y="52.5" width="15" height="15" fill="#7c3aed" rx="1.5"/>
    <rect x="75" y="52.5" width="15" height="15" fill="#7c3aed" rx="1.5"/>
    <rect x="52.5" y="75" width="15" height="15" fill="#7c3aed" rx="1.5"/>
    <rect x="75" y="75" width="15" height="15" fill="#7c3aed" rx="1.5"/>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#3b82f6">Browse</text>
    <text x="75" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="16.5" fill="#60a5fa">Explore Items</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 225 225 L 315 225" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrowhead1)"/>
  <defs>
    <marker id="arrowhead1" markerWidth="15" markerHeight="15" refX="12" refY="4.5" orient="auto">
      <polygon points="0 0, 15 4.5, 0 9" fill="#7c3aed"/>
    </marker>
  </defs>
  
  <!-- Step 2: View Details -->
  <g transform="translate(315, 150)">
    <circle cx="75" cy="75" r="67.5" fill="url(#blueGrad)" opacity="0.15"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="url(#blueGrad)" stroke-width="3.75"/>
    <!-- Magnifying Glass Icon -->
    <circle cx="69" cy="69" r="15" fill="none" stroke="#3b82f6" stroke-width="3.75"/>
    <line x1="79.5" y1="79.5" x2="90" y2="90" stroke="#3b82f6" stroke-width="3.75" stroke-linecap="round"/>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#3b82f6">View Details</text>
    <text x="75" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="16.5" fill="#60a5fa">Check Info</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 465 225 L 555 225" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="15" markerHeight="15" refX="12" refY="4.5" orient="auto">
      <polygon points="0 0, 15 4.5, 0 9" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Step 3: Purchase -->
  <g transform="translate(555, 150)">
    <circle cx="75" cy="75" r="67.5" fill="url(#purpleGrad)" opacity="0.15"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="url(#purpleGrad)" stroke-width="3.75"/>
    <!-- Credit Card Icon -->
    <rect x="54" y="64.5" width="42" height="27" rx="3" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <line x1="54" y1="73.5" x2="96" y2="73.5" stroke="#7c3aed" stroke-width="3"/>
    <line x1="60" y1="82.5" x2="75" y2="82.5" stroke="#7c3aed" stroke-width="2.25"/>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#3b82f6">Purchase</text>
    <text x="75" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="16.5" fill="#60a5fa">Secure Payment</text>
    <!-- Escrow Protection Badge -->
    <g transform="translate(30, -22.5)">
      <rect x="0" y="0" width="90" height="24" rx="12" fill="#10b981" opacity="0.9"/>
      <text x="45" y="16.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="600" fill="white">ESCROW</text>
    </g>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 705 225 L 795 225" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrowhead3)"/>
  <defs>
    <marker id="arrowhead3" markerWidth="15" markerHeight="15" refX="12" refY="4.5" orient="auto">
      <polygon points="0 0, 15 4.5, 0 9" fill="#7c3aed"/>
    </marker>
  </defs>
  
  <!-- Step 4: Transfer -->
  <g transform="translate(795, 150)">
    <circle cx="75" cy="75" r="67.5" fill="url(#blueGrad)" opacity="0.15"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="url(#blueGrad)" stroke-width="3.75"/>
    <!-- Handshake Icon -->
    <path d="M 60 78 L 66 72 L 72 78 L 78 72 L 84 78 L 90 72" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="57" y="78" width="9" height="12" fill="#3b82f6" rx="1.5"/>
    <rect x="84" y="78" width="9" height="12" fill="#3b82f6" rx="1.5"/>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#3b82f6">Transfer</text>
    <text x="75" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="16.5" fill="#60a5fa">Asset Delivery</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 945 225 L 1035 225" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead4)"/>
  <defs>
    <marker id="arrowhead4" markerWidth="15" markerHeight="15" refX="12" refY="4.5" orient="auto">
      <polygon points="0 0, 15 4.5, 0 9" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Step 5: Payout -->
  <g transform="translate(1035, 150)">
    <circle cx="75" cy="75" r="67.5" fill="url(#purpleGrad)" opacity="0.15"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="url(#purpleGrad)" stroke-width="3.75"/>
    <!-- Money Icon -->
    <circle cx="75" cy="75" r="18" fill="none" stroke="#7c3aed" stroke-width="3.75"/>
    <text x="75" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#7c3aed">$</text>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#3b82f6">Payout</text>
    <text x="75" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="16.5" fill="#60a5fa">Funds Released</text>
    <!-- Stripe Connect Logo -->
    <g transform="translate(18, -22.5)">
      <rect x="0" y="0" width="114" height="24" rx="12" fill="#635bff" opacity="0.95"/>
      <text x="57" y="16.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="600" fill="white">stripe connect</text>
    </g>
  </g>
</svg>
