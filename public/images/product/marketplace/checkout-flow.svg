<svg viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Step 1: Browse -->
  <g transform="translate(60, 40)">
    <circle cx="40" cy="40" r="45" fill="url(#purpleGrad)" opacity="0.1"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#purpleGrad)" stroke-width="2"/>
    <rect x="24" y="24" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="36" y="24" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="48" y="24" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="24" y="36" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="36" y="36" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="48" y="36" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="24" y="48" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="36" y="48" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    <rect x="48" y="48" width="8" height="8" fill="url(#purpleGrad)" rx="1.5"/>
    
    <text x="40" y="105" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="600">Browse</text>
    <text x="40" y="122" text-anchor="middle" fill="#3B82F6" font-size="12">Explore items</text>
  </g>
  
  <!-- Arrow 1 -->
  <g transform="translate(155, 80)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#purpleGrad)" stroke-width="3"/>
    <polygon points="70,0 60,-5 60,5" fill="url(#purpleGrad)"/>
  </g>
  
  <!-- Step 2: View Details -->
  <g transform="translate(280, 40)">
    <circle cx="40" cy="40" r="45" fill="url(#blueGrad)" opacity="0.1"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#blueGrad)" stroke-width="2"/>
    <circle cx="38" cy="38" r="10" fill="none" stroke="url(#blueGrad)" stroke-width="2.5"/>
    <line x1="45" y1="45" x2="52" y2="52" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round"/>
    
    <text x="40" y="105" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="600">View Details</text>
    <text x="40" y="122" text-anchor="middle" fill="#3B82F6" font-size="12">Review item</text>
  </g>
  
  <!-- Arrow 2 -->
  <g transform="translate(375, 80)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#blueGrad)" stroke-width="3"/>
    <polygon points="70,0 60,-5 60,5" fill="url(#blueGrad)"/>
  </g>
  
  <!-- Step 3: Purchase -->
  <g transform="translate(500, 40)">
    <circle cx="40" cy="40" r="45" fill="url(#purpleGrad)" opacity="0.1"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#purpleGrad)" stroke-width="2"/>
    <rect x="26" y="33" width="28" height="18" rx="2.5" fill="none" stroke="url(#purpleGrad)" stroke-width="2"/>
    <line x1="26" y1="38" x2="54" y2="38" stroke="url(#purpleGrad)" stroke-width="2"/>
    <line x1="29" y1="44" x2="38" y2="44" stroke="url(#purpleGrad)" stroke-width="1.5" stroke-linecap="round"/>
    
    <text x="40" y="105" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="600">Purchase</text>
    <text x="40" y="122" text-anchor="middle" fill="#3B82F6" font-size="12">Secure payment</text>
    
    <!-- Escrow Badge BELOW text -->
    <g transform="translate(8, 135)">
      <rect x="0" y="0" width="64" height="20" rx="10" fill="#10B981" opacity="0.15"/>
      <rect x="0" y="0" width="64" height="20" rx="10" fill="none" stroke="#10B981" stroke-width="1"/>
      <text x="32" y="14" text-anchor="middle" fill="#059669" font-size="10" font-weight="600">🔒 ESCROW</text>
    </g>
  </g>
  
  <!-- Arrow 3 -->
  <g transform="translate(595, 80)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#purpleGrad)" stroke-width="3"/>
    <polygon points="70,0 60,-5 60,5" fill="url(#purpleGrad)"/>
  </g>
  
  <!-- Step 4: Transfer -->
  <g transform="translate(720, 40)">
    <circle cx="40" cy="40" r="45" fill="url(#blueGrad)" opacity="0.1"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#blueGrad)" stroke-width="2"/>
    <path d="M 30 38 L 33 35 L 38 35 L 41 38 M 33 35 L 33 42 M 38 35 L 38 42 M 41 38 L 46 43 M 30 38 L 25 43 M 35.5 44 L 35.5 48 M 44.5 44 L 44.5 48" 
          fill="none" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="40" y="105" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="600">Transfer</text>
    <text x="40" y="122" text-anchor="middle" fill="#3B82F6" font-size="12">Item delivered</text>
  </g>
  
  <!-- Arrow 4 -->
  <g transform="translate(815, 80)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#blueGrad)" stroke-width="3"/>
    <polygon points="70,0 60,-5 60,5" fill="url(#blueGrad)"/>
  </g>
  
  <!-- Step 5: Payout -->
  <g transform="translate(940, 40)">
    <circle cx="40" cy="40" r="45" fill="url(#purpleGrad)" opacity="0.1"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#purpleGrad)" stroke-width="2"/>
    <circle cx="40" cy="40" r="12" fill="none" stroke="url(#purpleGrad)" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" fill="url(#purpleGrad)" font-size="14" font-weight="700">$</text>
    <line x1="33" y1="32" x2="47" y2="32" stroke="url(#purpleGrad)" stroke-width="1.5"/>
    <line x1="33" y1="48" x2="47" y2="48" stroke="url(#purpleGrad)" stroke-width="1.5"/>
    
    <text x="40" y="105" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="600">Payout</text>
    <text x="40" y="122" text-anchor="middle" fill="#3B82F6" font-size="12">Funds released</text>
    
    <!-- Stripe Connect Logo BELOW text -->
    <g transform="translate(-30, 135)">
      <rect x="0" y="0" width="140" height="28" rx="4" fill="#635BFF" opacity="0.1"/>
      <rect x="0" y="0" width="140" height="28" rx="4" fill="none" stroke="#635BFF" stroke-width="1"/>
      <text x="70" y="15" text-anchor="middle" fill="#635BFF" font-size="12" font-weight="700">stripe</text>
      <text x="70" y="24" text-anchor="middle" fill="#635BFF" font-size="8" font-weight="500">CONNECT</text>
    </g>
  </g>
  
  <!-- Timeline indicator -->
  <line x1="100" y1="240" x2="1020" y2="240" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,6"/>
  <text x="560" y="265" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="600">SECURE TRANSACTION FLOW</text>
</svg>
