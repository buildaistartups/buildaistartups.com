<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380">
  <defs>
    <!-- Purple → Blue gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>

    <!-- Subtle drop shadow for nodes -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <!-- Arrowhead marker -->
    <marker id="arrowHead" markerWidth="14" markerHeight="14" refX="10" refY="6" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#7C3AED" />
    </marker>

    <!-- Common text style -->
    <style><![CDATA[
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif; font-size: 18px; fill: #0F172A; letter-spacing: 0.2px; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .badgeText { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif; font-size: 12px; fill: #0F172A; }
      .iconStroke { stroke: #0F172A; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .iconFill { fill: #0F172A; }
    ]]></style>
  </defs>

  <!-- Background: transparent (no rect) -->

  <!-- Horizontal connectors -->
  <g stroke="#7C3AED" stroke-width="3.5" fill="none" marker-end="url(#arrowHead)">
    <path d="M 180 140 L 300 140" />
    <path d="M 460 140 L 580 140" />
    <path d="M 740 140 L 860 140" />
    <path d="M 1020 140 L 1140 140" />
  </g>

  <!-- Nodes -->
  <!-- Positions for nodes: 120, 140 | 400, 140 | 680, 140 | 960, 140 | 1240, 140 -->
  <!-- Node 1: Browse (grid icon) -->
  <g transform="translate(120,140)">
    <circle r="56" fill="url(#grad)" filter="url(#softShadow)"/>
    <!-- Grid icon -->
    <g transform="translate(-24,-24)">
      <!-- 3x3 grid of squares -->
      <rect x="0" y="0" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="18" y="0" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="36" y="0" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="0" y="18" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="18" y="18" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="36" y="18" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="0" y="36" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="18" y="36" width="14" height="14" rx="2" class="iconFill"/>
      <rect x="36" y="36" width="14" height="14" rx="2" class="iconFill"/>
    </g>
    <text x="0" y="98" text-anchor="middle" class="label">Browse</text>
  </g>

  <!-- Node 2: View Details (magnifying glass) -->
  <g transform="translate(400,140)">
    <circle r="56" fill="url(#grad)" filter="url(#softShadow)"/>
    <!-- Magnifying glass -->
    <g>
      <circle cx="-10" cy="-6" r="22" class="iconStroke"/>
      <line x1="4" y1="8" x2="24" y2="28" class="iconStroke"/>
    </g>
    <text x="0" y="98" text-anchor="middle" class="label">View Details</text>
  </g>

  <!-- Node 3: Purchase (credit card) -->
  <g transform="translate(680,140)">
    <circle r="56" fill="url(#grad)" filter="url(#softShadow)"/>
    <!-- Credit card icon -->
    <g>
      <rect x="-28" y="-16" width="56" height="32" rx="6" class="iconStroke" />
      <line x1="-28" y1="-4" x2="28" y2="-4" class="iconStroke" />
      <rect x="-20" y="4" width="14" height="8" class="iconFill" />
    </g>
    <text x="0" y="98" text-anchor="middle" class="label">Purchase</text>

    <!-- Escrow Protection badge -->
    <g transform="translate(0,130)">
      <rect x="-92" y="-18" width="184" height="28" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
      <!-- Shield icon -->
      <path d="M -68 -8 l 0 6 a 20 20 0 0 0 16 18 a 20 20 0 0 0 16 -18 l 0 -6 l -16 -6 z" fill="none" stroke="#0F172A" stroke-width="1.5" />
      <text x="4" y="2" text-anchor="middle" class="badgeText">Escrow Protection</text>
    </g>
  </g>

  <!-- Node 4: Transfer (handshake) -->
  <g transform="translate(960,140)">
    <circle r="56" fill="url(#grad)" filter="url(#softShadow)"/>
    <!-- Minimal handshake icon -->
    <g>
      <!-- left arm -->
      <path d="M -34 -4 l 22 -12 a 8 8 0 0 1 9 1 l 20 14" class="iconStroke"/>
      <!-- right arm -->
      <path d="M 34 -4 l -22 -12 a 8 8 0 0 0 -9 1 l -20 14" class="iconStroke"/>
      <!-- joined hands -->
      <path d="M -8 2 l 8 6 l 8 -6" class="iconStroke"/>
      <path d="M -2 12 l 6 4 l 6 -4" class="iconStroke"/>
    </g>
    <text x="0" y="98" text-anchor="middle" class="label">Transfer</text>

    <!-- Stripe Connect badge -->
    <g transform="translate(0,130)">
      <rect x="-86" y="-18" width="172" height="28" rx="14" fill="#F8FAFC" stroke="#93C5FD" stroke-width="1.5"/>
      <!-- Stylized "S" icon -->
      <rect x="-70" y="-10" width="16" height="16" rx="4" fill="#0EA5E9"/>
      <path d="M -64 -6 c 4 0 4 -4 0 -4 c -4 0 -4 4 0 4 c 4 0 4 4 0 4 c -4 0 -4 -4 0 -4" fill="#FFFFFF"/>
      <text x="8" y="2" text-anchor="middle" class="badgeText">Stripe Connect</text>
    </g>
  </g>

  <!-- Node 5: Payout (money) -->
  <g transform="translate(1240,140)">
    <circle r="56" fill="url(#grad)" filter="url(#softShadow)"/>
    <!-- Money/banknote icon -->
    <g>
      <rect x="-28" y="-16" width="56" height="32" rx="6" class="iconStroke" />
      <circle cx="0" cy="0" r="8" class="iconStroke" />
      <line x1="-16" y1="-8" x2="-20" y2="-12" class="iconStroke"/>
      <line x1="16" y1="8" x2="20" y2="12" class="iconStroke"/>
    </g>
    <text x="0" y="98" text-anchor="middle" class="label">Payout</text>
  </g>

  <!-- Top caption (optional, minimal) -->
  <g>
    <text x="700" y="36" text-anchor="middle" class="sublabel">End‑to‑end flow</text>
  </g>
</svg>
