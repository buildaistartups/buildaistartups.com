<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 300" style="background: transparent;">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="purpleBlue1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleBlue2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366f1" />
    </marker>
  </defs>
  
  <!-- Connecting Arrows -->
  <line x1="130" y1="120" x2="210" y2="120" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="390" y1="120" x2="470" y2="120" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="650" y1="120" x2="730" y2="120" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="910" y1="120" x2="990" y2="120" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="1170" y1="120" x2="1250" y2="120" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Step 1: Browse -->
  <g id="step1">
    <!-- Circle background -->
    <circle cx="70" cy="120" r="50" fill="url(#purpleBlue1)" opacity="0.15" />
    <circle cx="70" cy="120" r="40" fill="none" stroke="url(#purpleBlue1)" stroke-width="3" />
    
    <!-- Grid icon -->
    <rect x="50" y="100" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="66" y="100" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="82" y="100" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="50" y="116" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="66" y="116" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="82" y="116" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="50" y="132" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="66" y="132" width="12" height="12" fill="#7c3aed" rx="2" />
    <rect x="82" y="132" width="12" height="12" fill="#7c3aed" rx="2" />
    
    <!-- Label -->
    <text x="70" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed" text-anchor="middle">Browse</text>
  </g>
  
  <!-- Step 2: View Details -->
  <g id="step2">
    <!-- Circle background -->
    <circle cx="330" cy="120" r="50" fill="url(#purpleBlue1)" opacity="0.15" />
    <circle cx="330" cy="120" r="40" fill="none" stroke="url(#purpleBlue1)" stroke-width="3" />
    
    <!-- Magnifying glass icon -->
    <circle cx="322" cy="112" r="14" fill="none" stroke="#8b5cf6" stroke-width="3" />
    <line x1="332" y1="122" x2="344" y2="134" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" />
    
    <!-- Label -->
    <text x="330" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6" text-anchor="middle">View Details</text>
  </g>
  
  <!-- Step 3: Purchase -->
  <g id="step3">
    <!-- Circle background -->
    <circle cx="590" cy="120" r="50" fill="url(#purpleBlue2)" opacity="0.15" />
    <circle cx="590" cy="120" r="40" fill="none" stroke="url(#purpleBlue2)" stroke-width="3" />
    
    <!-- Credit card icon -->
    <rect x="570" y="110" width="40" height="26" rx="3" fill="none" stroke="#6366f1" stroke-width="2.5" />
    <line x1="570" y1="118" x2="610" y2="118" stroke="#6366f1" stroke-width="2.5" />
    <line x1="575" y1="126" x2="590" y2="126" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
    
    <!-- Label -->
    <text x="590" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6366f1" text-anchor="middle">Purchase</text>
    
    <!-- Escrow Protection badge -->
    <rect x="560" y="205" width="60" height="18" rx="9" fill="#10b981" opacity="0.2" />
    <text x="590" y="217" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">🔒 Escrow</text>
  </g>
  
  <!-- Step 4: Transfer -->
  <g id="step4">
    <!-- Circle background -->
    <circle cx="850" cy="120" r="50" fill="url(#purpleBlue2)" opacity="0.15" />
    <circle cx="850" cy="120" r="40" fill="none" stroke="url(#purpleBlue2)" stroke-width="3" />
    
    <!-- Handshake icon (simplified) -->
    <path d="M 835 115 L 845 105 L 850 110 L 860 100 L 865 105 L 855 115 L 850 120 L 845 115 Z" fill="#3b82f6" />
    <rect x="832" y="115" width="8" height="15" fill="#3b82f6" rx="1" />
    <rect x="860" y="115" width="8" height="15" fill="#3b82f6" rx="1" />
    <ellipse cx="836" cy="130" rx="5" ry="3" fill="#3b82f6" />
    <ellipse cx="864" cy="130" rx="5" ry="3" fill="#3b82f6" />
    
    <!-- Label -->
    <text x="850" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">Transfer</text>
  </g>
  
  <!-- Step 5: Payout -->
  <g id="step5">
    <!-- Circle background -->
    <circle cx="1110" cy="120" r="50" fill="url(#purpleBlue2)" opacity="0.15" />
    <circle cx="1110" cy="120" r="40" fill="none" stroke="url(#purpleBlue2)" stroke-width="3" />
    
    <!-- Money/Dollar icon -->
    <text x="1110" y="135" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#2563eb" text-anchor="middle">$</text>
    
    <!-- Label -->
    <text x="1110" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb" text-anchor="middle">Payout</text>
    
    <!-- Stripe Connect logo/badge -->
    <rect x="1070" y="205" width="80" height="18" rx="9" fill="#635bff" opacity="0.2" />
    <text x="1110" y="217" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#635bff" text-anchor="middle">⚡ Stripe Connect</text>
  </g>
  
  <!-- Title -->
  <text x="700" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4c1d95" text-anchor="middle">Transaction Flow</text>
  
  <!-- Subtitle/Description -->
  <text x="700" y="270" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Secure end-to-end transaction process with escrow protection and instant payouts</text>
</svg>
