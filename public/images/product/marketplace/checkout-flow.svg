<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Step 1: Browse -->
  <g transform="translate(50, 100)">
    <circle cx="50" cy="50" r="45" fill="url(#purpleGrad)" opacity="0.15"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5"/>
    <!-- Grid Icon -->
    <rect x="35" y="35" width="10" height="10" fill="#7c3aed" rx="1"/>
    <rect x="50" y="35" width="10" height="10" fill="#7c3aed" rx="1"/>
    <rect x="35" y="50" width="10" height="10" fill="#7c3aed" rx="1"/>
    <rect x="50" y="50" width="10" height="10" fill="#7c3aed" rx="1"/>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1f2937">Browse</text>
    <text x="50" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Explore Items</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 150 150 L 210 150" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead1)"/>
  <defs>
    <marker id="arrowhead1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>
  
  <!-- Step 2: View Details -->
  <g transform="translate(210, 100)">
    <circle cx="50" cy="50" r="45" fill="url(#blueGrad)" opacity="0.15"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="url(#blueGrad)" stroke-width="2.5"/>
    <!-- Magnifying Glass Icon -->
    <circle cx="46" cy="46" r="10" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <line x1="53" y1="53" x2="60" y2="60" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1f2937">View Details</text>
    <text x="50" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Check Info</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 310 150 L 370 150" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Step 3: Purchase -->
  <g transform="translate(370, 100)">
    <circle cx="50" cy="50" r="45" fill="url(#purpleGrad)" opacity="0.15"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5"/>
    <!-- Credit Card Icon -->
    <rect x="36" y="43" width="28" height="18" rx="2" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <line x1="36" y1="49" x2="64" y2="49" stroke="#7c3aed" stroke-width="2"/>
    <line x1="40" y1="55" x2="50" y2="55" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1f2937">Purchase</text>
    <text x="50" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Secure Payment</text>
    <!-- Escrow Protection Badge -->
    <g transform="translate(20, -15)">
      <rect x="0" y="0" width="60" height="16" rx="8" fill="#10b981" opacity="0.9"/>
      <text x="30" y="11" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="white">ESCROW</text>
    </g>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 470 150 L 530 150" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  <defs>
    <marker id="arrowhead3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>
  
  <!-- Step 4: Transfer -->
  <g transform="translate(530, 100)">
    <circle cx="50" cy="50" r="45" fill="url(#blueGrad)" opacity="0.15"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="url(#blueGrad)" stroke-width="2.5"/>
    <!-- Handshake Icon -->
    <path d="M 40 52 L 44 48 L 48 52 L 52 48 L 56 52 L 60 48" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="38" y="52" width="6" height="8" fill="#3b82f6" rx="1"/>
    <rect x="56" y="52" width="6" height="8" fill="#3b82f6" rx="1"/>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1f2937">Transfer</text>
    <text x="50" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Asset Delivery</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 630 150 L 690 150" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead4)"/>
  <defs>
    <marker id="arrowhead4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Step 5: Payout -->
  <g transform="translate(690, 100)">
    <circle cx="50" cy="50" r="45" fill="url(#purpleGrad)" opacity="0.15"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5"/>
    <!-- Money Icon -->
    <circle cx="50" cy="50" r="12" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
    <text x="50" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7c3aed">$</text>
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1f2937">Payout</text>
    <text x="50" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Funds Released</text>
    <!-- Stripe Connect Logo -->
    <g transform="translate(12, -15)">
      <rect x="0" y="0" width="76" height="16" rx="8" fill="#635bff" opacity="0.95"/>
      <text x="38" y="11" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="white">stripe connect</text>
    </g>
  </g>
</svg>
