<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Buyer–Seller secure payments with Stripe Connect (seller stripes darker)</title>
  <desc id="desc">Palette: #4D40CC, #C1B7FD, #EAE4FD, #3C39AF, #8E7EF5, #7B6AF6, #FFFFFF. Locks darker; shackles darker; PCI fingerprint larger &amp; darker; “stripe” lighter; seller shield cross stripes darker.</desc>

  <!-- ========== DEFS ========== -->
  <defs>
    <!-- Primary accent gradient -->
    <linearGradient id="gradPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8E7EF5"/>
      <stop offset="1" stop-color="#4D40CC"/>
    </linearGradient>

    <!-- Lighter gradient for the "stripe" word -->
    <linearGradient id="gradStripeLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C1B7FD"/>
      <stop offset="1" stop-color="#8E7EF5"/>
    </linearGradient>

    <!-- Soft surface gradient (for light UI) -->
    <linearGradient id="gradSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAE4FD"/>
      <stop offset="1" stop-color="#C1B7FD"/>
    </linearGradient>

    <!-- Subtle shadow -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#3C39AF" flood-opacity="0.45"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#C1B7FD"/>
    </marker>

    <!-- Reusable icons -->
    <g id="checkCircle">
      <circle cx="0" cy="0" r="44" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
      <path d="M-16 2 l10 10 l22 -26" fill="none" stroke="url(#gradPrimary)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Symmetrical mini lock (darker shackle & body) -->
    <g id="miniLock">
      <path d="M-18 -2 v-10 a18 18 0 0 1 36 0 v10" fill="none" stroke="#3C39AF" stroke-width="4" stroke-linecap="round"/>
      <rect x="-24" y="-2" width="48" height="36" rx="10" fill="#4D40CC" stroke="#C1B7FD" stroke-width="3"/>
      <path d="M-18 2 q18 8 36 0" fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="2"/>
      <circle cx="0" cy="12" r="4" fill="#FFFFFF"/>
      <rect x="-3" y="16" width="6" height="10" rx="3" fill="#FFFFFF"/>
    </g>

    <g id="tinyShield">
      <path d="M0 -36 L28 -22 V12 C28 26 14 42 0 46 C-14 42 -28 26 -28 12 V-22 Z"
            fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
      <rect x="-9" y="-4" width="18" height="18" rx="4" fill="url(#gradPrimary)"/>
    </g>

    <!-- DARKER fingerprint for PCI -->
    <g id="fingerprint" stroke="#3C39AF" stroke-width="3.5" stroke-linecap="round" fill="none">
      <path d="M0 -30 c22 0 40 18 40 40"/>
      <path d="M0 -20 c16 0 30 14 30 30"/>
      <path d="M0 -10 c12 0 22 10 22 22"/>
      <path d="M0 0 c8 0 14 6 14 14"/>
      <path d="M-14 6 c0 -12 10 -22 22 -22"/>
      <path d="M-22 16 c0 -18 14 -32 32 -32"/>
      <path d="M-30 26 c0 -25 20 -45 45 -45"/>
    </g>
  </defs>

  <!-- ===== Transparent background ===== -->

  <!-- Decorative dotted arc -->
  <path d="M220,180 C360,60 840,60 980,180" stroke="#7B6AF6" stroke-opacity="0.55" stroke-width="4" stroke-dasharray="8 14" fill="none"/>

  <!-- Top locks -->
  <g transform="translate(260,150)" filter="url(#softShadow)">
    <circle r="48" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
    <use href="#miniLock"/>
  </g>
  <g transform="translate(940,150)" filter="url(#softShadow)">
    <circle r="36" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
    <use href="#miniLock" transform="scale(0.8)"/>
  </g>

  <!-- ========== CENTRAL SHIELD ========== -->
  <g transform="translate(600,340)" filter="url(#softShadow)">
    <!-- Outer shield -->
    <path d="M0,-170 L170,-90 V70 C170,150 95,230 0,255 C-95,230 -170,150 -170,70 V-90 Z"
          fill="#EAE4FD" stroke="url(#gradPrimary)" stroke-width="10"/>
    <!-- Inner shield -->
    <path d="M0,-130 L130,-62 V55 C130,118 70,176 0,194 C-70,176 -130,118 -130,55 V-62 Z"
          fill="#8E7EF5" opacity="0.24" stroke="#C1B7FD" stroke-width="6"/>
    <!-- Central lock (darker shackle & body) -->
    <g>
      <rect x="-70" y="-10" width="140" height="120" rx="22" fill="#4D40CC" stroke="#EAE4FD" stroke-width="6"/>
      <path d="M-34 -10 v-40 a34 34 0 0 1 68 0 v40" fill="none" stroke="#3C39AF" stroke-width="10" stroke-linecap="round"/>
      <rect x="-14" y="38" width="28" height="42" rx="8" fill="#FFFFFF" stroke="#EAE4FD" stroke-width="6"/>
    </g>
  </g>

  <!-- Arrows -->
  <path d="M320,360 H480" stroke="#C1B7FD" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M720,360 H880" stroke="#C1B7FD" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- ========== CHARACTERS ========== -->
  <!-- Buyer -->
  <g transform="translate(250,380)">
    <circle cx="-10" cy="-110" r="44" fill="#3C39AF" stroke="#C1B7FD" stroke-width="3"/>
    <path d="M-48 -118 q22 -26 50 -20 q20 4 28 20 q-10 -8 -26 -8 q-28 0 -52 8 z" fill="#8E7EF5"/>
    <circle cx="-22" cy="-110" r="6" fill="#FFFFFF"/>
    <path d="M-4 -97 q-9 10 -22 10" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-98,20 q10 -84 64 -120 q78 40 86 116 q-18 36 -78 36 q-62 0 -72 -32 z" fill="#3C39AF" stroke="#C1B7FD" stroke-width="3"/>
    <path d="M-64 -28 l36 30 l40 -48" fill="none" stroke="#7B6AF6" stroke-width="5"/>
    <rect x="24" y="-80" width="44" height="80" rx="8" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
    <circle cx="46" cy="-40" r="12" fill="none" stroke="url(#gradPrimary)" stroke-width="5"/>
    <line x1="38" y1="-48" x2="54" y2="-32" stroke="url(#gradPrimary)" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="112" text-anchor="middle" fill="#7B6AF6" font-family="Inter, ui-sans-serif, system-ui" font-weight="700" font-size="40">Buyer</text>
  </g>

  <!-- Seller -->
  <g transform="translate(950,380)">
    <circle cx="-10" cy="-110" r="44" fill="#3C39AF" stroke="#C1B7FD" stroke-width="3"/>
    <path d="M-46 -120 q20 -22 56 -16 q14 18 14 42 q-10 -12 -44 -12 q-18 0 -26 6 z" fill="#8E7EF5"/>
    <circle cx="-22" cy="-110" r="6" fill="#FFFFFF"/>
    <path d="M-6 -98 q10 10 22 10" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-96,18 q16 -84 88 -116 q66 44 74 116 q-20 36 -80 36 q-62 0 -82 -36 z" fill="#3C39AF" stroke="#C1B7FD" stroke-width="3"/>
    <!-- Shield with DARKER cross stripes -->
    <rect x="-8" y="-30" width="80" height="70" rx="10" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
    <rect x="16" y="-30" width="6" height="70" fill="#3C39AF"/>
    <rect x="-8" y="2" width="80" height="6" fill="#3C39AF"/>
    <text x="0" y="112" text-anchor="middle" fill="#7B6AF6" font-family="Inter, ui-sans-serif, system-ui" font-weight="700" font-size="40">Seller</text>
  </g>

  <!-- ========== SIDE ICONS & BADGES ========== -->
  <g transform="translate(220,610)"><use href="#checkCircle"/></g>
  <g transform="translate(980,610)"><use href="#checkCircle"/></g>
  <g transform="translate(1040,640)" filter="url(#softShadow)"><use href="#tinyShield"/></g>
  <g transform="translate(210,150)" filter="url(#softShadow)"><use href="#tinyShield" transform="scale(0.7)"/></g>

  <!-- PCI box (bigger & darker icon) -->
  <g transform="translate(330,720)">
    <rect x="-80" y="-60" width="160" height="120" rx="20" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
    <g transform="translate(0,0) scale(1.2)"><use href="#fingerprint"/></g>
    <text x="0" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#4D40CC">PCI</text>
  </g>

  <!-- Dotted connector -->
  <path d="M280,610 H920" stroke="#7B6AF6" stroke-width="4" stroke-dasharray="10 12" opacity="0.6"/>

  <!-- Escrow / KYC / 3D Secure pills -->
  <g font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#4D40CC">
    <g transform="translate(560,720)">
      <rect x="-120" y="-40" width="240" height="80" rx="20" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
      <text x="0" y="12" text-anchor="middle">Escrow</text>
    </g>
    <g transform="translate(800,720)">
      <rect x="-95" y="-40" width="190" height="80" rx="20" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
      <text x="0" y="12" text-anchor="middle">KYC</text>
    </g>
    <g transform="translate(720,812)">
      <rect x="-170" y="-40" width="340" height="80" rx="20" fill="#EAE4FD" stroke="#C1B7FD" stroke-width="3"/>
      <text x="0" y="12" text-anchor="middle">3D Secure</text>
    </g>
  </g>

  <!-- Stripe Connect badge (lighter "stripe") -->
  <g transform="translate(600,540)" filter="url(#softShadow)">
    <rect x="-220" y="-52" width="440" height="104" rx="24" fill="#3C39AF" stroke="#C1B7FD" stroke-width="3"/>
    <path d="M-140,52 l-16,14 h312 l-16 -14" fill="#3C39AF" stroke="#C1B7FD" stroke-width="3"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui">
      <tspan font-size="50" font-weight="900" fill="url(#gradStripeLight)">stripe</tspan>
      <tspan dx="14" font-size="36" font-weight="800" fill="#C1B7FD">CONNECT</tspan>
    </text>
  </g>
</svg>
