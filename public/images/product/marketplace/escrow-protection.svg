<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="vaultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.3" />
    </linearGradient>
    
    <linearGradient id="moneyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filters for effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animated dashed line for money flow -->
    <pattern id="dashedPattern" x="0" y="0" width="20" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="10" height="4" fill="#8B5CF6" opacity="0.6"/>
      <rect x="10" y="0" width="10" height="4" fill="transparent"/>
    </pattern>
  </defs>
  
  <!-- Background subtle elements -->
  <g id="backgroundElements" opacity="0.1">
    <circle cx="200" cy="150" r="100" fill="url(#purpleGradient)"/>
    <circle cx="1000" cy="650" r="120" fill="url(#blueGradient)"/>
    <circle cx="600" cy="100" r="80" fill="url(#purpleGradient)"/>
  </g>
  
  <!-- Title Section -->
  <g id="titleSection">
    <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#6366F1" text-anchor="middle">
      Secure Escrow Protection
    </text>
    <text x="600" y="90" font-family="Arial, sans-serif" font-size="16" fill="#6B7280" text-anchor="middle">
      Powered by Stripe Connect
    </text>
  </g>
  
  <!-- Buyer Section - Left Side -->
  <g id="buyerSection" filter="url(#shadow)">
    <!-- Buyer card background -->
    <rect x="80" y="200" width="280" height="380" rx="16" fill="url(#glowGradient)" stroke="#8B5CF6" stroke-width="2"/>
    
    <!-- Buyer icon -->
    <g id="buyerIcon">
      <circle cx="220" cy="280" r="50" fill="url(#purpleGradient)"/>
      <circle cx="220" cy="270" r="20" fill="white"/>
      <path d="M 180 320 Q 180 300 200 295 Q 220 290 240 295 Q 260 300 260 320" fill="white"/>
    </g>
    
    <text x="220" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">
      Buyer
    </text>
    
    <!-- Buyer features -->
    <g id="buyerFeatures">
      <rect x="100" y="390" width="240" height="40" rx="8" fill="#8B5CF620"/>
      <circle cx="120" cy="410" r="8" fill="#10B981"/>
      <path d="M 117 410 L 119 412 L 124 406" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="140" y="415" font-family="Arial, sans-serif" font-size="14" fill="#1F2937">
        Payment Protected
      </text>
      
      <rect x="100" y="440" width="240" height="40" rx="8" fill="#8B5CF620"/>
      <circle cx="120" cy="460" r="8" fill="#10B981"/>
      <path d="M 117 460 L 119 462 L 124 456" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="140" y="465" font-family="Arial, sans-serif" font-size="14" fill="#1F2937">
        Funds Held Securely
      </text>
      
      <rect x="100" y="490" width="240" height="40" rx="8" fill="#8B5CF620"/>
      <circle cx="120" cy="510" r="8" fill="#10B981"/>
      <path d="M 117 510 L 119 512 L 124 506" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="140" y="515" font-family="Arial, sans-serif" font-size="14" fill="#1F2937">
        Dispute Protection
      </text>
    </g>
    
    <!-- Buyer label -->
    <rect x="100" y="545" width="240" height="25" rx="12" fill="#8B5CF6"/>
    <text x="220" y="563" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">
      Initiates Payment
    </text>
  </g>
  
  <!-- Seller Section - Right Side -->
  <g id="sellerSection" filter="url(#shadow)">
    <!-- Seller card background -->
    <rect x="840" y="200" width="280" height="380" rx="16" fill="url(#glowGradient)" stroke="#3B82F6" stroke-width="2"/>
    
    <!-- Seller icon -->
    <g id="sellerIcon">
      <circle cx="980" cy="280" r="50" fill="url(#blueGradient)"/>
      <circle cx="980" cy="270" r="20" fill="white"/>
      <path d="M 940 320 Q 940 300 960 295 Q 980 290 1000 295 Q 1020 300 1020 320" fill="white"/>
      
      <!-- Briefcase icon overlay -->
      <rect x="970" y="300" width="20" height="15" rx="2" fill="white" opacity="0.9"/>
      <rect x="977" y="297" width="6" height="5" rx="1" fill="white"/>
    </g>
    
    <text x="980" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3B82F6" text-anchor="middle">
      Seller
    </text>
    
    <!-- Seller features -->
    <g id="sellerFeatures">
      <rect x="860" y="390" width="240" height="40" rx="8" fill="#3B82F620"/>
      <circle cx="880" cy="410" r="8" fill="#10B981"/>
      <path d="M 877 410 L 879 412 L 884 406" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="900" y="415" font-family="Arial, sans-serif" font-size="14" fill="#1F2937">
        Guaranteed Payment
      </text>
      
      <rect x="860" y="440" width="240" height="40" rx="8" fill="#3B82F620"/>
      <circle cx="880" cy="460" r="8" fill="#10B981"/>
      <path d="M 877 460 L 879 462 L 884 456" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="900" y="465" font-family="Arial, sans-serif" font-size="14" fill="#1F2937">
        Delivery Verified
      </text>
      
      <rect x="860" y="490" width="240" height="40" rx="8" fill="#3B82F620"/>
      <circle cx="880" cy="510" r="8" fill="#10B981"/>
      <path d="M 877 510 L 879 512 L 884 506" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="900" y="515" font-family="Arial, sans-serif" font-size="14" fill="#1F2937">
        Fast Settlement
      </text>
    </g>
    
    <!-- Seller label -->
    <rect x="860" y="545" width="240" height="25" rx="12" fill="#3B82F6"/>
    <text x="980" y="563" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">
      Receives Payment
    </text>
  </g>
  
  <!-- Central Escrow Vault/Shield -->
  <g id="escrowVault" filter="url(#glow)">
    <!-- Glow effect background -->
    <circle cx="600" cy="380" r="140" fill="url(#glowGradient)" opacity="0.4"/>
    
    <!-- Main vault container -->
    <rect x="480" y="260" width="240" height="240" rx="20" fill="url(#vaultGradient)" stroke="#8B5CF6" stroke-width="3"/>
    
    <!-- Vault door circle -->
    <circle cx="600" cy="380" r="90" fill="#4F46E5" stroke="#8B5CF6" stroke-width="4"/>
    <circle cx="600" cy="380" r="75" fill="url(#purpleGradient)" opacity="0.3"/>
    
    <!-- Vault lock mechanism -->
    <circle cx="600" cy="380" r="50" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
    <circle cx="600" cy="380" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Lock center -->
    <circle cx="600" cy="380" r="20" fill="white" opacity="0.9"/>
    <circle cx="600" cy="380" r="12" fill="#4F46E5"/>
    
    <!-- Lock keyhole -->
    <circle cx="600" cy="378" r="5" fill="white"/>
    <rect x="597" y="378" width="6" height="10" rx="1" fill="white"/>
    
    <!-- Vault handle lines -->
    <line x1="600" y1="330" x2="600" y2="310" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="600" y1="430" x2="600" y2="450" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="550" y1="380" x2="530" y2="380" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="650" y1="380" x2="670" y2="380" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Shield overlay -->
    <path d="M 600 290 L 650 310 L 650 380 Q 650 430 600 460 Q 550 430 550 380 L 550 310 Z" 
          fill="url(#shieldGradient)" opacity="0.3" stroke="#8B5CF6" stroke-width="2"/>
    
    <!-- Security indicators on vault -->
    <g id="securityIndicators">
      <circle cx="520" cy="300" r="6" fill="#10B981"/>
      <circle cx="680" cy="300" r="6" fill="#10B981"/>
      <circle cx="520" cy="460" r="6" fill="#10B981"/>
      <circle cx="680" cy="460" r="6" fill="#10B981"/>
    </g>
    
    <!-- Escrow label -->
    <rect x="510" y="515" width="180" height="35" rx="17" fill="white" stroke="#6366F1" stroke-width="2"/>
    <text x="600" y="538" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6366F1" text-anchor="middle">
      ESCROW VAULT
    </text>
  </g>
  
  <!-- Money Flow - Left to Center (Buyer to Escrow) -->
  <g id="moneyFlowLeft">
    <!-- Flow line -->
    <path d="M 360 380 L 470 380" stroke="url(#purpleGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 360 380 L 470 380" stroke="url(#dashedPattern)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Arrow -->
    <path d="M 470 380 L 455 373 L 455 387 Z" fill="#8B5CF6"/>
    
    <!-- Money icon -->
    <g id="moneyIcon1" transform="translate(400, 350)">
      <circle cx="0" cy="0" r="25" fill="url(#moneyGradient)" stroke="#059669" stroke-width="2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">$</text>
    </g>
    
    <!-- Security shield on flow -->
    <g id="securityShield1" transform="translate(415, 340)">
      <path d="M 0 0 L 8 4 L 8 14 Q 8 20 0 24 Q -8 20 -8 14 L -8 4 Z" fill="#10B981" opacity="0.8"/>
      <path d="M -3 12 L -1 14 L 4 8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <rect x="365" y="340" width="100" height="22" rx="11" fill="#8B5CF6" opacity="0.9"/>
    <text x="415" y="354" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">
      Payment Held
    </text>
  </g>
  
  <!-- Money Flow - Center to Right (Escrow to Seller) -->
  <g id="moneyFlowRight">
    <!-- Flow line -->
    <path d="M 730 380 L 840 380" stroke="url(#blueGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 730 380 L 840 380" stroke="url(#dashedPattern)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Arrow -->
    <path d="M 840 380 L 825 373 L 825 387 Z" fill="#3B82F6"/>
    
    <!-- Money icon -->
    <g id="moneyIcon2" transform="translate(785, 350)">
      <circle cx="0" cy="0" r="25" fill="url(#moneyGradient)" stroke="#059669" stroke-width="2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">$</text>
    </g>
    
    <!-- Security shield on flow -->
    <g id="securityShield2" transform="translate(800, 340)">
      <path d="M 0 0 L 8 4 L 8 14 Q 8 20 0 24 Q -8 20 -8 14 L -8 4 Z" fill="#10B981" opacity="0.8"/>
      <path d="M -3 12 L -1 14 L 4 8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <rect x="735" y="340" width="100" height="22" rx="11" fill="#3B82F6" opacity="0.9"/>
    <text x="785" y="354" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">
      Funds Released
    </text>
  </g>
  
  <!-- Security Features Banner -->
  <g id="securityBanner">
    <rect x="200" y="620" width="800" height="100" rx="16" fill="url(#glowGradient)" stroke="#6366F1" stroke-width="2"/>
    
    <text x="600" y="650" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6366F1" text-anchor="middle">
      Enterprise-Grade Security Features
    </text>
    
    <!-- Security features -->
    <g id="feature1">
      <circle cx="250" cy="685" r="12" fill="#8B5CF6"/>
      <path d="M 250 678 L 253 681 L 258 674" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="270" y="690" font-family="Arial, sans-serif" font-size="13" fill="#1F2937">
        256-bit Encryption
      </text>
    </g>
    
    <g id="feature2">
      <circle cx="430" cy="685" r="12" fill="#6366F1"/>
      <path d="M 430 678 L 433 681 L 438 674" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="450" y="690" font-family="Arial, sans-serif" font-size="13" fill="#1F2937">
        PCI DSS Compliant
      </text>
    </g>
    
    <g id="feature3">
      <circle cx="630" cy="685" r="12" fill="#3B82F6"/>
      <path d="M 630 678 L 633 681 L 638 674" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="650" y="690" font-family="Arial, sans-serif" font-size="13" fill="#1F2937">
        Multi-Factor Auth
      </text>
    </g>
    
    <g id="feature4">
      <circle cx="830" cy="685" r="12" fill="#8B5CF6"/>
      <path d="M 830 678 L 833 681 L 838 674" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="850" y="690" font-family="Arial, sans-serif" font-size="13" fill="#1F2937">
        24/7 Monitoring
      </text>
    </g>
  </g>
  
  <!-- Stripe Connect Branding -->
  <g id="stripeBranding">
    <rect x="480" y="740" width="240" height="45" rx="22" fill="#635BFF"/>
    
    <!-- Stripe logo text -->
    <text x="520" y="768" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
      stripe
    </text>
    
    <!-- Connect badge -->
    <rect x="600" y="752" width="105" height="24" rx="12" fill="white" opacity="0.2"/>
    <text x="652" y="768" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">
      CONNECT
    </text>
    
    <!-- Verified badge -->
    <circle cx="500" cy="763" r="10" fill="white"/>
    <path d="M 497 763 L 499 765 L 504 759" stroke="#635BFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Process Steps Indicator -->
  <g id="processSteps">
    <!-- Step 1 -->
    <circle cx="220" cy="600" r="20" fill="#8B5CF6" stroke="white" stroke-width="3"/>
    <text x="220" y="607" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
    
    <!-- Step 2 -->
    <circle cx="600" cy="600" r="20" fill="#6366F1" stroke="white" stroke-width="3"/>
    <text x="600" y="607" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
    
    <!-- Step 3 -->
    <circle cx="980" cy="600" r="20" fill="#3B82F6" stroke="white" stroke-width="3"/>
    <text x="980" y="607" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
    
    <!-- Connecting lines -->
    <line x1="240" y1="600" x2="580" y2="600" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
    <line x1="620" y1="600" x2="960" y2="600" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
  </g>
  
  <!-- Additional Security Icons -->
  <g id="floatingSecurityIcons" opacity="0.6">
    <!-- Lock icon top left -->
    <g transform="translate(120, 140)">
      <rect x="-8" y="0" width="16" height="12" rx="2" fill="#8B5CF6"/>
      <path d="M -5 0 L -5 -5 Q -5 -8 0 -8 Q 5 -8 5 -5 L 5 0" stroke="#8B5CF6" stroke-width="2" fill="none"/>
      <circle cx="0" cy="6" r="2" fill="white"/>
    </g>
    
    <!-- Shield icon top right -->
    <g transform="translate(1080, 140)">
      <path d="M 0 -10 L 8 -6 L 8 2 Q 8 8 0 12 Q -8 8 -8 2 L -8 -6 Z" fill="#3B82F6"/>
      <path d="M -3 2 L -1 4 L 4 -2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Key icon bottom -->
    <g transform="translate(600, 140)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#6366F1" stroke-width="2"/>
      <line x1="5" y1="0" x2="12" y2="0" stroke="#6366F1" stroke-width="2"/>
      <line x1="10" y1="-2" x2="10" y2="2" stroke="#6366F1" stroke-width="2"/>
    </g>
  </g>
</svg>
