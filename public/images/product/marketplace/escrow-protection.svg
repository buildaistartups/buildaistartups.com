<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="1000" height="900">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Buyer (Left Side) -->
  <g id="buyer">
    <!-- Head -->
    <circle cx="200" cy="280" r="35" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <!-- Body -->
    <path d="M200 315 Q180 315 170 340 L170 400 L230 400 L230 340 Q220 315 200 315 Z" 
          fill="#8B5CF6" stroke="#6366F1" stroke-width="3"/>
    <!-- Arm with phone -->
    <rect x="230" y="340" width="40" height="8" rx="4" fill="#8B5CF6" stroke="#6366F1" stroke-width="2"/>
    <rect x="265" y="330" width="25" height="40" rx="4" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <circle cx="277" cy="345" r="3" fill="#6366F1"/>
    <!-- Label -->
    <text x="200" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#6366F1" text-anchor="middle">Buyer</text>
  </g>

  <!-- Seller (Right Side) -->
  <g id="seller">
    <!-- Head -->
    <circle cx="800" cy="280" r="35" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <!-- Hair -->
    <path d="M770 265 Q770 245 785 240 Q800 235 815 240 Q830 245 830 265" 
          fill="#8B5CF6" stroke="#6366F1" stroke-width="3"/>
    <!-- Body -->
    <path d="M800 315 Q780 315 770 340 L770 400 L830 400 L830 340 Q820 315 800 315 Z" 
          fill="#8B5CF6" stroke="#6366F1" stroke-width="3"/>
    <!-- Package -->
    <rect x="730" y="360" width="45" height="45" rx="3" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <line x1="730" y1="375" x2="775" y2="375" stroke="#6366F1" stroke-width="2"/>
    <line x1="752" y1="360" x2="752" y2="405" stroke="#6366F1" stroke-width="2"/>
    <!-- Label -->
    <text x="800" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#6366F1" text-anchor="middle">Seller</text>
  </g>

  <!-- Central Shield -->
  <g id="shield">
    <!-- Shield outline -->
    <path d="M500 150 L560 170 L560 280 Q560 330 500 360 Q440 330 440 280 L440 170 Z" 
          fill="url(#shieldGradient)" stroke="#E0E7FF" stroke-width="6"/>
    <path d="M500 150 L560 170 L560 280 Q560 330 500 360 Q440 330 440 280 L440 170 Z" 
          fill="none" stroke="#6366F1" stroke-width="3"/>
    
    <!-- Lock on shield -->
    <rect x="480" y="250" width="40" height="35" rx="4" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <path d="M485 250 L485 235 Q485 220 500 220 Q515 220 515 235 L515 250" 
          fill="none" stroke="#6366F1" stroke-width="3"/>
    <circle cx="500" cy="267" r="4" fill="#6366F1"/>
    <line x1="500" y1="271" x2="500" y2="278" stroke="#6366F1" stroke-width="3"/>
  </g>

  <!-- Arrow from Buyer to Shield -->
  <g id="arrow1">
    <line x1="290" y1="370" x2="420" y2="300" stroke="#6366F1" stroke-width="4" stroke-dasharray="none"/>
    <polygon points="420,300 405,295 410,308" fill="#6366F1"/>
  </g>

  <!-- Arrow from Shield to Seller -->
  <g id="arrow2">
    <line x1="580" y1="300" x2="710" y2="370" stroke="#6366F1" stroke-width="4"/>
    <polygon points="710,370 695,365 700,378" fill="#6366F1"/>
  </g>

  <!-- Top Security Icons -->
  <!-- Checkmark Shield (top left) -->
  <g id="checkShield">
    <circle cx="280" cy="120" r="40" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <path d="M280 95 L295 100 L295 135 Q295 145 280 150 Q265 145 265 135 L265 100 Z" 
          fill="#A78BFA" stroke="#6366F1" stroke-width="2"/>
    <polyline points="272,120 278,126 290,112" fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Padlock (top right) -->
  <g id="padlock">
    <rect x="700" y="110" width="50" height="40" rx="6" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <path d="M710 110 L710 90 Q710 70 725 70 Q740 70 740 90 L740 110" 
          fill="none" stroke="#6366F1" stroke-width="3"/>
    <circle cx="725" cy="130" r="5" fill="#6366F1"/>
  </g>

  <!-- Curved dashed line connecting top icons -->
  <path d="M320 120 Q500 80 700 120" fill="none" stroke="#6366F1" stroke-width="3" stroke-dasharray="10,8"/>

  <!-- Stripe Connect Branding -->
  <g id="stripeBranding">
    <rect x="350" y="480" width="300" height="70" rx="10" fill="none" stroke="#6366F1" stroke-width="4"/>
    <text x="500" y="530" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
          fill="#6366F1" text-anchor="middle">stripe CONNECT</text>
    <polygon points="500,555 490,565 510,565" fill="#6366F1"/>
  </g>

  <!-- Bottom Security Features -->
  <!-- Checkmark 1 -->
  <circle cx="220" cy="650" r="35" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
  <polyline points="205,650 218,663 240,638" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>

  <!-- Checkmark 2 -->
  <circle cx="680" cy="650" r="35" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
  <polyline points="665,650 678,663 700,638" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>

  <!-- Security Badge -->
  <g id="badge">
    <path d="M850 620 L885 630 L885 680 Q885 700 850 710 Q815 700 815 680 L815 630 Z" 
          fill="#A78BFA" stroke="#6366F1" stroke-width="3"/>
    <rect x="835" y="655" width="30" height="20" rx="2" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
    <line x1="840" y1="660" x2="860" y2="660" stroke="#6366F1" stroke-width="1"/>
    <line x1="840" y1="665" x2="860" y2="665" stroke="#6366F1" stroke-width="1"/>
    <line x1="840" y1="670" x2="860" y2="670" stroke="#6366F1" stroke-width="1"/>
  </g>

  <!-- Dashed flow lines -->
  <path d="M255 650 L400 600" stroke="#6366F1" stroke-width="3" stroke-dasharray="10,8" fill="none"/>
  <path d="M600 600 L645 650" stroke="#6366F1" stroke-width="3" stroke-dasharray="10,8" fill="none"/>
  <path d="M715 650 L780 650" stroke="#6366F1" stroke-width="3" stroke-dasharray="10,8" fill="none"/>

  <!-- Security Labels -->
  <!-- Escrow -->
  <rect x="420" y="740" width="160" height="50" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
  <text x="500" y="773" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#6366F1" text-anchor="middle">Escrow</text>

  <!-- KYC -->
  <rect x="600" y="740" width="120" height="50" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
  <text x="660" y="773" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#6366F1" text-anchor="middle">KYC</text>

  <!-- 3D Secure -->
  <rect x="450" y="810" width="220" height="50" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
  <text x="560" y="843" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#6366F1" text-anchor="middle">3D Secure</text>

  <!-- PCI with icons -->
  <g id="pci">
    <!-- Small lock -->
    <rect x="190" y="770" width="25" height="20" rx="3" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
    <path d="M195 770 L195 762 Q195 755 202 755 Q210 755 210 762 L210 770" 
          fill="none" stroke="#6366F1" stroke-width="2"/>
    
    <!-- Fingerprint -->
    <g transform="translate(280, 760)">
      <ellipse cx="0" cy="0" rx="25" ry="30" fill="none" stroke="#6366F1" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="18" ry="22" fill="none" stroke="#6366F1" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="none" stroke="#6366F1" stroke-width="2"/>
      <line x1="-5" y1="-15" x2="-5" y2="15" stroke="#6366F1" stroke-width="2"/>
    </g>
    
    <!-- PCI Text -->
    <text x="240" y="830" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#6366F1" text-anchor="middle">PCI</text>
  </g>

  <!-- Connecting lines to labels -->
  <path d="M400 750 Q410 720 450 600" stroke="#6366F1" stroke-width="2" stroke-dasharray="8,6" fill="none"/>
  <path d="M600 750 Q590 680 550 600" stroke="#6366F1" stroke-width="2" stroke-dasharray="8,6" fill="none"/>
</svg>
