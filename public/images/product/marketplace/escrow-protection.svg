<!-- Symmetrical mini lock (drop-in replacement) -->
<g id="miniLock">
  <!-- Shackle (centered & symmetric) -->
  <path d="M-18 -2 v-10 a18 18 0 0 1 36 0 v10"
        fill="none" stroke="#E6E9FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="-24" y="-2" width="48" height="36" rx="10"
        fill="url(#gradSoft)" stroke="#E6E9FF" stroke-width="3"/>

  <!-- Subtle top highlight on body -->
  <path d="M-18 2 q18 8 36 0"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="2"/>

  <!-- Keyhole (centered) -->
  <circle cx="0" cy="12" r="4" fill="#0E152D"/>
  <rect x="-3" y="16" width="6" height="10" rx="3" fill="#0E152D"/>
</g>
