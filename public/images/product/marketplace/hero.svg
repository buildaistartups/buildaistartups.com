<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 1050" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Core gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="purpleBlueLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <!-- Accent gradient borders for light theme pop -->
    <linearGradient id="borderPB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6D6CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- Soft color halos (keep low opacity; still transparent overall) -->
    <radialGradient id="haloA" cx="0.3" cy="0.05" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloB" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <!-- Shadows -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chipShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dy="1"/><feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Icons -->
    <g id="icon-search">
      <circle cx="0" cy="0" r="12" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
      <line x1="8" y1="8" x2="15" y2="15" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="icon-star">
      <path d="M12 2 L14.9 8.2 L22 9.1 L16.8 13.7 L18.1 20.8 L12 17.3 L5.9 20.8 L7.2 13.7 L2 9.1 L9.1 8.2 Z" fill="url(#purpleBlue)"/>
    </g>
    <g id="sparkle">
      <path d="M8 0 L10 8 L18 10 L10 12 L8 20 L6 12 L-2 10 L6 8 Z" fill="url(#purpleBlue)" opacity="0.5"/>
    </g>

    <!-- Reusable pills -->
    <g id="pill-build-score">
      <rect x="0" y="0" width="148" height="30" rx="15" fill="url(#purpleBlue)" filter="url(#chipShadow)"/>
      <text x="12" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Build Score</text>
      <rect x="112" y="6" width="30" height="18" rx="9" fill="#FFFFFF" opacity="0.3"/>
    </g>
    <g id="badge-featured">
      <rect x="0" y="0" width="120" height="28" rx="14" fill="url(#purpleBlue)" filter="url(#chipShadow)"/>
      <use href="#icon-star" x="8" y="4"/>
      <text x="38" y="19" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">FEATURED</text>
    </g>

    <!-- Common styles -->
    <style><![CDATA[
      .font { font-family: Arial, sans-serif; }
      .muted { fill:#64748B; }    /* slate-500 */
      .title { fill:#0F172A; }    /* slate-900 */
      .stroke { stroke:#E2E8F0; } /* slate-200 */
      .chip  { fill:#FFFFFF; stroke:url(#borderPB); }
    ]]></style>
  </defs>

  <!-- Decorative halos (do NOT add any solid background) -->
  <ellipse cx="0" cy="0" rx="900" ry="600" fill="url(#haloA)"/>
  <ellipse cx="1150" cy="80" rx="700" ry="500" fill="url(#haloB)"/>

  <!-- Header -->
  <g id="header" class="font">
    <!-- Search -->
    <rect x="50" y="40" width="700" height="60" rx="30" fill="#FFFFFF" class="stroke" stroke-width="2" filter="url(#cardShadow)"/>
    <g transform="translate(85,70)"><use href="#icon-search"/></g>
    <text x="120" y="76" font-size="16" fill="#94A3B8">Search marketplace...</text>

    <!-- Filter Button (gradient border accent) -->
    <rect x="780" y="40" width="180" height="60" rx="30" fill="url(#purpleBlue)" filter="url(#cardShadow)"/>
    <g>
      <rect x="815" y="62" width="20" height="2" rx="1" fill="#FFFFFF"/>
      <rect x="815" y="70" width="20" height="2" rx="1" fill="#FFFFFF"/>
      <rect x="815" y="78" width="20" height="2" rx="1" fill="#FFFFFF"/>
      <text x="850" y="76" font-size="16" font-weight="600" fill="#FFFFFF">Filters</text>
    </g>

    <!-- View Toggle -->
    <rect x="990" y="40" width="160" height="60" rx="30" fill="#FFFFFF" class="stroke" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="1015" y="62" width="22" height="22" rx="5" class="chip"/>
    <rect x="1042" y="62" width="22" height="22" rx="5" fill="#EEF2FF" stroke="#E2E8F0"/>
    <rect x="1015" y="89" width="22" height="5" rx="2" fill="url(#purpleBlue)"/>
    <rect x="1042" y="89" width="22" height="5" rx="2" fill="#E2E8F0"/>
  </g>

  <!-- Categories with colorful chips -->
  <g id="categories" class="font">
    <rect x="50" y="130" width="150" height="45" rx="22" fill="url(#purpleBlue)" filter="url(#chipShadow)"/>
    <text x="125" y="158" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">All Products</text>

    <rect x="220" y="130" width="140" height="45" rx="22" class="chip" fill="#FFFFFF"/>
    <text x="290" y="158" font-size="15" font-weight="700" fill="#4F46E5" text-anchor="middle">Analytics</text>

    <rect x="380" y="130" width="150" height="45" rx="22" class="chip" fill="#FFFFFF"/>
    <text x="455" y="158" font-size="15" font-weight="700" fill="#2563EB" text-anchor="middle">Automation</text>

    <rect x="550" y="130" width="140" height="45" rx="22" class="chip" fill="#FFFFFF"/>
    <text x="620" y="158" font-size="15" font-weight="700" fill="#6D28D9" text-anchor="middle">Marketing</text>

    <rect x="710" y="130" width="150" height="45" rx="22" class="chip" fill="#FFFFFF"/>
    <text x="785" y="158" font-size="15" font-weight="700" fill="#0EA5E9" text-anchor="middle">Productivity</text>
  </g>

  <!-- Meta row -->
  <text x="50" y="220" class="font" font-size="14" fill="#64748B">Showing 6 products</text>
  <text x="1090" y="220" class="font" font-size="14" fill="#64748B" text-anchor="end">Sort by: Popular</text>

  <!-- === GRID (6 cards) === -->

  <!-- Card template note: each card enhanced with gradient border + subtle sparkles on thumb -->

  <!-- Card 1 -->
  <g id="product1" class="font">
    <rect x="50" y="250" width="350" height="320" rx="18" fill="url(#cardGlow)" stroke="url(#borderPB)" stroke-width="1.5" filter="url(#cardShadow)"/>
    <!-- Featured -->
    <g transform="translate(60,260)"><use href="#badge-featured"/></g>

    <!-- Thumb -->
    <g>
      <rect x="70" y="305" width="100" height="100" rx="14" fill="url(#purpleBlueLight)" stroke="url(#borderPB)"/>
      <circle cx="120" cy="340" r="26" fill="url(#purpleBlue)"/>
      <path d="M110 340 L118 348 L135 331" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sparkle" x="150" y="300" transform="scale(0.6)"/>
    </g>

    <!-- Copy -->
    <text x="190" y="330" font-size="18" font-weight="800" class="title">TaskFlow Pro</text>
    <text x="190" y="355" font-size="13" class="muted">Project management</text>
    <text x="190" y="375" font-size="13" class="muted">and task tracking</text>

    <!-- Build Score -->
    <g transform="translate(70,425)">
      <use href="#pill-build-score"/>
      <text x="120" y="20" font-size="12" font-weight="800" fill="#FFFFFF">95</text>
    </g>

    <!-- Price -->
    <text x="70" y="490" font-size="26" font-weight="800" class="title">$29</text>
    <text x="120" y="490" font-size="16" fill="#94A3B8">/mo</text>

    <!-- CTA -->
    <rect x="70" y="515" width="310" height="42" rx="21" fill="url(#purpleBlue)"/>
    <text x="225" y="541" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">View Details</text>
  </g>

  <!-- Card 2 -->
  <g id="product2" class="font">
    <rect x="425" y="250" width="350" height="320" rx="18" fill="url(#cardGlow)" stroke="url(#borderPB)" stroke-width="1.5" filter="url(#cardShadow)"/>

    <g>
      <rect x="445" y="270" width="100" height="100" rx="14" fill="url(#purpleBlueLight)" stroke="url(#borderPB)"/>
      <rect x="475" y="300" width="15" height="40" rx="3" fill="#3B82F6"/>
      <rect x="495" y="290" width="15" height="50" rx="3" fill="#8B5CF6"/>
      <rect x="515" y="310" width="15" height="30" rx="3" fill="#60A5FA"/>
      <use href="#sparkle" x="520" y="275" transform="scale(0.5)"/>
    </g>

    <text x="565" y="295" font-size="18" font-weight="800" class="title">DataViz Studio</text>
    <text x="565" y="320" font-size="13" class="muted">Beautiful charts and</text>
    <text x="565" y="340" font-size="13" class="muted">analytics dashboards</text>

    <g transform="translate(445,390)">
      <use href="#pill-build-score"/>
      <text x="120" y="20" font-size="12" font-weight="800" fill="#FFFFFF">88</text>
    </g>

    <text x="445" y="455" font-size="26" font-weight="800" class="title">$19</text>
    <text x="495" y="455" font-size="16" fill="#94A3B8">/mo</text>

    <rect x="445" y="515" width="310" height="42" rx="21" fill="#FFFFFF" stroke="url(#borderPB)" stroke-width="2"/>
    <text x="600" y="541" font-size="15" font-weight="700" fill="#7C3AED" text-anchor="middle">View Details</text>
  </g>

  <!-- Card 3 -->
  <g id="product3" class="font">
    <rect x="800" y="250" width="350" height="320" rx="18" fill="url(#cardGlow)" stroke="url(#borderPB)" stroke-width="1.5" filter="url(#cardShadow)"/>

    <g>
      <rect x="820" y="270" width="100" height="100" rx="14" fill="url(#purpleBlueLight)" stroke="url(#borderPB)"/>
      <circle cx="870" cy="305" r="16" stroke="#8B5CF6" stroke-width="3" fill="none"/>
      <path d="M870 290 L870 305 L885 320" stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sparkle" x="890" y="260" transform="scale(0.45)"/>
    </g>

    <text x="940" y="295" font-size="18" font-weight="800" class="title">TimeTrack AI</text>
    <text x="940" y="320" font-size="13" class="muted">Smart time tracking</text>
    <text x="940" y="340" font-size="13" class="muted">with AI insights</text>

    <g transform="translate(820,390)">
      <use href="#pill-build-score"/>
      <text x="120" y="20" font-size="12" font-weight="800" fill="#FFFFFF">92</text>
    </g>

    <text x="820" y="455" font-size="26" font-weight="800" class="title">$15</text>
    <text x="870" y="455" font-size="16" fill="#94A3B8">/mo</text>

    <rect x="820" y="515" width="310" height="42" rx="21" fill="url(#purpleBlue)"/>
    <text x="975" y="541" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">View Details</text>
  </g>

  <!-- Card 4 -->
  <g id="product4" class="font">
    <rect x="50" y="595" width="350" height="320" rx="18" fill="url(#cardGlow)" stroke="url(#borderPB)" stroke-width="1.5" filter="url(#cardShadow)"/>

    <g>
      <rect x="70" y="615" width="100" height="100" rx="14" fill="url(#purpleBlueLight)" stroke="url(#borderPB)"/>
      <rect x="100" y="640" width="40" height="50" rx="6" fill="#3B82F6"/>
      <circle cx="120" cy="635" r="8" fill="#8B5CF6"/>
      <use href="#sparkle" x="150" y="610" transform="scale(0.5)"/>
    </g>

    <text x="190" y="640" font-size="18" font-weight="800" class="title">FormBuilder</text>
    <text x="190" y="665" font-size="13" class="muted">Drag-and-drop form</text>
    <text x="190" y="685" font-size="13" class="muted">creator with logic</text>

    <g transform="translate(70,735)">
      <use href="#pill-build-score"/>
      <text x="120" y="20" font-size="12" font-weight="800" fill="#FFFFFF">85</text>
    </g>

    <text x="70" y="800" font-size="26" font-weight="800" class="title">$25</text>
    <text x="120" y="800" font-size="16" fill="#94A3B8">/mo</text>

    <rect x="70" y="860" width="310" height="42" rx="21" fill="#FFFFFF" stroke="url(#borderPB)" stroke-width="2"/>
    <text x="225" y="886" font-size="15" font-weight="700" fill="#7C3AED" text-anchor="middle">View Details</text>
  </g>

  <!-- Card 5 -->
  <g id="product5" class="font">
    <rect x="425" y="595" width="350" height="320" rx="18" fill="url(#cardGlow)" stroke="url(#borderPB)" stroke-width="1.5" filter="url(#cardShadow)"/>

    <!-- NEW (gradient chip keeps palette consistent) -->
    <rect x="435" y="605" width="70" height="28" rx="14" fill="url(#purpleBlue)" filter="url(#chipShadow)"/>
    <text x="470" y="624" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">NEW</text>

    <g>
      <rect x="445" y="650" width="100" height="100" rx="14" fill="url(#purpleBlueLight)" stroke="url(#borderPB)"/>
      <path d="M475 680 L485 670 H515 V700 H475 Z" fill="#8B5CF6"/>
      <circle cx="490" cy="685" r="3" fill="#FFFFFF"/>
      <use href="#sparkle" x="520" y="630" transform="scale(0.45)"/>
    </g>

    <text x="565" y="675" font-size="18" font-weight="800" class="title">EmailCraft</text>
    <text x="565" y="700" font-size="13" class="muted">Email campaigns</text>
    <text x="565" y="720" font-size="13" class="muted">made simple</text>

    <g transform="translate(445,770)">
      <use href="#pill-build-score"/>
      <text x="120" y="20" font-size="12" font-weight="800" fill="#FFFFFF">81</text>
    </g>

    <text x="445" y="835" font-size="26" font-weight="800" class="title">$39</text>
    <text x="495" y="835" font-size="16" fill="#94A3B8">/mo</text>

    <rect x="445" y="860" width="310" height="42" rx="21" fill="url(#purpleBlue)"/>
    <text x="600" y="886" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">View Details</text>
  </g>

  <!-- Card 6 -->
  <g id="product6" class="font">
    <rect x="800" y="595" width="350" height="320" rx="18" fill="url(#cardGlow)" stroke="url(#borderPB)" stroke-width="1.5" filter="url(#cardShadow)"/>

    <g>
      <rect x="820" y="615" width="100" height="100" rx="14" fill="url(#purpleBlueLight)" stroke="url(#borderPB)"/>
      <circle cx="870" cy="665" r="22" stroke="#3B82F6" stroke-width="3" fill="none"/>
      <path d="M858 665 L865 672 L882 655" stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sparkle" x="900" y="610" transform="scale(0.5)"/>
    </g>

    <text x="940" y="640" font-size="18" font-weight="800" class="title">SocialQueue</text>
    <text x="940" y="665" font-size="13" class="muted">Schedule posts across</text>
    <text x="940" y="685" font-size="13" class="muted">all platforms</text>

    <g transform="translate(820,735)">
      <use href="#pill-build-score"/>
      <text x="120" y="20" font-size="12" font-weight="800" fill="#FFFFFF">90</text>
    </g>

    <text x="820" y="800" font-size="26" font-weight="800" class="title">$22</text>
    <text x="870" y="800" font-size="16" fill="#94A3B8">/mo</text>

    <rect x="820" y="860" width="310" height="42" rx="21" fill="#FFFFFF" stroke="url(#borderPB)" stroke-width="2"/>
    <text x="975" y="886" font-size="15" font-weight="700" fill="#7C3AED" text-anchor="middle">View Details</text>
  </g>

  <!-- Pagination -->
  <g id="pagination" class="font">
    <circle cx="550" cy="985" r="20" fill="#E2E8F0"/>
    <text x="550" y="991" font-size="14" font-weight="700" fill="#64748B" text-anchor="middle">1</text>

    <circle cx="600" cy="985" r="20" fill="url(#purpleBlue)"/>
    <text x="600" y="991" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

    <circle cx="650" cy="985" r="20" fill="#E2E8F0"/>
    <text x="650" y="991" font-size="14" font-weight="700" fill="#64748B" text-anchor="middle">3</text>
  </g>
</svg>
