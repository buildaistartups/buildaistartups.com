<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="purpleBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#lightGrad)"/>
  
  <!-- Main badge circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#purpleBlueGrad)" stroke-width="4"/>
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#purpleBlueGrad)" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,4"/>
  
  <!-- Percentage symbol (PROPERLY FIXED) -->
  <g id="percentSymbol">
    <!-- Top-left circle of % -->
    <circle cx="70" cy="60" r="11" fill="#8B5CF6"/>
    <circle cx="70" cy="60" r="6.5" fill="white"/>
    
    <!-- Diagonal line of % (from bottom-left of top circle to top-right of bottom circle) -->
    <line x1="78" y1="68" x2="122" y2="112" stroke="url(#purpleBlueGrad)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Bottom-right circle of % -->
    <circle cx="130" cy="120" r="11" fill="#3B82F6"/>
    <circle cx="130" cy="120" r="6.5" fill="white"/>
  </g>
  
  <!-- Small dollar sign indicator (top right) -->
  <g transform="translate(140, 50)">
    <circle cx="0" cy="0" r="13" fill="#10B981" opacity="0.15"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#10B981" stroke-width="2"/>
    <text x="0" y="5.5" text-anchor="middle" fill="#059669" font-size="15" font-weight="700">$</text>
  </g>
  
  <!-- Text: TRANSPARENT -->
  <text x="100" y="158" text-anchor="middle" fill="#8B5CF6" font-size="14" font-weight="700" letter-spacing="1.2">TRANSPARENT</text>
  
  <!-- Text: FEES -->
  <text x="100" y="176" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="800" letter-spacing="1.8">FEES</text>
  
  <!-- Decorative corner elements -->
  <g opacity="0.4">
    <circle cx="35" cy="35" r="3" fill="#8B5CF6"/>
    <circle cx="165" cy="35" r="3" fill="#3B82F6"/>
    <circle cx="35" cy="165" r="3" fill="#3B82F6"/>
    <circle cx="165" cy="165" r="3" fill="#8B5CF6"/>
  </g>
</svg>
