<?xml version="1.0" encoding="UTF-8"?>
<svg width="1728" height="1296" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ====== Defs ====== -->
  <defs>
    <linearGradient id="gradPurpleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gradSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAE4FD"/>
      <stop offset="100%" stop-color="#C1B7FD"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="70%" stop-color="#3B82F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <symbol id="checkIcon" viewBox="0 0 24 24">
      <path d="M5 13.2l5 5 9-12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="360" rx="520" ry="300" fill="url(#glow)"/>

  <!-- Clipboard -->
  <g filter="url(#softShadow)">
    <rect x="260" y="150" width="680" height="560" rx="28" fill="white"/>
    <rect x="260" y="150" width="680" height="560" rx="28" fill="none" stroke="url(#gradPurpleBlue)" stroke-width="2"/>

    <!-- Clip -->
    <g>
      <rect x="520" y="120" width="160" height="60" rx="14" fill="url(#gradPurpleBlue)"/>
      <rect x="520" y="120" width="160" height="60" rx="14" fill="white" opacity="0.12"/>
      <circle cx="600" cy="150" r="14" fill="white" opacity="0.9"/>
      <circle cx="600" cy="150" r="9" fill="url(#gradPurpleBlue)"/>
    </g>

    <!-- Header bar -->
    <rect x="260" y="180" width="680" height="70" rx="0" fill="url(#gradSoft)" opacity="0.6"/>

    <!-- Title -->
    <text x="300" y="228" font-size="34" font-family="Arial" fill="#1F2937" font-weight="700">
      Transfer-Readiness Checklist
    </text>

    <!-- Progress ring -->
    <g transform="translate(860,205)">
      <circle cx="0" cy="0" r="42" stroke="#E5E7EB" stroke-width="10" fill="none"/>
      <circle cx="0" cy="0" r="42" stroke="url(#gradPurpleBlue)" stroke-width="10" fill="none"
              stroke-linecap="round" transform="rotate(-90)"
              stroke-dasharray="264" stroke-dashoffset="0"/>
      <text x="0" y="8" text-anchor="middle" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">100%</text>
    </g>

    <!-- Linear progress pill (right edge aligned @ 920; width 260 => x = 920 - 260 = 660) -->
    <g transform="translate(660,260)">
      <rect x="0" y="0" width="260" height="32" rx="16" fill="#F1F5F9"/>
      <rect x="0" y="0" width="260" height="32" rx="16" fill="url(#gradPurpleBlue)" opacity="0.18"/>
      <rect x="3" y="3" width="254" height="26" rx="13" fill="url(#gradPurpleBlue)"/>
      <use href="#checkIcon" x="8" y="4" width="24" height="24"/>
      <text x="40" y="23" font-size="20" font-family="Arial" font-weight="700" fill="white">Ready to Transfer</text>
    </g>

    <!-- Checklist Items (centered stripes; pills slightly right) -->
    <g transform="translate(280,310)">
      <!-- Row 1 -->
      <g>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="#F8FAFC"/>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="url(#gradPurpleBlue)" opacity="0.06"/>
        <circle cx="34" cy="35" r="15" fill="url(#gradPurpleBlue)"/>
        <use href="#checkIcon" x="21" y="22" width="28" height="28"/>
        <text x="70" y="34" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">Domain</text>
        <text x="70" y="56" font-size="18" font-family="Arial" fill="#64748B">Registrar access and DNS records</text>
        <g transform="translate(470,18)">
          <rect x="0" y="0" width="150" height="34" rx="17" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
          <text x="75" y="23" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#047857">Complete</text>
        </g>
      </g>

      <!-- Row 2 -->
      <g transform="translate(0,78)">
        <rect x="0" y="0" width="640" height="70" rx="14" fill="#F8FAFC"/>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="url(#gradPurpleBlue)" opacity="0.06"/>
        <circle cx="34" cy="35" r="15" fill="url(#gradPurpleBlue)"/>
        <use href="#checkIcon" x="21" y="22" width="28" height="28"/>
        <text x="70" y="34" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">Stripe</text>
        <text x="70" y="56" font-size="18" font-family="Arial" fill="#64748B">Ownership transfer and live keys rotated</text>
        <g transform="translate(470,18)">
          <rect x="0" y="0" width="150" height="34" rx="17" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
          <text x="75" y="23" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#047857">Complete</text>
        </g>
      </g>

      <!-- Row 3 -->
      <g transform="translate(0,156)">
        <rect x="0" y="0" width="640" height="70" rx="14" fill="#F8FAFC"/>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="url(#gradPurpleBlue)" opacity="0.06"/>
        <circle cx="34" cy="35" r="15" fill="url(#gradPurpleBlue)"/>
        <use href="#checkIcon" x="21" y="22" width="28" height="28"/>
        <text x="70" y="34" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">Analytics</text>
        <text x="70" y="56" font-size="18" font-family="Arial" fill="#64748B">Property access and data retention confirmed</text>
        <g transform="translate(470,18)">
          <rect x="0" y="0" width="150" height="34" rx="17" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
          <text x="75" y="23" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#047857">Complete</text>
        </g>
      </g>

      <!-- Row 4 -->
      <g transform="translate(0,234)">
        <rect x="0" y="0" width="640" height="70" rx="14" fill="#F8FAFC"/>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="url(#gradPurpleBlue)" opacity="0.06"/>
        <circle cx="34" cy="35" r="15" fill="url(#gradPurpleBlue)"/>
        <use href="#checkIcon" x="21" y="22" width="28" height="28"/>
        <text x="70" y="34" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">Docs</text>
        <text x="70" y="56" font-size="18" font-family="Arial" fill="#64748B">Runbook, architecture and credentials handover</text>
        <g transform="translate(470,18)">
          <rect x="0" y="0" width="150" height="34" rx="17" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
          <text x="75" y="23" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#047857">Complete</text>
        </g>
      </g>

      <!-- Row 5 -->
      <g transform="translate(0,312)">
        <rect x="0" y="0" width="640" height="70" rx="14" fill="#F8FAFC"/>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="url(#gradPurpleBlue)" opacity="0.06"/>
        <circle cx="34" cy="35" r="15" fill="url(#gradPurpleBlue)"/>
        <use href="#checkIcon" x="21" y="22" width="28" height="28"/>
        <text x="70" y="34" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">Backups</text>
        <text x="70" y="56" font-size="18" font-family="Arial" fill="#64748B">Automated snapshots and restore verified</text>
        <g transform="translate(470,18)">
          <rect x="0" y="0" width="150" height="34" rx="17" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
          <text x="75" y="23" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#047857">Complete</text>
        </g>
      </g>

      <!-- Row 6 -->
      <g transform="translate(0,390)">
        <rect x="0" y="0" width="640" height="70" rx="14" fill="#F8FAFC"/>
        <rect x="0" y="0" width="640" height="70" rx="14" fill="url(#gradPurpleBlue)" opacity="0.06"/>
        <circle cx="34" cy="35" r="15" fill="url(#gradPurpleBlue)"/>
        <use href="#checkIcon" x="21" y="22" width="28" height="28"/>
        <text x="70" y="34" font-size="26" font-family="Arial" font-weight="700" fill="#1F2937">Support</text>
        <text x="70" y="56" font-size="18" font-family="Arial" fill="#64748B">Contact and SLA defined for the new owner</text>
        <g transform="translate(470,18)">
          <rect x="0" y="0" width="150" height="34" rx="17" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
          <text x="75" y="23" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#047857">Complete</text>
        </g>
      </g>
    </g>
  </g>
</svg>
