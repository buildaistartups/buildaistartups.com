<svg viewBox="0 0 400 490" xmlns="http://www.w3.org/2000/svg" width="350" height="428">
  <defs>
    <!-- Shadow filter -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradient for app screenshot -->
    <linearGradient id="appGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Badge gradient -->
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Card Container -->
  <rect x="20" y="20" width="360" height="450" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)"/>
  
  <!-- App Screenshot Thumbnail -->
  <rect x="35" y="35" width="330" height="200" rx="8" fill="url(#appGradient)"/>
  
  <!-- Mock app interface elements -->
  <rect x="50" y="55" width="100" height="6" rx="3" fill="white" opacity="0.9"/>
  <rect x="50" y="70" width="150" height="6" rx="3" fill="white" opacity="0.7"/>
  <rect x="50" y="85" width="120" height="6" rx="3" fill="white" opacity="0.7"/>
  
  <!-- Mock chart/graph -->
  <path d="M 60 180 L 100 150 L 140 160 L 180 130 L 220 140 L 260 110 L 300 120" stroke="white" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="60" cy="180" r="4" fill="white" opacity="0.9"/>
  <circle cx="100" cy="150" r="4" fill="white" opacity="0.9"/>
  <circle cx="140" cy="160" r="4" fill="white" opacity="0.9"/>
  <circle cx="180" cy="130" r="4" fill="white" opacity="0.9"/>
  <circle cx="220" cy="140" r="4" fill="white" opacity="0.9"/>
  <circle cx="260" cy="110" r="4" fill="white" opacity="0.9"/>
  <circle cx="300" cy="120" r="4" fill="white" opacity="0.9"/>
  
  <!-- Build Score Badge (top right of thumbnail) -->
  <g>
    <rect x="290" y="50" width="60" height="28" rx="14" fill="url(#badgeGradient)"/>
    <text x="320" y="69" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">87/100</text>
  </g>
  
  <!-- Product Name -->
  <text x="35" y="265" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827">TaskFlow Pro</text>
  
  <!-- Transfer Ready Indicator -->
  <g>
    <rect x="35" y="275" width="90" height="22" rx="11" fill="#10b981" opacity="0.1"/>
    <circle cx="48" cy="286" r="3" fill="#10b981"/>
    <text x="56" y="290" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#10b981">Ready 6/6</text>
  </g>
  
  <!-- Pricing -->
  <text x="365" y="290" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#667eea" text-anchor="end">$4,950</text>
  
  <!-- Description -->
  <text x="35" y="320" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Project management SaaS with analytics</text>
  
  <!-- Category Tags -->
  <g>
    <!-- SaaS tag -->
    <rect x="35" y="345" width="55" height="26" rx="13" fill="#ede9fe"/>
    <text x="62.5" y="362" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#7c3aed" text-anchor="middle">SaaS</text>
    
    <!-- Productivity tag -->
    <rect x="98" y="345" width="95" height="26" rx="13" fill="#dbeafe"/>
    <text x="145.5" y="362" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#2563eb" text-anchor="middle">Productivity</text>
    
    <!-- B2B tag -->
    <rect x="201" y="345" width="50" height="26" rx="13" fill="#fce7f3"/>
    <text x="226" y="362" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#db2777" text-anchor="middle">B2B</text>
  </g>
  
  <!-- Key Metrics -->
  <g>
    <text x="35" y="395" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">MRR: <tspan font-weight="600" fill="#111827">$1,240</tspan></text>
    <text x="160" y="395" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Users: <tspan font-weight="600" fill="#111827">342</tspan></text>
  </g>
  
  <!-- Divider Line -->
  <line x1="35" y1="415" x2="365" y2="415" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Action Buttons -->
  <g>
    <!-- Live Demo Button (Secondary) -->
    <rect x="35" y="425" width="155" height="40" rx="8" fill="white" stroke="#667eea" stroke-width="1.5"/>
    <text x="112.5" y="449" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#667eea" text-anchor="middle">Live Demo</text>
    
    <!-- Due Diligence Button (Primary) -->
    <rect x="210" y="425" width="155" height="40" rx="8" fill="url(#badgeGradient)"/>
    <text x="287.5" y="449" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Due Diligence</text>
  </g>
</svg>
