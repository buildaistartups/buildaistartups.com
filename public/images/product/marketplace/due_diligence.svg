<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <title>Due Diligence Dashboard — Vector Mock-up</title>
  <desc>Professional analytics dashboard mock-up featuring Build Score gauge, quality gates, commit history graph, and compliance indicators. Purple and blue palette, verification badges, transparent background.</desc>

  <defs>
    <linearGradient id="gradPB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gradPBv" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#111827" flood-opacity="0.25"/>
    </filter>
    <style>
      :root {
        --text: #E5E7EB;
        --muted: #9CA3AF;
        --card: rgba(255,255,255,0.06);
        --stroke: rgba(255,255,255,0.14);
      }
      .title { font: 600 28px/1.2 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: var(--text); }
      .subtitle { font: 500 16px/1.6 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: var(--muted); }
      .kpi-label { font: 600 14px/1.4 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: var(--muted); }
      .kpi-value { font: 800 32px/1.1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: var(--text); }
      .badge { font: 600 14px/1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #0B1020; }
      .chip { font: 600 12px/1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .axis { stroke: var(--stroke); stroke-width: 1; vector-effect: non-scaling-stroke; }
      .grid { stroke: var(--stroke); stroke-width: 1; stroke-dasharray: 4 6; vector-effect: non-scaling-stroke; }
      .label { font: 500 12px/1 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: var(--muted); }
      .card { fill: var(--card); stroke: var(--stroke); stroke-width: 1; rx: 18; }
    </style>
  </defs>

  <!-- Header -->
  <g transform="translate(40,34)">
    <rect width="1520" height="72" class="card" filter="url(#softShadow)"/>
    <text x="28" y="44" class="title">Due Diligence Dashboard</text>
    <text x="1260" y="44" class="subtitle">Build Pipeline • Last sync: now</text>
  </g>

  <!-- Left column: Build Score + Gates -->
  <g transform="translate(40,130)">
    <rect width="500" height="420" class="card" filter="url(#softShadow)"/>
    <text x="28" y="42" class="subtitle">Build Score</text>
    <path d="M 158.76,310.00 A 140.00,140.00 0 1 1 401.24,310.00" stroke="url(#gradPB)" stroke-opacity="0.18" stroke-width="28" fill="none" stroke-linecap="round"/>
    <path d="M 158.76,310.00 A 140.00,140.00 0 1 1 419.72,231.21" stroke="url(#gradPB)" stroke-width="28" fill="none" stroke-linecap="round"/>
    <circle cx="280" cy="240" r="100" fill="none" stroke="url(#gradPB)" stroke-opacity="0.25" stroke-width="2"/>
    <text x="280" y="230" text-anchor="middle" class="kpi-value">86%</text>
    <text x="280" y="262" text-anchor="middle" class="kpi-label">Overall Quality</text>

    <g transform="translate(30,300)">
      <rect width="440" height="90" class="card"/>
      <g transform="translate(16,22)">
        <text class="kpi-label">Reliability</text>
        <text x="0" y="40" class="kpi-value">A</text>
      </g>
      <g transform="translate(150,22)">
        <text class="kpi-label">Security</text>
        <text x="0" y="40" class="kpi-value">A-</text>
      </g>
      <g transform="translate(290,22)">
        <text class="kpi-label">Maintainability</text>
        <text x="0" y="40" class="kpi-value">B+</text>
      </g>
    </g>
  </g>

  <!-- Quality Gates -->
  <g transform="translate(40,580)">
    <rect width="500" height="320" class="card" filter="url(#softShadow)"/>
    <text x="28" y="44" class="subtitle">Quality Gates</text>
    <g transform="translate(28,70)">
      
      <g transform="translate(0,0)">
        <rect width="444" height="52" class="card"/>
        <circle cx="26" cy="26" r="9" fill="url(#gradPB)" />
        <text x="50" y="21" class="kpi-label">Unit Tests</text>
        <text x="50" y="42" class="label">Status: Passed</text>
        <g transform="translate(382,12)">
          <rect width="52" height="28" rx="8" fill="#10B981" />
          <text x="26" y="20" text-anchor="middle" class="chip" fill="#0B1020">OK</text>
        </g>
      </g>
    

      <g transform="translate(0,62)">
        <rect width="444" height="52" class="card"/>
        <circle cx="26" cy="26" r="9" fill="url(#gradPB)" />
        <text x="50" y="21" class="kpi-label">Static Analysis</text>
        <text x="50" y="42" class="label">Status: Passed</text>
        <g transform="translate(382,12)">
          <rect width="52" height="28" rx="8" fill="#10B981" />
          <text x="26" y="20" text-anchor="middle" class="chip" fill="#0B1020">OK</text>
        </g>
      </g>
    

      <g transform="translate(0,124)">
        <rect width="444" height="52" class="card"/>
        <circle cx="26" cy="26" r="9" fill="#F59E0B" />
        <text x="50" y="21" class="kpi-label">Dependency Audit</text>
        <text x="50" y="42" class="label">Status: Warning</text>
        <g transform="translate(382,12)">
          <rect width="52" height="28" rx="8" fill="#F59E0B" />
          <text x="26" y="20" text-anchor="middle" class="chip" fill="#0B1020">WARN</text>
        </g>
      </g>
    

      <g transform="translate(0,186)">
        <rect width="444" height="52" class="card"/>
        <circle cx="26" cy="26" r="9" fill="url(#gradPB)" />
        <text x="50" y="21" class="kpi-label">Coverage ≥ 80%</text>
        <text x="50" y="42" class="label">Status: Passed</text>
        <g transform="translate(382,12)">
          <rect width="52" height="28" rx="8" fill="#10B981" />
          <text x="26" y="20" text-anchor="middle" class="chip" fill="#0B1020">OK</text>
        </g>
      </g>
    
    </g>
  </g>

  <!-- Commit History -->
  <g transform="translate(560,130)">
    <rect width="1000" height="420" class="card" filter="url(#softShadow)"/>
    <text x="28" y="42" class="subtitle">Commit History</text>
    <g transform="translate(28,60)">
      <line x1="0" y1="320" x2="980" y2="320" class="axis"/>
      <line x1="0" y1="0" x2="0" y2="320" class="axis"/>
      <line x1="0" y1="80.0" x2="980" y2="80.0" class="grid"/>
<line x1="0" y1="160.0" x2="980" y2="160.0" class="grid"/>
<line x1="0" y1="240.0" x2="980" y2="240.0" class="grid"/>
      <text x="163.3" y="346" class="label">4h</text>
<text x="326.7" y="346" class="label">8h</text>
<text x="490.0" y="346" class="label">12h</text>
<text x="653.3" y="346" class="label">16h</text>
<text x="816.7" y="346" class="label">20h</text>
<text x="980.0" y="346" class="label">24h</text>
      <text x="-8" y="244.0" text-anchor="end" class="label">25%</text>
<text x="-8" y="164.0" text-anchor="end" class="label">50%</text>
<text x="-8" y="84.0" text-anchor="end" class="label">75%</text>
      <path d="M 0,320 L 540.0,590.0 582.6,617.3 625.2,630.3 667.8,646.2 710.4,632.6 753.0,622.4 795.7,599.8 838.3,623.6 880.9,628.1 923.5,655.2 966.1,671.4 1008.7,671.1 1051.3,698.4 1093.9,715.7 1136.5,707.1 1179.1,704.5 1221.7,720.6 1264.3,715.5 1307.0,697.6 1349.6,726.1 1392.2,708.5 1434.8,697.0 1477.4,706.2 1520.0,726.1 L 980,320 Z" fill="url(#gradPBv)"/>
      <polyline points="540.0,590.0 582.6,617.3 625.2,630.3 667.8,646.2 710.4,632.6 753.0,622.4 795.7,599.8 838.3,623.6 880.9,628.1 923.5,655.2 966.1,671.4 1008.7,671.1 1051.3,698.4 1093.9,715.7 1136.5,707.1 1179.1,704.5 1221.7,720.6 1264.3,715.5 1307.0,697.6 1349.6,726.1 1392.2,708.5 1434.8,697.0 1477.4,706.2 1520.0,726.1" fill="none" stroke="url(#gradPB)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(28,436)">
      <rect width="920" height="64" class="card"/>
      <g transform="translate(16,22)"><text class="kpi-label">Commits (24h)</text><text x="0" y="30" class="kpi-value">152</text></g>
      <g transform="translate(200,22)"><text class="kpi-label">Lead Time</text><text x="0" y="30" class="kpi-value">2.4h</text></g>
      <g transform="translate(400,22)"><text class="kpi-label">Failures</text><text x="0" y="30" class="kpi-value">3</text></g>
      <g transform="translate(560,22)"><text class="kpi-label">MTTR</text><text x="0" y="30" class="kpi-value">38m</text></g>
    </g>
  </g>

  <!-- Compliance & Verification -->
  <g transform="translate(560,580)">
    <rect width="1000" height="320" class="card" filter="url(#softShadow)"/>
    <text x="28" y="44" class="subtitle">Compliance &amp; Verification</text>
    <g transform="translate(28,80)">
      
      <g transform="translate(0,0)">
        <rect width="600" height="56" class="card"/>
        <g transform="translate(16,16)">
          <path d="M12 2 L24 10 L24 26 L12 34 L0 26 L0 10 Z" fill="url(#gradPB)"/>
          <path d='M6 18 l10 10 18 -22' stroke='#0B1020' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
        </g>
        <text x="56" y="23" class="kpi-label">GDPR</text>
        <text x="56" y="42" class="label">Compliant</text>
        <g transform="translate(520,14)">
          <rect width="64" height="28" rx="8" fill="#10B981"/>
          <text x="32" y="20" text-anchor="middle" class="chip" fill="#0B1020">OK</text>
        </g>
      </g>
    

      <g transform="translate(0,66)">
        <rect width="600" height="56" class="card"/>
        <g transform="translate(16,16)">
          <path d="M12 2 L24 10 L24 26 L12 34 L0 26 L0 10 Z" fill="url(#gradPB)"/>
          <path d='M6 18 l10 10 18 -22' stroke='#0B1020' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
        </g>
        <text x="56" y="23" class="kpi-label">SOC 2 Type II</text>
        <text x="56" y="42" class="label">Compliant</text>
        <g transform="translate(520,14)">
          <rect width="64" height="28" rx="8" fill="#10B981"/>
          <text x="32" y="20" text-anchor="middle" class="chip" fill="#0B1020">OK</text>
        </g>
      </g>
    

      <g transform="translate(0,132)">
        <rect width="600" height="56" class="card"/>
        <g transform="translate(16,16)">
          <path d="M12 2 L24 10 L24 26 L12 34 L0 26 L0 10 Z" fill="url(#gradPB)"/>
          <path d='M6 18 l10 10 18 -22' stroke='#0B1020' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
        </g>
        <text x="56" y="23" class="kpi-label">ISO 27001</text>
        <text x="56" y="42" class="label">Compliant</text>
        <g transform="translate(520,14)">
          <rect width="64" height="28" rx="8" fill="#10B981"/>
          <text x="32" y="20" text-anchor="middle" class="chip" fill="#0B1020">OK</text>
        </g>
      </g>
    

      <g transform="translate(0,198)">
        <rect width="600" height="56" class="card"/>
        <g transform="translate(16,16)">
          <path d="M12 2 L24 10 L24 26 L12 34 L0 26 L0 10 Z" fill="url(#gradPB)"/>
          <line x1='6' y1='12' x2='18' y2='24' stroke='#0B1020' stroke-width='3'/><line x1='18' y1='12' x2='6' y2='24' stroke='#0B1020' stroke-width='3'/>
        </g>
        <text x="56" y="23" class="kpi-label">HIPAA</text>
        <text x="56" y="42" class="label">Action required</text>
        <g transform="translate(520,14)">
          <rect width="64" height="28" rx="8" fill="#EF4444"/>
          <text x="32" y="20" text-anchor="middle" class="chip" fill="#0B1020">FAIL</text>
        </g>
      </g>
    
    </g>
    <g transform="translate(648,92)">
      
      <g transform="translate(0,0)">
        <rect width="150" height="150" class="card"/>
        <g transform="translate(46,20)">
          <path d="M32 4 L56 18 L56 48 L32 64 L8 48 L8 18 Z" fill="url(#gradPB)"/>
          <path d="M18 36 l10 10 18 -22" stroke="#0B1020" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <g transform="translate(16,116)">
          <rect width="118" height="24" rx="6" fill="url(#gradPB)"/>
          <text x="59" y="17" text-anchor="middle" class="badge">Verified Vendor</text>
        </g>
      </g>
    

      <g transform="translate(170,0)">
        <rect width="150" height="150" class="card"/>
        <g transform="translate(46,20)">
          <path d="M32 4 L56 18 L56 48 L32 64 L8 48 L8 18 Z" fill="url(#gradPB)"/>
          <path d="M18 36 l10 10 18 -22" stroke="#0B1020" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <g transform="translate(16,116)">
          <rect width="118" height="24" rx="6" fill="url(#gradPB)"/>
          <text x="59" y="17" text-anchor="middle" class="badge">Signed SBOM</text>
        </g>
      </g>
    

      <g transform="translate(340,0)">
        <rect width="150" height="150" class="card"/>
        <g transform="translate(46,20)">
          <path d="M32 4 L56 18 L56 48 L32 64 L8 48 L8 18 Z" fill="url(#gradPB)"/>
          <path d="M18 36 l10 10 18 -22" stroke="#0B1020" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <g transform="translate(16,116)">
          <rect width="118" height="24" rx="6" fill="url(#gradPB)"/>
          <text x="59" y="17" text-anchor="middle" class="badge">2FA Enforced</text>
        </g>
      </g>
    

      <g transform="translate(510,0)">
        <rect width="150" height="150" class="card"/>
        <g transform="translate(46,20)">
          <path d="M32 4 L56 18 L56 48 L32 64 L8 48 L8 18 Z" fill="url(#gradPB)"/>
          <path d="M18 36 l10 10 18 -22" stroke="#0B1020" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <g transform="translate(16,116)">
          <rect width="118" height="24" rx="6" fill="url(#gradPB)"/>
          <text x="59" y="17" text-anchor="middle" class="badge">Code Signing</text>
        </g>
      </g>
    
    </g>
  </g>
</svg>
