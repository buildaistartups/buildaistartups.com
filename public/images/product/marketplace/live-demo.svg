<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <title>Live Demo Interface — Vector Illustration</title>
  <desc>Clean, modern browser window with an active demo, play button, Try Now CTA, and preview indicators in purple and blue. Transparent canvas.</desc>

  <!-- ====== Definitions ====== -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="g-purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="g-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="g-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="f-softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.35"/>
    </filter>

    <!-- Glow for LIVE badge -->
    <filter id="f-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card shadow -->
    <filter id="f-card" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0B1020" flood-opacity="0.4"/>
    </filter>

    <!-- Rounded clip for window content -->
    <clipPath id="clip-window">
      <rect x="120" y="170" width="1360" height="710" rx="20" ry="20"/>
    </clipPath>

    <!-- Cursor arrow marker (unused but kept for reuse) -->
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#FFFFFF"/>
    </marker>

    <!-- Subtle grid pattern -->
    <pattern id="p-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#93C5FD" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <!-- Cursor shadow -->
    <filter id="f-cursorShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ====== Browser Window ====== -->
  <g filter="url(#f-softShadow)">
    <rect x="80" y="100" width="1440" height="820" rx="28" ry="28" fill="#0B1220"/>
    <rect x="80" y="100" width="1440" height="76" rx="28" ry="28" fill="#0A0F1E"/>
    <circle cx="124" cy="138" r="10" fill="#C1B7FD"/>
    <circle cx="156" cy="138" r="10" fill="#8E7EF5"/>
    <circle cx="188" cy="138" r="10" fill="#4D40CC"/>
    <rect x="240" y="122" width="760" height="32" rx="16" fill="url(#g-purpleBlue)" opacity="0.18" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="260" y="143" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-size="16" fill="#C7D2FE" opacity="0.9">https://demo.example/live</text>

    <!-- LIVE badge -->
    <g filter="url(#f-glow)">
      <rect x="1040" y="122" rx="16" ry="16" width="120" height="32" fill="url(#g-purpleBlue)" opacity="0.85"/>
      <circle cx="1060" cy="138" r="6" fill="#FFFFFF"/>
      <text x="1076" y="143" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
            font-size="14" font-weight="600" fill="#FFFFFF">LIVE</text>
    </g>

    <!-- Preview indicator -->
    <g>
      <rect x="1180" y="122" rx="16" ry="16" width="140" height="32" fill="#111827" stroke="#60A5FA" stroke-opacity="0.5"/>
      <text x="1196" y="143" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
            font-size="14" font-weight="500" fill="#93C5FD">Preview Mode</text>
    </g>
  </g>

  <!-- ====== Window Content Area ====== -->
  <g clip-path="url(#clip-window)">
    <rect x="120" y="170" width="1360" height="710" fill="url(#p-grid)"/>
    <rect x="120" y="170" width="1360" height="710" fill="url(#g-purpleBlue)" opacity="0.08"/>

    <!-- Left: Demo Player Card -->
    <g filter="url(#f-card)">
      <rect x="160" y="210" width="880" height="560" rx="24" ry="24" fill="#0E162B" stroke="url(#g-purpleBlue)" stroke-opacity="0.35"/>
      <g>
        <rect x="160" y="210" width="880" height="64" rx="24" ry="24" fill="#0B1326"/>
        <text x="188" y="250" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="18" font-weight="600" fill="#EAE4FD">Live Demo — Interactive Preview</text>
        <circle cx="994" cy="242" r="8" fill="#22C55E"/>
        <text x="1010" y="248" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C1B7FD">Connected</text>
      </g>

      <g>
        <rect x="184" y="294" width="832" height="376" rx="16" ry="16" fill="url(#g-purpleBlue)" opacity="0.25"/>
        <circle cx="600" cy="482" r="56" fill="#FFFFFF" fill-opacity="0.9"/>
        <polygon points="588,458 628,482 588,506" fill="url(#g-purpleBlue)"/>
        <rect x="856" y="314" width="120" height="36" rx="18" fill="#0B1220" opacity="0.85" stroke="#93C5FD" stroke-opacity="0.4"/>
        <text x="876" y="337" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C7D2FE">00:45 / 02:10</text>
      </g>

      <g>
        <rect x="208" y="692" width="784" height="6" rx="3" fill="#16213A"/>
        <rect x="208" y="692" width="420" height="6" rx="3" fill="url(#g-blue)"/>
        <circle cx="628" cy="695" r="10" fill="#FFFFFF" stroke="url(#g-blue)" stroke-width="3"/>
        <text x="208" y="724" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C1B7FD">Autoplay</text>
        <rect x="274" y="708" width="36" height="20" rx="10" fill="#16213A" stroke="#8B5CF6" stroke-opacity="0.6"/>
        <circle cx="288" cy="718" r="8" fill="url(#g-purple)"/>
        <text x="330" y="724" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C1B7FD">HD</text>
        <rect x="358" y="708" width="36" height="20" rx="10" fill="#16213A" stroke="#60A5FA" stroke-opacity="0.6"/>
        <circle cx="382" cy="718" r="8" fill="url(#g-blue)"/>
      </g>
    </g>

    <!-- Right: Control Panel -->
    <g filter="url(#f-card)">
      <rect x="1080" y="210" width="360" height="560" rx="24" ry="24" fill="#0E162B" stroke="url(#g-purpleBlue)" stroke-opacity="0.35"/>
      <g>
        <rect x="1080" y="210" width="360" height="64" rx="24" ry="24" fill="#0B1326"/>
        <text x="1108" y="250" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="18" font-weight="600" fill="#EAE4FD">Controls</text>
        <rect x="1380" y="228" width="44" height="24" rx="12" fill="#111827" stroke="#60A5FA" stroke-opacity="0.4"/>
        <text x="1388" y="245" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="12" fill="#93C5FD">v2</text>
      </g>

      <g>
        <text x="1108" y="306" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C1B7FD">Mode</text>
        <rect x="1180" y="290" width="120" height="28" rx="14" fill="#0B1220" stroke="#8B5CF6" stroke-opacity="0.4"/>
        <text x="1196" y="309" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="13" fill="#EAE4FD">Interactive</text>

        <text x="1108" y="352" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C1B7FD">Speed</text>
        <rect x="1180" y="336" width="180" height="8" rx="4" fill="#16213A"/>
        <rect x="1180" y="336" width="96" height="8" rx="4" fill="url(#g-blue)"/>
        <circle cx="1276" cy="340" r="10" fill="#FFFFFF" stroke="url(#g-blue)" stroke-width="3"/>

        <text x="1108" y="398" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="14" fill="#C1B7FD">Quality</text>
        <rect x="1180" y="382" width="120" height="28" rx="14" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.4"/>
        <text x="1196" y="401" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="13" fill="#C7D2FE">Preview</text>
      </g>

      <!-- Try Now CTA -->
      <g>
        <rect x="1100" y="608" width="320" height="64" rx="32" fill="url(#g-purpleBlue)"/>
        <text x="1180" y="648" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="20" font-weight="700" fill="#FFFFFF">Try Now</text>
        <polygon points="1396,640 1416,640 1406,652" fill="#FFFFFF"/>
      </g>

      <g>
        <text x="1108" y="700" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="13" fill="#93C5FD">Need a quick tour?</text>
        <rect x="1244" y="684" width="128" height="28" rx="14" fill="#0B1220" stroke="#8B5CF6" stroke-opacity="0.4"/>
        <text x="1260" y="703" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
              font-size="13" fill="#EAE4FD">Watch preview</text>
      </g>
    </g>

    <!-- Floating cursor pointer (smaller & left-shifted; no dotted guides/circles) -->
    <g>
      <g transform="translate(1110,630) rotate(-8) scale(0.7)" filter="url(#f-cursorShadow)">
        <path d="M0 0 L0 72 L16 58 L26 88 L36 84 L26 56 L46 56 Z"
              fill="#FFFFFF" stroke="#1F2937" stroke-width="3" vector-effect="non-scaling-stroke"/>
        <path d="M0 0 L0 72 L16 58 L26 88 L36 84 L26 56 L46 56 Z"
              fill="none" stroke="url(#g-purpleBlue)" stroke-width="2" opacity="0.6" vector-effect="non-scaling-stroke"/>
      </g>
    </g>

    <!-- Bottom info strip -->
    <g>
      <rect x="120" y="844" width="1360" height="36" fill="#0B1220" opacity="0.9"/>
      <text x="144" y="867" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
            font-size="14" fill="#C1B7FD">Tip: Switch to "Interactive" to explore the demo live.</text>
      <rect x="1280" y="852" width="180" height="20" rx="10" fill="#0E162B" stroke="#60A5FA" stroke-opacity="0.5"/>
      <text x="1296" y="866" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
            font-size="12" fill="#93C5FD">Status: Preview</text>
    </g>
  </g>
</svg>
