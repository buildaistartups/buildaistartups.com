<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      
      @keyframes slide-right {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(8px); }
      }
      
      @keyframes fade-in {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
      }
      
      .f-letter {
        animation: pulse 2.5s ease-in-out infinite;
      }
      
      .arrow {
        animation: slide-right 2s ease-in-out infinite;
      }
      
      .bar1 {
        animation: fade-in 2s ease-in-out infinite;
      }
      
      .bar2 {
        animation: fade-in 2s ease-in-out infinite;
        animation-delay: 0.3s;
      }
      
      .bar3 {
        animation: fade-in 2s ease-in-out infinite;
        animation-delay: 0.6s;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>
  
  <g transform="translate(200, 120)">
    <g class="f-letter">
      <rect x="-40" y="-60" width="12" height="120" rx="3" fill="url(#purpleBlue)" class="bar1"/>
      <rect x="-40" y="-60" width="60" height="12" rx="3" fill="url(#purpleBlue)" class="bar2"/>
      <rect x="-40" y="-10" width="50" height="12" rx="3" fill="url(#purpleBlue)" class="bar3"/>
    </g>
    
    <polygon points="30,-20 60,0 30,20" fill="url(#purpleBlue)" class="arrow"/>
  </g>
  
  <text x="200" y="260" font-size="36" fill="url(#purpleBlue)" text-anchor="middle" font-weight="700">FormPilot</text>
  <text x="200" y="285" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="600">Forms &amp; Automation</text>
</svg>
