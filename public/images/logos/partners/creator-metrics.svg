<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.02); opacity: 0.95; }
      }
      
      @keyframes slideUp {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      
      .logo-element {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: center;
      }
      
      .bar {
        animation: slideUp 2s ease-in-out infinite;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>
  
  <!-- Version 1: Play button with chart bars (Primary) -->
  <g transform="translate(200, 140)">
    <!-- Outer circle (optional, can be removed for even more minimal look) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#purpleBlue)" stroke-width="4" opacity="0.3" class="logo-element"/>
    
    <!-- Play button outline -->
    <path d="M -30 -40 L -30 40 L 45 0 Z" fill="none" stroke="url(#purpleBlue)" stroke-width="5" stroke-linejoin="round" class="logo-element"/>
    
    <!-- Chart bars inside play button -->
    <g>
      <rect x="-15" y="10" width="10" height="20" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0s"/>
      <rect x="-2" y="0" width="10" height="30" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0.2s"/>
      <rect x="11" y="-10" width="10" height="40" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0.4s"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="200" y="270" font-size="32" fill="url(#purpleBlue)" text-anchor="middle" font-weight="700">Creator Metrics</text>
  <text x="200" y="295" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="600">YouTube Analytics</text>
  
  <!-- Alternative Version 2: Minimalist bars forming play shape -->
  <g transform="translate(200, 140)" opacity="0">
    <!-- Rising bars that form a play button shape -->
    <rect x="-40" y="20" width="12" height="15" rx="2" fill="url(#purpleBlue)" class="bar"/>
    <rect x="-24" y="10" width="12" height="25" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0.15s"/>
    <rect x="-8" y="0" width="12" height="35" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0.3s"/>
    <rect x="8" y="-10" width="12" height="45" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0.45s"/>
    <rect x="24" y="-20" width="12" height="55" rx="2" fill="url(#purpleBlue)" class="bar" style="animation-delay: 0.6s"/>
  </g>
</svg>
