<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.03); }
      }
      
      @keyframes sparkle {
        0%, 100% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      
      .inbox {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: center;
      }
      
      .ai-sparkle {
        animation: sparkle 2s ease-in-out infinite;
        transform-origin: center;
      }
      
      .ai-dot {
        animation: sparkle 2.5s ease-in-out infinite;
        transform-origin: center;
      }
      
      text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>
  
  <!-- Main Logo: Inbox with AI elements -->
  <g transform="translate(200, 120)">
    <!-- Inbox tray -->
    <g class="inbox">
      <!-- Bottom of inbox -->
      <rect x="-60" y="-20" width="120" height="60" rx="6" fill="none" stroke="url(#purpleBlue)" stroke-width="5"/>
      
      <!-- Top flap/opening -->
      <path d="M -60 -20 L -30 10 L 30 10 L 60 -20" fill="none" stroke="url(#purpleBlue)" stroke-width="5" stroke-linejoin="round"/>
      
      <!-- Message line inside -->
      <line x1="-35" y1="15" x2="35" y2="15" stroke="url(#purpleBlue)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    </g>
    
    <!-- AI element: Sparkle/Intelligence indicator (top right) -->
    <g transform="translate(50, -35)">
      <circle cx="0" cy="0" r="4" fill="url(#purpleBlue)" class="ai-sparkle" style="animation-delay: 0s"/>
      <line x1="0" y1="-10" x2="0" y2="-6" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round" class="ai-sparkle" style="animation-delay: 0s"/>
      <line x1="0" y1="6" x2="0" y2="10" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round" class="ai-sparkle" style="animation-delay: 0s"/>
      <line x1="-10" y1="0" x2="-6" y2="0" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round" class="ai-sparkle" style="animation-delay: 0s"/>
      <line x1="6" y1="0" x2="10" y2="0" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round" class="ai-sparkle" style="animation-delay: 0s"/>
    </g>
    
    <!-- AI element: Small dots (neural network suggestion) -->
    <circle cx="-50" cy="-35" r="3" fill="url(#purpleBlue)" class="ai-dot" style="animation-delay: 0.3s"/>
    <circle cx="-55" cy="-25" r="2.5" fill="url(#purpleBlue)" class="ai-dot" style="animation-delay: 0.5s"/>
    <circle cx="-45" cy="-25" r="2.5" fill="url(#purpleBlue)" class="ai-dot" style="animation-delay: 0.7s"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="260" font-size="36" fill="url(#purpleBlue)" text-anchor="middle" font-weight="700">InboxIQ</text>
  <text x="200" y="285" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="600">AI Support Inbox</text>
</svg>
