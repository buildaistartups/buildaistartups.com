<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions for easy color adaptation -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#235A97;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7FD6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5BB3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Option 1: Square Badge with TS -->
  <g id="square-version">
    <!-- Background square with rounded corners -->
    <rect x="100" y="100" width="600" height="600" rx="80" 
          fill="url(#primaryGrad)" />
    
    <!-- TS Text -->
    <text x="400" y="550" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="380" 
          font-weight="bold" 
          fill="white" 
          text-anchor="middle">TS</text>
  </g>
</svg>
