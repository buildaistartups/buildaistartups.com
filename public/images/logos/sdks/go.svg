<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Go Cyan Gradient (Official) -->
    <linearGradient id="goCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088AA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Purple Alternative -->
    <linearGradient id="goPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7FD6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5BB3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue Alternative -->
    <linearGradient id="goBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="500" cy="500" r="400" fill="url(#goCyan)"/>
  
  <!-- Simplified Geometric Gopher -->
  <!-- Head -->
  <ellipse cx="500" cy="480" rx="180" ry="160" fill="white"/>
  
  <!-- Left Ear -->
  <ellipse cx="360" cy="360" rx="45" ry="70" fill="white" transform="rotate(-25 360 360)"/>
  
  <!-- Right Ear -->
  <ellipse cx="640" cy="360" rx="45" ry="70" fill="white" transform="rotate(25 640 360)"/>
  
  <!-- Left Eye -->
  <circle cx="440" cy="450" r="25" fill="#1A1A1A"/>
  <circle cx="450" cy="440" r="10" fill="white"/>
  
  <!-- Right Eye -->
  <circle cx="560" cy="450" r="25" fill="#1A1A1A"/>
  <circle cx="570" cy="440" r="10" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="500" cy="520" rx="35" ry="25" fill="#1A1A1A"/>
  
  <!-- Mouth -->
  <path d="M 460 540 Q 500 570 540 540" stroke="#1A1A1A" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="500" cy="680" rx="160" ry="140" fill="white"/>
  
  <!-- Left Tooth -->
  <rect x="475" y="545" width="15" height="25" fill="white" rx="3"/>
  
  <!-- Right Tooth -->
  <rect x="510" y="545" width="15" height="25" fill="white" rx="3"/>
</svg>
