<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <g fill="none" stroke="#6E56CF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer gem -->
    <polygon points="30,20 70,20 88,45 50,95 12,45"/>
    <!-- Top facet -->
    <polyline points="30,20 50,45 70,20"/>
    <!-- Mid facet -->
    <line x1="12" y1="45" x2="88" y2="45"/>
    <!-- Lower facets -->
    <line x1="30" y1="20" x2="50" y2="95"/>
    <line x1="70" y1="20" x2="50" y2="95"/>
  </g>
  <title>Minimalist Ruby Gem Outline</title>
  <desc>Simple geometric gem mark in monochrome with transparent background. Uses currentColor for easy recoloring.</desc>
</svg>