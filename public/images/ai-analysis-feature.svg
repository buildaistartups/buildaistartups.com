<svg width="536" height="230" viewBox="0 0 536 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Scattered Data Elements (Left) -->
  <g transform="translate(100, 115)">
    <!-- Row 1 -->
    <circle cx="-60" cy="-60" r="4" fill="#8b5cf6"/>
    <circle cx="-40" cy="-50" r="6" fill="#8b5cf6" opacity="0.7"/>
    <rect x="-25" y="-65" width="12" height="12" fill="#8b5cf6" rx="2"/>
    <rect x="-5" y="-55" width="8" height="8" fill="#8b5cf6" opacity="0.8" rx="1"/>
    <circle cx="15" cy="-45" r="3" fill="#8b5cf6"/>
    
    <!-- Row 2 -->
    <rect x="-65" y="-35" width="10" height="10" fill="#8b5cf6" opacity="0.6" rx="2"/>
    <circle cx="-45" cy="-25" r="5" fill="#8b5cf6"/>
    <rect x="-25" y="-30" width="6" height="6" fill="#8b5cf6" rx="1"/>
    <circle cx="-10" cy="-20" r="4" fill="#8b5cf6" opacity="0.7"/>
    <rect x="5" y="-25" width="8" height="8" fill="#8b5cf6" opacity="0.8"/>
    
    <!-- Row 3 -->
    <circle cx="-50" cy="0" r="3" fill="#8b5cf6"/>
    <rect x="-35" y="-5" width="10" height="10" fill="#8b5cf6" rx="2"/>
    <circle cx="-15" cy="5" r="6" fill="#8b5cf6" opacity="0.6"/>
    <rect x="0" y="0" width="7" height="7" fill="#8b5cf6" rx="1"/>
    <circle cx="20" cy="10" r="4" fill="#8b5cf6"/>
    
    <!-- Row 4 -->
    <rect x="-60" y="25" width="8" height="8" fill="#8b5cf6" opacity="0.7" rx="1"/>
    <circle cx="-40" cy="35" r="5" fill="#8b5cf6"/>
    <rect x="-20" y="30" width="12" height="12" fill="#8b5cf6" rx="2"/>
    <circle cx="0" cy="40" r="3" fill="#8b5cf6" opacity="0.8"/>
    <rect x="15" y="35" width="6" height="6" fill="#8b5cf6" rx="1"/>
    
    <!-- Row 5 -->
    <circle cx="-55" cy="60" r="4" fill="#8b5cf6"/>
    <rect x="-35" y="55" width="9" height="9" fill="#8b5cf6" opacity="0.6" rx="2"/>
    <circle cx="-15" cy="65" r="5" fill="#8b5cf6"/>
    <rect x="5" y="60" width="8" height="8" fill="#8b5cf6" rx="1"/>
    
    <!-- Play button triangle -->
    <path d="M-70 -70 L-55 -62 L-70 -54 Z" fill="#8b5cf6"/>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M170 115 L220 115" stroke="#8b5cf6" stroke-width="4" fill="none" marker-end="url(#arrowhead1)"/>
  
  <!-- AI Processor (Center) -->
  <g transform="translate(268, 115)">
    <rect x="-50" y="-40" width="100" height="80" fill="url(#aiGradient)" rx="20"/>
    
    <!-- AI Text -->
    <text x="0" y="8" font-family="Arial" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">AI</text>
    
    <!-- Neural network pattern -->
    <g stroke="#ffffff" stroke-width="1.5" fill="#ffffff" opacity="0.6">
      <!-- Top row nodes -->
      <circle cx="-25" cy="-25" r="2"/>
      <circle cx="-8" cy="-30" r="2"/>
      <circle cx="8" cy="-30" r="2"/>
      <circle cx="25" cy="-25" r="2"/>
      
      <!-- Bottom row nodes -->
      <circle cx="-25" cy="25" r="2"/>
      <circle cx="-8" cy="30" r="2"/>
      <circle cx="8" cy="30" r="2"/>
      <circle cx="25" cy="25" r="2"/>
      
      <!-- Connection lines -->
      <path d="M-25 -25 L0 0 M-8 -30 L0 0 M8 -30 L0 0 M25 -25 L0 0" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
      <path d="M0 0 L-25 25 M0 0 L-8 30 M0 0 L8 30 M0 0 L25 25" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M320 115 L370 115" stroke="#3b82f6" stroke-width="4" fill="none" marker-end="url(#arrowhead2)"/>
  
  <!-- Reports Output (Right) -->
  <g transform="translate(460, 115)">
    <!-- Back report -->
    <rect x="-25" y="-35" width="70" height="90" fill="#ffffff" stroke="#3b82f6" stroke-width="3" rx="8" opacity="0.9"/>
    
    <!-- Front report -->
    <rect x="-40" y="-50" width="70" height="90" fill="#ffffff" stroke="#3b82f6" stroke-width="3" rx="8"/>
    
    <!-- Report content on front report -->
    <g transform="translate(-35, -40)">
      <!-- Header line -->
      <rect x="5" y="5" width="50" height="4" fill="#3b82f6" rx="2"/>
      
      <!-- Chart line -->
      <polyline points="10,20 20,15 30,25 40,10 50,20 60,5" stroke="#3b82f6" stroke-width="2" fill="none"/>
      
      <!-- Horizontal lines -->
      <rect x="10" y="35" width="45" height="2" fill="#e5e7eb"/>
      <rect x="10" y="40" width="40" height="2" fill="#e5e7eb"/>
      <rect x="10" y="45" width="50" height="2" fill="#e5e7eb"/>
      
      <!-- Pie chart -->
      <circle cx="20" cy="60" r="8" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="15 10"/>
      <path d="M20 52 L20 60 L28 60" stroke="#3b82f6" stroke-width="2"/>
      
      <!-- More horizontal lines -->
      <rect x="35" y="55" width="20" height="2" fill="#e5e7eb"/>
      <rect x="35" y="60" width="25" height="2" fill="#e5e7eb"/>
      <rect x="35" y="65" width="15" height="2" fill="#e5e7eb"/>
      
      <!-- Table grid -->
      <rect x="10" y="75" width="45" height="12" fill="none" stroke="#e5e7eb" stroke-width="1"/>
      <line x1="10" y1="80" x2="55" y2="80" stroke="#e5e7eb"/>
      <line x1="25" y1="75" x2="25" y2="87" stroke="#e5e7eb"/>
      <line x1="40" y1="75" x2="40" y2="87" stroke="#e5e7eb"/>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead1" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead2" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
