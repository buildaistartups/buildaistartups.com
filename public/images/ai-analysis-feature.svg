<svg width="504" height="400" viewBox="0 0 504 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#3b82f6" />
    </linearGradient>
    <linearGradient id="documentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc" />
      <stop offset="100%" style="stop-color:#e2e8f0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="504" height="400" fill="url(#bgGradient)" rx="16"/>
  
  <!-- AI Brain/Analysis Center -->
  <g transform="translate(50, 80)">
    <!-- Central AI node -->
    <circle cx="100" cy="80" r="40" fill="url(#aiGradient)" opacity="0.9"/>
    <circle cx="100" cy="80" r="25" fill="#ffffff" opacity="0.2"/>
    
    <!-- Neural network connections -->
    <path d="M60 60 L100 80 L140 60" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <path d="M60 100 L100 80 L140 100" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <path d="M80 40 L100 80 L120 40" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
    
    <!-- Data input nodes -->
    <circle cx="60" cy="60" r="8" fill="#3b82f6"/>
    <circle cx="60" cy="100" r="8" fill="#3b82f6"/>
    <circle cx="80" cy="40" r="8" fill="#3b82f6"/>
    
    <!-- Analysis output nodes -->
    <circle cx="140" cy="60" r="8" fill="#10b981"/>
    <circle cx="140" cy="100" r="8" fill="#10b981"/>
    <circle cx="120" cy="40" r="8" fill="#10b981"/>
  </g>
  
  <!-- Input Brief -->
  <g transform="translate(20, 200)">
    <rect width="120" height="80" fill="url(#documentGradient)" rx="8" opacity="0.9"/>
    <rect x="10" y="10" width="80" height="4" fill="#64748b" opacity="0.6"/>
    <rect x="10" y="20" width="100" height="4" fill="#64748b" opacity="0.6"/>
    <rect x="10" y="30" width="60" height="4" fill="#64748b" opacity="0.6"/>
    <text x="10" y="50" font-family="Arial" font-size="10" fill="#475569">Brief Input</text>
  </g>
  
  <!-- Market Analysis -->
  <g transform="translate(200, 150)">
    <rect width="100" height="60" fill="#1e293b" rx="6" opacity="0.8"/>
    <circle cx="30" cy="30" r="15" fill="#3b82f6" opacity="0.7"/>
    <rect x="50" y="15" width="40" height="3" fill="#8b5cf6"/>
    <rect x="50" y="25" width="30" height="3" fill="#8b5cf6"/>
    <rect x="50" y="35" width="35" height="3" fill="#8b5cf6"/>
    <text x="10" y="55" font-family="Arial" font-size="8" fill="#94a3b8">Market Data</text>
  </g>
  
  <!-- Competitor Analysis -->
  <g transform="translate(200, 230)">
    <rect width="100" height="60" fill="#1e293b" rx="6" opacity="0.8"/>
    <rect x="10" y="15" width="15" height="20" fill="#ef4444" opacity="0.7"/>
    <rect x="30" y="10" width="15" height="25" fill="#f59e0b" opacity="0.7"/>
    <rect x="50" y="20" width="15" height="15" fill="#10b981" opacity="0.7"/>
    <text x="10" y="55" font-family="Arial" font-size="8" fill="#94a3b8">Competitors</text>
  </g>
  
  <!-- Output PRD -->
  <g transform="translate(350, 180)">
    <rect width="130" height="100" fill="url(#documentGradient)" rx="8" opacity="0.95"/>
    <rect x="15" y="15" width="100" height="6" fill="#1e293b" opacity="0.8"/>
    <rect x="15" y="28" width="80" height="4" fill="#64748b" opacity="0.6"/>
    <rect x="15" y="38" width="90" height="4" fill="#64748b" opacity="0.6"/>
    <rect x="15" y="48" width="70" height="4" fill="#64748b" opacity="0.6"/>
    <rect x="15" y="58" width="85" height="4" fill="#64748b" opacity="0.6"/>
    <rect x="15" y="68" width="75" height="4" fill="#64748b" opacity="0.6"/>
    <text x="15" y="90" font-family="Arial" font-size="10" fill="#1e293b" font-weight="bold">Complete PRD</text>
  </g>
  
  <!-- Connecting arrows -->
  <path d="M140 240 Q180 220 200 200" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
  <path d="M300 215 Q325 200 350 200" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" opacity="0.8"/>
    </marker>
  </defs>
  
  <!-- Floating particles for AI effect -->
  <circle cx="80" cy="50" r="2" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="80" r="2" fill="#3b82f6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="120" r="2" fill="#10b981" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
