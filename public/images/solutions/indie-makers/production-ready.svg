<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" viewBox="0 0 1400 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6F3FF5"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="gradStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#18B6FF"/>
    </linearGradient>
    <style><![CDATA[
      .title { font: 700 48px 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 26px 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .label { font: 600 32px 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0F172A; }
      .meta { font: 600 20px 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .badgeText { font: 700 20px 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0F172A; }
      .small { font: 600 18px 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
      .softStroke { stroke: url(#gradStroke); stroke-width: 2; }
      .iconCircle { fill: url(#gradMain); }
      .checkCircle { fill: url(#gradMain); }
      .checkMark { fill: #fff; }
      .cardLine { stroke: #E2E8F0; stroke-width: 1.2; }
    ]]></style>
  </defs>

  <!-- Header -->
  <g transform="translate(120, 100)">
    <text class="title">Production‑Ready Features</text>
    <text class="subtitle" y="52" dy="28">Everything you need to ship with confidence</text>
  </g>

  <!-- Quality badges (top-right) -->
  <g transform="translate(900, 90)">
    <!-- Badge 1: Quality -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" rx="22" ry="22" width="170" height="44" fill="rgba(255,255,255,0)" class="softStroke"/>
      <!-- Star icon -->
      <g transform="translate(16,10)">
        <polygon points="12,0 15.5,8.5 24,9.2 17.2,14.9 19.6,23.5 12,18.7 4.4,23.5 6.8,14.9 0,9.2 8.5,8.5" fill="url(#gradMain)"/>
      </g>
      <text x="50" y="28" class="badgeText">Quality</text>
    </g>

    <!-- Badge 2: Security -->
    <g transform="translate(190,0)">
      <rect x="0" y="0" rx="22" ry="22" width="180" height="44" fill="rgba(255,255,255,0)" class="softStroke"/>
      <!-- Shield icon -->
      <g transform="translate(16,9)">
        <path d="M14 0 C9 3,6 3,0 4 C0 12,2 18,14 24 C26 18,28 12,28 4 C22 3,19 3,14 0 Z" fill="url(#gradMain)"/>
      </g>
      <text x="50" y="28" class="badgeText">Security</text>
    </g>

    <!-- Badge 3: Uptime -->
    <g transform="translate(390,0)">
      <rect x="0" y="0" rx="22" ry="22" width="170" height="44" fill="rgba(255,255,255,0)" class="softStroke"/>
      <!-- Gauge icon -->
      <g transform="translate(16,9)">
        <path d="M0 20 A14 14 0 1 1 28 20" stroke="url(#gradMain)" stroke-width="4" fill="none"/>
        <line x1="14" y1="20" x2="22" y2="10" stroke="url(#gradMain)" stroke-width="4" stroke-linecap="round"/>
      </g>
      <text x="50" y="28" class="badgeText">Uptime</text>
    </g>
  </g>

  <!-- Checklist items -->
  <g id="list" transform="translate(120, 240)">
    <!-- Row helper lines (subtle) -->
    <line class="cardLine" x1="0" y1="0" x2="1160" y2="0"/>
    <line class="cardLine" x1="0" y1="110" x2="1160" y2="110"/>
    <line class="cardLine" x1="0" y1="220" x2="1160" y2="220"/>
    <line class="cardLine" x1="0" y1="330" x2="1160" y2="330"/>
    <line class="cardLine" x1="0" y1="440" x2="1160" y2="440"/>
    <line class="cardLine" x1="0" y1="550" x2="1160" y2="550"/>

    <!-- Item 1: Tests -->
    <g transform="translate(0, 0)">
      <!-- Icon circle -->
      <circle class="iconCircle" cx="40" cy="55" r="32"/>
      <!-- Flask icon -->
      <g transform="translate(25,32)">
        <path d="M10 0 v12 c0 2 -3 4 -3 8 c0 7 6 13 13 13 c7 0 13 -6 13 -13 c0 -4 -3 -6 -3 -8 V0 h-5 v12 c0 1 2 3 2 6 c0 5 -4 9 -9 9 c-5 0 -9 -4 -9 -9 c0 -3 2 -5 2 -6 V0 z" fill="#FFFFFF"/>
      </g>
      <!-- Label -->
      <text class="label" x="100" y="66">Tests</text>
      <text class="small" x="260" y="66">Unit, integration, coverage</text>
      <!-- Check -->
      <g transform="translate(1080, 55)">
        <circle class="checkCircle" r="24"/>
        <path class="checkMark" d="M-8,2 l6,6 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Item 2: CI -->
    <g transform="translate(0, 110)">
      <circle class="iconCircle" cx="40" cy="55" r="32"/>
      <!-- Pipeline icon: connected nodes -->
      <g transform="translate(12,44)">
        <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
        <circle cx="28" cy="0" r="7" fill="#FFFFFF"/>
        <circle cx="56" cy="0" r="7" fill="#FFFFFF"/>
        <line x1="7" y1="0" x2="21" y2="0" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
        <line x1="35" y1="0" x2="49" y2="0" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
      </g>
      <text class="label" x="100" y="66">CI</text>
      <text class="small" x="260" y="66">Automated builds & checks</text>
      <g transform="translate(1080, 55)">
        <circle class="checkCircle" r="24"/>
        <path class="checkMark" d="M-8,2 l6,6 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Item 3: Analytics -->
    <g transform="translate(0, 220)">
      <circle class="iconCircle" cx="40" cy="55" r="32"/>
      <!-- Bar chart icon -->
      <g transform="translate(18,30)">
        <rect x="0" y="20" width="8" height="24" fill="#FFFFFF" rx="2"/>
        <rect x="14" y="10" width="8" height="34" fill="#FFFFFF" rx="2"/>
        <rect x="28" y="2" width="8" height="42" fill="#FFFFFF" rx="2"/>
      </g>
      <text class="label" x="100" y="66">Analytics</text>
      <text class="small" x="260" y="66">Dashboards & event tracking</text>
      <g transform="translate(1080, 55)">
        <circle class="checkCircle" r="24"/>
        <path class="checkMark" d="M-8,2 l6,6 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Item 4: Docs -->
    <g transform="translate(0, 330)">
      <circle class="iconCircle" cx="40" cy="55" r="32"/>
      <!-- Document icon -->
      <g transform="translate(20,25)">
        <path d="M0 8 a8 8 0 0 1 8 -8 h16 l10 10 v30 a8 8 0 0 1 -8 8 h-18 a8 8 0 0 1 -8 -8 z" fill="#FFFFFF" opacity="0.9"/>
        <polygon points="24,0 34,10 24,10" fill="#E2E8F0"/>
      </g>
      <text class="label" x="100" y="66">Docs</text>
      <text class="small" x="260" y="66">Developer & user guides</text>
      <g transform="translate(1080, 55)">
        <circle class="checkCircle" r="24"/>
        <path class="checkMark" d="M-8,2 l6,6 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Item 5: Pricing -->
    <g transform="translate(0, 440)">
      <circle class="iconCircle" cx="40" cy="55" r="32"/>
      <!-- Tag icon -->
      <g transform="translate(18,30) rotate(-15)">
        <path d="M0 16 a4 4 0 0 1 4 -4 h18 l10 10 l-18 18 l-14 0 a4 4 0 0 1 -4 -4 z" fill="#FFFFFF"/>
        <circle cx="8" cy="14" r="3.5" fill="#E2E8F0"/>
      </g>
      <text class="label" x="100" y="66">Pricing</text>
      <text class="small" x="260" y="66">Plans & billing ready</text>
      <g transform="translate(1080, 55)">
        <circle class="checkCircle" r="24"/>
        <path class="checkMark" d="M-8,2 l6,6 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Item 6: Deploy -->
    <g transform="translate(0, 550)">
      <circle class="iconCircle" cx="40" cy="55" r="32"/>
      <!-- Paper plane / deploy icon -->
      <g transform="translate(16,26)">
        <polygon points="0,40 48,0 20,46 22,28" fill="#FFFFFF"/>
      </g>
      <text class="label" x="100" y="66">Deploy</text>
      <text class="small" x="260" y="66">Blue‑green, canary, rollbacks</text>
      <g transform="translate(1080, 55)">
        <circle class="checkCircle" r="24"/>
        <path class="checkMark" d="M-8,2 l6,6 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Footer meta -->
  <g transform="translate(120, 870)">
    <text class="meta">Status: <tspan fill="url(#gradMain)">All checks passed ✓</tspan></text>
  </g>
</svg>
