<!-- Replace your entire <style> ... </style> block with this -->
<style>
  /* Adaptive text colors + outline */
  :root{
    --txt: #0f172a;      /* light theme primary */
    --txt-sub: #334155;  /* light theme secondary */
    --txt-mini: #475569; /* light theme tertiary */
    --txt-stroke: rgba(255,255,255,.45); /* light: soft white halo */
  }
  @media (prefers-color-scheme: dark){
    :root{
      --txt: #e5e7eb;      /* dark theme primary (slate-200) */
      --txt-sub: #cbd5e1;  /* dark theme secondary (slate-300) */
      --txt-mini: #94a3b8; /* dark theme tertiary (slate-400) */
      --txt-stroke: rgba(0,0,0,.55); /* dark: soft black halo */
    }
  }

  .time {
    font: 700 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    fill: var(--txt);
    paint-order: stroke fill;
    stroke: var(--txt-stroke);
    stroke-width: .8;
  }
  .label {
    font: 600 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    fill: var(--txt-sub);
    paint-order: stroke fill;
    stroke: var(--txt-stroke);
    stroke-width: .8;
  }
  .mini {
    font: 600 11px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    fill: var(--txt-mini);
    paint-order: stroke fill;
    stroke: var(--txt-stroke);
    stroke-width: .8;
  }

  .line { stroke:url(#gradPB); stroke-width:6; stroke-linecap:round; vector-effect:non-scaling-stroke; opacity:.25; }
  .node { fill:url(#nodeFill); stroke:url(#gradPB); stroke-width:3; }
  .icon { fill:none; stroke:url(#gradPB); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; vector-effect:non-scaling-stroke; }
  .arrow { fill:url(#gradPB); }
</style>
