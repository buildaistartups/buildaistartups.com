<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200" role="img" aria-label="Indie maker success journey: Idea on Friday, Build on Saturday, Launch on Sunday, Users celebrating">
  <defs>
    <!-- Gradients -->
    <linearGradient id="pb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="pbv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Reusable arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="url(#pb)"/>
    </marker>

    <style>
      .step-circle { fill:url(#pbv); stroke:url(#pb); stroke-width:2; }
      .icon { fill:none; stroke:url(#pb); stroke-linecap:round; stroke-linejoin:round; stroke-width:2; }
      .label { font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; font-size:16px; fill:#2b2b2b; }
      .small { font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; font-size:13px; fill:#555; }
      .bt { fill:#3b82f6; } /* bottom text color */
      .connector { stroke:url(#pb); stroke-width:3; marker-end:url(#arrow); }
      .spark { fill:url(#pb); }
      .badge { fill:none; stroke:url(#pb); stroke-width:1.5; }
    </style>
  </defs>

  <!-- Subtle progress baseline -->
  <path d="M70,160 C170,130 430,130 530,160" fill="none" stroke="url(#pb)" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>

  <!-- Connectors — centered between circles -->
  <!-- Between 90 and 220 (mid:155) -->
  <line x1="140" y1="90" x2="170" y2="90" class="connector"/>
  <!-- Between 220 and 350 (mid:285) -->
  <line x1="270" y1="90" x2="300" y2="90" class="connector"/>
  <!-- Between 350 and 510 (mid:430) -->
  <line x1="415" y1="90" x2="445" y2="90" class="connector"/>

  <!-- Step 1: IDEA (Friday) -->
  <g transform="translate(90,90)">
    <circle r="34" class="step-circle"/>
    <!-- Light bulb -->
    <path class="icon" d="M-6,-2 a12,12 0 1,1 12,0 c0,4 -3,6 -3,9 h-6 c0,-3 -3,-5 -3,-9z"/>
    <path class="icon" d="M-2,12 h4 M-2,16 h4"/>
    <!-- Sparks -->
    <circle class="spark" cx="-20" cy="-26" r="2.5"/>
    <rect class="spark" x="12" y="-30" width="4" height="4" transform="rotate(20 14 -28)"/>
    <polygon class="spark" points="-28,-4 -24,-2 -28,0" />
  </g>
  <text x="90" y="147" text-anchor="middle" class="label bt">Idea — Fri</text>
  <text x="90" y="164" text-anchor="middle" class="small bt">Problem &amp; spark</text>

  <!-- Step 2: BUILD (Saturday) -->
  <g transform="translate(220,90)">
    <circle r="34" class="step-circle"/>
    <!-- Editor window -->
    <rect x="-16" y="-14" rx="4" ry="4" width="32" height="24" class="badge"/>
    <circle cx="-11" cy="-10" r="1.5" fill="#8b5cf6"/>
    <circle cx="-6"  cy="-10" r="1.5" fill="#a78bfa"/>
    <circle cx="-1"  cy="-10" r="1.5" fill="#3b82f6"/>
    <!-- Code brackets -->
    <path class="icon" d="M-7,-2 l-6,6 l6,6 M7,-2 l6,6 l-6,6"/>
  </g>
  <text x="220" y="147" text-anchor="middle" class="label bt">Build — Sat</text>
  <text x="220" y="164" text-anchor="middle" class="small bt">Ship MVP fast</text>

  <!-- Step 3: LAUNCH (Sunday) -->
  <g transform="translate(350,90)">
    <circle r="34" class="step-circle"/>
    <!-- Rocket -->
    <path class="icon" d="M0,-16 c10,4 14,18 10,26 l-4,1 c-5,-2 -10,-2 -15,0 l-4,-1 c-4,-8 0,-22 10,-26z"/>
    <path class="icon" d="M0,-9 a5,5 0 1,0 0.01,0"/>
    <path class="icon" d="M-3,12 c-4,3 -9,4 -14,2 c4,-5 8,-8 12,-9 M3,12 c4,3 9,4 14,2 c-4,-5 -8,-8 -12,-9"/>
    <!-- Star -->
    <polygon class="spark" points="14,-26 16,-20 22,-20 17,-16 19,-10 14,-13 9,-10 11,-16 6,-20 12,-20"/>
  </g>
  <text x="350" y="147" text-anchor="middle" class="label bt">Launch — Sun</text>
  <text x="350" y="164" text-anchor="middle" class="small bt">Go live &amp; iterate</text>

  <!-- Step 4: USERS CELEBRATE -->
  <g transform="translate(510,90)">
    <circle r="34" class="step-circle"/>
    <!-- Users (3 busts) -->
    <g class="icon">
      <circle cx="-10" cy="-6" r="6"/>
      <circle cx="10"  cy="-6" r="6"/>
      <circle cx="0"   cy="-12" r="7"/>
      <path d="M-20,12 c0,-7 7,-11 14,-11 c7,0 14,4 14,11"/>
      <path d="M-4,14 c0,-6 7,-9 14,-9 c7,0 14,3 14,9"/>
    </g>
    <!-- Trophy -->
    <path class="icon" d="M-2,6 h4 v4 a6,6 0 0,1 -4,6 a6,6 0 0,1 -4,-6 v-4 z M-8,6 h16 M-12,2 h4 a6,6 0 0,0 -6,-6 v4 a2,2 0 0,0 2,2 z M8,2 h4 a2,2 0 0,0 2,-2 v-4 a6,6 0 0,0 -6,6 z"/>
    <!-- Confetti -->
    <rect class="spark" x="26" y="-20" width="3.5" height="7" transform="rotate(25 27.5 -16.5)"/>
    <rect class="spark" x="-32" y="-24" width="3.5" height="7" transform="rotate(-20 -30 -20)"/>
    <polygon class="spark" points="-6,-32 -1,-28 -6,-24"/>
    <circle class="spark" cx="22" cy="-28" r="2.2"/>
  </g>
  <text x="510" y="147" text-anchor="middle" class="label bt">Users Celebrate</text>
  <text x="510" y="164" text-anchor="middle" class="small bt">Ratings, shares &amp; love</text>

  <!-- Feedback bubble near celebration -->
  <g transform="translate(548,38)">
    <path d="M0,0 h36 a8,8 0 0 1 8,8 v16 a8,8 0 0 1 -8,8 h-17 l-7,7 v-7 h-12 a8,8 0 0 1 -8,-8 V8 a8,8 0 0 1 8,-8 z" fill="white" opacity="0.9" stroke="url(#pb)" stroke-width="1.5"/>
    <!-- 5 stars -->
    <g fill="url(#pb)">
      <polygon transform="translate(6,14) scale(0.7)" points="5,0 6.2,3.5 10,3.5 6.8,5.8 8,9.5 5,7.3 2,9.5 3.2,5.8 0,3.5 3.8,3.5"/>
      <polygon transform="translate(14,14) scale(0.7)" points="5,0 6.2,3.5 10,3.5 6.8,5.8 8,9.5 5,7.3 2,9.5 3.2,5.8 0,3.5 3.8,3.5"/>
      <polygon transform="translate(22,14) scale(0.7)" points="5,0 6.2,3.5 10,3.5 6.8,5.8 8,9.5 5,7.3 2,9.5 3.2,5.8 0,3.5 3.8,3.5"/>
      <polygon transform="translate(30,14) scale(0.7)" points="5,0 6.2,3.5 10,3.5 6.8,5.8 8,9.5 5,7.3 2,9.5 3.2,5.8 0,3.5 3.8,3.5"/>
      <polygon transform="translate(38,14) scale(0.7)" points="5,0 6.2,3.5 10,3.5 6.8,5.8 8,9.5 5,7.3 2,9.5 3.2,5.8 0,3.5 3.8,3.5"/>
    </g>
  </g>

  <!-- Top caption -->
  <text x="300" y="26" text-anchor="middle" class="label" style="font-weight:600; fill:url(#pb);">
    Friday ➜ Saturday ➜ Sunday ➜ Celebration
  </text>
</svg>
