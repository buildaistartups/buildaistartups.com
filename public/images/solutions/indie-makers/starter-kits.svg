<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Starter Kit Options: SaaS Kit, API Kit, Content Kit</title>
  <desc id="desc">Three modular building blocks showing SaaS, API, and Content starter kits with icons and feature chips in purple and blue.</desc>

  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <style>
      .card-title{font:600 14px/1.2 Inter,Segoe UI,Roboto,Arial,sans-serif; fill:#0F172A}
      .chip-text{font:600 10px/1 Inter,Segoe UI,Roboto,Arial,sans-serif; fill:#0F172A}
      .muted{fill:#475569}
      .stroke-grad{stroke:url(#purpleBlue); stroke-width:1.5}
      .chip{fill:#ffffff; stroke:url(#bluePurple); stroke-width:1}
      .icon-stroke{stroke:#ffffff; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round}
      .icon-fill{fill:#ffffff}
    </style>
  </defs>

  <!-- Card 1: SaaS Kit -->
  <g transform="translate(20,20)" filter="url(#softShadow)">
    <rect x="72" y="-6" width="36" height="12" rx="6" fill="url(#purpleBlue)"/>
    <rect width="180" height="160" rx="14" fill="#FFFFFF" class="stroke-grad"/>
    <g transform="translate(8,16)">
      <circle cx="16" cy="16" r="16" fill="url(#purpleBlue)"/>
      <g transform="translate(6,6)">
        <rect x="2" y="2" width="20" height="14" rx="2" fill="none" class="icon-stroke"/>
        <line x1="2" y1="6" x2="22" y2="6" class="icon-stroke"/>
        <rect x="4" y="8" width="6" height="6" rx="1" class="icon-stroke" fill="none"/>
        <line x1="12" y1="13" x2="20" y2="10" class="icon-stroke"/>
        <circle cx="12" cy="13" r="0.9" class="icon-fill"/>
        <circle cx="20" cy="10" r="0.9" class="icon-fill"/>
      </g>
      <text x="44" y="12" class="card-title">SaaS Kit</text>
      <!-- Wrapped into two lines to avoid overflow -->
      <text x="44" y="28" class="muted" style="font:500 11px Inter,Segoe UI,Roboto,Arial,sans-serif;">
        <tspan x="44" dy="0">Dashboards • Users</tspan>
        <tspan x="44" dy="14">Subscriptions</tspan>
      </text>
    </g>
    <line x1="8" y1="64" x2="172" y2="64" stroke="url(#purpleBlue)" stroke-opacity="0.25"/>
    <g transform="translate(8,78)">
      <g>
        <rect class="chip" x="0" y="0" rx="10" width="64" height="24"/>
        <text class="chip-text" x="12" y="16">Auth</text>
      </g>
      <g transform="translate(74,0)">
        <rect class="chip" x="0" y="0" rx="10" width="68" height="24"/>
        <text class="chip-text" x="10" y="16">Billing</text>
      </g>
      <g transform="translate(0,34)">
        <rect class="chip" x="0" y="0" rx="10" width="92" height="24"/>
        <text class="chip-text" x="10" y="16">Admin Panel</text>
      </g>
      <g transform="translate(98,34)">
        <rect class="chip" x="0" y="0" rx="10" width="66" height="24"/>
        <text class="chip-text" x="10" y="16">Charts</text>
      </g>
    </g>
  </g>

  <!-- Card 2: API Kit -->
  <g transform="translate(210,20)" filter="url(#softShadow)">
    <rect x="72" y="-6" width="36" height="12" rx="6" fill="url(#purpleBlue)"/>
    <rect width="180" height="160" rx="14" fill="#FFFFFF" class="stroke-grad"/>
    <g transform="translate(8,16)">
      <circle cx="16" cy="16" r="16" fill="url(#purpleBlue)"/>
      <g transform="translate(5.5,5.5)">
        <circle cx="5" cy="5" r="2" class="icon-fill"/>
        <circle cx="17" cy="5" r="2" class="icon-fill"/>
        <circle cx="11" cy="15" r="2" class="icon-fill"/>
        <line x1="5" y1="5" x2="11" y2="15" class="icon-stroke"/>
        <line x1="17" y1="5" x2="11" y2="15" class="icon-stroke"/>
        <rect x="14.5" y="10" width="7.5" height="10" rx="1.5" class="icon-stroke" fill="none"/>
        <line x1="16" y1="13" x2="20.5" y2="13" class="icon-stroke"/>
        <line x1="16" y1="16" x2="20.5" y2="16" class="icon-stroke"/>
      </g>
      <text x="44" y="12" class="card-title">API Kit</text>
      <text x="44" y="28" class="muted" style="font:500 11px Inter,Segoe UI,Roboto,Arial,sans-serif;">Endpoints • Docs • SDKs</text>
    </g>
    <line x1="8" y1="64" x2="172" y2="64" stroke="url(#purpleBlue)" stroke-opacity="0.25"/>
    <g transform="translate(8,78)">
      <g>
        <rect class="chip" x="0" y="0" rx="10" width="58" height="24"/>
        <text class="chip-text" x="10" y="16">REST</text>
      </g>
      <g transform="translate(66,0)">
        <rect class="chip" x="0" y="0" rx="10" width="86" height="24"/>
        <text class="chip-text" x="10" y="16">Webhooks</text>
      </g>
      <g transform="translate(0,34)">
        <rect class="chip" x="0" y="0" rx="10" width="64" height="24"/>
        <text class="chip-text" x="10" y="16">OAuth</text>
      </g>
      <g transform="translate(70,34)">
        <rect class="chip" x="0" y="0" rx="10" width="94" height="24"/>
        <text class="chip-text" x="10" y="16">Type-Safe SDK</text>
      </g>
    </g>
  </g>

  <!-- Card 3: Content Kit -->
  <g transform="translate(400,20)" filter="url(#softShadow)">
    <rect x="72" y="-6" width="36" height="12" rx="6" fill="url(#purpleBlue)"/>
    <rect width="180" height="160" rx="14" fill="#FFFFFF" class="stroke-grad"/>
    <g transform="translate(8,16)">
      <circle cx="16" cy="16" r="16" fill="url(#purpleBlue)"/>
      <g transform="translate(6,6)">
        <rect x="2" y="2" width="20" height="16" rx="2" class="icon-stroke" fill="none"/>
        <rect x="4.5" y="5" width="7" height="5" rx="1" class="icon-stroke" fill="none"/>
        <line x1="13.5" y1="6" x2="20" y2="6" class="icon-stroke"/>
        <line x1="13.5" y1="9" x2="20" y2="9" class="icon-stroke"/>
        <line x1="4.5" y1="13" x2="20" y2="13" class="icon-stroke"/>
        <line x1="4.5" y1="16" x2="18" y2="16" class="icon-stroke"/>
      </g>
      <text x="44" y="12" class="card-title">Content Kit</text>
      <text x="44" y="28" class="muted" style="font:500 11px Inter,Segoe UI,Roboto,Arial,sans-serif;">Blog • CMS • Pages</text>
    </g>
    <line x1="8" y1="64" x2="172" y2="64" stroke="url(#purpleBlue)" stroke-opacity="0.25"/>
    <g transform="translate(8,78)">
      <g>
        <rect class="chip" x="0" y="0" rx="10" width="86" height="24"/>
        <text class="chip-text" x="10" y="16">Markdown</text>
      </g>
      <g transform="translate(94,0)">
        <rect class="chip" x="0" y="0" rx="10" width="58" height="24"/>
        <text class="chip-text" x="10" y="16">SEO</text>
      </g>
      <g transform="translate(0,34)">
        <rect class="chip" x="0" y="0" rx="10" width="104" height="24"/>
        <text class="chip-text" x="10" y="16">Image Pipeline</text>
      </g>
      <g transform="translate(112,34)">
        <rect class="chip" x="0" y="0" rx="10" width="52" height="24"/>
        <text class="chip-text" x="10" y="16">RSS</text>
      </g>
    </g>
  </g>
</svg>
