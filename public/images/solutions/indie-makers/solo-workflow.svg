<svg width="400" height="192" viewBox="0 0 400 192" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Solo Developer Workflow — Idea → Spec → Code → Deploy → Users</title>
  <desc id="desc">Radial diagram: a solo developer in the center with five stages on a dotted oval ring (clockwise). Rays start outside the center icons to avoid overlap. Purple/blue accents, transparent background.</desc>

  <defs>
    <!-- Brand gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- New pill background gradient -->
    <linearGradient id="chipBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <!-- soft violet to soft blue so it reads well on light & dark -->
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>

    <filter id="softShadow" x="-25%" y="-40%" width="150%" height="180%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.4" flood-opacity="0.22"/>
    </filter>

    <marker id="arrowOut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6"/>
    </marker>

    <style>
      /* All text now blue */
      .label { font: 700 10.5px/1.1 Inter, Arial, sans-serif; fill: #3B82F6; }
      .tiny  { font: 600 7px/1 Inter, Arial, sans-serif; fill: #3B82F6; } /* smaller to avoid overlap */

      .iconS { stroke: url(#purpleBlue); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ring  { stroke: url(#purpleBlue); stroke-width: 1.2; fill: none; stroke-dasharray: 2 6; stroke-linecap: round; opacity: 0.6; }
      .ray   { stroke: url(#purpleBlue); stroke-width: 1.6; fill: none; }

      /* Pills now use a gradient background */
      .chipRect { fill: url(#chipBg); stroke: url(#bluePurple); stroke-width: 1.1; }
    </style>
  </defs>

  <!-- Full dotted oval ring -->
  <ellipse class="ring" cx="200" cy="96" rx="130" ry="68"/>

  <!-- CENTER: Solo developer -->
  <g transform="translate(200,96)">
    <ellipse rx="34" ry="34" fill="none" stroke="url(#purpleBlue)" stroke-opacity="0.45" stroke-width="3"/>
    <ellipse rx="46" ry="46" fill="none" stroke="url(#bluePurple)" stroke-opacity="0.22" stroke-width="5" stroke-dasharray="3 6"/>

    <!-- Person + laptop -->
    <g aria-label="Solo developer">
      <circle cx="0" cy="-12" r="8.2" fill="url(#purpleBlue)"/>
      <path d="M-16,10 q16,-12 32,0 v6 q-16,8 -32,0 z" fill="url(#bluePurple)"/>
      <rect x="-10" y="4" width="20" height="8" rx="1.8" fill="#FFFFFF" fill-opacity="0.95" stroke="url(#purpleBlue)" stroke-width="1"/>
      <rect x="-12" y="12" width="24" height="2.8" rx="1.4" fill="url(#purpleBlue)"/>
    </g>

    <!-- Efficiency badges -->
    <g transform="translate(-28,-2)" aria-label="Automation">
      <circle r="9.2" fill="#FFFFFF" fill-opacity="0.97" stroke="url(#purpleBlue)" stroke-width="1"/>
      <path class="iconS" d="M-3,0 a3,3 0 1 0 6,0 a3,3 0 1 0 -6,0
                             M0,-6 v2 M0,4 v2 M-6,0 h2 M4,0 h2
                             M-4.2,-4.2 l1.4,1.4 M2.8,2.8 l1.4,1.4
                             M-4.2,4.2 l1.4,-1.4 M2.8,-2.8 l1.4,-1.4"/>
    </g>
    <g transform="translate(28,-2)" aria-label="Speed">
      <circle r="9.2" fill="#FFFFFF" fill-opacity="0.97" stroke="url(#purpleBlue)" stroke-width="1"/>
      <path class="iconS" d="M-5,3 a7,7 0 0 1 10,0 M0,0 L4,-3"/>
    </g>
    <g transform="translate(0,-30)" aria-label="Success metrics">
      <rect x="-9" y="-9" width="18" height="18" rx="3" fill="#FFFFFF" fill-opacity="0.97" stroke="url(#purpleBlue)" stroke-width="1"/>
      <path class="iconS" d="M-6,4 H6 M-6,4 V-2 H-2 V4 M-2,4 V-5 H2 V4 M2,4 V-7 H6 V4"/>
    </g>

    <text class="tiny" text-anchor="middle" y="58">SOLO • EFFICIENT • INDEPENDENT</text>
  </g>

  <!-- Rays -->
  <path class="ray" d="M200,50 L200,34" marker-end="url(#arrowOut)"/>
  <path class="ray" d="M249.46,79.93 L280,75.8" marker-end="url(#arrowOut)"/>
  <path class="ray" d="M230.57,138.87 L276.4,151" marker-end="url(#arrowOut)"/>
  <path class="ray" d="M169.43,138.87 L123.6,151" marker-end="url(#arrowOut)"/>
  <path class="ray" d="M150.54,79.93 L120,75.8" marker-end="url(#arrowOut)"/>

  <!-- STAGE CHIPS -->
  <!-- IDEA -->
  <g transform="translate(152,2)" filter="url(#softShadow)">
    <rect class="chipRect" width="96" height="28" rx="14"/>
    <g transform="translate(16,14)" aria-label="Idea icon">
      <path class="iconS" d="M0,-6 a6,6 0 1 1 0,12 M-2,6 h4 M-1,8 h2"/>
    </g>
    <text class="label" x="44" y="18">Idea</text>
  </g>

  <!-- SPEC -->
  <g transform="translate(287.01,57.29)" filter="url(#softShadow)">
    <rect class="chipRect" width="96" height="28" rx="14"/>
    <g transform="translate(16,14)" aria-label="Spec icon">
      <path class="iconS" d="M-6,-8 h6 l4,4 v10 h-10 z M0,-8 v4 h4"/>
      <path class="iconS" d="M-3,-1 h6 M-3,3 h6"/>
    </g>
    <text class="label" x="44" y="18">Spec</text>
  </g>

  <!-- CODE -->
  <g transform="translate(235.45,156.71)" filter="url(#softShadow)">
    <rect class="chipRect" width="96" height="28" rx="14"/>
    <g transform="translate(16,14)" aria-label="Code icon">
      <path class="iconS" d="M-2,-5 l-5,5 l5,5 M2,-5 l5,5 l-5,5"/>
    </g>
    <text class="label" x="44" y="18">Code</text>
  </g>

  <!-- DEPLOY -->
  <g transform="translate(68.55,156.71)" filter="url(#softShadow)">
    <rect class="chipRect" width="96" height="28" rx="14"/>
    <g transform="translate(16,14)" aria-label="Deploy icon">
      <path class="iconS" d="M-3,4 c2,-6 6,-9 10,-10 c-1,4 -4,8 -7,10 z M-5,6 l2,-2 M4,2 l2,2"/>
    </g>
    <text class="label" x="44" y="18">Deploy</text>
  </g>

  <!-- USERS -->
  <g transform="translate(16.99,57.29)" filter="url(#softShadow)">
    <rect class="chipRect" width="96" height="28" rx="14"/>
    <g transform="translate(16,14)" aria-label="Users icon">
      <circle cx="-2" cy="-2" r="3" fill="url(#purpleBlue)"/>
      <path d="M-8,6 q6,-4 12,0" fill="none" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="6" cy="-1" r="2.5" fill="url(#bluePurple)" opacity="0.95"/>
      <path d="M1,6 q5,-3.2 10,0" fill="none" stroke="url(#bluePurple)" stroke-width="2" stroke-linecap="round" opacity="0.95"/>
    </g>
    <text class="label" x="44" y="18">Users</text>
  </g>
</svg>
