<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face { font-family: Inter; src: local('Inter'); }
      svg { font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans'; }
      .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .muted { font-size: 12px; fill: #6b7280; }
      .label { font-size: 12px; fill: #111827; font-weight: 600; }
      .chip-text { font-size: 12px; fill: #0f172a; }
      .kpi { font-size: 14px; font-weight: 700; fill: #0f172a; }
      .small { font-size: 11px; fill: #6b7280; }
      .btn-text { font-size: 13px; font-weight: 700; fill: #ffffff; letter-spacing: .2px; }
    </style>

    <!-- Indigo → Blue gradients -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="badgeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Soft drop shadow for cards -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>

    <!-- Axis hairlines -->
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#e5e7eb" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- ===== Card 1: Analytics Tool ===== -->
  <g transform="translate(80,120)">
    <rect width="456" height="660" rx="24" fill="#ffffff" filter="url(#shadow)"/>

    <!-- Header -->
    <g transform="translate(24,24)">
      <!-- Icon -->
      <circle cx="20" cy="20" r="16" fill="none" stroke="url(#gradH)" stroke-width="3"/>
      <path d="M10 28 L14 22 L18 26 L24 16 L30 22" fill="none" stroke="url(#gradH)" stroke-width="2.5" stroke-linecap="round"/>
      <text class="title" x="56" y="18">Analytics Tool</text>
      <text class="muted" x="56" y="38">Track growth and product health</text>

      <!-- Success badge -->
      <g transform="translate(320,4)">
        <rect width="96" height="28" rx="14" fill="url(#badgeFill)" stroke="url(#gradH)"/>
        <path d="M14 14 l4 4 l8 -10" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <text x="38" y="19" class="chip-text">Live</text>
      </g>
    </g>

    <!-- KPI row -->
    <g transform="translate(24,88)">
      <rect width="128" height="64" rx="14" fill="#f8fafc"/>
      <text class="small" x="16" y="24">Active users</text>
      <text class="kpi" x="16" y="48">12,480</text>

      <g transform="translate(152,0)">
        <rect width="128" height="64" rx="14" fill="#f8fafc"/>
        <text class="small" x="16" y="24">Conversion</text>
        <text class="kpi" x="16" y="48">4.7%</text>
      </g>

      <g transform="translate(304,0)">
        <rect width="128" height="64" rx="14" fill="#f8fafc"/>
        <text class="small" x="16" y="24">MRR</text>
        <text class="kpi" x="16" y="48">€7.2k</text>
      </g>
    </g>

    <!-- Chart area -->
    <g transform="translate(24,172)">
      <rect width="408" height="240" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
      <rect x="1" y="1" width="406" height="238" rx="15" fill="url(#grid)" opacity="0.6"/>
      <!-- Line -->
      <path d="M16 200 C 48 160, 72 176, 104 140 S 160 96, 200 124 S 256 164, 304 112 S 360 92, 392 80"
            fill="none" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
      <!-- Spark bars -->
      <g transform="translate(16,208)">
        <rect x="0" y="0" width="16" height="16" fill="#e5e7eb"/>
        <rect x="24" y="-6" width="16" height="22" fill="#dbeafe"/>
        <rect x="48" y="-12" width="16" height="28" fill="#bfdbfe"/>
        <rect x="72" y="-4" width="16" height="20" fill="#a5b4fc"/>
      </g>
    </g>

    <!-- Category chips -->
    <g transform="translate(24,432)">
      <g>
        <rect x="0" y="0" width="86" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">SaaS</text>
      </g>
      <g transform="translate(98,0)">
        <rect x="0" y="0" width="108" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">Analytics</text>
      </g>
      <g transform="translate(214,0)">
        <rect x="0" y="0" width="120" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">Dashboard</text>
      </g>
    </g>
  </g>

  <!-- ===== Card 2: Form Builder ===== -->
  <g transform="translate(576,120)">
    <rect width="456" height="660" rx="24" fill="#ffffff" filter="url(#shadow)"/>

    <!-- Header -->
    <g transform="translate(24,24)">
      <!-- Icon: sliders -->
      <rect x="4" y="8" width="32" height="24" rx="6" fill="none" stroke="url(#gradH)" stroke-width="2"/>
      <circle cx="24" cy="20" r="5" fill="#3b82f6"/>
      <text class="title" x="56" y="18">Form Builder</text>
      <text class="muted" x="56" y="38">Drag &amp; drop fields, publish fast</text>

      <!-- Success badge -->
      <g transform="translate(300,4)">
        <rect width="128" height="28" rx="14" fill="url(#badgeFill)" stroke="url(#gradH)"/>
        <path d="M14 14 l4 4 l8 -10" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <text x="38" y="19" class="chip-text">Published</text>
      </g>
    </g>

    <!-- Builder canvas -->
    <g transform="translate(24,96)">
      <!-- Left palette -->
      <rect width="176" height="360" rx="16" fill="#f8fafc"/>
      <g transform="translate(12,12)">
        <rect x="0" y="0" width="152" height="36" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
        <text class="label" x="12" y="23">Text input</text>
        <rect x="0" y="48" width="152" height="36" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
        <text class="label" x="12" y="71">Email</text>
        <rect x="0" y="96" width="152" height="36" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
        <text class="label" x="12" y="119">Dropdown</text>
        <rect x="0" y="144" width="152" height="36" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
        <text class="label" x="12" y="167">Checkbox</text>
      </g>

      <!-- Right preview -->
      <g transform="translate(200,0)">
        <rect width="232" height="360" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
        <text class="small" x="16" y="28">Preview</text>
        <rect x="16" y="48" width="200" height="36" rx="10" fill="#f8fafc"/>
        <rect x="16" y="96" width="200" height="36" rx="10" fill="#f8fafc"/>
        <rect x="16" y="144" width="200" height="36" rx="10" fill="#f8fafc"/>
        <rect x="16" y="192" width="200" height="88" rx="10" fill="#f8fafc"/>
        <!-- Submit -->
        <g transform="translate(16,300)">
          <rect width="120" height="36" rx="10" fill="url(#gradH)"/>
          <text class="btn-text" x="20" y="24">Publish form</text>
        </g>
      </g>
    </g>

    <!-- Category chips -->
    <g transform="translate(24,472)">
      <g>
        <rect x="0" y="0" width="92" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">No‑code</text>
      </g>
      <g transform="translate(100,0)">
        <rect x="0" y="0" width="82" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">Forms</text>
      </g>
      <g transform="translate(190,0)">
        <rect x="0" y="0" width="94" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">Builder</text>
      </g>
    </g>
  </g>

  <!-- ===== Card 3: Docs Generator ===== -->
  <g transform="translate(1072,120)">
    <rect width="456" height="660" rx="24" fill="#ffffff" filter="url(#shadow)"/>

    <!-- Header -->
    <g transform="translate(24,24)">
      <!-- Icon: document spark -->
      <rect x="2" y="4" width="32" height="28" rx="6" fill="none" stroke="url(#gradH)" stroke-width="2"/>
      <path d="M10 10 h10 v8 h8 v10 h-18 z" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="30" cy="8" r="3" fill="#3b82f6"/>
      <text class="title" x="56" y="18">Docs Generator</text>
      <text class="muted" x="56" y="38">Turn specs into polished docs</text>

      <!-- Success badge -->
      <g transform="translate(300,4)">
        <rect width="128" height="28" rx="14" fill="url(#badgeFill)" stroke="url(#gradH)"/>
        <path d="M14 14 l4 4 l8 -10" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <text x="38" y="19" class="chip-text">Generated</text>
      </g>
    </g>

    <!-- Doc canvas -->
    <g transform="translate(24,96)">
      <rect width="408" height="360" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
      <rect x="24" y="28" width="180" height="10" rx="5" fill="url(#gradH)"/>
      <rect x="24" y="56" width="288" height="8" rx="4" fill="#e5e7eb"/>
      <rect x="24" y="76" width="248" height="8" rx="4" fill="#eef2ff"/>
      <rect x="24" y="96" width="304" height="8" rx="4" fill="#e5e7eb"/>
      <rect x="24" y="116" width="220" height="8" rx="4" fill="#eef2ff"/>
      <!-- Code block-ish -->
      <rect x="24" y="148" width="360" height="100" rx="10" fill="#f8fafc" stroke="#e5e7eb"/>
      <rect x="36" y="164" width="200" height="6" rx="3" fill="#dbeafe"/>
      <rect x="36" y="180" width="260" height="6" rx="3" fill="#bfdbfe"/>
      <rect x="36" y="196" width="220" height="6" rx="3" fill="#a5b4fc"/>
      <!-- CTA -->
      <g transform="translate(24,268)">
        <rect width="144" height="36" rx="10" fill="url(#gradH)"/>
        <text class="btn-text" x="18" y="24">Generate docs</text>
      </g>
    </g>

    <!-- Category chips -->
    <g transform="translate(24,472)">
      <g>
        <rect x="0" y="0" width="52" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">AI</text>
      </g>
      <g transform="translate(60,0)">
        <rect x="0" y="0" width="84" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">Docs</text>
      </g>
      <g transform="translate(148,0)">
        <rect x="0" y="0" width="102" height="28" rx="14" fill="none" stroke="url(#gradH)"/>
        <text class="chip-text" x="16" y="19">Generator</text>
      </g>
    </g>
  </g>

  <!-- Footer caption (optional; remove if not needed) -->
  <g transform="translate(80,820)">
    <text class="muted">Indie project showcase • Vector, purple &amp; blue palette • Transparent background</text>
  </g>
</svg>
