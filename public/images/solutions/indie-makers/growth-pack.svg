<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Growth Toolkit — SEO, Email, Social, Analytics</title>
  <desc id="desc">Four growth tools with arrows from pill labels downward toward a central growth icon without touching it; paths avoid overlapping any pill. Purple/blue styling, transparent background.</desc>

  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="pillFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EEF2FF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#EDE9FE" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="url(#bluePurple)"/>
    </marker>
    <style>
      .card { fill: url(#cardFill); stroke: url(#purpleBlue); stroke-width: 1.5; rx: 12; }
      .icon { fill: none; stroke: url(#purpleBlue); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .connector { fill: none; stroke: url(#bluePurple); stroke-width: 2; }
      .up { fill: none; stroke: url(#purpleBlue); stroke-width: 2.5; stroke-linecap: round; }
      .pill { fill: url(#pillFill); stroke: url(#bluePurple); stroke-width: 1; }
      .label { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; font-size: 11px; fill: #0F172A; }
      .small { font-size: 10px; }
    </style>
  </defs>

  <!-- Shift content up 12px to clear caption -->
  <g transform="translate(0,-12)">
    <!-- SEO Pages -->
    <g transform="translate(24,24)" filter="url(#shadow)">
      <rect class="card" x="0" y="0" width="120" height="64" rx="12"/>
      <g class="icon" transform="translate(12,14)">
        <rect x="0" y="0" width="72" height="40" rx="6"/>
        <circle cx="8" cy="6" r="2"/><circle cx="16" cy="6" r="2"/><circle cx="24" cy="6" r="2"/>
        <line x1="10" y1="16" x2="62" y2="16"/><line x1="10" y1="24" x2="48" y2="24"/><line x1="10" y1="32" x2="38" y2="32"/>
      </g>
      <g class="icon" transform="translate(90,40)"><circle cx="0" cy="0" r="8"/><line x1="6" y1="6" x2="14" y2="14"/></g>
      <g id="pill-seo" transform="translate(6,70)">
        <rect class="pill" x="0" y="0" rx="10" width="108" height="22"/>
        <text class="label" x="54" y="15" text-anchor="middle">SEO Pages</text>
      </g>
    </g>

    <!-- Email Sequences -->
    <g transform="translate(164,24)" filter="url(#shadow)">
      <rect class="card" x="0" y="0" width="120" height="64" rx="12"/>
      <g class="icon" transform="translate(12,16)"><rect x="0" y="0" width="64" height="36" rx="6"/><polyline points="0,6 32,24 64,6"/></g>
      <g class="icon" transform="translate(86,20)">
        <circle cx="0" cy="0" r="4"/><line x1="4" y1="0" x2="14" y2="0"/>
        <circle cx="20" cy="0" r="4"/><line x1="20" y1="4" x2="20" y2="14"/>
        <circle cx="20" cy="20" r="4"/>
      </g>
      <g id="pill-email" transform="translate(6,70)">
        <rect class="pill" x="0" y="0" rx="10" width="108" height="22"/>
        <text class="label" x="54" y="15" text-anchor="middle">Email Sequences</text>
      </g>
    </g>

    <!-- Social Posts -->
    <g transform="translate(304,24)" filter="url(#shadow)">
      <rect class="card" x="0" y="0" width="120" height="64" rx="12"/>
      <g class="icon" transform="translate(12,16)">
        <path d="M6 0h56a6 6 0 0 1 6 6v22a6 6 0 0 1-6 6H24l-10 10v-10H6a6 6 0 0 1-6-6V6a6 6 0 0 1 6-6z"/>
        <circle cx="24" cy="17" r="2.2"/><circle cx="34" cy="17" r="2.2"/><circle cx="44" cy="17" r="2.2"/>
      </g>
      <g class="icon" transform="translate(92,18)"><path d="M6 0v14M0 4h12M8 4h12M14 0v14"/></g>
      <g class="icon" transform="translate(96,46)"><path d="M8 2c-1.7-1.7-4.5-1.7-6.2 0-1.8 1.8-1.8 4.7 0 6.5L8 14l6.2-5.5c1.8-1.8 1.8-4.7 0-6.5-1.7-1.7-4.5-1.7-6.2 0z"/></g>
      <g id="pill-social" transform="translate(6,70)">
        <rect class="pill" x="0" y="0" rx="10" width="108" height="22"/>
        <text class="label" x="54" y="15" text-anchor="middle">Social Posts</text>
      </g>
    </g>

    <!-- Analytics Charts -->
    <g transform="translate(444,24)" filter="url(#shadow)">
      <rect class="card" x="0" y="0" width="120" height="64" rx="12"/>
      <g class="icon" transform="translate(12,12)">
        <rect x="0" y="28" width="10" height="16" rx="2"/>
        <rect x="16" y="20" width="10" height="24" rx="2"/>
        <rect x="32" y="8" width="10" height="36" rx="2"/>
        <rect x="48" y="18" width="10" height="26" rx="2"/>
        <polyline points="0,34 12,26 24,30 36,18 58,10"/><circle cx="58" cy="10" r="2.5"/>
      </g>
      <g id="pill-analytics" transform="translate(6,70)">
        <rect class="pill" x="0" y="0" rx="10" width="108" height="22"/>
        <text class="label" x="54" y="15" text-anchor="middle">Analytics Charts</text>
      </g>
    </g>

    <!-- Central Growth Engine -->
    <g transform="translate(300,144)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="url(#bluePurple)" stroke-width="2.5"/>
      <g filter="url(#glow)"><polyline class="up" points="-16,12 -4,2 6,6 18,-10"/><polyline class="up" points="18,-10 10,-10 18,-10 18,-2"/></g>
      <g class="icon"><path d="M-14,-20 l3,0 m-1.5,-1.5 l0,3"/><path d="M16,-22 l3,0 m-1.5,-1.5 l0,3"/></g>
      <g transform="translate(-34,32)"><rect class="pill" x="0" y="0" rx="10" width="68" height="22"/><text class="label" x="34" y="15" text-anchor="middle">Growth</text></g>
      <g transform="translate(30,18)" class="icon"><circle cx="10" cy="-10" r="6"/><path d="M2,2 a12,12 0 0 1 16,0"/><circle cx="22" cy="-10" r="7" fill="none"/><line x1="22" y1="-14" x2="22" y2="-6"/><line x1="18" y1="-10" x2="26" y2="-10"/></g>
    </g>

    <!-- Arrows from pill bottoms -->
    <!-- SEO arrow (endpoint 2px lower) -->
    <path class="connector" marker-end="url(#arrow)"
          d="M84,116 C120,140 180,156 230,164 S252,172 266,174"/>

    <!-- Email (closer & higher toward ring) -->
    <path class="connector" marker-end="url(#arrow)"
          d="M224,116 C238,126 252,134 272,136"/>

    <!-- Social (closer & higher toward ring) -->
    <path class="connector" marker-end="url(#arrow)"
          d="M364,116 C356,126 344,134 328,136"/>

    <!-- Analytics arrow (endpoint 2px lower) -->
    <path class="connector" marker-end="url(#arrow)"
          d="M504,116 C468,140 420,156 370,164 S348,172 334,174"/>
  </g>

  <text class="label small" x="300" y="196" text-anchor="middle" fill="#334155">Interconnected growth elements driving user acquisition</text>
</svg>
