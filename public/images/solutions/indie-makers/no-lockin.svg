<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Your Accounts — Ownership &amp; Control</title>
  <desc id="desc">Central YOU OWN badge connected to GitHub, Vercel, Stripe, and Database accounts. Purple/blue theme, unlock symbols, ownership indicators, and freedom arrows. Transparent background.</desc>

  <defs>
    <!-- Core gradients -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Icon backgrounds: light, high-contrast for blue text -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F0FF"/>
      <stop offset="100%" stop-color="#E6F0FF"/>
    </linearGradient>

    <!-- Small chip backgrounds (lock/key) -->
    <linearGradient id="chipBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>

    <!-- Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>

    <!-- Styles -->
    <style>
      .label { font-family: Arial, Helvetica, "Helvetica Neue", sans-serif; font-size: 13px; fill: #3B82F6; }
      .mini  { font-family: Arial, Helvetica, "Helvetica Neue", sans-serif; font-size: 11px; fill: #3B82F6; }
      .cap   { stroke: url(#purpleBlue); stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- CONNECTIONS (behind center) -->
  <path d="M300,100 C260,85 200,75 140,60" class="cap" marker-end="url(#arrow)"/>
  <path d="M300,100 C260,115 200,125 140,140" class="cap" marker-end="url(#arrow)"/>
  <path d="M300,100 C340,85 400,75 460,60" class="cap" marker-end="url(#arrow)"/>
  <path d="M300,100 C340,115 400,125 460,140" class="cap" marker-end="url(#arrow)"/>

  <!-- FREEDOM ARROWS (behind center) -->
  <path d="M300,100 C330,60 370,50 400,45" fill="none" stroke="url(#bluePurple)" stroke-width="2" stroke-dasharray="3 6" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M300,100 C270,140 230,150 200,155" fill="none" stroke="url(#bluePurple)" stroke-width="2" stroke-dasharray="3 6" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- CENTRAL BADGE -->
  <g id="center" transform="translate(300,100)">
    <!-- Halo -->
    <circle r="54" fill="none" stroke="url(#bluePurple)" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
    <!-- Badge -->
    <g filter="url(#softShadow)">
      <circle r="42" fill="url(#purpleBlue)"/>
      <circle r="42" fill="none" stroke="white" stroke-opacity="0.25"/>
    </g>

    <!-- Ownership icon: shield + check -->
    <g transform="translate(0,-6)">
      <path d="M-14 -6 l14 -6 l14 6 v10 c0 9 -6 15 -14 18 c-8 -3 -14 -9 -14 -18 z" fill="white" opacity="0.95"/>
      <path d="M-0 12 l-6 -6 a1 1 0 0 1 1.4 -1.4 l4.6 4.6 l8.6 -8.6 a1 1 0 0 1 1.4 1.4 l-10 10 a1 1 0 0 1 -1.4 0z" fill="url(#purpleBlue)"/>
    </g>

    <!-- Text (Arial, white) -->
    <text x="0" y="25" text-anchor="middle" font-weight="700" font-size="12" fill="white" letter-spacing="0.6" style="font-family: Arial, Helvetica, 'Helvetica Neue', sans-serif;">YOU OWN</text>

    <!-- Unlock & Key chips with colored backgrounds -->
    <!-- Open lock (left) -->
    <g transform="translate(-68,0)">
      <rect x="-16" y="-10" width="32" height="20" rx="8" fill="url(#chipBg)" filter="url(#softShadow)"/>
      <g>
        <path d="M-10 0 h20 v12 h-20 z" fill="none" stroke="url(#purpleBlue)" stroke-width="2" />
        <path d="M0 4 a2 2 0 1 1 0 0.01" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
        <path d="M-6 0 v-6 a6 6 0 0 1 12 0 v2" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
      </g>
    </g>

    <!-- Key (right) -->
    <g transform="translate(68,0)">
      <rect x="-16" y="-10" width="32" height="20" rx="8" fill="url(#chipBg)" filter="url(#softShadow)"/>
      <g>
        <circle cx="-6" cy="0" r="5" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
        <path d="M-1 0 h14 m-4 -3 v6 m-7 -3 h3" fill="none" stroke="url(#purpleBlue)" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- NODES (colored icon backgrounds) -->
  <!-- GitHub (top-left) -->
  <g id="github" transform="translate(120,60)">
    <circle r="22" fill="url(#iconBg)" stroke="url(#purpleBlue)" stroke-width="2"/>
    <text class="label" x="0" y="4" text-anchor="middle" font-weight="700">GH</text>
    <text class="mini" x="0" y="38" text-anchor="middle">GitHub</text>
  </g>

  <!-- Database (bottom-left) -->
  <g id="database" transform="translate(120,140)">
    <ellipse cx="0" cy="-14" rx="22" ry="8" fill="url(#iconBg)" stroke="url(#purpleBlue)" stroke-width="2"/>
    <rect x="-22" y="-14" width="44" height="28" fill="url(#iconBg)" stroke="url(#purpleBlue)" stroke-width="2"/>
    <ellipse cx="0" cy="14" rx="22" ry="8" fill="url(#iconBg)" stroke="url(#purpleBlue)" stroke-width="2"/>
    <text class="label" x="0" y="40" text-anchor="middle">Database</text>
  </g>

  <!-- Vercel (top-right) -->
  <g id="vercel" transform="translate(480,60)">
    <circle r="22" fill="url(#iconBg)" stroke="url(#purpleBlue)" stroke-width="2"/>
    <path d="M -10 6 L 0 -12 L 10 6 Z" fill="url(#purpleBlue)"/>
    <text class="mini" x="0" y="38" text-anchor="middle">Vercel</text>
  </g>

  <!-- Stripe (bottom-right) -->
  <g id="stripe" transform="translate(480,140)">
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="url(#iconBg)" stroke="url(#purpleBlue)" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-weight="800" font-size="18" fill="#3B82F6">S</text>
    <text class="mini" x="0" y="40" text-anchor="middle">Stripe</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(300,180)">
    <circle cx="-70" cy="0" r="4" fill="url(#purpleBlue)"/>
    <text class="mini" x="-60" y="4">Ownership</text>
    <circle cx="20" cy="0" r="4" fill="url(#bluePurple)"/>
    <text class="mini" x="30" y="4">Freedom</text>
  </g>
</svg>
