    <rect x="0" y="15" width="140" height="100" rx="8" fill="url(#lightBlue)" opacity="0.9"/>
    <path d="M 0,15 L 0,25 Q 0,30 5,30 L 45,30 L 55,15 Z" fill="#3B82F6"/>
    <rect x="15" y="35" width="110" height="8" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="15" y="50" width="80" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="60" width="95" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="105" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <text x="70" y="93" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">ADDITIONAL</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">ASSETS</text>
    <!-- Checkmark -->
    <circle cx="120" cy="25" r="12" fill="#10B981"/>
    <path d="M 115,25 L 118,28 L 125,21" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Connection Lines -->
  <line x1="400" y1="155" x2="190" y2="235" stroke="url(#purpleGradient)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="400" y1="155" x2="400" y2="235" stroke="url(#blueGradient)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="400" y1="155" x2="610" y2="235" stroke="url(#purpleGradient)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="400" y1="155" x2="190" y2="395" stroke="url(#blueGradient)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="400" y1="155" x2="400" y2="395" stroke="url(#purpleGradient)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="400" y1="155" x2="610" y2="395" stroke="url(#blueGradient)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Bottom Status Bar -->
  <rect x="200" y="530" width="400" height="45" rx="22.5" fill="url(#purpleGradient)" opacity="0.15"/>
  <text x="400" y="548" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#6366F1" text-anchor="middle">✓ ALL DOCUMENTATION READY</text>
  <text x="400" y="565" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6" text-anchor="middle">Exit Preparation Complete</text>
</svg>
