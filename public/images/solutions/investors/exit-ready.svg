<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle Accents -->
  <circle cx="100" cy="100" r="80" fill="#8B5CF6" opacity="0.1"/>
  <circle cx="700" cy="500" r="100" fill="#3B82F6" opacity="0.1"/>
  <circle cx="650" cy="80" r="60" fill="#6366F1" opacity="0.08"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#purpleGradient)" text-anchor="middle">EXIT-READY DOCUMENTATION</text>
  
  <!-- Central Organization Symbol -->
  <g transform="translate(400, 120)">
    <circle cx="0" cy="0" r="35" fill="url(#purpleGradient)" opacity="0.2"/>
    <path d="M -15,-15 L 15,-15 L 15,0 L 0,0 L 0,15 L -15,15 Z" fill="url(#purpleGradient)"/>
    <circle cx="0" cy="0" r="6" fill="#fff"/>
    <circle cx="-15" cy="-15" r="4" fill="#fff"/>
    <circle cx="15" cy="-15" r="4" fill="#fff"/>
    <circle cx="0" cy="15" r="4" fill="#fff"/>
  </g>
  
  <!-- Top Row Folders -->
  
  <!-- PRD Folder (Left) -->
  <g transform="translate(120, 220)">
    <rect x="0" y="15" width="140" height="100" rx="8" fill="url(#lightPurple)" opacity="0.9"/>
    <path d="M 0,15 L 0,25 Q 0,30 5,30 L 45,30 L 55,15 Z" fill="url(#purpleGradient)"/>
    <rect x="15" y="35" width="110" height="8" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="15" y="50" width="90" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="60" width="100" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="80" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <text x="70" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">PRD</text>
    <!-- Checkmark -->
    <circle cx="120" cy="25" r="12" fill="#10B981"/>
    <path d="M 115,25 L 118,28 L 125,21" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Architecture Docs (Center Top) -->
  <g transform="translate(330, 220)">
    <rect x="0" y="15" width="140" height="100" rx="8" fill="url(#lightBlue)" opacity="0.9"/>
    <path d="M 0,15 L 0,25 Q 0,30 5,30 L 45,30 L 55,15 Z" fill="url(#blueGradient)"/>
    <rect x="15" y="35" width="110" height="8" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="15" y="50" width="95" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="60" width="100" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="85" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <text x="70" y="93" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">ARCHITECTURE</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">DOCS</text>
    <!-- Checkmark -->
    <circle cx="120" cy="25" r="12" fill="#10B981"/>
    <path d="M 115,25 L 118,28 L 125,21" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Licenses (Right) -->
  <g transform="translate(540, 220)">
    <rect x="0" y="15" width="140" height="100" rx="8" fill="url(#purpleGradient)" opacity="0.9"/>
    <path d="M 0,15 L 0,25 Q 0,30 5,30 L 45,30 L 55,15 Z" fill="#6366F1"/>
    <rect x="15" y="35" width="110" height="8" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="15" y="50" width="80" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="60" width="90" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="100" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <!-- Shield icon for licenses -->
    <path d="M 70,82 L 62,85 Q 62,92 62,95 Q 62,100 70,103 Q 78,100 78,95 Q 78,92 78,85 Z" fill="#fff" opacity="0.9"/>
    <text x="70" y="112" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">LICENSES</text>
    <!-- Checkmark -->
    <circle cx="120" cy="25" r="12" fill="#10B981"/>
    <path d="M 115,25 L 118,28 L 125,21" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom Row Folders -->
  
  <!-- Handover Checklist (Left) -->
  <g transform="translate(120, 380)">
    <rect x="0" y="15" width="140" height="100" rx="8" fill="url(#blueGradient)" opacity="0.9"/>
    <path d="M 0,15 L 0,25 Q 0,30 5,30 L 45,30 L 55,15 Z" fill="#2563EB"/>
    <rect x="15" y="35" width="110" height="8" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="15" y="50" width="90" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="60" width="100" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="85" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <text x="70" y="93" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">HANDOVER</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">CHECKLIST</text>
    <!-- Checkmark -->
    <circle cx="120" cy="25" r="12" fill="#10B981"/>
    <path d="M 115,25 L 118,28 L 125,21" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Due Diligence (Center Bottom) -->
  <g transform="translate(330, 380)">
    <rect x="0" y="15" width="140" height="100" rx="8" fill="url(#purpleGradient)" opacity="0.9"/>
    <path d="M 0,15 L 0,25 Q 0,30 5,30 L 45,30 L 55,15 Z" fill="#7C3AED"/>
    <rect x="15" y="35" width="110" height="8" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="15" y="50" width="95" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="60" width="100" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="90" height="5" rx="2" fill="#fff" opacity="0.6"/>
    <text x="70" y="93" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">DUE DILIGENCE</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">MATERIALS</text>
