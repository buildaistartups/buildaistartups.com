        <rect x="440" y="380" width="150" height="80" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
        <text x="515" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100">
          Thesis Alignment
        </text>
        <text x="515" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF9800">
          77%
        </text>
        <text x="515" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FF9800">
          Portfolio Avg
        </text>
      </g>
      
      <!-- Risk Score -->
