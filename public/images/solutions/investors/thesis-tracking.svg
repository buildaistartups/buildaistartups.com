        <rect x="65" y="280" width="24" height="6" rx="3" fill="#4CAF50"/>
        <text x="100" y="285" font-family="Arial, sans-serif" font-size="8" fill="#4CAF50">80%</text>
        
        <!-- Startup 2 -->
        <rect x="160" y="240" width="80" height="50" rx="4" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1"/>
        <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A237E">
