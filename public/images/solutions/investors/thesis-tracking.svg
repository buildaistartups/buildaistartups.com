<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#6366F1" text-anchor="middle">Investment Thesis Tracking</text>
  
  <!-- Thesis Category 1: AI Infrastructure -->
  <g transform="translate(80, 80)">
    <!-- Category Card -->
    <rect x="0" y="0" width="200" height="140" rx="12" fill="url(#purpleGrad)" opacity="0.15" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#F3E8FF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="40" rx="12" fill="url(#purpleGrad)"/>
    <text x="100" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">AI Infrastructure</text>
    
    <!-- Startups -->
    <circle cx="40" cy="75" r="18" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#6B21A8" text-anchor="middle">A1</text>
    
    <circle cx="100" cy="75" r="18" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="2"/>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#6B21A8" text-anchor="middle">A2</text>
    
    <circle cx="160" cy="75" r="18" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="2"/>
    <text x="160" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#6B21A8" text-anchor="middle">A3</text>
    
    <!-- Validation Metrics -->
    <rect x="10" y="105" width="180" height="25" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="10" y="105" width="144" height="25" rx="4" fill="#10B981" opacity="0.2"/>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="11" fill="#059669" font-weight="600">Alignment: 80%</text>
    <circle cx="170" cy="117.5" r="6" fill="#10B981"/>
    <path d="M 168 117.5 L 170 119.5 L 174 115.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Thesis Category 2: Fintech -->
  <g transform="translate(310, 80)">
    <!-- Category Card -->
    <rect x="0" y="0" width="200" height="140" rx="12" fill="url(#blueGrad)" opacity="0.15" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#DBEAFE" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="40" rx="12" fill="url(#blueGrad)"/>
    <text x="100" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Fintech</text>
    
    <!-- Startups -->
    <circle cx="40" cy="75" r="18" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1E40AF" text-anchor="middle">F1</text>
    
    <circle cx="100" cy="75" r="18" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1E40AF" text-anchor="middle">F2</text>
    
    <circle cx="160" cy="75" r="18" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
    <text x="160" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1E40AF" text-anchor="middle">F3</text>
    
    <!-- Validation Metrics -->
    <rect x="10" y="105" width="180" height="25" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="10" y="105" width="162" height="25" rx="4" fill="#10B981" opacity="0.2"/>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="11" fill="#059669" font-weight="600">Alignment: 90%</text>
    <circle cx="170" cy="117.5" r="6" fill="#10B981"/>
    <path d="M 168 117.5 L 170 119.5 L 174 115.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Thesis Category 3: Healthcare Tech -->
  <g transform="translate(540, 80)">
    <!-- Category Card -->
    <rect x="0" y="0" width="200" height="140" rx="12" fill="url(#purpleGrad)" opacity="0.15" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#EDE9FE" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="40" rx="12" fill="url(#purpleGrad)"/>
    <text x="100" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Healthcare Tech</text>
    
    <!-- Startups -->
    <circle cx="40" cy="75" r="18" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#6B21A8" text-anchor="middle">H1</text>
    
    <circle cx="100" cy="75" r="18" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="2"/>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#6B21A8" text-anchor="middle">H2</text>
    
    <circle cx="160" cy="75" r="18" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="2"/>
    <text x="160" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#6B21A8" text-anchor="middle">H3</text>
    
    <!-- Validation Metrics -->
    <rect x="10" y="105" width="180" height="25" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="10" y="105" width="126" height="25" rx="4" fill="#F59E0B" opacity="0.2"/>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="11" fill="#D97706" font-weight="600">Alignment: 70%</text>
    <circle cx="170" cy="117.5" r="6" fill="#F59E0B"/>
    <text x="170" y="121" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">!</text>
  </g>
  
  <!-- Performance Validation Section -->
  <g transform="translate(80, 260)">
    <rect x="0" y="0" width="640" height="50" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Performance Validation</text>
    <text x="20" y="38" font-family="Arial, sans-serif" font-size="11" fill="#6366F1">Real-time metrics tracking thesis execution and portfolio alignment</text>
  </g>
  
  <!-- Validation Metrics Cards -->
  <g transform="translate(80, 330)">
    <!-- Revenue Growth -->
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="1" filter="url(#shadow)"/>
    <circle cx="30" cy="30" r="16" fill="#8B5CF6" opacity="0.15"/>
    <path d="M 24 30 L 28 34 L 36 26" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="55" y="28" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">Revenue</text>
    <text x="55" y="42" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6">Growth</text>
    <text x="20" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#8B5CF6">156%</text>
    <text x="20" y="88" font-family="Arial, sans-serif" font-size="10" fill="#10B981">↑ 23% MoM</text>
  </g>
  
  <g transform="translate(250, 330)">
    <!-- Market Fit -->
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1" filter="url(#shadow)"/>
    <circle cx="30" cy="30" r="16" fill="#3B82F6" opacity="0.15"/>
    <circle cx="30" cy="30" r="10" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
    <circle cx="30" cy="30" r="4" fill="#3B82F6"/>
    <text x="55" y="28" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">Market</text>
    <text x="55" y="42" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">Fit Score</text>
    <text x="20" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#3B82F6">8.7</text>
    <text x="20" y="88" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6">/10 rating</text>
  </g>
  
  <g transform="translate(420, 330)">
    <!-- Customer Retention -->
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#ECFDF5" stroke="#D1FAE5" stroke-width="1" filter="url(#shadow)"/>
    <circle cx="30" cy="30" r="16" fill="#10B981" opacity="0.15"/>
    <path d="M 22 30 C 22 26 26 22 30 22 C 34 22 38 26 38 30 C 38 34 34 38 30 38 C 28 38 26 37 25 36" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 36 28 L 38 30 L 36 32" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="55" y="28" font-family="Arial, sans-serif" font-size="11" fill="#10B981">Customer</text>
    <text x="55" y="42" font-family="Arial, sans-serif" font-size="11" fill="#10B981">Retention</text>
    <text x="20" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10B981">94%</text>
    <text x="20" y="88" font-family="Arial, sans-serif" font-size="10" fill="#10B981">↑ 5% YoY</text>
  </g>
  
  <g transform="translate(590, 330)">
    <!-- Thesis Validation -->
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1" filter="url(#shadow)"/>
    <circle cx="30" cy="30" r="16" fill="#6366F1" opacity="0.15"/>
    <rect x="24" y="24" width="12" height="12" rx="2" fill="none" stroke="#6366F1" stroke-width="2.5"/>
    <path d="M 27 30 L 29 32 L 33 28" stroke="#6366F1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="55" y="28" font-family="Arial, sans-serif" font-size="11" fill="#6366F1">Thesis</text>
    <text x="55" y="42" font-family="Arial, sans-serif" font-size="11" fill="#6366F1">Valid</text>
    <text x="20" y="72" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6366F1">11/12</text>
    <text x="20" y="88" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">portfolios</text>
  </g>
  
  <!-- Alignment Indicators Legend -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="640" height="100" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Thesis Alignment Indicators</text>
    
    <!-- Strong Alignment -->
    <circle cx="35" cy="52" r="8" fill="#10B981"/>
    <path d="M 32 52 L 34 54 L 38 50" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="50" y="57" font-family="Arial, sans-serif" font-size="11" fill="#059669">Strong (80%+) - Thesis validated, strong market traction</text>
    
    <!-- Moderate Alignment -->
    <circle cx="365" cy="52" r="8" fill="#F59E0B"/>
    <text x="365" y="56" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">!</text>
    <text x="380" y="50" font-family="Arial, sans-serif" font-size="11" fill="#D97706">Moderate (60-79%)</text>
    <text x="380" y="63" font-family="Arial, sans-serif" font-size="11" fill="#D97706">Partial validation, monitoring required</text>
    
    <!-- Weak Alignment -->
    <circle cx="35" cy="82" r="8" fill="#EF4444"/>
    <path d="M 35 78 L 35 82" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="35" cy="85" r="1" fill="white"/>
    <text x="50" y="87" font-family="Arial, sans-serif" font-size="11" fill="#DC2626">Weak (&lt;60%) - Thesis reassessment needed</text>
    
    <!-- Under Review -->
    <circle cx="365" cy="82" r="8" fill="#6B7280"/>
    <text x="365" y="86" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">?</text>
    <text x="380" y="87" font-family="Arial, sans-serif" font-size="11" fill="#6366F1">Under Review - Insufficient data for validation</text>
  </g>
</svg>
