      <!-- Timeline items -->
      <circle cx="100" cy="510" r="4" fill="#4CAF50"/>
      <text x="115" y="515" font-family="Arial, sans-serif" font-size="11" fill="#2E7D32">Q1: Initial thesis validation</text>
      
      <circle cx="300" cy="510" r="4" fill="#FF9800"/>
      <text x="315" y="515" font-family="Arial, sans-serif" font-size="11" fill="#F57C00">Q2: Market traction analysis</text>
      
      <circle cx="500" cy="510" r="4" fill="#3F51B5"/>
      <text x="515" y="515" font-family="Arial, sans-serif" font-size="11" fill="#1976D2">Q3: Performance review</text>
      
      <circle cx="650" cy="510" r="4" fill="#9C27B0"/>
      <text x="665" y="515" font-family="Arial, sans-serif" font-size="11" fill="#7B1FA2">Q4: Strategy refinement</text>
      
