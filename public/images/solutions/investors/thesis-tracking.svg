        <rect x="620" y="380" width="150" height="80" rx="6" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
        <text x="695" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C62828">
