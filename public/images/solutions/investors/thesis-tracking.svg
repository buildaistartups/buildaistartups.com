    <text x="215" y="580" font-family="Arial, sans-serif" font-size="10" fill="#4CAF50">High (80%+)</text>
    <circle cx="300" cy="575" r="6" fill="#FF9800"/>
    <text x="315" y="580" font-family="Arial, sans-serif" font-size="10" fill="#FF9800">Medium (60-80%)</text>
    <circle cx="420" cy="575" r="6" fill="#F44336"/>
    <text x="435" y="580" font-family="Arial, sans-serif" font-size="10" fill="#F44336">Low (<60%)</text>
  </g>
</svg>
