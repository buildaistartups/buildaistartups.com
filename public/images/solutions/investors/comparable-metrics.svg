    <linearGradient id="revenueBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E8FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:0.9" />
