<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <linearGradient id="gradPB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#2D9CDB"/>
    </linearGradient>
    <linearGradient id="gradBP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D9CDB"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 44px 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #2B2B2B; }
      .subtitle { font: 600 24px 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #444; }
      .label { font: 600 20px 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #2B2B2B; }
      .small { font: 500 16px 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #555; }
      .metric { font: 800 40px 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: url(#gradPB); }
      .panel { fill: none; stroke: url(#gradBP); stroke-width: 2.5; rx: 28; }
      .chip { fill: white; stroke: url(#gradPB); stroke-width: 2; rx: 14; filter: url(#softShadow);}
      .step { fill: white; stroke: #E6E6F8; stroke-width: 2; rx: 18; filter: url(#softShadow);}
      .connector { stroke: url(#gradPB); stroke-width: 4; fill: none; stroke-dasharray: 8 12; }
      .iconStroke { stroke: url(#gradPB); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconFill { fill: url(#gradPB); }
      .badge { fill: white; stroke: url(#gradPB); stroke-width: 3; rx: 90; filter: url(#softShadow);}
    </style>

    <!-- Arrow marker for connectors -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="iconFill"/>
    </marker>
  </defs>

  <!-- Header -->
  <g>
    <text x="900" y="90" text-anchor="middle" class="title">Accelerated Due Diligence</text>
    <text x="900" y="130" text-anchor="middle" class="subtitle">Traditional months-long process vs. streamlined days-long process with pre‑organized documentation</text>
  </g>

  <!-- Left panel: Traditional -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="760" height="780" class="panel"/>
    <g transform="translate(30,30)">
      <!-- Title chip with icon -->
      <rect x="0" y="0" width="350" height="56" class="chip"/>
      <g transform="translate(18,14)">
        <!-- Calendar icon -->
        <rect x="0" y="2" width="24" height="18" class="iconStroke" rx="2"/>
        <line x1="0" y1="8" x2="24" y2="8" class="iconStroke"/>
        <line x1="6" y1="2" x2="6" y2="0" class="iconStroke"/>
        <line x1="18" y1="2" x2="18" y2="0" class="iconStroke"/>
      </g>
      <text x="54" y="36" class="label">Traditional Due Diligence (Months)</text>
    </g>

    <!-- Timeline -->
    <g transform="translate(70,140)">
      <path d="M 0 0 H 620" class="connector" marker-end="url(#arrow)"/>
      <!-- Month ticks -->
      <g class="small" fill="#666">
        <line x1="0" y1="-10" x2="0" y2="10" stroke="#C9C9F5" stroke-width="2"/>
        <text x="0" y="-20" text-anchor="middle">0</text>
        <line x1="200" y1="-10" x2="200" y2="10" stroke="#C9C9F5" stroke-width="2"/>
        <text x="200" y="-20" text-anchor="middle">1 mo</text>
        <line x1="400" y1="-10" x2="400" y2="10" stroke="#C9C9F5" stroke-width="2"/>
        <text x="400" y="-20" text-anchor="middle">2 mo</text>
        <line x1="600" y1="-10" x2="600" y2="10" stroke="#C9C9F5" stroke-width="2"/>
        <text x="600" y="-20" text-anchor="middle">3 mo</text>
      </g>

      <!-- Steps -->
      <g transform="translate(-10,60)">
        <rect x="0" y="0" width="300" height="90" class="step"/>
        <text x="20" y="36" class="label">Sourcing & Requests</text>
        <text x="20" y="64" class="small">Manual document gathering & email chains</text>
        <!-- magnifier icon -->
        <g transform="translate(256,22)">
          <circle cx="18" cy="18" r="14" class="iconStroke"/>
          <line x1="28" y1="28" x2="40" y2="40" class="iconStroke"/>
        </g>

        <rect x="160" y="130" width="320" height="90" class="step"/>
        <text x="180" y="166" class="label">Version Chasing</text>
        <text x="180" y="194" class="small">Conflicting files & outdated attachments</text>
        <!-- hourglass icon -->
        <g transform="translate(428,152)">
          <path d="M0 0 H40 M0 60 H40 M10 10 C10 28 30 28 30 10 M10 50 C10 32 30 32 30 50" class="iconStroke"/>
        </g>

        <rect x="320" y="260" width="300" height="90" class="step"/>
        <text x="340" y="296" class="label">Q&amp;A Delays</text>
        <text x="340" y="324" class="small">Unstructured questions, back‑and‑forth</text>
        <!-- chat bubbles icon -->
        <g transform="translate(566,282)">
          <rect x="0" y="0" width="26" height="18" rx="4" class="iconStroke"/>
          <path d="M10 18 l-6 6" class="iconStroke"/>
          <rect x="14" y="24" width="26" height="18" rx="4" class="iconStroke"/>
          <path d="M26 42 l-6 6" class="iconStroke"/>
        </g>

        <rect x="200" y="390" width="340" height="90" class="step"/>
        <text x="220" y="426" class="label">Compliance Review</text>
        <text x="220" y="454" class="small">Manual checks & scattered evidence</text>
        <!-- shield icon -->
        <g transform="translate(500,412)">
          <path d="M20 0 L40 8 V24 C40 36 30 46 20 50 C10 46 0 36 0 24 V8 Z" class="iconStroke"/>
          <path d="M8 18 L20 30 L32 12" class="iconStroke"/>
        </g>

        <rect x="360" y="520" width="260" height="90" class="step"/>
        <text x="380" y="556" class="label">Final Findings</text>
        <text x="380" y="584" class="small">Late-stage issues discovered</text>
        <!-- alert icon -->
        <g transform="translate(586,542)">
          <path d="M20 0 L40 36 H0 Z" class="iconStroke"/>
          <circle cx="20" cy="26" r="2.5" class="iconFill"/>
          <line x1="20" y1="10" x2="20" y2="20" class="iconStroke"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Right panel: Streamlined -->
  <g transform="translate(960,180)">
    <rect x="0" y="0" width="760" height="780" class="panel"/>
    <g transform="translate(30,30)">
      <rect x="0" y="0" width="520" height="56" class="chip"/>
      <g transform="translate(18,14)">
        <!-- Rocket icon -->
        <path d="M6 26 C14 10 26 4 36 2 C34 12 28 24 12 32 L6 26 Z" class="iconStroke"/>
        <path d="M12 32 L10 40 L18 38 Z" class="iconStroke"/>
      </g>
      <text x="54" y="36" class="label">Streamlined with Pre‑Organized Documentation (Days)</text>
    </g>

    <!-- Fast timeline -->
    <g transform="translate(70,140)">
      <path d="M 0 0 H 620" class="connector" marker-end="url(#arrow)"/>
      <!-- Day ticks -->
      <g class="small" fill="#666">
        <line x1="0" y1="-10" x2="0" y2="10" stroke="#C9E8FF" stroke-width="2"/>
        <text x="0" y="-20" text-anchor="middle">0</text>
        <line x1="200" y1="-10" x2="200" y2="10" stroke="#C9E8FF" stroke-width="2"/>
        <text x="200" y="-20" text-anchor="middle">2 days</text>
        <line x1="450" y1="-10" x2="450" y2="10" stroke="#C9E8FF" stroke-width="2"/>
        <text x="450" y="-20" text-anchor="middle">5 days</text>
      </g>

      <!-- Steps -->
      <g transform="translate(-10,60)">
        <rect x="0" y="0" width="300" height="90" class="step"/>
        <text x="20" y="36" class="label">Data Room Ready</text>
        <text x="20" y="64" class="small">Pre‑indexed contracts & policies</text>
        <!-- folder + check icon -->
        <g transform="translate(244,20)">
          <rect x="0" y="10" width="44" height="28" rx="4" class="iconStroke"/>
          <path d="M0 14 L12 14 L16 10 H28 L44 10" class="iconStroke"/>
          <path d="M8 34 L16 42 L36 22" class="iconStroke"/>
        </g>

        <rect x="160" y="130" width="320" height="90" class="step"/>
        <text x="180" y="166" class="label">Automated Checks</text>
        <text x="180" y="194" class="small">Compliance rules & completeness scans</text>
        <!-- gear + lightning icon -->
        <g transform="translate(424,148)">
          <circle cx="20" cy="20" r="14" class="iconStroke"/>
          <path d="M20 8 L20 0 M20 40 L20 32 M8 20 L0 20 M40 20 L32 20 M11 11 L5 5 M29 29 L35 35 M29 11 L35 5 M11 29 L5 35" class="iconStroke"/>
          <path d="M48 8 L40 22 L50 22 L42 36" class="iconStroke"/>
        </g>

        <rect x="320" y="260" width="300" height="90" class="step"/>
        <text x="340" y="296" class="label">Targeted Q&amp;A</text>
        <text x="340" y="324" class="small">Gaps flagged automatically</text>
        <!-- funnel icon -->
        <g transform="translate(564,280)">
          <path d="M0 0 H40 L24 20 V34 L16 30 V20 Z" class="iconStroke"/>
        </g>

        <rect x="260" y="390" width="260" height="90" class="step"/>
        <text x="280" y="426" class="label">Rapid Findings</text>
        <text x="280" y="454" class="small">Issue‑focused summary</text>
        <!-- clipboard check icon -->
        <g transform="translate(490,410)">
          <rect x="0" y="0" width="36" height="44" rx="4" class="iconStroke"/>
          <path d="M10 10 L26 10" class="iconStroke"/>
          <path d="M8 20 L18 30 L30 16" class="iconStroke"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Center badge: Time Saved -->
  <g transform="translate(900, 960)">
    <rect x="-220" y="-120" width="440" height="120" class="badge"/>
    <!-- speedometer icon -->
    <g transform="translate(-190,-88)">
      <circle cx="50" cy="50" r="36" class="iconStroke"/>
      <path d="M14 50 A36 36 0 0 1 86 50" class="iconStroke"/>
      <line x1="50" y1="50" x2="76" y2="34" class="iconStroke"/>
      <circle cx="50" cy="50" r="3" class="iconFill"/>
    </g>
    <text x="-110" y="-48" class="subtitle" fill="#333">Time Saved</text>
    <text x="-110" y="-10" class="metric">Months ➜ Days</text>
    <g transform="translate(130, -76)">
      <!-- bolt -->
      <path d="M12 0 L0 28 H14 L8 56 L32 20 H18 L24 0 Z" class="iconStroke"/>
    </g>
  </g>

  <!-- Footer note -->
  <g>
    <text x="900" y="1060" text-anchor="middle" class="small" fill="#666">Professional due diligence optimization · Vector SVG · Transparent background</text>
  </g>
</svg>
