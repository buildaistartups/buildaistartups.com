<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 192" width="320" height="192">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left Side: Live Demo -->
  <g id="live-demo-side">
    <!-- Background highlight -->
    <rect x="10" y="30" width="140" height="140" rx="8" fill="#8B5CF6" opacity="0.1"/>
    
    <!-- Main demo window -->
    <rect x="20" y="45" width="120" height="85" rx="6" fill="url(#purpleGrad)" opacity="0.9"/>
    
    <!-- Window header -->
    <rect x="20" y="45" width="120" height="18" rx="6" fill="#6366F1"/>
    <circle cx="28" cy="54" r="2.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="36" cy="54" r="2.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="44" cy="54" r="2.5" fill="#ffffff" opacity="0.7"/>
    
    <!-- Interactive elements -->
    <rect x="30" y="72" width="35" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="30" y="80" width="50" height="3" rx="1.5" fill="#ffffff" opacity="0.6"/>
    <rect x="30" y="86" width="40" height="3" rx="1.5" fill="#ffffff" opacity="0.6"/>
    
    <!-- Chart representation -->
    <rect x="90" y="75" width="6" height="20" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="100" y="82" width="6" height="13" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="110" y="78" width="6" height="17" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="120" y="70" width="6" height="25" rx="2" fill="#ffffff" opacity="0.7"/>
    
    <!-- Play button (large) -->
    <circle cx="80" cy="105" r="18" fill="#ffffff" opacity="0.95"/>
    <polygon points="75,98 75,112 90,105" fill="#8B5CF6"/>
    
    <!-- Live indicator badge -->
    <rect x="95" y="48" width="38" height="12" rx="6" fill="#EF4444"/>
    <circle cx="101" cy="54" r="2.5" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="107" y="56" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff">LIVE</text>
    
    <!-- Cursor icon -->
    <path d="M 32 102 L 32 118 L 38 112 L 42 120 L 45 119 L 41 111 L 48 110 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Secondary demo preview -->
    <rect x="25" y="140" width="45" height="22" rx="4" fill="#6366F1" opacity="0.8"/>
    <circle cx="37" cy="151" r="6" fill="#ffffff" opacity="0.3"/>
    <polygon points="35,148 35,154 40,151" fill="#ffffff" opacity="0.8"/>
    <rect x="46" y="145" width="18" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="46" y="149" width="15" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
    <rect x="46" y="153" width="20" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
    
    <rect x="77" y="140" width="45" height="22" rx="4" fill="#6366F1" opacity="0.8"/>
    <circle cx="89" cy="151" r="6" fill="#ffffff" opacity="0.3"/>
    <polygon points="87,148 87,154 92,151" fill="#ffffff" opacity="0.8"/>
    <rect x="98" y="145" width="18" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="98" y="149" width="15" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
    <rect x="98" y="153" width="20" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
    
    <!-- Label -->
    <text x="80" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Live Demos</text>
  </g>
  
  <!-- Divider -->
  <line x1="160" y1="20" x2="160" y2="172" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  
  <!-- Right Side: Static Pitch Deck -->
  <g id="pitch-deck-side">
    <!-- Background -->
    <rect x="170" y="30" width="140" height="140" rx="8" fill="#64748B" opacity="0.08"/>
    
    <!-- PDF Document stack -->
    <rect x="185" y="52" width="110" height="90" rx="4" fill="#ffffff" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="183" y="50" width="110" height="90" rx="4" fill="#ffffff" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="181" y="48" width="110" height="90" rx="4" fill="#ffffff" stroke="#94A3B8" stroke-width="2.5"/>
    
    <!-- PDF content (static) -->
    <!-- Title bar -->
    <rect x="190" y="56" width="70" height="6" rx="2" fill="#94A3B8" opacity="0.5"/>
    
    <!-- Text lines - MOVED DOWN 5px -->
    <rect x="190" y="73" width="85" height="3" rx="1.5" fill="#CBD5E1"/>
    <rect x="190" y="79" width="75" height="3" rx="1.5" fill="#CBD5E1"/>
    <rect x="190" y="85" width="80" height="3" rx="1.5" fill="#CBD5E1"/>
    <rect x="190" y="91" width="70" height="3" rx="1.5" fill="#CBD5E1"/>
    
    <!-- Chart placeholder (static) -->
    <rect x="192" y="96" width="75" height="35" rx="3" fill="#E2E8F0"/>
    <rect x="197" y="115" width="8" height="12" rx="1" fill="#94A3B8" opacity="0.6"/>
    <rect x="208" y="110" width="8" height="17" rx="1" fill="#94A3B8" opacity="0.6"/>
    <rect x="219" y="107" width="8" height="20" rx="1" fill="#94A3B8" opacity="0.6"/>
    <rect x="230" y="112" width="8" height="15" rx="1" fill="#94A3B8" opacity="0.6"/>
    <rect x="241" y="105" width="8" height="22" rx="1" fill="#94A3B8" opacity="0.6"/>
    <rect x="252" y="118" width="8" height="9" rx="1" fill="#94A3B8" opacity="0.6"/>
    
    <!-- PDF icon -->
    <text x="268" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#DC2626">PDF</text>
    
    <!-- Page numbers at bottom -->
    <rect x="220" y="145" width="40" height="10" rx="2" fill="#F1F5F9"/>
    <text x="240" y="152" font-family="Arial, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">1 / 23</text>
    
    <!-- Static indicator - MOVED UP 5px -->
    <rect x="245" y="51" width="38" height="10" rx="5" fill="#64748B" opacity="0.3"/>
    <text x="264" y="58" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#475569" text-anchor="middle">STATIC</text>
    
    <!-- Label -->
    <text x="240" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748B" text-anchor="middle">Pitch Decks</text>
  </g>
  
  <!-- Bottom labels -->
  <text x="80" y="184" font-family="Arial, sans-serif" font-size="8" fill="#8B5CF6" text-anchor="middle" font-weight="600">Interactive</text>
  <text x="240" y="184" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle" font-weight="600">Static PDF</text>
</svg>
