<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <!-- Definitions -->
  <defs>
    <!-- Purple to Blue Gradient -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="#f8fafc" opacity="0"/>
  
  <!-- Header Section -->
  <g id="header">
    <!-- Title -->
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e293b">
      Deal Flow Dashboard
    </text>
    
    <!-- Filter Pills -->
    <g id="filters">
      <rect x="40" y="65" width="90" height="32" rx="16" fill="url(#purpleBlue)" filter="url(#glow)"/>
      <text x="85" y="86" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">All Deals</text>
      
      <rect x="140" y="65" width="95" height="32" rx="16" fill="#e2e8f0"/>
      <text x="187.5" y="86" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#64748b" text-anchor="middle">In Review</text>
      
      <rect x="245" y="65" width="100" height="32" rx="16" fill="#e2e8f0"/>
      <text x="295" y="86" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#64748b" text-anchor="middle">Due Diligence</text>
      
      <rect x="355" y="65" width="85" height="32" rx="16" fill="#e2e8f0"/>
      <text x="397.5" y="86" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#64748b" text-anchor="middle">Portfolio</text>
    </g>
    
    <!-- Stats Overview -->
    <g id="stats">
      <g>
        <text x="850" y="50" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="500">ACTIVE DEALS</text>
        <text x="850" y="78" font-family="Arial, sans-serif" font-size="24" fill="#8b5cf6" font-weight="bold">24</text>
      </g>
      <g>
        <text x="980" y="50" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="500">THIS MONTH</text>
        <text x="980" y="78" font-family="Arial, sans-serif" font-size="24" fill="#3b82f6" font-weight="bold">$2.4M</text>
      </g>
    </g>
  </g>
  
  <!-- Investment Pipeline -->
  <g id="pipeline" transform="translate(40, 120)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Investment Pipeline</text>
    
    <!-- Pipeline Stages -->
    <g transform="translate(0, 20)">
      <!-- Stage 1 -->
      <rect x="0" y="0" width="270" height="8" rx="4" fill="#e2e8f0"/>
      <rect x="0" y="0" width="240" height="8" rx="4" fill="url(#purpleGrad)"/>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Sourcing</text>
      <text x="0" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#8b5cf6">12 deals</text>
      
      <!-- Stage 2 -->
      <rect x="290" y="0" width="270" height="8" rx="4" fill="#e2e8f0"/>
      <rect x="290" y="0" width="180" height="8" rx="4" fill="url(#purpleBlue)"/>
      <text x="290" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Screening</text>
      <text x="290" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#7c3aed">8 deals</text>
      
      <!-- Stage 3 -->
      <rect x="580" y="0" width="270" height="8" rx="4" fill="#e2e8f0"/>
      <rect x="580" y="0" width="120" height="8" rx="4" fill="url(#blueGrad)"/>
      <text x="580" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Due Diligence</text>
      <text x="580" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#3b82f6">4 deals</text>
      
      <!-- Stage 4 -->
      <rect x="870" y="0" width="270" height="8" rx="4" fill="#e2e8f0"/>
      <rect x="870" y="0" width="80" height="8" rx="4" fill="#3b82f6"/>
      <text x="870" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Term Sheet</text>
      <text x="870" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#2563eb">3 deals</text>
    </g>
  </g>
  
  <!-- Startup Cards Grid -->
  <g id="startupCards" transform="translate(40, 250)">
    <!-- Card 1 -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="0" width="360" height="180" rx="12" fill="white"/>
      
      <!-- Demo Preview -->
      <rect x="15" y="15" width="140" height="90" rx="8" fill="#f1f5f9"/>
      <rect x="20" y="20" width="60" height="6" rx="3" fill="url(#purpleGrad)"/>
      <rect x="20" y="32" width="100" height="6" rx="3" fill="#e2e8f0"/>
      <rect x="20" y="44" width="80" height="6" rx="3" fill="#e2e8f0"/>
      <circle cx="130" cy="70" r="20" fill="url(#purpleBlue)" opacity="0.2"/>
      <path d="M125 70 L135 65 L135 75 Z" fill="#8b5cf6"/>
      
      <!-- Company Info -->
      <text x="170" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b">TechFlow AI</text>
      <text x="170" y="50" font-family="Arial, sans-serif" font-size="12" fill="#64748b">AI-Powered Analytics</text>
      
      <!-- Score Badge -->
      <rect x="170" y="60" width="60" height="24" rx="12" fill="#dcfce7"/>
      <circle cx="182" cy="72" r="4" fill="#22c55e"/>
      <text x="190" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#16a34a">9.2</text>
      
      <!-- Metrics -->
      <g transform="translate(15, 120)">
        <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">ARR</text>
        <text x="0" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">$1.2M</text>
        
        <text x="100" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">GROWTH</text>
        <text x="100" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22c55e">+127%</text>
        
        <text x="200" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">STAGE</text>
        <text x="200" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Series A</text>
      </g>
      
      <!-- Action Button -->
      <rect x="15" y="150" width="330" height="18" rx="9" fill="url(#purpleBlue)" opacity="0.1"/>
      <text x="180" y="162" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">View Demo →</text>
    </g>
    
    <!-- Card 2 -->
    <g transform="translate(380, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="360" height="180" rx="12" fill="white"/>
      
      <!-- Demo Preview -->
      <rect x="15" y="15" width="140" height="90" rx="8" fill="#f1f5f9"/>
      <circle cx="55" cy="35" r="12" fill="url(#blueGrad)" opacity="0.3"/>
      <circle cx="95" cy="35" r="12" fill="url(#blueGrad)" opacity="0.3"/>
      <rect x="20" y="55" width="120" height="8" rx="4" fill="url(#blueGrad)"/>
      <rect x="20" y="68" width="90" height="8" rx="4" fill="#e2e8f0"/>
      <rect x="20" y="81" width="105" height="8" rx="4" fill="#e2e8f0"/>
      
      <!-- Company Info -->
      <text x="170" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b">CloudVault</text>
      <text x="170" y="50" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Enterprise Security</text>
      
      <!-- Score Badge -->
      <rect x="170" y="60" width="60" height="24" rx="12" fill="#dbeafe"/>
      <circle cx="182" cy="72" r="4" fill="#3b82f6"/>
      <text x="190" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#2563eb">8.8</text>
      
      <!-- Metrics -->
      <g transform="translate(15, 120)">
        <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">ARR</text>
        <text x="0" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">$2.8M</text>
        
        <text x="100" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">GROWTH</text>
        <text x="100" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22c55e">+89%</text>
        
        <text x="200" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">STAGE</text>
        <text x="200" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Series A</text>
      </g>
      
      <!-- Action Button -->
      <rect x="15" y="150" width="330" height="18" rx="9" fill="url(#blueGrad)" opacity="0.1"/>
      <text x="180" y="162" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">View Demo →</text>
    </g>
    
    <!-- Card 3 -->
    <g transform="translate(760, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="360" height="180" rx="12" fill="white"/>
      
      <!-- Demo Preview - Chart Style -->
      <rect x="15" y="15" width="140" height="90" rx="8" fill="#f1f5f9"/>
      <!-- Mini chart bars -->
      <rect x="25" y="75" width="12" height="20" rx="2" fill="url(#purpleGrad)" opacity="0.6"/>
      <rect x="42" y="65" width="12" height="30" rx="2" fill="url(#purpleGrad)" opacity="0.7"/>
      <rect x="59" y="55" width="12" height="40" rx="2" fill="url(#purpleGrad)" opacity="0.8"/>
      <rect x="76" y="45" width="12" height="50" rx="2" fill="url(#purpleBlue)"/>
      <rect x="93" y="50" width="12" height="45" rx="2" fill="url(#blueGrad)" opacity="0.8"/>
      <rect x="110" y="60" width="12" height="35" rx="2" fill="url(#blueGrad)" opacity="0.7"/>
      <rect x="127" y="70" width="12" height="25" rx="2" fill="url(#blueGrad)" opacity="0.6"/>
      
      <!-- Company Info -->
      <text x="170" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b">MetaHealth</text>
      <text x="170" y="50" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Digital Healthcare</text>
      
      <!-- Score Badge -->
      <rect x="170" y="60" width="60" height="24" rx="12" fill="#f3e8ff"/>
      <circle cx="182" cy="72" r="4" fill="#8b5cf6"/>
      <text x="190" y="77" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#7c3aed">9.5</text>
      
      <!-- Metrics -->
      <g transform="translate(15, 120)">
        <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">ARR</text>
        <text x="0" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">$890K</text>
        
        <text x="100" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">GROWTH</text>
        <text x="100" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22c55e">+156%</text>
        
        <text x="200" y="0" font-family="Arial, sans-serif" font-size="11" fill="#64748b">STAGE</text>
        <text x="200" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">Seed</text>
      </g>
      
      <!-- Action Button -->
      <rect x="15" y="150" width="330" height="18" rx="9" fill="url(#purpleBlue)" opacity="0.1"/>
      <text x="180" y="162" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#7c3aed" text-anchor="middle">View Demo →</text>
    </g>
  </g>
  
  <!-- Bottom Section - Portfolio Metrics -->
  <g id="portfolioMetrics" transform="translate(40, 455)">
    <!-- Left Panel - Performance Chart -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="0" width="540" height="180" rx="12" fill="white"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1e293b">Portfolio Performance</text>
      
      <!-- Chart Area -->
      <g transform="translate(30, 55)">
        <!-- Grid lines -->
        <line x1="0" y1="0" x2="490" y2="0" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="0" y1="25" x2="490" y2="25" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="0" y1="50" x2="490" y2="50" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="0" y1="75" x2="490" y2="75" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="0" y1="100" x2="490" y2="100" stroke="#e2e8f0" stroke-width="1"/>
        
        <!-- Performance line -->
        <path d="M 0,85 L 70,75 L 140,60 L 210,50 L 280,40 L 350,35 L 420,25 L 490,15" 
              fill="none" stroke="url(#purpleBlue)" stroke-width="3" stroke-linecap="round"/>
        
        <!-- Area under curve -->
        <path d="M 0,85 L 70,75 L 140,60 L 210,50 L 280,40 L 350,35 L 420,25 L 490,15 L 490,100 L 0,100 Z" 
              fill="url(#purpleBlue)" opacity="0.1"/>
        
        <!-- Data points -->
        <circle cx="0" cy="85" r="4" fill="#8b5cf6"/>
        <circle cx="140" cy="60" r="4" fill="#8b5cf6"/>
        <circle cx="280" cy="40" r="4" fill="#3b82f6"/>
        <circle cx="420" cy="25" r="4" fill="#3b82f6"/>
        <circle cx="490" cy="15" r="5" fill="#3b82f6" filter="url(#glow)"/>
      </g>
      
      <!-- Legend -->
      <g transform="translate(380, 25)">
        <circle cx="0" cy="-3" r="4" fill="#8b5cf6"/>
        <text x="12" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Total Value</text>
        <text x="80" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">+147%</text>
      </g>
    </g>
    
    <!-- Right Panel - Key Metrics -->
    <g transform="translate(560, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="580" height="180" rx="12" fill="white"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1e293b">Key Metrics</text>
      
      <!-- Metric Cards -->
      <g transform="translate(20, 50)">
        <!-- Metric 1 -->
        <rect x="0" y="0" width="170" height="100" rx="8" fill="url(#purpleBlue)" opacity="0.05"/>
        <text x="15" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="500">AVG DEAL SIZE</text>
        <text x="15" y="55" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#8b5cf6">$850K</text>
        <rect x="15" y="68" width="60" height="20" rx="10" fill="#dcfce7"/>
        <text x="45" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">+12%</text>
        
        <!-- Metric 2 -->
        <rect x="190" y="0" width="170" height="100" rx="8" fill="url(#blueGrad)" opacity="0.05"/>
        <text x="205" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="500">SUCCESS RATE</text>
        <text x="205" y="55" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#3b82f6">67%</text>
        <rect x="205" y="68" width="55" height="20" rx="10" fill="#dcfce7"/>
        <text x="232.5" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">+8%</text>
        
        <!-- Metric 3 -->
        <rect x="380" y="0" width="170" height="100" rx="8" fill="url(#purpleGrad)" opacity="0.05"/>
        <text x="395" y="25" font-family="Arial, sans-serif" font-size="12" fill="#64748b" font-weight="500">TIME TO CLOSE</text>
        <text x="395" y="55" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#8b5cf6">42d</text>
        <rect x="395" y="68" width="60" height="20" rx="10" fill="#fee2e2"/>
        <text x="425" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">-5d</text>
      </g>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="1150" cy="30" r="3" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1170" cy="50" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1130" cy="60" r="2.5" fill="#8b5cf6" opacity="0.2"/>
</svg>
