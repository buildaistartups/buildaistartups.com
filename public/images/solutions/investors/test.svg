  <!-- Automation Symbol -->
  <g transform="translate(750, 15)">
    <circle cx="0" cy="0" r="14" fill="url(#purpleBlue)" opacity="0.9"/>
    <path d="M -6,-6 L 6,6 M -6,6 L 6,-6" stroke="white" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Startup Card 1 - High Score -->
