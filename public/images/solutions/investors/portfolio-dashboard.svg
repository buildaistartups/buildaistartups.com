<svg width="320" height="192" viewBox="0 0 320 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="192" fill="transparent"/>
  
  <!-- Main Dashboard Container -->
  <rect x="8" y="8" width="304" height="176" fill="#f8f9ff" stroke="#e1e5ff" stroke-width="1" rx="8"/>
  
  <!-- Header -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4c1d95">Portfolio Dashboard</text>
  <text x="280" y="26" font-family="Arial, sans-serif" font-size="10" fill="#6366f1">$127,450</text>
  
  <!-- Investment Cards Row 1 -->
  <!-- Card 1: Stocks -->
  <rect x="16" y="36" width="70" height="50" fill="#8b5cf6" rx="4" opacity="0.9"/>
  <text x="20" y="48" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">STOCKS</text>
  <text x="20" y="58" font-family="Arial, sans-serif" font-size="10" fill="white">$45,200</text>
  <text x="20" y="68" font-family="Arial, sans-serif" font-size="7" fill="#c4b5fd">+12.5%</text>
  <polygon points="60,72 65,68 70,70 75,66 80,64" fill="none" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- Card 2: Bonds -->
  <rect x="92" y="36" width="70" height="50" fill="#6366f1" rx="4" opacity="0.9"/>
  <text x="96" y="48" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">BONDS</text>
  <text x="96" y="58" font-family="Arial, sans-serif" font-size="10" fill="white">$32,100</text>
  <text x="96" y="68" font-family="Arial, sans-serif" font-size="7" fill="#a5b4fc">+4.2%</text>
  <polygon points="136,72 141,70 146,68 151,69 156,67" fill="none" stroke="#a5b4fc" stroke-width="1"/>
  
  <!-- Card 3: ETFs -->
  <rect x="168" y="36" width="70" height="50" fill="#7c3aed" rx="4" opacity="0.9"/>
  <text x="172" y="48" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">ETFs</text>
  <text x="172" y="58" font-family="Arial, sans-serif" font-size="10" fill="white">$28,750</text>
  <text x="172" y="68" font-family="Arial, sans-serif" font-size="7" fill="#c4b5fd">+8.7%</text>
  <polygon points="212,72 217,69 222,66 227,68 232,65" fill="none" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- Card 4: Crypto -->
  <rect x="244" y="36" width="60" height="50" fill="#5b21b6" rx="4" opacity="0.9"/>
  <text x="248" y="48" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">CRYPTO</text>
  <text x="248" y="58" font-family="Arial, sans-serif" font-size="10" fill="white">$21,400</text>
  <text x="248" y="68" font-family="Arial, sans-serif" font-size="7" fill="#c4b5fd">+24.1%</text>
  <polygon points="284,72 287,68 290,70 293,66 296,64" fill="none" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- Portfolio Allocation Pie Chart -->
  <circle cx="60" cy="130" r="25" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <!-- Stocks: 35% -->
  <path d="M 60 105 A 25 25 0 0 1 81.77 145.45 L 60 130 Z" fill="#8b5cf6"/>
  <!-- Bonds: 25% -->
  <path d="M 81.77 145.45 A 25 25 0 0 1 38.23 145.45 L 60 130 Z" fill="#6366f1"/>
  <!-- ETFs: 23% -->
  <path d="M 38.23 145.45 A 25 25 0 0 1 50.18 107.32 L 60 130 Z" fill="#7c3aed"/>
  <!-- Crypto: 17% -->
  <path d="M 50.18 107.32 A 25 25 0 0 1 60 105 L 60 130 Z" fill="#5b21b6"/>
  
  <text x="30" y="168" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4c1d95">Allocation</text>
  
  <!-- Performance Graph -->
  <rect x="110" y="100" width="120" height="60" fill="none" stroke="#e1e5ff" stroke-width="1" rx="4"/>
  <text x="114" y="112" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#4c1d95">6M Performance</text>
  
  <!-- Graph Lines -->
  <polyline points="115,150 125,145 135,140 145,138 155,142 165,135 175,130 185,128 195,125 205,120 215,118 225,115" 
            fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <polyline points="115,155 125,152 135,148 145,146 155,149 165,144 175,141 185,139 195,136 205,133 215,131 225,128" 
            fill="none" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Graph Grid -->
  <line x1="115" y1="120" x2="225" y2="120" stroke="#f3f4f6" stroke-width="0.5"/>
  <line x1="115" y1="135" x2="225" y2="135" stroke="#f3f4f6" stroke-width="0.5"/>
  <line x1="115" y1="150" x2="225" y2="150" stroke="#f3f4f6" stroke-width="0.5"/>
  
  <!-- Performance Indicators -->
  <rect x="240" y="100" width="64" height="60" fill="#faf5ff" stroke="#e1e5ff" stroke-width="1" rx="4"/>
  <text x="244" y="112" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#4c1d95">Metrics</text>
  
  <text x="244" y="124" font-family="Arial, sans-serif" font-size="7" fill="#6b7280">Total Return</text>
  <text x="244" y="132" font-family="Arial, sans-serif" font-size="8" fill="#059669" font-weight="bold">+15.2%</text>
  
  <text x="244" y="142" font-family="Arial, sans-serif" font-size="7" fill="#6b7280">Risk Score</text>
  <text x="244" y="150" font-family="Arial, sans-serif" font-size="8" fill="#7c3aed" font-weight="bold">7.2/10</text>
  
  <!-- Growth Indicators -->
  <polygon points="268,125 273,120 278,125" fill="#059669"/>
  <polygon points="268,145 273,140 278,145" fill="#f59e0b"/>
  
  <!-- Legend -->
  <rect x="16" y="168" width="8" height="4" fill="#8b5cf6"/>
  <text x="28" y="172" font-family="Arial, sans-serif" font-size="7" fill="#4c1d95">Stocks 35%</text>
  
  <rect x="80" y="168" width="8" height="4" fill="#6366f1"/>
  <text x="92" y="172" font-family="Arial, sans-serif" font-size="7" fill="#4c1d95">Bonds 25%</text>
  
  <rect x="140" y="168" width="8" height="4" fill="#7c3aed"/>
  <text x="152" y="172" font-family="Arial, sans-serif" font-size="7" fill="#4c1d95">ETFs 23%</text>
  
  <rect x="190" y="168" width="8" height="4" fill="#5b21b6"/>
  <text x="202" y="172" font-family="Arial, sans-serif" font-size="7" fill="#4c1d95">Crypto 17%</text>
  
  <!-- Status Indicators -->
  <circle cx="290" cy="170" r="3" fill="#10b981"/>
  <text x="270" y="182" font-family="Arial, sans-serif" font-size="7" fill="#4c1d95">Active</text>
</svg>
