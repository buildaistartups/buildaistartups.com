<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="vibrantPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="vibrantBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="vibrantIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="vibrantViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="vibrantCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  
  <!-- Background circles for depth -->
  <circle cx="150" cy="120" r="80" fill="#8B5CF6" opacity="0.1"/>
  <circle cx="650" cy="480" r="100" fill="#3B82F6" opacity="0.1"/>
  <circle cx="700" cy="150" r="60" fill="#A78BFA" opacity="0.1"/>
  
  <!-- Data Network Connections -->
  <g id="connections" opacity="0.3">
    <line x1="150" y1="180" x2="270" y2="150" stroke="url(#purpleBlue)" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="230" y1="420" x2="390" y2="360" stroke="url(#purpleBlue)" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="510" y1="150" x2="540" y2="150" stroke="url(#purpleBlue)" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="660" y1="240" x2="660" y2="270" stroke="url(#purpleBlue)" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Market Size Indicator - Pie Chart -->
  <g id="marketSize">
    <circle cx="150" cy="120" r="60" fill="none" stroke="#E5E7EB" stroke-width="2"/>
    <path d="M 150 60 A 60 60 0 0 1 195.88 155.88 L 150 120 Z" fill="url(#lightPurple)"/>
    <path d="M 195.88 155.88 A 60 60 0 0 1 119.08 168.54 L 150 120 Z" fill="url(#lightBlue)"/>
    <path d="M 119.08 168.54 A 60 60 0 0 1 150 60 L 150 120 Z" fill="#A78BFA" opacity="0.6"/>
    <text x="150" y="115" text-anchor="middle" fill="#6B21A8" font-size="16" font-weight="bold">$2.4B</text>
    <text x="150" y="132" text-anchor="middle" fill="#7C3AED" font-size="14">Market Size</text>
  </g>
  
  <!-- Intelligence Gathering Symbol - Magnifying Glass with Data -->
  <g id="intelligence">
    <circle cx="150" cy="280" r="35" fill="none" stroke="url(#purpleBlue)" stroke-width="3"/>
    <line x1="177" y1="307" x2="200" y2="330" stroke="url(#purpleBlue)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="150" cy="280" r="20" fill="#8B5CF6" opacity="0.2"/>
    <path d="M 145 270 L 145 280 L 155 280 L 155 275 L 150 275 L 150 270 Z" fill="#3B82F6"/>
    <circle cx="148" cy="288" r="2" fill="#3B82F6"/>
    <circle cx="155" cy="285" r="1.5" fill="#3B82F6"/>
  </g>
  
  <!-- Trend Line Chart -->
  <g id="trendChart">
    <rect x="50" y="360" width="180" height="120" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2.5"/>
    <text x="140" y="385" text-anchor="middle" fill="#6B21A8" font-size="16" font-weight="bold">Growth Trends</text>
    
    <!-- Trend lines -->
    <polyline points="70,465 90,455 110,440 130,430 150,420 170,410 190,400 210,390" 
              fill="none" stroke="url(#purpleBlue)" stroke-width="3" stroke-linecap="round"/>
    <polyline points="70,470 90,465 110,458 130,452 150,447 170,442 190,435 210,428" 
              fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Data points -->
    <circle cx="90" cy="455" r="4" fill="#8B5CF6"/>
    <circle cx="130" cy="430" r="4" fill="#8B5CF6"/>
    <circle cx="170" cy="410" r="4" fill="#8B5CF6"/>
    <circle cx="210" cy="390" r="4" fill="#8B5CF6"/>
    
    <!-- Grid lines -->
    <line x1="70" y1="400" x2="210" y2="400" stroke="#E5E7EB" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="430" x2="210" y2="430" stroke="#E5E7EB" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="460" x2="210" y2="460" stroke="#E5E7EB" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Competitive Landscape - Quadrant Chart -->
  <g id="competitive">
    <rect x="270" y="40" width="240" height="200" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
    <text x="390" y="65" text-anchor="middle" fill="#6B21A8" font-size="16" font-weight="bold">Competitive Landscape</text>
    
    <!-- Quadrant lines -->
    <line x1="390" y1="80" x2="390" y2="220" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="290" y1="150" x2="490" y2="150" stroke="#9CA3AF" stroke-width="2"/>
    
    <!-- Quadrant labels -->
    <text x="330" y="95" text-anchor="middle" fill="#7C3AED" font-size="12" opacity="0.7">Leaders</text>
    <text x="450" y="95" text-anchor="middle" fill="#7C3AED" font-size="12" opacity="0.7">Challengers</text>
    <text x="330" y="215" text-anchor="middle" fill="#7C3AED" font-size="12" opacity="0.7">Niche</text>
    <text x="450" y="215" text-anchor="middle" fill="#7C3AED" font-size="12" opacity="0.7">Emerging</text>
    
    <!-- Company bubbles -->
    <circle cx="340" cy="115" r="14" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="420" cy="125" r="18" fill="#3B82F6" opacity="0.7"/>
    <circle cx="460" cy="110" r="12" fill="#A78BFA" opacity="0.7"/>
    <circle cx="320" cy="180" r="10" fill="#60A5FA" opacity="0.6"/>
    <circle cx="440" cy="190" r="15" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="370" cy="165" r="11" fill="#7C3AED" opacity="0.6"/>
    
    <!-- Axis labels -->
    <text x="390" y="235" text-anchor="middle" fill="#6B7280" font-size="11">Market Share →</text>
    <text x="280" y="150" text-anchor="middle" fill="#6B7280" font-size="11" transform="rotate(-90 280 150)">Innovation →</text>
  </g>
  
  <!-- Sector Analysis - Bar Chart -->
  <g id="sectorAnalysis">
    <rect x="540" y="40" width="240" height="200" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="2.5"/>
    <text x="660" y="65" text-anchor="middle" fill="#6B21A8" font-size="16" font-weight="bold">Sector Analysis</text>
    
    <!-- Bars -->
    <rect x="575" y="170" width="35" height="50" rx="3" fill="url(#lightPurple)"/>
    <rect x="620" y="140" width="35" height="80" rx="3" fill="url(#lightBlue)"/>
    <rect x="665" y="155" width="35" height="65" rx="3" fill="#A78BFA" opacity="0.8"/>
    <rect x="710" y="125" width="35" height="95" rx="3" fill="url(#purpleBlue)"/>
    
    <!-- Sector labels -->
    <text x="592" y="235" text-anchor="middle" fill="#6B7280" font-size="11">Tech</text>
    <text x="637" y="235" text-anchor="middle" fill="#6B7280" font-size="11">Health</text>
    <text x="682" y="235" text-anchor="middle" fill="#6B7280" font-size="11">Finance</text>
    <text x="727" y="235" text-anchor="middle" fill="#6B7280" font-size="11">Retail</text>
    
    <!-- Values -->
    <text x="592" y="163" text-anchor="middle" fill="#6B21A8" font-size="12" font-weight="bold">32%</text>
    <text x="637" y="133" text-anchor="middle" fill="#2563EB" font-size="12" font-weight="bold">45%</text>
    <text x="682" y="148" text-anchor="middle" fill="#7C3AED" font-size="12" font-weight="bold">38%</text>
    <text x="727" y="118" text-anchor="middle" fill="#6B21A8" font-size="12" font-weight="bold">52%</text>
  </g>
  
  <!-- Market Map - Geographic representation -->
  <g id="marketMap">
    <rect x="270" y="270" width="240" height="180" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
    <text x="390" y="295" text-anchor="middle" fill="#6B21A8" font-size="16" font-weight="bold">Market Distribution</text>
    
    <!-- Simplified world regions -->
    <ellipse cx="320" cy="355" rx="30" ry="25" fill="#8B5CF6" opacity="0.3" stroke="#7C3AED" stroke-width="2"/>
    <text x="320" y="360" text-anchor="middle" fill="#6B21A8" font-size="14" font-weight="bold">NA</text>
    <text x="320" y="393" text-anchor="middle" fill="#7C3AED" font-size="11">$850M</text>
    
    <ellipse cx="390" cy="345" rx="35" ry="28" fill="#3B82F6" opacity="0.3" stroke="#2563EB" stroke-width="2"/>
    <text x="390" y="350" text-anchor="middle" fill="#1E40AF" font-size="14" font-weight="bold">EU</text>
    <text x="390" y="383" text-anchor="middle" fill="#2563EB" font-size="11">$920M</text>
    
    <ellipse cx="460" cy="360" rx="32" ry="26" fill="#A78BFA" opacity="0.3" stroke="#8B5CF6" stroke-width="2"/>
    <text x="460" y="365" text-anchor="middle" fill="#6B21A8" font-size="14" font-weight="bold">APAC</text>
    <text x="460" y="398" text-anchor="middle" fill="#7C3AED" font-size="11">$630M</text>
  </g>
  
  <!-- Prediction Indicators -->
  <g id="predictions">
    <rect x="540" y="270" width="240" height="180" rx="8" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2.5"/>
    <text x="660" y="295" text-anchor="middle" fill="#6B21A8" font-size="16" font-weight="bold">Trend Predictions</text>
    
    <!-- Upward arrow -->
    <path d="M 592 340 L 612 300 L 632 340" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="612" y1="300" x2="612" y2="370" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
    <text x="612" y="385" text-anchor="middle" fill="#059669" font-size="13" font-weight="bold">+42%</text>
    <text x="612" y="400" text-anchor="middle" fill="#6B7280" font-size="11">2025 Growth</text>
    
    <!-- Metrics boxes -->
    <rect x="570" y="410" width="85" height="30" rx="4" fill="#8B5CF6" opacity="0.2" stroke="#7C3AED" stroke-width="1"/>
    <text x="612" y="425" text-anchor="middle" fill="#6B21A8" font-size="12" font-weight="bold">AI/ML</text>
    <text x="612" y="435" text-anchor="middle" fill="#7C3AED" font-size="9">High Impact</text>
    
    <rect x="665" y="410" width="85" height="30" rx="4" fill="#3B82F6" opacity="0.2" stroke="#2563EB" stroke-width="1"/>
    <text x="707" y="425" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="bold">IoT</text>
    <text x="707" y="435" text-anchor="middle" fill="#2563EB" font-size="9">Rising</text>
  </g>
  
  <!-- KPI Indicators -->
  <g id="kpis">
    <rect x="273" y="475" width="110" height="60" rx="6" fill="url(#lightPurple)" opacity="0.9"/>
    <text x="328" y="497" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Market Share</text>
    <text x="328" y="515" text-anchor="middle" fill="white" font-size="18" font-weight="bold">23.7%</text>
    <text x="328" y="530" text-anchor="middle" fill="white" font-size="10">↑ 3.2%</text>
    
    <rect x="398" y="475" width="110" height="60" rx="6" fill="url(#lightBlue)" opacity="0.9"/>
    <text x="453" y="497" text-anchor="middle" fill="white" font-size="12" font-weight="bold">CAGR</text>
    <text x="453" y="515" text-anchor="middle" fill="white" font-size="18" font-weight="bold">18.5%</text>
    <text x="453" y="530" text-anchor="middle" fill="white" font-size="10">2024-2029</text>
  </g>
  
  <!-- Analytics Icon -->
  <g id="analyticsIcon">
    <circle cx="700" cy="360" r="25" fill="none" stroke="url(#purpleBlue)" stroke-width="2"/>
    <path d="M 690 360 L 695 355 L 700 362 L 710 348" fill="none" stroke="url(#purpleBlue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="695" cy="355" r="2" fill="#8B5CF6"/>
    <circle cx="700" cy="362" r="2" fill="#3B82F6"/>
    <circle cx="710" cy="348" r="2" fill="#8B5CF6"/>
  </g>
  
  <!-- Title Banner -->
  <g id="title">
    <rect x="240" y="550" width="320" height="35" rx="6" fill="url(#purpleBlue)" opacity="0.9"/>
    <text x="400" y="572" text-anchor="middle" fill="white" font-size="16" font-weight="bold">MARKET INTELLIGENCE DASHBOARD</text>
  </g>
</svg>
