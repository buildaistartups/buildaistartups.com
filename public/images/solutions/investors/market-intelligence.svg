<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightPurpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- Patterns for data visualization -->
    <pattern id="dataPattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#8B5CF6" opacity="0.1"/>
      <circle cx="2" cy="2" r="0.5" fill="#3B82F6" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="transparent"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#purpleBlueGradient)">
    Market Intelligence and Trend Analysis
  </text>
  
  <!-- Market Size Indicators (Left Side) -->
  <g id="marketSize">
    <!-- Market Size Title -->
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Market Size</text>
    
    <!-- Large Circle for Total Market -->
    <circle cx="120" cy="140" r="60" fill="url(#lightPurpleGradient)" stroke="#8B5CF6" stroke-width="2"/>
    <text x="120" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">$2.5B</text>
    <text x="120" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Total Market</text>
    
    <!-- Medium Circle for TAM -->
    <circle cx="80" cy="220" r="35" fill="url(#blueGradient)" stroke="#3B82F6" stroke-width="2"/>
    <text x="80" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">$800M</text>
    <text x="80" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">TAM</text>
    
    <!-- Small Circle for SAM -->
    <circle cx="160" cy="220" r="25" fill="#8B5CF6" stroke="#6366F1" stroke-width="2"/>
    <text x="160" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">$200M</text>
    <text x="160" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF">SAM</text>
    
    <!-- Growth Arrow -->
    <path d="M 50 280 L 180 280 L 170 270 M 180 280 L 170 290" stroke="#8B5CF6" stroke-width="2" fill="none"/>
    <text x="115" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">+15% CAGR</text>
  </g>
  
  <!-- Sector Analysis (Center-Left) -->
  <g id="sectorAnalysis">
    <text x="250" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Sector Analysis</text>
    
    <!-- Pie Chart -->
    <g transform="translate(320, 140)">
      <!-- Tech Sector -->
      <path d="M 0,0 L 0,-40 A 40,40 0 0,1 28.28,-28.28 Z" fill="#8B5CF6"/>
      <text x="15" y="-25" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">Tech 35%</text>
      
      <!-- Healthcare Sector -->
      <path d="M 0,0 L 28.28,-28.28 A 40,40 0 0,1 40,0 Z" fill="#A78BFA"/>
      <text x="25" y="-10" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">Health 25%</text>
      
      <!-- Finance Sector -->
      <path d="M 0,0 L 40,0 A 40,40 0 0,1 0,40 Z" fill="#3B82F6"/>
      <text x="15" y="25" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">Finance 25%</text>
      
      <!-- Other Sector -->
      <path d="M 0,0 L 0,40 A 40,40 0 0,1 0,-40 Z" fill="#60A5FA"/>
      <text x="-25" y="5" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">Other 15%</text>
    </g>
    
    <!-- Sector Legend -->
    <g transform="translate(250, 200)">
      <rect x="0" y="0" width="10" height="10" fill="#8B5CF6"/>
      <text x="15" y="8" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Technology</text>
      
      <rect x="0" y="15" width="10" height="10" fill="#A78BFA"/>
      <text x="15" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Healthcare</text>
      
      <rect x="0" y="30" width="10" height="10" fill="#3B82F6"/>
      <text x="15" y="38" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Finance</text>
      
      <rect x="0" y="45" width="10" height="10" fill="#60A5FA"/>
      <text x="15" y="53" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Others</text>
    </g>
  </g>
  
  <!-- Competitive Landscape (Center-Right) -->
  <g id="competitiveLandscape">
    <text x="450" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Competitive Landscape</text>
    
    <!-- Bubble Chart -->
    <g transform="translate(500, 140)">
      <!-- Leader -->
      <circle cx="0" cy="0" r="25" fill="url(#purpleBlueGradient)" opacity="0.8"/>
      <text x="0" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">Leader A</text>
      <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF">35% Share</text>
      
      <!-- Challenger -->
      <circle cx="40" cy="-30" r="20" fill="#8B5CF6" opacity="0.7"/>
      <text x="40" y="-32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">Challenger B</text>
      <text x="40" y="-24" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFFFFF">25%</text>
      
      <!-- Follower -->
      <circle cx="-35" cy="25" r="15" fill="#3B82F6" opacity="0.6"/>
      <text x="-35" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF">Follower C</text>
      <text x="-35" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFFFFF">15%</text>
      
      <!-- Niche Players -->
      <circle cx="25" cy="35" r="10" fill="#60A5FA" opacity="0.5"/>
      <text x="25" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFFFFF">Niche</text>
      
      <circle cx="-20" cy="-25" r="8" fill="#A78BFA" opacity="0.5"/>
      <text x="-20" y="-23" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFFFFF">Start</text>
    </g>
    
    <!-- Competitive Matrix Axes -->
    <g transform="translate(450, 200)">
      <!-- X-axis -->
      <line x1="0" y1="50" x2="100" y2="50" stroke="#6366F1" stroke-width="1"/>
      <text x="50" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">Market Share</text>
      
      <!-- Y-axis -->
      <line x1="0" y1="0" x2="0" y2="50" stroke="#6366F1" stroke-width="1"/>
      <text x="-5" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6366F1" transform="rotate(-90, -5, 25)">Innovation</text>
    </g>
  </g>
  
  <!-- Trend Predictions (Right Side) -->
  <g id="trendPredictions">
    <text x="600" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Trend Predictions</text>
    
    <!-- Trend Line Chart -->
    <g transform="translate(600, 100)">
      <!-- Chart Background -->
      <rect x="0" y="0" width="150" height="100" fill="url(#dataPattern)" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
      
      <!-- Trend Lines -->
      <polyline points="10,80 30,70 50,60 70,45 90,35 110,25 130,15" 
                stroke="#8B5CF6" stroke-width="3" fill="none"/>
      <polyline points="10,85 30,80 50,75 70,65 90,60 110,50 130,40" 
                stroke="#3B82F6" stroke-width="2" fill="none"/>
      
      <!-- Data Points -->
      <circle cx="130" cy="15" r="3" fill="#8B5CF6"/>
      <circle cx="130" cy="40" r="2" fill="#3B82F6"/>
      
      <!-- Prediction Arrow -->
      <path d="M 135 15 L 145 10 L 140 12 M 145 10 L 140 8" stroke="#8B5CF6" stroke-width="2" fill="none"/>
      
      <!-- Labels -->
      <text x="75" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">Growth Forecast</text>
      <text x="10" y="95" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">2024</text>
      <text x="130" y="95" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">2026</text>
    </g>
    
    <!-- Key Trends -->
    <g transform="translate(600, 220)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6366F1">Key Trends:</text>
      
      <!-- Trend 1 -->
      <circle cx="5" cy="15" r="2" fill="#8B5CF6"/>
      <text x="12" y="18" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">AI Integration +40%</text>
      
      <!-- Trend 2 -->
      <circle cx="5" cy="30" r="2" fill="#3B82F6"/>
      <text x="12" y="33" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Cloud Migration +35%</text>
      
      <!-- Trend 3 -->
      <circle cx="5" cy="45" r="2" fill="#A78BFA"/>
      <text x="12" y="48" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Sustainability Focus +50%</text>
    </g>
  </g>
  
  <!-- Intelligence Gathering Symbols (Bottom) -->
  <g id="intelligenceSymbols">
    <text x="50" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Intelligence Sources</text>
    
    <!-- Data Collection Icons -->
    <!-- Survey Icon -->
    <g transform="translate(80, 380)">
      <rect x="0" y="0" width="30" height="40" fill="url(#lightPurpleGradient)" stroke="#8B5CF6" stroke-width="1" rx="2"/>
      <line x1="5" y1="8" x2="25" y2="8" stroke="#FFFFFF" stroke-width="1"/>
      <line x1="5" y1="15" x2="20" y2="15" stroke="#FFFFFF" stroke-width="1"/>
      <line x1="5" y1="22" x2="25" y2="22" stroke="#FFFFFF" stroke-width="1"/>
      <line x1="5" y1="29" x2="18" y2="29" stroke="#FFFFFF" stroke-width="1"/>
      <text x="15" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">Surveys</text>
    </g>
    
    <!-- Analytics Icon -->
    <g transform="translate(150, 380)">
      <circle cx="15" cy="20" r="15" fill="url(#blueGradient)" stroke="#3B82F6" stroke-width="1"/>
      <path d="M 8,25 L 12,20 L 18,15 L 22,25" stroke="#FFFFFF" stroke-width="2" fill="none"/>
      <circle cx="12" cy="20" r="1" fill="#FFFFFF"/>
      <circle cx="18" cy="15" r="1" fill="#FFFFFF"/>
      <text x="15" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">Analytics</text>
    </g>
    
    <!-- Research Icon -->
    <g transform="translate(220, 380)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
      <path d="M 20,20 L 25,25" stroke="#8B5CF6" stroke-width="2"/>
      <circle cx="12" cy="12" r="3" fill="#A78BFA"/>
      <text x="15" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">Research</text>
    </g>
    
    <!-- Social Listening Icon -->
    <g transform="translate(290, 380)">
      <path d="M 5,20 Q 5,10 15,10 Q 25,10 25,20 Q 25,30 15,30 Q 5,30 5,20" 
            fill="url(#lightPurpleGradient)" stroke="#8B5CF6" stroke-width="1"/>
      <circle cx="10" cy="18" r="1" fill="#FFFFFF"/>
      <circle cx="15" cy="18" r="1" fill="#FFFFFF"/>
      <circle cx="20" cy="18" r="1" fill="#FFFFFF"/>
      <path d="M 12,25 Q 15,28 18,25" stroke="#FFFFFF" stroke-width="1" fill="none"/>
      <text x="15" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">Social</text>
    </g>
  </g>
  
  <!-- Market Map (Bottom Center) -->
  <g id="marketMap">
    <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Market Map</text>
    
    <!-- Geographic Regions -->
    <g transform="translate(350, 380)">
      <!-- North America -->
      <rect x="0" y="0" width="30" height="20" fill="#8B5CF6" opacity="0.7" rx="2"/>
      <text x="15" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">NA</text>
      <text x="15" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6366F1">45%</text>
      
      <!-- Europe -->
      <rect x="35" y="0" width="25" height="20" fill="#3B82F6" opacity="0.7" rx="2"/>
      <text x="47.5" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">EU</text>
      <text x="47.5" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6366F1">30%</text>
      
      <!-- Asia Pacific -->
      <rect x="65" y="0" width="35" height="20" fill="#A78BFA" opacity="0.7" rx="2"/>
      <text x="82.5" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">APAC</text>
      <text x="82.5" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6366F1">25%</text>
    </g>
  </g>
  
  <!-- Data Visualization Dashboard (Bottom Right) -->
  <g id="dataDashboard">
    <text x="600" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1">Data Dashboard</text>
    
    <!-- Mini Charts -->
    <g transform="translate(580, 380)">
      <!-- Bar Chart -->
      <rect x="0" y="30" width="5" height="20" fill="#8B5CF6"/>
      <rect x="8" y="25" width="5" height="25" fill="#3B82F6"/>
      <rect x="16" y="35" width="5" height="15" fill="#A78BFA"/>
      <rect x="24" y="20" width="5" height="30" fill="#60A5FA"/>
      
      <!-- Line Chart -->
      <polyline points="35,45 40,40 45,35 50,30 55,25" 
                stroke="#8B5CF6" stroke-width="2" fill="none"/>
      <circle cx="55" cy="25" r="2" fill="#8B5CF6"/>
      
      <!-- Metrics -->
      <text x="65" y="30" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">ROI: 125%</text>
      <text x="65" y="40" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">CTR: 3.2%</text>
      <text x="65" y="50" font-family="Arial, sans-serif" font-size="8" fill="#6366F1">Conv: 2.8%</text>
    </g>
  </g>
  
  <!-- Strategic Insights Box -->
  <g id="strategicInsights">
    <rect x="50" y="480" width="700" height="80" fill="url(#lightPurpleGradient)" stroke="#8B5CF6" stroke-width="2" rx="8" opacity="0.9"/>
    
    <text x="400" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Strategic Insights</text>
    
    <text x="70" y="525" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">• Market consolidation expected in Q2-Q3 2025</text>
    <text x="70" y="540" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">• Technology sector showing highest growth potential (+40% YoY)</text>
    <text x="70" y="555" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">• Emerging markets present untapped opportunities worth $500M</text>
  </g>
  
  <!-- Connecting Lines for Flow -->
  <g stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3" opacity="0.5">
    <line x1="200" y1="180" x2="250" y2="140"/>
    <line x1="380" y1="140" x2="450" y2="140"/>
    <line x1="550" y1="140" x2="600" y2="120"/>
    <line x1="400" y1="300" x2="400" y2="350"/>
  </g>
</svg>
