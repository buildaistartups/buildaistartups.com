<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500">
  <title>Weekend Progress Timeline</title>
  <defs>
    <linearGradient id="grad" x1="100" y1="250" x2="1500" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="nodeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.12"/>
    </linearGradient>

    <marker id="arrowhead" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <polygon points="0,0 16,8 0,16" fill="url(#grad)"/>
    </marker>

    <style>
      .track { stroke: url(#grad); stroke-width: 10; fill: none; stroke-linecap: round; }
      .node-ring { stroke: url(#grad); stroke-width: 6; fill: url(#nodeFill); }
      .icon { stroke: white; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", sans-serif; font-weight: 700; font-size: 24px; fill: #111827; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", sans-serif; font-size: 16px; fill: #374151; }
      .header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", sans-serif; font-size: 32px; font-weight: 800; fill: url(#grad); letter-spacing: 0.5px; }
      .time { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", sans-serif; font-size: 14px; fill: #6B7280; }
      .pill { fill: none; stroke: url(#grad); stroke-width: 2; }
    </style>
  </defs>

  <!-- Header -->
  <text x="800" y="60" text-anchor="middle" class="header">Friday → Sunday: Weekend Sprint</text>

  <!-- Progress track -->
  <path class="track" d="M160,250 C300,250 340,250 480,250 S760,250 800,250 1040,250 1120,250 1360,250 1440,250" marker-end="url(#arrowhead)"/>

  <!-- Stage coordinates (x: 160, 480, 800, 1120, 1440 | y: 250) -->
  <!-- Friday -->
  <g transform="translate(160,250)">
    <circle r="56" class="node-ring"/>
    <!-- Lightbulb -->
    <g class="icon">
      <path d="M-8,-6 a20,20 0 1,1 16,0"/>
      <path d="M-8,-6 v6 a8,8 0 0,0 16,0 v-6"/>
      <line x1="-10" y1="8" x2="10" y2="8"/>
      <line x1="-8" y1="14" x2="8" y2="14"/>
    </g>
    <!-- Small GH letters badge -->
    <g>
      <rect x="18" y="-40" rx="6" ry="6" width="40" height="26" class="pill"/>
      <text x="38" y="-22" text-anchor="middle" class="sublabel" fill="#1F2937" style="font-weight:800">GH</text>
    </g>
    <text x="0" y="96" text-anchor="middle" class="label">Friday</text>
    <text x="0" y="120" text-anchor="middle" class="time">Ideate • Open repo</text>
  </g>

  <!-- Saturday AM -->
  <g transform="translate(480,250)">
    <circle r="56" class="node-ring"/>
    <!-- Code brackets + repo -->
    <g class="icon">
      <polyline points="-18,-6 -6,-18 -18,-30"/>
      <polyline points="18,-6 6,-18 18,-30"/>
      <rect x="-20" y="4" width="40" height="28" rx="4" ry="4"/>
      <line x1="-10" y1="12" x2="10" y2="12"/>
    </g>
    <text x="0" y="96" text-anchor="middle" class="label">Saturday AM</text>
    <text x="0" y="120" text-anchor="middle" class="time">Code • Commit</text>
  </g>

  <!-- Saturday PM -->
  <g transform="translate(800,250)">
    <circle r="56" class="node-ring"/>
    <!-- Design/UI -->
    <g class="icon">
      <rect x="-26" y="-24" width="52" height="38" rx="6" ry="6"/>
      <circle cx="-14" cy="-12" r="3"/>
      <circle cx="-4" cy="-12" r="3"/>
      <circle cx="6" cy="-12" r="3"/>
      <rect x="-20" y="-2" width="40" height="14" rx="3" ry="3"/>
      <path d="M4,18 l10,10"/>
      <path d="M14,28 l6,-2 l-2,6"/>
    </g>
    <text x="0" y="96" text-anchor="middle" class="label">Saturday PM</text>
    <text x="0" y="120" text-anchor="middle" class="time">Design • UI polish</text>
  </g>

  <!-- Sunday AM -->
  <g transform="translate(1120,250)">
    <circle r="56" class="node-ring"/>
    <!-- Rocket/deploy -->
    <g class="icon">
      <path d="M-2,-24 a12,12 0 0,1 24,0 v16 a10,10 0 0,1 -10,10 h-4 a10,10 0 0,1 -10,-10 z"/>
      <circle cx="8" cy="-16" r="4"/>
      <path d="M2,2 l-6,12"/>
      <path d="M10,2 l6,12"/>
      <path d="M-2,10 q8,10 16,0"/>
    </g>
    <text x="0" y="96" text-anchor="middle" class="label">Sunday AM</text>
    <text x="0" y="120" text-anchor="middle" class="time">Rocket • Deploy</text>
  </g>

  <!-- Sunday PM -->
  <g transform="translate(1440,250)">
    <circle r="56" class="node-ring"/>
    <!-- Growth/users -->
    <g class="icon">
      <!-- chart -->
      <polyline points="-24,16 -10,6 2,10 18,-8" />
      <line x1="18" y1="-8" x2="24" y2="-8"/>
      <!-- users -->
      <circle cx="-6" cy="-12" r="6"/>
      <path d="M-14,0 q8,-6 16,0"/>
      <circle cx="12" cy="-16" r="6"/>
      <path d="M4,-4 q8,-6 16,0"/>
    </g>
    <text x="0" y="96" text-anchor="middle" class="label">Sunday PM</text>
    <text x="0" y="120" text-anchor="middle" class="time">Growth • Users</text>
  </g>

  <!-- Stage time pills under the track -->
  <g>
    <rect x="110" y="320" width="100" height="28" rx="14" class="pill"/>
    <text x="160" y="339" text-anchor="middle" class="sublabel">Fri</text>

    <rect x="430" y="320" width="140" height="28" rx="14" class="pill"/>
    <text x="500" y="339" text-anchor="middle" class="sublabel">Sat AM</text>

    <rect x="750" y="320" width="140" height="28" rx="14" class="pill"/>
    <text x="820" y="339" text-anchor="middle" class="sublabel">Sat PM</text>

    <rect x="1070" y="320" width="140" height="28" rx="14" class="pill"/>
    <text x="1140" y="339" text-anchor="middle" class="sublabel">Sun AM</text>

    <rect x="1400" y="320" width="140" height="28" rx="14" class="pill"/>
    <text x="1470" y="339" text-anchor="middle" class="sublabel">Sun PM</text>
  </g>

  <!-- Subline -->
  <text x="800" y="380" text-anchor="middle" class="sublabel" fill="#111827">Progress, not perfection — keep shipping.</text>
</svg>
