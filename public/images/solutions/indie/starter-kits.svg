<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="grad-soft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#EEF2FF" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>

    <!-- Icon styles -->
    <style>
      .title { font: 600 28px 'Inter', ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 22px 'Inter', ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .feature { font: 500 16px 'Inter', ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .muted { fill: #64748b; }
      .stroke-primary { stroke: url(#grad-primary); }
      .fill-primary { fill: url(#grad-primary); }
    </style>
  </defs>

  <!-- Header -->
  <g transform="translate(70, 56)">
    <text class="title" x="0" y="0">Starter Kits</text>
    <text class="feature" x="0" y="34" fill="#475569">Modular building blocks for your product stack</text>
  </g>

  <!-- Helper function equivalent (we'll manually create three blocks) -->

  <!-- SaaS Kit Block -->
  <g transform="translate(70,130)" filter="url(#softShadow)">
    <!-- Block container -->
    <rect x="0" y="0" rx="24" ry="24" width="380" height="520" fill="white" />
    <rect x="1" y="1" rx="24" ry="24" width="378" height="518" fill="url(#grad-soft)" stroke="url(#grad-primary)" stroke-width="2"/>
    <!-- Connectors (modular look) -->
    <rect x="170" y="-14" width="40" height="28" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="170" y="506" width="40" height="28" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="-14" y="244" width="28" height="40" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="366" y="244" width="28" height="40" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>

    <!-- Icon badge -->
    <circle cx="60" cy="70" r="36" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <!-- Dashboard icon (2x2 grid) -->
    <rect x="45" y="55" width="12" height="12" rx="3" class="fill-primary"/>
    <rect x="63" y="55" width="12" height="12" rx="3" class="fill-primary" opacity="0.8"/>
    <rect x="45" y="73" width="12" height="12" rx="3" class="fill-primary" opacity="0.8"/>
    <rect x="63" y="73" width="12" height="12" rx="3" class="fill-primary" opacity="0.6"/>

    <!-- Heading -->
    <text class="label" x="120" y="78">SaaS Kit</text>
    <line x1="120" y1="88" x2="320" y2="88" class="stroke-primary" stroke-width="2"/>

    <!-- Feature list -->
    <g transform="translate(40,130)">
      <g>
        <circle cx="0" cy="0" r="8" class="fill-primary" />
        <text class="feature" x="18" y="6">Auth, billing, user roles</text>
      </g>
      <g transform="translate(0,44)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.85"/>
        <text class="feature" x="18" y="6">Analytics dashboards & KPIs</text>
      </g>
      <g transform="translate(0,88)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.7"/>
        <text class="feature" x="18" y="6">Teams, projects, notifications</text>
      </g>
      <g transform="translate(0,132)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.6"/>
        <text class="feature" x="18" y="6">Responsive UI components</text>
      </g>
    </g>
  </g>

  <!-- API Kit Block -->
  <g transform="translate(510,130)" filter="url(#softShadow)">
    <!-- Block container -->
    <rect x="0" y="0" rx="24" ry="24" width="380" height="520" fill="white" />
    <rect x="1" y="1" rx="24" ry="24" width="378" height="518" fill="url(#grad-soft)" stroke="url(#grad-primary)" stroke-width="2"/>
    <!-- Connectors -->
    <rect x="170" y="-14" width="40" height="28" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="170" y="506" width="40" height="28" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="-14" y="244" width="28" height="40" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="366" y="244" width="28" height="40" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>

    <!-- Icon badge -->
    <circle cx="60" cy="70" r="36" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <!-- API icon (nodes & docs) -->
    <!-- Nodes connected -->
    <circle cx="52" cy="60" r="6" class="fill-primary"/>
    <circle cx="76" cy="60" r="6" class="fill-primary" opacity="0.8"/>
    <circle cx="64" cy="84" r="6" class="fill-primary" opacity="0.6"/>
    <line x1="52" y1="60" x2="76" y2="60" class="stroke-primary" stroke-width="3"/>
    <line x1="52" y1="60" x2="64" y2="84" class="stroke-primary" stroke-width="3" opacity="0.9"/>
    <line x1="76" y1="60" x2="64" y2="84" class="stroke-primary" stroke-width="3" opacity="0.7"/>
    <!-- Mini doc -->
    <rect x="82" y="70" width="12" height="16" rx="2" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <line x1="84" y1="76" x2="92" y2="76" class="stroke-primary" stroke-width="2"/>
    <line x1="84" y1="80" x2="92" y2="80" class="stroke-primary" stroke-width="2"/>

    <!-- Heading -->
    <text class="label" x="120" y="78">API Kit</text>
    <line x1="120" y1="88" x2="320" y2="88" class="stroke-primary" stroke-width="2"/>

    <!-- Feature list -->
    <g transform="translate(40,130)">
      <g>
        <circle cx="0" cy="0" r="8" class="fill-primary"/>
        <text class="feature" x="18" y="6">REST & GraphQL endpoints</text>
      </g>
      <g transform="translate(0,44)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.85"/>
        <text class="feature" x="18" y="6">Auto-generated docs (OpenAPI)</text>
      </g>
      <g transform="translate(0,88)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.7"/>
        <text class="feature" x="18" y="6">Rate limits, keys, monitoring</text>
      </g>
      <g transform="translate(0,132)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.6"/>
        <text class="feature" x="18" y="6">SDK scaffolds (TS/Go/Python)</text>
      </g>
    </g>
  </g>

  <!-- Content Kit Block -->
  <g transform="translate(950,130)" filter="url(#softShadow)">
    <!-- Block container -->
    <rect x="0" y="0" rx="24" ry="24" width="380" height="520" fill="white" />
    <rect x="1" y="1" rx="24" ry="24" width="378" height="518" fill="url(#grad-soft)" stroke="url(#grad-primary)" stroke-width="2"/>
    <!-- Connectors -->
    <rect x="170" y="-14" width="40" height="28" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="170" y="506" width="40" height="28" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="-14" y="244" width="28" height="40" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <rect x="366" y="244" width="28" height="40" rx="8" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>

    <!-- Icon badge -->
    <circle cx="60" cy="70" r="36" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <!-- Content/blog icon (document with folded corner & lines) -->
    <path d="M44 54 h28 a4 4 0 0 1 4 4 v26 a4 4 0 0 1 -4 4 h-28 a4 4 0 0 1 -4 -4 v-26 a4 4 0 0 1 4 -4 z" fill="white" stroke="url(#grad-primary)" stroke-width="2"/>
    <path d="M72 54 v10 a4 4 0 0 0 4 -4 z" class="fill-primary" opacity="0.8"/>
    <line x1="48" y1="70" x2="72" y2="70" class="stroke-primary" stroke-width="2"/>
    <line x1="48" y1="76" x2="72" y2="76" class="stroke-primary" stroke-width="2" opacity="0.9"/>
    <line x1="48" y1="82" x2="66" y2="82" class="stroke-primary" stroke-width="2" opacity="0.7"/>

    <!-- Heading -->
    <text class="label" x="120" y="78">Content Kit</text>
    <line x1="120" y1="88" x2="320" y2="88" class="stroke-primary" stroke-width="2"/>

    <!-- Feature list -->
    <g transform="translate(40,130)">
      <g>
        <circle cx="0" cy="0" r="8" class="fill-primary"/>
        <text class="feature" x="18" y="6">Blog, docs, landing pages</text>
      </g>
      <g transform="translate(0,44)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.85"/>
        <text class="feature" x="18" y="6">CMS-ready content model</text>
      </g>
      <g transform="translate(0,88)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.7"/>
        <text class="feature" x="18" y="6">Search, tags, author profiles</text>
      </g>
      <g transform="translate(0,132)">
        <circle cx="0" cy="0" r="8" class="fill-primary" opacity="0.6"/>
        <text class="feature" x="18" y="6">MDX/Markdown pipeline</text>
      </g>
    </g>
  </g>

  <!-- Connecting hint at bottom (modular system line) -->
  <g transform="translate(70,700)">
    <line x1="0" y1="0" x2="1260" y2="0" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 10"/>
    <circle cx="190" cy="0" r="6" class="fill-primary"/>
    <circle cx="630" cy="0" r="6" class="fill-primary" opacity="0.8"/>
    <circle cx="1070" cy="0" r="6" class="fill-primary" opacity="0.6"/>
    <text class="feature" x="0" y="-14" fill="#64748b">Mix & match kits — components interlock cleanly</text>
  </g>
</svg>
