<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="violetGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
    </linearGradient>
    
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4" />
    </linearGradient>
    
    <radialGradient id="glowEffect1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="glowEffect2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters for glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bgGradient)"/>
  
  <!-- Background glow effects -->
  <circle cx="200" cy="200" r="300" fill="url(#glowEffect1)" opacity="0.4"/>
  <circle cx="800" cy="700" r="350" fill="url(#glowEffect2)" opacity="0.4"/>
  
  <!-- Neural network background pattern -->
  <g opacity="0.15">
    <!-- Nodes -->
    <circle cx="100" cy="150" r="4" fill="#8b5cf6"/>
    <circle cx="180" cy="120" r="4" fill="#3b82f6"/>
    <circle cx="250" cy="180" r="4" fill="#a855f7"/>
    <circle cx="320" cy="140" r="4" fill="#60a5fa"/>
    <circle cx="850" cy="200" r="4" fill="#8b5cf6"/>
    <circle cx="920" cy="250" r="4" fill="#3b82f6"/>
    <circle cx="780" cy="280" r="4" fill="#a855f7"/>
    <circle cx="150" cy="850" r="4" fill="#60a5fa"/>
    <circle cx="220" cy="900" r="4" fill="#8b5cf6"/>
    <circle cx="900" cy="850" r="4" fill="#3b82f6"/>
    
    <!-- Connections -->
    <line x1="100" y1="150" x2="180" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="180" y1="120" x2="250" y2="180" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="250" y1="180" x2="320" y2="140" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="850" y1="200" x2="920" y2="250" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="920" y1="250" x2="780" y2="280" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="150" y1="850" x2="220" y2="900" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Geometric shapes background -->
  <g opacity="0.1">
    <polygon points="50,50 100,30 120,80" fill="#8b5cf6"/>
    <polygon points="900,100 950,80 930,130" fill="#3b82f6"/>
    <rect x="850" y="850" width="60" height="60" fill="#a855f7" transform="rotate(45 880 880)"/>
    <circle cx="100" cy="900" r="30" fill="#60a5fa"/>
  </g>
  
  <!-- Central holographic interface with code -->
  <g transform="translate(500, 350)">
    <!-- Main screen with glow -->
    <rect x="-200" y="-120" width="400" height="240" rx="12" fill="#1e293b" stroke="url(#violetGlow)" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Code snippet lines -->
    <g opacity="0.9">
      <text x="-180" y="-80" font-family="monospace" font-size="14" fill="#60a5fa">const buildAI = async () => {</text>
      <text x="-170" y="-55" font-family="monospace" font-size="14" fill="#a855f7">  const idea = await innovate();</text>
      <text x="-170" y="-30" font-family="monospace" font-size="14" fill="#94a3b8">  const team = align(founders);</text>
      <text x="-170" y="-5" font-family="monospace" font-size="14" fill="#60a5fa">  return launch(idea, team);</text>
      <text x="-180" y="20" font-family="monospace" font-size="14" fill="#60a5fa">}</text>
    </g>
    
    <!-- Cursor -->
    <rect x="80" y="10" width="12" height="18" fill="#a855f7" opacity="0.8"/>
    
    <!-- Mini chart in corner -->
    <g transform="translate(120, -90)">
      <rect x="0" y="0" width="60" height="40" rx="4" fill="#0f172a" opacity="0.8"/>
      <polyline points="5,30 15,25 25,20 35,15 45,10 55,8" stroke="#8b5cf6" stroke-width="2" fill="none"/>
      <text x="5" y="38" font-family="sans-serif" font-size="8" fill="#94a3b8">Growth</text>
    </g>
  </g>
  
  <!-- Floating dashboard card - left side -->
  <g transform="translate(250, 500)">
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" opacity="0.9" filter="url(#softGlow)"/>
    
    <!-- Bar chart -->
    <rect x="-60" y="-10" width="12" height="30" fill="#3b82f6" opacity="0.7"/>
    <rect x="-40" y="-20" width="12" height="40" fill="#60a5fa" opacity="0.7"/>
    <rect x="-20" y="-30" width="12" height="50" fill="#8b5cf6" opacity="0.7"/>
    <rect x="0" y="-35" width="12" height="55" fill="#a855f7" opacity="0.7"/>
    <rect x="20" y="-45" width="12" height="65" fill="#60a5fa" opacity="0.7"/>
    
    <text x="-70" y="-45" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Analytics</text>
    <text x="-70" y="50" font-family="sans-serif" font-size="10" fill="#8b5cf6">↑ 127%</text>
  </g>
  
  <!-- Floating dashboard card - right side -->
  <g transform="translate(750, 520)">
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9" filter="url(#softGlow)"/>
    
    <!-- AI Brain icon -->
    <circle cx="0" cy="-10" r="25" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <circle cx="-10" cy="-15" r="3" fill="#a855f7"/>
    <circle cx="10" cy="-15" r="3" fill="#a855f7"/>
    <circle cx="-8" cy="0" r="3" fill="#60a5fa"/>
    <circle cx="8" cy="0" r="3" fill="#60a5fa"/>
    <circle cx="0" cy="10" r="3" fill="#8b5cf6"/>
    
    <line x1="-10" y1="-15" x2="-8" y2="0" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="-15" x2="8" y2="0" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
    <line x1="-8" y1="0" x2="0" y2="10" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="0" x2="0" y2="10" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
    
    <text x="-70" y="-45" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="600">AI Models</text>
    <text x="-70" y="50" font-family="sans-serif" font-size="10" fill="#a855f7">Active</text>
  </g>
  
  <!-- Floating code snippet - top right -->
  <g transform="translate(700, 250)">
    <rect x="-70" y="-40" width="140" height="80" rx="6" fill="#0f172a" stroke="#60a5fa" stroke-width="1" opacity="0.85"/>
    <text x="-60" y="-20" font-family="monospace" font-size="11" fill="#60a5fa">function deploy()</text>
    <text x="-60" y="-5" font-family="monospace" font-size="11" fill="#94a3b8">  ai.optimize()</text>
    <text x="-60" y="10" font-family="monospace" font-size="11" fill="#a855f7">  startup.scale()</text>
    <text x="-60" y="25" font-family="monospace" font-size="11" fill="#60a5fa">end</text>
  </g>
  
  <!-- Team members - diverse founding team -->
  <!-- Person 1 - Left (woman with darker skin tone) -->
  <g transform="translate(320, 650)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="35" ry="45" fill="#8b5cf6" opacity="0.3"/>
    <rect x="-30" y="20" width="60" height="50" rx="8" fill="#1e293b"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="28" fill="#7c3aed"/>
    <!-- Hair -->
    <path d="M -20,-15 Q -25,-30 -15,-35 Q 0,-38 15,-35 Q 25,-30 20,-15 Z" fill="#1e1b4b"/>
    <!-- Face details -->
    <circle cx="-8" cy="-12" r="2" fill="#f1f5f9"/>
    <circle cx="8" cy="-12" r="2" fill="#f1f5f9"/>
    <path d="M -6,-2 Q 0,2 6,-2" stroke="#f1f5f9" stroke-width="2" fill="none" opacity="0.8"/>
    <!-- Laptop -->
    <rect x="-25" y="60" width="50" height="35" rx="3" fill="#334155" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="-20" y="65" width="40" height="25" fill="#0f172a"/>
    <!-- Glow -->
    <circle cx="0" cy="75" r="15" fill="#8b5cf6" opacity="0.2"/>
  </g>
  
  <!-- Person 2 - Center (man with medium skin tone) -->
  <g transform="translate(500, 670)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="38" ry="48" fill="#3b82f6" opacity="0.3"/>
    <rect x="-32" y="20" width="64" height="52" rx="8" fill="#1e293b"/>
    <!-- Head -->
    <circle cx="0" cy="-15" r="30" fill="#f59e0b"/>
    <!-- Hair -->
    <path d="M -22,-20 Q -28,-35 -18,-42 Q 0,-45 18,-42 Q 28,-35 22,-20 Z" fill="#451a03"/>
    <!-- Face details -->
    <circle cx="-9" cy="-18" r="2" fill="#f1f5f9"/>
    <circle cx="9" cy="-18" r="2" fill="#f1f5f9"/>
    <path d="M -6,-8 Q 0,-4 6,-8" stroke="#f1f5f9" stroke-width="2" fill="none" opacity="0.8"/>
    <!-- Tablet/device -->
    <rect x="-22" y="55" width="44" height="32" rx="4" fill="#334155" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-18" y="59" width="36" height="24" fill="#0f172a"/>
    <line x1="-12" y1="65" x2="12" y2="65" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
    <line x1="-12" y1="71" x2="12" y2="71" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <line x1="-12" y1="77" x2="5" y2="77" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
    <!-- Glow -->
    <circle cx="0" cy="70" r="18" fill="#3b82f6" opacity="0.2"/>
  </g>
  
  <!-- Person 3 - Right (woman with light skin tone) -->
  <g transform="translate(680, 655)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="36" ry="46" fill="#60a5fa" opacity="0.3"/>
    <rect x="-31" y="20" width="62" height="51" rx="8" fill="#1e293b"/>
    <!-- Head -->
    <circle cx="0" cy="-12" r="29" fill="#fbbf24"/>
    <!-- Hair -->
    <path d="M -21,-17 Q -27,-32 -17,-40 Q 0,-43 17,-40 Q 27,-32 21,-17 Z" fill="#78350f"/>
    <!-- Face details -->
    <circle cx="-8" cy="-15" r="2" fill="#f1f5f9"/>
    <circle cx="8" cy="-15" r="2" fill="#f1f5f9"/>
    <path d="M -6,-5 Q 0,-1 6,-5" stroke="#f1f5f9" stroke-width="2" fill="none" opacity="0.8"/>
    <!-- Phone/device -->
    <rect x="15" y="50" width="28" height="42" rx="4" fill="#334155" stroke="#60a5fa" stroke-width="2"/>
    <rect x="18" y="54" width="22" height="34" fill="#0f172a"/>
    <circle cx="29" cy="90" r="2" fill="#60a5fa"/>
    <!-- Notification dots -->
    <circle cx="24" cy="62" r="2" fill="#a855f7" opacity="0.8"/>
    <circle cx="24" cy="70" r="2" fill="#60a5fa" opacity="0.8"/>
    <circle cx="24" cy="78" r="2" fill="#8b5cf6" opacity="0.8"/>
    <!-- Glow -->
    <circle cx="29" cy="70" r="16" fill="#60a5fa" opacity="0.2"/>
  </g>
  
  <!-- Connected nodes visualization -->
  <g opacity="0.4">
    <circle cx="500" cy="300" r="6" fill="#a855f7" filter="url(#softGlow)"/>
    <circle cx="320" cy="580" r="6" fill="#8b5cf6" filter="url(#softGlow)"/>
    <circle cx="500" cy="600" r="6" fill="#3b82f6" filter="url(#softGlow)"/>
    <circle cx="680" cy="585" r="6" fill="#60a5fa" filter="url(#softGlow)"/>
    
    <line x1="500" y1="300" x2="320" y2="580" stroke="#8b5cf6" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="500" y1="300" x2="500" y2="600" stroke="#3b82f6" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="500" y1="300" x2="680" y2="585" stroke="#60a5fa" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="320" y1="580" x2="500" y2="600" stroke="#a855f7" stroke-width="2" opacity="0.3"/>
    <line x1="500" y1="600" x2="680" y2="585" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Rocket icon - startup journey -->
  <g transform="translate(850, 450)">
    <path d="M 0,-30 L -8,-10 L -5,-10 L -5,10 L 5,10 L 5,-10 L 8,-10 Z" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="0" cy="-25" r="5" fill="#a855f7"/>
    <polygon points="-5,10 -12,18 -5,15" fill="#60a5fa" opacity="0.6"/>
    <polygon points="5,10 12,18 5,15" fill="#3b82f6" opacity="0.6"/>
    <path d="M -2,20 Q 0,28 2,20" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Lightbulb icon - idea -->
  <g transform="translate(150, 450)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
    <path d="M -6,12 L -4,12 L -4,16 L 4,16 L 4,12 L 6,12" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="-15" y1="0" x2="-20" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="0" x2="20" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="0" y2="-20" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="18" fill="#60a5fa" opacity="0.1"/>
  </g>
  
  <!-- Upward trend arrow -->
  <g transform="translate(520, 180)">
    <path d="M 0,40 L 0,0 L -10,10" stroke="#a855f7" stroke-width="3" fill="none" opacity="0.7" filter="url(#softGlow)"/>
    <path d="M 0,0 L 10,10" stroke="#a855f7" stroke-width="3" fill="none" opacity="0.7" filter="url(#softGlow)"/>
    <text x="15" y="5" font-family="sans-serif" font-size="14" fill="#a855f7" font-weight="600">+247%</text>
  </g>
  
  <!-- Floating particles/sparkles for animation potential -->
  <g opacity="0.6">
    <circle cx="400" cy="250" r="2" fill="#a855f7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="280" r="2" fill="#60a5fa">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="200" r="2" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="420" r="2" fill="#3b82f6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="390" r="2" fill="#a855f7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bottom decorative elements -->
  <g opacity="0.3">
    <circle cx="100" cy="950" r="3" fill="#8b5cf6"/>
    <circle cx="200" cy="970" r="2" fill="#60a5fa"/>
    <circle cx="800" cy="960" r="3" fill="#a855f7"/>
    <circle cx="900" cy="940" r="2" fill="#3b82f6"/>
  </g>
</svg>
