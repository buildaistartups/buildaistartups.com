<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters for depth -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="motionBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1 0" />
    </filter>
  </defs>
  
  <!-- Background glow effect -->
  <circle cx="400" cy="400" r="300" fill="url(#glowGradient)" opacity="0.5"/>
  
  <!-- Central Workflow Circle -->
  <g id="centralWorkflow" filter="url(#softShadow)">
    <!-- Main circle background -->
    <circle cx="400" cy="400" r="160" fill="#f0f9ff" stroke="url(#primaryGradient)" stroke-width="3"/>
    
    <!-- Workflow stages circle paths -->
    <g id="workflowStages">
      <!-- SPEC Stage (Top) -->
      <g id="specStage">
        <circle cx="400" cy="260" r="45" fill="#ddd6fe"/>
        <circle cx="400" cy="260" r="45" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Document icon -->
        <rect x="385" y="245" width="30" height="35" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="390" y1="253" x2="405" y2="253" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="390" y1="260" x2="410" y2="260" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="390" y1="267" x2="410" y2="267" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="390" y1="274" x2="403" y2="274" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6">SPEC</text>
      </g>
      
      <!-- CODE Stage (Right) -->
      <g id="codeStage">
        <circle cx="540" cy="400" r="45" fill="#bfdbfe"/>
        <circle cx="540" cy="400" r="45" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Code brackets icon -->
        <path d="M 530 385 L 520 395 L 530 405" fill="none" stroke="#5b8ff6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 550 385 L 560 395 L 550 405" fill="none" stroke="#5b8ff6" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="535" cy="395" r="1.5" fill="#5b8ff6"/>
        <circle cx="540" cy="395" r="1.5" fill="#5b8ff6"/>
        <circle cx="545" cy="395" r="1.5" fill="#5b8ff6"/>
        <text x="540" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5b8ff6">CODE</text>
      </g>
      
      <!-- REVIEW Stage (Bottom) -->
      <g id="reviewStage">
        <circle cx="400" cy="540" r="45" fill="#bae6fd"/>
        <circle cx="400" cy="540" r="45" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Checklist icon -->
        <rect x="385" y="523" width="30" height="35" rx="2" fill="none" stroke="#4f8ff6" stroke-width="2"/>
        <polyline points="390,533 394,537 400,530" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="390,543 394,547 400,540" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="403" y1="533" x2="410" y2="533" stroke="#4f8ff6" stroke-width="1.5"/>
        <line x1="403" y1="543" x2="410" y2="543" stroke="#4f8ff6" stroke-width="1.5"/>
        <text x="400" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4f8ff6">REVIEW</text>
      </g>
      
      <!-- DEPLOY Stage (Left) -->
      <g id="deployStage">
        <circle cx="260" cy="400" r="45" fill="#c7d2fe"/>
        <circle cx="260" cy="400" r="45" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Rocket icon -->
        <path d="M 260 385 L 255 405 L 260 402 L 265 405 Z" fill="#4f7ff6" stroke="#4f7ff6" stroke-width="1.5"/>
        <ellipse cx="260" cy="408" rx="8" ry="4" fill="#ef4444" opacity="0.6"/>
        <circle cx="260" cy="395" r="2" fill="#ffffff"/>
        <!-- Cloud -->
        <ellipse cx="268" cy="388" rx="5" ry="3" fill="#e0e7ff" opacity="0.7"/>
        <ellipse cx="252" cy="388" rx="5" ry="3" fill="#e0e7ff" opacity="0.7"/>
        <text x="260" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4f7ff6">DEPLOY</text>
      </g>
    </g>
    
    <!-- Connecting flow lines with motion blur -->
    <g id="flowLines" opacity="0.6">
      <path d="M 400 305 Q 470 330 495 400" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 495 400 Q 470 470 400 495" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 400 495 Q 330 470 305 400" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 305 400 Q 330 330 400 305" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Approval checkpoints (green checkmarks) -->
    <g id="approvalCheckpoints">
      <circle cx="450" cy="310" r="12" fill="#10b981"/>
      <polyline points="445,310 448,313 455,306" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <circle cx="520" cy="450" r="12" fill="#10b981"/>
      <polyline points="515,450 518,453 525,446" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <circle cx="350" cy="490" r="12" fill="#10b981"/>
      <polyline points="345,490 348,493 355,486" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <circle cx="280" cy="350" r="12" fill="#10b981"/>
      <polyline points="275,350 278,353 285,346" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Quality Gates (Shield icons with metrics) -->
  <g id="qualityGates">
    <g transform="translate(480, 295)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#f59e0b">92%</text>
    </g>
    
    <g transform="translate(315, 515)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#8b5cf6">95%</text>
    </g>
  </g>
  
  <!-- Feature Flags (Toggle switches) -->
  <g id="featureFlags">
    <g transform="translate(170, 460)">
      <rect x="0" y="0" width="30" height="14" rx="7" fill="#10b981" opacity="0.3"/>
      <circle cx="23" cy="7" r="5" fill="#10b981"/>
      <text x="35" y="10" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Flag A</text>
    </g>
    <g transform="translate(170, 480)">
      <rect x="0" y="0" width="30" height="14" rx="7" fill="#d1d5db" opacity="0.3"/>
      <circle cx="7" cy="7" r="5" fill="#9ca3af"/>
      <text x="35" y="10" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Flag B</text>
    </g>
  </g>
  
  <!-- Git Branch Visualization -->
  <g id="gitBranches" opacity="0.5">
    <path d="M 390 320 Q 380 340 380 360" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M 410 320 Q 420 340 420 360" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="390" cy="320" r="3" fill="#8b5cf6"/>
    <circle cx="410" cy="320" r="3" fill="#3b82f6"/>
  </g>
  
  <!-- Connection Lines from Team to Workflow -->
  <g id="connectionLines" opacity="0.5">
    <path d="M 155 185 Q 250 280 345 305" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 645 185 Q 550 280 455 305" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 645 615 Q 550 520 455 495" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 155 615 Q 250 520 345 495" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
  </g>
  
  <!-- Team Members -->
  <!-- Product Manager (Top Left) -->
  <g id="productManager" transform="translate(120, 150)">
    <circle cx="0" cy="0" r="50" fill="#fef3c7" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="16" fill="#d97706"/>
    <!-- Body -->
    <path d="M -20 14 L -14 7 L 14 7 L 20 14 L 20 40 L -20 40 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-24" y="11" width="10" height="20" rx="5" fill="#d97706"/>
    <rect x="14" y="11" width="10" height="20" rx="5" fill="#d97706"/>
    <!-- Document -->
    <rect x="14" y="20" width="28" height="35" rx="2" fill="#c7d2fe" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="19" y1="27" x2="37" y2="27" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="19" y1="33" x2="37" y2="33" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="19" y1="39" x2="37" y2="39" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="19" y1="45" x2="32" y2="45" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Label -->
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3b82f6">Product Manager</text>
  </g>
  
  <!-- UI/UX Designer (Top Right) -->
  <g id="uiDesigner" transform="translate(680, 150)">
    <circle cx="0" cy="0" r="50" fill="#ddd6fe" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="16" fill="#a78bfa"/>
    <!-- Body -->
    <path d="M -20 14 L -14 7 L 14 7 L 20 14 L 20 40 L -20 40 Z" fill="#8b5cf6"/>
    <!-- Arms -->
    <rect x="-24" y="11" width="10" height="20" rx="5" fill="#a78bfa"/>
    <rect x="14" y="11" width="10" height="20" rx="5" fill="#a78bfa"/>
    <!-- Tablet -->
    <rect x="-24" y="25" width="48" height="33" rx="3" fill="#1f2937" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="-20" y="29" width="40" height="25" rx="1" fill="#ffffff"/>
    <!-- Design elements on tablet -->
    <rect x="-16" y="33" width="11" height="11" rx="1" fill="#8b5cf6" opacity="0.5"/>
    <rect x="-3" y="33" width="11" height="5" rx="1" fill="#3b82f6" opacity="0.5"/>
    <rect x="-3" y="40" width="11" height="8" rx="1" fill="#10b981" opacity="0.5"/>
    <circle cx="15" cy="39" r="4" fill="#f59e0b" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3b82f6">UI/UX Designer</text>
  </g>
  
  <!-- Frontend Engineer (Bottom Right) -->
  <g id="frontendEngineer" transform="translate(680, 650)">
    <circle cx="0" cy="0" r="50" fill="#dbeafe" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="16" fill="#60a5fa"/>
    <!-- Body -->
    <path d="M -20 14 L -14 7 L 14 7 L 20 14 L 20 40 L -20 40 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-24" y="11" width="10" height="20" rx="5" fill="#60a5fa"/>
    <rect x="14" y="11" width="10" height="20" rx="5" fill="#60a5fa"/>
    <!-- Laptop -->
    <path d="M -34 35 L -27 20 L 27 20 L 34 35 Z" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-24" y="21" width="48" height="12" rx="1" fill="#0f172a"/>
    <!-- Code on screen -->
    <line x1="-19" y1="24" x2="-8" y2="24" stroke="#10b981" stroke-width="1"/>
    <line x1="-19" y1="27" x2="-3" y2="27" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="-19" y1="30" x2="-11" y2="30" stroke="#3b82f6" stroke-width="1"/>
    <!-- Base -->
    <rect x="-37" y="35" width="74" height="3" rx="1" fill="#374151"/>
    <!-- Label -->
    <text x="20" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3b82f6">Frontend Engineer</text>
  </g>
  
  <!-- DevOps Specialist (Bottom Left) -->
  <g id="devopsSpecialist" transform="translate(120, 650)">
    <circle cx="0" cy="0" r="50" fill="#fecaca" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="16" fill="#f87171"/>
    <!-- Body -->
    <path d="M -20 14 L -14 7 L 14 7 L 20 14 L 20 40 L -20 40 Z" fill="#ef4444"/>
    <!-- Arms -->
    <rect x="-24" y="11" width="10" height="20" rx="5" fill="#f87171"/>
    <rect x="14" y="11" width="10" height="20" rx="5" fill="#f87171"/>
    <!-- Dashboard screen -->
    <rect x="-27" y="20" width="54" height="40" rx="3" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <!-- Dashboard elements -->
    <rect x="-22" y="25" width="44" height="5" rx="1" fill="#10b981" opacity="0.7"/>
    <rect x="-22" y="33" width="20" height="4" rx="1" fill="#8b5cf6" opacity="0.7"/>
    <rect x="-22" y="40" width="27" height="4" rx="1" fill="#3b82f6" opacity="0.7"/>
    <rect x="-22" y="47" width="34" height="4" rx="1" fill="#f59e0b" opacity="0.7"/>
    <circle cx="20" cy="35" r="3" fill="#10b981"/>
    <circle cx="20" cy="42" r="3" fill="#10b981"/>
    <circle cx="20" cy="49" r="3" fill="#ef4444"/>
    <!-- Label -->
    <text x="-20" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3b82f6">DevOps Specialist</text>
  </g>
  
  <!-- Real-time Collaboration Elements -->
  <!-- Shared Cursors -->
  <g id="sharedCursors">
    <g transform="translate(430, 370)">
      <path d="M 0 0 L 0 12 L 4 9 L 6 13 L 8 12 L 6 8 L 10 8 Z" fill="#8b5cf6" filter="url(#softShadow)"/>
      <rect x="12" y="2" width="35" height="12" rx="2" fill="#8b5cf6" opacity="0.9"/>
      <text x="29" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffffff">Sarah</text>
    </g>
    
    <g transform="translate(520, 420)">
      <path d="M 0 0 L 0 12 L 4 9 L 6 13 L 8 12 L 6 8 L 10 8 Z" fill="#3b82f6" filter="url(#softShadow)"/>
      <rect x="12" y="2" width="30" height="12" rx="2" fill="#3b82f6" opacity="0.9"/>
      <text x="27" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffffff">Alex</text>
    </g>
  </g>
  
  <!-- Comment Threads -->
  <g id="commentThreads">
    <g transform="translate(580, 360)">
      <rect x="0" y="0" width="60" height="35" rx="4" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#softShadow)"/>
      <circle cx="8" cy="10" r="4" fill="#8b5cf6"/>
      <rect x="15" y="7" width="35" height="3" rx="1" fill="#e5e7eb"/>
      <rect x="15" y="13" width="25" height="3" rx="1" fill="#e5e7eb"/>
      <circle cx="8" cy="25" r="4" fill="#3b82f6"/>
      <rect x="15" y="22" width="38" height="3" rx="1" fill="#e5e7eb"/>
      <rect x="15" y="28" width="30" height="3" rx="1" fill="#e5e7eb"/>
    </g>
  </g>
  
  <!-- Simultaneous Edit Indicators -->
  <g id="editIndicators">
    <g transform="translate(345, 520)">
      <circle cx="0" cy="0" r="6" fill="#10b981" opacity="0.3">
        <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="4" fill="#10b981"/>
    </g>
    
    <g transform="translate(455, 280)">
      <circle cx="0" cy="0" r="6" fill="#8b5cf6" opacity="0.3">
        <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="4" fill="#8b5cf6"/>
    </g>
  </g>
</svg>
