<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purpleBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
    </linearGradient>
    
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background connecting lines (subtle) -->
  <g opacity="0.15">
    <line x1="150" y1="180" x2="280" y2="250" stroke="url(#purpleGradient)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="650" y1="180" x2="500" y2="250" stroke="url(#blueGradient)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="150" y1="620" x2="300" y2="550" stroke="url(#purpleGradient)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="650" y1="620" x2="500" y2="550" stroke="url(#blueGradient)" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Central Workflow Circle -->
  <circle cx="400" cy="400" r="180" fill="url(#lightPurple)" opacity="0.3"/>
  <circle cx="400" cy="400" r="160" fill="none" stroke="url(#purpleBlueGradient)" stroke-width="3" stroke-dasharray="10,5" opacity="0.5"/>
  
  <!-- Workflow Stage 1: SPEC (Top) -->
  <g transform="translate(370, 260)">
    <circle r="50" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <circle r="48" fill="white" opacity="0.15"/>
    <!-- Document icon -->
    <path d="M -15,-20 L -15,20 L 15,20 L 15,-10 L 5,-20 Z M 5,-20 L 5,-10 L 15,-10" 
          fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="6" x2="8" y2="6" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="12" x2="5" y2="12" stroke="white" stroke-width="2"/>
    <text y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">SPEC</text>
  </g>
  
  <!-- Arrow 1 -->
  <g transform="translate(420, 310) rotate(60)">
    <path d="M 0,0 L 60,0" stroke="url(#purpleBlueGradient)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
    <circle cx="30" cy="0" r="8" fill="#8b5cf6"/>
    <path d="M 30,-3 L 33,0 L 30,3" fill="white" stroke="none"/>
  </g>
  
  <!-- Workflow Stage 2: CODE (Right) -->
  <g transform="translate(510, 400)">
    <circle r="50" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <circle r="48" fill="white" opacity="0.15"/>
    <!-- Code icon -->
    <path d="M -12,-8 L -20,0 L -12,8 M 12,-8 L 20,0 L 12,8" 
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-3" y1="-12" x2="3" y2="12" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">CODE</text>
  </g>
  
  <!-- Arrow 2 -->
  <g transform="translate(460, 450) rotate(150)">
    <path d="M 0,0 L 60,0" stroke="url(#purpleBlueGradient)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="30" cy="0" r="8" fill="#3b82f6"/>
    <path d="M 30,-3 L 33,0 L 30,3" fill="white" stroke="none"/>
  </g>
  
  <!-- Workflow Stage 3: REVIEW (Bottom) -->
  <g transform="translate(400, 540)">
    <circle r="50" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <circle r="48" fill="white" opacity="0.15"/>
    <!-- Magnifying glass icon -->
    <circle cx="-3" cy="-3" r="12" fill="none" stroke="white" stroke-width="3"/>
    <line x1="6" y1="6" x2="15" y2="15" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M -3,-8 L 0,-5 L 3,-8" fill="white" stroke="none"/>
    <text y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">REVIEW</text>
  </g>
  
  <!-- Arrow 3 -->
  <g transform="translate(350, 490) rotate(240)">
    <path d="M 0,0 L 60,0" stroke="url(#purpleBlueGradient)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="30" cy="0" r="8" fill="#8b5cf6"/>
    <path d="M 30,-3 L 33,0 L 30,3" fill="white" stroke="none"/>
  </g>
  
  <!-- Workflow Stage 4: DEPLOY (Left) -->
  <g transform="translate(290, 400)">
    <circle r="50" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <circle r="48" fill="white" opacity="0.15"/>
    <!-- Rocket icon -->
    <path d="M 0,-18 L -8,10 L 0,6 L 8,10 Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="0" cy="-5" r="4" fill="#3b82f6"/>
    <path d="M -12,10 L -8,18 L -6,12 Z" fill="white"/>
    <path d="M 12,10 L 8,18 L 6,12 Z" fill="white"/>
    <text y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">DEPLOY</text>
  </g>
  
  <!-- Arrow 4 (completing the circle) -->
  <g transform="translate(320, 340) rotate(340)">
    <path d="M 0,0 L 60,0" stroke="url(#purpleBlueGradient)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="45" cy="0" r="8" fill="#3b82f6"/>
    <path d="M 45,-3 L 48,0 L 45,3" fill="white" stroke="none"/>
  </g>
  
  <!-- Team Member 1: Product Manager (Top Left) -->
  <g transform="translate(150, 180)">
    <circle cx="0" cy="0" r="55" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="52" fill="white" opacity="0.1"/>
    <!-- Person silhouette -->
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -18,20 Q -18,5 0,5 Q 18,5 18,20 L 15,30 L -15,30 Z" fill="white"/>
    <!-- Lightbulb idea icon -->
    <circle cx="20" cy="-25" r="10" fill="#fbbf24" opacity="0.9"/>
    <path d="M 20,-28 L 20,-35" stroke="#fbbf24" stroke-width="2"/>
    <text y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Product Manager</text>
    <!-- Collaboration indicator -->
    <circle cx="35" cy="35" r="8" fill="#10b981"/>
    <path d="M 32,35 L 35,38 L 40,32" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Team Member 2: Designer (Top Right) -->
  <g transform="translate(650, 180)">
    <circle cx="0" cy="0" r="55" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="52" fill="white" opacity="0.1"/>
    <!-- Person silhouette -->
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -18,20 Q -18,5 0,5 Q 18,5 18,20 L 15,30 L -15,30 Z" fill="white"/>
    <!-- Pen/design tool icon -->
    <g transform="translate(22, -22) rotate(45)">
      <rect x="-2" y="-8" width="4" height="16" fill="#ec4899" rx="2"/>
      <path d="M -3,-8 L 0,-12 L 3,-8" fill="#ec4899"/>
    </g>
    <text y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Designer</text>
    <!-- Collaboration indicator -->
    <circle cx="35" cy="35" r="8" fill="#10b981"/>
    <path d="M 32,35 L 35,38 L 40,32" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Team Member 3: Engineer (Bottom Left) -->
  <g transform="translate(150, 620)">
    <circle cx="0" cy="0" r="55" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="52" fill="white" opacity="0.1"/>
    <!-- Person silhouette -->
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -18,20 Q -18,5 0,5 Q 18,5 18,20 L 15,30 L -15,30 Z" fill="white"/>
    <!-- Laptop/code icon -->
    <rect x="-15" y="-28" width="30" height="18" rx="2" fill="#06b6d4" opacity="0.9"/>
    <rect x="-18" y="-10" width="36" height="3" fill="#06b6d4" opacity="0.9"/>
    <text y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Engineer</text>
    <!-- Collaboration indicator -->
    <circle cx="35" cy="35" r="8" fill="#10b981"/>
    <path d="M 32,35 L 35,38 L 40,32" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Team Member 4: QA Engineer (Bottom Right) -->
  <g transform="translate(650, 620)">
    <circle cx="0" cy="0" r="55" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="52" fill="white" opacity="0.1"/>
    <!-- Person silhouette -->
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -18,20 Q -18,5 0,5 Q 18,5 18,20 L 15,30 L -15,30 Z" fill="white"/>
    <!-- Checkmark shield icon -->
    <path d="M 20,-32 L 25,-28 L 20,-18 L 15,-28 Z" fill="#10b981" opacity="0.9"/>
    <path d="M 17,-25 L 19,-23 L 23,-28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">QA Engineer</text>
    <!-- Collaboration indicator -->
    <circle cx="35" cy="35" r="8" fill="#10b981"/>
    <path d="M 32,35 L 35,38 L 40,32" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Quality Gates (Left side) -->
  <g transform="translate(240, 340)">
    <rect x="-25" y="-30" width="50" height="60" rx="8" fill="url(#purpleGradient)" opacity="0.15" stroke="url(#purpleGradient)" stroke-width="2"/>
    <circle cx="0" cy="-10" r="12" fill="url(#purpleGradient)"/>
    <path d="M -5,-10 L -2,-7 L 5,-15" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Quality</text>
    <text y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Gate</text>
  </g>
  
  <!-- Approval Checkpoint (Right side) -->
  <g transform="translate(560, 460)">
    <rect x="-25" y="-30" width="50" height="60" rx="8" fill="url(#blueGradient)" opacity="0.15" stroke="url(#blueGradient)" stroke-width="2"/>
    <circle cx="0" cy="-10" r="12" fill="url(#blueGradient)"/>
    <path d="M -5,-10 L -2,-7 L 5,-15" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Approval</text>
    <text y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Check</text>
  </g>
  
  <!-- Feature Flags (Top) -->
  <g transform="translate(450, 240)">
    <rect x="-28" y="-25" width="56" height="50" rx="8" fill="url(#purpleBlueGradient)" opacity="0.15" stroke="url(#purpleBlueGradient)" stroke-width="2"/>
    <g transform="translate(-8, -5)">
      <rect x="0" y="-8" width="16" height="10" rx="5" fill="#94a3b8"/>
      <circle cx="11" cy="-3" r="4" fill="white"/>
    </g>
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Feature Flags</text>
  </g>
  
  <!-- Central Collaboration Hub -->
  <g transform="translate(400, 400)">
    <circle r="35" fill="white" opacity="0.9" filter="url(#shadow)"/>
    <circle r="32" fill="url(#purpleBlueGradient)"/>
    <!-- Connected nodes icon -->
    <circle cx="-10" cy="-10" r="4" fill="white"/>
    <circle cx="10" cy="-10" r="4" fill="white"/>
    <circle cx="0" cy="8" r="4" fill="white"/>
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="white" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="0" y2="8" stroke="white" stroke-width="2"/>
    <line x1="10" y1="-10" x2="0" y2="8" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Collaboration Indicators (animated dots) -->
  <circle cx="305" cy="310" r="6" fill="#10b981" opacity="0.8"/>
  <circle cx="475" cy="345" r="6" fill="#10b981" opacity="0.8"/>
  <circle cx="325" cy="490" r="6" fill="#10b981" opacity="0.8"/>
  <circle cx="475" cy="490" r="6" fill="#10b981" opacity="0.8"/>
  
  <!-- Bottom label -->
  <text x="400" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6366f1">Collaborative Product Development Workflow</text>
</svg>
