<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Colors -->
    <style type="text/css">
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 700; fill: #111827; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 600; fill: #111827; }
      .text  { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 500; fill: #374151; }
      .tiny  { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 600; fill: #6B7280; font-size: 12px; }
      .pill  { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 700; fill: white; font-size: 12px; }
      .mono  { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #6B7280; }
    </style>

    <!-- Arrowheads -->
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6E56CF"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>

    <!-- Human icon -->
    <g id="icon-human">
      <circle cx="12" cy="10" r="6" fill="#6E56CF"/>
      <path d="M2 26c2.8-6 7.3-8 10-8s7.2 2 10 8" stroke="#6E56CF" stroke-width="3" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Automation gear icon -->
    <g id="icon-gear">
      <circle cx="16" cy="16" r="5.5" stroke="#2563EB" stroke-width="3" fill="none"/>
      <g stroke="#2563EB" stroke-width="3" stroke-linecap="round">
        <line x1="16" y1="4" x2="16" y2="10"/>
        <line x1="28" y1="16" x2="22" y2="16"/>
        <line x1="16" y1="28" x2="16" y2="22"/>
        <line x1="4"  y1="16" x2="10" y2="16"/>
        <line x1="24.5" y1="7.5" x2="20.8" y2="11.2"/>
        <line x1="24.5" y1="24.5" x2="20.8" y2="20.8"/>
        <line x1="7.5" y1="24.5" x2="11.2" y2="20.8"/>
        <line x1="7.5" y1="7.5"  x2="11.2" y2="11.2"/>
      </g>
    </g>

    <!-- Toggle components -->
    <g id="toggle-on-blue">
      <rect x="0" y="0" rx="16" ry="16" width="64" height="32" fill="#2563EB" opacity="1"/>
      <circle cx="48" cy="16" r="12" fill="white"/>
    </g>
    <g id="toggle-on-purple">
      <rect x="0" y="0" rx="16" ry="16" width="64" height="32" fill="#6E56CF" opacity="1"/>
      <circle cx="48" cy="16" r="12" fill="white"/>
    </g>
    <g id="toggle-off">
      <rect x="0" y="0" rx="16" ry="16" width="64" height="32" fill="#E5E7EB"/>
      <circle cx="16" cy="16" r="12" fill="white" stroke="#9CA3AF"/>
    </g>

    <!-- Node styles -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Heading -->
  <g transform="translate(70,50)">
    <text class="title" font-size="36">Mode Comparison</text>
    <text class="mono" font-size="14" x="0" y="40">&lt;Copilot&gt; human-in-the-loop • &lt;Autopilot&gt; fully automated</text>
  </g>

  <!-- Column labels -->
  <g transform="translate(70,120)">
    <rect x="0" y="-20" width="595" height="780" rx="24" fill="#6E56CF" opacity="0.06"/>
    <text class="label" font-size="24" x="0" y="0">Copilot</text>
    <g transform="translate(100,-18)">
      <use href="#toggle-on-purple"/>
      <text class="tiny" x="76" y="20">Human-in-the-loop</text>
    </g>
  </g>

  <g transform="translate(735,120)">
    <rect x="0" y="-20" width="595" height="780" rx="24" fill="#2563EB" opacity="0.06"/>
    <text class="label" font-size="24" x="0" y="0">Autopilot</text>
    <g transform="translate(100,-18)">
      <use href="#toggle-on-blue"/>
      <text class="tiny" x="76" y="20">Full automation</text>
    </g>
  </g>

  <!-- Copilot lane -->
  <g transform="translate(70,170)">
    <!-- Swimlane title -->
    <text class="tiny" x="0" y="-16">WORKFLOW</text>

    <!-- Nodes -->
    <g filter="url(#soft-shadow)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">1. Input</text>
      <text class="text" font-size="14" x="20" y="50">Task/request captured</text>
    </g>

    <line x1="245" y1="36" x2="320" y2="36" stroke="#6E56CF" stroke-width="4" marker-end="url(#arrow-purple)"/>

    <g filter="url(#soft-shadow)" transform="translate(320,0)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">2. AI Suggestion</text>
      <text class="text" font-size="14" x="20" y="50">Draft plan / action</text>
      <use href="#icon-human" transform="translate(185,18) scale(0.8)"/>
    </g>

    <line x1="565" y1="36" x2="640" y2="36" stroke="#6E56CF" stroke-width="4" marker-end="url(#arrow-purple)"/>

    <g filter="url(#soft-shadow)" transform="translate(640,-10)">
      <rect x="0" y="0" width="240" height="92" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">3. Human Approval</text>
      <text class="text" font-size="14" x="20" y="50">Review, edit, approve</text>
      <g transform="translate(20,58)">
        <use href="#toggle-on-purple"/>
        <text class="tiny" x="76" y="20">Approval required</text>
      </g>
      <use href="#icon-human" transform="translate(190,16) scale(0.9)"/>
    </g>

    <line x1="885" y1="36" x2="960" y2="36" stroke="#6E56CF" stroke-width="4" marker-end="url(#arrow-purple)"/>

    <g filter="url(#soft-shadow)" transform="translate(960,0)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">4. Execute</text>
      <text class="text" font-size="14" x="20" y="50">Run approved action</text>
    </g>

    <line x1="1205" y1="36" x2="1280" y2="36" stroke="#6E56CF" stroke-width="4" marker-end="url(#arrow-purple)"/>

    <g filter="url(#soft-shadow)" transform="translate(1280,0)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">5. Monitor &amp; Feedback</text>
      <text class="text" font-size="14" x="20" y="50">User provides outcome</text>
      <use href="#icon-human" transform="translate(190,14) scale(0.9)"/>
    </g>
  </g>

  <!-- Autopilot lane -->
  <g transform="translate(735,170)">
    <text class="tiny" x="0" y="-16">WORKFLOW</text>

    <g filter="url(#soft-shadow)">
      <rect x="0" y="120" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="148">1. Input</text>
      <text class="text" font-size="14" x="20" y="170">Signals / triggers</text>
    </g>

    <line x1="245" y1="156" x2="320" y2="156" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow-blue)"/>

    <g filter="url(#soft-shadow)" transform="translate(320,120)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">2. AI Decision</text>
      <text class="text" font-size="14" x="20" y="50">Choose action</text>
      <use href="#icon-gear" transform="translate(184,8) scale(0.9)"/>
    </g>

    <line x1="565" y1="156" x2="640" y2="156" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow-blue)"/>

    <g filter="url(#soft-shadow)" transform="translate(640,100)">
      <rect x="0" y="0" width="240" height="92" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">3. Auto Execute</text>
      <text class="text" font-size="14" x="20" y="50">Perform action immediately</text>
      <g transform="translate(20,58)">
        <use href="#toggle-on-blue"/>
        <text class="tiny" x="76" y="20">No approval needed</text>
      </g>
      <use href="#icon-gear" transform="translate(190,8) scale(0.9)"/>
    </g>

    <line x1="885" y1="156" x2="960" y2="156" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow-blue)"/>

    <g filter="url(#soft-shadow)" transform="translate(960,120)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">4. Auto Verify</text>
      <text class="text" font-size="14" x="20" y="50">Self-check &amp; retry</text>
      <use href="#icon-gear" transform="translate(192,6) scale(0.85)"/>
    </g>

    <line x1="1205" y1="156" x2="1280" y2="156" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow-blue)"/>

    <g filter="url(#soft-shadow)" transform="translate(1280,120)">
      <rect x="0" y="0" width="240" height="72" rx="16" fill="white" stroke="#D1D5DB"/>
      <text class="label" font-size="16" x="20" y="28">5. Report</text>
      <text class="text" font-size="14" x="20" y="50">Outcome &amp; metrics</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(70,820)">
    <g transform="translate(0,0)">
      <rect x="0" y="-24" width="460" height="40" rx="12" fill="#F3F4F6" opacity="0.9"/>
      <use href="#icon-human" transform="translate(14,2) scale(0.8)"/>
      <text class="tiny" x="60" y="4">Human involvement</text>
      <use href="#icon-gear" transform="translate(210,-6) scale(0.8)"/>
      <text class="tiny" x="256" y="4">Automation</text>
      <rect x="360" y="-10" width="18" height="6" rx="3" fill="#6E56CF"/><text class="tiny" x="386" y="4">Copilot</text>
      <rect x="450" y="-10" width="18" height="6" rx="3" fill="#2563EB"/><text class="tiny" x="476" y="4">Autopilot</text>
    </g>
  </g>
</svg>
