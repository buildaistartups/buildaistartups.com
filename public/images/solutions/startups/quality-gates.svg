<defs>
  <linearGradient id="gradPB" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#6C63FF" stop-opacity="1"/>
<stop offset="100%" stop-color="#36B0FF" stop-opacity="1"/>
</linearGradient>
  <linearGradient id="gradGauge" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#5B52F2" stop-opacity="1"/>
<stop offset="100%" stop-color="#2563EB" stop-opacity="1"/>
</linearGradient>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
  </filter>
  <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feOffset dx="0" dy="2"/>
    <feGaussianBlur stdDeviation="2" result="offset-blur"/>
    <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
    <feFlood flood-color="#000000" flood-opacity="0.2" result="color"/>
    <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
    <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
  </filter>
  <style>
    .title { font: 700 38px "Inter", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 500 18px "Inter", "Segoe UI", Arial, sans-serif; fill: #475569; }
    .label { font: 600 20px "Inter", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .value { font: 700 24px "Inter", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .small { font: 500 14px "Inter", "Segoe UI", Arial, sans-serif; fill: #475569; }
    .muted { font: 500 14px "Inter", "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .badge { font: 700 14px "Inter", "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
  </style>
</defs>


