<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="640" height="360" fill="#0f172a"/>
  
  <!-- Left Sidebar -->
  <rect x="0" y="0" width="180" height="360" fill="#1e293b"/>
  
  <!-- Sidebar Header -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f1f5f9">Documentation</text>
  
  <!-- Sidebar Navigation Tree -->
  <g id="nav-tree">
    <!-- Getting Started Section -->
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">▼ Getting Started</text>
    <text x="35" y="78" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4">Introduction</text>
    <text x="35" y="93" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">Installation</text>
    <text x="35" y="108" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">Quick Start</text>
    
    <!-- API Reference Section -->
    <text x="20" y="133" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">▼ API Reference</text>
    <text x="35" y="151" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">Authentication</text>
    <text x="35" y="166" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">Endpoints</text>
    <text x="35" y="181" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">Rate Limits</text>
    
    <!-- Guides Section -->
    <text x="20" y="206" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">▶ Guides</text>
    <text x="20" y="231" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">▶ Examples</text>
  </g>
  
  <!-- Main Content Area -->
  <rect x="180" y="0" width="460" height="360" fill="#0f172a"/>
  
  <!-- Content Header -->
  <text x="210" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">Introduction</text>
  <line x1="210" y1="42" x2="610" y2="42" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Content Text -->
  <text x="210" y="65" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">Welcome to our documentation platform. This guide will help you</text>
  <text x="210" y="80" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">get started with our API and understand core concepts.</text>
  
  <!-- Subheading -->
  <text x="210" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#06b6d4">Installation</text>
  
  <!-- Code Block -->
  <rect x="210" y="115" width="390" height="70" rx="6" fill="#1e293b"/>
  <text x="220" y="133" font-family="Courier New, monospace" font-size="9" fill="#f1f5f9">npm install</text>
  <text x="278" y="133" font-family="Courier New, monospace" font-size="9" fill="#06b6d4">@docs/sdk</text>
  <text x="220" y="150" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">// or using yarn</text>
  <text x="220" y="167" font-family="Courier New, monospace" font-size="9" fill="#f1f5f9">yarn add</text>
  <text x="268" y="167" font-family="Courier New, monospace" font-size="9" fill="#06b6d4">@docs/sdk</text>
  
  <!-- More Content -->
  <text x="210" y="205" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">After installation, you can import and initialize the SDK:</text>
  
  <!-- Second Code Block -->
  <rect x="210" y="215" width="390" height="55" rx="6" fill="#1e293b"/>
  <text x="220" y="233" font-family="Courier New, monospace" font-size="9" fill="#c084fc">import</text>
  <text x="254" y="233" font-family="Courier New, monospace" font-size="9" fill="#f1f5f9">{ DocsSDK }</text>
  <text x="326" y="233" font-family="Courier New, monospace" font-size="9" fill="#c084fc">from</text>
  <text x="360" y="233" font-family="Courier New, monospace" font-size="9" fill="#34d399">'@docs/sdk'</text>
  <text x="220" y="250" font-family="Courier New, monospace" font-size="9" fill="#c084fc">const</text>
  <text x="254" y="250" font-family="Courier New, monospace" font-size="9" fill="#f1f5f9">sdk =</text>
  <text x="288" y="250" font-family="Courier New, monospace" font-size="9" fill="#c084fc">new</text>
  <text x="310" y="250" font-family="Courier New, monospace" font-size="9" fill="#fbbf24">DocsSDK</text>
  <text x="364" y="250" font-family="Courier New, monospace" font-size="9" fill="#f1f5f9">()</text>
  
  <!-- SEO Optimization Panel Overlay -->
  <g id="seo-panel">
    <rect x="250" y="70" width="320" height="180" rx="8" fill="#1e293b" opacity="0.98"/>
    <rect x="250" y="70" width="320" height="180" rx="8" fill="none" stroke="#334155" stroke-width="1"/>
    
    <!-- Panel Header -->
    <rect x="250" y="70" width="320" height="35" rx="8" fill="#334155"/>
    <text x="265" y="92" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f1f5f9">SEO Optimization</text>
    <circle cx="555" cy="87" r="4" fill="#ef4444"/>
    
    <!-- Content Score -->
    <text x="265" y="120" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Content Score</text>
    <text x="520" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#06b6d4">95/100</text>
    
    <!-- Progress Bar -->
    <rect x="265" y="127" width="290" height="8" rx="4" fill="#334155"/>
    <rect x="265" y="127" width="275" height="8" rx="4" fill="#06b6d4"/>
    
    <!-- Meta Tags Section -->
    <text x="265" y="153" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Meta Tags</text>
    <text x="265" y="168" font-family="Arial, sans-serif" font-size="8" fill="#cbd5e1">✓ Title optimized (58 chars)</text>
    <text x="265" y="181" font-family="Arial, sans-serif" font-size="8" fill="#cbd5e1">✓ Description present (145 chars)</text>
    <text x="265" y="194" font-family="Arial, sans-serif" font-size="8" fill="#cbd5e1">✓ Open Graph tags configured</text>
    
    <!-- Keyword Density -->
    <text x="265" y="217" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Keyword Density</text>
    <text x="265" y="232" font-family="Arial, sans-serif" font-size="8" fill="#cbd5e1">documentation: 3.2%</text>
    <text x="380" y="232" font-family="Arial, sans-serif" font-size="8" fill="#cbd5e1">API: 2.8%</text>
  </g>
  
  <!-- Changelog Widget -->
  <g id="changelog">
    <rect x="445" y="285" width="180" height="65" rx="6" fill="#1e293b" opacity="0.95"/>
    <rect x="445" y="285" width="180" height="65" rx="6" fill="none" stroke="#334155" stroke-width="1"/>
    
    <!-- Widget Header -->
    <text x="455" y="301" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f1f5f9">Recent Updates</text>
    
    <!-- Changelog Items -->
    <circle cx="460" cy="315" r="2" fill="#06b6d4"/>
    <text x="468" y="318" font-family="Arial, sans-serif" font-size="7" fill="#cbd5e1">v2.1.0 - New API endpoints</text>
    
    <circle cx="460" cy="328" r="2" fill="#06b6d4"/>
    <text x="468" y="331" font-family="Arial, sans-serif" font-size="7" fill="#cbd5e1">v2.0.5 - Bug fixes</text>
    
    <circle cx="460" cy="341" r="2" fill="#06b6d4"/>
    <text x="468" y="344" font-family="Arial, sans-serif" font-size="7" fill="#cbd5e1">v2.0.4 - Performance improvements</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="625" cy="15" r="3" fill="#06b6d4" opacity="0.3"/>
  <circle cx="615" cy="345" r="2" fill="#06b6d4" opacity="0.2"/>
</svg>
