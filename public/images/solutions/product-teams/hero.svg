<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters for depth -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="motionBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1 0" />
    </filter>
  </defs>
  
  <!-- Background glow effect -->
  <circle cx="512" cy="288" r="400" fill="url(#glowGradient)" opacity="0.5"/>
  
  <!-- Central Workflow Circle -->
  <g id="centralWorkflow" filter="url(#softShadow)">
    <!-- Main circle background -->
    <circle cx="512" cy="288" r="225" fill="#e0f2fe" stroke="url(#primaryGradient)" stroke-width="3"/>
    
    <!-- Workflow stages circle paths -->
    <g id="workflowStages">
      <!-- SPEC Stage (Top) -->
      <g id="specStage">
        <circle cx="512" cy="109" r="63" fill="#ddd6fe"/>
        <circle cx="512" cy="109" r="63" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Document icon -->
        <rect x="489" y="86" width="46" height="53" rx="3" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
        <line x1="495" y1="97" x2="524" y2="97" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="495" y1="109" x2="532" y2="109" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="495" y1="121" x2="532" y2="121" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="495" y1="133" x2="521" y2="133" stroke="#8b5cf6" stroke-width="2"/>
        <text x="512" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">SPEC</text>
      </g>
      
      <!-- CODE Stage (Right) -->
      <g id="codeStage">
        <circle cx="712" cy="288" r="63" fill="#bfdbfe"/>
        <circle cx="712" cy="288" r="63" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Code brackets icon -->
        <path d="M 697 266 L 682 284 L 697 302" fill="none" stroke="#5b8ff6" stroke-width="4" stroke-linecap="round"/>
        <path d="M 727 266 L 742 284 L 727 302" fill="none" stroke="#5b8ff6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="703" cy="284" r="3" fill="#5b8ff6"/>
        <circle cx="712" cy="284" r="3" fill="#5b8ff6"/>
        <circle cx="721" cy="284" r="3" fill="#5b8ff6"/>
        <text x="712" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5b8ff6">CODE</text>
      </g>
      
      <!-- REVIEW Stage (Bottom) -->
      <g id="reviewStage">
        <circle cx="512" cy="467" r="63" fill="#bae6fd"/>
        <circle cx="512" cy="467" r="63" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Checklist icon -->
        <rect x="489" y="444" width="46" height="53" rx="3" fill="none" stroke="#4f8ff6" stroke-width="2.5"/>
        <polyline points="495,458 501,464 513,451" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="495,475 501,481 513,468" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="517" y1="458" x2="527" y2="458" stroke="#4f8ff6" stroke-width="2"/>
        <line x1="517" y1="475" x2="527" y2="475" stroke="#4f8ff6" stroke-width="2"/>
        <text x="512" y="513" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f8ff6">REVIEW</text>
      </g>
      
      <!-- DEPLOY Stage (Left) -->
      <g id="deployStage">
        <circle cx="312" cy="288" r="63" fill="#c7d2fe"/>
        <circle cx="312" cy="288" r="63" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Rocket icon -->
        <path d="M 312 264 L 305 297 L 312 292 L 319 297 Z" fill="#4f7ff6" stroke="#4f7ff6" stroke-width="2"/>
        <ellipse cx="312" cy="304" rx="13" ry="6" fill="#ef4444" opacity="0.6"/>
        <circle cx="312" cy="279" r="4" fill="#ffffff"/>
        <!-- Cloud -->
        <ellipse cx="324" cy="265" rx="8" ry="5" fill="#e0e7ff" opacity="0.7"/>
        <ellipse cx="300" cy="265" rx="8" ry="5" fill="#e0e7ff" opacity="0.7"/>
        <text x="312" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f7ff6">DEPLOY</text>
      </g>
    </g>
    
    <!-- Connecting flow lines with motion blur -->
    <g id="flowLines" opacity="0.6">
      <path d="M 512 172 Q 612 230 649 288" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 649 288 Q 612 346 512 404" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 512 404 Q 412 346 375 288" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 375 288 Q 412 230 512 172" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Quality Gates (Shield icons with metrics) -->
  <g id="qualityGates">
    <g transform="translate(630, 154)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#f59e0b">92%</text>
    </g>
    
    <g transform="translate(359, 428)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#8b5cf6">95%</text>
    </g>
  </g>
  
  <!-- Integration Lines (connecting team members to workflow) -->
  <g id="integrationLines" opacity="0.3">
    <path d="M 100 150 Q 306 181 462 172" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 924 150 Q 718 181 562 172" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 924 422 Q 718 431 562 404" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 100 419 Q 306 431 462 404" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
  </g>
  
  <!-- Team Members -->
  <!-- Product Manager (Top Left) -->
  <g id="productManager" transform="translate(100, 75)">
    <circle cx="0" cy="0" r="75" fill="#fef3c7" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#d97706"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#d97706"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#d97706"/>
    <!-- Document -->
    <rect x="21" y="29" width="41" height="51" rx="3" fill="#c7d2fe" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="39" x2="55" y2="39" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="50" x2="55" y2="50" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="59" x2="55" y2="59" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="68" x2="49" y2="68" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Label -->
    <text x="0" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#3b82f6">Product Manager</text>
  </g>
  
  <!-- UI/UX Designer (Top Right) -->
  <g id="uiDesigner" transform="translate(924, 75)">
    <circle cx="0" cy="0" r="75" fill="#ddd6fe" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#a78bfa"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#8b5cf6"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#a78bfa"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#a78bfa"/>
    <!-- Tablet -->
    <rect x="-36" y="36" width="71" height="50" rx="5" fill="#1f2937" stroke="#8b5cf6" stroke-width="2.5"/>
    <rect x="-30" y="43" width="59" height="39" rx="1" fill="#ffffff"/>
    <!-- Design elements on tablet -->
    <rect x="-24" y="50" width="16" height="16" rx="1" fill="#8b5cf6" opacity="0.5"/>
    <rect x="-4" y="50" width="16" height="9" rx="1" fill="#3b82f6" opacity="0.5"/>
    <rect x="-4" y="60" width="16" height="14" rx="1" fill="#10b981" opacity="0.5"/>
    <circle cx="24" cy="59" r="6" fill="#f59e0b" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#3b82f6">UI/UX Designer</text>
  </g>
  
  <!-- Frontend Engineer (Bottom Right) -->
  <g id="frontendEngineer" transform="translate(924, 497)">
    <circle cx="0" cy="0" r="75" fill="#dbeafe" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#60a5fa"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#60a5fa"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#60a5fa"/>
    <!-- Laptop -->
    <path d="M -50 54 L -40 29 L 40 29 L 50 54 Z" fill="#1f2937" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="-36" y="30" width="71" height="20" rx="1" fill="#0f172a"/>
    <!-- Code on screen -->
    <line x1="-29" y1="35" x2="-14" y2="35" stroke="#10b981" stroke-width="2"/>
    <line x1="-29" y1="40" x2="-5" y2="40" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="-29" y1="46" x2="-16" y2="46" stroke="#3b82f6" stroke-width="2"/>
    <!-- Base -->
    <rect x="-55" y="54" width="110" height="5" rx="1" fill="#374151"/>
    <!-- Label -->
    <text x="14" y="-90" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#3b82f6">Frontend Engineer</text>
  </g>
  
  <!-- DevOps Specialist (Bottom Left) -->
  <g id="devopsSpecialist" transform="translate(100, 494)">
    <circle cx="0" cy="0" r="75" fill="#fecaca" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#f87171"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#ef4444"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#f87171"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#f87171"/>
    <!-- Dashboard screen -->
    <rect x="-40" y="20" width="80" height="60" rx="5" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5"/>
    <!-- Dashboard elements -->
    <rect x="-34" y="27" width="65" height="9" rx="1" fill="#10b981" opacity="0.7"/>
    <rect x="-34" y="41" width="30" height="6" rx="1" fill="#8b5cf6" opacity="0.7"/>
    <rect x="-34" y="51" width="40" height="6" rx="1" fill="#3b82f6" opacity="0.7"/>
    <rect x="-34" y="61" width="50" height="6" rx="1" fill="#f59e0b" opacity="0.7"/>
    <circle cx="30" cy="45" r="5" fill="#10b981"/>
    <circle cx="30" cy="55" r="5" fill="#10b981"/>
    <circle cx="30" cy="65" r="5" fill="#ef4444"/>
    <!-- Label -->
    <text x="-15" y="-90" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#3b82f6">DevOps Specialist</text>
  </g>
  
  <!-- Real-time Collaboration Elements -->
  <!-- Shared Cursors -->
  <g id="sharedCursors">
    <g transform="translate(520, 215)">
      <path d="M 0 0 L 0 14 L 5 10 L 6 14 L 9 13 L 6 9 L 11 9 Z" fill="#8b5cf6" filter="url(#softShadow)"/>
      <rect x="14" y="1" width="38" height="14" rx="2" fill="#8b5cf6" opacity="0.9"/>
      <text x="33" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Sarah</text>
    </g>
    
    <g transform="translate(690, 306)">
      <path d="M 0 0 L 0 14 L 5 10 L 6 14 L 9 13 L 6 9 L 11 9 Z" fill="#3b82f6" filter="url(#softShadow)"/>
      <rect x="14" y="1" width="33" height="14" rx="2" fill="#3b82f6" opacity="0.9"/>
      <text x="30" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Alex</text>
    </g>
  </g>
  
  <!-- Comment Threads -->
  <g id="commentThreads">
    <g transform="translate(740, 235)">
      <rect x="0" y="0" width="73" height="45" rx="5" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" filter="url(#softShadow)"/>
      <circle cx="10" cy="13" r="5" fill="#8b5cf6"/>
      <rect x="19" y="9" width="45" height="4" rx="1" fill="#e5e7eb"/>
      <rect x="19" y="16" width="33" height="4" rx="1" fill="#e5e7eb"/>
      <circle cx="10" cy="33" r="5" fill="#3b82f6"/>
      <rect x="19" y="29" width="49" height="4" rx="1" fill="#e5e7eb"/>
      <rect x="19" y="36" width="39" height="4" rx="1" fill="#e5e7eb"/>
    </g>
  </g>
  
  <!-- Simultaneous Edit Indicators -->
  <g id="editIndicators">
    <g transform="translate(390, 440)">
      <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.3">
        <animate attributeName="r" values="8;13;8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="5" fill="#10b981"/>
    </g>
    
    <g transform="translate(634, 136)">
      <circle cx="0" cy="0" r="8" fill="#8b5cf6" opacity="0.3">
        <animate attributeName="r" values="8;13;8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="5" fill="#8b5cf6"/>
    </g>
  </g>
</svg>
