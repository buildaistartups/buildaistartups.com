<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Title -->
    <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">
        4-Week Pilot Progression
    </text>
    
    <!-- Main Timeline Bar -->
    <defs>
        <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <line x1="80" y1="80" x2="520" y2="80" stroke="url(#timelineGradient)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Week 1: Kickoff -->
    <circle cx="80" cy="80" r="12" fill="#7C3AED"/>
    <circle cx="80" cy="80" r="8" fill="white"/>
    
    <text x="80" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7C3AED" text-anchor="middle">
        Week 1
    </text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">
        Kickoff
    </text>
    
    <rect x="30" y="140" width="100" height="80" rx="6" fill="#f3e8ff" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="80" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7C3AED" text-anchor="middle">
        MILESTONES
    </text>
    <text x="35" y="173" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Team alignment
    </text>
    <text x="35" y="186" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Scope definition
    </text>
    <text x="35" y="199" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Resource allocation
    </text>
    <text x="35" y="212" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Success criteria set
    </text>
    
    <!-- Week 2: Build -->
    <circle cx="227" cy="80" r="12" fill="#8B5CF6"/>
    <circle cx="227" cy="80" r="8" fill="white"/>
    
    <text x="227" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">
        Week 2
    </text>
    <text x="227" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">
        Build
    </text>
    
    <rect x="177" y="140" width="100" height="80" rx="6" fill="#ede9fe" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="227" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6" text-anchor="middle">
        DELIVERABLES
    </text>
    <text x="182" y="173" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Core features dev
    </text>
    <text x="182" y="186" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Integration testing
    </text>
    <text x="182" y="199" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Documentation
    </text>
    <text x="182" y="212" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • QA checkpoint
    </text>
    
    <!-- Week 3: Deploy -->
    <circle cx="373" cy="80" r="12" fill="#3B82F6"/>
    <circle cx="373" cy="80" r="8" fill="white"/>
    
    <text x="373" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3B82F6" text-anchor="middle">
        Week 3
    </text>
    <text x="373" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">
        Deploy
    </text>
    
    <rect x="323" y="140" width="100" height="80" rx="6" fill="#dbeafe" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="373" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3B82F6" text-anchor="middle">
        ACTIVITIES
    </text>
    <text x="328" y="173" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • User onboarding
    </text>
    <text x="328" y="186" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Live deployment
    </text>
    <text x="328" y="199" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Monitor metrics
    </text>
    <text x="328" y="212" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Gather feedback
    </text>
    
    <!-- Week 4: Results -->
    <circle cx="520" cy="80" r="12" fill="#06B6D4"/>
    <circle cx="520" cy="80" r="8" fill="white"/>
    
    <text x="520" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#06B6D4" text-anchor="middle">
        Week 4
    </text>
    <text x="520" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">
        Results
    </text>
    
    <rect x="470" y="140" width="100" height="80" rx="6" fill="#cffafe" stroke="#06B6D4" stroke-width="1.5"/>
    <text x="520" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#06B6D4" text-anchor="middle">
        SUCCESS METRICS
    </text>
    <text x="475" y="173" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Performance data
    </text>
    <text x="475" y="186" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • User satisfaction
    </text>
    <text x="475" y="199" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • ROI analysis
    </text>
    <text x="475" y="212" font-family="Arial, sans-serif" font-size="9" fill="#1e293b">
        • Next phase plan
    </text>
    
    <!-- Team Activities Bar -->
    <rect x="50" y="250" width="500" height="120" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="300" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">
        TEAM ACTIVITIES &amp; KEY OUTCOMES
    </text>
    
    <!-- Team Activity Icons and Text -->
    <g>
        <!-- Week 1 Activities -->
        <circle cx="90" cy="295" r="4" fill="#7C3AED"/>
        <text x="100" y="299" font-family="Arial, sans-serif" font-size="9" fill="#334155">
            Project charter signed
        </text>
        
        <!-- Week 2 Activities -->
        <circle cx="90" cy="315" r="4" fill="#8B5CF6"/>
        <text x="100" y="319" font-family="Arial, sans-serif" font-size="9" fill="#334155">
            Development sprints
        </text>
        
        <!-- Week 3 Activities -->
        <circle cx="320" cy="295" r="4" fill="#3B82F6"/>
        <text x="330" y="299" font-family="Arial, sans-serif" font-size="9" fill="#334155">
            Production rollout
        </text>
        
        <!-- Week 4 Activities -->
        <circle cx="320" cy="315" r="4" fill="#06B6D4"/>
        <text x="330" y="319" font-family="Arial, sans-serif" font-size="9" fill="#334155">
            Executive presentation
        </text>
    </g>
    
    <!-- Key Metrics Summary -->
    <rect x="60" y="335" width="120" height="26" rx="4" fill="#7C3AED" opacity="0.1"/>
    <text x="120" y="350" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#7C3AED" text-anchor="middle">
        Timeline: 4 weeks
    </text>
    
    <rect x="200" y="335" width="120" height="26" rx="4" fill="#3B82F6" opacity="0.1"/>
    <text x="260" y="350" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#3B82F6" text-anchor="middle">
        Team: Cross-functional
    </text>
    
    <rect x="340" y="335" width="140" height="26" rx="4" fill="#06B6D4" opacity="0.1"/>
    <text x="410" y="350" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#06B6D4" text-anchor="middle">
        Goal: Validate &amp; Scale
    </text>
</svg>
