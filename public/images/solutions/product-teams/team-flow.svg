<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pmGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="designGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="engGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7C3AED" opacity="0.6"/>
    </marker>
  </defs>
  
  <!-- Background workflow stages -->
  <g opacity="0.1">
    <rect x="50" y="50" width="200" height="300" fill="#7C3AED" rx="8"/>
    <rect x="300" y="50" width="200" height="300" fill="#3B82F6" rx="8"/>
    <rect x="550" y="50" width="200" height="300" fill="#6366F1" rx="8"/>
  </g>
  
  <!-- Workflow stage labels -->
  <text x="150" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#7C3AED" text-anchor="middle">DRAFT</text>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3B82F6" text-anchor="middle">REVIEW</text>
  <text x="650" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">APPROVED</text>
  
  <!-- Connection lines from roles to center -->
  <line x1="160" y1="150" x2="320" y2="200" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="115" x2="400" y2="170" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" marker-end="url(#arrowhead)"/>
  <line x1="640" y1="150" x2="480" y2="200" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" marker-end="url(#arrowhead)"/>
  
  <!-- Central Spec DSL Document -->
  <g id="central-doc">
    <rect x="320" y="180" width="160" height="120" fill="url(#docGradient)" rx="8" stroke="#6366F1" stroke-width="2"/>
    <text x="400" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Spec DSL</text>
    <text x="400" y="230" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">Central Document</text>
    
    <!-- Document icon -->
    <path d="M 370 250 L 370 275 L 430 275 L 430 250 L 420 250 L 420 240 L 370 240 Z" fill="white" opacity="0.3"/>
    <line x1="375" y1="255" x2="415" y2="255" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="375" y1="262" x2="425" y2="262" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="375" y1="269" x2="420" y2="269" stroke="white" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- PM Role -->
  <g id="pm-role">
    <rect x="80" y="120" width="140" height="70" fill="url(#pmGradient)" rx="8" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="110" cy="145" r="15" fill="white" opacity="0.9"/>
    <path d="M 110 138 C 110 138 105 140 105 145 C 105 150 110 152 110 152 C 110 152 115 150 115 145 C 115 140 110 138 110 138 Z M 110 153 C 110 153 100 155 100 162 L 120 162 C 120 155 110 153 110 153 Z" fill="#7C3AED"/>
    <text x="135" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Product</text>
    <text x="135" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Manager</text>
  </g>
  
  <!-- Design Role -->
  <g id="design-role">
    <rect x="330" y="65" width="140" height="70" fill="url(#designGradient)" rx="8" stroke="#6366F1" stroke-width="2"/>
    <circle cx="360" cy="90" r="15" fill="white" opacity="0.9"/>
    <path d="M 360 83 C 360 83 355 85 355 90 C 355 95 360 97 360 97 C 360 97 365 95 365 90 C 365 85 360 83 360 83 Z M 360 98 C 360 98 350 100 350 107 L 370 107 C 370 100 360 98 360 98 Z" fill="#6366F1"/>
    <text x="385" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Design</text>
  </g>
  
  <!-- Engineering Role -->
  <g id="eng-role">
    <rect x="580" y="120" width="140" height="70" fill="url(#engGradient)" rx="8" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="610" cy="145" r="15" fill="white" opacity="0.9"/>
    <path d="M 610 138 C 610 138 605 140 605 145 C 605 150 610 152 610 152 C 610 152 615 150 615 145 C 615 140 610 138 610 138 Z M 610 153 C 610 153 600 155 600 162 L 620 162 C 620 155 610 153 610 153 Z" fill="#3B82F6"/>
    <text x="635" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Engineering</text>
  </g>
  
  <!-- Comment Bubble 1 (PM) -->
  <g id="comment-1">
    <path d="M 100 220 L 180 220 L 180 260 L 165 260 L 160 270 L 155 260 L 100 260 Z" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2" rx="4"/>
    <text x="140" y="235" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">Requirements</text>
    <text x="140" y="250" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">reviewed ✓</text>
  </g>
  
  <!-- Comment Bubble 2 (Design) -->
  <g id="comment-2">
    <path d="M 350 310 L 450 310 L 450 350 L 435 350 L 430 360 L 425 350 L 350 350 Z" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" rx="4"/>
    <text x="400" y="325" font-family="Arial, sans-serif" font-size="10" fill="#6366F1" text-anchor="middle">UX patterns</text>
    <text x="400" y="340" font-family="Arial, sans-serif" font-size="10" fill="#6366F1" text-anchor="middle">validated ✓</text>
  </g>
  
  <!-- Comment Bubble 3 (Engineering) -->
  <g id="comment-3">
    <path d="M 600 220 L 720 220 L 720 260 L 705 260 L 700 270 L 695 260 L 600 260 Z" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="4"/>
    <text x="660" y="235" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle">Implementation</text>
    <text x="660" y="250" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle">feasible ✓</text>
  </g>
  
  <!-- Approval Badges -->
  <g id="approval-pm">
    <circle cx="200" cy="137" r="12" fill="#10B981" stroke="white" stroke-width="2"/>
    <path d="M 195 137 L 198 140 L 205 133" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <g id="approval-design">
    <circle cx="450" cy="82" r="12" fill="#10B981" stroke="white" stroke-width="2"/>
    <path d="M 445 82 L 448 85 L 455 78" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <g id="approval-eng">
    <circle cx="700" cy="137" r="12" fill="#10B981" stroke="white" stroke-width="2"/>
    <path d="M 695 137 L 698 140 L 705 133" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Collaboration Icons (sync symbols) -->
  <g id="sync-1" opacity="0.6">
    <circle cx="260" cy="175" r="18" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <path d="M 253 168 L 260 175 L 253 182" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
    <path d="M 267 168 L 260 175 L 267 182" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <g id="sync-2" opacity="0.6">
    <circle cx="540" cy="175" r="18" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <path d="M 533 168 L 540 175 L 533 182" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <path d="M 547 168 L 540 175 L 547 182" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Review Checkpoints -->
  <g id="checkpoint-1">
    <rect x="230" y="90" width="80" height="30" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2" rx="15"/>
    <text x="270" y="110" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7C3AED" text-anchor="middle">Review 1</text>
  </g>
  
  <g id="checkpoint-2">
    <rect x="490" y="90" width="80" height="30" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="15"/>
    <text x="530" y="110" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">Review 2</text>
  </g>
  
  <!-- Team Sync Indicator -->
  <g id="team-sync">
    <rect x="590" y="320" width="120" height="35" fill="#F0EAFF" stroke="#7C3AED" stroke-width="2" rx="17.5"/>
    <circle cx="615" cy="337.5" r="8" fill="#10B981"/>
    <text x="630" y="343" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#7C3AED">Team Synced</text>
  </g>
  
  <!-- Workflow progress indicator -->
  <g id="progress">
    <rect x="50" y="370" width="700" height="8" fill="#E5E7EB" rx="4"/>
    <rect x="50" y="370" width="525" height="8" fill="url(#docGradient)" rx="4"/>
    <text x="400" y="390" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">75% Complete - In Review Stage</text>
  </g>
</svg>
