<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Professional Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dangerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    
    <!-- Card Background Gradients -->
    <linearGradient id="cardBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ddd6fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardBg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a7f3d0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardBg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
    
    <!-- Professional Shadow Filter -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <g id="title" transform="translate(300, 25)">
    <rect x="-150" y="-12" width="300" height="24" rx="12" fill="url(#primaryGradient)" opacity="0.1"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="url(#primaryGradient)">Feature Flag Management and Gradual Rollout</text>
  </g>
  
  <!-- Feature Flag Control Panel -->
  <g id="controlPanel" transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="url(#cardBg1)" stroke="url(#primaryGradient)" stroke-width="2" filter="url(#softShadow)"/>
    
    <!-- Panel Title -->
    <rect x="10" y="10" width="180" height="20" rx="4" fill="url(#primaryGradient)" opacity="0.1"/>
    <text x="100" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#6366f1">Feature Flags Control</text>
    
    <!-- Toggle Switch 1 - Active -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="40" height="20" rx="10" fill="url(#successGradient)"/>
      <circle cx="30" cy="10" r="8" fill="#ffffff" filter="url(#glow)"/>
      <text x="50" y="8" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">New Dashboard</text>
      <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Status: Active</text>
    </g>
    
    <!-- Toggle Switch 2 - Partial -->
    <g transform="translate(20, 75)">
      <rect x="0" y="0" width="40" height="20" rx="10" fill="url(#warningGradient)"/>
      <circle cx="20" cy="10" r="8" fill="#ffffff" filter="url(#glow)"/>
      <text x="50" y="8" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">AI Assistant</text>
      <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Status: 25% Rollout</text>
    </g>
    
    <!-- Rollback Button -->
    <g transform="translate(130, 95)">
      <rect x="0" y="0" width="65" height="25" rx="4" fill="url(#dangerGradient)" opacity="0.1" stroke="url(#dangerGradient)" stroke-width="1"/>
      <text x="32.5" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#dc2626">ROLLBACK</text>
    </g>
  </g>
  
  <!-- Deployment Pipeline -->
  <g id="deploymentPipeline" transform="translate(280, 60)">
    <rect x="0" y="0" width="270" height="120" rx="8" fill="url(#cardBg2)" stroke="url(#primaryGradient)" stroke-width="2" filter="url(#softShadow)"/>
    
    <!-- Pipeline Title -->
    <rect x="10" y="10" width="250" height="20" rx="4" fill="url(#primaryGradient)" opacity="0.1"/>
    <text x="135" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#6366f1">Gradual Deployment Pipeline</text>
    
    <!-- Stage 1: Canary (5%) -->
    <g transform="translate(20, 45)">
      <circle cx="15" cy="15" r="16" fill="url(#warningGradient)" opacity="0.2" stroke="url(#warningGradient)" stroke-width="2"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#d97706">5%</text>
      <text x="15" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Canary</text>
    </g>
    
    <!-- Stage 2: Early Adopters (25%) -->
    <g transform="translate(80, 45)">
      <circle cx="15" cy="15" r="16" fill="url(#secondaryGradient)" opacity="0.3" stroke="url(#secondaryGradient)" stroke-width="2"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#8b5cf6">25%</text>
      <text x="15" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Early</text>
    </g>
    
    <!-- Stage 3: Beta Users (50%) -->
    <g transform="translate(140, 45)">
      <circle cx="15" cy="15" r="16" fill="url(#primaryGradient)" opacity="0.3" stroke="url(#primaryGradient)" stroke-width="2"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#3b82f6">50%</text>
      <text x="15" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Beta</text>
    </g>
    
    <!-- Stage 4: Full Release (100%) -->
    <g transform="translate(200, 45)">
      <circle cx="15" cy="15" r="16" fill="url(#successGradient)" opacity="0.3" stroke="url(#successGradient)" stroke-width="2"/>
      <text x="15" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#059669">100%</text>
      <text x="15" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Full</text>
    </g>
    
    <!-- Progress Arrows -->
    <g stroke="url(#primaryGradient)" stroke-width="2" fill="none" opacity="0.6">
      <path d="M 51 60 L 79 60" stroke-dasharray="3,2"/>
      <path d="M 111 60 L 139 60" stroke-dasharray="3,2"/>
      <path d="M 171 60 L 199 60" stroke-dasharray="3,2"/>
    </g>
    
    <!-- Current Stage Indicator -->
    <g transform="translate(75, 90)">
      <rect x="0" y="0" width="70" height="15" rx="3" fill="url(#warningGradient)" opacity="0.1"/>
      <text x="35" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#d97706">Current: 25%</text>
    </g>
  </g>
  
  <!-- User Segments -->
  <g id="userSegments" transform="translate(50, 200)">
    <rect x="0" y="0" width="500" height="80" rx="8" fill="url(#cardBg3)" stroke="url(#primaryGradient)" stroke-width="2" filter="url(#softShadow)"/>
    
    <!-- Segments Title -->
    <rect x="10" y="10" width="480" height="20" rx="4" fill="url(#primaryGradient)" opacity="0.1"/>
    <text x="250" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#6366f1">User Segments and Targeting</text>
    
    <!-- Segment 1: Internal Users -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="90" height="25" rx="4" fill="url(#successGradient)" opacity="0.1" stroke="url(#successGradient)" stroke-width="1"/>
      <circle cx="10" cy="12" r="3" fill="url(#successGradient)"/>
      <text x="18" y="10" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Internal Users</text>
      <text x="18" y="20" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">100% Active</text>
    </g>
    
    <!-- Segment 2: Beta Testers -->
    <g transform="translate(110, 45)">
      <rect x="0" y="0" width="90" height="25" rx="4" fill="url(#primaryGradient)" opacity="0.1" stroke="url(#primaryGradient)" stroke-width="1"/>
      <circle cx="10" cy="12" r="3" fill="url(#primaryGradient)"/>
      <text x="18" y="10" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Beta Testers</text>
      <text x="18" y="20" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">75% Active</text>
    </g>
    
    <!-- Segment 3: Premium Users -->
    <g transform="translate(205, 45)">
      <rect x="0" y="0" width="90" height="25" rx="4" fill="url(#warningGradient)" opacity="0.1" stroke="url(#warningGradient)" stroke-width="1"/>
      <circle cx="10" cy="12" r="3" fill="url(#warningGradient)"/>
      <text x="18" y="10" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Premium Users</text>
      <text x="18" y="20" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">25% Active</text>
    </g>
    
    <!-- Segment 4: General Users -->
    <g transform="translate(300, 45)">
      <rect x="0" y="0" width="90" height="25" rx="4" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="10" cy="12" r="3" fill="#9ca3af"/>
      <text x="18" y="10" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">General Users</text>
      <text x="18" y="20" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">0% Active</text>
    </g>
    
    <!-- Segment 5: Geographic -->
    <g transform="translate(395, 45)">
      <rect x="0" y="0" width="90" height="25" rx="4" fill="url(#secondaryGradient)" opacity="0.1" stroke="url(#secondaryGradient)" stroke-width="1"/>
      <circle cx="8" cy="12" r="3" fill="url(#secondaryGradient)"/>
      <text x="15" y="10" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">US East</text>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">50% Active</text>
    </g>
  </g>
  
  <!-- Monitoring and Analytics -->
  <g id="monitoring" transform="translate(50, 300)">
    <rect x="0" y="0" width="240" height="80" rx="8" fill="url(#cardBg4)" stroke="url(#primaryGradient)" stroke-width="2" filter="url(#softShadow)"/>
    
    <!-- Monitoring Title -->
    <rect x="10" y="10" width="220" height="20" rx="4" fill="url(#primaryGradient)" opacity="0.1"/>
    <text x="120" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#6366f1">Real-time Monitoring</text>
    
    <!-- Metrics -->
    <g transform="translate(20, 40)">
      <!-- Success Rate -->
      <g>
        <text x="0" y="8" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Success Rate</text>
        <rect x="0" y="12" width="60" height="6" rx="3" fill="#e5e7eb"/>
        <rect x="0" y="12" width="54" height="6" rx="3" fill="url(#successGradient)"/>
        <text x="65" y="17" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#059669">98.5%</text>
      </g>
      
      <!-- Error Rate -->
      <g transform="translate(120, 0)">
        <text x="0" y="8" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">Error Rate</text>
        <rect x="0" y="12" width="60" height="6" rx="3" fill="#e5e7eb"/>
        <rect x="0" y="12" width="3" height="6" rx="3" fill="url(#dangerGradient)"/>
        <text x="65" y="17" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#dc2626">1.5%</text>
      </g>
    </g>
    
    <!-- Alert Status -->
    <g transform="translate(20, 65)">
      <circle cx="5" cy="5" r="3" fill="url(#successGradient)"/>
      <text x="12" y="8" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#374151">All systems operational</text>
    </g>
  </g>
  
  <!-- Rollback Mechanism -->
  <g id="rollbackMechanism" transform="translate(310, 300)">
    <rect x="0" y="0" width="240" height="80" rx="8" fill="url(#cardBg5)" stroke="url(#dangerGradient)" stroke-width="2" filter="url(#softShadow)"/>
    
    <!-- Rollback Title -->
    <rect x="10" y="10" width="220" height="20" rx="4" fill="url(#dangerGradient)" opacity="0.1"/>
    <text x="120" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#dc2626">Emergency Rollback</text>
    
    <!-- Rollback Options -->
    <g transform="translate(20, 40)">
      <!-- Instant Rollback -->
      <g>
        <rect x="0" y="0" width="80" height="20" rx="4" fill="url(#dangerGradient)" opacity="0.1" stroke="url(#dangerGradient)" stroke-width="1"/>
        <text x="40" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#dc2626">Instant</text>
        <text x="40" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">0% in 30s</text>
      </g>
      
      <!-- Gradual Rollback -->
      <g transform="translate(90, 0)">
        <rect x="0" y="0" width="80" height="20" rx="4" fill="url(#warningGradient)" opacity="0.1" stroke="url(#warningGradient)" stroke-width="1"/>
        <text x="40" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#d97706">Gradual</text>
        <text x="40" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d97706">0% in 5min</text>
      </g>
    </g>
    
    <!-- Auto-Rollback Trigger -->
    <g transform="translate(20, 65)">
      <circle cx="5" cy="5" r="3" fill="url(#warningGradient)"/>
      <text x="12" y="8" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#374151">Auto-trigger at greater than 5% error rate</text>
    </g>
  </g>
  
  <!-- Flow Arrows -->
  <g id="flowArrows" stroke="url(#primaryGradient)" stroke-width="2" fill="none" opacity="0.4">
    <!-- Control Panel to Pipeline -->
    <path d="M 250 120 Q 265 120 280 120" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="0" to="7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Pipeline to Segments -->
    <path d="M 415 180 Q 415 190 415 200" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="0" to="7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Segments to Monitoring -->
    <path d="M 170 280 Q 170 290 170 300" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="0" to="7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Monitoring to Rollback -->
    <path d="M 290 340 Q 300 340 310 340" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="0" to="7" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
