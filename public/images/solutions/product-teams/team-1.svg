<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(139, 92, 246, 0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f172a"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="1160" height="60" rx="8" fill="#1e293b" opacity="0.8"/>
  <text x="40" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#f1f5f9">
    Pricing Configuration Dashboard
  </text>
  <rect x="1020" y="35" width="140" height="30" rx="6" fill="url(#purpleGradient)"/>
  <text x="1090" y="57" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">
    Deploy Changes
  </text>
  
  <!-- Main Content Area -->
  <g id="pricing-table">
    <!-- Pricing Tiers Container -->
    <rect x="20" y="100" width="750" height="460" rx="12" fill="#1e293b" opacity="0.6"/>
    
    <!-- Tier Cards -->
    <!-- Starter Tier -->
    <g id="starter-tier">
      <rect x="40" y="120" width="220" height="420" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="150" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8" text-anchor="middle">
        STARTER
      </text>
      <text x="150" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9" text-anchor="middle">
        $29
      </text>
      <text x="150" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
        per month
      </text>
      
      <!-- Features -->
      <g id="starter-features">
        <circle cx="60" cy="260" r="4" fill="#8b5cf6"/>
        <text x="75" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Up to 10 users
        </text>
        
        <circle cx="60" cy="290" r="4" fill="#8b5cf6"/>
        <text x="75" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          5GB storage
        </text>
        
        <circle cx="60" cy="320" r="4" fill="#8b5cf6"/>
        <text x="75" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Basic support
        </text>
        
        <circle cx="60" cy="350" r="4" fill="#8b5cf6"/>
        <text x="75" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          API access
        </text>
      </g>
      
      <!-- CTA Button -->
      <rect x="60" y="490" width="180" height="36" rx="6" fill="#334155"/>
      <text x="150" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#cbd5e1" text-anchor="middle">
        Select Plan
      </text>
    </g>
    
    <!-- Pro Tier (Highlighted) -->
    <g id="pro-tier">
      <rect x="280" y="110" width="220" height="440" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2.5" filter="url(#glow)"/>
      <rect x="330" y="120" width="120" height="24" rx="4" fill="url(#purpleGradient)"/>
      <text x="390" y="137" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">
        MOST POPULAR
      </text>
      
      <text x="390" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#8b5cf6" text-anchor="middle">
        PRO
      </text>
      <text x="390" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9" text-anchor="middle">
        $99
      </text>
      <text x="390" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
        per month
      </text>
      
      <!-- Features -->
      <g id="pro-features">
        <circle cx="300" cy="280" r="4" fill="#8b5cf6"/>
        <text x="315" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Unlimited users
        </text>
        
        <circle cx="300" cy="310" r="4" fill="#8b5cf6"/>
        <text x="315" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          100GB storage
        </text>
        
        <circle cx="300" cy="340" r="4" fill="#8b5cf6"/>
        <text x="315" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Priority support
        </text>
        
        <circle cx="300" cy="370" r="4" fill="#8b5cf6"/>
        <text x="315" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Advanced API
        </text>
        
        <circle cx="300" cy="400" r="4" fill="#8b5cf6"/>
        <text x="315" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Custom integrations
        </text>
      </g>
      
      <!-- CTA Button -->
      <rect x="300" y="500" width="180" height="36" rx="6" fill="url(#purpleGradient)"/>
      <text x="390" y="523" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">
        Select Plan
      </text>
    </g>
    
    <!-- Enterprise Tier -->
    <g id="enterprise-tier">
      <rect x="520" y="120" width="220" height="420" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="630" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8" text-anchor="middle">
        ENTERPRISE
      </text>
      <text x="630" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9" text-anchor="middle">
        Custom
      </text>
      <text x="630" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
        contact sales
      </text>
      
      <!-- Features -->
      <g id="enterprise-features">
        <circle cx="540" cy="260" r="4" fill="#8b5cf6"/>
        <text x="555" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Unlimited everything
        </text>
        
        <circle cx="540" cy="290" r="4" fill="#8b5cf6"/>
        <text x="555" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          Dedicated support
        </text>
        
        <circle cx="540" cy="320" r="4" fill="#8b5cf6"/>
        <text x="555" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          SLA guarantee
        </text>
        
        <circle cx="540" cy="350" r="4" fill="#8b5cf6"/>
        <text x="555" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          White-label options
        </text>
        
        <circle cx="540" cy="380" r="4" fill="#8b5cf6"/>
        <text x="555" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
          On-premise deploy
        </text>
      </g>
      
      <!-- CTA Button -->
      <rect x="540" y="490" width="180" height="36" rx="6" fill="#334155"/>
      <text x="630" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#cbd5e1" text-anchor="middle">
        Contact Sales
      </text>
    </g>
  </g>
  
  <!-- Feature Flags Panel -->
  <g id="feature-flags">
    <rect x="790" y="100" width="390" height="280" rx="12" fill="#1e293b" opacity="0.6"/>
    <text x="810" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      Feature Flags
    </text>
    
    <!-- Flag Item: new-pricing-model -->
    <rect x="810" y="155" width="350" height="90" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="830" y="180" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="#8b5cf6">
      new-pricing-model
    </text>
    <rect x="1080" y="168" width="60" height="22" rx="11" fill="#22c55e"/>
    <circle cx="1128" cy="179" r="8" fill="white"/>
    <text x="1150" y="183" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22c55e">
      ON
    </text>
    
    <!-- Rollout Percentage -->
    <text x="830" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">
      Rollout: 50%
    </text>
    <rect x="830" y="212" width="310" height="8" rx="4" fill="#334155"/>
    <rect x="830" y="212" width="155" height="8" rx="4" fill="url(#purpleGradient)"/>
    
    <text x="830" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
      Users affected: 2,847 / 5,694
    </text>
    
    <!-- Other Flags -->
    <rect x="810" y="260" width="350" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="830" y="283" font-family="'Courier New', monospace" font-size="12" fill="#cbd5e1">
      legacy-billing-system
    </text>
    <rect x="1080" y="273" width="60" height="22" rx="11" fill="#475569"/>
    <circle cx="1092" cy="284" r="8" fill="white"/>
    <text x="1150" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748b">
      OFF
    </text>
    
    <rect x="810" y="325" width="350" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="830" y="348" font-family="'Courier New', monospace" font-size="12" fill="#cbd5e1">
      annual-discount-promo
    </text>
    <rect x="1080" y="338" width="60" height="22" rx="11" fill="#22c55e"/>
    <circle cx="1128" cy="349" r="8" fill="white"/>
    <text x="1150" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22c55e">
      ON
    </text>
  </g>
  
  <!-- A/B Testing Controls -->
  <g id="ab-testing">
    <rect x="790" y="395" width="390" height="165" rx="12" fill="#1e293b" opacity="0.6"/>
    <text x="810" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      A/B Test Controls
    </text>
    
    <text x="810" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">
      Experiment: Pricing Model V2
    </text>
    
    <!-- Variant Distribution -->
    <g id="variants">
      <rect x="810" y="470" width="160" height="70" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="830" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b">
        CONTROL (50%)
      </text>
      <text x="830" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">
        2,847
      </text>
      <text x="830" y="528" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
        users
      </text>
      
      <rect x="990" y="470" width="160" height="70" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="1010" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">
        VARIANT (50%)
      </text>
      <text x="1010" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">
        2,847
      </text>
      <text x="1010" y="528" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
        users
      </text>
    </g>
  </g>
  
  <!-- Performance Metrics -->
  <g id="metrics">
    <rect x="20" y="580" width="365" height="200" rx="12" fill="#1e293b" opacity="0.6"/>
    <text x="40" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      Conversion Rate
    </text>
    
    <!-- Line Graph -->
    <g id="graph">
      <!-- Grid lines -->
      <line x1="60" y1="650" x2="365" y2="650" stroke="#334155" stroke-width="0.5"/>
      <line x1="60" y1="680" x2="365" y2="680" stroke="#334155" stroke-width="0.5"/>
      <line x1="60" y1="710" x2="365" y2="710" stroke="#334155" stroke-width="0.5"/>
      <line x1="60" y1="740" x2="365" y2="740" stroke="#334155" stroke-width="0.5"/>
      
      <!-- Control line -->
      <polyline points="60,720 100,715 140,710 180,712 220,708 260,705 300,703 340,700 365,698" 
                fill="none" stroke="#64748b" stroke-width="2"/>
      
      <!-- Variant line -->
      <polyline points="60,720 100,710 140,695 180,685 220,678 260,670 300,665 340,658 365,650" 
                fill="none" stroke="#8b5cf6" stroke-width="3"/>
      
      <!-- Legend -->
      <line x1="40" y1="755" x2="60" y2="755" stroke="#64748b" stroke-width="2"/>
      <text x="65" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">
        Control (2.3%)
      </text>
      
      <line x1="160" y1="755" x2="180" y2="755" stroke="#8b5cf6" stroke-width="2"/>
      <text x="185" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b5cf6">
        New Pricing (3.7%)
      </text>
    </g>
  </g>
  
  <!-- Revenue Impact -->
  <g id="revenue">
    <rect x="405" y="580" width="365" height="200" rx="12" fill="#1e293b" opacity="0.6"/>
    <text x="425" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      Projected Revenue Impact
    </text>
    
    <!-- Bar chart -->
    <rect x="445" y="670" width="80" height="80" rx="4" fill="#334155"/>
    <text x="485" y="710" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">
      Current
    </text>
    <text x="485" y="730" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#cbd5e1" text-anchor="middle">
      $47K
    </text>
    
    <rect x="555" y="630" width="80" height="120" rx="4" fill="url(#purpleGradient)"/>
    <text x="595" y="710" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" text-anchor="middle">
      Projected
    </text>
    <text x="595" y="730" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">
      $73K
    </text>
    
    <rect x="665" y="640" width="80" height="110" rx="4" fill="#22c55e" opacity="0.3"/>
    <text x="705" y="710" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">
      Uplift
    </text>
    <text x="705" y="730" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#22c55e" text-anchor="middle">
      +55%
    </text>
    
    <text x="587" y="765" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">
      Monthly MRR
    </text>
  </g>
  
  <!-- Statistical Significance Badge -->
  <g id="significance">
    <rect x="790" y="580" width="390" height="200" rx="12" fill="#1e293b" opacity="0.6"/>
    <text x="810" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      Experiment Status
    </text>
    
    <rect x="830" y="640" width="320" height="60" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <circle cx="860" cy="670" r="16" fill="#22c55e" opacity="0.2"/>
    <path d="M 854 670 L 858 674 L 866 664" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <text x="890" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22c55e">
      Statistically Significant
    </text>
    <text x="890" y="683" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
      95% confidence • p-value: 0.012
    </text>
    
    <rect x="830" y="720" width="150" height="40" rx="6" fill="url(#purpleGradient)"/>
    <text x="905" y="745" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">
      Ship to 100%
    </text>
    
    <rect x="1000" y="720" width="150" height="40" rx="6" fill="#334155"/>
    <text x="1075" y="745" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">
      Stop Test
    </text>
  </g>
</svg>
