import React from 'react';

export default function QualityDashboard() {
  const metrics = [
    { name: 'Tests', score: 98, status: 'passed', threshold: 90 },
    { name: 'Lint', score: 95, status: 'passed', threshold: 85 },
    { name: 'Security', score: 100, status: 'passed', threshold: 95 },
    { name: 'Performance', score: 88, status: 'passed', threshold: 80 },
    { name: 'Licenses', score: 100, status: 'passed', threshold: 100 }
  ];

  const overallScore = Math.round(
    metrics.reduce((sum, m) => sum + m.score, 0) / metrics.length
  );

  const getScoreColor = (score) => {
    if (score >= 95) return '#8b5cf6';
    if (score >= 85) return '#3b82f6';
    if (score >= 70) return '#fbbf24';
    return '#ef4444';
  };

  const getGradientId = (index) => `gradient-${index}`;

  return (
    <div className="w-full h-full flex items-center justify-center p-4 bg-transparent">
      <svg
        width="600"
        height="400"
        viewBox="0 0 600 400"
        xmlns="http://www.w3.org/2000/svg"
        className="bg-transparent"
      >
        <defs>
          {metrics.map((_, index) => (
            <linearGradient
              key={index}
              id={getGradientId(index)}
              x1="0%"
              y1="0%"
              x2="100%"
              y2="0%"
            >
              <stop offset="0%" stopColor="#8b5cf6" />
              <stop offset="100%" stopColor="#3b82f6" />
            </linearGradient>
          ))}
          <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#8b5cf6" />
            <stop offset="100%" stopColor="#3b82f6" />
          </linearGradient>
          
          {/* Glow filter */}
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        {/* Background card */}
        <rect
          x="20"
          y="20"
          width="560"
          height="360"
          rx="16"
          fill="#1e1b4b"
          opacity="0.95"
        />

        {/* Header */}
        <text
          x="40"
          y="55"
          fontFamily="system-ui, -apple-system, sans-serif"
          fontSize="24"
          fontWeight="700"
          fill="#e0e7ff"
        >
          Quality Gates Dashboard
        </text>

        {/* Overall Build Score Circle */}
        <g transform="translate(470, 100)">
          {/* Outer circle background */}
          <circle cx="0" cy="0" r="55" fill="#312e81" opacity="0.5" />
          
          {/* Progress circle background */}
          <circle
            cx="0"
            cy="0"
            r="45"
            fill="none"
            stroke="#312e81"
            strokeWidth="8"
          />
          
          {/* Progress circle */}
          <circle
            cx="0"
            cy="0"
            r="45"
            fill="none"
            stroke="url(#scoreGradient)"
            strokeWidth="8"
            strokeLinecap="round"
            strokeDasharray={`${(overallScore / 100) * 283} 283`}
            transform="rotate(-90)"
            filter="url(#glow)"
          />
          
          {/* Score text */}
          <text
            x="0"
            y="-5"
            textAnchor="middle"
            fontFamily="system-ui, -apple-system, sans-serif"
            fontSize="32"
            fontWeight="700"
            fill="#e0e7ff"
          >
            {overallScore}
          </text>
          <text
            x="0"
            y="15"
            textAnchor="middle"
            fontFamily="system-ui, -apple-system, sans-serif"
            fontSize="11"
            fill="#a5b4fc"
          >
            BUILD SCORE
          </text>
        </g>

        {/* Status badge */}
        <g transform="translate(450, 195)">
          <rect x="0" y="0" width="80" height="24" rx="12" fill="#10b981" opacity="0.2" />
          <text
            x="40"
            y="16"
            textAnchor="middle"
            fontFamily="system-ui, -apple-system, sans-serif"
            fontSize="11"
            fontWeight="600"
            fill="#10b981"
          >
            ✓ PASSED
          </text>
        </g>

        {/* Metrics section */}
        <text
          x="40"
          y="105"
          fontFamily="system-ui, -apple-system, sans-serif"
          fontSize="14"
          fontWeight="600"
          fill="#a5b4fc"
        >
          Quality Metrics
        </text>

        {/* Individual metrics */}
        {metrics.map((metric, index) => {
          const y = 130 + index * 45;
          const barWidth = 280;
          const progressWidth = (metric.score / 100) * barWidth;
          const thresholdPosition = (metric.threshold / 100) * barWidth;

          return (
            <g key={index}>
              {/* Metric name and score */}
              <text
                x="40"
                y={y}
                fontFamily="system-ui, -apple-system, sans-serif"
                fontSize="13"
                fontWeight="600"
                fill="#e0e7ff"
              >
                {metric.name}
              </text>
              
              {/* Check mark */}
              <circle cx="131" cy={y - 5} r="8" fill="#10b981" opacity="0.2" />
              <text
                x="131"
                y={y}
                textAnchor="middle"
                fontFamily="system-ui, -apple-system, sans-serif"
                fontSize="11"
                fontWeight="700"
                fill="#10b981"
              >
                ✓
              </text>

              {/* Score percentage */}
              <text
                x="390"
                y={y + 13}
                textAnchor="end"
                fontFamily="system-ui, -apple-system, sans-serif"
                fontSize="18"
                fontWeight="700"
                fill={getScoreColor(metric.score)}
              >
                {metric.score}%
              </text>

              {/* Progress bar background */}
              <rect
                x="40"
                y={y + 8}
                width={barWidth}
                height="8"
                rx="4"
                fill="#312e81"
                opacity="0.5"
              />

              {/* Progress bar fill */}
              <rect
                x="40"
                y={y + 8}
                width={progressWidth}
                height="8"
                rx="4"
                fill={`url(#${getGradientId(index)})`}
              />

              {/* Threshold indicator */}
              <line
                x1={40 + thresholdPosition}
                y1={y + 5}
                x2={40 + thresholdPosition}
                y2={y + 19}
                stroke="#fbbf24"
                strokeWidth="2"
                strokeDasharray="2,2"
                opacity="0.6"
              />

              {/* Threshold label */}
              <text
                x={40 + thresholdPosition}
                y={y + 28}
                textAnchor="middle"
                fontFamily="system-ui, -apple-system, sans-serif"
                fontSize="12"
                fill="#fbbf24"
                opacity="0.7"
              >
                {metric.threshold}%
              </text>
            </g>
          );
        })}

        {/* Legend */}
        <g transform="translate(40, 350)">
          <text
            x="0"
            y="0"
            fontFamily="system-ui, -apple-system, sans-serif"
            fontSize="10"
            fill="#a5b4fc"
            opacity="0.7"
          >
            <tspan>━━ Threshold </tspan>
            <tspan dx="20">● Status </tspan>
            <tspan dx="20">█ Progress</tspan>
          </text>
        </g>
      </svg>
    </div>
  );
}
