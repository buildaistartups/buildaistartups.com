<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters for depth -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="motionBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1 0" />
    </filter>
  </defs>
  
  <!-- Background glow effect -->
  <circle cx="512" cy="288" r="216" fill="url(#glowGradient)" opacity="0.5"/>
  
  <!-- Central Workflow Circle -->
  <g id="centralWorkflow" filter="url(#softShadow)">
    <!-- Main circle background -->
    <circle cx="512" cy="288" r="115" fill="#e0f2fe" stroke="url(#primaryGradient)" stroke-width="3"/>
    
    <!-- Workflow stages circle paths -->
    <g id="workflowStages">
      <!-- SPEC Stage (Top) -->
      <g id="specStage">
        <circle cx="512" cy="187" r="32" fill="#ddd6fe"/>
        <circle cx="512" cy="187" r="32" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Document icon -->
        <rect x="501" y="176" width="22" height="25" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="505" y1="182" x2="515" y2="182" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="505" y1="187" x2="519" y2="187" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="505" y1="192" x2="519" y2="192" stroke="#8b5cf6" stroke-width="1.5"/>
        <line x1="505" y1="197" x2="512" y2="197" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="512" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">SPEC</text>
      </g>
      
      <!-- CODE Stage (Right) -->
      <g id="codeStage">
        <circle cx="613" cy="288" r="32" fill="#bfdbfe"/>
        <circle cx="613" cy="288" r="32" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Code brackets icon -->
        <path d="M 606 277 L 598 284 L 606 291" fill="none" stroke="#5b8ff6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 620 277 L 628 284 L 620 291" fill="none" stroke="#5b8ff6" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="608" cy="284" r="1.5" fill="#5b8ff6"/>
        <circle cx="613" cy="284" r="1.5" fill="#5b8ff6"/>
        <circle cx="618" cy="284" r="1.5" fill="#5b8ff6"/>
        <text x="613" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5b8ff6">CODE</text>
      </g>
      
      <!-- REVIEW Stage (Bottom) -->
      <g id="reviewStage">
        <circle cx="512" cy="389" r="32" fill="#bae6fd"/>
        <circle cx="512" cy="389" r="32" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Checklist icon -->
        <rect x="501" y="377" width="22" height="25" rx="2" fill="none" stroke="#4f8ff6" stroke-width="2"/>
        <polyline points="505,384 508,387 512,382" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="505,391 508,394 512,389" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="514" y1="384" x2="519" y2="384" stroke="#4f8ff6" stroke-width="1.5"/>
        <line x1="514" y1="391" x2="519" y2="391" stroke="#4f8ff6" stroke-width="1.5"/>
        <text x="512" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4f8ff6">REVIEW</text>
      </g>
      
      <!-- DEPLOY Stage (Left) -->
      <g id="deployStage">
        <circle cx="411" cy="288" r="32" fill="#c7d2fe"/>
        <circle cx="411" cy="288" r="32" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
        <!-- Rocket icon -->
        <path d="M 411 277 L 407 291 L 411 289 L 415 291 Z" fill="#4f7ff6" stroke="#4f7ff6" stroke-width="1.5"/>
        <ellipse cx="411" cy="294" rx="6" ry="3" fill="#ef4444" opacity="0.6"/>
        <circle cx="411" cy="284" r="2" fill="#ffffff"/>
        <!-- Cloud -->
        <ellipse cx="417" cy="279" rx="4" ry="2" fill="#e0e7ff" opacity="0.7"/>
        <ellipse cx="405" cy="279" rx="4" ry="2" fill="#e0e7ff" opacity="0.7"/>
        <text x="411" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4f7ff6">DEPLOY</text>
      </g>
    </g>
    
    <!-- Connecting flow lines with motion blur -->
    <g id="flowLines" opacity="0.6">
      <path d="M 512 219 Q 562 238 581 288" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 581 288 Q 562 338 512 357" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 512 357 Q 462 338 443 288" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 443 288 Q 462 238 512 219" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="5,5" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Approval checkpoints (green checkmarks) -->
    <g id="approvalCheckpoints">
      <circle cx="548" cy="223" r="9" fill="#10b981"/>
      <polyline points="544,223 546,225 552,220" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <circle cx="586" cy="324" r="9" fill="#10b981"/>
      <polyline points="582,324 584,326 590,321" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <circle cx="476" cy="353" r="9" fill="#10b981"/>
      <polyline points="472,353 474,355 480,350" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <circle cx="438" cy="252" r="9" fill="#10b981"/>
      <polyline points="434,252 436,254 442,249" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Quality Gates (Shield icons with metrics) -->
  <g id="qualityGates">
    <g transform="translate(571, 212)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#f59e0b">92%</text>
    </g>
    
    <g transform="translate(437, 371)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#8b5cf6">95%</text>
    </g>
  </g>
  
  <!-- Integration Lines (connecting team members to workflow) -->
  <g id="integrationLines" opacity="0.3">
    <path d="M 153 108 Q 330 145 475 219" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 871 108 Q 694 145 549 219" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 871 443 Q 694 374 549 357" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
    <path d="M 153 443 Q 330 374 475 357" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,4"/>
  </g>
  
  <!-- Team Members -->
  <!-- Product Manager (Top Left) -->
  <g id="productManager" transform="translate(153, 108)">
    <circle cx="0" cy="0" r="36" fill="#fef3c7" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-6" r="11" fill="#d97706"/>
    <!-- Body -->
    <path d="M -14 10 L -10 5 L 10 5 L 14 10 L 14 29 L -14 29 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-17" y="8" width="7" height="14" rx="4" fill="#d97706"/>
    <rect x="10" y="8" width="7" height="14" rx="4" fill="#d97706"/>
    <!-- Document -->
    <rect x="10" y="14" width="20" height="25" rx="2" fill="#c7d2fe" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="14" y1="19" x2="26" y2="19" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="14" y1="24" x2="26" y2="24" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="14" y1="28" x2="26" y2="28" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="14" y1="32" x2="23" y2="32" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Label -->
    <text x="0" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Product Manager</text>
  </g>
  
  <!-- UI/UX Designer (Top Right) -->
  <g id="uiDesigner" transform="translate(871, 108)">
    <circle cx="0" cy="0" r="36" fill="#ddd6fe" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-6" r="11" fill="#a78bfa"/>
    <!-- Body -->
    <path d="M -14 10 L -10 5 L 10 5 L 14 10 L 14 29 L -14 29 Z" fill="#8b5cf6"/>
    <!-- Arms -->
    <rect x="-17" y="8" width="7" height="14" rx="4" fill="#a78bfa"/>
    <rect x="10" y="8" width="7" height="14" rx="4" fill="#a78bfa"/>
    <!-- Tablet -->
    <rect x="-17" y="18" width="34" height="24" rx="2" fill="#1f2937" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="-14" y="21" width="28" height="18" rx="1" fill="#ffffff"/>
    <!-- Design elements on tablet -->
    <rect x="-11" y="24" width="8" height="8" rx="1" fill="#8b5cf6" opacity="0.5"/>
    <rect x="-2" y="24" width="8" height="4" rx="1" fill="#3b82f6" opacity="0.5"/>
    <rect x="-2" y="29" width="8" height="6" rx="1" fill="#10b981" opacity="0.5"/>
    <circle cx="11" cy="28" r="3" fill="#f59e0b" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">UI/UX Designer</text>
  </g>
  
  <!-- Frontend Engineer (Bottom Right) -->
  <g id="frontendEngineer" transform="translate(871, 468)">
    <circle cx="0" cy="0" r="36" fill="#dbeafe" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-6" r="11" fill="#60a5fa"/>
    <!-- Body -->
    <path d="M -14 10 L -10 5 L 10 5 L 14 10 L 14 29 L -14 29 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-17" y="8" width="7" height="14" rx="4" fill="#60a5fa"/>
    <rect x="10" y="8" width="7" height="14" rx="4" fill="#60a5fa"/>
    <!-- Laptop -->
    <path d="M -24 25 L -19 14 L 19 14 L 24 25 Z" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-17" y="15" width="34" height="9" rx="1" fill="#0f172a"/>
    <!-- Code on screen -->
    <line x1="-13" y1="17" x2="-6" y2="17" stroke="#10b981" stroke-width="1"/>
    <line x1="-13" y1="19" x2="-2" y2="19" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="-13" y1="22" x2="-8" y2="22" stroke="#3b82f6" stroke-width="1"/>
    <!-- Base -->
    <rect x="-26" y="25" width="52" height="2" rx="1" fill="#374151"/>
    <!-- Label -->
    <text x="14" y="-43" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Frontend Engineer</text>
  </g>
  
  <!-- DevOps Specialist (Bottom Left) -->
  <g id="devopsSpecialist" transform="translate(153, 468)">
    <circle cx="0" cy="0" r="36" fill="#fecaca" filter="url(#softShadow)"/>
    <!-- Head -->
    <circle cx="0" cy="-6" r="11" fill="#f87171"/>
    <!-- Body -->
    <path d="M -14 10 L -10 5 L 10 5 L 14 10 L 14 29 L -14 29 Z" fill="#ef4444"/>
    <!-- Arms -->
    <rect x="-17" y="8" width="7" height="14" rx="4" fill="#f87171"/>
    <rect x="10" y="8" width="7" height="14" rx="4" fill="#f87171"/>
    <!-- Dashboard screen -->
    <rect x="-19" y="14" width="38" height="29" rx="2" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <!-- Dashboard elements -->
    <rect x="-16" y="18" width="31" height="4" rx="1" fill="#10b981" opacity="0.7"/>
    <rect x="-16" y="24" width="14" height="3" rx="1" fill="#8b5cf6" opacity="0.7"/>
    <rect x="-16" y="29" width="19" height="3" rx="1" fill="#3b82f6" opacity="0.7"/>
    <rect x="-16" y="34" width="24" height="3" rx="1" fill="#f59e0b" opacity="0.7"/>
    <circle cx="14" cy="25" r="2" fill="#10b981"/>
    <circle cx="14" cy="30" r="2" fill="#10b981"/>
    <circle cx="14" cy="35" r="2" fill="#ef4444"/>
    <!-- Label -->
    <text x="-14" y="-43" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">DevOps Specialist</text>
  </g>
  
  <!-- Real-time Collaboration Elements -->
  <!-- Shared Cursors -->
  <g id="sharedCursors">
    <g transform="translate(528, 258)">
      <path d="M 0 0 L 0 9 L 3 7 L 4 9 L 6 9 L 4 6 L 7 6 Z" fill="#8b5cf6" filter="url(#softShadow)"/>
      <rect x="9" y="1" width="25" height="9" rx="2" fill="#8b5cf6" opacity="0.9"/>
      <text x="21" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffffff">Sarah</text>
    </g>
    
    <g transform="translate(586, 293)">
      <path d="M 0 0 L 0 9 L 3 7 L 4 9 L 6 9 L 4 6 L 7 6 Z" fill="#3b82f6" filter="url(#softShadow)"/>
      <rect x="9" y="1" width="22" height="9" rx="2" fill="#3b82f6" opacity="0.9"/>
      <text x="20" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffffff">Alex</text>
    </g>
  </g>
  
  <!-- Comment Threads -->
  <g id="commentThreads">
    <g transform="translate(642, 259)">
      <rect x="0" y="0" width="43" height="25" rx="3" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#softShadow)"/>
      <circle cx="6" cy="7" r="3" fill="#8b5cf6"/>
      <rect x="11" y="5" width="25" height="2" rx="1" fill="#e5e7eb"/>
      <rect x="11" y="9" width="18" height="2" rx="1" fill="#e5e7eb"/>
      <circle cx="6" cy="18" r="3" fill="#3b82f6"/>
      <rect x="11" y="16" width="27" height="2" rx="1" fill="#e5e7eb"/>
      <rect x="11" y="20" width="21" height="2" rx="1" fill="#e5e7eb"/>
    </g>
  </g>
  
  <!-- Simultaneous Edit Indicators -->
  <g id="editIndicators">
    <g transform="translate(470, 374)">
      <circle cx="0" cy="0" r="4" fill="#10b981" opacity="0.3">
        <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="3" fill="#10b981"/>
    </g>
    
    <g transform="translate(554, 202)">
      <circle cx="0" cy="0" r="4" fill="#8b5cf6" opacity="0.3">
        <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="3" fill="#8b5cf6"/>
    </g>
  </g>
</svg>
