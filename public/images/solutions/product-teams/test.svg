<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and effects -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Purple to Blue gradient -->
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle glow for elements -->
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Background geometric patterns -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="40" fill="url(#purpleBlue)"/>
    <circle cx="1100" cy="500" r="60" fill="url(#purpleBlue)"/>
    <polygon points="200,500 250,450 300,500 250,550" fill="#8B5CF6"/>
    <polygon points="1000,150 1050,100 1100,150 1050,200" fill="#3B82F6"/>
  </g>
  
  <!-- Main content container -->
  <g>
    <!-- Left section - Main branding -->
    <g>
      <!-- Accent gradient bar -->
      <rect x="50" y="180" width="6" height="120" fill="url(#purpleBlue)" filter="url(#subtleGlow)"/>
      
      <!-- Main headline -->
      <text x="80" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">
        Build AI Startups
      </text>
      
      <!-- Tagline -->
      <text x="80" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="500" fill="#E5E7EB">
        Everything founding teams need to
      </text>
      <text x="80" y="290" font-family="Arial, sans-serif" font-size="24" font-weight="500" fill="#E5E7EB">
        validate, build &amp; launch
      </text>
      
      <!-- Underline accent -->
      <rect x="80" y="300" width="200" height="3" fill="url(#purpleBlue)"/>
    </g>
    
    <!-- Right section - Visual elements -->
    <g transform="translate(600, 0)">
      <!-- Team collaboration elements -->
      <g transform="translate(50, 120)">
        <!-- Team silhouettes -->
        <circle cx="50" cy="80" r="25" fill="#8B5CF6" opacity="0.8"/>
        <circle cx="120" cy="80" r="25" fill="#3B82F6" opacity="0.8"/>
        <circle cx="190" cy="80" r="25" fill="#A855F7" opacity="0.8"/>
        
        <!-- Connection lines -->
        <line x1="75" y1="80" x2="95" y2="80" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6"/>
        <line x1="145" y1="80" x2="165" y2="80" stroke="url(#purpleBlue)" stroke-width="3" opacity="0.6"/>
        
        <!-- Collaboration text -->
        <text x="120" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#E5E7EB" text-anchor="middle">
          Team Collaboration
        </text>
      </g>
      
      <!-- Startup journey flow -->
      <g transform="translate(0, 250)">
        <!-- Validate section -->
        <g>
          <circle cx="80" cy="80" r="35" fill="none" stroke="url(#purpleBlue)" stroke-width="3" filter="url(#subtleGlow)"/>
          <!-- Lightbulb icon -->
          <circle cx="80" cy="75" r="8" fill="#10B981"/>
          <rect x="76" y="83" width="8" height="4" fill="#10B981"/>
          <rect x="78" y="87" width="4" height="6" fill="#10B981"/>
          <text x="80" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#E5E7EB" text-anchor="middle">
            VALIDATE
          </text>
        </g>
        
        <!-- Arrow -->
        <polygon points="130,75 150,80 130,85" fill="url(#purpleBlue)"/>
        <line x1="115" y1="80" x2="130" y2="80" stroke="url(#purpleBlue)" stroke-width="2"/>
        
        <!-- Build section -->
        <g transform="translate(90, 0)">
          <circle cx="80" cy="80" r="35" fill="none" stroke="url(#purpleBlue)" stroke-width="3" filter="url(#subtleGlow)"/>
          <!-- Gear icon -->
          <circle cx="80" cy="80" r="12" fill="none" stroke="#8B5CF6" stroke-width="3"/>
          <circle cx="80" cy="80" r="6" fill="#8B5CF6"/>
          <text x="80" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#E5E7EB" text-anchor="middle">
            BUILD
          </text>
        </g>
        
        <!-- Arrow -->
        <polygon points="220,75 240,80 220,85" fill="url(#purpleBlue)"/>
        <line x1="205" y1="80" x2="220" y2="80" stroke="url(#purpleBlue)" stroke-width="2"/>
        
        <!-- Launch section -->
        <g transform="translate(180, 0)">
          <circle cx="80" cy="80" r="35" fill="none" stroke="url(#purpleBlue)" stroke-width="3" filter="url(#subtleGlow)"/>
          <!-- Rocket icon -->
          <polygon points="80,65 85,85 80,82 75,85" fill="#3B82F6"/>
          <circle cx="80" cy="88" r="3" fill="#10B981"/>
          <text x="80" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#E5E7EB" text-anchor="middle">
            LAUNCH
          </text>
        </g>
      </g>
      
      <!-- Productivity indicators -->
      <g transform="translate(350, 150)">
        <!-- Rising chart -->
        <g>
          <rect x="0" y="60" width="8" height="20" fill="#8B5CF6" opacity="0.8"/>
          <rect x="12" y="45" width="8" height="35" fill="#A855F7" opacity="0.8"/>
          <rect x="24" y="30" width="8" height="50" fill="#3B82F6" opacity="0.8"/>
          <rect x="36" y="15" width="8" height="65" fill="#1D4ED8" opacity="0.8"/>
          
          <!-- Checkmarks -->
          <g transform="translate(60, 20)">
            <circle cx="0" cy="0" r="8" fill="#10B981"/>
            <polyline points="-3,-1 0,2 4,-2" stroke="white" stroke-width="2" fill="none"/>
          </g>
          <g transform="translate(60, 40)">
            <circle cx="0" cy="0" r="8" fill="#10B981"/>
            <polyline points="-3,-1 0,2 4,-2" stroke="white" stroke-width="2" fill="none"/>
          </g>
          <g transform="translate(60, 60)">
            <circle cx="0" cy="0" r="8" fill="#10B981"/>
            <polyline points="-3,-1 0,2 4,-2" stroke="white" stroke-width="2" fill="none"/>
          </g>
        </g>
        
        <!-- Progress indicator -->
        <g transform="translate(0, 100)">
          <rect x="0" y="0" width="80" height="6" rx="3" fill="#1E293B"/>
          <rect x="0" y="0" width="60" height="6" rx="3" fill="url(#purpleBlue)"/>
          <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#E5E7EB">
            Progress: 75%
          </text>
        </g>
      </g>
    </g>
    
    <!-- Bottom tagline -->
    <g transform="translate(50, 550)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#8B5CF6">
        Startup Ecosystem • Team Productivity • Enterprise Focus
      </text>
    </g>
    
    <!-- Floating elements for visual interest -->
    <g opacity="0.3">
      <circle cx="950" cy="100" r="3" fill="#8B5CF6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1050" cy="200" r="2" fill="#3B82F6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="850" cy="300" r="4" fill="#A855F7">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
