<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="approvedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rejectedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pendingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filters for professional effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="approvedArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M 2,2 L 10,6 L 2,10 Z" fill="#10B981"/>
    </marker>
    
    <marker id="rejectedArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M 2,2 L 10,6 L 2,10 Z" fill="#EF4444"/>
    </marker>
    
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 2,2 L 8,5 L 2,8 Z" fill="#6366F1"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="300" y="25" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="middle" filter="url(#shadow)">
    Review Gates &amp; Approval Workflow
  </text>
  
  <!-- Main workflow line -->
  <line x1="50" y1="80" x2="550" y2="80" stroke="url(#primaryGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Gate 1: Spec Review -->
  <g id="gate1" transform="translate(80, 80)">
    <!-- Gate checkpoint -->
    <circle cx="0" cy="0" r="20" fill="url(#primaryGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="15" fill="white"/>
    <text x="0" y="6" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6" text-anchor="middle">1</text>
    
    <!-- Gate card -->
    <rect x="-45" y="35" width="90" height="70" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="-40" y="40" width="80" height="20" rx="4" fill="url(#primaryGradient)"/>
    <text x="0" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">SPEC REVIEW</text>
    
    <!-- Quality indicators -->
    <circle cx="-25" cy="70" r="4" fill="#10B981"/>
    <text x="-15" y="74" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Requirements</text>
    <circle cx="-25" cy="85" r="4" fill="#10B981"/>
    <text x="-15" y="89" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Architecture</text>
    <circle cx="-25" cy="100" r="4" fill="#F59E0B"/>
    <text x="-15" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Documentation</text>
    
    <!-- Team member avatar -->
    <circle cx="25" cy="75" r="12" fill="#E0E7FF" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="25" cy="70" r="4" fill="#8B5CF6"/>
    <path d="M 17,85 Q 25,80 33,85" stroke="#8B5CF6" stroke-width="2" fill="none"/>
    <text x="25" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Tech Lead</text>
    
    <!-- Approval paths -->
    <!-- Approved path -->
    <path d="M 20,20 Q 40,10 60,20" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#approvedArrow)"/>
    <text x="50" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#10B981" text-anchor="middle">✓ Approved</text>
    
    <!-- Rejected path -->
    <path d="M 20,-20 Q 40,-30 60,-20" stroke="#EF4444" stroke-width="3" fill="none" marker-end="url(#rejectedArrow)"/>
    <text x="50" y="-25" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#EF4444" text-anchor="middle">✗ Rejected</text>
  </g>
  
  <!-- Gate 2: Code Review -->
  <g id="gate2" transform="translate(200, 80)">
    <circle cx="0" cy="0" r="20" fill="url(#primaryGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="15" fill="white"/>
    <text x="0" y="6" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6" text-anchor="middle">2</text>
    
    <rect x="-45" y="35" width="90" height="70" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="-40" y="40" width="80" height="20" rx="4" fill="url(#primaryGradient)"/>
    <text x="0" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">CODE REVIEW</text>
    
    <!-- Security badge -->
    <rect x="-35" y="65" width="25" height="12" rx="6" fill="#10B981" opacity="0.2"/>
    <text x="-22" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="7" font-weight="600" fill="#10B981" text-anchor="middle">🔒 SECURE</text>
    
    <!-- Quality indicators -->
    <circle cx="-25" cy="85" r="4" fill="#10B981"/>
    <text x="-15" y="89" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Code Quality</text>
    <circle cx="-25" cy="100" r="4" fill="#10B981"/>
    <text x="-15" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Test Coverage</text>
    
    <!-- Team member avatars -->
    <circle cx="15" cy="75" r="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="15" cy="72" r="3" fill="#3B82F6"/>
    <path d="M 9,82 Q 15,78 21,82" stroke="#3B82F6" stroke-width="1.5" fill="none"/>
    
    <circle cx="35" cy="75" r="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="35" cy="72" r="3" fill="#3B82F6"/>
    <path d="M 29,82 Q 35,78 41,82" stroke="#3B82F6" stroke-width="1.5" fill="none"/>
    
    <text x="25" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Senior Devs</text>
    
    <!-- Approval paths -->
    <path d="M 20,20 Q 40,10 60,20" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#approvedArrow)"/>
    <text x="50" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#10B981" text-anchor="middle">✓ Approved</text>
    
    <path d="M 20,-20 Q 40,-30 60,-20" stroke="#EF4444" stroke-width="3" fill="none" marker-end="url(#rejectedArrow)"/>
    <text x="50" y="-25" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#EF4444" text-anchor="middle">✗ Rejected</text>
  </g>
  
  <!-- Gate 3: Pricing Review -->
  <g id="gate3" transform="translate(320, 80)">
    <circle cx="0" cy="0" r="20" fill="url(#primaryGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="15" fill="white"/>
    <text x="0" y="6" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6" text-anchor="middle">3</text>
    
    <rect x="-45" y="35" width="90" height="70" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="-40" y="40" width="80" height="20" rx="4" fill="url(#primaryGradient)"/>
    <text x="0" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">PRICING REVIEW</text>
    
    <!-- Governance badge -->
    <rect x="-35" y="65" width="30" height="12" rx="6" fill="#8B5CF6" opacity="0.2"/>
    <text x="-20" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="7" font-weight="600" fill="#8B5CF6" text-anchor="middle">📋 GOVERNANCE</text>
    
    <!-- Quality indicators -->
    <circle cx="-25" cy="85" r="4" fill="#10B981"/>
    <text x="-15" y="89" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Cost Analysis</text>
    <circle cx="-25" cy="100" r="4" fill="#F59E0B"/>
    <text x="-15" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Budget Impact</text>
    
    <!-- Team member avatar -->
    <circle cx="25" cy="75" r="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="25" cy="70" r="4" fill="#F59E0B"/>
    <path d="M 17,85 Q 25,80 33,85" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <text x="25" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Finance</text>
    
    <!-- Approval paths -->
    <path d="M 20,20 Q 40,10 60,20" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#approvedArrow)"/>
    <text x="50" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#10B981" text-anchor="middle">✓ Approved</text>
    
    <path d="M 20,-20 Q 40,-30 60,-20" stroke="#EF4444" stroke-width="3" fill="none" marker-end="url(#rejectedArrow)"/>
    <text x="50" y="-25" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#EF4444" text-anchor="middle">✗ Rejected</text>
  </g>
  
  <!-- Gate 4: Deploy Review -->
  <g id="gate4" transform="translate(440, 80)">
    <circle cx="0" cy="0" r="20" fill="url(#primaryGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="15" fill="white"/>
    <text x="0" y="6" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6" text-anchor="middle">4</text>
    
    <rect x="-45" y="35" width="90" height="70" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="-40" y="40" width="80" height="20" rx="4" fill="url(#primaryGradient)"/>
    <text x="0" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">DEPLOY REVIEW</text>
    
    <!-- Security and governance badges -->
    <rect x="-40" y="65" width="20" height="10" rx="5" fill="#10B981" opacity="0.2"/>
    <text x="-30" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="6" font-weight="600" fill="#10B981" text-anchor="middle">🛡️ SEC</text>
    
    <rect x="-15" y="65" width="25" height="10" rx="5" fill="#3B82F6" opacity="0.2"/>
    <text x="-2" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="6" font-weight="600" fill="#3B82F6" text-anchor="middle">⚡ PERF</text>
    
    <!-- Quality indicators -->
    <circle cx="-25" cy="85" r="4" fill="#10B981"/>
    <text x="-15" y="89" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Deployment</text>
    <circle cx="-25" cy="100" r="4" fill="#10B981"/>
    <text x="-15" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#374151">Monitoring</text>
    
    <!-- Team member avatar -->
    <circle cx="25" cy="75" r="12" fill="#DCFCE7" stroke="#10B981" stroke-width="2"/>
    <circle cx="25" cy="70" r="4" fill="#10B981"/>
    <path d="M 17,85 Q 25,80 33,85" stroke="#10B981" stroke-width="2" fill="none"/>
    <text x="25" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">DevOps</text>
    
    <!-- Final deployment -->
    <path d="M 20,20 Q 40,10 60,20" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#approvedArrow)"/>
    <text x="50" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#10B981" text-anchor="middle">🚀 Deploy</text>
    
    <path d="M 20,-20 Q 40,-30 60,-20" stroke="#EF4444" stroke-width="3" fill="none" marker-end="url(#rejectedArrow)"/>
    <text x="50" y="-25" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#EF4444" text-anchor="middle">✗ Blocked</text>
  </g>
  
  <!-- Flow arrows between gates -->
  <path d="M 120,80 L 160,80" stroke="#6366F1" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  <path d="M 240,80 L 280,80" stroke="#6366F1" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  <path d="M 360,80 L 400,80" stroke="#6366F1" stroke-width="2" fill="none" marker-end="url(#flowArrow)"/>
  
  <!-- Final deployment endpoint -->
  <g transform="translate(520, 80)">
    <rect x="-25" y="-15" width="50" height="30" rx="15" fill="url(#approvedGradient)" filter="url(#shadow)"/>
    <text x="0" y="6" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">🚀 LIVE</text>
  </g>
  
  <!-- Workflow status panel -->
  <rect x="50" y="200" width="500" height="180" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
  
  <!-- Panel header -->
  <rect x="60" y="210" width="480" height="30" rx="6" fill="url(#primaryGradient)" opacity="0.1"/>
  <text x="300" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="middle">Workflow Status &amp; Governance</text>
  
  <!-- Status indicators -->
  <g transform="translate(80, 260)">
    <!-- Overall status -->
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="50" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#64748B" text-anchor="middle">OVERALL STATUS</text>
    <circle cx="50" cy="35" r="12" fill="url(#approvedGradient)"/>
    <text x="50" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">✓</text>
    <text x="50" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#10B981" text-anchor="middle">APPROVED</text>
    
    <!-- Security compliance -->
    <rect x="120" y="0" width="100" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="170" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#64748B" text-anchor="middle">SECURITY</text>
    <rect x="155" y="25" width="30" height="15" rx="7" fill="#10B981" opacity="0.2"/>
    <text x="170" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#10B981" text-anchor="middle">🔒 COMPLIANT</text>
    <text x="170" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">All checks passed</text>
    
    <!-- Quality score -->
    <rect x="240" y="0" width="100" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="290" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#64748B" text-anchor="middle">QUALITY SCORE</text>
    <text x="290" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#8B5CF6" text-anchor="middle">94%</text>
    <text x="290" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Above threshold</text>
    
    <!-- Timeline -->
    <rect x="360" y="0" width="100" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="410" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#64748B" text-anchor="middle">TIMELINE</text>
    <text x="410" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#3B82F6" text-anchor="middle">2.5 days</text>
    <text x="410" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Within SLA</text>
  </g>
  
  <!-- Governance metrics -->
  <g transform="translate(80, 340)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#64748B">Governance Metrics:</text>
    
    <circle cx="120" cy="-3" r="3" fill="#10B981"/>
    <text x="130" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#374151">Compliance: 100%</text>
    
    <circle cx="240" cy="-3" r="3" fill="#10B981"/>
    <text x="250" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#374151">Risk Assessment: Low</text>
    
    <circle cx="360" cy="-3" r="3" fill="#3B82F6"/>
    <text x="370" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#374151">Audit Trail: Complete</text>
  </g>
</svg>
