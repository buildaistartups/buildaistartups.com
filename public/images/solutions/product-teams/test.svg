<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576">
  <defs>
    <!-- Premium Gradients with Modern Color Palette -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="backgroundGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.15" />
      <stop offset="70%" style="stop-color:#764ba2;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="70%" style="stop-color:#f8fafc;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.5" />
    </radialGradient>
    
    <!-- Premium Shadow Filters -->
    <filter id="premiumShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a202c" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a202c" flood-opacity="0.1"/>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#1a202c" flood-opacity="0.1" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
    
    <!-- Enhanced Motion Effects -->
    <filter id="motionBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2 0" />
    </filter>
    
    <!-- Glass Morphism Effect -->
    <filter id="glassMorphism" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Premium Background -->
  <rect width="1024" height="576" fill="url(#backgroundGlow)"/>
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1024" height="576" fill="url(#grid)"/>
  
  <!-- Central Workflow Hub -->
  <g id="centralWorkflow" filter="url(#premiumShadow)">
    <!-- Outer glow ring -->
    <circle cx="512" cy="288" r="240" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>
    
    <!-- Main circle with glass morphism -->
    <circle cx="512" cy="288" r="220" fill="url(#centerGlow)" stroke="url(#primaryGradient)" stroke-width="3"/>
    
    <!-- Inner decorative rings -->
    <circle cx="512" cy="288" r="205" fill="none" stroke="url(#secondaryGradient)" stroke-width="1" opacity="0.4"/>
    <circle cx="512" cy="288" r="190" fill="none" stroke="url(#primaryGradient)" stroke-width="0.5" opacity="0.6"/>
    
    <!-- Workflow Stages with Enhanced Design -->
    <g id="workflowStages">
      <!-- SPEC Stage (Top) -->
      <g id="specStage" filter="url(#softGlow)">
        <circle cx="512" cy="120" r="65" fill="rgba(255,255,255,0.95)" stroke="url(#primaryGradient)" stroke-width="3"/>
        <circle cx="512" cy="120" r="55" fill="rgba(102,126,234,0.1)"/>
        
        <!-- Modern document icon -->
        <rect x="485" y="90" width="54" height="60" rx="6" fill="none" stroke="#667eea" stroke-width="2.5"/>
        <rect x="490" y="95" width="44" height="50" rx="2" fill="rgba(102,126,234,0.05)"/>
        <line x1="495" y1="105" x2="525" y2="105" stroke="#667eea" stroke-width="2" opacity="0.8"/>
        <line x1="495" y1="115" x2="530" y2="115" stroke="#667eea" stroke-width="2" opacity="0.6"/>
        <line x1="495" y1="125" x2="530" y2="125" stroke="#667eea" stroke-width="2" opacity="0.6"/>
        <line x1="495" y1="135" x2="520" y2="135" stroke="#667eea" stroke-width="2" opacity="0.4"/>
        
        <!-- Premium label -->
        <rect x="485" y="155" width="54" height="22" rx="11" fill="rgba(102,126,234,0.1)" stroke="url(#primaryGradient)" stroke-width="1"/>
        <text x="512" y="169" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#667eea">SPEC</text>
      </g>
      
      <!-- CODE Stage (Right) -->
      <g id="codeStage" filter="url(#softGlow)">
        <circle cx="700" cy="288" r="65" fill="rgba(255,255,255,0.95)" stroke="url(#secondaryGradient)" stroke-width="3"/>
        <circle cx="700" cy="288" r="55" fill="rgba(79,172,254,0.1)"/>
        
        <!-- Modern code icon -->
        <rect x="673" y="258" width="54" height="60" rx="6" fill="rgba(79,172,254,0.05)" stroke="#4facfe" stroke-width="2"/>
        <path d="M 685 275 L 675 285 L 685 295" fill="none" stroke="#4facfe" stroke-width="3" stroke-linecap="round"/>
        <path d="M 715 275 L 725 285 L 715 295" fill="none" stroke="#4facfe" stroke-width="3" stroke-linecap="round"/>
        <line x1="695" y1="275" x2="705" y2="295" stroke="#4facfe" stroke-width="2.5" stroke-linecap="round"/>
        
        <!-- Premium label -->
        <rect x="673" y="323" width="54" height="22" rx="11" fill="rgba(79,172,254,0.1)" stroke="url(#secondaryGradient)" stroke-width="1"/>
        <text x="700" y="337" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4facfe">CODE</text>
      </g>
      
      <!-- REVIEW Stage (Bottom) -->
      <g id="reviewStage" filter="url(#softGlow)">
        <circle cx="512" cy="456" r="65" fill="rgba(255,255,255,0.95)" stroke="url(#accentGradient)" stroke-width="3"/>
        <circle cx="512" cy="456" r="55" fill="rgba(247,112,154,0.1)"/>
        
        <!-- Modern review icon -->
        <rect x="485" y="426" width="54" height="60" rx="6" fill="rgba(247,112,154,0.05)" stroke="#fa709a" stroke-width="2"/>
        <circle cx="505" cy="446" r="8" fill="none" stroke="#fa709a" stroke-width="2.5"/>
        <polyline points="500,446 503,449 508,441" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="525" cy="456" r="8" fill="none" stroke="#fa709a" stroke-width="2.5"/>
        <polyline points="520,456 523,459 528,451" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="505" cy="466" r="8" fill="none" stroke="#fa709a" stroke-width="2.5"/>
        <polyline points="500,466 503,469 508,461" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
        
        <!-- Premium label -->
        <rect x="475" y="491" width="74" height="22" rx="11" fill="rgba(247,112,154,0.1)" stroke="url(#accentGradient)" stroke-width="1"/>
        <text x="512" y="505" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#fa709a">REVIEW</text>
      </g>
      
      <!-- DEPLOY Stage (Left) -->
      <g id="deployStage" filter="url(#softGlow)">
        <circle cx="324" cy="288" r="65" fill="rgba(255,255,255,0.95)" stroke="url(#primaryGradient)" stroke-width="3"/>
        <circle cx="324" cy="288" r="55" fill="rgba(118,75,162,0.1)"/>
        
        <!-- Modern rocket icon -->
        <path d="M 324 258 L 315 298 L 324 293 L 333 298 Z" fill="#764ba2" stroke="#764ba2" stroke-width="1"/>
        <ellipse cx="324" cy="305" rx="18" ry="10" fill="rgba(239,68,68,0.6)"/>
        <circle cx="324" cy="275" r="6" fill="#ffffff" stroke="#764ba2" stroke-width="1"/>
        <ellipse cx="340" cy="265" rx="8" ry="5" fill="rgba(224,231,255,0.8)"/>
        <ellipse cx="308" cy="265" rx="8" ry="5" fill="rgba(224,231,255,0.8)"/>
        
        <!-- Premium label -->
        <rect x="287" y="323" width="74" height="22" rx="11" fill="rgba(118,75,162,0.1)" stroke="url(#primaryGradient)" stroke-width="1"/>
        <text x="324" y="337" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#764ba2">DEPLOY</text>
      </g>
    </g>
    
    <!-- Premium Flow Lines with Smooth Animation -->
    <g id="flowLines" opacity="0.6">
      <path d="M 512 185 Q 606 235 635 288" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="12,8">
        <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 635 288 Q 606 341 512 391" fill="none" stroke="url(#secondaryGradient)" stroke-width="3" stroke-dasharray="12,8">
        <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 512 391 Q 418 341 389 288" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-dasharray="12,8">
        <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 389 288 Q 418 235 512 185" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-dasharray="12,8">
        <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Premium Team Members -->
  <!-- Product Manager (Top Left) -->
  <g id="productManager" transform="translate(120, 120)" filter="url(#premiumShadow)">
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.95)" stroke="url(#primaryGradient)" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="rgba(102,126,234,0.05)"/>
    
    <!-- Modern avatar -->
    <circle cx="0" cy="-15" r="20" fill="#667eea"/>
    <path d="M -25 15 L -18 8 L 18 8 L 25 15 L 25 50 L -25 50 Z" fill="#4facfe"/>
    <rect x="-30" y="12" width="12" height="25" rx="6" fill="#667eea"/>
    <rect x="18" y="12" width="12" height="25" rx="6" fill="#667eea"/>
    
    <!-- Premium document -->
    <rect x="18" y="25" width="35" height="45" rx="4" fill="#ffffff" stroke="#667eea" stroke-width="2"/>
    <line x1="24" y1="33" x2="47" y2="33" stroke="#667eea" stroke-width="1.5"/>
    <line x1="24" y1="40" x2="47" y2="40" stroke="#667eea" stroke-width="1.5"/>
    <line x1="24" y1="47" x2="47" y2="47" stroke="#667eea" stroke-width="1.5"/>
    <line x1="24" y1="54" x2="42" y2="54" stroke="#667eea" stroke-width="1.5"/>
    
    <!-- Premium label -->
    <rect x="-65" y="85" width="130" height="24" rx="12" fill="rgba(102,126,234,0.1)" stroke="url(#primaryGradient)" stroke-width="1"/>
    <text x="0" y="100" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#667eea">Product Manager</text>
  </g>
  
  <!-- UI/UX Designer (Top Right) -->
  <g id="uiDesigner" transform="translate(904, 120)" filter="url(#premiumShadow)">
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.95)" stroke="url(#secondaryGradient)" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="rgba(79,172,254,0.05)"/>
    
    <!-- Modern avatar -->
    <circle cx="0" cy="-15" r="20" fill="#4facfe"/>
    <path d="M -25 15 L -18 8 L 18 8 L 25 15 L 25 50 L -25 50 Z" fill="#00f2fe"/>
    <rect x="-30" y="12" width="12" height="25" rx="6" fill="#4facfe"/>
    <rect x="18" y="12" width="12" height="25" rx="6" fill="#4facfe"/>
    
    <!-- Premium tablet -->
    <rect x="-30" y="30" width="60" height="40" rx="6" fill="#1f2937" stroke="#4facfe" stroke-width="2"/>
    <rect x="-25" y="35" width="50" height="30" rx="2" fill="#ffffff"/>
    <rect x="-20" y="40" width="12" height="12" rx="2" fill="#4facfe" opacity="0.7"/>
    <rect x="-5" y="40" width="12" height="6" rx="1" fill="#00f2fe" opacity="0.7"/>
    <rect x="-5" y="48" width="12" height="10" rx="1" fill="#10b981" opacity="0.7"/>
    <circle cx="15" cy="48" r="5" fill="#fa709a" opacity="0.7"/>
    
    <!-- Premium label -->
    <rect x="-65" y="85" width="130" height="24" rx="12" fill="rgba(79,172,254,0.1)" stroke="url(#secondaryGradient)" stroke-width="1"/>
    <text x="0" y="100" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4facfe">UI/UX Designer</text>
  </g>
  
  <!-- Frontend Engineer (Bottom Right) -->
  <g id="frontendEngineer" transform="translate(904, 456)" filter="url(#premiumShadow)">
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.95)" stroke="url(#accentGradient)" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="rgba(247,112,154,0.05)"/>
    
    <!-- Modern avatar -->
    <circle cx="0" cy="-15" r="20" fill="#fa709a"/>
    <path d="M -25 15 L -18 8 L 18 8 L 25 15 L 25 50 L -25 50 Z" fill="#fee140"/>
    <rect x="-30" y="12" width="12" height="25" rx="6" fill="#fa709a"/>
    <rect x="18" y="12" width="12" height="25" rx="6" fill="#fa709a"/>
    
    <!-- Premium laptop -->
    <path d="M -40 45 L -32 25 L 32 25 L 40 45 Z" fill="#1f2937" stroke="#fa709a" stroke-width="2"/>
    <rect x="-28" y="27" width="56" height="16" rx="1" fill="#0f172a"/>
    <line x1="-22" y1="31" x2="-10" y2="31" stroke="#10b981" stroke-width="1.5"/>
    <line x1="-22" y1="35" x2="-5" y2="35" stroke="#fa709a" stroke-width="1.5"/>
    <line x1="-22" y1="39" x2="-12" y2="39" stroke="#fee140" stroke-width="1.5"/>
    <rect x="-45" y="45" width="90" height="4" rx="2" fill="#374151"/>
    
    <!-- Premium label -->
    <rect x="-70" y="-100" width="140" height="24" rx="12" fill="rgba(247,112,154,0.1)" stroke="url(#accentGradient)" stroke-width="1"/>
    <text x="0" y="-85" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fa709a">Frontend Engineer</text>
  </g>
  
  <!-- DevOps Specialist (Bottom Left) -->
  <g id="devopsSpecialist" transform="translate(120, 456)" filter="url(#premiumShadow)">
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.95)" stroke="url(#primaryGradient)" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="rgba(118,75,162,0.05)"/>
    
    <!-- Modern avatar -->
    <circle cx="0" cy="-15" r="20" fill="#764ba2"/>
    <path d="M -25 15 L -18 8 L 18 8 L 25 15 L 25 50 L -25 50 Z" fill="#f093fb"/>
    <rect x="-30" y="12" width="12" height="25" rx="6" fill="#764ba2"/>
    <rect x="18" y="12" width="12" height="25" rx="6" fill="#764ba2"/>
    
    <!-- Premium dashboard -->
    <rect x="-35" y="20" width="70" height="50" rx="6" fill="#0f172a" stroke="#764ba2" stroke-width="2"/>
    <rect x="-30" y="26" width="60" height="6" rx="2" fill="#10b981" opacity="0.8"/>
    <rect x="-30" y="35" width="25" height="4" rx="1" fill="#764ba2" opacity="0.8"/>
    <rect x="-30" y="42" width="35" height="4" rx="1" fill="#f093fb" opacity="0.8"/>
    <rect x="-30" y="49" width="40" height="4" rx="1" fill="#fa709a" opacity="0.8"/>
    <circle cx="25" cy="37" r="4" fill="#10b981"/>
    <circle cx="25" cy="45" r="4" fill="#10b981"/>
    <circle cx="25" cy="53" r="4" fill="#ef4444"/>
    
    <!-- Premium label -->
    <rect x="-70" y="-100" width="140" height="24" rx="12" fill="rgba(118,75,162,0.1)" stroke="url(#primaryGradient)" stroke-width="1"/>
    <text x="0" y="-85" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#764ba2">DevOps Specialist</text>
  </g>
  
  <!-- Premium Quality Indicators -->
  <g id="qualityIndicators" filter="url(#glassMorphism)">
    <g transform="translate(620, 170)">
      <rect x="0" y="0" width="50" height="24" rx="12" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1"/>
      <circle cx="12" cy="12" r="4" fill="#10b981"/>
      <text x="25" y="16" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#10b981">98%</text>
    </g>
    
    <g transform="translate(354, 406)">
      <rect x="0" y="0" width="50" height="24" rx="12" fill="rgba(102,126,234,0.1)" stroke="#667eea" stroke-width="1"/>
      <circle cx="12" cy="12" r="4" fill="#667eea"/>
      <text x="25" y="16" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#667eea">96%</text>
    </g>
  </g>
  
  <!-- Premium Collaboration Elements -->
  <g id="collaborationElements" filter="url(#softGlow)">
    <!-- Live cursors -->
    <g transform="translate(540, 230)">
      <path d="M 0 0 L 0 12 L 4 9 L 5 12 L 7 11 L 5 8 L 9 8 Z" fill="#667eea"/>
      <rect x="12" y="2" width="32" height="12" rx="6" fill="rgba(102,126,234,0.9)"/>
      <text x="28" y="10" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#ffffff">Sarah</text>
    </g>
    
    <g transform="translate(680, 320)">
      <path d="M 0 0 L 0 12 L 4 9 L 5 12 L 7 11 L 5 8 L 9 8 Z" fill="#4facfe"/>
      <rect x="12" y="2" width="28" height="12" rx="6" fill="rgba(79,172,254,0.9)"/>
      <text x="26" y="10" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#ffffff">Alex</text>
    </g>
    
    <!-- Comment bubble -->
    <g transform="translate(750, 250)">
      <rect x="0" y="0" width="65" height="40" rx="8" fill="rgba(255,255,255,0.95)" stroke="rgba(102,126,234,0.3)" stroke-width="1"/>
      <circle cx="8" cy="12" r="3" fill="#667eea"/>
      <rect x="15" y="9" width="40" height="3" rx="1" fill="#e5e7eb"/>
      <rect x="15" y="15" width="30" height="3" rx="1" fill="#e5e7eb"/>
      <circle cx="8" cy="28" r="3" fill="#4facfe"/>
      <rect x="15" y="25" width="42" height="3" rx="1" fill="#e5e7eb"/>
      <rect x="15" y="31" width="35" height="3" rx="1" fill="#e5e7eb"/>
    </g>
  </g>
  
  <!-- Premium Title -->
  <g id="title" transform="translate(512, 30)" filter="url(#softGlow)">
    <rect x="-250" y="-20" width="500" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="url(#primaryGradient)" stroke-width="1"/>
    <text x="0" y="8" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="700" fill="url(#primaryGradient)">Collaborative Development Workflow</text>
  </g>
  
  <!-- Subtle Animation Elements -->
  <g id="pulseElements" opacity="0.3">
    <circle cx="512" cy="288" r="260" fill="none" stroke="url(#primaryGradient)" stroke-width="1">
      <animate attributeName="r" values="260;280;260" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
