<svg width="400" height="128" viewBox="0 0 400 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gradient Definitions -->
    <linearGradient id="hubGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8caba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4e75;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background Gradient -->
    <radialGradient id="backgroundGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.02" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0.01" />
    </radialGradient>
    
    <!-- Premium Glow Effects -->
    <filter id="premiumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animated Gradient for Hub -->
    <linearGradient id="animatedHub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1">
        <animate attributeName="stop-color" values="#667eea;#764ba2;#f093fb;#667eea" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1">
        <animate attributeName="stop-color" values="#764ba2;#f093fb;#667eea;#764ba2" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1">
        <animate attributeName="stop-color" values="#f093fb;#667eea;#764ba2;#f093fb" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Premium Background -->
  <rect width="400" height="128" fill="url(#backgroundGradient)"/>
  
  <!-- Enhanced Connection Lines with Animation -->
  <g filter="url(#lineGlow)">
    <line x1="200" y1="64" x2="60" y2="30" stroke="url(#lineGradient)" stroke-width="2" stroke-dasharray="6,3" opacity="0.9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="9" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="64" x2="60" y2="98" stroke="url(#lineGradient)" stroke-width="2" stroke-dasharray="6,3" opacity="0.9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="9" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="64" x2="340" y2="30" stroke="url(#lineGradient)" stroke-width="2" stroke-dasharray="6,3" opacity="0.9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="9" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="64" x2="340" y2="98" stroke="url(#lineGradient)" stroke-width="2" stroke-dasharray="6,3" opacity="0.9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="9" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="64" x2="140" y2="64" stroke="url(#lineGradient)" stroke-width="2" stroke-dasharray="6,3" opacity="0.9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="9" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="64" x2="260" y2="64" stroke="url(#lineGradient)" stroke-width="2" stroke-dasharray="6,3" opacity="0.9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="9" dur="1.9s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Premium Central Hub -->
  <g filter="url(#premiumGlow)">
    <circle cx="200" cy="64" r="28" fill="url(#animatedHub)" opacity="0.9"/>
    <circle cx="200" cy="64" r="24" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <circle cx="200" cy="64" r="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Enhanced Hub Icon -->
  <g opacity="0.95">
    <circle cx="200" cy="64" r="5" fill="#ffffff"/>
    <circle cx="190" cy="54" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="210" cy="54" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="190" cy="74" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="210" cy="74" r="2.5" fill="#ffffff" opacity="0.9"/>
    <line x1="200" y1="64" x2="190" y2="54" stroke="#ffffff" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="200" y1="64" x2="210" y2="54" stroke="#ffffff" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="200" y1="64" x2="190" y2="74" stroke="#ffffff" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="200" y1="64" x2="210" y2="74" stroke="#ffffff" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  </g>
  
  <!-- Premium Security Badge -->
  <g filter="url(#cardShadow)">
    <circle cx="218" cy="50" r="8" fill="#10b981"/>
    <circle cx="218" cy="50" r="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    <path d="M 215 50 L 217 52.5 L 221 47" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Enhanced Service Cards -->
  
  <!-- GitHub (top left) -->
  <g filter="url(#cardShadow)">
    <rect x="35" y="18" width="50" height="24" rx="6" fill="url(#cardGradient1)"/>
    <rect x="36" y="19" width="48" height="22" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="60" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">GitHub</text>
    <circle cx="44" cy="30" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="76" cy="30" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Slack (bottom left) -->
  <g filter="url(#cardShadow)">
    <rect x="35" y="86" width="50" height="24" rx="6" fill="url(#cardGradient2)"/>
    <rect x="36" y="87" width="48" height="22" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="60" y="100" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">Slack</text>
    <circle cx="44" cy="98" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="76" cy="98" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Notion (middle left) -->
  <g filter="url(#cardShadow)">
    <rect x="115" y="52" width="50" height="24" rx="6" fill="url(#cardGradient3)"/>
    <rect x="116" y="53" width="48" height="22" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="140" y="66" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">Notion</text>
    <circle cx="124" cy="64" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="156" cy="64" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Jira (middle right) -->
  <g filter="url(#cardShadow)">
    <rect x="235" y="52" width="50" height="24" rx="6" fill="url(#cardGradient4)"/>
    <rect x="236" y="53" width="48" height="22" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="260" y="66" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">Jira</text>
    <circle cx="244" cy="64" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="276" cy="64" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.9s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Vercel (top right) -->
  <g filter="url(#cardShadow)">
    <rect x="315" y="18" width="50" height="24" rx="6" fill="url(#cardGradient5)"/>
    <rect x="316" y="19" width="48" height="22" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="340" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">Vercel</text>
    <circle cx="324" cy="30" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="356" cy="30" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Stripe (bottom right) -->
  <g filter="url(#cardShadow)">
    <rect x="315" y="86" width="50" height="24" rx="6" fill="url(#cardGradient6)"/>
    <rect x="316" y="87" width="48" height="22" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="340" y="100" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">Stripe</text>
    <circle cx="324" cy="98" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="356" cy="98" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Premium Security Indicators -->
  <g filter="url(#cardShadow)">
    <circle cx="125" cy="45" r="5" fill="#10b981" opacity="0.95"/>
    <circle cx="125" cy="45" r="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <path d="M 123 45 L 124.5 46.5 L 127 43.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
    
    <circle cx="275" cy="45" r="5" fill="#10b981" opacity="0.95"/>
    <circle cx="275" cy="45" r="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <path d="M 273 45 L 274.5 46.5 L 277 43.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
    
    <circle cx="125" cy="83" r="5" fill="#10b981" opacity="0.95"/>
    <circle cx="125" cy="83" r="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <path d="M 123 83 L 124.5 84.5 L 127 81.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
    
    <circle cx="275" cy="83" r="5" fill="#10b981" opacity="0.95"/>
    <circle cx="275" cy="83" r="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <path d="M 273 83 L 274.5 84.5 L 277 81.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Data Flow Indicators -->
  <g opacity="0.7">
    <circle cx="170" cy="47" r="1.5" fill="#f093fb">
      <animate attributeName="cx" values="170;180;190" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="47" r="1.5" fill="#667eea">
      <animate attributeName="cx" values="230;220;210" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="81" r="1.5" fill="#764ba2">
      <animate attributeName="cx" values="170;180;190" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="81" r="1.5" fill="#f093fb">
      <animate attributeName="cx" values="230;220;210" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
