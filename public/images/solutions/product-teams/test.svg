<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Enhanced gradient definitions -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c3483;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f618d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow -->
    <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M 2,2 L 10,6 L 2,10 Z" fill="#8e44ad" filter="url(#glow)"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M 2,2 L 10,6 L 2,10 Z" fill="#2980b9" filter="url(#glow)"/>
    </marker>
  </defs>
  
  <!-- Title with enhanced styling -->
  <text x="400" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#2c3e50" text-anchor="middle" filter="url(#dropshadow)">
    Workflow Mode Comparison
  </text>
  <!-- Enhanced subtitle - bigger and more visible -->
  <text x="400" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="#34495e" text-anchor="middle">
    Choose your automation level
  </text>
  
  <!-- Left Column - Copilot Mode -->
  <g id="copilot-section">
    <!-- Main card background -->
    <rect x="50" y="100" width="300" height="350" rx="20" fill="#ffffff" filter="url(#cardShadow)" opacity="0.95"/>
    
    <!-- Header Box -->
    <rect x="70" y="120" width="260" height="70" rx="15" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <text x="200" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">
      COPILOT MODE
    </text>
    <!-- Enhanced subtitle - bigger and more visible -->
    <text x="200" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="500" fill="#f8f9fa" text-anchor="middle">
      Human-guided automation
    </text>
    
    <!-- Enhanced Toggle Switch -->
    <g transform="translate(150, 205)">
      <rect x="0" y="0" width="60" height="25" rx="12.5" fill="#e9ecef" stroke="#8e44ad" stroke-width="2"/>
      <circle cx="15" cy="12.5" r="10" fill="url(#purpleGradient)" filter="url(#dropshadow)"/>
      <!-- Enhanced control text - bigger -->
      <text x="70" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2c3e50" font-weight="600">Manual Control</text>
    </g>
    
    <!-- Workflow Steps with enhanced design -->
    <!-- Step 1 -->
    <rect x="80" y="250" width="240" height="50" rx="10" fill="#f8f9fa" stroke="#8e44ad" stroke-width="2" filter="url(#dropshadow)"/>
    <circle cx="105" cy="275" r="12" fill="#8e44ad"/>
    <text x="115" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="bold">1</text>
    <text x="130" y="278" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="600">
      Task Initiated
    </text>
    <text x="130" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7f8c8d">
      System awaits user input
    </text>
    
    <!-- Human Approval Gate 1 -->
    <circle cx="200" cy="325" r="25" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <g transform="translate(200, 325)">
      <!-- Enhanced human icon -->
      <circle cx="0" cy="-8" r="6" fill="white"/>
      <path d="M -8,0 L -8,10 L -4,15 L 4,15 L 8,10 L 8,0 Z" fill="white"/>
      <circle cx="-3" cy="-8" r="1" fill="#8e44ad"/>
      <circle cx="3" cy="-8" r="1" fill="#8e44ad"/>
      <path d="M -2,-5 Q 0,-3 2,-5" stroke="#8e44ad" stroke-width="1" fill="none"/>
    </g>
    <text x="200" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8e44ad" text-anchor="middle" font-weight="bold">
      APPROVAL REQUIRED
    </text>
    
    <!-- Enhanced Arrow -->
    <path d="M 200,370 Q 200,380 200,385" stroke="#8e44ad" stroke-width="3" fill="none" marker-end="url(#arrowPurple)" opacity="0.8"/>
    
    <!-- Step 2 -->
    <rect x="80" y="390" width="240" height="50" rx="10" fill="#f8f9fa" stroke="#8e44ad" stroke-width="2" filter="url(#dropshadow)"/>
    <circle cx="105" cy="415" r="12" fill="#8e44ad"/>
    <text x="115" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="bold">2</text>
    <text x="130" y="418" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="600">
      Process Execution
    </text>
    <text x="130" y="432" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7f8c8d">
      Controlled automation
    </text>
  </g>
  
  <!-- Right Column - Autopilot Mode -->
  <g id="autopilot-section">
    <!-- Main card background -->
    <rect x="450" y="100" width="300" height="350" rx="20" fill="#ffffff" filter="url(#cardShadow)" opacity="0.95"/>
    
    <!-- Header Box -->
    <rect x="470" y="120" width="260" height="70" rx="15" fill="url(#blueGradient)" filter="url(#glow)"/>
    <text x="600" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">
      AUTOPILOT MODE
    </text>
    <!-- Enhanced subtitle - bigger and more visible -->
    <text x="600" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="500" fill="#f8f9fa" text-anchor="middle">
      Fully autonomous execution
    </text>
    
    <!-- Enhanced Toggle Switch -->
    <g transform="translate(550, 205)">
      <rect x="0" y="0" width="60" height="25" rx="12.5" fill="#e9ecef" stroke="#2980b9" stroke-width="2"/>
      <circle cx="45" cy="12.5" r="10" fill="url(#blueGradient)" filter="url(#dropshadow)"/>
      <!-- Enhanced control text - bigger -->
      <text x="-105" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2c3e50" font-weight="600">Auto Control</text>
    </g>
    
    <!-- Workflow Steps -->
    <!-- Step 1 -->
    <rect x="480" y="250" width="240" height="50" rx="10" fill="#f8f9fa" stroke="#2980b9" stroke-width="2" filter="url(#dropshadow)"/>
    <circle cx="505" cy="275" r="12" fill="#2980b9"/>
    <text x="515" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="bold">1</text>
    <text x="530" y="278" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="600">
      Task Initiated
    </text>
    <text x="530" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7f8c8d">
      Automatic processing begins
    </text>
    
    <!-- Automation Symbol 1 -->
    <circle cx="600" cy="325" r="25" fill="url(#blueGradient)" filter="url(#glow)"/>
    <g transform="translate(600, 325)">
      <!-- Enhanced gear icon -->
      <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4" fill="white"/>
      <g stroke="white" stroke-width="2">
        <path d="M 0,-12 L 0,-18 M 0,12 L 0,18 M -12,0 L -18,0 M 12,0 L 18,0"/>
        <path d="M -8.5,-8.5 L -12.7,-12.7 M 8.5,8.5 L 12.7,12.7 M -8.5,8.5 L -12.7,12.7 M 8.5,-8.5 L 12.7,-12.7"/>
      </g>
    </g>
    <text x="600" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2980b9" text-anchor="middle" font-weight="bold">
      AUTO PROCESSING
    </text>
    
    <!-- Enhanced Arrow -->
    <path d="M 600,370 Q 600,380 600,385" stroke="#2980b9" stroke-width="3" fill="none" marker-end="url(#arrowBlue)" opacity="0.8"/>
    
    <!-- Step 2 -->
    <rect x="480" y="390" width="240" height="50" rx="10" fill="#f8f9fa" stroke="#2980b9" stroke-width="2" filter="url(#dropshadow)"/>
    <circle cx="505" cy="415" r="12" fill="#2980b9"/>
    <text x="515" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="bold">2</text>
    <text x="530" y="418" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="600">
      Process Execution
    </text>
    <text x="530" y="432" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7f8c8d">
      Seamless automation
    </text>
  </g>
  
  <!-- Enhanced Divider Line -->
  <line x1="400" y1="100" x2="400" y2="450" stroke="url(#purpleGradient)" stroke-width="3" stroke-dasharray="10,5" opacity="0.3"/>
  <circle cx="400" cy="275" r="8" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/>
  <text x="400" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle" font-weight="bold">VS</text>
  
  <!-- Performance indicators -->
  <g transform="translate(50, 470)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8e44ad" font-weight="600">
      ⚡ Control: High | Speed: Medium | Flexibility: Maximum
    </text>
  </g>
  
  <g transform="translate(450, 470)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2980b9" font-weight="600">
      🚀 Control: Low | Speed: High | Efficiency: Maximum
    </text>
  </g>
</svg>
