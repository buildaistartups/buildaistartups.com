<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Enhanced gradients -->
        <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
            <stop offset="25%" style="stop-color:#8B5CF6;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="75%" style="stop-color:#06B6D4;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
        </linearGradient>
        
        <!-- Background gradient -->
        <radialGradient id="backgroundGradient" cx="50%" cy="30%" r="80%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
        </radialGradient>
        
        <!-- Card gradients -->
        <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.05" />
        </linearGradient>
        
        <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.05" />
        </linearGradient>
        
        <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.05" />
        </linearGradient>
        
        <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.05" />
        </linearGradient>
        
        <!-- Filters -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
        
        <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
        
        <!-- Arrow markers -->
        <marker id="arrowMarker" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="500" fill="url(#backgroundGradient)"/>
    
    <!-- Decorative background elements -->
    <circle cx="700" cy="100" r="60" fill="#7C3AED" opacity="0.03"/>
    <circle cx="150" cy="400" r="80" fill="#06B6D4" opacity="0.03"/>
    <circle cx="650" cy="350" r="40" fill="#3B82F6" opacity="0.03"/>
    
    <!-- Enhanced Title -->
    <text x="400" y="50" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#1e293b" text-anchor="middle" filter="url(#textShadow)">
        4-Week Pilot Progression
    </text>
    <text x="400" y="75" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="middle">
        Strategic Implementation Timeline
    </text>
    
    <!-- Enhanced Timeline Bar with glow -->
    <line x1="120" y1="120" x2="680" y2="120" stroke="url(#timelineGradient)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Progress indicators -->
    <line x1="120" y1="115" x2="680" y2="115" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
    <line x1="120" y1="125" x2="680" y2="125" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Week 1: Kickoff -->
    <g id="week1">
        <!-- Enhanced circle with glow -->
        <circle cx="120" cy="120" r="18" fill="#7C3AED" filter="url(#glow)"/>
        <circle cx="120" cy="120" r="12" fill="white"/>
        <text x="120" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#7C3AED" text-anchor="middle">1</text>
        
        <text x="120" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#7C3AED" text-anchor="middle">
            Week 1
        </text>
        <text x="120" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">
            Kickoff &amp; Planning
        </text>
        
        <!-- Enhanced card -->
        <rect x="60" y="190" width="120" height="110" rx="12" fill="url(#cardGradient1)" stroke="#7C3AED" stroke-width="2" filter="url(#cardShadow)"/>
        <rect x="65" y="195" width="110" height="25" rx="6" fill="#7C3AED"/>
        <text x="120" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">
            MILESTONES
        </text>
        
        <!-- Enhanced bullet points -->
        <circle cx="75" cy="225" r="2" fill="#7C3AED"/>
        <text x="85" y="229" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Team alignment &amp; charter
        </text>
        <circle cx="75" cy="240" r="2" fill="#7C3AED"/>
        <text x="85" y="244" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Scope definition &amp; goals
        </text>
        <circle cx="75" cy="255" r="2" fill="#7C3AED"/>
        <text x="85" y="259" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Resource allocation
        </text>
        <circle cx="75" cy="270" r="2" fill="#7C3AED"/>
        <text x="85" y="274" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Success criteria setup
        </text>
        <circle cx="75" cy="285" r="2" fill="#7C3AED"/>
        <text x="85" y="289" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Risk assessment
        </text>
    </g>
    
    <!-- Connecting arrows -->
    <path d="M 180,120 Q 220,110 260,120" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowMarker)" opacity="0.6"/>
    
    <!-- Week 2: Build -->
    <g id="week2">
        <circle cx="300" cy="120" r="18" fill="#8B5CF6" filter="url(#glow)"/>
        <circle cx="300" cy="120" r="12" fill="white"/>
        <text x="300" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#8B5CF6" text-anchor="middle">2</text>
        
        <text x="300" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#8B5CF6" text-anchor="middle">
            Week 2
        </text>
        <text x="300" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">
            Build &amp; Develop
        </text>
        
        <rect x="240" y="190" width="120" height="110" rx="12" fill="url(#cardGradient2)" stroke="#8B5CF6" stroke-width="2" filter="url(#cardShadow)"/>
        <rect x="245" y="195" width="110" height="25" rx="6" fill="#8B5CF6"/>
        <text x="300" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">
            DELIVERABLES
        </text>
        
        <circle cx="255" cy="225" r="2" fill="#8B5CF6"/>
        <text x="265" y="229" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Core features development
        </text>
        <circle cx="255" cy="240" r="2" fill="#8B5CF6"/>
        <text x="265" y="244" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Integration &amp; testing
        </text>
        <circle cx="255" cy="255" r="2" fill="#8B5CF6"/>
        <text x="265" y="259" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Technical documentation
        </text>
        <circle cx="255" cy="270" r="2" fill="#8B5CF6"/>
        <text x="265" y="274" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Quality assurance
        </text>
        <circle cx="255" cy="285" r="2" fill="#8B5CF6"/>
        <text x="265" y="289" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Performance optimization
        </text>
    </g>
    
    <path d="M 360,120 Q 400,110 440,120" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowMarker)" opacity="0.6"/>
    
    <!-- Week 3: Deploy -->
    <g id="week3">
        <circle cx="500" cy="120" r="18" fill="#3B82F6" filter="url(#glow)"/>
        <circle cx="500" cy="120" r="12" fill="white"/>
        <text x="500" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#3B82F6" text-anchor="middle">3</text>
        
        <text x="500" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#3B82F6" text-anchor="middle">
            Week 3
        </text>
        <text x="500" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">
            Deploy &amp; Launch
        </text>
        
        <rect x="440" y="190" width="120" height="110" rx="12" fill="url(#cardGradient3)" stroke="#3B82F6" stroke-width="2" filter="url(#cardShadow)"/>
        <rect x="445" y="195" width="110" height="25" rx="6" fill="#3B82F6"/>
        <text x="500" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">
            ACTIVITIES
        </text>
        
        <circle cx="455" cy="225" r="2" fill="#3B82F6"/>
        <text x="465" y="229" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            User onboarding &amp; training
        </text>
        <circle cx="455" cy="240" r="2" fill="#3B82F6"/>
        <text x="465" y="244" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Production deployment
        </text>
        <circle cx="455" cy="255" r="2" fill="#3B82F6"/>
        <text x="465" y="259" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Real-time monitoring
        </text>
        <circle cx="455" cy="270" r="2" fill="#3B82F6"/>
        <text x="465" y="274" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            User feedback collection
        </text>
        <circle cx="455" cy="285" r="2" fill="#3B82F6"/>
        <text x="465" y="289" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Performance tracking
        </text>
    </g>
    
    <path d="M 560,120 Q 600,110 640,120" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowMarker)" opacity="0.6"/>
    
    <!-- Week 4: Results -->
    <g id="week4">
        <circle cx="680" cy="120" r="18" fill="#06B6D4" filter="url(#glow)"/>
        <circle cx="680" cy="120" r="12" fill="white"/>
        <text x="680" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#06B6D4" text-anchor="middle">4</text>
        
        <text x="680" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#06B6D4" text-anchor="middle">
            Week 4
        </text>
        <text x="680" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">
            Results &amp; Scale
        </text>
        
        <rect x="620" y="190" width="120" height="110" rx="12" fill="url(#cardGradient4)" stroke="#06B6D4" stroke-width="2" filter="url(#cardShadow)"/>
        <rect x="625" y="195" width="110" height="25" rx="6" fill="#06B6D4"/>
        <text x="680" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">
            SUCCESS METRICS
        </text>
        
        <circle cx="635" cy="225" r="2" fill="#06B6D4"/>
        <text x="645" y="229" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Performance analytics
        </text>
        <circle cx="635" cy="240" r="2" fill="#06B6D4"/>
        <text x="645" y="244" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            User satisfaction scores
        </text>
        <circle cx="635" cy="255" r="2" fill="#06B6D4"/>
        <text x="645" y="259" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            ROI &amp; cost analysis
        </text>
        <circle cx="635" cy="270" r="2" fill="#06B6D4"/>
        <text x="645" y="274" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Scaling strategy
        </text>
        <circle cx="635" cy="285" r="2" fill="#06B6D4"/>
        <text x="645" y="289" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1e293b" font-weight="500">
            Executive presentation
        </text>
    </g>
    
    <!-- Enhanced Team Activities Section -->
    <rect x="80" y="330" width="640" height="120" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#cardShadow)"/>
    
    <!-- Section header with gradient background -->
    <rect x="90" y="340" width="620" height="30" rx="8" fill="url(#timelineGradient)" opacity="0.1"/>
    <text x="400" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">
        TEAM ACTIVITIES &amp; KEY OUTCOMES
    </text>
    
    <!-- Activity timeline -->
    <g id="activities">
        <!-- Week 1 Activity -->
        <rect x="110" y="380" width="140" height="50" rx="8" fill="#f3e8ff" stroke="#7C3AED" stroke-width="1"/>
        <circle cx="125" cy="395" r="6" fill="#7C3AED"/>
        <text x="135" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#7C3AED">
            Project Charter
        </text>
        <text x="135" y="402" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Stakeholder alignment
        </text>
        <text x="135" y="414" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Resource commitment
        </text>
        
        <!-- Week 2 Activity -->
        <rect x="270" y="380" width="140" height="50" rx="8" fill="#ede9fe" stroke="#8B5CF6" stroke-width="1"/>
        <circle cx="285" cy="395" r="6" fill="#8B5CF6"/>
        <text x="295" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">
            Development Sprint
        </text>
        <text x="295" y="402" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Agile methodology
        </text>
        <text x="295" y="414" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Daily standups
        </text>
        
        <!-- Week 3 Activity -->
        <rect x="430" y="380" width="140" height="50" rx="8" fill="#dbeafe" stroke="#3B82F6" stroke-width="1"/>
        <circle cx="445" cy="395" r="6" fill="#3B82F6"/>
        <text x="455" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#3B82F6">
            Production Rollout
        </text>
        <text x="455" y="402" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Phased deployment
        </text>
        <text x="455" y="414" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            24/7 monitoring
        </text>
        
        <!-- Week 4 Activity -->
        <rect x="590" y="380" width="140" height="50" rx="8" fill="#cffafe" stroke="#06B6D4" stroke-width="1"/>
        <circle cx="605" cy="395" r="6" fill="#06B6D4"/>
        <text x="615" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#06B6D4">
            Executive Review
        </text>
        <text x="615" y="402" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Results presentation
        </text>
        <text x="615" y="414" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b">
            Strategic decisions
        </text>
    </g>
    
    <!-- Enhanced Key Metrics Summary -->
    <g id="metrics" transform="translate(100, 460)">
        <rect x="0" y="0" width="150" height="30" rx="8" fill="#7C3AED" opacity="0.1" stroke="#7C3AED" stroke-width="1"/>
        <text x="75" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#7C3AED" text-anchor="middle">
            📅 Timeline: 4 weeks
        </text>
        
        <rect x="170" y="0" width="150" height="30" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1"/>
        <text x="245" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">
            👥 Team: Cross-functional
        </text>
        
        <rect x="340" y="0" width="150" height="30" rx="8" fill="#06B6D4" opacity="0.1" stroke="#06B6D4" stroke-width="1"/>
        <text x="415" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#06B6D4" text-anchor="middle">
            🎯 Goal: Validate &amp; Scale
        </text>
        
        <rect x="510" y="0" width="150" height="30" rx="8" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
        <text x="585" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">
            📈 Success: ROI Positive
        </text>
    </g>
</svg>
