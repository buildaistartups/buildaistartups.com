<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576">
  <defs>
    <!-- Enhanced Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Enhanced shadow filter -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Enhanced motion blur -->
    <filter id="motionBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5 0" />
    </filter>
    
    <!-- New professional glow filter -->
    <filter id="professionalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Enhanced background glow effect -->
  <circle cx="512" cy="288" r="400" fill="url(#glowGradient)" opacity="0.6"/>
  
  <!-- Central Workflow Circle with enhanced styling -->
  <g id="centralWorkflow" filter="url(#softShadow)">
    <!-- Main circle background with thicker border -->
    <circle cx="512" cy="288" r="225" fill="#f8fafc" stroke="url(#primaryGradient)" stroke-width="6"/>
    
    <!-- Inner decorative ring -->
    <circle cx="512" cy="288" r="210" fill="none" stroke="url(#secondaryGradient)" stroke-width="1" opacity="0.3"/>
    
    <!-- Workflow stages circle paths with thicker borders -->
    <g id="workflowStages">
      <!-- SPEC Stage (Top) -->
      <g id="specStage">
        <circle cx="512" cy="109" r="63" fill="#f3f4f6" stroke="url(#primaryGradient)" stroke-width="4"/>
        <circle cx="512" cy="109" r="55" fill="#ddd6fe" opacity="0.8"/>
        <!-- Enhanced document icon -->
        <rect x="485" y="79" width="54" height="63" rx="4" fill="none" stroke="#8b5cf6" stroke-width="3"/>
        <line x1="492" y1="92" x2="527" y2="92" stroke="#8b5cf6" stroke-width="2.5"/>
        <line x1="492" y1="106" x2="535" y2="106" stroke="#8b5cf6" stroke-width="2.5"/>
        <line x1="492" y1="120" x2="535" y2="120" stroke="#8b5cf6" stroke-width="2.5"/>
        <line x1="492" y1="134" x2="524" y2="134" stroke="#8b5cf6" stroke-width="2.5"/>
        <!-- Enhanced label with background -->
        <rect x="485" y="150" width="54" height="20" rx="10" fill="#8b5cf6" opacity="0.1"/>
        <text x="512" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6">SPEC</text>
      </g>
      
      <!-- CODE Stage (Right) -->
      <g id="codeStage">
        <circle cx="712" cy="288" r="63" fill="#f3f4f6" stroke="url(#primaryGradient)" stroke-width="4"/>
        <circle cx="712" cy="288" r="55" fill="#bfdbfe" opacity="0.8"/>
        <!-- Enhanced code brackets icon -->
        <path d="M 694 255 L 676 279 L 694 303" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
        <path d="M 730 255 L 748 279 L 730 303" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
        <circle cx="702" cy="279" r="4" fill="#3b82f6"/>
        <circle cx="712" cy="279" r="4" fill="#3b82f6"/>
        <circle cx="722" cy="279" r="4" fill="#3b82f6"/>
        <!-- Enhanced label with background -->
        <rect x="685" y="328" width="54" height="20" rx="10" fill="#3b82f6" opacity="0.1"/>
        <text x="712" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">CODE</text>
      </g>
      
      <!-- REVIEW Stage (Bottom) -->
      <g id="reviewStage">
        <circle cx="512" cy="467" r="63" fill="#f3f4f6" stroke="url(#primaryGradient)" stroke-width="4"/>
        <circle cx="512" cy="467" r="55" fill="#bae6fd" opacity="0.8"/>
        <!-- Enhanced checklist icon -->
        <rect x="485" y="437" width="54" height="63" rx="4" fill="none" stroke="#0ea5e9" stroke-width="3"/>
        <polyline points="492,453 499,460 514,444" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="492,473 499,480 514,464" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="520" y1="453" x2="532" y2="453" stroke="#0ea5e9" stroke-width="2.5"/>
        <line x1="520" y1="473" x2="532" y2="473" stroke="#0ea5e9" stroke-width="2.5"/>
        <!-- Enhanced label with background -->
        <rect x="475" y="508" width="74" height="20" rx="10" fill="#0ea5e9" opacity="0.1"/>
        <text x="512" y="521" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0ea5e9">REVIEW</text>
      </g>
      
      <!-- DEPLOY Stage (Left) -->
      <g id="deployStage">
        <circle cx="312" cy="288" r="63" fill="#f3f4f6" stroke="url(#primaryGradient)" stroke-width="4"/>
        <circle cx="312" cy="288" r="55" fill="#c7d2fe" opacity="0.8"/>
        <!-- Enhanced rocket icon -->
        <path d="M 312 255 L 303 297 L 312 292 L 321 297 Z" fill="#6366f1" stroke="#6366f1" stroke-width="2.5"/>
        <ellipse cx="312" cy="305" rx="16" ry="8" fill="#ef4444" opacity="0.7"/>
        <circle cx="312" cy="273" r="5" fill="#ffffff"/>
        <!-- Enhanced clouds -->
        <ellipse cx="327" cy="257" rx="10" ry="6" fill="#e0e7ff" opacity="0.8"/>
        <ellipse cx="297" cy="257" rx="10" ry="6" fill="#e0e7ff" opacity="0.8"/>
        <!-- Enhanced label with background -->
        <rect x="275" y="325" width="74" height="20" rx="10" fill="#6366f1" opacity="0.1"/>
        <text x="312" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6366f1">DEPLOY</text>
      </g>
    </g>
    
    <!-- Enhanced connecting flow lines with improved animation -->
    <g id="flowLines" opacity="0.7">
      <path d="M 512 172 Q 612 230 649 288" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,6" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="14" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M 649 288 Q 612 346 512 404" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,6" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="14" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M 512 404 Q 412 346 375 288" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,6" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="14" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M 375 288 Q 412 230 512 172" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-dasharray="8,6" filter="url(#motionBlur)">
        <animate attributeName="stroke-dashoffset" from="0" to="14" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Enhanced Quality Gates with better styling -->
  <g id="qualityGates">
    <g transform="translate(630, 154)" filter="url(#professionalGlow)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="2"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#f59e0b">92%</text>
    </g>
    
    <g transform="translate(359, 428)" filter="url(#professionalGlow)">
      <path d="M 0 0 L 4 -2 L 12 -2 L 16 0 L 16 8 Q 16 14 8 16 Q 0 14 0 8 Z" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
      <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#8b5cf6">95%</text>
    </g>
  </g>
  
  <!-- Enhanced Integration Lines -->
  <g id="integrationLines" opacity="0.4">
    <path d="M 100 180 Q 306 211 462 172" fill="none" stroke="url(#primaryGradient)" stroke-width="5" stroke-dasharray="10,5"/>
    <path d="M 924 180 Q 718 211 562 172" fill="none" stroke="url(#primaryGradient)" stroke-width="5" stroke-dasharray="10,5"/>
    <path d="M 924 422 Q 718 431 562 404" fill="none" stroke="url(#primaryGradient)" stroke-width="5" stroke-dasharray="10,5"/>
    <path d="M 100 419 Q 306 431 462 404" fill="none" stroke="url(#primaryGradient)" stroke-width="5" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Team Members with enhanced styling -->
  <!-- Product Manager (Top Left) - Moved down -->
  <g id="productManager" transform="translate(100, 105)">
    <circle cx="0" cy="0" r="75" fill="#fef3c7" filter="url(#softShadow)" stroke="url(#primaryGradient)" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#d97706"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#d97706"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#d97706"/>
    <!-- Enhanced Document -->
    <rect x="21" y="29" width="41" height="51" rx="3" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="39" x2="55" y2="39" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="50" x2="55" y2="50" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="59" x2="55" y2="59" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="29" y1="68" x2="49" y2="68" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Enhanced Label with background -->
    <rect x="-60" y="100" width="120" height="22" rx="11" fill="#3b82f6" opacity="0.1"/>
    <text x="0" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3b82f6">Product Manager</text>
  </g>
  
  <!-- UI/UX Designer (Top Right) - Moved down -->
  <g id="uiDesigner" transform="translate(924, 105)">
    <circle cx="0" cy="0" r="75" fill="#ddd6fe" filter="url(#softShadow)" stroke="url(#primaryGradient)" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#a78bfa"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#8b5cf6"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#a78bfa"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#a78bfa"/>
    <!-- Enhanced Tablet -->
    <rect x="-36" y="36" width="71" height="50" rx="5" fill="#1f2937" stroke="#8b5cf6" stroke-width="2.5"/>
    <rect x="-30" y="43" width="59" height="39" rx="1" fill="#ffffff"/>
    <!-- Enhanced design elements on tablet -->
    <rect x="-24" y="50" width="16" height="16" rx="2" fill="#8b5cf6" opacity="0.6"/>
    <rect x="-4" y="50" width="16" height="9" rx="2" fill="#3b82f6" opacity="0.6"/>
    <rect x="-4" y="60" width="16" height="14" rx="2" fill="#10b981" opacity="0.6"/>
    <circle cx="24" cy="59" r="6" fill="#f59e0b" opacity="0.6"/>
    <!-- Enhanced Label with background -->
    <rect x="-60" y="100" width="120" height="22" rx="11" fill="#8b5cf6" opacity="0.1"/>
    <text x="0" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#8b5cf6">UI/UX Designer</text>
  </g>
  
  <!-- Frontend Engineer (Bottom Right) -->
  <g id="frontendEngineer" transform="translate(924, 497)">
    <circle cx="0" cy="0" r="75" fill="#dbeafe" filter="url(#softShadow)" stroke="url(#primaryGradient)" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#60a5fa"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#3b82f6"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#60a5fa"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#60a5fa"/>
    <!-- Enhanced Laptop -->
    <path d="M -50 54 L -40 29 L 40 29 L 50 54 Z" fill="#1f2937" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="-36" y="30" width="71" height="20" rx="1" fill="#0f172a"/>
    <!-- Enhanced code on screen -->
    <line x1="-29" y1="35" x2="-14" y2="35" stroke="#10b981" stroke-width="2"/>
    <line x1="-29" y1="40" x2="-5" y2="40" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="-29" y1="46" x2="-16" y2="46" stroke="#3b82f6" stroke-width="2"/>
    <!-- Enhanced Base -->
    <rect x="-55" y="54" width="110" height="5" rx="2" fill="#374151"/>
    <!-- Enhanced Label with background -->
    <rect x="-70" y="-105" width="140" height="22" rx="11" fill="#3b82f6" opacity="0.1"/>
    <text x="0" y="-91" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3b82f6">Frontend Engineer</text>
  </g>
  
  <!-- DevOps Specialist (Bottom Left) -->
  <g id="devopsSpecialist" transform="translate(100, 494)">
    <circle cx="0" cy="0" r="75" fill="#fecaca" filter="url(#softShadow)" stroke="url(#primaryGradient)" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-11" r="23" fill="#f87171"/>
    <!-- Body -->
    <path d="M -30 20 L -21 10 L 21 10 L 30 20 L 30 60 L -30 60 Z" fill="#ef4444"/>
    <!-- Arms -->
    <rect x="-36" y="16" width="15" height="30" rx="8" fill="#f87171"/>
    <rect x="21" y="16" width="15" height="30" rx="8" fill="#f87171"/>
    <!-- Enhanced Dashboard screen -->
    <rect x="-40" y="20" width="80" height="60" rx="5" fill="#0f172a" stroke="#ef4444" stroke-width="2.5"/>
    <!-- Enhanced dashboard elements -->
    <rect x="-34" y="27" width="65" height="9" rx="2" fill="#10b981" opacity="0.8"/>
    <rect x="-34" y="41" width="30" height="6" rx="1" fill="#8b5cf6" opacity="0.8"/>
    <rect x="-34" y="51" width="40" height="6" rx="1" fill="#3b82f6" opacity="0.8"/>
    <rect x="-34" y="61" width="50" height="6" rx="1" fill="#f59e0b" opacity="0.8"/>
    <circle cx="30" cy="45" r="5" fill="#10b981"/>
    <circle cx="30" cy="55" r="5" fill="#10b981"/>
    <circle cx="30" cy="65" r="5" fill="#ef4444"/>
    <!-- Enhanced Label with background -->
    <rect x="-70" y="-105" width="140" height="22" rx="11" fill="#ef4444" opacity="0.1"/>
    <text x="0" y="-91" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ef4444">DevOps Specialist</text>
  </g>
  
  <!-- Enhanced Real-time Collaboration Elements -->
  <!-- Enhanced Shared Cursors -->
  <g id="sharedCursors">
    <g transform="translate(520, 215)" filter="url(#professionalGlow)">
      <path d="M 0 0 L 0 14 L 5 10 L 6 14 L 9 13 L 6 9 L 11 9 Z" fill="#8b5cf6"/>
      <rect x="14" y="1" width="38" height="14" rx="3" fill="#8b5cf6" opacity="0.95"/>
      <text x="33" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Sarah</text>
    </g>
    
    <g transform="translate(690, 306)" filter="url(#professionalGlow)">
      <path d="M 0 0 L 0 14 L 5 10 L 6 14 L 9 13 L 6 9 L 11 9 Z" fill="#3b82f6"/>
      <rect x="14" y="1" width="33" height="14" rx="3" fill="#3b82f6" opacity="0.95"/>
      <text x="30" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Alex</text>
    </g>
  </g>
  
  <!-- Enhanced Comment Threads -->
  <g id="commentThreads">
    <g transform="translate(755, 235)" filter="url(#softShadow)">
      <rect x="0" y="0" width="73" height="45" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
      <circle cx="10" cy="13" r="5" fill="#8b5cf6"/>
      <rect x="19" y="9" width="45" height="4" rx="2" fill="#e5e7eb"/>
      <rect x="19" y="16" width="33" height="4" rx="2" fill="#e5e7eb"/>
      <circle cx="10" cy="33" r="5" fill="#3b82f6"/>
      <rect x="19" y="29" width="49" height="4" rx="2" fill="#e5e7eb"/>
      <rect x="19" y="36" width="39" height="4" rx="2" fill="#e5e7eb"/>
    </g>
  </g>
  
  <!-- Enhanced Simultaneous Edit Indicators -->
  <g id="editIndicators">
    <g transform="translate(390, 440)">
      <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.4">
        <animate attributeName="r" values="8;15;8" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="5" fill="#10b981"/>
    </g>
    
    <g transform="translate(634, 136)">
      <circle cx="0" cy="0" r="8" fill="#8b5cf6" opacity="0.4">
        <animate attributeName="r" values="8;15;8" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="5" fill="#8b5cf6"/>
    </g>
  </g>
  
  <!-- New: Professional Title -->
  <g id="title" transform="translate(512, 40)">
    <rect x="-180" y="-15" width="360" height="30" rx="15" fill="url(#primaryGradient)" opacity="0.1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="url(#primaryGradient)">Collaborative Development Workflow</text>
  </g>
</svg>
