<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="row1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F3E8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="row2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="row3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="row4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0F2FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BAE6FD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Header Section -->
  <g id="header">
    <rect x="20" y="20" width="560" height="60" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Audit Logs &amp; Activity Tracking</text>
    
    <!-- Security Badge -->
    <g transform="translate(490, 50)">
      <circle cx="0" cy="0" r="18" fill="#10B981"/>
      <path d="M -6 -2 L -2 2 L 6 -6" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    </g>
    
    <!-- Compliance Badge -->
    <g transform="translate(540, 50)">
      <path d="M 0 -15 L 4 -13 L 12 -15 L 12 -5 C 12 2 6 8 0 10 C -6 8 -12 2 -12 -5 L -12 -15 L -4 -13 Z" fill="#FCD34D"/>
      <path d="M -4 -2 L -1 1 L 5 -5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Log Entries Container -->
  <g id="logs">
    
    <!-- Log Entry 1: Document Approval -->
    <g id="log1" transform="translate(0, 100)">
      <rect x="30" y="0" width="540" height="55" rx="6" fill="url(#row1Grad)" filter="url(#shadow)"/>
      
      <!-- Timeline Connector -->
      <circle cx="50" cy="27.5" r="6" fill="#8B5CF6"/>
      <line x1="50" y1="33" x2="50" y2="55" stroke="#E5E7EB" stroke-width="2"/>
      
      <!-- User Avatar -->
      <circle cx="85" cy="27.5" r="16" fill="url(#purpleGrad)"/>
      <text x="85" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">JD</text>
      
      <!-- Log Details -->
      <text x="115" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">John Doe</text>
      <text x="115" y="38" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">Approved document: Q4_Report.pdf</text>
      
      <!-- Timestamp -->
      <text x="420" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">2025-10-24</text>
      <text x="420" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">14:32:15</text>
      
      <!-- Status Badge -->
      <rect x="500" y="15" width="65" height="20" rx="10" fill="#D1FAE5"/>
      <text x="532.5" y="28" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#059669" text-anchor="middle">APPROVED</text>
    </g>
    
    <!-- Log Entry 2: User Login -->
    <g id="log2" transform="translate(0, 165)">
      <rect x="30" y="0" width="540" height="55" rx="6" fill="url(#row2Grad)" filter="url(#shadow)"/>
      
      <!-- Timeline Connector -->
      <circle cx="50" cy="27.5" r="6" fill="#3B82F6"/>
      <line x1="50" y1="33" x2="50" y2="55" stroke="#E5E7EB" stroke-width="2"/>
      
      <!-- User Avatar -->
      <circle cx="85" cy="27.5" r="16" fill="url(#blueGrad)"/>
      <text x="85" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SM</text>
      
      <!-- Log Details -->
      <text x="115" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Sarah Miller</text>
      <text x="115" y="38" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">Logged in from IP: 192.168.1.105</text>
      
      <!-- Security Icon -->
      <g transform="translate(325, 27.5) scale(1.25)">
        <path d="M 0 -8 L 3 -6.5 L 8 -8 L 8 -2 C 8 2 4 5 0 6.5 C -4 5 -8 2 -8 -2 L -8 -8 L -3 -6.5 Z" fill="#3B82F6"/>
        <circle cx="0" cy="0" r="2" fill="white"/>
      </g>
      
      <!-- Timestamp -->
      <text x="420" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">2025-10-24</text>
      <text x="420" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">14:15:42</text>
      
      <!-- Status Badge -->
      <rect x="500" y="15" width="65" height="20" rx="10" fill="#DBEAFE"/>
      <text x="532.5" y="28" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1D4ED8" text-anchor="middle">SUCCESS</text>
    </g>
    
    <!-- Log Entry 3: Permission Change -->
    <g id="log3" transform="translate(0, 230)">
      <rect x="30" y="0" width="540" height="55" rx="6" fill="url(#row3Grad)" filter="url(#shadow)"/>
      
      <!-- Timeline Connector -->
      <circle cx="50" cy="27.5" r="6" fill="#8B5CF6"/>
      <line x1="50" y1="33" x2="50" y2="55" stroke="#E5E7EB" stroke-width="2"/>
      
      <!-- User Avatar -->
      <circle cx="85" cy="27.5" r="16" fill="#A78BFA"/>
      <text x="85" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">AJ</text>
      
      <!-- Log Details -->
      <text x="115" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Admin Jones</text>
      <text x="115" y="38" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">Changed role: User → Editor (team: Marketing)</text>
      
      <!-- Change Icon -->
      <g transform="translate(402, 27.5) scale(1.25)">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#8B5CF6" stroke-width="2"/>
        <path d="M -3 0 L 3 0 M 0 -3 L 3 0 L 0 3" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      
      <!-- Timestamp -->
      <text x="420" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">2025-10-24</text>
      <text x="420" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">13:58:20</text>
      
      <!-- Status Badge -->
      <rect x="500" y="15" width="65" height="20" rx="10" fill="#EDE9FE"/>
      <text x="532.5" y="28" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7C3AED" text-anchor="middle">MODIFIED</text>
    </g>
    
    <!-- Log Entry 4: File Upload -->
    <g id="log4" transform="translate(0, 295)">
      <rect x="30" y="0" width="540" height="55" rx="6" fill="url(#row4Grad)" filter="url(#shadow)"/>
      
      <!-- Timeline Connector -->
      <circle cx="50" cy="27.5" r="6" fill="#3B82F6"/>
      
      <!-- User Avatar -->
      <circle cx="85" cy="27.5" r="16" fill="#60A5FA"/>
      <text x="85" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">RK</text>
      
      <!-- Log Details -->
      <text x="115" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Rachel Kim</text>
      <text x="115" y="38" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">Uploaded file: security_audit_2025.xlsx (2.4 MB)</text>
      
      <!-- Upload Icon -->
      <g transform="translate(407, 27.5) scale(1.25)">
        <path d="M -4 0 L 0 -5 L 4 0 M 0 -5 L 0 5" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M -6 5 L 6 5" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      </g>
      
      <!-- Timestamp -->
      <text x="420" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">2025-10-24</text>
      <text x="420" y="35" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">13:22:08</text>
      
      <!-- Status Badge -->
      <rect x="500" y="15" width="65" height="20" rx="10" fill="#DBEAFE"/>
      <text x="532.5" y="28" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1D4ED8" text-anchor="middle">UPLOADED</text>
    </g>
  </g>
  
  <!-- Bottom Stats Bar -->
  <g id="stats" transform="translate(0, 360)">
    <rect x="30" y="0" width="170" height="30" rx="6" fill="url(#purpleGrad)" opacity="0.9"/>
    <text x="115" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">124 Events Today</text>
    
    <rect x="215" y="0" width="170" height="30" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="300" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">15 Users Active</text>
    
    <rect x="400" y="0" width="170" height="30" rx="6" fill="#10B981" opacity="0.9"/>
    <text x="485" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">100% Compliant</text>
  </g>
</svg>
