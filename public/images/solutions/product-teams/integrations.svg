<svg width="400" height="128" viewBox="0 0 400 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="hubGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Glow filter for connections -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connection lines -->
  <line x1="200" y1="64" x2="60" y2="30" stroke="url(#lineGradient)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="200" y1="64" x2="60" y2="98" stroke="url(#lineGradient)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="200" y1="64" x2="340" y2="30" stroke="url(#lineGradient)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="200" y1="64" x2="340" y2="98" stroke="url(#lineGradient)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="200" y1="64" x2="140" y2="64" stroke="url(#lineGradient)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="200" y1="64" x2="260" y2="64" stroke="url(#lineGradient)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  
  <!-- Central Hub -->
  <circle cx="200" cy="64" r="24" fill="url(#hubGradient)" filter="url(#glow)"/>
  <circle cx="200" cy="64" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Hub icon (network symbol) -->
  <circle cx="200" cy="64" r="4" fill="#ffffff"/>
  <circle cx="192" cy="56" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="208" cy="56" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="192" cy="72" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="208" cy="72" r="2" fill="#ffffff" opacity="0.8"/>
  <line x1="200" y1="64" x2="192" y2="56" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="64" x2="208" y2="56" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="64" x2="192" y2="72" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="64" x2="208" y2="72" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  
  <!-- Security badge on hub -->
  <circle cx="215" cy="52" r="6" fill="#10b981"/>
  <path d="M 213 52 L 214.5 54 L 217 50" stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- GitHub (top left) -->
  <rect x="40" y="20" width="40" height="20" rx="4" fill="#6366f1" opacity="0.9"/>
  <text x="65" y="32" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">GitHub</text>
  <circle cx="48" cy="30" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Slack (bottom left) -->
  <rect x="40" y="88" width="40" height="20" rx="4" fill="#8b5cf6" opacity="0.9"/>
  <text x="65" y="100" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">Slack</text>
  <circle cx="48" cy="98" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Notion (middle left) -->
  <rect x="120" y="54" width="40" height="20" rx="4" fill="#3b82f6" opacity="0.9"/>
  <text x="145" y="66" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">Notion</text>
  <circle cx="128" cy="64" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Jira (middle right) -->
  <rect x="240" y="54" width="40" height="20" rx="4" fill="#6366f1" opacity="0.9"/>
  <text x="265" y="66" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">Jira</text>
  <circle cx="248" cy="64" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Vercel (top right) -->
  <rect x="320" y="20" width="40" height="20" rx="4" fill="#8b5cf6" opacity="0.9"/>
  <text x="345" y="32" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">Vercel</text>
  <circle cx="328" cy="30" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Stripe (bottom right) -->
  <rect x="320" y="88" width="40" height="20" rx="4" fill="#3b82f6" opacity="0.9"/>
  <text x="345" y="100" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">Stripe</text>
  <circle cx="328" cy="98" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Security indicators on connections -->
  <circle cx="130" cy="47" r="4" fill="#10b981" opacity="0.9"/>
  <path d="M 129 47 L 130 48.5 L 132 45.5" stroke="#ffffff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  
  <circle cx="270" cy="47" r="4" fill="#10b981" opacity="0.9"/>
  <path d="M 269 47 L 270 48.5 L 272 45.5" stroke="#ffffff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  
  <circle cx="130" cy="81" r="4" fill="#10b981" opacity="0.9"/>
  <path d="M 129 81 L 130 82.5 L 132 79.5" stroke="#ffffff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  
  <circle cx="270" cy="81" r="4" fill="#10b981" opacity="0.9"/>
  <path d="M 269 81 L 270 82.5 L 272 79.5" stroke="#ffffff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
