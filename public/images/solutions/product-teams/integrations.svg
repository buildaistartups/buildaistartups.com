<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise Integrations Diagram</title>
  <desc id="desc">Central integration hub securely connected to GitHub, Vercel, Stripe, Slack, Jira, and Notion with security badges and locks. Purple/blue theme, transparent background.</desc>

  <!-- ========= DEFS ========= -->
  <defs>
    <!-- Purple → Blue gradient -->
    <linearGradient id="gradPB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Subtle node shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.18"/>
    </filter>

    <!-- Glow for hub -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Astonishing background gradient for boxes -->
    <linearGradient id="boxBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>

    <!-- Astonishing background for hub circle -->
    <radialGradient id="hubBg" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="50%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </radialGradient>

    <!-- Connection line style -->
    <style>
      .conn { fill: none; stroke: url(#gradPB); stroke-width: 3; stroke-linecap: round; }
      .label { font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial, sans-serif; font-size: 15px; fill: #3b82f6; font-weight: 600; letter-spacing: 0.3px; }
      .label--light { fill: #3b82f6; opacity: 1; font-size: 12px; font-weight: 700; letter-spacing: 0.8px; }
    </style>

    <!-- Lock symbol for "secure" lines -->
    <symbol id="lock" viewBox="0 0 24 24">
      <circle cx="12" cy="14" r="10" fill="#ddd6fe" opacity="0.9"/>
      <rect x="5" y="11" width="14" height="9" rx="2" ry="2" fill="white" stroke="url(#gradPB)" stroke-width="2"/>
      <path d="M8 11V8a4 4 0 0 1 8 0v3" fill="none" stroke="url(#gradPB)" stroke-width="2"/>
      <circle cx="12" cy="15" r="1.8" fill="url(#gradPB)"/>
    </symbol>

    <!-- Shield check badge -->
    <symbol id="shieldCheck" viewBox="0 0 24 24">
      <path d="M12 2l7 3v6c0 5-3.5 9-7 11-3.5-2-7-6-7-11V5l7-3z" fill="white" stroke="url(#gradPB)" stroke-width="2"/>
      <path d="M8.5 12.5l2.5 2.5 4.5-4.5" fill="none" stroke="url(#gradPB)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- ========= LAYOUT COORDS =========
       Hub at (300,200).
       Nodes:
       GitHub (100,200) | Vercel (200,80) | Stripe (400,80)
       Slack (500,200)  | Jira (400,320)  | Notion (200,320)
  ==================================== -->

  <!-- Hub glow -->
  <circle cx="300" cy="200" r="90" fill="url(#hubGlow)" />

  <!-- Connections -->
  <path class="conn" d="M300,200 C250,190 150,190 100,200" />
  <path class="conn" d="M300,200 C280,160 240,120 200,100" />
  <path class="conn" d="M300,200 C320,160 360,120 400,100" />
  <path class="conn" d="M300,200 C350,190 450,190 500,200" />
  <path class="conn" d="M300,200 C320,240 360,280 400,300" />
  <path class="conn" d="M300,200 C280,240 240,280 200,300" />

  <!-- Locks on connections (approx. midpoints) -->
  <use href="#lock" x="190" y="179" width="25" height="25"/>
  <use href="#lock" x="238" y="122" width="25" height="25"/>
  <use href="#lock" x="338" y="122" width="25" height="25"/>
  <use href="#lock" x="388" y="179" width="25" height="25"/>
  <use href="#lock" x="338" y="248" width="25" height="25"/>
  <use href="#lock" x="238" y="248" width="25" height="25"/>

  <!-- Central Hub -->
  <g filter="url(#softShadow)">
    <circle cx="300" cy="200" r="42" fill="url(#hubBg)" stroke="url(#gradPB)" stroke-width="3"/>
    <!-- Hub icon: simple network nodes -->
    <g transform="translate(300,200)">
      <circle r="4.5" fill="url(#gradPB)"/>
      <circle cx="-18" cy="-8" r="4" fill="url(#gradPB)"/>
      <circle cx="20" cy="-10" r="4" fill="url(#gradPB)"/>
      <circle cx="-14" cy="16" r="4" fill="url(#gradPB)"/>
      <circle cx="16" cy="14" r="4" fill="url(#gradPB)"/>
      <path d="M-18,-8 L0,0 M20,-10 L0,0 M-14,16 L0,0 M16,14 L0,0" stroke="url(#gradPB)" stroke-width="2" stroke-linecap="round" fill="none"/>
    </g>
    <!-- Security shields next to hub -->
    <use href="#shieldCheck" x="258" y="230" width="22" height="22"/>
    <use href="#shieldCheck" x="320" y="230" width="22" height="22"/>
  </g>

  <!-- Security badges text -->
  <g class="label" text-anchor="middle">
    <text x="272" y="267" class="label--light">SSO</text>
    <text x="322" y="267" class="label--light">RBAC</text>
  </g>

  <!-- ========= NODES (with simplified brand icons + labels) ========= -->

  <!-- Node wrapper generator: rounded white card with gradient stroke -->
  <!-- GitHub -->
  <g transform="translate(70,170)" filter="url(#softShadow)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#boxBg)" stroke="url(#gradPB)" stroke-width="2"/>
    <!-- Simplified Octocat head: circle + ears -->
    <g transform="translate(30,28) scale(1.4)">
      <circle r="12" fill="url(#gradPB)" opacity="0.12"/>
      <path d="M-7,-5 L-2,-11 L-1,-5 M7,-5 L2,-11 L1,-5" stroke="url(#gradPB)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-4" cy="-1" r="1.8" fill="url(#gradPB)"/>
      <circle cx="4" cy="-1" r="1.8" fill="url(#gradPB)"/>
      <path d="M-6,5 C-2,8 2,8 6,5" stroke="url(#gradPB)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  <text class="label" x="100" y="247" text-anchor="middle">GitHub</text>

  <!-- Vercel -->
  <g transform="translate(170,50)" filter="url(#softShadow)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#boxBg)" stroke="url(#gradPB)" stroke-width="2"/>
    <polygon points="10,44 50,44 30,16" fill="url(#gradPB)"/>
  </g>
  <text class="label" x="200" y="127" text-anchor="middle">Vercel</text>

  <!-- Stripe -->
  <g transform="translate(370,50)" filter="url(#softShadow)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#boxBg)" stroke="url(#gradPB)" stroke-width="2"/>
    <!-- Stylized S -->
    <path d="M16,40c2.5,4 8,6 14,6c8,0 14,-3 14,-8c0,-12 -28,-4 -28,-18c0,-5 6,-8 14,-8c6,0 10,2 12,5"
          fill="none" stroke="url(#gradPB)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text class="label" x="400" y="127" text-anchor="middle">Stripe</text>

  <!-- Slack -->
  <g transform="translate(470,170)" filter="url(#softShadow)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#boxBg)" stroke="url(#gradPB)" stroke-width="2"/>
    <!-- Four lozenges -->
    <rect x="13" y="12" width="10" height="22" rx="5" fill="url(#gradPB)"/>
    <rect x="25" y="25" width="22" height="10" rx="5" fill="url(#gradPB)"/>
    <rect x="27" y="12" width="10" height="22" rx="5" transform="rotate(90 32 23)" fill="url(#gradPB)"/>
    <rect x="15" y="25" width="22" height="10" rx="5" transform="rotate(90 26 30)" fill="url(#gradPB)"/>
  </g>
  <text class="label" x="500" y="247" text-anchor="middle">Slack</text>

  <!-- Jira -->
  <g transform="translate(370,290)" filter="url(#softShadow)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#boxBg)" stroke="url(#gradPB)" stroke-width="2"/>
    <!-- Two tilted diamonds -->
    <g transform="translate(30,30) rotate(45)">
      <rect x="-16" y="-8" width="16" height="16" fill="url(#gradPB)"/>
      <rect x="0" y="-8" width="16" height="16" fill="url(#gradPB)" opacity="0.6"/>
    </g>
  </g>
  <text class="label" x="400" y="367" text-anchor="middle">Jira</text>

  <!-- Notion -->
  <g transform="translate(170,290)" filter="url(#softShadow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="url(#boxBg)" stroke="url(#gradPB)" stroke-width="2"/>
    <!-- Notion-esque box with N -->
    <rect x="10" y="10" width="40" height="40" rx="6" fill="none" stroke="url(#gradPB)" stroke-width="2"/>
    <path d="M18,40 V20 H22 L38,40 V20" fill="none" stroke="url(#gradPB)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text class="label" x="200" y="367" text-anchor="middle">Notion</text>
</svg>
