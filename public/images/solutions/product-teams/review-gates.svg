<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="approveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rejectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightPurpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker definition moved to defs -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366F1"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#6366F1" text-anchor="middle">Review Gates &amp; Approval Workflow</text>
  
  <!-- Main Flow Path -->
  <path d="M 28 200 L 570 200" stroke="#E5E7EB" stroke-width="3" fill="none"/>
  
  <!-- Approval Path (above) -->
  <path d="M 28 200 Q 150 140 270 140 Q 390 140 510 140 Q 560 140 570 180" stroke="url(#approveGrad)" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Rejection Path (below) -->
  <path d="M 28 200 Q 150 260 270 260 Q 390 260 510 260 Q 560 260 570 220" stroke="url(#rejectGrad)" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Gate 1: Spec Review -->
  <g transform="translate(80, 200)">
    <!-- Gate Structure -->
    <rect x="-35" y="-50" width="70" height="100" rx="8" fill="url(#purpleGrad)" opacity="0.9"/>
    <rect x="-30" y="-45" width="60" height="90" rx="6" fill="url(#lightPurpleGrad)"/>
    
    <!-- Icon -->
    <circle cx="0" cy="-10" r="18" fill="#8B5CF6" opacity="0.2"/>
    <path d="M -8 -18 L 8 -18 L 8 -2 L -8 -2 Z" fill="#8B5CF6"/>
    <line x1="-5" y1="-14" x2="5" y2="-14" stroke="white" stroke-width="1.5"/>
    <line x1="-5" y1="-10" x2="5" y2="-10" stroke="white" stroke-width="1.5"/>
    <line x1="-5" y1="-6" x2="5" y2="-6" stroke="white" stroke-width="1.5"/>
    
    <!-- Label -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Spec</text>
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Review</text>
    
    <!-- Avatar -->
    <circle cx="0" cy="-75" r="15" fill="url(#purpleGrad)"/>
    <circle cx="0" cy="-78" r="5" fill="white"/>
    <path d="M -8 -65 Q 0 -70 8 -65" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Quality Indicator -->
    <circle cx="21" cy="-35" r="8" fill="#10B981"/>
    <path d="M 17 -35 L 20 -32 L 25 -38" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Gate 2: Code Review -->
  <g transform="translate(220, 200)">
    <!-- Gate Structure -->
    <rect x="-35" y="-50" width="70" height="100" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="-30" y="-45" width="60" height="90" rx="6" fill="url(#lightBlueGrad)"/>
    
    <!-- Icon -->
    <circle cx="0" cy="-10" r="18" fill="#3B82F6" opacity="0.2"/>
    <rect x="-10" y="-18" width="20" height="16" rx="2" fill="#3B82F6"/>
    <line x1="-6" y1="-14" x2="-2" y2="-14" stroke="white" stroke-width="1.5"/>
    <line x1="-6" y1="-10" x2="2" y2="-10" stroke="white" stroke-width="1.5"/>
    <line x1="-6" y1="-6" x2="-2" y2="-6" stroke="white" stroke-width="1.5"/>
    
    <!-- Label -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Code</text>
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Review</text>
    
    <!-- Avatar -->
    <circle cx="0" cy="-75" r="15" fill="url(#blueGrad)"/>
    <circle cx="0" cy="-78" r="5" fill="white"/>
    <path d="M -8 -65 Q 0 -70 8 -65" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Security Badge -->
    <g transform="translate(21, -35)">
      <path d="M 0 -8 L 5 -5 L 5 2 L 0 5 L -5 2 L -5 -5 Z" fill="#F59E0B"/>
      <path d="M -2 -1 L 0 1 L 3 -3" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
  </g>
  
  <!-- Gate 3: Pricing Review -->
  <g transform="translate(360, 200)">
    <!-- Gate Structure -->
    <rect x="-35" y="-50" width="70" height="100" rx="8" fill="url(#purpleGrad)" opacity="0.9"/>
    <rect x="-30" y="-45" width="60" height="90" rx="6" fill="url(#lightPurpleGrad)"/>
    
    <!-- Icon -->
    <circle cx="0" cy="-10" r="18" fill="#8B5CF6" opacity="0.2"/>
    <circle cx="0" cy="-10" r="10" stroke="#8B5CF6" stroke-width="2" fill="none"/>
    <text x="0" y="-6" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6" text-anchor="middle">$</text>
    
    <!-- Label -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Pricing</text>
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Review</text>
    
    <!-- Avatar -->
    <circle cx="0" cy="-75" r="15" fill="url(#purpleGrad)"/>
    <circle cx="0" cy="-78" r="5" fill="white"/>
    <path d="M -8 -65 Q 0 -70 8 -65" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Governance Badge -->
    <g transform="translate(21, -35)">
      <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#6366F1"/>
      <line x1="-3" y1="-2" x2="3" y2="-2" stroke="white" stroke-width="1.5"/>
      <line x1="-3" y1="1" x2="3" y2="1" stroke="white" stroke-width="1.5"/>
      <line x1="-3" y1="4" x2="3" y2="4" stroke="white" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Gate 4: Deploy Review -->
  <g transform="translate(500, 200)">
    <!-- Gate Structure -->
    <rect x="-35" y="-50" width="70" height="100" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="-30" y="-45" width="60" height="90" rx="6" fill="url(#lightBlueGrad)"/>
    
    <!-- Icon -->
    <circle cx="0" cy="-10" r="18" fill="#3B82F6" opacity="0.2"/>
    <path d="M -8 -15 L 0 -20 L 8 -15 L 8 -5 L 0 0 L -8 -5 Z" fill="#3B82F6"/>
    <path d="M -4 -12 L 0 -15 L 4 -12 L 4 -7 L 0 -4 L -4 -7 Z" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Deploy</text>
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="middle">Review</text>
    
    <!-- Avatar -->
    <circle cx="0" cy="-75" r="15" fill="url(#blueGrad)"/>
    <circle cx="0" cy="-78" r="5" fill="white"/>
    <path d="M -8 -65 Q 0 -70 8 -65" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Security Shield -->
    <g transform="translate(21, -35)">
      <path d="M 0 -8 L 6 -5 L 6 1 L 0 5 L -6 1 L -6 -5 Z" fill="#10B981"/>
      <path d="M -2 -1 L 0 1 L 3 -3" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
  </g>
  
  <!-- Approval Path Labels -->
  <g transform="translate(130, 130)">
    <circle cx="0" cy="0" r="12" fill="#10B981"/>
    <path d="M -4 0 L -1 3 L 5 -4" stroke="white" stroke-width="2" fill="none"/>
  </g>
  <text x="150" y="135" font-family="Arial, sans-serif" font-size="10" fill="#059669" font-weight="600">APPROVED</text>
  
  <g transform="translate(390, 130)">
    <circle cx="0" cy="0" r="12" fill="#10B981"/>
    <path d="M -4 0 L -1 3 L 5 -4" stroke="white" stroke-width="2" fill="none"/>
  </g>
  <text x="410" y="135" font-family="Arial, sans-serif" font-size="10" fill="#059669" font-weight="600">APPROVED</text>
  
  <!-- Rejection Path Labels -->
  <g transform="translate(150, 273)">
    <circle cx="0" cy="0" r="12" fill="#EF4444"/>
    <path d="M -4 -4 L 4 4 M 4 -4 L -4 4" stroke="white" stroke-width="2"/>
  </g>
  <text x="170" y="278" font-family="Arial, sans-serif" font-size="10" fill="#DC2626" font-weight="600">REJECTED</text>
  
  <g transform="translate(390, 273)">
    <circle cx="0" cy="0" r="12" fill="#EF4444"/>
    <path d="M -4 -4 L 4 4 M 4 -4 L -4 4" stroke="white" stroke-width="2"/>
  </g>
  <text x="410" y="278" font-family="Arial, sans-serif" font-size="10" fill="#DC2626" font-weight="600">REJECTED</text>
  
  <!-- Start Point -->
  <circle cx="28" cy="200" r="12" fill="#10B981"/>
  <path d="M 25 200 L 33 200 M 29 196 L 33 200 L 29 204" stroke="white" stroke-width="2" fill="none"/>
  <text x="28" y="220" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="600" text-anchor="middle">START</text>
  
  <!-- End Point -->
  <circle cx="570" cy="200" r="12" fill="#8B5CF6"/>
  <path d="M 566 200 L 574 200 M 570 196 L 574 200 L 570 204" stroke="white" stroke-width="2" fill="none"/>
  <text x="570" y="220" font-family="Arial, sans-serif" font-size="9" fill="#8B5CF6" font-weight="600" text-anchor="middle">DEPLOY</text>
  
  <!-- Governance Banner -->
  <rect x="220" y="360" width="160" height="30" rx="4" fill="#F3F4F6" stroke="#6366F1" stroke-width="2"/>
  <text x="309" y="378" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#4B5563" text-anchor="middle">GOVERNANCE COMPLIANT</text>
  <circle cx="233" cy="375" r="8" fill="#10B981"/>
  <path d="M 230 375 L 232 377 L 236 372" stroke="white" stroke-width="1.5" fill="none"/>
  
  <!-- Security Certification -->
  <g transform="translate(30, 360)">
    <rect x="0" y="0" width="120" height="30" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <path d="M 15 7 L 20 10 L 20 17 L 15 21 L 10 17 L 10 10 Z" fill="#F59E0B"/>
    <path d="M 13 14 L 15 16 L 18 12" stroke="white" stroke-width="1.5" fill="none"/>
    <text x="26" y="19" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#92400E">SECURITY VERIFIED</text>
  </g>
  
  <!-- Quality Metrics -->
  <g transform="translate(450, 360)">
    <rect x="0" y="0" width="130" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="15" cy="15" r="8" fill="#3B82F6"/>
    <text x="15" y="19" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Q</text>
    <text x="28" y="19" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1E40AF">QUALITY ASSURED</text>
  </g>
  
  <!-- Connection Arrows -->
  <path d="M 115 200 L 185 200" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 255 200 L 325 200" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 395 200 L 465 200" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
