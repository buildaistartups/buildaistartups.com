<svg viewBox="0 0 800 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Program 1: Cohort-in-a-Box -->
  <g>
    <!-- Background card with stunning gradient -->
    <rect x="10" y="10" width="250" height="172" rx="12" fill="url(#purpleBg)"/>
    
    <!-- Header -->
    <text x="135" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Cohort-in-a-Box</text>
    
    <!-- Timeline section -->
    <g transform="translate(40, 60)">
      <!-- Calendar icon - BIGGER -->
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#FFFFFF" opacity="0.95"/>
      <rect x="5" y="9" width="26" height="22" rx="2" fill="#EDE9FE"/>
      <line x1="10" y1="14" x2="26" y2="14" stroke="#8B5CF6" stroke-width="2.5"/>
      <line x1="10" y1="20" x2="19" y2="20" stroke="#8B5CF6" stroke-width="2.5"/>
      <line x1="10" y1="26" x2="26" y2="26" stroke="#A78BFA" stroke-width="2.5"/>
      
      <text x="46" y="14" font-family="Arial, sans-serif" font-size="12" fill="#E9D5FF" font-weight="700">TIMELINE</text>
      <text x="46" y="32" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">2-6 Weeks</text>
    </g>
    
    <!-- Team size section -->
    <g transform="translate(40, 110)">
      <!-- People icon - BIGGER -->
      <circle cx="9" cy="12" r="6" fill="#FFFFFF" opacity="0.95"/>
      <path d="M 0 30 Q 9 20 18 30" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="27" cy="12" r="6" fill="#FFFFFF" opacity="0.75"/>
      <path d="M 18 30 Q 27 20 36 30" fill="#FFFFFF" opacity="0.75"/>
      
      <text x="46" y="14" font-family="Arial, sans-serif" font-size="12" fill="#E9D5FF" font-weight="700">TEAM SIZE</text>
      <text x="46" y="32" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">10-30 Teams</text>
    </g>
    
    <!-- Outcome badge -->
    <g transform="translate(135, 164)">
      <rect x="-60" y="-16" width="120" height="24" rx="12" fill="#FFFFFF" opacity="0.2"/>
      <text x="0" y="2" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">✓ Validated Ideas</text>
    </g>
  </g>
  
  <!-- Program 2: Studio-in-a-Week -->
  <g>
    <!-- Background card with stunning gradient -->
    <rect x="275" y="10" width="250" height="172" rx="12" fill="url(#blueBg)"/>
    
    <!-- Header -->
    <text x="400" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Studio-in-a-Week</text>
    
    <!-- Timeline section -->
    <g transform="translate(305, 60)">
      <!-- Calendar icon - BIGGER -->
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#FFFFFF" opacity="0.95"/>
      <rect x="5" y="9" width="26" height="22" rx="2" fill="#DBEAFE"/>
      <line x1="10" y1="14" x2="26" y2="14" stroke="#3B82F6" stroke-width="2.5"/>
      <line x1="10" y1="20" x2="26" y2="20" stroke="#3B82F6" stroke-width="2.5"/>
      <line x1="10" y1="26" x2="16" y2="26" stroke="#60A5FA" stroke-width="2.5"/>
      
      <text x="46" y="14" font-family="Arial, sans-serif" font-size="12" fill="#BFDBFE" font-weight="700">TIMELINE</text>
      <text x="46" y="32" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">5 Days</text>
    </g>
    
    <!-- Team size section -->
    <g transform="translate(305, 110)">
      <!-- People icon - BIGGER -->
      <circle cx="9" cy="12" r="6" fill="#FFFFFF" opacity="0.95"/>
      <path d="M 0 30 Q 9 20 18 30" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="27" cy="12" r="6" fill="#FFFFFF" opacity="0.75"/>
      <path d="M 18 30 Q 27 20 36 30" fill="#FFFFFF" opacity="0.75"/>
      
      <text x="46" y="14" font-family="Arial, sans-serif" font-size="12" fill="#BFDBFE" font-weight="700">TEAM SIZE</text>
      <text x="46" y="32" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">5-15 Teams</text>
    </g>
    
    <!-- Outcome badge -->
    <g transform="translate(400, 164)">
      <rect x="-70" y="-16" width="140" height="24" rx="12" fill="#FFFFFF" opacity="0.2"/>
      <text x="0" y="2" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">⚡ Sprint Prototypes</text>
    </g>
  </g>
  
  <!-- Program 3: Venture Studio -->
  <g>
    <!-- Background card with stunning gradient -->
    <rect x="540" y="10" width="250" height="172" rx="12" fill="url(#violetBg)"/>
    
    <!-- Header -->
    <text x="665" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Venture Studio</text>
    
    <!-- Timeline section -->
    <g transform="translate(570, 60)">
      <!-- Infinity/continuous icon - BIGGER -->
      <path d="M 9 18 Q 9 12 13.5 12 Q 18 12 18 18 Q 18 24 22.5 24 Q 27 24 27 18 Q 27 12 22.5 12 Q 18 12 18 18 Q 18 24 13.5 24 Q 9 24 9 18 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2.5" opacity="0.95"/>
      
      <text x="46" y="14" font-family="Arial, sans-serif" font-size="12" fill="#E9D5FF" font-weight="700">TIMELINE</text>
      <text x="46" y="32" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">Always-On</text>
    </g>
    
    <!-- Team size section -->
    <g transform="translate(570, 110)">
      <!-- Multiple people icon - BIGGER -->
      <circle cx="6" cy="12" r="5.5" fill="#FFFFFF" opacity="0.95"/>
      <path d="M 0 27 Q 6 19 12 27" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="21" cy="12" r="5.5" fill="#FFFFFF" opacity="0.8"/>
      <path d="M 15 27 Q 21 19 27 27" fill="#FFFFFF" opacity="0.8"/>
      <circle cx="36" cy="12" r="5.5" fill="#FFFFFF" opacity="0.65"/>
      <path d="M 30 27 Q 36 19 42 27" fill="#FFFFFF" opacity="0.65"/>
      
      <text x="50" y="14" font-family="Arial, sans-serif" font-size="12" fill="#E9D5FF" font-weight="700">TEAM SIZE</text>
      <text x="50" y="32" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">Continuous</text>
    </g>
    
    <!-- Outcome badge -->
    <g transform="translate(665, 164)">
      <rect x="-65" y="-16" width="130" height="24" rx="12" fill="#FFFFFF" opacity="0.2"/>
      <text x="0" y="2" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">🚀 Built Ventures</text>
    </g>
  </g>
  
</svg>
