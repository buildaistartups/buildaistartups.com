<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradTier" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="gradSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; letter-spacing: 0.5px; fill: #0F172A; }
      .subtitle { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; fill: #111827; }
      .body { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 500; fill: #111827; }
      .muted { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 500; fill: #374151; }
      .tiny { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; font-size: 12px; fill: #111827; letter-spacing: .6px; }
      .badgeText { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; fill: white; }
      .cap { text-transform: uppercase; letter-spacing: 1.5px; font-size: 12px; }
    </style>
  </defs>

  <!-- Escalation Arrow / Scale -->
  <path d="M140 780 C 460 760, 820 560, 1480 140" stroke="url(#gradTier)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.25"/>
  <g opacity="0.35">
    <path d="M1460 120 L1500 120 L1500 160" stroke="url(#gradTier)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="1500" cy="120" r="8" fill="url(#gradTier)"/>
  </g>

  <!-- Headline -->
  <text x="140" y="110" class="title" font-size="34">Partnership Tiers</text>
  <text x="140" y="140" class="muted" font-size="16">Escalating features, capabilities, and scale</text>

  <!-- Panels -->
  <!-- Cohort (Tier I) -->
  <g id="cohort">
    <rect x="120" y="180" rx="28" ry="28" width="380" height="520" fill="white" fill-opacity="0.65" stroke="url(#gradTier)" stroke-width="2"/>
    <!-- Badge -->
    <g transform="translate(140,200)">
      <circle cx="0" cy="0" r="18" fill="url(#gradTier)"/>
      <text x="-5" y="6" class="badgeText">I</text>
    </g>
    <text x="180" y="208" class="tiny cap">Tier</text>
    <text x="140" y="245" class="subtitle" font-size="24">Cohort</text>
    <rect x="140" y="260" width="120" height="4" rx="2" fill="url(#gradTier)"/>
    <!-- Features -->
    <g class="body" font-size="16">
      <g transform="translate(140, 300)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Group learning &amp; resources</text>
      </g>
      <g transform="translate(140, 340)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Community forums</text>
      </g>
      <g transform="translate(140, 380)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Quarterly webinars</text>
      </g>
      <g transform="translate(140, 420)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Onboarding support</text>
      </g>
      <g transform="translate(140, 460)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Basic analytics</text>
      </g>
    </g>
    <!-- Scale bar -->
    <text x="140" y="510" class="muted" font-size="13">Scale</text>
    <rect x="140" y="520" width="320" height="10" rx="5" fill="url(#gradSoft)"/>
    <rect x="140" y="520" width="110" height="10" rx="5" fill="url(#gradTier)"/>
    <text x="140" y="550" class="tiny">Entry-level collaboration</text>
  </g>

  <!-- Program (Tier II) -->
  <g id="program">
    <rect x="590" y="160" rx="28" ry="28" width="420" height="600" fill="white" fill-opacity="0.7" stroke="url(#gradTier)" stroke-width="2.5"/>
    <!-- Badge -->
    <g transform="translate(610,180)">
      <circle cx="0" cy="0" r="18" fill="url(#gradTier)"/>
      <text x="-6" y="6" class="badgeText">II</text>
    </g>
    <text x="650" y="188" class="tiny cap">Tier</text>
    <text x="610" y="225" class="subtitle" font-size="26">Program</text>
    <rect x="610" y="240" width="140" height="4" rx="2" fill="url(#gradTier)"/>
    <!-- Features -->
    <g class="body" font-size="16">
      <g transform="translate(610, 280)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Curated curriculum</text>
      </g>
      <g transform="translate(610, 320)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Co‑marketing toolkit</text>
      </g>
      <g transform="translate(610, 360)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Monthly office hours</text>
      </g>
      <g transform="translate(610, 400)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">API sandbox access</text>
      </g>
      <g transform="translate(610, 440)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Enhanced analytics</text>
      </g>
    </g>
    <!-- Scale bar -->
    <text x="610" y="490" class="muted" font-size="13">Scale</text>
    <rect x="610" y="500" width="360" height="10" rx="5" fill="url(#gradSoft)"/>
    <rect x="610" y="500" width="220" height="10" rx="5" fill="url(#gradTier)"/>
    <text x="610" y="530" class="tiny">Growing collaboration &amp; enablement</text>
  </g>

  <!-- Studio (Tier III) -->
  <g id="studio">
    <rect x="1080" y="140" rx="28" ry="28" width="460" height="640" fill="white" fill-opacity="0.78" stroke="url(#gradTier)" stroke-width="3"/>
    <!-- Badge -->
    <g transform="translate(1100,160)">
      <circle cx="0" cy="0" r="18" fill="url(#gradTier)"/>
      <text x="-8" y="6" class="badgeText">III</text>
    </g>
    <text x="1140" y="168" class="tiny cap">Tier</text>
    <text x="1100" y="205" class="subtitle" font-size="28">Studio</text>
    <rect x="1100" y="220" width="160" height="4" rx="2" fill="url(#gradTier)"/>
    <!-- Features -->
    <g class="body" font-size="16">
      <g transform="translate(1100, 260)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Dedicated success manager</text>
      </g>
      <g transform="translate(1100, 300)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Custom integrations</text>
      </g>
      <g transform="translate(1100, 340)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Go‑to‑market planning</text>
      </g>
      <g transform="translate(1100, 380)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Priority support &amp; SLAs</text>
      </g>
      <g transform="translate(1100, 420)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Revenue share incentives</text>
      </g>
      <g transform="translate(1100, 460)">
        <circle cx="0" cy="0" r="9" fill="url(#gradTier)" />
        <path d="M-3 0 L-1 2 L4 -3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        <text x="18" y="5">Enterprise reporting</text>
      </g>
    </g>
    <!-- Scale bar -->
    <text x="1100" y="510" class="muted" font-size="13">Scale</text>
    <rect x="1100" y="520" width="400" height="10" rx="5" fill="url(#gradSoft)"/>
    <rect x="1100" y="520" width="350" height="10" rx="5" fill="url(#gradTier)"/>
    <text x="1100" y="550" class="tiny">Strategic co‑build &amp; full-stack partnership</text>
  </g>

  <!-- Comparison legend -->
  <g id="legend" transform="translate(140, 740)">
    <rect x="0" y="-28" rx="16" ry="16" width="500" height="44" fill="white" fill-opacity="0.6" stroke="url(#gradTier)" stroke-opacity="0.25" />
    <circle cx="26" cy="-6" r="7" fill="url(#gradTier)"/>
    <text x="40" y="-2" class="tiny">Feature present</text>
    <rect x="150" y="-12" width="100" height="4" rx="2" fill="url(#gradSoft)"/>
    <rect x="150" y="-12" width="40" height="4" rx="2" fill="url(#gradTier)"/>
    <text x="260" y="-2" class="tiny">Relative scale</text>
  </g>

</svg>
