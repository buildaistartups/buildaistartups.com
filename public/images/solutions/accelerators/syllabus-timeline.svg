<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="4-Week Syllabus Timeline">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');
      .title { font: 700 42px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 22px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #64748b; }
      .phase { font: 700 24px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: white; }
      .label { font: 600 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #64748b; }
      .legend { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .lohead { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .bullet { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
    </style>
    <!-- subtle drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <!-- icons -->
    <g id="diamond" transform="scale(1)">
      <polygon points="0,-10 10,0 0,10 -10,0" />
    </g>
    <g id="check">
      <path d="M2 8l4 4 10-12" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="doc">
      <path d="M2 2h10l4 4v10a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="currentColor"/>
      <path d="M12 2v4h4" fill="white"/>
    </g>
    <g id="calendar">
      <rect x="0" y="2" width="24" height="20" rx="3" fill="currentColor"/>
      <rect x="0" y="6" width="24" height="16" fill="white"/>
      <line x1="6" y1="0" x2="6" y2="8" stroke="currentColor" stroke-width="3"/>
      <line x1="18" y1="0" x2="18" y2="8" stroke="currentColor" stroke-width="3"/>
    </g>
  </defs>

  <!-- Title -->
  <text x="60" y="90" class="title">4-Week Syllabus Timeline</text>
  <text x="60" y="120" class="subtitle">Intent → Repo → Ship → Learn • Transparent background • Vector SVG</text>

  <!-- Legend -->
  <g transform="translate(60,150)">
    <rect x="0" y="-18" width="360" height="36" rx="18" fill="white" filter="url(#softShadow)" />
    <g transform="translate(16,0)">
      <circle cx="0" cy="0" r="8" fill="#6D28D9"/>
      <text x="16" y="6" class="legend">Milestone</text>
    </g>
    <g transform="translate(140,0)">
      <rect x="-8" y="-8" width="16" height="16" fill="#2563EB" rx="3"/>
      <text x="16" y="6" class="legend">Assignment</text>
    </g>
    <g transform="translate(290,0)">
      <circle cx="0" cy="0" r="8" fill="#2563EB"/>
      <path d="M-4 2 l3 3 l7 -8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="6" class="legend">Deliverable</text>
    </g>
  </g>

  <!-- Phases bands -->
  <g transform="translate(60,210)">
    <rect x="0" y="0" width="720" height="60" rx="12" fill="#6D28D9" filter="url(#softShadow)"/>
    <text x="24" y="38" class="phase">Week 1–2 • Intent → Repo</text>
    <rect x="760" y="0" width="720" height="60" rx="12" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="784" y="38" class="phase">Week 3–4 • Ship &amp; Learn</text>
  </g>

  <!-- Main timeline line -->
  <g transform="translate(60,320)">
    <line x1="0" y1="0" x2="1480" y2="0" stroke="#cbd5e1" stroke-width="4" />
    <!-- Week markers -->
    <g transform="translate(0,0)">
      <circle cx="0" cy="0" r="8" fill="#6D28D9"/>
      <text x="-12" y="30" class="label">W1</text>
    </g>
    <g transform="translate(370,0)">
      <circle cx="0" cy="0" r="8" fill="#6D28D9"/>
      <text x="-12" y="30" class="label">W2</text>
    </g>
    <g transform="translate(740,0)">
      <circle cx="0" cy="0" r="8" fill="#2563EB"/>
      <text x="-12" y="30" class="label">W3</text>
    </g>
    <g transform="translate(1110,0)">
      <circle cx="0" cy="0" r="8" fill="#2563EB"/>
      <text x="-12" y="30" class="label">W4</text>
    </g>
    <g transform="translate(1480,0)">
      <circle cx="0" cy="0" r="8" fill="#10b981"/>
      <text x="-14" y="30" class="label">Done</text>
    </g>
  </g>

  <!-- Academic calendar elements above timeline -->
  <g transform="translate(60,260)">
    <!-- Add/Drop -->
    <g transform="translate(100,0)">
      <use href="#calendar" fill="#6D28D9" />
      <text x="32" y="8" class="small">Add/Drop</text>
      <text x="32" y="26" class="small">W1 Tue</text>
    </g>
    <!-- Holiday -->
    <g transform="translate(470,0)">
      <use href="#calendar" fill="#6D28D9" />
      <text x="32" y="8" class="small">Holiday</text>
      <text x="32" y="26" class="small">W2 Mon</text>
    </g>
    <!-- Midpoint feedback -->
    <g transform="translate(840,0)">
      <use href="#calendar" fill="#2563EB" />
      <text x="32" y="8" class="small">Midpoint Feedback</text>
      <text x="32" y="26" class="small">W3 Wed</text>
    </g>
    <!-- Final submission -->
    <g transform="translate(1210,0)">
      <use href="#calendar" fill="#2563EB" />
      <text x="32" y="8" class="small">Final Submission</text>
      <text x="32" y="26" class="small">W4 Fri 23:59</text>
    </g>
  </g>

  <!-- Week 1 detail -->
  <g transform="translate(60,380)">
    <rect x="0" y="0" width="340" height="230" rx="16" fill="#EDE9FE" />
    <text x="20" y="36" class="label">Week 1 — Intent</text>
    <text x="20" y="66" class="lohead">Learning Objectives</text>
    <text x="24" y="92" class="bullet">• Define problem, users, success metrics</text>
    <text x="24" y="116" class="bullet">• Set up repo, CI, conventions</text>
    <text x="24" y="140" class="bullet">• Draft lightweight project brief</text>

    <!-- Milestone -->
    <g transform="translate(260,30)">
      <use href="#diamond" fill="#6D28D9" />
      <text x="16" y="6" class="small">Problem Statement Locked</text>
    </g>
    <!-- Assignment -->
    <g transform="translate(20,180)">
      <rect x="0" y="0" width="300" height="36" rx="10" fill="#6D28D9" />
      <g transform="translate(12,8)"><use href="#doc" fill="white"/></g>
      <text x="44" y="24" class="phase" style="font-size:18px">A1: Intent Brief (Sun 23:59)</text>
    </g>
  </g>

  <!-- Week 2 detail -->
  <g transform="translate(420,380)">
    <rect x="0" y="0" width="340" height="230" rx="16" fill="#EDE9FE" />
    <text x="20" y="36" class="label">Week 2 — Repo</text>
    <text x="20" y="66" class="lohead">Learning Objectives</text>
    <text x="24" y="92" class="bullet">• Write spec &amp; define MVP</text>
    <text x="24" y="116" class="bullet">• Break work into issues &amp; sprints</text>
    <text x="24" y="140" class="bullet">• Prototype core flows</text>

    <!-- Milestones -->
    <g transform="translate(220,30)">
      <use href="#diamond" fill="#6D28D9" />
      <text x="16" y="6" class="small">Repo Initialized</text>
    </g>
    <g transform="translate(220,60)">
      <use href="#diamond" fill="#6D28D9" />
      <text x="16" y="6" class="small">MVP Scope Agreed</text>
    </g>

    <!-- Assignment -->
    <g transform="translate(20,180)">
      <rect x="0" y="0" width="300" height="36" rx="10" fill="#6D28D9" />
      <g transform="translate(12,8)"><use href="#doc" fill="white"/></g>
      <text x="44" y="24" class="phase" style="font-size:18px">A2: Repo Setup Checklist</text>
    </g>
  </g>

  <!-- Week 3 detail -->
  <g transform="translate(780,380)">
    <rect x="0" y="0" width="340" height="230" rx="16" fill="#DBEAFE" />
    <text x="20" y="36" class="label">Week 3 — Ship</text>
    <text x="20" y="66" class="lohead">Learning Objectives</text>
    <text x="24" y="92" class="bullet">• Build MVP features</text>
    <text x="24" y="116" class="bullet">• Instrument analytics &amp; logging</text>
    <text x="24" y="140" class="bullet">• Write unit &amp; e2e tests</text>

    <!-- Milestone -->
    <g transform="translate(220,30)">
      <use href="#diamond" fill="#2563EB" />
      <text x="16" y="6" class="small">MVP Feature Complete</text>
    </g>

    <!-- Assignment / Deliverable -->
    <g transform="translate(20,180)">
      <rect x="0" y="0" width="300" height="36" rx="10" fill="#2563EB" />
      <g transform="translate(12,8)"><use href="#doc" fill="white"/></g>
      <text x="44" y="24" class="phase" style="font-size:18px">A3: MVP Demo (Fri)</text>
    </g>
  </g>

  <!-- Week 4 detail -->
  <g transform="translate(1140,380)">
    <rect x="0" y="0" width="340" height="230" rx="16" fill="#DBEAFE" />
    <text x="20" y="36" class="label">Week 4 — Learn</text>
    <text x="20" y="66" class="lohead">Learning Objectives</text>
    <text x="24" y="92" class="bullet">• Ship to pilot users</text>
    <text x="24" y="116" class="bullet">• Collect feedback &amp; analyze</text>
    <text x="24" y="140" class="bullet">• Retrospective &amp; next-steps</text>

    <!-- Milestones -->
    <g transform="translate(200,30)">
      <use href="#diamond" fill="#2563EB" />
      <text x="16" y="6" class="small">Pilot Released</text>
    </g>
    <g transform="translate(200,60)">
      <use href="#diamond" fill="#2563EB" />
      <text x="16" y="6" class="small">Analytics Reviewed</text>
    </g>

    <!-- Deliverable -->
    <g transform="translate(20,180)">
      <rect x="0" y="0" width="300" height="36" rx="10" fill="#2563EB" />
      <circle cx="20" cy="18" r="10" fill="#2563EB"/>
      <g transform="translate(12,10) scale(0.9)"><use href="#check"/></g>
      <text x="44" y="24" class="phase" style="font-size:18px">A4: Retro &amp; Learning Log</text>
    </g>
  </g>

  <!-- Footer helper note -->
  <g transform="translate(60,640)">
    <text x="0" y="0" class="small">Tip: Adjust calendar labels (e.g., actual dates/holidays) directly in the SVG text for your institution.</text>
  </g>
</svg>
