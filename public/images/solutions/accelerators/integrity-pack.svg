<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightPurpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.2" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6366F1" text-anchor="middle">
    Academic Integrity & Compliance
  </text>
  
  <!-- Central Badge -->
  <g transform="translate(400, 180)">
    <!-- Shield background -->
    <path d="M 0,-60 L 50,-45 L 50,20 Q 50,45 0,60 Q -50,45 -50,20 L -50,-45 Z" 
          fill="url(#purpleBlueGrad)" filter="url(#shadow)"/>
    
    <!-- Checkmark -->
    <path d="M -20,0 L -5,15 L 25,-20" stroke="white" stroke-width="6" 
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Stars around badge -->
    <path d="M 0,-75 L 3,-83 L 0,-91 L -3,-83 Z" fill="#FCD34D"/>
    <path d="M 65,-30 L 73,-30 L 68,-22 L 73,-14 L 65,-14 Z" fill="#FCD34D"/>
    <path d="M 65,35 L 73,35 L 68,43 L 73,51 L 65,51 Z" fill="#FCD34D"/>
    <path d="M -65,-30 L -57,-30 L -62,-22 L -57,-14 L -65,-14 Z" fill="#FCD34D"/>
    <path d="M -65,35 L -57,35 L -62,43 L -57,51 L -65,51 Z" fill="#FCD34D"/>
  </g>
  
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="14" font-weight="600" 
        fill="#6366F1" text-anchor="middle">VERIFIED COMPLIANCE</text>
  
  <!-- Four Feature Cards -->
  
  <!-- Audit Logs (Top Left) -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="140" height="160" rx="12" fill="url(#lightPurpleGrad)" 
          stroke="#7C3AED" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Icon: Document with lines -->
    <g transform="translate(70, 35)">
      <rect x="-20" y="-25" width="40" height="50" rx="3" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
      <line x1="-12" y1="-15" x2="12" y2="-15" stroke="#7C3AED" stroke-width="2"/>
      <line x1="-12" y1="-5" x2="12" y2="-5" stroke="#7C3AED" stroke-width="2"/>
      <line x1="-12" y1="5" x2="12" y2="5" stroke="#7C3AED" stroke-width="2"/>
      <line x1="-12" y1="15" x2="5" y2="15" stroke="#7C3AED" stroke-width="2"/>
      <circle cx="15" cy="-20" r="8" fill="#10B981"/>
      <path d="M 12,-20 L 15,-17 L 19,-23" stroke="white" stroke-width="2" fill="none"/>
    </g>
    
    <text x="70" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
          fill="#5B21B6" text-anchor="middle">Audit Logs</text>
    <text x="70" y="110" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">
      Complete activity
    </text>
    <text x="70" y="125" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">
      tracking &amp; review
    </text>
    <text x="70" y="140" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">
      history
    </text>
  </g>
  
  <!-- Provenance Tracking (Top Right) -->
  <g transform="translate(260, 320)">
    <rect x="0" y="0" width="140" height="160" rx="12" fill="url(#lightPurpleGrad)" 
          stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Icon: Chain links -->
    <g transform="translate(70, 40)">
      <ellipse cx="-15" cy="-5" rx="10" ry="15" fill="none" stroke="#2563EB" stroke-width="2.5"/>
      <ellipse cx="15" cy="-5" rx="10" ry="15" fill="none" stroke="#2563EB" stroke-width="2.5"/>
      <rect x="-5" y="-8" width="10" height="6" fill="#2563EB"/>
      <circle cx="-15" cy="-15" r="4" fill="#10B981"/>
      <circle cx="0" cy="-5" r="4" fill="#10B981"/>
      <circle cx="15" cy="-15" r="4" fill="#10B981"/>
    </g>
    
    <text x="70" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
          fill="#1E40AF" text-anchor="middle">Provenance</text>
    <text x="70" y="110" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">
      Source tracking
    </text>
    <text x="70" y="125" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">
      &amp; attribution
    </text>
    <text x="70" y="140" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">
      verification
    </text>
  </g>
  
  <!-- Citation Guidance (Bottom Left) -->
  <g transform="translate(440, 320)">
    <rect x="0" y="0" width="140" height="160" rx="12" fill="url(#lightPurpleGrad)" 
          stroke="#7C3AED" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Icon: Quote marks with document -->
    <g transform="translate(70, 38)">
      <path d="M -20,-15 Q -20,-25 -10,-25 L -10,-20 Q -15,-20 -15,-15 Z" fill="#7C3AED"/>
      <path d="M -5,-15 Q -5,-25 5,-25 L 5,-20 Q 0,-20 0,-15 Z" fill="#7C3AED"/>
      <rect x="-18" y="-5" width="36" height="30" rx="2" fill="none" stroke="#7C3AED" stroke-width="2"/>
      <line x1="-12" y1="3" x2="12" y2="3" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="-12" y1="9" x2="12" y2="9" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="-12" y1="15" x2="6" y2="15" stroke="#7C3AED" stroke-width="1.5"/>
      <circle cx="18" cy="18" r="7" fill="#10B981"/>
      <text x="18" y="23" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
            fill="white" text-anchor="middle">?</text>
    </g>
    
    <text x="70" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
          fill="#5B21B6" text-anchor="middle">Citation</text>
    <text x="70" y="110" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">
      Automated
    </text>
    <text x="70" y="125" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">
      formatting &amp;
    </text>
    <text x="70" y="140" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle">
      style guides
    </text>
  </g>
  
  <!-- Policy Templates (Bottom Right) -->
  <g transform="translate(620, 320)">
    <rect x="0" y="0" width="140" height="160" rx="12" fill="url(#lightPurpleGrad)" 
          stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Icon: Documents stack -->
    <g transform="translate(70, 40)">
      <rect x="-20" y="-20" width="35" height="40" rx="2" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.3"/>
      <rect x="-17" y="-17" width="35" height="40" rx="2" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.6"/>
      <rect x="-14" y="-14" width="35" height="40" rx="2" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
      <line x1="-8" y1="-6" x2="14" y2="-6" stroke="#2563EB" stroke-width="2"/>
      <line x1="-8" y1="0" x2="14" y2="0" stroke="#2563EB" stroke-width="2"/>
      <line x1="-8" y1="6" x2="14" y2="6" stroke="#2563EB" stroke-width="2"/>
      <line x1="-8" y1="12" x2="8" y2="12" stroke="#2563EB" stroke-width="2"/>
    </g>
    
    <text x="70" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
          fill="#1E40AF" text-anchor="middle">Policy</text>
    <text x="70" y="110" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">
      Ready-to-use
    </text>
    <text x="70" y="125" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">
      templates &amp;
    </text>
    <text x="70" y="140" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">
      guidelines
    </text>
  </g>
  
  <!-- Bottom Status Bar -->
  <g transform="translate(200, 520)">
    <rect x="0" y="0" width="400" height="50" rx="25" fill="url(#lightPurpleGrad)" 
          stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Status indicators - moved 7px more to the left -->
    <circle cx="58" cy="25" r="8" fill="#10B981"/>
    <path d="M 55,25 L 58,28 L 62,22" stroke="white" stroke-width="2" fill="none"/>
    <text x="78" y="30" font-family="Arial, sans-serif" font-size="12" fill="#5B21B6" font-weight="600">
      Standards Met
    </text>
    
    <circle cx="178" cy="25" r="8" fill="#10B981"/>
    <path d="M 175,25 L 178,28 L 182,22" stroke="white" stroke-width="2" fill="none"/>
    <text x="198" y="30" font-family="Arial, sans-serif" font-size="12" fill="#5B21B6" font-weight="600">
      Verified
    </text>
    
    <circle cx="278" cy="25" r="8" fill="#10B981"/>
    <path d="M 275,25 L 278,28 L 282,22" stroke="white" stroke-width="2" fill="none"/>
    <text x="298" y="30" font-family="Arial, sans-serif" font-size="12" fill="#5B21B6" font-weight="600">
      Compliant
    </text>
  </g>
  
  <!-- Connecting lines from badge to features -->
  <line x1="350" y1="230" x2="150" y2="320" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="400" y1="240" x2="330" y2="320" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="450" y1="230" x2="510" y2="320" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="460" y1="220" x2="690" y2="320" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
</svg>
