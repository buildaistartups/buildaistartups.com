<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->
  <rect width="800" height="600" fill="transparent"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="url(#purpleGradient)" filter="url(#shadow)"/>
  <text x="20" y="35" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Educational Management Console</text>
  
  <!-- User Profile Icon -->
  <circle cx="750" cy="30" r="15" fill="white" opacity="0.2"/>
  <circle cx="750" cy="30" r="8" fill="white"/>
  
  <!-- Navigation Tabs -->
  <rect x="20" y="70" width="100" height="30" rx="5" fill="url(#blueGradient)"/>
  <text x="70" y="88" fill="white" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Overview</text>
  
  <rect x="130" y="70" width="100" height="30" rx="5" fill="#E5E7EB" stroke="#9CA3AF"/>
  <text x="180" y="88" fill="#6B7280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Teams</text>
  
  <rect x="240" y="70" width="100" height="30" rx="5" fill="#E5E7EB" stroke="#9CA3AF"/>
  <text x="290" y="88" fill="#6B7280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Approvals</text>
  
  <!-- Team Oversight Panel -->
  <rect x="20" y="120" width="360" height="220" rx="8" fill="url(#cardGradient)" stroke="#D1D5DB" filter="url(#shadow)"/>
  <text x="30" y="140" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Team Oversight</text>
  
  <!-- Team Cards -->
  <rect x="30" y="150" width="160" height="80" rx="6" fill="white" stroke="#E5E7EB"/>
  <circle cx="50" cy="170" r="8" fill="#10B981"/>
  <text x="65" y="175" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Frontend Team</text>
  <text x="40" y="190" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">5 Members Active</text>
  <text x="40" y="205" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Progress: 78%</text>
  <rect x="40" y="210" width="100" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="40" y="210" width="78" height="4" rx="2" fill="#10B981"/>
  
  <rect x="200" y="150" width="160" height="80" rx="6" fill="white" stroke="#E5E7EB"/>
  <circle cx="220" cy="170" r="8" fill="#F59E0B"/>
  <text x="235" y="175" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Backend Team</text>
  <text x="210" y="190" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">3 Members Active</text>
  <text x="210" y="205" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Progress: 45%</text>
  <rect x="210" y="210" width="100" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="210" y="210" width="45" height="4" rx="2" fill="#F59E0B"/>
  
  <rect x="30" y="240" width="160" height="80" rx="6" fill="white" stroke="#E5E7EB"/>
  <circle cx="50" cy="260" r="8" fill="#EF4444"/>
  <text x="65" y="265" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">QA Team</text>
  <text x="40" y="280" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">2 Members Active</text>
  <text x="40" y="295" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Progress: 92%</text>
  <rect x="40" y="300" width="100" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="40" y="300" width="92" height="4" rx="2" fill="#EF4444"/>
  
  <!-- Mentor Tools -->
  <rect x="200" y="240" width="160" height="80" rx="6" fill="url(#purpleGradient)" stroke="#8B5CF6"/>
  <text x="280" y="260" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Mentor Tools</text>
  <circle cx="220" cy="280" r="12" fill="white" opacity="0.2"/>
  <text x="220" y="285" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">📚</text>
  <circle cx="250" cy="280" r="12" fill="white" opacity="0.2"/>
  <text x="250" y="285" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">💬</text>
  <circle cx="280" cy="280" r="12" fill="white" opacity="0.2"/>
  <text x="280" y="285" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">📊</text>
  <circle cx="310" cy="280" r="12" fill="white" opacity="0.2"/>
  <text x="310" y="285" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">⚙️</text>
  
  <!-- Approval Queue Panel -->
  <rect x="400" y="120" width="180" height="220" rx="8" fill="url(#cardGradient)" stroke="#D1D5DB" filter="url(#shadow)"/>
  <text x="410" y="140" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Approval Queue</text>
  
  <!-- Approval Items -->
  <rect x="410" y="150" width="160" height="40" rx="4" fill="white" stroke="#FEF3C7"/>
  <circle cx="425" cy="170" r="6" fill="#F59E0B"/>
  <text x="440" y="165" fill="#374151" font-family="Arial, sans-serif" font-size="11">Project Milestone</text>
  <text x="440" y="178" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">Frontend Team - 2h ago</text>
  
  <rect x="410" y="200" width="160" height="40" rx="4" fill="white" stroke="#FECACA"/>
  <circle cx="425" cy="220" r="6" fill="#EF4444"/>
  <text x="440" y="215" fill="#374151" font-family="Arial, sans-serif" font-size="11">Code Review</text>
  <text x="440" y="228" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">Backend Team - 5h ago</text>
  
  <rect x="410" y="250" width="160" height="40" rx="4" fill="white" stroke="#D1FAE5"/>
  <circle cx="425" cy="270" r="6" fill="#10B981"/>
  <text x="440" y="265" fill="#374151" font-family="Arial, sans-serif" font-size="11">Documentation</text>
  <text x="440" y="278" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">QA Team - 1d ago</text>
  
  <!-- Action Buttons -->
  <rect x="410" y="300" width="70" height="25" rx="4" fill="#10B981"/>
  <text x="445" y="315" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Approve</text>
  
  <rect x="490" y="300" width="70" height="25" rx="4" fill="#EF4444"/>
  <text x="525" y="315" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Reject</text>
  
  <!-- Progress Tracking Panel -->
  <rect x="600" y="120" width="180" height="220" rx="8" fill="url(#cardGradient)" stroke="#D1D5DB" filter="url(#shadow)"/>
  <text x="610" y="140" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Progress Tracking</text>
  
  <!-- Progress Charts -->
  <circle cx="650" cy="180" r="30" fill="none" stroke="#E5E7EB" stroke-width="6"/>
  <circle cx="650" cy="180" r="30" fill="none" stroke="url(#blueGradient)" stroke-width="6" 
          stroke-dasharray="113" stroke-dashoffset="34" transform="rotate(-90 650 180)"/>
  <text x="650" y="185" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">70%</text>
  <text x="650" y="220" fill="#6B7280" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Overall Progress</text>
  
  <circle cx="730" cy="180" r="25" fill="none" stroke="#E5E7EB" stroke-width="5"/>
  <circle cx="730" cy="180" r="25" fill="none" stroke="#10B981" stroke-width="5" 
          stroke-dasharray="94" stroke-dashoffset="18" transform="rotate(-90 730 180)"/>
  <text x="730" y="185" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">81%</text>
  <text x="730" y="210" fill="#6B7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Quality Score</text>
  
  <!-- Metrics -->
  <rect x="610" y="240" width="70" height="40" rx="4" fill="white" stroke="#E5E7EB"/>
  <text x="645" y="255" fill="#6B7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Active Tasks</text>
  <text x="645" y="270" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">24</text>
  
  <rect x="690" y="240" width="70" height="40" rx="4" fill="white" stroke="#E5E7EB"/>
  <text x="725" y="255" fill="#6B7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Completed</text>
  <text x="725" y="270" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">156</text>
  
  <!-- Quality Gates Monitoring -->
  <rect x="20" y="360" width="360" height="220" rx="8" fill="url(#cardGradient)" stroke="#D1D5DB" filter="url(#shadow)"/>
  <text x="30" y="380" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Quality Gates Monitoring</text>
  
  <!-- Quality Gate Items -->
  <rect x="30" y="390" width="340" height="35" rx="4" fill="white" stroke="#D1FAE5"/>
  <circle cx="45" cy="407" r="8" fill="#10B981"/>
  <text x="45" y="412" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">✓</text>
  <text x="65" y="400" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Code Quality</text>
  <text x="65" y="415" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">All checks passed</text>
  <rect x="300" y="400" width="60" height="15" rx="8" fill="#D1FAE5"/>
  <text x="330" y="410" fill="#065F46" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">PASSED</text>
  
  <rect x="30" y="435" width="340" height="35" rx="4" fill="white" stroke="#FEF3C7"/>
  <circle cx="45" cy="452" r="8" fill="#F59E0B"/>
  <text x="45" y="457" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">!</text>
  <text x="65" y="445" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Security Scan</text>
  <text x="65" y="460" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">2 minor issues found</text>
  <rect x="300" y="445" width="60" height="15" rx="8" fill="#FEF3C7"/>
  <text x="330" y="455" fill="#92400E" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">WARNING</text>
  
  <rect x="30" y="480" width="340" height="35" rx="4" fill="white" stroke="#FECACA"/>
  <circle cx="45" cy="497" r="8" fill="#EF4444"/>
  <text x="45" y="502" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">×</text>
  <text x="65" y="490" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Performance Test</text>
  <text x="65" y="505" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Response time exceeded</text>
  <rect x="300" y="490" width="60" height="15" rx="8" fill="#FECACA"/>
  <text x="330" y="500" fill="#991B1B" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">FAILED</text>
  
  <rect x="30" y="525" width="340" height="35" rx="4" fill="white" stroke="#E5E7EB"/>
  <circle cx="45" cy="542" r="8" fill="#6B7280"/>
  <text x="45" y="547" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">⏳</text>
  <text x="65" y="535" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Documentation Review</text>
  <text x="65" y="550" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Pending review</text>
  <rect x="300" y="535" width="60" height="15" rx="8" fill="#E5E7EB"/>
  <text x="330" y="545" fill="#6B7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">PENDING</text>
  
  <!-- Review Interface Panel -->
  <rect x="400" y="360" width="180" height="100" rx="8" fill="url(#cardGradient)" stroke="#D1D5DB" filter="url(#shadow)"/>
  <text x="410" y="380" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Review Interface</text>
  
  <!-- Review Actions -->
  <rect x="410" y="390" width="160" height="25" rx="4" fill="url(#blueGradient)"/>
  <text x="490" y="405" fill="white" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">📝 Start Code Review</text>
  
  <rect x="410" y="420" width="75" height="25" rx="4" fill="#10B981"/>
  <text x="447" y="435" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">✓ Approve</text>
  
  <rect x="495" y="420" width="75" height="25" rx="4" fill="#EF4444"/>
  <text x="532" y="435" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">✗ Request Changes</text>
  
  <!-- Administrative Controls -->
  <rect x="600" y="360" width="180" height="220" rx="8" fill="url(#cardGradient)" stroke="#D1D5DB" filter="url(#shadow)"/>
  <text x="610" y="380" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Admin Controls</text>
  
  <!-- Admin Menu -->
  <rect x="610" y="390" width="160" height="30" rx="4" fill="white" stroke="#E5E7EB"/>
  <text x="620" y="408" fill="#374151" font-family="Arial, sans-serif" font-size="11">👥 User Management</text>
  
  <rect x="610" y="430" width="160" height="30" rx="4" fill="white" stroke="#E5E7EB"/>
  <text x="620" y="448" fill="#374151" font-family="Arial, sans-serif" font-size="11">🔧 System Settings</text>
  
  <rect x="610" y="470" width="160" height="30" rx="4" fill="white" stroke="#E5E7EB"/>
  <text x="620" y="488" fill="#374151" font-family="Arial, sans-serif" font-size="11">📊 Analytics Dashboard</text>
  
  <rect x="610" y="510" width="160" height="30" rx="4" fill="white" stroke="#E5E7EB"/>
  <text x="620" y="528" fill="#374151" font-family="Arial, sans-serif" font-size="11">🔒 Security Audit</text>
  
  <!-- Quick Actions -->
  <rect x="610" y="550" width="75" height="20" rx="3" fill="url(#purpleGradient)"/>
  <text x="647" y="562" fill="white" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Export</text>
  
  <rect x="695" y="550" width="75" height="20" rx="3" fill="url(#blueGradient)"/>
  <text x="732" y="562" fill="white" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Backup</text>
  
  <!-- Status Indicators -->
  <circle cx="750" cy="390" r="4" fill="#10B981"/>
  <circle cx="750" cy="430" r="4" fill="#F59E0B"/>
  <circle cx="750" cy="470" r="4" fill="#10B981"/>
  <circle cx="750" cy="510" r="4" fill="#EF4444"/>
</svg>
