<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Enhanced gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="badgeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0" />
    </radialGradient>
    
    <!-- Enhanced shadows and effects -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.06"/>
    </filter>
    
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#6366F1" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E293B" flood-opacity="0.1"/>
    </filter>
    
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#6366F1" flood-opacity="0.4"/>
    </filter>
    
    <!-- Background pattern -->
    <pattern id="backgroundPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#E2E8F0" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background with subtle pattern -->
  <rect width="800" height="600" fill="#FAFBFC"/>
  <rect width="800" height="600" fill="url(#backgroundPattern)"/>
  
  <!-- Header section with enhanced typography -->
  <g>
    <text x="400" y="45" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
          font-size="32" font-weight="700" fill="#1E293B" text-anchor="middle" letter-spacing="-0.5px">
      Academic Integrity &amp; Compliance
    </text>
    <text x="400" y="70" font-family="'Segoe UI', system-ui, sans-serif" 
          font-size="16" font-weight="400" fill="#64748B" text-anchor="middle" letter-spacing="0.5px">
      ENTERPRISE VERIFICATION SYSTEM
    </text>
  </g>
  
  <!-- Enhanced Central Badge -->
  <g transform="translate(400, 180)">
    <!-- Glow effect background -->
    <circle cx="0" cy="-10" r="80" fill="url(#badgeGlow)" opacity="0.6"/>
    
    <!-- Main shield with enhanced design -->
    <path d="M 0,-65 L 55,-48 L 55,25 Q 55,52 0,68 Q -55,52 -55,25 L -55,-48 Z" 
          fill="url(#primaryGrad)" filter="url(#badgeShadow)"/>
    
    <!-- Inner shield highlight -->
    <path d="M 0,-60 L 50,-45 L 50,20 Q 50,45 0,60 Q -50,45 -50,20 L -50,-45 Z" 
          fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <!-- Enhanced checkmark with animation-ready design -->
    <g filter="url(#iconGlow)">
      <path d="M -25,-2 L -8,15 L 30,-25" stroke="white" stroke-width="8" 
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
      <path d="M -25,-2 L -8,15 L 30,-25" stroke="white" stroke-width="5" 
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    
    <!-- Sophisticated decorative elements -->
    <g opacity="0.8">
      <!-- Top star -->
      <path d="M 0,-85 L 4,-95 L 0,-105 L -4,-95 Z" fill="url(#accentGrad2)"/>
      <circle cx="0" cy="-95" r="3" fill="rgba(255,255,255,0.3)"/>
      
      <!-- Right stars -->
      <path d="M 75,-35 L 85,-35 L 80,-25 L 85,-15 L 75,-15 Z" fill="url(#accentGrad2)"/>
      <circle cx="80" cy="-25" r="2" fill="rgba(255,255,255,0.3)"/>
      
      <path d="M 75,40 L 85,40 L 80,50 L 85,60 L 75,60 Z" fill="url(#accentGrad1)"/>
      <circle cx="80" cy="50" r="2" fill="rgba(255,255,255,0.3)"/>
      
      <!-- Left stars -->
      <path d="M -75,-35 L -65,-35 L -70,-25 L -65,-15 L -75,-15 Z" fill="url(#accentGrad2)"/>
      <circle cx="-70" cy="-25" r="2" fill="rgba(255,255,255,0.3)"/>
      
      <path d="M -75,40 L -65,40 L -70,50 L -65,60 L -75,60 Z" fill="url(#accentGrad1)"/>
      <circle cx="-70" cy="50" r="2" fill="rgba(255,255,255,0.3)"/>
    </g>
  </g>
  
  <!-- Enhanced status text -->
  <text x="400" y="270" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" 
        font-weight="600" fill="#059669" text-anchor="middle" letter-spacing="2px">
    ✓ VERIFIED COMPLIANCE
  </text>
  
  <!-- Enhanced Feature Cards with modern design -->
  
  <!-- Audit Logs Card -->
  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="160" height="180" rx="16" fill="url(#cardGrad)" 
          stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="160" height="4" rx="16" fill="url(#primaryGrad)"/>
    
    <!-- Enhanced icon -->
    <g transform="translate(80, 50)">
      <rect x="-25" y="-30" width="50" height="60" rx="6" fill="#F8FAFC" stroke="#6366F1" stroke-width="2.5"/>
      <line x1="-15" y1="-18" x2="15" y2="-18" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-15" y1="-6" x2="15" y2="-6" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-15" y1="6" x2="15" y2="6" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-15" y1="18" x2="8" y2="18" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
      
      <!-- Status indicator -->
      <circle cx="22" cy="-25" r="10" fill="url(#accentGrad1)" filter="url(#iconGlow)"/>
      <path d="M 18,-25 L 21,-22 L 26,-28" stroke="white" stroke-width="2.5" 
            stroke-linecap="round" fill="none"/>
    </g>
    
    <text x="80" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" 
          font-weight="700" fill="#1E293B" text-anchor="middle">Audit Logs</text>
    <text x="80" y="125" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">Complete activity tracking</text>
    <text x="80" y="142" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">and comprehensive review</text>
    <text x="80" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">history management</text>
  </g>
  
  <!-- Provenance Tracking Card -->
  <g transform="translate(240, 320)">
    <rect x="0" y="0" width="160" height="180" rx="16" fill="url(#cardGrad)" 
          stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="160" height="4" rx="16" fill="url(#primaryGrad)"/>
    
    <!-- Enhanced chain icon -->
    <g transform="translate(80, 50)">
      <ellipse cx="-18" cy="-8" rx="12" ry="18" fill="none" stroke="#3B82F6" stroke-width="3"/>
      <ellipse cx="18" cy="-8" rx="12" ry="18" fill="none" stroke="#3B82F6" stroke-width="3"/>
      <rect x="-6" y="-12" width="12" height="8" rx="2" fill="#3B82F6"/>
      
      <!-- Connection nodes -->
      <circle cx="-18" cy="-20" r="5" fill="url(#accentGrad1)"/>
      <circle cx="0" cy="-8" r="5" fill="url(#accentGrad1)"/>
      <circle cx="18" cy="-20" r="5" fill="url(#accentGrad1)"/>
      
      <!-- Data flow indicators -->
      <path d="M -8,-8 L 8,-8" stroke="#10B981" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    
    <text x="80" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" 
          font-weight="700" fill="#1E293B" text-anchor="middle">Provenance</text>
    <text x="80" y="125" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">Advanced source tracking</text>
    <text x="80" y="142" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">with attribution verification</text>
    <text x="80" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">and lineage mapping</text>
  </g>
  
  <!-- Citation Guidance Card -->
  <g transform="translate(420, 320)">
    <rect x="0" y="0" width="160" height="180" rx="16" fill="url(#cardGrad)" 
          stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="160" height="4" rx="16" fill="url(#primaryGrad)"/>
    
    <!-- Enhanced citation icon -->
    <g transform="translate(80, 50)">
      <!-- Quote marks -->
      <path d="M -25,-18 Q -25,-30 -12,-30 L -12,-24 Q -18,-24 -18,-18 Z" fill="#8B5CF6"/>
      <path d="M -8,-18 Q -8,-30 5,-30 L 5,-24 Q -1,-24 -1,-18 Z" fill="#8B5CF6"/>
      
      <!-- Document -->
      <rect x="-22" y="-5" width="44" height="35" rx="4" fill="#F8FAFC" stroke="#8B5CF6" stroke-width="2.5"/>
      <line x1="-15" y1="3" x2="15" y2="3" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
      <line x1="-15" y1="10" x2="15" y2="10" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
      <line x1="-15" y1="17" x2="8" y2="17" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Help indicator -->
      <circle cx="25" cy="22" r="8" fill="url(#accentGrad1)"/>
      <text x="25" y="27" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" 
            font-weight="bold" fill="white" text-anchor="middle">?</text>
    </g>
    
    <text x="80" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" 
          font-weight="700" fill="#1E293B" text-anchor="middle">Citation</text>
    <text x="80" y="125" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">Automated formatting</text>
    <text x="80" y="142" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">with intelligent style</text>
    <text x="80" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">guide recommendations</text>
  </g>
  
  <!-- Policy Templates Card -->
  <g transform="translate(600, 320)">
    <rect x="0" y="0" width="160" height="180" rx="16" fill="url(#cardGrad)" 
          stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="160" height="4" rx="16" fill="url(#primaryGrad)"/>
    
    <!-- Enhanced document stack -->
    <g transform="translate(80, 50)">
      <rect x="-22" y="-25" width="40" height="48" rx="4" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
      <rect x="-19" y="-22" width="40" height="48" rx="4" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
      <rect x="-16" y="-19" width="40" height="48" rx="4" fill="#F8FAFC" stroke="#3B82F6" stroke-width="2.5"/>
      
      <!-- Document content -->
      <line x1="-10" y1="-10" x2="18" y2="-10" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="-2" x2="18" y2="-2" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="6" x2="18" y2="6" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="14" x2="12" y2="14" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
      
      <!-- Template indicator -->
      <circle cx="28" cy="-15" r="6" fill="url(#accentGrad2)"/>
      <text x="28" y="-11" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" 
            font-weight="bold" fill="white" text-anchor="middle">T</text>
    </g>
    
    <text x="80" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" 
          font-weight="700" fill="#1E293B" text-anchor="middle">Policy</text>
    <text x="80" y="125" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">Enterprise-ready templates</text>
    <text x="80" y="142" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">with comprehensive</text>
    <text x="80" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" 
          fill="#64748B" text-anchor="middle">compliance guidelines</text>
  </g>
  
  <!-- Enhanced Status Bar -->
  <g transform="translate(150, 530)">
    <rect x="0" y="0" width="500" height="55" rx="28" fill="url(#cardGrad)" 
          stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
    
    <!-- Status indicators with enhanced design -->
    <g transform="translate(80, 27.5)">
      <circle cx="0" cy="0" r="12" fill="url(#accentGrad1)"/>
      <path d="M -4,0 L -1,3 L 5,-4" stroke="white" stroke-width="2.5" 
            stroke-linecap="round" fill="none"/>
      <text x="25" y="5" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" 
            fill="#1E293B" font-weight="600">Standards Met</text>
    </g>
    
    <g transform="translate(220, 27.5)">
      <circle cx="0" cy="0" r="12" fill="url(#accentGrad1)"/>
      <path d="M -4,0 L -1,3 L 5,-4" stroke="white" stroke-width="2.5" 
            stroke-linecap="round" fill="none"/>
      <text x="25" y="5" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" 
            fill="#1E293B" font-weight="600">Verified</text>
    </g>
    
    <g transform="translate(340, 27.5)">
      <circle cx="0" cy="0" r="12" fill="url(#accentGrad1)"/>
      <path d="M -4,0 L -1,3 L 5,-4" stroke="white" stroke-width="2.5" 
            stroke-linecap="round" fill="none"/>
      <text x="25" y="5" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" 
            fill="#1E293B" font-weight="600">Compliant</text>
    </g>
  </g>
  
  <!-- Enhanced connecting lines with subtle animation-ready styling -->
  <g opacity="0.3">
    <path d="M 350,240 Q 250,280 140,320" stroke="url(#primaryGrad)" stroke-width="2" 
          stroke-dasharray="8,4" fill="none"/>
    <path d="M 400,250 Q 360,285 320,320" stroke="url(#primaryGrad)" stroke-width="2" 
          stroke-dasharray="8,4" fill="none"/>
    <path d="M 450,240 Q 480,280 500,320" stroke="url(#primaryGrad)" stroke-width="2" 
          stroke-dasharray="8,4" fill="none"/>
    <path d="M 460,230 Q 550,275 680,320" stroke="url(#primaryGrad)" stroke-width="2" 
          stroke-dasharray="8,4" fill="none"/>
  </g>
</svg>
