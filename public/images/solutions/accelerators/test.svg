<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->
  <rect width="800" height="600" fill="none"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#4C1D95">
    Automated Team Formation & Skill Matching
  </text>
  
  <!-- Student Profiles Pool (Left Side) -->
  <g id="studentPool">
    <rect x="20" y="60" width="200" height="480" rx="15" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="2"/>
    <text x="120" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4C1D95">
      Student Profiles
    </text>
    
    <!-- Student Profile 1 -->
    <g id="student1" transform="translate(40, 110)">
      <circle cx="20" cy="20" r="18" fill="#8B5CF6"/>
      <text x="20" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">A</text>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="11" fill="#4C1D95">Alex Chen</text>
      <text x="50" y="28" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Programming, Math</text>
      <!-- Skill indicators -->
      <circle cx="140" cy="10" r="4" fill="#10B981"/>
      <circle cx="155" cy="10" r="4" fill="#F59E0B"/>
      <circle cx="170" cy="10" r="4" fill="#EF4444"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Interest: AI/ML</text>
    </g>
    
    <!-- Student Profile 2 -->
    <g id="student2" transform="translate(40, 170)">
      <circle cx="20" cy="20" r="18" fill="#6366F1"/>
      <text x="20" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">B</text>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="11" fill="#4C1D95">Sarah Kim</text>
      <text x="50" y="28" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Design, UX</text>
      <circle cx="140" cy="10" r="4" fill="#EF4444"/>
      <circle cx="155" cy="10" r="4" fill="#10B981"/>
      <circle cx="170" cy="10" r="4" fill="#F59E0B"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Interest: Design</text>
    </g>
    
    <!-- Student Profile 3 -->
    <g id="student3" transform="translate(40, 230)">
      <circle cx="20" cy="20" r="18" fill="#3B82F6"/>
      <text x="20" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">C</text>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="11" fill="#4C1D95">Mike Johnson</text>
      <text x="50" y="28" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Research, Analytics</text>
      <circle cx="140" cy="10" r="4" fill="#F59E0B"/>
      <circle cx="155" cy="10" r="4" fill="#EF4444"/>
      <circle cx="170" cy="10" r="4" fill="#10B981"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Interest: Data Science</text>
    </g>
    
    <!-- Student Profile 4 -->
    <g id="student4" transform="translate(40, 290)">
      <circle cx="20" cy="20" r="18" fill="#1E40AF"/>
      <text x="20" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">D</text>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="11" fill="#4C1D95">Emma Wilson</text>
      <text x="50" y="28" font-family="Arial, sans-serif" font-size="9" fill="#6366F1">Communication, PM</text>
      <circle cx="140" cy="10" r="4" fill="#10B981"/>
      <circle cx="155" cy="10" r="4" fill="#F59E0B"/>
      <circle cx="170" cy="10" r="4" fill="#10B981"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Interest: Leadership</text>
    </g>
    
    <!-- More students indicator -->
    <text x="120" y="370" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6B7280">+ 12 more students</text>
    
    <!-- Skill Legend -->
    <g transform="translate(40, 400)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4C1D95">Skills:</text>
      <circle cx="15" cy="30" r="4" fill="#10B981"/>
      <text x="25" y="34" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">High</text>
      <circle cx="65" cy="30" r="4" fill="#F59E0B"/>
      <text x="75" y="34" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Medium</text>
      <circle cx="125" cy="30" r="4" fill="#EF4444"/>
      <text x="135" y="34" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Low</text>
    </g>
  </g>
  
  <!-- Matching Algorithm (Center) -->
  <g id="algorithm">
    <rect x="280" y="150" width="240" height="300" rx="20" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <text x="400" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      Matching Algorithm
    </text>
    
    <!-- Algorithm steps -->
    <g transform="translate(300, 200)">
      <!-- Step 1: Skill Analysis -->
      <rect x="0" y="0" width="200" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
      <circle cx="15" cy="20" r="8" fill="#10B981"/>
      <text x="15" y="25" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">1</text>
      <text x="35" y="15" font-family="Arial, sans-serif" font-size="11" fill="white">Analyze Skills & Interests</text>
      <text x="35" y="28" font-family="Arial, sans-serif" font-size="9" fill="#E5E7EB">Map competencies</text>
      
      <!-- Arrow -->
      <path d="M 100 45 L 100 55" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <!-- Step 2: Compatibility -->
      <rect x="0" y="60" width="200" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
      <circle cx="15" cy="80" r="8" fill="#F59E0B"/>
      <text x="15" y="85" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">2</text>
      <text x="35" y="75" font-family="Arial, sans-serif" font-size="11" fill="white">Calculate Compatibility</text>
      <text x="35" y="88" font-family="Arial, sans-serif" font-size="9" fill="#E5E7EB">Match preferences</text>
      
      <!-- Arrow -->
      <path d="M 100 105 L 100 115" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <!-- Step 3: Balance -->
      <rect x="0" y="120" width="200" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
      <circle cx="15" cy="140" r="8" fill="#3B82F6"/>
      <text x="15" y="145" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">3</text>
      <text x="35" y="135" font-family="Arial, sans-serif" font-size="11" fill="white">Balance Teams</text>
      <text x="35" y="148" font-family="Arial, sans-serif" font-size="9" fill="#E5E7EB">Optimize diversity</text>
      
      <!-- Arrow -->
      <path d="M 100 165 L 100 175" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <!-- Step 4: Assign -->
      <rect x="0" y="180" width="200" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
      <circle cx="15" cy="200" r="8" fill="#8B5CF6"/>
      <text x="15" y="205" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">4</text>
      <text x="35" y="195" font-family="Arial, sans-serif" font-size="11" fill="white">Assign to Teams</text>
      <text x="35" y="208" font-family="Arial, sans-serif" font-size="9" fill="#E5E7EB">Final allocation</text>
    </g>
    
    <!-- Processing indicators -->
    <g transform="translate(320, 470)">
      <circle cx="0" cy="0" r="3" fill="white">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="15" cy="0" r="3" fill="white">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="0" r="3" fill="white">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
      </circle>
      <text x="50" y="5" font-family="Arial, sans-serif" font-size="10" fill="white">Processing...</text>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
    <marker id="connectionArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
  </defs>
  
  <!-- Connection lines from students to algorithm -->
  <path d="M 220 200 Q 250 180 280 200" stroke="#8B5CF6" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#connectionArrow)"/>
  <path d="M 220 260 Q 250 240 280 260" stroke="#6366F1" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#connectionArrow)"/>
  <path d="M 220 320 Q 250 300 280 320" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#connectionArrow)"/>
  
  <!-- Formed Teams (Right Side) -->
  <g id="formedTeams">
    <rect x="580" y="60" width="200" height="480" rx="15" fill="url(#lightPurple)" stroke="#6366F1" stroke-width="2"/>
    <text x="680" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4C1D95">
      Balanced Teams
    </text>
    
    <!-- Team 1 -->
    <g id="team1" transform="translate(600, 110)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="rgba(139, 92, 246, 0.1)" stroke="#8B5CF6" stroke-width="1"/>
      <text x="80" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4C1D95">Team Alpha</text>
      
      <!-- Team members -->
      <circle cx="20" cy="35" r="12" fill="#8B5CF6"/>
      <text x="20" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">A</text>
      
      <circle cx="50" cy="35" r="12" fill="#6366F1"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">B</text>
      
      <circle cx="80" cy="35" r="12" fill="#3B82F6"/>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">E</text>
      
      <circle cx="110" cy="35" r="12" fill="#1E40AF"/>
      <text x="110" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">F</text>
      
      <!-- Team composition -->
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Skills: Balanced</text>
      <text x="10" y="72" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Theme: AI Project</text>
    </g>
    
    <!-- Team 2 -->
    <g id="team2" transform="translate(600, 210)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="rgba(99, 102, 241, 0.1)" stroke="#6366F1" stroke-width="1"/>
      <text x="80" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4C1D95">Team Beta</text>
      
      <!-- Team members -->
      <circle cx="20" cy="35" r="12" fill="#3B82F6"/>
      <text x="20" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">C</text>
      
      <circle cx="50" cy="35" r="12" fill="#1E40AF"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">D</text>
      
      <circle cx="80" cy="35" r="12" fill="#8B5CF6"/>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">G</text>
      
      <circle cx="110" cy="35" r="12" fill="#6366F1"/>
      <text x="110" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">H</text>
      
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Skills: Balanced</text>
      <text x="10" y="72" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Theme: Data Analytics</text>
    </g>
    
    <!-- Team 3 -->
    <g id="team3" transform="translate(600, 310)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="rgba(59, 130, 246, 0.1)" stroke="#3B82F6" stroke-width="1"/>
      <text x="80" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4C1D95">Team Gamma</text>
      
      <!-- Team members -->
      <circle cx="20" cy="35" r="12" fill="#6366F1"/>
      <text x="20" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">I</text>
      
      <circle cx="50" cy="35" r="12" fill="#8B5CF6"/>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">J</text>
      
      <circle cx="80" cy="35" r="12" fill="#1E40AF"/>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">K</text>
      
      <circle cx="110" cy="35" r="12" fill="#3B82F6"/>
      <text x="110" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">L</text>
      
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Skills: Balanced</text>
      <text x="10" y="72" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Theme: UX Design</text>
    </g>
    
    <!-- Team formation success indicator -->
    <g transform="translate(600, 420)">
      <circle cx="20" cy="20" r="15" fill="#10B981"/>
      <path d="M 12 20 L 18 26 L 28 14" stroke="white" stroke-width="3" fill="none"/>
      <text x="45" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10B981">Teams Formed</text>
      <text x="45" y="32" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">100% skill coverage</text>
    </g>
  </g>
  
  <!-- Connection lines from algorithm to teams -->
  <path d="M 520 200 Q 550 180 580 200" stroke="#6366F1" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#connectionArrow)"/>
  <path d="M 520 260 Q 550 240 580 260" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#connectionArrow)"/>
  <path d="M 520 320 Q 550 300 580 320" stroke="#1E40AF" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#connectionArrow)"/>
  
  <!-- Performance metrics -->
  <g transform="translate(300, 480)">
    <rect x="0" y="0" width="200" height="60" rx="10" fill="rgba(255,255,255,0.9)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="100" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4C1D95">
      Matching Success
    </text>
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">Skill Balance: 95%</text>
    <text x="20" y="48" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">Interest Match: 92%</text>
    <text x="120" y="35" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">Diversity: 88%</text>
    <text x="120" y="48" font-family="Arial, sans-serif" font-size="10" fill="#6366F1">Satisfaction: 94%</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">
    Intelligent Team Formation System - Optimizing Collaboration Through Data-Driven Matching
  </text>
</svg>
