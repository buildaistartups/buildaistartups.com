<svg width="1200" height="128" viewBox="0 0 1200 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and patterns -->
  <defs>
    <!-- Purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Light purple for milestones -->
    <linearGradient id="lightPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1" />
    </marker>
    
    <!-- Checkpoint marker -->
    <marker id="checkpoint" markerWidth="8" markerHeight="8" 
            refX="4" refY="4" orient="auto">
      <circle cx="4" cy="4" r="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
    </marker>
  </defs>
  
  <!-- Background (transparent as requested) -->
  
  <!-- Main process flow line -->
  <line x1="50" y1="64" x2="1150" y2="64" stroke="#6366F1" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Step 1: Intake -->
  <g id="step1">
    <rect x="20" y="40" width="80" height="48" rx="8" fill="url(#purpleGrad)" stroke="#7C3AED" stroke-width="2"/>
    <text x="60" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">INTAKE</text>
    <text x="60" y="72" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Onboarding</text>
    <text x="60" y="82" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Assessment</text>
    
    <!-- Milestone indicator -->
    <circle cx="60" cy="25" r="6" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="60" y="29" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">M1</text>
    
    <!-- Deliverable -->
    <rect x="40" y="95" width="40" height="12" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
    <text x="60" y="103" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="7">Profile Setup</text>
  </g>
  
  <!-- Mentor checkpoint 1 -->
  <circle cx="140" cy="64" r="4" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="140" y="52" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7" font-weight="bold">Mentor</text>
  <text x="140" y="78" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7">Check</text>
  
  <!-- Step 2: Spec Studio -->
  <g id="step2">
    <rect x="180" y="40" width="80" height="48" rx="8" fill="url(#blueGrad)" stroke="#2563EB" stroke-width="2"/>
    <text x="220" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SPEC</text>
    <text x="220" y="68" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">STUDIO</text>
    <text x="220" y="82" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Requirements</text>
    
    <!-- Milestone indicator -->
    <circle cx="220" cy="25" r="6" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="220" y="29" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">M2</text>
    
    <!-- Deliverable -->
    <rect x="190" y="95" width="60" height="12" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
    <text x="220" y="103" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="7">Project Spec</text>
  </g>
  
  <!-- Mentor checkpoint 2 -->
  <circle cx="300" cy="64" r="4" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="300" y="52" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7" font-weight="bold">Mentor</text>
  <text x="300" y="78" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7">Check</text>
  
  <!-- Step 3: Repo Forge -->
  <g id="step3">
    <rect x="340" y="40" width="80" height="48" rx="8" fill="url(#purpleGrad)" stroke="#7C3AED" stroke-width="2"/>
    <text x="380" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">REPO</text>
    <text x="380" y="68" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">FORGE</text>
    <text x="380" y="82" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Development</text>
    
    <!-- Milestone indicator -->
    <circle cx="380" cy="25" r="6" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="380" y="29" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">M3</text>
    
    <!-- Deliverable -->
    <rect x="350" y="95" width="60" height="12" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
    <text x="380" y="103" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="7">MVP Code</text>
  </g>
  
  <!-- Mentor checkpoint 3 -->
  <circle cx="460" cy="64" r="4" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="460" y="52" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7" font-weight="bold">Mentor</text>
  <text x="460" y="78" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7">Check</text>
  
  <!-- Step 4: UI & Copy -->
  <g id="step4">
    <rect x="500" y="40" width="80" height="48" rx="8" fill="url(#blueGrad)" stroke="#2563EB" stroke-width="2"/>
    <text x="540" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">UI & COPY</text>
    <text x="540" y="72" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Design &</text>
    <text x="540" y="82" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Content</text>
    
    <!-- Milestone indicator -->
    <circle cx="540" cy="25" r="6" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="540" y="29" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">M4</text>
    
    <!-- Deliverable -->
    <rect x="510" y="95" width="60" height="12" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
    <text x="540" y="103" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="7">UI Complete</text>
  </g>
  
  <!-- Mentor checkpoint 4 -->
  <circle cx="620" cy="64" r="4" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="620" y="52" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7" font-weight="bold">Mentor</text>
  <text x="620" y="78" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7">Check</text>
  
  <!-- Step 5: Ship & Learn -->
  <g id="step5">
    <rect x="660" y="40" width="80" height="48" rx="8" fill="url(#purpleGrad)" stroke="#7C3AED" stroke-width="2"/>
    <text x="700" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SHIP &</text>
    <text x="700" y="68" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">LEARN</text>
    <text x="700" y="82" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Deploy & Test</text>
    
    <!-- Milestone indicator -->
    <circle cx="700" cy="25" r="6" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="700" y="29" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">M5</text>
    
    <!-- Deliverable -->
    <rect x="670" y="95" width="60" height="12" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
    <text x="700" y="103" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="7">Live Product</text>
  </g>
  
  <!-- Mentor checkpoint 5 -->
  <circle cx="780" cy="64" r="4" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="780" y="52" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7" font-weight="bold">Mentor</text>
  <text x="780" y="78" text-anchor="middle" fill="#92400E" font-family="Arial, sans-serif" font-size="7">Check</text>
  
  <!-- Step 6: Demo Day -->
  <g id="step6">
    <rect x="820" y="40" width="80" height="48" rx="8" fill="url(#blueGrad)" stroke="#2563EB" stroke-width="2"/>
    <text x="860" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">DEMO</text>
    <text x="860" y="68" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">DAY</text>
    <text x="860" y="82" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Presentation</text>
    
    <!-- Milestone indicator -->
    <circle cx="860" cy="25" r="6" fill="url(#lightPurple)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="860" y="29" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">M6</text>
    
    <!-- Deliverable -->
    <rect x="830" y="95" width="60" height="12" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
    <text x="860" y="103" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="7">Final Demo</text>
  </g>
  
  <!-- Final Assessment -->
  <g id="assessment">
    <rect x="940" y="45" width="70" height="38" rx="6" fill="#10B981" stroke="#059669" stroke-width="2"/>
    <text x="975" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">GRADUATION</text>
    <text x="975" y="72" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">Assessment</text>
    
    <!-- Star for completion -->
    <polygon points="975,15 978,21 985,21 980,26 982,33 975,29 968,33 970,26 965,21 972,21" 
             fill="#FCD34D" stroke="#F59E0B" stroke-width="1"/>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <text x="1050" y="20" fill="#374151" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Legend:</text>
    <circle cx="1060" cy="30" r="3" fill="#F59E0B"/>
    <text x="1070" y="33" fill="#374151" font-family="Arial, sans-serif" font-size="7">Mentor Checkpoint</text>
    <circle cx="1060" cy="42" r="3" fill="url(#lightPurple)"/>
    <text x="1070" y="45" fill="#374151" font-family="Arial, sans-serif" font-size="7">Educational Milestone</text>
    <rect x="1057" y="50" width="6" height="6" fill="#F3F4F6" stroke="#9CA3AF"/>
    <text x="1070" y="56" fill="#374151" font-family="Arial, sans-serif" font-size="7">Deliverable</text>
  </g>
  
  <!-- Team progression indicators -->
  <g id="team-progression">
    <text x="60" y="15" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="7">Individual</text>
    <text x="300" y="15" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="7">Team Formation</text>
    <text x="540" y="15" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="7">Collaboration</text>
    <text x="780" y="15" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="7">Showcase Ready</text>
  </g>
</svg>
