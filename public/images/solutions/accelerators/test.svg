  <circle cx="430" cy="410" r="12" fill="#F3E8FF"/>
  <rect x="425" y="422" width="10" height="20" fill="#7C3AED" rx="2"/>
  <circle cx="660" cy="410" r="12" fill="#F3E8FF"/>
  <rect x="655" y="422" width="10" height="20" fill="#6B46C1" rx="2"/>
  
  <!-- Audience seating area -->
  <rect x="100" y="280" width="600" height="100" fill="#E0E7FF" opacity="0.3" rx="10"/>
  
  <!-- Audience members (simplified) -->
  <g id="audience">
    <!-- Row 1 -->
    <circle cx="130" cy="310" r="8" fill="#6366F1"/>
    <circle cx="160" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="190" cy="310" r="8" fill="#6366F1"/>
    <circle cx="220" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="250" cy="310" r="8" fill="#6366F1"/>
    <circle cx="280" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="310" cy="310" r="8" fill="#6366F1"/>
    <circle cx="340" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="370" cy="310" r="8" fill="#6366F1"/>
    <circle cx="400" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="430" cy="310" r="8" fill="#6366F1"/>
    <circle cx="460" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="490" cy="310" r="8" fill="#6366F1"/>
    <circle cx="520" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="550" cy="310" r="8" fill="#6366F1"/>
    <circle cx="580" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="610" cy="310" r="8" fill="#6366F1"/>
    <circle cx="640" cy="310" r="8" fill="#4F46E5"/>
    <circle cx="670" cy="310" r="8" fill="#6366F1"/>
    
