<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="url(#purpleGradient)" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Academic Integrity & Compliance
  </text>
  
  <!-- Central Shield Badge -->
  <g transform="translate(350, 80)">
    <!-- Shield background -->
    <path d="M50 0 L80 20 L80 60 C80 80 50 100 50 100 C50 100 20 80 20 60 L20 20 Z" 
          fill="url(#purpleGradient)" filter="url(#dropShadow)"/>
    <!-- Shield inner design -->
    <circle cx="50" cy="45" r="15" fill="white" opacity="0.9"/>
    <path d="M45 45 L48 48 L55 40" stroke="#6366F1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Badge text -->
    <text x="50" y="120" text-anchor="middle" fill="#6366F1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      INTEGRITY
    </text>
    <text x="50" y="135" text-anchor="middle" fill="#6366F1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      VERIFIED
    </text>
  </g>
  
  <!-- Audit Logs Section (Top Left) -->
  <g transform="translate(50, 120)">
    <!-- Background card -->
    <rect x="0" y="0" width="160" height="120" rx="10" fill="url(#lightPurple)" filter="url(#dropShadow)"/>
    <!-- Icon -->
    <rect x="20" y="20" width="40" height="30" rx="3" fill="url(#blueGradient)"/>
    <line x1="25" y1="30" x2="55" y2="30" stroke="white" stroke-width="2"/>
    <line x1="25" y1="37" x2="50" y2="37" stroke="white" stroke-width="2"/>
    <line x1="25" y1="44" x2="45" y2="44" stroke="white" stroke-width="2"/>
    <!-- Clock icon -->
    <circle cx="130" cy="35" r="12" fill="#6366F1"/>
    <line x1="130" y1="35" x2="130" y2="28" stroke="white" stroke-width="2"/>
    <line x1="130" y1="35" x2="135" y2="40" stroke="white" stroke-width="2"/>
    <!-- Title -->
    <text x="80" y="25" text-anchor="middle" fill="#4C1D95" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Audit Logs
    </text>
    <!-- Description -->
    <text x="80" y="70" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      Complete activity
    </text>
    <text x="80" y="85" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      tracking &amp; timestamping
    </text>
    <!-- Checkmark -->
    <circle cx="140" cy="100" r="8" fill="#10B981"/>
    <path d="M137 100 L139 102 L143 97" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Provenance Tracking Section (Top Right) -->
  <g transform="translate(590, 120)">
    <!-- Background card -->
    <rect x="0" y="0" width="160" height="120" rx="10" fill="url(#lightPurple)" filter="url(#dropShadow)"/>
    <!-- Chain icon -->
    <g transform="translate(20, 20)">
      <circle cx="10" cy="15" r="8" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
      <circle cx="30" cy="15" r="8" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
      <circle cx="20" cy="35" r="8" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
      <line x1="17" y1="20" x2="23" y2="30" stroke="url(#blueGradient)" stroke-width="3"/>
    </g>
    <!-- DNA/tracking icon -->
    <g transform="translate(110, 20)">
      <path d="M5 10 Q15 5 25 10 Q15 15 5 20 Q15 25 25 30" 
            stroke="#6366F1" stroke-width="2" fill="none"/>
      <circle cx="5" cy="15" r="2" fill="#8B5CF6"/>
      <circle cx="25" cy="25" r="2" fill="#8B5CF6"/>
    </g>
    <!-- Title -->
    <text x="80" y="25" text-anchor="middle" fill="#4C1D95" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Provenance
    </text>
    <!-- Description -->
    <text x="80" y="70" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      Source tracking &amp;
    </text>
    <text x="80" y="85" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      content lineage
    </text>
    <!-- Checkmark -->
    <circle cx="140" cy="100" r="8" fill="#10B981"/>
    <path d="M137 100 L139 102 L143 97" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Citation Guidance Section (Bottom Left) -->
  <g transform="translate(50, 360)">
    <!-- Background card -->
    <rect x="0" y="0" width="160" height="120" rx="10" fill="url(#lightPurple)" filter="url(#dropShadow)"/>
    <!-- Quote icon -->
    <g transform="translate(20, 20)">
      <path d="M5 15 Q5 5 15 5 Q25 5 25 15 Q25 25 15 25 L10 30 L5 25 Q5 25 5 15" 
            fill="url(#blueGradient)"/>
      <path d="M35 15 Q35 5 45 5 Q55 5 55 15 Q55 25 45 25 L40 30 L35 25 Q35 25 35 15" 
            fill="url(#blueGradient)"/>
    </g>
    <!-- Academic cap -->
    <g transform="translate(100, 15)">
      <path d="M10 20 L30 15 L50 20 L30 25 Z" fill="#6366F1"/>
      <rect x="28" y="20" width="4" height="15" fill="#6366F1"/>
      <circle cx="32" cy="37" r="3" fill="#6366F1"/>
    </g>
    <!-- Title -->
    <text x="80" y="25" text-anchor="middle" fill="#4C1D95" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Citation Guide
    </text>
    <!-- Description -->
    <text x="80" y="70" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      Automated citation
    </text>
    <text x="80" y="85" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      formatting &amp; validation
    </text>
    <!-- Checkmark -->
    <circle cx="140" cy="100" r="8" fill="#10B981"/>
    <path d="M137 100 L139 102 L143 97" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Policy Templates Section (Bottom Right) -->
  <g transform="translate(590, 360)">
    <!-- Background card -->
    <rect x="0" y="0" width="160" height="120" rx="10" fill="url(#lightPurple)" filter="url(#dropShadow)"/>
    <!-- Document stack -->
    <g transform="translate(20, 15)">
      <rect x="5" y="10" width="30" height="35" rx="2" fill="white" stroke="url(#blueGradient)" stroke-width="2"/>
      <rect x="10" y="5" width="30" height="35" rx="2" fill="white" stroke="url(#blueGradient)" stroke-width="2"/>
      <rect x="15" y="0" width="30" height="35" rx="2" fill="url(#blueGradient)"/>
      <!-- Document lines -->
      <line x1="20" y1="8" x2="40" y2="8" stroke="white" stroke-width="1"/>
      <line x1="20" y1="13" x2="38" y2="13" stroke="white" stroke-width="1"/>
      <line x1="20" y1="18" x2="35" y2="18" stroke="white" stroke-width="1"/>
    </g>
    <!-- Gavel/policy icon -->
    <g transform="translate(110, 20)">
      <rect x="5" y="15" width="20" height="6" rx="3" fill="#6366F1"/>
      <circle cx="8" cy="18" r="8" fill="#8B5CF6"/>
      <rect x="23" y="12" width="4" height="20" fill="#6366F1"/>
    </g>
    <!-- Title -->
    <text x="80" y="25" text-anchor="middle" fill="#4C1D95" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Policy Templates
    </text>
    <!-- Description -->
    <text x="80" y="70" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      Standardized compliance
    </text>
    <text x="80" y="85" text-anchor="middle" fill="#5B21B6" font-family="Arial, sans-serif" font-size="12">
      frameworks &amp; guidelines
    </text>
    <!-- Checkmark -->
    <circle cx="140" cy="100" r="8" fill="#10B981"/>
    <path d="M137 100 L139 102 L143 97" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Central Connecting Lines -->
  <g stroke="#A78BFA" stroke-width="2" fill="none" opacity="0.6">
    <!-- From center to each corner -->
    <path d="M400 180 Q300 250 130 240"/>
    <path d="M400 180 Q500 250 670 240"/>
    <path d="M400 180 Q300 350 130 420"/>
    <path d="M400 180 Q500 350 670 420"/>
  </g>
  
  <!-- Bottom compliance badges -->
  <g transform="translate(250, 520)">
    <!-- Compliance badge 1 -->
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#blueGradient)" filter="url(#dropShadow)"/>
    <text x="40" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
      ISO 27001
    </text>
    <text x="40" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
      COMPLIANT
    </text>
    
    <!-- Compliance badge 2 -->
    <rect x="100" y="0" width="80" height="40" rx="20" fill="url(#purpleGradient)" filter="url(#dropShadow)"/>
    <text x="140" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
      FERPA
    </text>
    <text x="140" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
      CERTIFIED
    </text>
    
    <!-- Compliance badge 3 -->
    <rect x="200" y="0" width="80" height="40" rx="20" fill="url(#blueGradient)" filter="url(#dropShadow)"/>
    <text x="240" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
      GDPR
    </text>
    <text x="240" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">
      READY
    </text>
  </g>
  
  <!-- Documentation symbols in corners -->
  <!-- Top left corner -->
  <g transform="translate(20, 20)">
    <circle cx="0" cy="0" r="8" fill="#C4B5FD" opacity="0.7"/>
    <text x="0" y="3" text-anchor="middle" fill="#6366F1" font-family="Arial, sans-serif" font-size="10">📋</text>
  </g>
  
  <!-- Top right corner -->
  <g transform="translate(780, 20)">
    <circle cx="0" cy="0" r="8" fill="#C4B5FD" opacity="0.7"/>
    <text x="0" y="3" text-anchor="middle" fill="#6366F1" font-family="Arial, sans-serif" font-size="10">🔒</text>
  </g>
  
  <!-- Bottom left corner -->
  <g transform="translate(20, 580)">
    <circle cx="0" cy="0" r="8" fill="#C4B5FD" opacity="0.7"/>
    <text x="0" y="3" text-anchor="middle" fill="#6366F1" font-family="Arial, sans-serif" font-size="10">📚</text>
  </g>
  
  <!-- Bottom right corner -->
  <g transform="translate(780, 580)">
    <circle cx="0" cy="0" r="8" fill="#C4B5FD" opacity="0.7"/>
    <text x="0" y="3" text-anchor="middle" fill="#6366F1" font-family="Arial, sans-serif" font-size="10">✅</text>
  </g>
</svg>
