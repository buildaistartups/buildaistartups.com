<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (transparent) -->
  <rect width="800" height="600" fill="transparent"/>
  
  <!-- Main presentation stage -->
  <rect x="50" y="400" width="700" height="150" fill="#6B46C1" opacity="0.1" stroke="#6B46C1" stroke-width="2"/>
  
  <!-- Stage platforms -->
  <rect x="80" y="420" width="180" height="100" fill="#8B5CF6" rx="8"/>
  <rect x="310" y="420" width="180" height="100" fill="#7C3AED" rx="8"/>
  <rect x="540" y="420" width="180" height="100" fill="#6B46C1" rx="8"/>
  
  <!-- Demo screens on stages -->
  <rect x="100" y="440" width="140" height="80" fill="#1E293B" rx="4"/>
  <rect x="330" y="440" width="140" height="80" fill="#1E293B" rx="4"/>
  <rect x="560" y="440" width="140" height="80" fill="#1E293B" rx="4"/>
  
  <!-- Screen content/demos -->
  <rect x="110" y="450" width="120" height="60" fill="#3B82F6" opacity="0.3"/>
  <rect x="340" y="450" width="120" height="60" fill="#2563EB" opacity="0.3"/>
  <rect x="570" y="450" width="120" height="60" fill="#1D4ED8" opacity="0.3"/>
  
  <!-- Demo screen details -->
  <circle cx="130" cy="470" r="8" fill="#60A5FA"/>
  <rect x="145" y="465" width="30" height="10" fill="#93C5FD" rx="2"/>
  <rect x="145" y="480" width="50" height="8" fill="#DBEAFE" rx="2"/>
  <rect x="145" y="492" width="40" height="6" fill="#BFDBFE" rx="1"/>
  
  <rect x="350" y="460" width="40" height="25" fill="#3B82F6" rx="3"/>
  <rect x="395" y="460" width="40" height="25" fill="#2563EB" rx="3"/>
  <rect x="350" y="490" width="85" height="8" fill="#60A5FA" rx="2"/>
  
  <polygon points="580,465 595,455 610,465 595,485" fill="#1D4ED8"/>
  <rect x="580" y="490" width="60" height="6" fill="#3B82F6" rx="1"/>
  <rect x="580" y="500" width="45" height="6" fill="#60A5FA" rx="1"/>
  
  <!-- Presenters -->
  <circle cx="200" cy="410" r="12" fill="#F3E8FF"/>
