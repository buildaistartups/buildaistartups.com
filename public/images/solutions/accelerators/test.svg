    <circle cx="145" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="175" cy="340" r="8" fill="#6366F1"/>
    <circle cx="205" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="235" cy="340" r="8" fill="#6366F1"/>
    <circle cx="265" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="295" cy="340" r="8" fill="#6366F1"/>
    <circle cx="325" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="355" cy="340" r="8" fill="#6366F1"/>
    <circle cx="385" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="415" cy="340" r="8" fill="#6366F1"/>
    <circle cx="445" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="475" cy="340" r="8" fill="#6366F1"/>
    <circle cx="505" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="535" cy="340" r="8" fill="#6366F1"/>
    <circle cx="565" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="595" cy="340" r="8" fill="#6366F1"/>
    <circle cx="625" cy="340" r="8" fill="#4F46E5"/>
    <circle cx="655" cy="340" r="8" fill="#6366F1"/>
