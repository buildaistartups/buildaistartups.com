  <!-- Evaluation panel area -->
  <rect x="50" y="50" width="700" height="80" fill="#7C3AED" opacity="0.1" stroke="#7C3AED" stroke-width="2" rx="10"/>
  
  <!-- Evaluation panel table -->
  <rect x="200" y="70" width="400" height="40" fill="#6B46C1" opacity="0.2" rx="5"/>
  
  <!-- Judges/Evaluators -->
  <circle cx="250" cy="90" r="15" fill="#8B5CF6"/>
  <rect x="240" y="105" width="20" height="15" fill="#7C3AED" rx="3"/>
  
  <circle cx="350" cy="90" r="15" fill="#8B5CF6"/>
  <rect x="340" y="105" width="20" height="15" fill="#7C3AED" rx="3"/>
  
  <circle cx="450" cy="90" r="15" fill="#8B5CF6"/>
  <rect x="440" y="105" width="20" height="15" fill="#7C3AED" rx="3"/>
  
  <circle cx="550" cy="90" r="15" fill="#8B5CF6"/>
  <rect x="540" y="105" width="20" height="15" fill="#7C3AED" rx="3"/>
  
  <!-- Evaluation clipboards/tablets -->
  <rect x="230" y="75" width="15" height="20" fill="#1E293B" rx="2"/>
  <rect x="330" y="75" width="15" height="20" fill="#1E293B" rx="2"/>
  <rect x="430" y="75" width="15" height="20" fill="#1E293B" rx="2"/>
  <rect x="530" y="75" width="15" height="20" fill="#1E293B" rx="2"/>
  
  <!-- Evaluation screens content -->
  <rect x="232" y="77" width="11" height="16" fill="#3B82F6" opacity="0.5"/>
  <rect x="332" y="77" width="11" height="16" fill="#2563EB" opacity="0.5"/>
  <rect x="432" y="77" width="11" height="16" fill="#1D4ED8" opacity="0.5"/>
  <rect x="532" y="77" width="11" height="16" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Stage labels -->
  <text x="170" y="540" text-anchor="middle" fill="#6B46C1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Team A</text>
  <text x="400" y="540" text-anchor="middle" fill="#7C3AED" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Team B</text>
  <text x="630" y="540" text-anchor="middle" fill="#6B46C1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Team C</text>
  
  <!-- Main title -->
  <text x="400" y="30" text-anchor="middle" fill="#4C1D95" font-family="Arial, sans-serif" font-size="24" font-weight="bold">DEMO DAY PRESENTATIONS</text>
  
  <!-- Evaluation panel label -->
  <text x="100" y="45" fill="#6B46C1" font-family="Arial, sans-serif" font-size="12" font-weight="bold">EVALUATION PANEL</text>
  
  <!-- Audience label -->
  <text x="100" y="275" fill="#4F46E5" font-family="Arial, sans-serif" font-size="12" font-weight="bold">AUDIENCE</text>
  
  <!-- Presentation stages label -->
  <text x="100" y="395" fill="#7C3AED" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LIVE DEMO STAGES</text>
  
  <!-- Connection lines showing evaluation flow -->
  <line x1="250" y1="120" x2="170" y2="400" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="350" y1="120" x2="400" y2="400" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="450" y1="120" x2="630" y2="400" stroke="#6B46C1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Spotlight effects -->
  <ellipse cx="170" cy="480" rx="90" ry="20" fill="#8B5CF6" opacity="0.1"/>
  <ellipse cx="400" cy="480" rx="90" ry="20" fill="#7C3AED" opacity="0.1"/>
  <ellipse cx="630" cy="480" rx="90" ry="20" fill="#6B46C1" opacity="0.1"/>
  
  <!-- Demo status indicators -->
  <circle cx="240" cy="450" r="6" fill="#10B981"/>
  <text x="250" y="455" fill="#059669" font-family="Arial, sans-serif" font-size="10">LIVE</text>
  
  <circle cx="470" cy="450" r="6" fill="#10B981"/>
  <text x="480" y="455" fill="#059669" font-family="Arial, sans-serif" font-size="10">LIVE</text>
  
  <circle cx="700" cy="450" r="6" fill="#10B981"/>
  <text x="710" y="455" fill="#059669" font-family="Arial, sans-serif" font-size="10">LIVE</text>
</svg>
