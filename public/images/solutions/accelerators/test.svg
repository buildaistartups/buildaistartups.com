<svg width="1000" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (transparent) -->
  <rect width="1000" height="128" fill="transparent"/>
  
  <!-- Main timeline line -->
  <line x1="50" y1="64" x2="950" y2="64" stroke="#6B46C1" stroke-width="3"/>
  
  <!-- Week markers -->
  <circle cx="50" cy="64" r="6" fill="#8B5CF6"/>
  <circle cx="300" cy="64" r="6" fill="#8B5CF6"/>
  <circle cx="650" cy="64" r="6" fill="#3B82F6"/>
  <circle cx="950" cy="64" r="6" fill="#1E40AF"/>
  
  <!-- Week 1-2 Section Background -->
  <rect x="40" y="20" width="270" height="88" fill="#F3F4F6" stroke="#8B5CF6" stroke-width="2" rx="8" opacity="0.1"/>
  
  <!-- Week 3-4 Section Background -->
  <rect x="640" y="20" width="320" height="88" fill="#F3F4F6" stroke="#3B82F6" stroke-width="2" rx="8" opacity="0.1"/>
  
  <!-- Week Labels -->
  <text x="50" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6B46C1" text-anchor="middle">Week 1</text>
  <text x="300" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6B46C1" text-anchor="middle">Week 2</text>
  <text x="650" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3B82F6" text-anchor="middle">Week 3</text>
  <text x="950" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">Week 4</text>
  
  <!-- Phase Labels -->
  <text x="175" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">INTENT TO REPO</text>
  <text x="800" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3B82F6" text-anchor="middle">SHIP &amp; LEARN</text>
  
  <!-- Week 1 Details -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="9" fill="#374151" text-anchor="middle">Project Planning</text>
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Requirements Analysis</text>
  <text x="50" y="102" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Team Formation</text>
  
  <!-- Week 2 Details -->
  <text x="300" y="80" font-family="Arial, sans-serif" font-size="9" fill="#374151" text-anchor="middle">Repository Setup</text>
  <text x="300" y="92" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Git Initialization</text>
  <text x="300" y="102" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Architecture Design</text>
  
  <!-- Week 3 Details -->
  <text x="650" y="80" font-family="Arial, sans-serif" font-size="9" fill="#374151" text-anchor="middle">Development &amp; Testing</text>
  <text x="650" y="92" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Feature Implementation</text>
  <text x="650" y="102" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Unit Testing</text>
  
  <!-- Week 4 Details -->
  <text x="950" y="80" font-family="Arial, sans-serif" font-size="9" fill="#374151" text-anchor="middle">Deployment &amp; Review</text>
  <text x="950" y="92" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Final Presentation</text>
  <text x="950" y="102" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">• Peer Assessment</text>
  
  <!-- Milestone indicators -->
  <polygon points="125,50 135,60 125,70 115,60" fill="#8B5CF6"/>
  <text x="125" y="45" font-family="Arial, sans-serif" font-size="7" fill="#8B5CF6" text-anchor="middle">Milestone 1</text>
  
  <polygon points="475,50 485,60 475,70 465,60" fill="#6366F1"/>
  <text x="475" y="45" font-family="Arial, sans-serif" font-size="7" fill="#6366F1" text-anchor="middle">Milestone 2</text>
  
  <polygon points="725,50 735,60 725,70 715,60" fill="#3B82F6"/>
  <text x="725" y="45" font-family="Arial, sans-serif" font-size="7" fill="#3B82F6" text-anchor="middle">Milestone 3</text>
  
  <!-- Assignment indicators -->
  <rect x="200" y="52" width="16" height="16" fill="#A855F7" rx="2"/>
  <text x="208" y="61" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">A1</text>
  
  <rect x="550" y="52" width="16" height="16" fill="#6366F1" rx="2"/>
  <text x="558" y="61" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">A2</text>
  
  <rect x="850" y="52" width="16" height="16" fill="#2563EB" rx="2"/>
  <text x="858" y="61" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">A3</text>
  
  <!-- Learning objectives indicators -->
  <circle cx="75" cy="45" r="3" fill="#10B981"/>
  <circle cx="325" cy="45" r="3" fill="#10B981"/>
  <circle cx="675" cy="45" r="3" fill="#059669"/>
  <circle cx="925" cy="45" r="3" fill="#047857"/>
  
  <!-- Progress connector lines -->
  <line x1="50" y1="64" x2="300" y2="64" stroke="#8B5CF6" stroke-width="4" opacity="0.6"/>
  <line x1="300" y1="64" x2="650" y2="64" stroke="#6366F1" stroke-width="4" opacity="0.6"/>
  <line x1="650" y1="64" x2="950" y2="64" stroke="#3B82F6" stroke-width="4" opacity="0.6"/>
  
  <!-- Calendar elements -->
  <rect x="10" y="10" width="30" height="20" fill="#F9FAFB" stroke="#D1D5DB" rx="2"/>
  <text x="25" y="22" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">CAL</text>
  
  <!-- Legend -->
  <g transform="translate(400, 110)">
    <circle cx="0" cy="0" r="2" fill="#10B981"/>
    <text x="8" y="3" font-family="Arial, sans-serif" font-size="7" fill="#374151">Learning Objective</text>
    
    <rect x="80" y="-3" width="6" height="6" fill="#A855F7" rx="1"/>
    <text x="92" y="3" font-family="Arial, sans-serif" font-size="7" fill="#374151">Assignment</text>
    
    <polygon points="150,0 155,3 150,6 145,3" fill="#8B5CF6"/>
    <text x="162" y="3" font-family="Arial, sans-serif" font-size="7" fill="#374151">Milestone</text>
  </g>
</svg>
