<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">
  <!-- Definitions -->
  <defs>
    <linearGradient id="gradPB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <linearGradient id="gradIP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="url(#gradPB)" />
    </marker>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #0F172A; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #475569; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #0F172A; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #0F172A; }
      .dim { fill: #475569; font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 500; }
      .column { stroke: #6366F1; stroke-opacity: 0.25; stroke-width: 2; rx: 24; ry: 24; }
      .box { stroke: url(#gradPB); stroke-width: 2.5; rx: 18; ry: 18; filter: url(#softShadow); }
      .badge { fill: white; stroke: #6366F1; stroke-width: 2; rx: 14; ry: 14; }
      .line { stroke: url(#gradPB); stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .chip { fill: white; stroke: #0EA5E9; stroke-width: 2; rx: 12; ry: 12; }
    </style>
  </defs>

  <!-- Header -->
  <text x="700.0" y="56" text-anchor="middle" class="title">IP Ownership & Licensing Structure</text>
  <text x="700.0" y="82" text-anchor="middle" class="subtitle">Team ownership → Institutional options → Licensing arrangements</text>

  <!-- Column separators (visual separation, transparent background) -->
  <rect x="40" y="110" width="420" height="740" class="column" fill="none"/>
  <rect x="490" y="110" width="420" height="740" class="column" fill="none"/>
  <rect x="940" y="110" width="420" height="740" class="column" fill="none"/>

  <!-- Column titles -->
  <text x="250" y="145" text-anchor="middle" class="label" fill="#6366F1">Team Ownership</text>
  <text x="700" y="145" text-anchor="middle" class="label" fill="#6366F1">Institutional Options</text>
  <text x="1150" y="145" text-anchor="middle" class="label" fill="#6366F1">Licensing Arrangements</text>

  <!-- TEAM OWNERSHIP BOXES -->
  <!-- Team Entity -->
  <g id="team-entity">
    <rect x="80" y="180" width="340" height="120" class="box" fill="white"/>
    <text x="250" y="220" text-anchor="middle" class="label">Project Team</text>
    <text x="250" y="246" text-anchor="middle" class="dim">Inventors & Contributors</text>
    <!-- Legal clarity icon: gavel + document -->
    <g transform="translate(104,196)">
      <!-- document -->
      <rect x="0" y="0" width="36" height="46" rx="6" ry="6" stroke="#7C3AED" stroke-width="2" fill="none"/>
      <line x1="6" y1="12" x2="30" y2="12" stroke="#7C3AED" stroke-width="2"/>
      <line x1="6" y1="20" x2="30" y2="20" stroke="#7C3AED" stroke-width="2"/>
      <circle cx="12" cy="34" r="3" fill="#7C3AED"/>
      <line x1="20" y1="34" x2="30" y2="34" stroke="#7C3AED" stroke-width="2"/>
      <!-- gavel -->
      <g transform="translate(50,10)">
        <rect x="0" y="0" width="18" height="10" rx="2" ry="2" fill="#7C3AED" />
        <rect x="20" y="0" width="6" height="10" rx="1" ry="1" fill="#7C3AED" />
        <rect x="6" y="12" width="6" height="18" rx="2" ry="2" fill="#7C3AED" />
        <rect x="10" y="28" width="40" height="6" rx="3" ry="3" fill="#7C3AED" transform="rotate(-25 10 28)"/>
      </g>
    </g>
    <!-- Ownership badges -->
    <g transform="translate(110,290)">
      <rect x="0" y="0" width="90" height="28" class="badge"/>
      <text x="45" y="19" text-anchor="middle" class="small">Sole</text>
    </g>
    <g transform="translate(210,290)">
      <rect x="0" y="0" width="98" height="28" class="badge"/>
      <text x="49" y="19" text-anchor="middle" class="small">Joint</text>
    </g>
    <g transform="translate(318,290)">
      <rect x="0" y="0" width="126" height="28" class="badge"/>
      <text x="63" y="19" text-anchor="middle" class="small">Work-for-Hire</text>
    </g>
  </g>

  <!-- IP Asset -->
  <g id="ip-asset">
    <rect x="80" y="330" width="340" height="110" class="box" fill="white"/>
    <text x="250" y="368" text-anchor="middle" class="label">IP Asset</text>
    <text x="250" y="392" text-anchor="middle" class="dim">Patents · Copyright · Trade Secrets</text>
    <!-- Shield check (legal clarity symbol) -->
    <g transform="translate(110,342)">
      <path d="M30 0 L60 12 L60 34 C60 52 46 64 30 70 C14 64 0 52 0 34 L0 12 Z" fill="none" stroke="#0EA5E9" stroke-width="3"/>
      <path d="M14 36 L26 48 L46 26" stroke="#0EA5E9" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- CONTRIBUTION RECORDS -->
  <g id="records">
    <rect x="80" y="470" width="340" height="130" class="box" fill="white"/>
    <text x="250" y="506" text-anchor="middle" class="label">Contribution Records</text>
    <text x="250" y="530" text-anchor="middle" class="dim">Invention Disclosures · Assignment Docs</text>
    <!-- Certificate icon -->
    <g transform="translate(108,488)">
      <rect x="0" y="0" width="50" height="66" rx="8" ry="8" stroke="#6366F1" stroke-width="2.5" fill="none"/>
      <circle cx="25" cy="42" r="10" fill="#6366F1" />
      <path d="M25 52 L20 66 L25 62 L30 66 Z" fill="#7C3AED"/>
      <line x1="10" y1="16" x2="40" y2="16" stroke="#6366F1" stroke-width="2"/>
      <line x1="10" y1="26" x2="40" y2="26" stroke="#6366F1" stroke-width="2"/>
    </g>
  </g>

  <!-- POLICY / CLARITY NOTES -->
  <g id="clarity">
    <rect x="80" y="630" width="340" height="100" class="box" fill="white"/>
    <text x="250" y="666" text-anchor="middle" class="label">Legal Clarity</text>
    <text x="250" y="690" text-anchor="middle" class="dim">Ownership confirmed · Rights documented</text>
    <!-- Scales icon -->
    <g transform="translate(110,646)">
      <rect x="26" y="0" width="8" height="42" fill="#7C3AED"/>
      <rect x="12" y="42" width="36" height="6" rx="3" ry="3" fill="#7C3AED"/>
      <line x1="30" y1="6" x2="10" y2="22" stroke="#7C3AED" stroke-width="3"/>
      <line x1="30" y1="6" x2="50" y2="22" stroke="#7C3AED" stroke-width="3"/>
      <line x1="10" y1="22" x2="10" y2="22" stroke="#7C3AED" stroke-width="3"/>
      <line x1="50" y1="22" x2="50" y2="22" stroke="#7C3AED" stroke-width="3"/>
      <path d="M2 22 Q10 34 18 22 Z" fill="white" stroke="#7C3AED" stroke-width="2"/>
      <path d="M42 22 Q50 34 58 22 Z" fill="white" stroke="#7C3AED" stroke-width="2"/>
    </g>
  </g>

  <!-- INSTITUTIONAL OPTIONS -->
  <g id="institutional">
    <rect x="530" y="180" width="340" height="110" class="box" fill="white"/>
    <text x="700" y="218" text-anchor="middle" class="label">Assign to Entity</text>
    <text x="700" y="242" text-anchor="middle" class="dim">Company · University · Joint Venture</text>
    <!-- building icon -->
    <g transform="translate(560,196)">
      <rect x="0" y="0" width="54" height="40" rx="4" ry="4" stroke="#0EA5E9" stroke-width="2.5" fill="none"/>
      <rect x="8" y="10" width="10" height="10" fill="#0EA5E9"/>
      <rect x="24" y="10" width="10" height="10" fill="#0EA5E9"/>
      <rect x="40" y="10" width="10" height="10" fill="#0EA5E9"/>
      <rect x="22" y="40" width="10" height="8" fill="#0EA5E9"/>
    </g>

    <rect x="530" y="320" width="340" height="130" class="box" fill="white"/>
    <text x="700" y="356" text-anchor="middle" class="label">Institutional Agreements</text>
    <text x="700" y="380" text-anchor="middle" class="dim">TTO · Sponsored Research · Consortium</text>
    <!-- chips -->
    <g transform="translate(560,392)">
      <rect x="0"  y="0" width="116" height="28" class="chip"/><text x="58" y="19" text-anchor="middle" class="small">TTO Agreement</text>
      <rect x="126" y="0" width="168" height="28" class="chip"/><text x="210" y="19" text-anchor="middle" class="small">Sponsored Research</text>
      <rect x="306" y="0" width="130" height="28" class="chip"/><text x="371" y="19" text-anchor="middle" class="small">Consortium</text>
    </g>

    <rect x="530" y="480" width="340" height="120" class="box" fill="white"/>
    <text x="700" y="516" text-anchor="middle" class="label">Commercialization Path</text>
    <text x="700" y="540" text-anchor="middle" class="dim">Internal Use · Spinout · Out‑license</text>
    <!-- handshake icon -->
    <g transform="translate(560,500)">
      <path d="M0 24 C6 14 20 14 28 22 L44 38 C48 42 56 42 60 38 L76 22" fill="none" stroke="#6366F1" stroke-width="3"/>
      <rect x="26" y="22" width="10" height="10" rx="3" ry="3" fill="#6366F1"/>
      <rect x="36" y="28" width="10" height="10" rx="3" ry="3" fill="#6366F1"/>
      <rect x="46" y="32" width="10" height="10" rx="3" ry="3" fill="#6366F1"/>
    </g>

    <rect x="530" y="620" width="340" height="110" class="box" fill="white"/>
    <text x="700" y="656" text-anchor="middle" class="label">Risk & Compliance</text>
    <text x="700" y="680" text-anchor="middle" class="dim">Conflicts · Background IP · Obligations</text>
    <!-- warning shield -->
    <g transform="translate(560,638)">
      <path d="M30 0 L60 12 L60 34 C60 52 46 64 30 70 C14 64 0 52 0 34 L0 12 Z" fill="none" stroke="#7C3AED" stroke-width="3"/>
      <path d="M30 18 L30 48" stroke="#7C3AED" stroke-width="3"/>
      <circle cx="30" cy="56" r="3" fill="#7C3AED"/>
    </g>
  </g>

  <!-- LICENSING ARRANGEMENTS -->
  <g id="licensing">
    <rect x="980" y="180" width="340" height="120" class="box" fill="white"/>
    <text x="1150" y="218" text-anchor="middle" class="label">License Types</text>
    <g class="dim" text-anchor="middle">
      <text x="1040" y="246">Exclusive</text>
      <text x="1150" y="246">Non‑exclusive</text>
      <text x="1260" y="246">Field‑limited</text>
    </g>
    <!-- certificate ribbon -->
    <g transform="translate(1006,194)">
      <circle cx="20" cy="18" r="12" fill="#0EA5E9"/>
      <path d="M14 30 L18 44 L20 40 L22 44 L26 30 Z" fill="#7C3AED"/>
    </g>

    <rect x="980" y="330" width="340" height="130" class="box" fill="white"/>
    <text x="1150" y="366" text-anchor="middle" class="label">Financial Terms</text>
    <g class="dim" text-anchor="middle">
      <text x="1040" y="392">Upfront</text>
      <text x="1150" y="392">Royalties</text>
      <text x="1260" y="392">Milestones</text>
    </g>
    <!-- coins icon -->
    <g transform="translate(1008,350)">
      <circle cx="20" cy="26" r="12" stroke="#6366F1" stroke-width="3" fill="none"/>
      <circle cx="40" cy="26" r="12" stroke="#6366F1" stroke-width="3" fill="none"/>
      <circle cx="60" cy="26" r="12" stroke="#6366F1" stroke-width="3" fill="none"/>
    </g>

    <rect x="980" y="490" width="340" height="120" class="box" fill="white"/>
    <text x="1150" y="526" text-anchor="middle" class="label">Scope & Controls</text>
    <g class="dim" text-anchor="middle">
      <text x="1040" y="552">Territory</text>
      <text x="1150" y="552">Field of Use</text>
      <text x="1260" y="552">Sublicensing</text>
    </g>
    <!-- sliders icon -->
    <g transform="translate(1000,506)">
      <line x1="0" y1="8" x2="80" y2="8" stroke="#0EA5E9" stroke-width="4"/>
      <circle cx="24" cy="8" r="8" fill="#0EA5E9"/>
      <line x1="0" y1="28" x2="80" y2="28" stroke="#0EA5E9" stroke-width="4"/>
      <circle cx="56" cy="28" r="8" fill="#0EA5E9"/>
      <line x1="0" y1="48" x2="80" y2="48" stroke="#0EA5E9" stroke-width="4"/>
      <circle cx="40" cy="48" r="8" fill="#0EA5E9"/>
    </g>

    <rect x="980" y="640" width="340" height="110" class="box" fill="white"/>
    <text x="1150" y="676" text-anchor="middle" class="label">Open & Alternative Paths</text>
    <g class="dim" text-anchor="middle">
      <text x="1040" y="700">Open Source</text>
      <text x="1150" y="700">FRAND</text>
      <text x="1260" y="700">Evaluations</text>
    </g>
    <!-- open lock icon -->
    <g transform="translate(1008,658)">
      <rect x="12" y="20" width="44" height="28" rx="6" ry="6" stroke="#7C3AED" stroke-width="3" fill="none"/>
      <path d="M26 20 C26 10 34 8 40 12" stroke="#7C3AED" stroke-width="3" fill="none"/>
    </g>
  </g>

  <!-- CONNECTORS -->
  <!-- From Team to Institutional -->
  <path class="line" d="M420 240 C 470 240 500 240 530 240" />
  <path class="line" d="M420 385 C 470 385 500 385 530 385" />
  <path class="line" d="M420 535 C 470 535 500 535 530 535" />
  <path class="line" d="M420 680 C 470 680 500 680 530 680" />

  <!-- From Institutional to Licensing -->
  <path class="line" d="M870 240 C 920 240 950 240 980 240" />
  <path class="line" d="M870 385 C 920 385 950 385 980 385" />
  <path class="line" d="M870 535 C 920 535 950 535 980 535" />
  <path class="line" d="M870 680 C 920 680 950 680 980 680" />

  <!-- Legend -->
  <g id="legend">
    <rect x="40" y="840" width="1320" height="2" fill="url(#gradPB)"/>
    <g transform="translate(46,876)">
      <circle cx="8" cy="8" r="6" fill="#7C3AED"/><text x="24" y="12" class="dim">Legal clarity symbols (gavel, shield, scales)</text>
      <circle cx="400" cy="8" r="6" fill="#6366F1"/><text x="416" y="12" class="dim">Ownership badges (Sole, Joint, Work‑for‑Hire)</text>
      <circle cx="860" cy="8" r="6" fill="#0EA5E9"/><text x="876" y="12" class="dim">Institutional agreements & license terms</text>
    </g>
  </g>
</svg>