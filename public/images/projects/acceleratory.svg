<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial gradients for depth portal -->
    <radialGradient id="portalCore" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="30%" style="stop-color:#6366f1;stop-opacity:0.5" />
      <stop offset="60%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="glowRing" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="screenFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.95" />
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="25" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  

  
  <!-- FLOATING SCREEN 1 - Top Center (Closest/Largest) -->
  <g transform="translate(710, 80)">
    <rect x="-15" y="-15" width="530" height="400" rx="20" 
          fill="#8b5cf6" opacity="0.2" filter="url(#strongGlow)"/>
    <rect x="0" y="0" width="500" height="370" rx="16" 
          fill="url(#screenFill)" 
          stroke="#8b5cf6" 
          stroke-width="3"/>
    
    <g opacity="0.95">
      <!-- Dashboard header -->
      <rect x="30" y="30" width="440" height="6" rx="3" fill="#8b5cf6" opacity="0.7"/>
      <circle cx="50" cy="60" r="6" fill="#8b5cf6" opacity="0.5"/>
      <circle cx="72" cy="60" r="6" fill="#a78bfa" opacity="0.5"/>
      
      <!-- Main chart - steep growth -->
      <path d="M 50 280 L 100 240 L 150 200 L 200 150 L 250 110 L 300 80 L 350 60 L 400 45 L 450 35" 
            stroke="#a78bfa" stroke-width="5" fill="none" filter="url(#mediumGlow)"/>
      <path d="M 50 280 L 100 240 L 150 200 L 200 150 L 250 110 L 300 80 L 350 60 L 400 45 L 450 35 L 450 310 L 50 310 Z" 
            fill="#8b5cf6" opacity="0.25"/>
      
      <!-- Glowing points -->
      <circle cx="150" cy="200" r="7" fill="#a78bfa" filter="url(#mediumGlow)"/>
      <circle cx="250" cy="110" r="8" fill="#a78bfa" filter="url(#mediumGlow)"/>
      <circle cx="350" cy="60" r="8" fill="#c4b5fd" filter="url(#mediumGlow)"/>
      <circle cx="450" cy="35" r="9" fill="#c4b5fd" filter="url(#mediumGlow)"/>
      
      <!-- Metric boxes -->
      <rect x="50" y="325" width="130" height="20" rx="10" fill="#8b5cf6" opacity="0.3"/>
      <rect x="195" y="325" width="130" height="20" rx="10" fill="#a78bfa" opacity="0.3"/>
      <rect x="340" y="325" width="110" height="20" rx="10" fill="#c4b5fd" opacity="0.3"/>
    </g>
  </g>
  
  <!-- FLOATING SCREEN 2 - Left (Mid-distance) -->
  <g transform="translate(220, 180) rotate(-8 200 170)">
    <rect x="-12" y="-12" width="424" height="364" rx="16" 
          fill="#6366f1" opacity="0.15" filter="url(#mediumGlow)"/>
    <rect x="0" y="0" width="400" height="340" rx="12" 
          fill="url(#screenFill)" 
          stroke="#6366f1" 
          stroke-width="2.5"/>
    
    <g opacity="0.9">
      <rect x="25" y="25" width="350" height="4" rx="2" fill="#6366f1" opacity="0.7"/>
      
      <!-- Growth curve -->
      <path d="M 40 240 L 80 210 L 120 180 L 160 165 L 200 140 L 240 110 L 280 85 L 320 65 L 360 50" 
            stroke="#6366f1" stroke-width="4" fill="none" filter="url(#softGlow)"/>
      <path d="M 40 240 L 80 210 L 120 180 L 160 165 L 200 140 L 240 110 L 280 85 L 320 65 L 360 50 L 360 270 L 40 270 Z" 
            fill="#6366f1" opacity="0.2"/>
      
      <circle cx="120" cy="180" r="6" fill="#6366f1" filter="url(#softGlow)"/>
      <circle cx="200" cy="140" r="6" fill="#6366f1" filter="url(#softGlow)"/>
      <circle cx="280" cy="85" r="7" fill="#818cf8" filter="url(#softGlow)"/>
      <circle cx="360" cy="50" r="7" fill="#818cf8" filter="url(#softGlow)"/>
      
      <!-- Stats cards -->
      <rect x="40" y="285" width="90" height="35" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
      <rect x="155" y="285" width="90" height="35" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
      <rect x="270" y="285" width="90" height="35" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    </g>
  </g>
  
  <!-- FLOATING SCREEN 3 - Right (Mid-distance) -->
  <g transform="translate(1300, 180) rotate(8 200 170)">
    <rect x="-12" y="-12" width="424" height="364" rx="16" 
          fill="#3b82f6" opacity="0.15" filter="url(#mediumGlow)"/>
    <rect x="0" y="0" width="400" height="340" rx="12" 
          fill="url(#screenFill)" 
          stroke="#3b82f6" 
          stroke-width="2.5"/>
    
    <g opacity="0.9">
      <rect x="25" y="25" width="350" height="4" rx="2" fill="#3b82f6" opacity="0.7"/>
      
      <!-- Performance line -->
      <path d="M 40 230 L 75 210 L 110 180 L 145 190 L 180 160 L 215 135 L 250 105 L 285 80 L 320 60 L 360 45" 
            stroke="#3b82f6" stroke-width="4" fill="none" filter="url(#softGlow)"/>
      <path d="M 40 230 L 75 210 L 110 180 L 145 190 L 180 160 L 215 135 L 250 105 L 285 80 L 320 60 L 360 45 L 360 270 L 40 270 Z" 
            fill="#3b82f6" opacity="0.2"/>
      
      <circle cx="110" cy="180" r="6" fill="#3b82f6" filter="url(#softGlow)"/>
      <circle cx="180" cy="160" r="6" fill="#3b82f6" filter="url(#softGlow)"/>
      <circle cx="250" cy="105" r="7" fill="#60a5fa" filter="url(#softGlow)"/>
      <circle cx="320" cy="60" r="7" fill="#60a5fa" filter="url(#softGlow)"/>
      <circle cx="360" cy="45" r="7" fill="#60a5fa" filter="url(#softGlow)"/>
      
      <!-- Progress bars -->
      <rect x="40" y="285" width="150" height="18" rx="9" fill="#0f172a" opacity="0.8"/>
      <rect x="44" y="289" width="115" height="10" rx="5" fill="#3b82f6" opacity="0.8"/>
      
      <rect x="210" y="285" width="140" height="18" rx="9" fill="#0f172a" opacity="0.8"/>
      <rect x="214" y="289" width="100" height="10" rx="5" fill="#60a5fa" opacity="0.8"/>
    </g>
  </g>
  
  <!-- FLOATING SCREEN 4 - Bottom Left (Far) -->
  <g transform="translate(140, 560) rotate(-5 160 140)" opacity="0.85">
    <rect x="-10" y="-10" width="340" height="300" rx="12" 
          fill="#10b981" opacity="0.12" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="320" height="280" rx="10" 
          fill="url(#screenFill)" 
          stroke="#10b981" 
          stroke-width="2"/>
    
    <g opacity="0.85">
      <rect x="20" y="20" width="280" height="3" rx="1.5" fill="#10b981" opacity="0.6"/>
      
      <!-- Chart -->
      <path d="M 35 200 L 70 180 L 105 155 L 140 145 L 175 120 L 210 95 L 245 75 L 280 60" 
            stroke="#10b981" stroke-width="3.5" fill="none" filter="url(#softGlow)"/>
      <path d="M 35 200 L 70 180 L 105 155 L 140 145 L 175 120 L 210 95 L 245 75 L 280 60 L 280 220 L 35 220 Z" 
            fill="#10b981" opacity="0.2"/>
      
      <circle cx="105" cy="155" r="5" fill="#10b981" filter="url(#softGlow)"/>
      <circle cx="175" cy="120" r="5" fill="#10b981" filter="url(#softGlow)"/>
      <circle cx="245" cy="75" r="6" fill="#34d399" filter="url(#softGlow)"/>
      <circle cx="280" cy="60" r="6" fill="#34d399" filter="url(#softGlow)"/>
      
      <rect x="35" y="235" width="80" height="25" rx="5" fill="#10b981" opacity="0.25"/>
      <rect x="130" y="235" width="75" height="25" rx="5" fill="#34d399" opacity="0.25"/>
      <rect x="220" y="235" width="65" height="25" rx="5" fill="#6ee7b7" opacity="0.25"/>
    </g>
  </g>
  
  <!-- FLOATING SCREEN 5 - Bottom Center (Far) -->
  <g transform="translate(800, 560)" opacity="0.85">
    <rect x="-10" y="-10" width="340" height="300" rx="12" 
          fill="#ec4899" opacity="0.12" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="320" height="280" rx="10" 
          fill="url(#screenFill)" 
          stroke="#ec4899" 
          stroke-width="2"/>
    
    <g opacity="0.85">
      <rect x="20" y="20" width="280" height="3" rx="1.5" fill="#ec4899" opacity="0.6"/>
      
      <!-- Chart -->
      <path d="M 35 205 L 65 185 L 95 165 L 125 155 L 155 130 L 185 105 L 215 80 L 245 60 L 280 45" 
            stroke="#ec4899" stroke-width="3.5" fill="none" filter="url(#softGlow)"/>
      <path d="M 35 205 L 65 185 L 95 165 L 125 155 L 155 130 L 185 105 L 215 80 L 245 60 L 280 45 L 280 220 L 35 220 Z" 
            fill="#ec4899" opacity="0.2"/>
      
      <circle cx="95" cy="165" r="5" fill="#ec4899" filter="url(#softGlow)"/>
      <circle cx="155" cy="130" r="5" fill="#ec4899" filter="url(#softGlow)"/>
      <circle cx="215" cy="80" r="6" fill="#f472b6" filter="url(#softGlow)"/>
      <circle cx="280" cy="45" r="6" fill="#f472b6" filter="url(#softGlow)"/>
      
      <rect x="35" y="235" width="85" height="25" rx="5" fill="#ec4899" opacity="0.25"/>
      <rect x="135" y="235" width="80" height="25" rx="5" fill="#f472b6" opacity="0.25"/>
      <rect x="230" y="235" width="60" height="25" rx="5" fill="#f9a8d4" opacity="0.25"/>
    </g>
  </g>
  
  <!-- FLOATING SCREEN 6 - Bottom Right (Far) -->
  <g transform="translate(1460, 560) rotate(5 160 140)" opacity="0.85">
    <rect x="-10" y="-10" width="340" height="300" rx="12" 
          fill="#f59e0b" opacity="0.12" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="320" height="280" rx="10" 
          fill="url(#screenFill)" 
          stroke="#f59e0b" 
          stroke-width="2"/>
    
    <g opacity="0.85">
      <rect x="20" y="20" width="280" height="3" rx="1.5" fill="#f59e0b" opacity="0.6"/>
      
      <!-- Chart -->
      <path d="M 35 210 L 65 190 L 95 170 L 125 180 L 155 155 L 185 130 L 215 100 L 245 75 L 280 55" 
            stroke="#f59e0b" stroke-width="3.5" fill="none" filter="url(#softGlow)"/>
      <path d="M 35 210 L 65 190 L 95 170 L 125 180 L 155 155 L 185 130 L 215 100 L 245 75 L 280 55 L 280 220 L 35 220 Z" 
            fill="#f59e0b" opacity="0.2"/>
      
      <circle cx="95" cy="170" r="5" fill="#f59e0b" filter="url(#softGlow)"/>
      <circle cx="155" cy="155" r="5" fill="#f59e0b" filter="url(#softGlow)"/>
      <circle cx="215" cy="100" r="6" fill="#fbbf24" filter="url(#softGlow)"/>
      <circle cx="280" cy="55" r="6" fill="#fbbf24" filter="url(#softGlow)"/>
      
      <rect x="35" y="240" width="100" height="15" rx="7" fill="#0f172a" opacity="0.8"/>
      <rect x="39" y="244" width="75" height="7" rx="3" fill="#f59e0b" opacity="0.7"/>
      
      <rect x="150" y="240" width="140" height="15" rx="7" fill="#0f172a" opacity="0.8"/>
      <rect x="154" y="244" width="95" height="7" rx="3" fill="#fbbf24" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Floating geometric accents -->
  <g opacity="0.3" stroke-width="1.5" fill="none">
    <polygon points="180,380 200,360 220,380 200,400" stroke="#8b5cf6"/>
    <polygon points="1720,380 1740,360 1760,380 1740,400" stroke="#6366f1"/>
    <circle cx="350" cy="850" r="20" stroke="#3b82f6"/>
    <circle cx="1570" cy="850" r="20" stroke="#10b981"/>
    <rect x="120" y="120" width="30" height="30" stroke="#a78bfa" transform="rotate(45 135 135)"/>
    <rect x="1770" y="120" width="30" height="30" stroke="#60a5fa" transform="rotate(45 1785 135)"/>
  </g>
  
  <!-- Energy particles emanating from center -->
  <g opacity="0.7">
    <circle cx="960" cy="540" r="5" fill="#c4b5fd" filter="url(#strongGlow)"/>
    <circle cx="820" cy="460" r="4" fill="#a78bfa" filter="url(#mediumGlow)"/>
    <circle cx="1100" cy="460" r="4" fill="#8b5cf6" filter="url(#mediumGlow)"/>
    <circle cx="760" cy="620" r="3" fill="#6366f1" filter="url(#softGlow)"/>
    <circle cx="1160" cy="620" r="3" fill="#6366f1" filter="url(#softGlow)"/>
    <circle cx="900" cy="380" r="4" fill="#818cf8" filter="url(#mediumGlow)"/>
    <circle cx="1020" cy="380" r="4" fill="#818cf8" filter="url(#mediumGlow)"/>
  </g>
  
  <!-- Ambient floating particles -->
  <g opacity="0.5">
    <circle cx="450" cy="320" r="2" fill="#8b5cf6"/>
    <circle cx="1470" cy="320" r="2" fill="#6366f1"/>
    <circle cx="320" cy="720" r="2" fill="#3b82f6"/>
    <circle cx="1600" cy="720" r="2" fill="#10b981"/>
    <circle cx="600" cy="180" r="2" fill="#a78bfa"/>
    <circle cx="1320" cy="180" r="2" fill="#60a5fa"/>
    <circle cx="250" cy="450" r="2" fill="#c4b5fd"/>
    <circle cx="1670" cy="450" r="2" fill="#fbbf24"/>
  </g>
</svg>
