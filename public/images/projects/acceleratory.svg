<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for depth and lighting -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050b14;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="stageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.3" />
    </linearGradient>
    
    <radialGradient id="spotlightLeft" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="spotlightRight" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Spotlight effects (adjusted for transparent background) -->
  <ellipse cx="576" cy="300" rx="500" ry="400" fill="url(#spotlightLeft)" opacity="0.3"/>
  <ellipse cx="1344" cy="300" rx="500" ry="400" fill="url(#spotlightRight)" opacity="0.3"/>
  
  <!-- Stage platform (semi-isometric) -->
  <path d="M 200 850 L 1720 850 L 1650 920 L 270 920 Z" fill="url(#stageGradient)" opacity="0.8"/>
  <path d="M 200 850 L 1720 850 L 1720 860 L 200 860 Z" fill="#1e3a5f" opacity="0.6"/>
  
  <!-- Audience silhouettes -->
  <g opacity="0.5">
    <!-- Row 1 - bottom -->
    <ellipse cx="300" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="380" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="460" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="540" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="620" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="700" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="780" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="860" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="940" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1020" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1100" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1180" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1260" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1340" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1420" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1500" cy="920" rx="35" ry="55" fill="#1a2744"/>
    <ellipse cx="1580" cy="920" rx="35" ry="55" fill="#1a2744"/>
    
    <!-- Row 2 -->
    <ellipse cx="340" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="420" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="500" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="580" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="660" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="740" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="820" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="900" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="980" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1060" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1140" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1220" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1300" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1380" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1460" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
    <ellipse cx="1540" cy="950" rx="30" ry="48" fill="#0f1a2e"/>
  </g>
  
  <!-- Left floating screen -->
  <g transform="translate(320, 280)">
    <!-- Screen glow -->
    <rect x="-10" y="-10" width="440" height="330" rx="8" fill="url(#screenGlow)" filter="url(#softGlow)" opacity="0.7"/>
    
    <!-- Screen body -->
    <rect x="0" y="0" width="420" height="310" rx="8" fill="#1a2744" stroke="#2d4a7c" stroke-width="2"/>
    
    <!-- Dashboard elements -->
    <g opacity="0.9">
      <!-- Header bar -->
      <rect x="20" y="20" width="380" height="8" rx="4" fill="#7c3aed" opacity="0.6"/>
      
      <!-- Chart area with upward trend -->
      <path d="M 40 180 L 80 160 L 120 140 L 160 150 L 200 110 L 240 90 L 280 70 L 320 50 L 360 40" 
            stroke="#10b981" stroke-width="4" fill="none" filter="url(#glow)"/>
      
      <!-- Area under chart -->
      <path d="M 40 180 L 80 160 L 120 140 L 160 150 L 200 110 L 240 90 L 280 70 L 320 50 L 360 40 L 360 200 L 40 200 Z" 
            fill="url(#screenGlow)" opacity="0.3"/>
      
      <!-- Data points -->
      <circle cx="40" cy="180" r="5" fill="#10b981" filter="url(#glow)"/>
      <circle cx="120" cy="140" r="5" fill="#10b981" filter="url(#glow)"/>
      <circle cx="200" cy="110" r="5" fill="#10b981" filter="url(#glow)"/>
      <circle cx="280" cy="70" r="5" fill="#10b981" filter="url(#glow)"/>
      <circle cx="360" cy="40" r="5" fill="#10b981" filter="url(#glow)"/>
      
      <!-- Metric cards -->
      <rect x="40" y="220" width="100" height="60" rx="4" fill="#2d4a7c" opacity="0.4"/>
      <rect x="160" y="220" width="100" height="60" rx="4" fill="#2d4a7c" opacity="0.4"/>
      <rect x="280" y="220" width="100" height="60" rx="4" fill="#2d4a7c" opacity="0.4"/>
      
      <!-- Bars in cards -->
      <rect x="50" y="250" width="15" height="20" rx="2" fill="#2563eb" opacity="0.7"/>
      <rect x="70" y="240" width="15" height="30" rx="2" fill="#7c3aed" opacity="0.7"/>
      <rect x="90" y="235" width="15" height="35" rx="2" fill="#10b981" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Center floating screen (larger) -->
  <g transform="translate(760, 180)">
    <!-- Screen glow -->
    <rect x="-15" y="-15" width="430" height="430" rx="12" fill="url(#screenGlow)" filter="url(#softGlow)" opacity="0.8"/>
    
    <!-- Screen body -->
    <rect x="0" y="0" width="400" height="400" rx="12" fill="#1a2744" stroke="#2d4a7c" stroke-width="3"/>
    
    <!-- Dashboard elements -->
    <g opacity="0.9">
      <!-- Top bar -->
      <rect x="30" y="30" width="340" height="10" rx="5" fill="#2563eb" opacity="0.6"/>
      
      <!-- Large upward trending chart -->
      <path d="M 50 280 L 90 240 L 130 220 L 170 200 L 210 150 L 250 120 L 290 80 L 330 50 L 350 40" 
            stroke="#10b981" stroke-width="5" fill="none" filter="url(#glow)"/>
      
      <!-- Gradient fill under chart -->
      <defs>
        <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
          <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
        </linearGradient>
      </defs>
      <path d="M 50 280 L 90 240 L 130 220 L 170 200 L 210 150 L 250 120 L 290 80 L 330 50 L 350 40 L 350 320 L 50 320 Z" 
            fill="url(#chartFill)"/>
      
      <!-- Glowing data points -->
      <circle cx="50" cy="280" r="6" fill="#10b981" filter="url(#glow)"/>
      <circle cx="130" cy="220" r="6" fill="#10b981" filter="url(#glow)"/>
      <circle cx="210" cy="150" r="6" fill="#10b981" filter="url(#glow)"/>
      <circle cx="290" cy="80" r="6" fill="#10b981" filter="url(#glow)"/>
      <circle cx="350" cy="40" r="6" fill="#10b981" filter="url(#glow)"/>
      
      <!-- Bottom metrics -->
      <rect x="50" y="330" width="90" height="40" rx="4" fill="#2d4a7c" opacity="0.5"/>
      <rect x="155" y="330" width="90" height="40" rx="4" fill="#2d4a7c" opacity="0.5"/>
      <rect x="260" y="330" width="90" height="40" rx="4" fill="#2d4a7c" opacity="0.5"/>
      
      <!-- Accent bars -->
      <rect x="60" y="350" width="25" height="12" rx="2" fill="#7c3aed" opacity="0.8"/>
      <rect x="165" y="350" width="25" height="12" rx="2" fill="#2563eb" opacity="0.8"/>
      <rect x="270" y="350" width="25" height="12" rx="2" fill="#10b981" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Right floating screen -->
  <g transform="translate(1200, 300)">
    <!-- Screen glow -->
    <rect x="-10" y="-10" width="440" height="320" rx="8" fill="url(#screenGlow)" filter="url(#softGlow)" opacity="0.7"/>
    
    <!-- Screen body -->
    <rect x="0" y="0" width="420" height="300" rx="8" fill="#1a2744" stroke="#2d4a7c" stroke-width="2"/>
    
    <!-- Dashboard elements -->
    <g opacity="0.9">
      <!-- Header -->
      <rect x="20" y="20" width="380" height="8" rx="4" fill="#2563eb" opacity="0.6"/>
      
      <!-- Growth chart -->
      <path d="M 40 180 L 70 170 L 100 155 L 130 165 L 160 140 L 190 120 L 220 100 L 250 75 L 280 60 L 310 45 L 340 35 L 370 25" 
            stroke="#7c3aed" stroke-width="4" fill="none" filter="url(#glow)"/>
      
      <!-- Chart fill -->
      <defs>
        <linearGradient id="chartFillRight" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
          <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
        </linearGradient>
      </defs>
      <path d="M 40 180 L 70 170 L 100 155 L 130 165 L 160 140 L 190 120 L 220 100 L 250 75 L 280 60 L 310 45 L 340 35 L 370 25 L 370 200 L 40 200 Z" 
            fill="url(#chartFillRight)"/>
      
      <!-- Data points -->
      <circle cx="100" cy="155" r="5" fill="#7c3aed" filter="url(#glow)"/>
      <circle cx="190" cy="120" r="5" fill="#7c3aed" filter="url(#glow)"/>
      <circle cx="280" cy="60" r="5" fill="#7c3aed" filter="url(#glow)"/>
      <circle cx="370" cy="25" r="5" fill="#7c3aed" filter="url(#glow)"/>
      
      <!-- Bottom cards -->
      <rect x="40" y="220" width="160" height="50" rx="4" fill="#2d4a7c" opacity="0.4"/>
      <rect x="220" y="220" width="160" height="50" rx="4" fill="#2d4a7c" opacity="0.4"/>
      
      <!-- Progress bars -->
      <rect x="50" y="245" width="120" height="8" rx="4" fill="#1a2744" opacity="0.8"/>
      <rect x="50" y="245" width="95" height="8" rx="4" fill="#2563eb" opacity="0.9"/>
      
      <rect x="230" y="245" width="120" height="8" rx="4" fill="#1a2744" opacity="0.8"/>
      <rect x="230" y="245" width="85" height="8" rx="4" fill="#7c3aed" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Light beams from stage -->
  <g opacity="0.25">
    <path d="M 400 850 L 350 200 L 450 200 Z" fill="#7c3aed"/>
    <path d="M 960 850 L 900 150 L 1020 150 Z" fill="#2563eb"/>
    <path d="M 1520 850 L 1470 200 L 1570 200 Z" fill="#7c3aed"/>
  </g>
  
  <!-- Floating particles/energy dots -->
  <g opacity="0.6">
    <circle cx="280" cy="400" r="3" fill="#7c3aed" filter="url(#glow)"/>
    <circle cx="650" cy="250" r="4" fill="#2563eb" filter="url(#glow)"/>
    <circle cx="1150" cy="450" r="3" fill="#10b981" filter="url(#glow)"/>
    <circle cx="1550" cy="350" r="4" fill="#7c3aed" filter="url(#glow)"/>
    <circle cx="480" cy="600" r="2" fill="#2563eb" filter="url(#glow)"/>
    <circle cx="1380" cy="550" r="3" fill="#7c3aed" filter="url(#glow)"/>
  </g>
</svg>
