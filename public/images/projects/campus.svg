<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Advanced Gradients -->
    <radialGradient id="bgRadial" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="structure1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3561;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="structure2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d4470;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252941;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5f8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4d5380;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowLine1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0abfc;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="glowLine2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0abfc;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#e0d7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </linearGradient>
    
    <!-- Advanced Filters -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="megaGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Grid overlay for depth -->
  <g opacity="0.06">
    <defs>
      <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#6b21a8" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="1600" height="900" fill="url(#grid)"/>
  </g>
  
  <!-- Energy flow lines (background layer) -->
  <g opacity="0.5" filter="url(#strongGlow)">
    <path d="M 200 700 Q 400 600 600 650 T 1000 600 T 1400 550" stroke="url(#glowLine1)" stroke-width="3" fill="none"/>
    <path d="M 100 400 Q 300 350 500 400 T 900 380 T 1300 400" stroke="url(#glowLine2)" stroke-width="3" fill="none"/>
    <path d="M 300 200 Q 500 250 700 200 T 1100 220 T 1500 180" stroke="url(#glowLine1)" stroke-width="3" fill="none"/>
