<svg width="230" height="230" viewBox="0 0 230 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cycleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="50%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Central deployment cycle -->
  <g transform="translate(115, 115)">
    <!-- Outer cycle ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#cycleGradient)" stroke-width="4" opacity="0.8" stroke-dasharray="5,5">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Inner cycle ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#cycleGradient)" stroke-width="2" opacity="0.6" stroke-dasharray="3,3">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Center hub -->
    <circle cx="0" cy="0" r="25" fill="url(#cycleGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="15" fill="#ffffff" opacity="0.2"/>
    
    <!-- Deploy node -->
    <g transform="translate(0, -70)">
      <circle cx="0" cy="0" r="12" fill="#10b981"/>
      <text x="0" y="20" font-family="Arial" font-size="8" fill="#10b981" text-anchor="middle">Deploy</text>
      <!-- Rocket icon -->
      <path d="M-3,-8 L0,-12 L3,-8 L1,-4 L-1,-4 Z" fill="#ffffff"/>
    </g>
    
    <!-- Learn node -->
    <g transform="translate(60, 35)">
      <circle cx="0" cy="0" r="12" fill="#3b82f6"/>
      <text x="0" y="20" font-family="Arial" font-size="8" fill="#3b82f6" text-anchor="middle">Learn</text>
      <!-- Chart icon -->
      <rect x="-4" y="-2" width="2" height="6" fill="#ffffff"/>
      <rect x="-1" y="-4" width="2" height="8" fill="#ffffff"/>
      <rect x="2" y="-1" width="2" height="5" fill="#ffffff"/>
    </g>
    
    <!-- Iterate node -->
    <g transform="translate(-60, 35)">
      <circle cx="0" cy="0" r="12" fill="#8b5cf6"/>
      <text x="0" y="20" font-family="Arial" font-size="8" fill="#8b5cf6" text-anchor="middle">Iterate</text>
      <!-- Refresh icon -->
      <path d="M-4,-2 Q-4,-6 0,-6 Q4,-6 4,-2 M2,-4 L4,-2 L2,0" stroke="#ffffff" stroke-width="1" fill="none"/>
    </g>
  </g>
  
  <!-- Analytics dashboard -->
  <g transform="translate(20, 20)">
    <rect width="80" height="50" fill="#1e293b" rx="4" opacity="0.9"/>
    
    <!-- Mini chart -->
    <polyline points="10,35 20,25 30,30 40,20 50,25 60,15" stroke="#10b981" stroke-width="2" fill="none"/>
    
    <!-- Metrics -->
    <text x="10" y="15" font-family="Arial" font-size="6" fill="#94a3b8">Users: 1,247</text>
    <text x="10" y="45" font-family="Arial" font-size="6" fill="#94a3b8">Conv: 12.3%</text>
  </g>
  
  <!-- Vercel deployment status -->
  <g transform="translate(130, 20)">
    <rect width="80" height="30" fill="#000000" rx="4" opacity="0.8"/>
    <circle cx="15" cy="15" r="4" fill="#10b981"/>
    <text x="25" y="18" font-family="Arial" font-size="8" fill="#ffffff">Vercel</text>
    <text x="10" y="28" font-family="Arial" font-size="6" fill="#10b981">✓ Deployed</text>
  </g>
  
  <!-- Stripe integration -->
  <g transform="translate(20, 160)">
    <rect width="60" height="30" fill="#635bff" rx="4" opacity="0.8"/>
    <text x="30" y="18" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">Stripe</text>
    <text x="30" y="28" font-family="Arial" font-size="6" fill="#ffffff" text-anchor="middle">$2,450</text>
  </g>
  
  <!-- Database connection -->
  <g transform="translate(150, 160)">
    <rect width="60" height="30" fill="#336791" rx="4" opacity="0.8"/>
    <text x="30" y="18" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">Postgres</text>
    <text x="30" y="28" font-family="Arial" font-size="6" fill="#ffffff" text-anchor="middle">Connected</text>
  </g>
  
  <!-- Connection lines -->
  <path d="M115 45 Q115 80 115 90" stroke="#3b82f6" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
  <path d="M50 160 Q80 140 95 125" stroke="#635bff" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
  <path d="M180 160 Q150 140 135 125" stroke="#336791" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
  
  <!-- Floating data points -->
  <circle cx="40" cy="100" r="2" fill="#10b981" opacity="0.7">
    <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="120" r="2" fill="#3b82f6" opacity="0.7">
    <animate attributeName="cy" values="120;110;120" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="115" cy="200" r="2" fill="#8b5cf6" opacity="0.7">
    <animate attributeName="cy" values="200;190;200" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
