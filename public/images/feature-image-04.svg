<svg width="768" height="400" viewBox="0 0 768 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Simplified Gradients -->
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="aiCoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    
    <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <radialGradient id="glowEffect" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background glow -->
  <circle cx="384" cy="200" r="150" fill="url(#glowEffect)"/>
  
  <!-- Central Rocket -->
  <g transform="translate(384, 200)">
    <!-- Rocket Body -->
    <path d="M-20,-70 Q-20,-85 0,-90 Q20,-85 20,-70 L20,35 Q20,42 12,45 L0,50 L-12,45 Q-20,42 -20,35 Z" 
          fill="url(#rocketGradient)" stroke="#4F46E5" stroke-width="2"/>
    
    <!-- AI Core Window -->
    <circle cx="0" cy="-35" r="15" fill="url(#aiCoreGradient)"/>
    <circle cx="0" cy="-35" r="10" fill="#FFFFFF" fill-opacity="0.3"/>
    
    <!-- Lightning Bolt -->
    <path d="M-5,-42 L3,-42 L-1,-30 L5,-30 L-3,-22 L-5,-30 L1,-30 Z" fill="#FFFFFF"/>
    
    <!-- Rocket Fins -->
    <path d="M-20,15 L-28,35 L-20,32 Z" fill="url(#rocketGradient)"/>
    <path d="M20,15 L28,35 L20,32 Z" fill="url(#rocketGradient)"/>
    
    <!-- Rocket Flames -->
    <path d="M-10,50 Q-12,60 -6,68 Q0,72 6,68 Q12,60 10,50" fill="url(#aiCoreGradient)"/>
    <path d="M-6,50 Q-8,58 -4,64 Q0,66 4,64 Q8,58 6,50" fill="#FFFFFF" fill-opacity="0.6"/>
  </g>
  
  <!-- Authentication Module -->
  <g transform="translate(200, 120)">
    <rect x="-30" y="-18" width="60" height="36" rx="10" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Lock Icon -->
    <rect x="-6" y="-6" width="12" height="9" rx="1" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="-9" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="-1" r="1.5" fill="#FFFFFF"/>
    <text x="0" y="28" text-anchor="middle" fill="#6366F1" font-size="10" font-family="Arial, sans-serif">Auth</text>
  </g>
  
  <!-- User Settings Module -->
  <g transform="translate(568, 120)">
    <rect x="-30" y="-18" width="60" height="36" rx="10" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Gear Icon -->
    <circle cx="0" cy="-1" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="-1" r="3" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="-1" y="-10" width="2" height="4" fill="#FFFFFF"/>
    <rect x="-1" y="5" width="2" height="4" fill="#FFFFFF"/>
    <rect x="-10" y="-2" width="4" height="2" fill="#FFFFFF"/>
    <rect x="6" y="-2" width="4" height="2" fill="#FFFFFF"/>
    <text x="0" y="28" text-anchor="middle" fill="#6366F1" font-size="10" font-family="Arial, sans-serif">Settings</text>
  </g>
  
  <!-- Pricing Module -->
  <g transform="translate(200, 280)">
    <rect x="-30" y="-18" width="60" height="36" rx="10" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Price Tag -->
    <path d="M-8,-8 L8,-8 Q12,-8 12,-4 L12,4 Q12,8 8,8 L-4,8 L-12,0 L-4,-8 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="4" cy="-1" r="2" fill="#FFFFFF"/>
    <text x="0" y="28" text-anchor="middle" fill="#6366F1" font-size="10" font-family="Arial, sans-serif">Pricing</text>
  </g>
  
  <!-- Analytics Module -->
  <g transform="translate(568, 280)">
    <rect x="-30" y="-18" width="60" height="36" rx="10" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Chart Bars -->
    <rect x="-10" y="4" width="3" height="-6" fill="#FFFFFF"/>
    <rect x="-5" y="4" width="3" height="-9" fill="#FFFFFF"/>
    <rect x="0" y="4" width="3" height="-4" fill="#FFFFFF"/>
    <rect x="5" y="4" width="3" height="-7" fill="#FFFFFF"/>
    <rect x="10" y="4" width="3" height="-3" fill="#FFFFFF"/>
    <line x1="-12" y1="6" x2="15" y2="6" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-12" y1="6" x2="-12" y2="-12" stroke="#FFFFFF" stroke-width="1"/>
    <text x="0" y="28" text-anchor="middle" fill="#6366F1" font-size="10" font-family="Arial, sans-serif">Analytics</text>
  </g>
  
  <!-- SEO Module -->
  <g transform="translate(120, 200)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Search Icon -->
    <circle cx="-3" cy="-2" r="5" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="2" y1="3" x2="6" y2="7" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" fill="#6366F1" font-size="9" font-family="Arial, sans-serif">SEO</text>
  </g>
  
  <!-- Docs Module -->
  <g transform="translate(648, 200)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Document Icon -->
    <rect x="-6" y="-8" width="12" height="16" rx="1" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="-3" y1="-4" x2="3" y2="-4" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-3" y1="-1" x2="3" y2="-1" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-3" y1="2" x2="1" y2="2" stroke="#FFFFFF" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" fill="#6366F1" font-size="9" font-family="Arial, sans-serif">Docs</text>
  </g>
  
  <!-- GitHub Module -->
  <g transform="translate(384, 320)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- GitHub Icon -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M-2,-2 L2,-2 M-2,0 L2,0 M-2,2 L2,2" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="4" cy="-4" r="1.5" fill="#FFFFFF"/>
    <text x="0" y="20" text-anchor="middle" fill="#6366F1" font-size="9" font-family="Arial, sans-serif">GitHub</text>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="url(#aiCoreGradient)" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M384,200 Q300,160 200,120" stroke-dasharray="4,2"/>
    <path d="M384,200 Q468,160 568,120" stroke-dasharray="4,2"/>
    <path d="M384,200 Q300,240 200,280" stroke-dasharray="4,2"/>
    <path d="M384,200 Q468,240 568,280" stroke-dasharray="4,2"/>
    <path d="M384,200 L120,200" stroke-dasharray="4,2"/>
    <path d="M384,200 L648,200" stroke-dasharray="4,2"/>
    <path d="M384,250 L384,320" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Floating Particles -->
  <g fill="url(#aiCoreGradient)" opacity="0.4">
    <circle cx="150" cy="100" r="2"/>
    <circle cx="620" cy="80" r="1.5"/>
    <circle cx="100" cy="300" r="2.5"/>
    <circle cx="680" cy="320" r="1"/>
    <circle cx="300" cy="50" r="1.5"/>
    <circle cx="500" cy="350" r="2"/>
  </g>
</svg>
