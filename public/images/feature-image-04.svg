<svg width="768" height="400" viewBox="0 0 768 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="scaffoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
    </linearGradient>
    
    <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.7" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow effects -->
  <circle cx="384" cy="200" r="150" fill="url(#glowGradient)" opacity="0.4"/>
  <circle cx="300" cy="150" r="80" fill="url(#glowGradient)" opacity="0.2"/>
  <circle cx="500" cy="250" r="100" fill="url(#glowGradient)" opacity="0.3"/>
  
  <!-- Main scaffold structure (isometric) -->
  <g transform="translate(384, 200)">
    <!-- Base platform -->
    <path d="M-80,-20 L80,-20 L100,0 L-60,0 Z" fill="url(#scaffoldGradient)" opacity="0.7" filter="url(#softGlow)"/>
    <path d="M-80,-20 L-60,0 L-60,40 L-80,20 Z" fill="url(#scaffoldGradient)" opacity="0.5"/>
    <path d="M80,-20 L100,0 L100,40 L80,20 Z" fill="url(#scaffoldGradient)" opacity="0.6"/>
    
    <!-- Vertical supports -->
    <rect x="-75" y="-60" width="8" height="40" fill="url(#scaffoldGradient)" opacity="0.8" filter="url(#softGlow)"/>
    <rect x="67" y="-60" width="8" height="40" fill="url(#scaffoldGradient)" opacity="0.8" filter="url(#softGlow)"/>
    <rect x="-10" y="-80" width="8" height="60" fill="url(#scaffoldGradient)" opacity="0.8" filter="url(#softGlow)"/>
    
    <!-- Cross beams -->
    <path d="M-75,-50 L75,-50 L77,-48 L-73,-48 Z" fill="url(#scaffoldGradient)" opacity="0.6"/>
    <path d="M-75,-30 L75,-30 L77,-28 L-73,-28 Z" fill="url(#scaffoldGradient)" opacity="0.6"/>
  </g>
  
  <!-- AI Neural Network Brain -->
  <g transform="translate(384, 120)" filter="url(#glow)">
    <!-- Central AI core -->
    <circle cx="0" cy="0" r="25" fill="url(#primaryGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="15" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Neural network nodes -->
    <circle cx="-40" cy="-20" r="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <circle cx="40" cy="-15" r="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <circle cx="-30" cy="25" r="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <circle cx="35" cy="30" r="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <circle cx="0" cy="-45" r="6" fill="url(#moduleGradient)" opacity="0.7"/>
    <circle cx="-55" cy="5" r="6" fill="url(#moduleGradient)" opacity="0.7"/>
    <circle cx="50" cy="10" r="6" fill="url(#moduleGradient)" opacity="0.7"/>
    
    <!-- Neural connections -->
    <line x1="0" y1="0" x2="-40" y2="-20" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="40" y2="-15" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="-30" y2="25" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="35" y2="30" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="-40" y1="-20" x2="-55" y2="5" stroke="url(#primaryGradient)" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="-15" x2="50" y2="10" stroke="url(#primaryGradient)" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Floating App Modules -->
  <!-- Authentication Module -->
  <g transform="translate(200, 150)" filter="url(#softGlow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <rect x="-20" y="-10" width="40" height="5" rx="2" fill="#FFFFFF" opacity="0.6"/>
    <rect x="-20" y="-2" width="25" height="3" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <rect x="-20" y="3" width="30" height="3" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="15" cy="0" r="6" fill="#FFFFFF" opacity="0.3"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="10" font-family="Arial, sans-serif" opacity="0.8">Auth</text>
  </g>
  
  <!-- User Settings Module -->
  <g transform="translate(580, 180)" filter="url(#softGlow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <circle cx="-10" cy="-5" r="4" fill="#FFFFFF" opacity="0.6"/>
    <rect x="0" y="-8" width="15" height="3" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <rect x="0" y="-2" width="12" height="2" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <rect x="0" y="2" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <rect x="0" y="6" width="10" height="2" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="10" font-family="Arial, sans-serif" opacity="0.8">Settings</text>
  </g>
  
  <!-- Pricing Module -->
  <g transform="translate(150, 280)" filter="url(#softGlow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <text x="0" y="-2" text-anchor="middle" fill="#FFFFFF" font-size="12" font-family="Arial, sans-serif" opacity="0.8">$</text>
    <rect x="-15" y="2" width="30" height="2" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <rect x="-10" y="6" width="20" height="2" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="10" font-family="Arial, sans-serif" opacity="0.8">Pricing</text>
  </g>
  
  <!-- Analytics Module -->
  <g transform="translate(600, 300)" filter="url(#softGlow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <!-- Chart bars -->
    <rect x="-15" y="5" width="4" height="-8" fill="#FFFFFF" opacity="0.6"/>
    <rect x="-8" y="5" width="4" height="-12" fill="#FFFFFF" opacity="0.6"/>
    <rect x="-1" y="5" width="4" height="-6" fill="#FFFFFF" opacity="0.6"/>
    <rect x="6" y="5" width="4" height="-10" fill="#FFFFFF" opacity="0.6"/>
    <rect x="13" y="5" width="4" height="-4" fill="#FFFFFF" opacity="0.6"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="10" font-family="Arial, sans-serif" opacity="0.8">Analytics</text>
  </g>
  
  <!-- SEO Module -->
  <g transform="translate(250, 320)" filter="url(#softGlow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <circle cx="-8" cy="-3" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="5" x2="8" y2="13" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <rect x="5" y="-8" width="15" height="2" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <rect x="5" y="-4" width="12" height="2" rx="1" fill="#FFFFFF" opacity="0.4"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="10" font-family="Arial, sans-serif" opacity="0.8">SEO</text>
  </g>
  
  <!-- Docs Module -->
  <g transform="translate(520, 120)" filter="url(#softGlow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" fill="url(#moduleGradient)" opacity="0.8"/>
    <rect x="-15" y="-8" width="25" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
    <rect x="-15" y="-4" width="20" height="1.5" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <rect x="-15" y="-1" width="22" height="1.5" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <rect x="-15" y="2" width="18" height="1.5" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <rect x="-15" y="5" width="15" height="1.5" rx="1" fill="#FFFFFF" opacity="0.5"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="10" font-family="Arial, sans-serif" opacity="0.8">Docs</text>
  </g>
  
  <!-- Connection lines between modules and scaffold -->
  <g opacity="0.3">
    <line x1="200" y1="150" x2="334" y2="180" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="580" y1="180" x2="434" y2="180" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="150" y1="280" x2="334" y2="220" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="600" y1="300" x2="434" y2="220" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="250" y1="320" x2="354" y2="220" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="520" y1="120" x2="414" y2="160" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Code streams -->
  <g opacity="0.4">
    <path d="M100,50 Q200,80 300,60 T500,70" stroke="url(#primaryGradient)" stroke-width="2" fill="none" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M80,350 Q180,320 280,340 T480,330" stroke="url(#primaryGradient)" stroke-width="2" fill="none" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M650,80 Q550,110 450,90 T250,100" stroke="url(#primaryGradient)" stroke-width="2" fill="none" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- GitHub integration symbol -->
  <g transform="translate(680, 350)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="20" fill="url(#moduleGradient)" opacity="0.7"/>
    <path d="M-8,-8 L-8,8 L8,8 L8,-8 Z M-4,-4 L4,-4 M-4,0 L4,0 M-4,4 L4,4" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.8"/>
    <circle cx="6" cy="-6" r="3" fill="#FFFFFF" opacity="0.6"/>
    <text x="0" y="30" text-anchor="middle" fill="url(#primaryGradient)" font-size="9" font-family="Arial, sans-serif" opacity="0.8">GitHub</text>
  </g>
  
  <!-- Launch rocket -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <path d="M0,-15 L-5,5 L0,0 L5,5 Z" fill="url(#primaryGradient)" opacity="0.9"/>
    <circle cx="0" cy="-8" r="2" fill="#FFFFFF" opacity="0.8"/>
    <path d="M-2,8 Q0,12 2,8" stroke="url(#primaryGradient)" stroke-width="1" fill="none" opacity="0.6"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#primaryGradient)" font-size="9" font-family="Arial, sans-serif" opacity="0.8">Launch</text>
  </g>
  
  <!-- Floating particles for atmosphere -->
  <g opacity="0.3">
    <circle cx="120" cy="200" r="2" fill="url(#primaryGradient)">
      <animate attributeName="cy" values="200;180;200" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="150" r="1.5" fill="url(#moduleGradient)">
      <animate attributeName="cy" values="150;130;150" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="350" r="2.5" fill="url(#primaryGradient)">
      <animate attributeName="cy" values="350;330;350" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="50" r="1" fill="url(#moduleGradient)">
      <animate attributeName="cy" values="50;30;50" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
