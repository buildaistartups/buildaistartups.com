<svg width="768" height="400" viewBox="0 0 768 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gradients -->
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.7" />
    </linearGradient>
    
    <linearGradient id="aiCoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.75" />
    </linearGradient>
    
    <linearGradient id="connectionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.4" />
    </linearGradient>
    
    <radialGradient id="glowEffect" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#6366F1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Premium Filters -->
    <filter id="premiumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#8B5CF6" flood-opacity="0.3"/>
    </filter>
    
    <filter id="moduleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background ambient glow -->
  <circle cx="384" cy="200" r="180" fill="url(#glowEffect)" opacity="0.6"/>
  <circle cx="300" cy="150" r="100" fill="url(#glowEffect)" opacity="0.3"/>
  <circle cx="500" cy="250" r="120" fill="url(#glowEffect)" opacity="0.4"/>
  
  <!-- Central Rocket (AI-Powered Launch Vehicle) -->
  <g transform="translate(384, 200)" filter="url(#premiumGlow)">
    <!-- Rocket Body -->
    <path d="M-25,-80 Q-25,-100 0,-110 Q25,-100 25,-80 L25,40 Q25,50 15,55 L0,60 L-15,55 Q-25,50 -25,40 Z" 
          fill="url(#rocketGradient)" stroke="#4F46E5" stroke-width="2" opacity="0.9"/>
    
    <!-- Rocket Window/AI Core -->
    <circle cx="0" cy="-40" r="18" fill="url(#aiCoreGradient)" filter="url(#moduleGlow)"/>
    <circle cx="0" cy="-40" r="12" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- AI Lightning Bolt -->
    <path d="M-6,-48 L2,-48 L-2,-35 L6,-35 L-2,-25 L-6,-35 L2,-35 Z" 
          fill="#FFFFFF" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Rocket Fins -->
    <path d="M-25,20 L-35,45 L-25,40 Z" fill="url(#rocketGradient)" opacity="0.8"/>
    <path d="M25,20 L35,45 L25,40 Z" fill="url(#rocketGradient)" opacity="0.8"/>
    
    <!-- Rocket Flames (Animated) -->
    <g opacity="0.8">
      <path d="M-12,60 Q-15,75 -8,85 Q0,90 8,85 Q15,75 12,60" 
            fill="url(#aiCoreGradient)">
        <animateTransform attributeName="transform" type="scale" 
                         values="1,1;1.1,1.2;1,1" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M-8,60 Q-10,70 -5,78 Q0,82 5,78 Q10,70 8,60" 
            fill="#FFFFFF" opacity="0.6">
        <animateTransform attributeName="transform" type="scale" 
                         values="1,1;1.2,1.3;1,1" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Authentication Module (Top Left) -->
  <g transform="translate(200, 120)" filter="url(#softShadow)">
    <rect x="-35" y="-20" width="70" height="40" rx="12" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- Lock Icon -->
    <rect x="-8" y="-8" width="16" height="12" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="-12" r="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="-2" r="2" fill="#FFFFFF"/>
    <text x="0" y="35" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="11" font-family="Arial, sans-serif" font-weight="600">Authentication</text>
  </g>
  
  <!-- User Settings Module (Top Right) -->
  <g transform="translate(568, 120)" filter="url(#softShadow)">
    <rect x="-35" y="-20" width="70" height="40" rx="12" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- Gear Icon -->
    <circle cx="0" cy="-2" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="-2" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <rect x="-2" y="-15" width="4" height="6" fill="#FFFFFF"/>
    <rect x="-2" y="7" width="4" height="6" fill="#FFFFFF"/>
    <rect x="-15" y="-4" width="6" height="4" fill="#FFFFFF"/>
    <rect x="9" y="-4" width="6" height="4" fill="#FFFFFF"/>
    <text x="0" y="35" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="11" font-family="Arial, sans-serif" font-weight="600">User Settings</text>
  </g>
  
  <!-- Pricing Module (Bottom Left) -->
  <g transform="translate(200, 280)" filter="url(#softShadow)">
    <rect x="-35" y="-20" width="70" height="40" rx="12" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- Price Tag Icon -->
    <path d="M-10,-10 L10,-10 Q15,-10 15,-5 L15,5 Q15,10 10,10 L-5,10 L-15,0 L-5,-10 Z" 
          fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="5" cy="-2" r="3" fill="#FFFFFF"/>
    <text x="0" y="35" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="11" font-family="Arial, sans-serif" font-weight="600">Pricing & Checkout</text>
  </g>
  
  <!-- Analytics Module (Bottom Right) -->
  <g transform="translate(568, 280)" filter="url(#softShadow)">
    <rect x="-35" y="-20" width="70" height="40" rx="12" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- Chart Icon -->
    <rect x="-12" y="5" width="4" height="-8" fill="#FFFFFF"/>
    <rect x="-6" y="5" width="4" height="-12" fill="#FFFFFF"/>
    <rect x="0" y="5" width="4" height="-6" fill="#FFFFFF"/>
    <rect x="6" y="5" width="4" height="-10" fill="#FFFFFF"/>
    <rect x="12" y="5" width="4" height="-4" fill="#FFFFFF"/>
    <line x1="-15" y1="8" x2="18" y2="8" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-15" y1="8" x2="-15" y2="-15" stroke="#FFFFFF" stroke-width="1"/>
    <text x="0" y="35" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="11" font-family="Arial, sans-serif" font-weight="600">Analytics</text>
  </g>
  
  <!-- SEO Module (Left) -->
  <g transform="translate(120, 200)" filter="url(#softShadow)">
    <rect x="-30" y="-18" width="60" height="36" rx="10" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- Search Icon -->
    <circle cx="-5" cy="-3" r="7" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="2" y1="4" x2="8" y2="10" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="11" font-family="Arial, sans-serif" font-weight="600">SEO Pages</text>
  </g>
  
  <!-- Docs Module (Right) -->
  <g transform="translate(648, 200)" filter="url(#softShadow)">
    <rect x="-30" y="-18" width="60" height="36" rx="10" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- Document Icon -->
    <rect x="-8" y="-10" width="16" height="20" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-5" y1="-1" x2="5" y2="-1" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="-5" y1="3" x2="2" y2="3" stroke="#FFFFFF" stroke-width="1"/>
    <text x="0" y="30" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="11" font-family="Arial, sans-serif" font-weight="600">Docs-as-Code</text>
  </g>
  
  <!-- GitHub Integration (Bottom Center) -->
  <g transform="translate(384, 320)" filter="url(#softShadow)">
    <rect x="-25" y="-15" width="50" height="30" rx="8" 
          fill="url(#moduleGradient)" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <!-- GitHub Icon -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M-3,-3 L3,-3 M-3,0 L3,0 M-3,3 L3,3" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="5" cy="-5" r="2" fill="#FFFFFF" opacity="0.7"/>
    <text x="0" y="25" text-anchor="middle" fill="url(#aiCoreGradient)" 
          font-size="10" font-family="Arial, sans-serif" font-weight="600">GitHub Push</text>
  </g>
  
  <!-- Premium Connection Lines -->
  <g opacity="0.6">
    <!-- From rocket to modules -->
    <path d="M384,200 Q300,160 200,120" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;24" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M384,200 Q468,160 568,120" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M384,200 Q300,240 200,280" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;24" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M384,200 Q468,240 568,280" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M384,200 L120,200" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;24" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M384,200 L648,200" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M384,260 Q384,290 384,320" stroke="url(#connectionGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="0;24" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Data Flow Particles -->
  <g opacity="0.7">
    <circle cx="300" cy="160" r="3" fill="url(#aiCoreGradient)">
      <animateMotion dur="4s" repeatCount="indefinite">
        <path d="M0,0 Q84,40 184,40"/>
      </animateMotion>
    </circle>
    <circle cx="468" cy="160" r="3" fill="url(#aiCoreGradient)">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <path d="M0,0 Q-84,40 -184,40"/>
      </animateMotion>
    </circle>
    <circle cx="252" cy="200" r="2.5" fill="url(#moduleGradient)">
      <animateMotion dur="3s" repeatCount="indefinite">
        <path d="M0,0 L132,0"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- Launch Trail Effect -->
  <g transform="translate(384, 260)" opacity="0.4">
    <path d="M-5,0 Q-8,15 -3,25 Q0,30 3,25 Q8,15 5,0" fill="url(#aiCoreGradient)">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M-3,5 Q-5,18 -2,26 Q0,28 2,26 Q5,18 3,5" fill="#FFFFFF" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Success Indicators -->
  <g opacity="0.6">
    <circle cx="100" cy="80" r="2" fill="url(#aiCoreGradient)">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="668" cy="100" r="1.5" fill="url(#moduleGradient)">
      <animate attributeName="cy" values="100;80;100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="350" r="2.5" fill="url(#aiCoreGradient)">
      <animate attributeName="cy" values="350;330;350" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
