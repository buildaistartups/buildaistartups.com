name: Build Score Badge

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-score-badge.yml'
      - 'bass.json'

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ Fixed deprecation warning

      - name: Get Build Score
        id: score
        run: |
          # Call the API
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.BAIS_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://buildaistartups.com/api/projects/${{ github.event.repository.name }}/score")

          echo "HTTP Status: $RESPONSE"
          echo "Raw Response: $(cat /tmp/response.json)"

          # ✅ Fallback to 0 if API fails or returns bad JSON
          SCORE=$(cat /tmp/response.json | jq -r '.buildScore.overall // 0' 2>/dev/null || echo "0")
          TREND=$(cat /tmp/response.json | jq -r '.buildScore.trend // "stable"' 2>/dev/null || echo "stable")

          # ✅ Validate SCORE is a number, default to 0
          if ! [[ "$SCORE" =~ ^[0-9]+$ ]]; then
            SCORE=0
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "trend=$TREND" >> $GITHUB_OUTPUT

          # Determine color
          if [ "$SCORE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$SCORE" -ge 60 ]; then
            COLOR="green"
          elif [ "$SCORE" -ge 40 ]; then
            COLOR="yellow"
          else
            COLOR="orange"
          fi

          echo "color=$COLOR" >> $GITHUB_OUTPUT

          # Determine trend emoji
          if [ "$TREND" = "up" ]; then
            TREND_EMOJI="📈"
          elif [ "$TREND" = "down" ]; then
            TREND_EMOJI="📉"
          else
            TREND_EMOJI="➡️"
          fi

          echo "trend_emoji=$TREND_EMOJI" >> $GITHUB_OUTPUT

      - name: Generate SVG Badge
        run: |
          mkdir -p .github/badges
          cat > .github/badges/build-score.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="140" height="20">
            <linearGradient id="b" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="a">
              <rect width="140" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#a)">
              <path fill="#555" d="M0 0h85v20H0z"/>
              <path fill="${{ steps.score.outputs.color }}" d="M85 0h55v20H85z"/>
              <path fill="url(#b)" d="M0 0h140v20H0z"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="110">
              <text x="435" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="750">Build Score</text>
              <text x="435" y="140" transform="scale(.1)" textLength="750">Build Score</text>
              <text x="1115" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="450">${{ steps.score.outputs.score }}% ${{ steps.score.outputs.trend_emoji }}</text>
              <text x="1115" y="140" transform="scale(.1)" textLength="450">${{ steps.score.outputs.score }}% ${{ steps.score.outputs.trend_emoji }}</text>
            </g>
          </svg>
          EOF

      - name: Commit and push badge
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes to badge"
          else
            git add .github/badges/build-score.svg
            git commit -m "Update Build Score badge: ${{ steps.score.outputs.score }}% ${{ steps.score.outputs.trend_emoji }}"
            git push
          fi

      - name: Update README badge URL
        run: |
          sed -i 's|!\[Build Score\].*|![Build Score](https://raw.githubusercontent.com/${{ github.repository }}/main/.github/badges/build-score.svg)|' README.md

          if git diff --quiet README.md; then
            echo "README already has correct badge URL"
          else
            git add README.md
            git commit -m "Update Build Score badge URL in README"
            git push
          fi
